。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "この言葉は「若い頃の雑用は買ってでもしろ」と言い換えてもいいかも知れません。人のやりたがらないような雑用でも自ら買って出て、コツコツとこなしていた人は、前頭葉が鍛えられ、意志的・主体的に行動する力の高い人になりやすいということです。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}, {"text": "われわれは、自分が「いかにあるべきか」、そして「何をなすべきか」を自分自身で選び取る必要がある。単なる読書にうつつを抜かし、他人の人間像や行動をほめたりけなしたりして、それで満足というのでは困る。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "いまはインピュタビリティが過剰になって、それを避けることにみんな一生懸命だから、レスポンシビリティが内から湧き起こってくる余裕がないという状態ではないか。レスポンシビリティはまさに中動態的なもので、「俺が悪かった」とか、「俺がこれをなんとかしなきゃ」とか、ある状況にレスポンドしようという気持ちですね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 119, "label": "マネジメント", "freq": 8, "highlights": [{"text": "実は上司が「自分が安心したいから一体感を持たせたい」と思っているだけ。 本来人間はみな違う考え方をします。人それぞれの事情も考え方も違います。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "では何をマネジャーは求めるべきでしょうか。 　それは、「役割を果たしているかどうか」 です。 　そもそも仕事というのは、各人の役割をメンバー全員が果たしてくれれば、それでいいのです。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "マネジャーやリーダーがすべき成果の評価というのは、当たり前のことを当たり前にできたということに対する評価もきちんとすることです。 　リモートワークを中心として、多様な働き方をする人が増えたからこそ、その人がやるべきことをできる人かどうか、普通のことを普通にできる人かどうかが評価されるのです。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "私は、自分にはわからないことがあることを認め、そのための余白を持っているマネジャーこそ優れたマネジャーだと思っている。それは、謙虚さが美徳だからというだけでなく、そうした認識を持たない限り、本当にはっとするようなブレークスルーは起きないからだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "こうした問題を解決するカギは、機能しているものとしていないものとを選り分ける方法を見つけることだと思うが、これは言うほどたやすいことではない。今のピクサーはこの原則に従ってマネジメントされているが、私はある意味、生まれてからずっと、どうしたら「見る目」を高められるのか、その方法を探ってきたように思う。そのきっかけは、ピクサーが生まれる何十年も前の出来事だった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "言うまでもなく、マネジャーは優れたアイデアを持っているだけではだめだ。そのアイデアを取り入れる人たちからの支持が得られなければ。私はこの教訓を胸に刻んだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "グーグルによる「非常に効果的なマネージャーの８つの習慣（8 Habits Of Highly Effective Google Managers）」 １．優れたコーチになりなさい ２．チームに任せて、マイクロマネジメントしないこと ３．従業員の成功と幸せのために考えていることを表現しなさい ４．生産的かつ結果志向でいなさい ５．優れたコミュニケーションを取り、チームの話を聞きなさい ６．従業員のキャリア開発を支援しなさい ７．チームのための明確なビジョンと戦略を持ちなさい ８．キーとなる技術を持つことで、チームを助けることができるようにしなさい", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "そして、改めて言うまでもなく、この「心理に語りかける」ためには、 　そもそも、「相手の心理を理解する」ということが求められるわけです。 　しかし、もし、この「相手の心理を理解する」ということが 　本当にできるようになったならば、その方は、おそらく、 　マネジメントの「奥義」を究めることができるでしょう。 　それほど、「相手の心理を理解する」ということは、 　難しいことでもあるのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}]}, {"id": 120, "label": "アイデア", "freq": 8, "highlights": [{"text": "よいアイデアとは、誰かの役に立つもの だ。裏返して言うと、喜ぶ人の顔が見えてこないアイデアは、すべてダメだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "つまるところ、「よいアイデア」とは、「誰がどんなふうにこれで喜んでくれるか」が考え抜かれたもの なのだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "第一に重要なのは、対立を個人的な問題にしないことである。グループのなかでは互いに反対意見を自由に言い合えなければならない──だが必ず、理由をはっきりさせることが必要だ。具体的に焦点を絞った反論でなければ、反対意見を言われた側は不当に攻撃されたと感じかねない。さらに、すべてのアイデアが公平に扱われるというオープンな環境を保つことも重要だ（＊ 17）。チームのリーダーは意識的にせよ無意識的にせよ、出されるアイデアの範囲を限定してしまうことがある。だが交差点においては、できるだけ多くの意外性に富んだアイデアの組み合わせを可能にする必要がある。それができるのは、まさに多様なメンバーで構成され、各自が自由に意見を言えるグループなのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "実際には、今回調べたビジョナリー・カンパニーのうち、すばらしいアイデアや卓越した製品を出発点とする企業はほとんどない。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "起業家になって、会社を設立し、ビジョナリー・カンパニーを築きたいと強く願っているが、「すばらしいアイデア」がないため、一歩を踏み出せない読者には、すばらしいアイデアの神話という重荷を肩から下ろすよう勧めたい。わたしたちの調査の結果を見ると、むしろ、すばらしいアイデアを見つけてから会社をはじめることにこだわら ない ほうがよいかもしれない。なぜなのか。すばらしいアイデアにこだわっていると、企業が究極の作品だとは考えられなくなってしまうからだ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "アイデアはあきらめたり、 変えたり、 発展させることはあるが（ＧＥは当初の直流方式を廃止し、交流方式に転換した）、 会社は絶対にあきらめない。会社の成功とは、あるアイデアの成功だと考える起業家や経営幹部が多いが、こう考えていると、そのアイデアが失敗した場合、会社まであきらめる可能性が高くなる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "一方はまったく面白味がなく、もう一方は心底感動的だった。その理由は、才能あるストーリーテラーは、観る人を夢中にさせる方法を知っているからだ。そして今回のストーリーラインの進化で十分すぎるほど明白になったことがある。それは、いいアイデアを二流のチームに与えたら台無しにされる。二流のアイデアを優秀なチームに与えたらそれを修正するか、捨ててもっといいものを思いついてくれる。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "なぜそれが混同されてしまうのだろうか。それは、アイデアをそれと格闘する人とは無関係に、単独で天空に浮かぶ存在のように考えている人があまりに多いからだ。だ", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}]}, {"id": 121, "label": "産業構造", "freq": 8, "highlights": [{"text": "一方、小売業は違う結果になる。小売業はウォルマート、カルフール、イオングループ、セブン＆アイなどのイメージから、グローバル経済圏の巨大企業だと考える人が多い。しかし、小売業は世界の上位一〇社を合計しても、全世界の小売業売上高の一〇パーセントにもならない。日本国内を見ても、セブン＆アイとイオングループを足しても一〇パーセントに届かない（ 図 22／ 図 23）。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "そして〝産業革命〟の意味を、誰でも高品質の商品を作り出すことを可能にしたものととらえるなら、〝情報革命〟とは誰でもが高品質の企画を生産することを可能にするものになるはずだ。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "かつて基幹産業といえば繊維であった。その後、鉄鋼が基幹産業となり、そしてコンピュータが基幹産業となる。その時々の基幹産業にお金がまわり、その基幹産業が雇用を増進し、人びとの生活を豊かにしていく。それが、本来の経済のあり方である。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "たとえばマイクロソフトのビジネスモデルは、ＯＳをどんどん新しくしていくことによって儲けようというものだ。もし、コンピュータやＯＳが不要なポストコンピュータの時代が到来したら、商売はあがったりになってしまう。となれば、ポストコンピュータの産業が勃興することを妨害する方向に努力を傾けることになるのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "新しい産業を生み出す源泉は「新技術」にこそあるのに、競合する企業の 切磋琢磨 がなくなってしまったら、そのような技術を開発する力は大きく 削がれてしまう。知的工業製品の分野で一社独占の状況になってしまったら、技術進化が止まることは明々白々のことだ。 　すべてのパソコン産業が、特定の一社のために 貢ぐような構造に、私は心底から嫌気が差した。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "これではっきりおわかりいただけると思うが、技術の議論なくして付加価値の高いサービス業は成り立たないのだ。脱工業化社会とか、サービス産業化社会とか、金融立国などという、聞こえのよいもっともらしい言葉はまやかしにすぎない。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "既得権益（不平等な縦型社会）が新自由主義（フラット化した世界）に移行するには出遅れてしまっているので、一気にその先の地域コミュニティに完全分権した社会（リキッド化した世界）の構築準備を早々に始めるべきだ、もしＴＰＰを締結するにしても、交渉しながら締結して実行までの限られた時間に、地域による新産業の育成と地域コミュニティ型セイフティネットの充実などの整備を一刻も早くすべきだ、と思っています。そのためには、産業構造を大きく変え、新産業の育成、例えば短期的には観光業（移動手段、ガストロノミーが既に資産であるので）、中長期的には代替エネルギー技術（世界的な需要があるので）とバイオメカニクス製品（あたらしいものづくり）などの育成をすべきです。クールジャパンは関係ありません。クールジャパンを発言したのは、もともと米国のＣＦＲ（外交問題評議会）ですから。なにより、今、一番問題なのは、『日本をこんな国にしたい！』というアイデアがないことですよね。これが、政治家でも学者でも論客といわれる人でも、ほとんどないことが問題だと思います。皆、目先の問題と対症療法ばかり。ノービジョン・ノーライフなのです。 　ですので、次の社会の準備、もしくはポスト新自由主義の戦略の準備が整うまで、本来は安易にＴＰＰを推し進めるべきではありませんが、いつも日本は遅すぎるので、きっとダラダラと進んでいくでしょう。そして、いずれ来る改革にはそれなりの痛みを伴うのです。また、ＴＰＰを推し進めた場合、相対的に経団連は強くなるでしょう。それも忘れてはいけませんし、対応も必要です。 　もうひとつの問題はＴＰＰの外交的側面です。お話ししたように、現在、世界は予想通りブロック経済に向かっているように見えます。形はかつてとは異なりますが、ＥＵはドイツを中心に東へ南へと実質的に拡大傾向…", "book_title": "白本", "author": "高城剛"}, {"text": "既得権益（不平等な縦型社会）が新自由主義（フラット化した世界）に移行するには出遅れてしまっているので、一気にその先の地域コミュニティに完全分権した社会（リキッド化した世界）の構築準備を早々に始めるべきだ、もしＴＰＰを締結するにしても、交渉しながら締結して実行までの限られた時間に、地域による新産業の育成と地域コミュニティ型セイフティネットの充実などの整備を一刻も早くすべきだ、と思っています。そのためには、産業構造を大きく変え、新産業の育成、例えば短期的には観光業（移動手段、ガストロノミーが既に資産であるので）、中長期的には代替エネルギー技術（世界的な需要があるので）とバイオメカニクス製品（あたらしいものづくり）などの育成をすべきです。クールジャパンは関係ありません。クールジャパンを発言したのは、もともと米国のＣＦＲ（外交問題評議会）ですから。なにより、今、一番問題なのは、『日本をこんな国にしたい！』というアイデアがないことですよね。これが、政治家でも学者でも論客といわれる人でも、ほとんどないことが問題だと思います。皆、目先の問題と対症療法ばかり。ノービジョン・ノーライフなのです。 　ですので、次の社会の準備、もしくはポスト新自由主義の戦略の準備が整うまで、本来は安易にＴＰＰを推し進めるべきではありませんが、いつも日本は遅すぎるので、きっとダラダラと進んでいくでしょう。そして、いずれ来る改革にはそれなりの痛みを伴うのです。また、ＴＰＰを推し進めた場合、相対的に経団連は強くなるでしょう。それも忘れてはいけませんし、対応も必要です。 　もうひとつの問題はＴＰＰの外交的側面です。お話ししたように、現在、世界は予想通りブロック経済に向かっているように見えます。形はかつてとは異なりますが、ＥＵはドイツを中心に東へ南へと実質的に拡大傾向...", "book_title": "白本", "author": "高城剛"}]}, {"id": 122, "label": "自由", "freq": 8, "highlights": [{"text": "だから、あくまでもその人それぞれがやれることをすればよいのであって、「絆」や「がんばろう」というような言葉を、むやみやたらに強調しなくてもいいのではないかと考えているんです。 　あくまでも人は自由だから、絆の外にいる人、がんばらない人がいてもいいし、それを「間違った考えをするな！　間違ったことをするな！」「それでもお前は日本人か！」「人でなし！」と説教や強要をするのは好ましくない。現実には、他人を心配することができないくらいに余裕がない人だってたくさんいるし、関心があまりない人がいるっていうことも認めないといけない。でもそこで、間違ってもその人たちをけなしたり、非難したりしてはいけないんじゃないかな、というのが僕の考えなんです。", "book_title": "ひとりぼっちを笑うな (角川oneテーマ21)", "author": "蛭子 能収"}, {"text": "とにかく僕、蛭子能収は、誰かに束縛されたり、自由を脅かされることがなによりも大嫌い。誰もが自由に意見できる世の中こそが、一番いいと思っているから。人は、自由でいることが一番いいと思う。もっと言えば、自由であるべきだとも思っている。 　そのためには〝群れ〟のなかに、自分の身を置いてはいけません。なぜかって？　それは、無言の圧力を感じるのは、その人が〝群れ〟の一員でいるからです。", "book_title": "ひとりぼっちを笑うな (角川oneテーマ21)", "author": "蛭子 能収"}, {"text": "先ほど述べた「人生がデザインできない」がゆえの漂流は、「こうしたらみんな幸せなんじゃないですかね」という決まった類型や規範がなくなったから、あまりある現代の自由の中で、誰もが堂々と迷子になっている状態です。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "獄の外に獄があり、 　世界を入れるほど広い。 　その四方の壁は、名誉、利益、高慢、欲望への執着である。 　悲しいことには、実に多くの人々が、 　そのなかにつながれ、いつまでも いている。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "また、常に僕は「お金のために働くこと」は、考えていません。そして、株なども買ったことは一度もなく、こうやって客観的に考えると、目的は時代によって違えど、自分が面白いと思ったことをずっとやり続けているだけなんだと思います。たとえ、今それが収入の低下につながっても、常に面白い仕事を選択します。そうすると、その過程にある「面倒なこと」も、それほど面倒ではなくなります。もし、お金のために働いていたら、面倒なことは、本当に面倒でしょう。また、人から賞賛されたいとは、全くとは言いませんが、ほとんど考えていません。時代も僕も変わって行きますが、その時の自分が面白いと思ったことを、今も昔もこれからもやり続けているだけなのです。ですので、あらためて考えると「自分にとって面白いこと」→「自由な時間」→「収入」や「他者からの評価」が優先順位になります。それは紆余曲折あって、この年齢になってわかったことも多くあるんだと思います。だから今、迷ったりすることは、悪いことではありませんよ。", "book_title": "白本", "author": "高城剛"}, {"text": "なぜ、そのニュースが僕の目に留まったのか、をいつも考えています。それは、目の前の情報に僕自身がとらわれていないからなんだと思います。日々、情報が簡単に入手できるようなスタイルを持っていると、実は情報に振り回されてしまって、さらに多くの情報を得ようとし、結果混乱に向かいます。大切なことは、情報を得る前に、自分でしっかりイメージすることにあります。なぜ、この問題が起きて、さらにはなぜ僕自身にひっかかるのだろう？　それを別の情報を探して解決しようとするのではなく、まずイメージするのです。僕は今も昔も政治経済に関してプロフェッショナルではありませんが、プロフェッショナルではないからこそ、自由闊達にイメージし、考え、発言できるのだと思います。すなわち、「今」の情報に裏付けられたプロフェッショナルの発言ほど、「今後」のアテにならないものはありません。プロは、間違ってはいけない訳ですから、常にちょっと前の過去の数字の話だけをします。ですので、大情報時代になればなるほど、プロとは違った自由なイメージを持つことが個々に大切になるのです。", "book_title": "白本", "author": "高城剛"}, {"text": "二〇世紀には人間が言語に規定された存在であるというのは哲学的な前提だった。言語は人間がそこから抜け出せないくびきとすら考えられていた。けれども、現代ではむしろ言語のほうが退却してそのくびきから解放されてしまった感がある。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "大学でオンライン授業が始まったとき、僕が最初に言ったのは、教室は全然パブリックなところじゃないということです。パブリックじゃないからこそ好きなことが言えるし、間違ってもいい。その閉鎖性は教室の自由を確保するために大切なことであるわけです。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 123, "label": "健康", "freq": 8, "highlights": [{"text": "チョプラは人間の健康を理解するうえで重要なことを見落としているのではないかと思いはじめた。きっかけは、「物事は理論だけでは説明できないと気づいた」ことだったという。「理論といったって、実は抜け穴だらけだということがわかってきたんです」。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "統計でも、妻に死なれた夫の平均寿命はより短くなることが分かっていますが、逆に夫が亡くなったあと妻は意外と大丈夫だったりするんですよね。やっぱりおっさんは立場上弱い。弱すぎるよ。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "体脂肪率も下げられたわけです。体重計のデータではありますが、例えば１㎏体重が落ちると、", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "ひとことで言うと、ウォーキングは「奇跡の薬」 なのだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "「自然のままの食品を食べよう。ただし、食べすぎないように。野菜中心の食事をしよう」", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "30 代前半の僕は、睡眠時間がとても少ない生活をしていました。それは、寝るのがもったいない、と思っていたことが第一にあったんだと思います。そして、食事もジャンクフードやファミレス中心でした。それは、なにを食べようが関係ない、と思っていたからなんだと思います。ですので、言うまでもなく、夜が中心の生活でした。極端な僕は、２００１年の９１１以降、我に返って突然健康志向になります。夜はたっぷり寝て、食べ物も改善。そして、昼中心の生活になりました。これは、時代背景もあったんだと思います。また数年ほど前に、スペインに引っ越してから学んだことは、昼寝です。とにかく、皆昼から飲んで、昼寝します。たまに、東京に戻って日中の打ち合わせ後に、「このあと昼寝」などと言うと驚かれますが、今では、この昼寝の使い方が、僕の規則正しい生活にインストールされた良いアプリとなっています。", "book_title": "白本", "author": "高城剛"}, {"text": "僕が行っているのは、スリランカの首都コロンボから南に４、５時間ほど行った『バーベリンビーチ』です。アーユルヴェーダを効果的に体験するには、最低２週間必要だと思います。", "book_title": "白本", "author": "高城剛"}, {"text": "世界保健機構（ＷＴＯ）は、健康であることを、「身体的」「精神的」「社会的」そして「霊的」であるとしました。この最後の「霊的」が足されたのは、１９９９年のことでＷＴＯ会議満場一致で決まり、その後世界的に「霊的」健康に対して取り組みが行なわれました。", "book_title": "白本", "author": "高城剛"}]}, {"id": 124, "label": "顧客関係", "freq": 8, "highlights": [{"text": "その時に我々が一番重要だと思っているのは、いかに高頻度低価格でユーザーのタッチポイントを多く生み出して、データを取得できるかだと思っています」", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "データでは１回店舗にきてもらった一般客は、 ６〜７割が固定客化 する。職人さんなどのプロ客は９割以上が常連客になる。 だから３割の宅配希望のお客様をあきらめ、店舗にきてもらうお客様を固定客化することで勝負する。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "ほかの会社のカルチャー・ブックを読みたいと「求めてくる」人がいることに、私はいつも驚きます。（投資家や人事関係者以外で） 会社の年次報告書か従業員の手引きを読みたがっている人がいるという話を聞いたことはありますか。 ザッポスが何を売っているのかさえ知らないのに、カルチャー・ブックの背後にあるアイデアを知りたがる人がいることを考えると信じられません。そのような方が、いつかそのうち、次に新しいジーンズか靴が必要になったらザッポスを思い出してくださるかもしれません（ちなみに、カルチャー・ブックの制作費は一般的に思われているよりもずっと値頃だということは触れておく意味がありますね）。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "この何年も、ザッポスの成長の一番の原動力となっているのがリピート顧客とクチコミです。広告にはほとんど費用をかけず、その費用をカスタマー・サービスと顧客体験に投資し、私たちに代わって顧客にクチコミでマーケティングを担ってもらおうというのが私たちの哲学なのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "一般に、マーケティング部門がマーケティングＲＯＩを計算する際、顧客の生涯価値を一定にして考えます。私たちは、顧客の生涯価値を流動的なものと見なしており、あらゆるやり取りを通して顧客の心の中に私たちのブランドとのよりポジティブな絆を作り出せれば、顧客の生涯価値は向上できると考えています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "マーケティング担当者が陥りがちなもうひとつの落とし穴は、本来ならエンゲージメント（絆） や信頼を築くことに集中すべき時に、いかに話題性を持つかを考えることに集中しすぎることです。私の母はもの静かなタイプですが、そんな母が何か言う時、私は耳を傾けます。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ロイヤルティの高いリピート顧客には、翌日配達にアップグレードして驚かせています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "電話経由での売上げは総売上げの五％程度にすぎないのに、ネット企業がそれほど電話を重視することを不思議がる人も多いことでしょう。実際、私たちが受ける電話のほとんどが売上げを生んでいません。しかし、平均的に見て、私たちの顧客は一生にどこかの時点で少なくとも一度は私たちに電話をかけてくることを知っているので、私たちはその機会を使っていつまでも記憶に残る思い出を生み出すように心がける必要があるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 125, "label": "誠実性", "freq": 8, "highlights": [{"text": "「悲壮な覚悟」と「ワクワク感」は両立する 　仕事をするうえで大切な三つのメンタルは、「①覚悟、②ワクワク感、③噓をつかないこと」 ではないかと思います。 　これはべつに業種や職種などとは関係ないことです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "ちなみに、ＳＮＳ担当者は常に生活者と接している分、生活者から本性を見抜かれやすい。それを考えると、「本当にそのブランドや商品が好きな偏愛の人かどうか」は、適正な人材選びの大事なポイントだと思う。投稿の上手下手ではなく、そういう素の部分がばれてしまうのがＳＮＳの怖い部分である。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "唯一の対抗策はすべての施策・接点・活動において、誠実であること だ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "だが、その 根底に「徹底的に役に立とう」とする精神が流れているかどうかを、ファンは敏感に見抜く。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "人を説得する原則❸　 自分の誤りを直ちに快く認める。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "「相手の信用状態が不明な時は、彼を立派な紳士と見なし、そのつもりで取引を進めると間違いがないと、私は経験で知っている。要するに、人間は誰でも正直で、義務を果たしたいと思っているのだ。これに対する例外は、比較的少ない。人をごまかすような人間でも、相手に心から信頼され、正直で公正な人物として扱われると、なかなか不正なことはできないものなのだ」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える必要が生じた場合、次の事項を考えてみるべきだ。 　一、誠実であれ。守れない約束はするな。自分の利益は忘れ、相手の利益だけを考えよ。 　二、相手に期待する協力は何か、明確に把握せよ。 　三、相手の身になれ。相手の真の望みは何か？ 　四、あなたに協力すれば相手にどんな利益があるか？ 　五、望みどおりの利益を相手に与えよ。 　六、人に物を頼む場合、その頼みが相手の利益にもなると気づくように話せ。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "コミットメント期間という枠組みが社員の離職を「あらかじめ許す」ことにならないかと心配する向きもいた。だが、離職は会社側が許す・許さないと決められるものではない。そのような権限が会社にあると思うのはただの自己欺瞞であり、社員との間に不誠実な関係を生み出すことにつながる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 126, "label": "実用主義", "freq": 8, "highlights": [{"text": "たしかに観光地のゴミ箱を減らして、持ち帰ってくださいとやれば観光地のゴミは減るかもしれませんが、ものを買っている以上、ゴミ自体は減りません。単に捨てるところがなくて「困る」という状況になるだけです。また、本当にゴミが減るというのは、経済効果という意味ではマイナスです。余計なゴミが出るのを敬遠すれば、観光地での物品購入を減らします。買い物が減るわけですから、経済効果もその分減るのは自明の理でしょう。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "危ない、危ない。とくに世直し型の思想とか改革志向はインテリジェンス機関にはまったく向かない。理想を追い求めてはいけないんです。たとえば、ニセ文書を見抜いたけれど、これは自分たちの陣営に好都合の部分もあるから真正文書にしておこうとか、敵から出てきた本物の文書をあえてニセ文書として扱うとか、どこまで無節操になれるかが情報屋にとってすごく重要なんですよ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "イスラエルの北朝鮮専門家がよく言うのは、なぜ平壌に日本政府代表部を開設しないのか、ということ。高麗ホテルで寝ていれば、向こうからアプローチしてくる。それで金正日と直のチャンネルが出来るじゃないか。情報のための情報、調査のための調査はもういい。何でも知って安心するのはソ連のＫＧＢといっしょだぞ、本当の仕事はその先にあるんだと皮肉をこめて言われました。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "性悪説にもとづいて、相手を利用することだけを徹底的に考えている。だからこそぎりぎりの信頼関係が生まれるわけです。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "日本人は妙に潔癖で、白か黒かはっきりさせないと気がすまないところがあって、特に二重スパイを嫌いますが、ホントに優秀なスパイは概ねダブルですよ。日本でも情報機関を 設すべきかどうかという論議が盛んだけれど、あまりガチガチに考えるとうまく回らなくなる。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "僕自身は「戦う人」という印象が強いかもしれませんが、経験したからこそ言えます、組織は最終的には上の味方です。戦いを挑んではいけません。相手との距離感を適切に維持する実用的な日本語が使えることこそ、普通の人が生き抜くための話術です。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "ましてや子供がいじめられているとしたら、理屈の通じない相手には話しても何ともならない。下手に対抗するより、子供にも学校へ行かなくていい、逃げていいと言ってやるべき。人間関係の損切りは早いほうがいい。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "今後どれほど国際化や少子化が進んでも、日本語人口は七〇〇〇万人をくだらない。医師、不動産販売、建築士など、相談を必要とする属人的仕事はなくならない。中途半端な英語よりも、正確な日本語を正しい距離感で話せることこそ、グローバリゼーションを生き残るコツだ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 127, "label": "透明性", "freq": 8, "highlights": [{"text": "ピクサーを特別足らしめているもの、それは「問題は必ず起こる」と思って仕事をしていることだ。問題の多くは隠れて見えない。それを明るみに出すことが自分たちにとってどれほど不快なことであっても、その努力をする。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "さらに言えば、ネットの世界であればあるほど、よりリアリティが大切になってきている気がします。今の時代、匿名性が高い人よりも、実名で顔を出している人の方が影響力を持っています。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "社員に「あなたが最も大切にしている価値観は？　どんな人でありたい？」などと聞くのは、最初はきまりが悪く感じられるかもしれない。だがこれは、いい人ぶろうという話ではない。価値観について話し合うと、社員とその上司、そして会社との三者間でより強い信頼と信義を築く大事な一歩を踏み出せる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "こうした率直な対話から浮かび上がってくる会社の真の姿は、経営幹部が予想もしなかったものになるかもしれない。しかし、「自分たちには社会的使命を重視するカルチャーがある」と経営陣が思い込んでいる企業で、実はカネだけで動く傭兵のような姿勢に満ちていた、というケースは非常に多い。マネジャーは自社の真の企業文化を理解しておく必要がある。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "ただし、率直な質問をする相手が部下の場合、背後にある力関係のせいで高圧的に感じさせる可能性があることを心にとめておかなければならない。だからこそ、最初にあなたのほうから心の奥底にある価値観やありたい姿を打ち明けて口火を切ることが重要なのだ。前述のアーロンの実験でも、お互いに自分の心のうちを開くような回答を相手に伝えるよう、被験者に求めていた。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "コミットメント期間についての対話を実りあるものにするコツは、「体系化」「一貫性」、そして「透明性」だ。三つとも、コミットメント期間を支える要因そのものであることも、押さえておこう。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第２条 整合性 ［原則］ あなた、私、および当社にはそれぞれ自分の核となる価値観とありたい姿があります。 あなた、私、および当社は三者の価値観とありたい姿がなるべく整合するように努力します。その一方で、一〇〇％重なることはあり得ないことも理解しています。 〈期待水準〉 私は自分の核となる価値観とありたい姿を明記します。また、私の理解の範囲で、会社が本当に信じている具体的な価値観とありたい姿も明記します。 私や会社の価値観とありたい姿について、あなたから率直なフィードバックや提案があればぜひお願いします。 私は、あなたの核となる価値観とありたい姿を知りたいと思っています。それが私や会社のものと違っていてもかまいません。 （あなたの核となる価値観とありたい姿） 　　 （私の核となる価値観とありたい姿） 　　 （会社の核となる価値観とありたい姿） 　　 あなたのこれからのキャリアの発展について、一緒に、私たち共通の期待値を設定していきましょう。 私は、あなたのビジネス面での…", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第２条 整合性 ［原則］ あなた、私、および当社にはそれぞれ自分の核となる価値観とありたい姿があります。 あなた、私、および当社は三者の価値観とありたい姿がなるべく整合するように努力します。その一方で、一〇〇％重なることはあり得ないことも理解しています。 〈期待水準〉 私は自分の核となる価値観とありたい姿を明記します。また、私の理解の範囲で、会社が本当に信じている具体的な価値観とありたい姿も明記します。 私や会社の価値観とありたい姿について、あなたから率直なフィードバックや提案があればぜひお願いします。 私は、あなたの核となる価値観とありたい姿を知りたいと思っています。それが私や会社のものと違っていてもかまいません。 （あなたの核となる価値観とありたい姿） 　　 （私の核となる価値観とありたい姿） 　　 （会社の核となる価値観とありたい姿） 　　 あなたのこれからのキャリアの発展について、一緒に、私たち共通の期待値を設定していきましょう。 私は、あなたのビジネス面での...", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 128, "label": "マーケット感覚", "freq": 8, "highlights": [{"text": "おそらく彼は、「 20 代で結婚情報サービスに登録する女性」が、どんな動機でこういったサービスに登録しているのか、考えたこともなかったのでしょう。 20 代の女性でこういったサービスに登録する人は、多くありません。焦って結婚する必要もないし、恋愛のチャンスも多いのです。それでも、あえて 20 代でそうする人の中には、「若い間に登録したほうが、いい条件で結婚できるのでは？」と考えている人が多そうですよね。そしてそうした女性が、結婚相手を学歴や年収でどのように絞り込むか、火を見るより明らかです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "これからはあらゆるものが市場型取引に移行し、今よりずっと多くの人が、市場化という現象に巻き込まれます。本章で挙げた例からも、投資やビジネスに縁がない人も含め、すべての人にマーケット感覚は必要なのだということが、理解していただけたと思います。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "必要なのは、知名度でも高度な読解力でも専門知識でもなく、「不妊治療のステージ別必読本リスト」を作れば、きっと多くの人にとって価値があるだろうと気がつくマーケット感覚であり、それぞれの段階にいる人が何に悩み、どんな価値を求めているのか、正しく理解する力（マーケット感覚）なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "日本の製造業はよく「Made in Japan」を売りにしようとしますが、それと同等以上に「Used in Japan」「Accepted in Japan」「Best seller in Japan」には価値があります。ところが日本のメーカーは、「日本製」には強いこだわりがあっても、「日本で売れている」ことに価値があるとは、まだ気がついていません。むしろ欧州やアジアのメーカーなど海外企業のほうが、「日本市場で売れたことの価値」を理解し、それを海外でのビジネスに利用しています。これも、マーケット感覚の鋭さの違いなのでしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "これらの例からわかることは、もともと存在していたモノの中に、新たな価値が見いだされ、巨大な市場になったものがたくさんあるということです。それらを市場として大きく育てたのは、最初にモノや制度を作った人ではありません。途中で、その潜在的な価値に気づいた人なのです。 そしてこの「潜在的な価値に気づく能力」こそがマーケット感覚です。高校の部活の全国大会や、小さな村興しのイベントを目にした、マーケット感覚に溢れた誰かがその価値に気づき、市場化をしかけて、これだけ大きな存在に成長させたのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "同様に、なんでもかんでも「きっとお金のためだ」といったお手軽な理由で納得し、その時点で思考を止めてしまうのも、非常に危険です。そんなふうに決めつけていると、人間とはどんな生き物なのか、わからなくなってしまいます。 自分の欲望と向き合い、人間のインセンティブシステムに関心を持ちましょう。そして問題に直面したら、「どうすればみんな自発的に、望ましい方向に動いてくれるだろう？」と考えましょう。気持のもち方を少し変えるだけで、マーケット感覚はどんどん鍛えられていくことでしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "道州制についての議論の中ではよく、「自由に競争したら、地方が大都市に勝てるはずがない」と言われます。これは、日本の地方にはどこもすばらしい価値があると考えている私には、まったく理解できない感覚です。私から見れば、地方に足りないのは価値ではなく、マーケット感覚だけだからです。 「ふるさと納税」は、納税額の多い都市部の人の税金を、地方がぶんどりに行く制度なのだから、地方行政に携わる方はぜひこの市場で成功体験を積み、地方分権や道州制に関しても、前向きに考えていただければと思います。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "マーケット感覚を身につけることの最大の利点は、それさえ身につければ、変化が恐くなくなるということです。今、急速に進む社会の変化を目の当たりにした人たちは、大きくふたつのグループに分かれ始めています。ひとつは、ワクワクしながら自分自身もその変化を楽しんでいる人、もうひとつは、日々伝えられる変化のニュースに不安を深め、どうやって自分と家族を守ろうか、戦々恐々としている人たちです。 このふたつのグループの違いは、どこにあるのでしょう？　学歴でしょうか？　貯金額でしょうか？　私が見る限り、一流大学を出て大企業に勤め、たくさんの貯金を持っている人でも、後者のグループに属している人がたくさんいます。 ふたつのグループの根本的な違いは、いち早く変化の兆しに気づき、新しい世界で価値を提供する方法を、市場から（失敗しながら）学ぶことができるかどうかです。それさえできれば、変化は恐れるものではなく、心から楽しめるモノになります。 そして、そのために必要なものこそが、「マーケット感覚」なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}]}, {"id": 129, "label": "普遍性", "freq": 8, "highlights": [{"text": "これからはあらゆるものが市場型取引に移行し、今よりずっと多くの人が、市場化という現象に巻き込まれます。本章で挙げた例からも、投資やビジネスに縁がない人も含め、すべての人にマーケット感覚は必要なのだということが、理解していただけたと思います。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "一村を救いうる方法は全国を救いうる。その原理は同じである」", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "天子から庶民にいたるまで、 人の第一の目的とすべきは生活を正すことにある＊。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "道と法とは別である。一方を他方とみなすことが多いが、それは誤っている。法は、時により、中国の聖賢によっても変わる。わが国に移されればなおさらである。しかし道は、永遠の始めから生じたものである。徳の名に先立って、道は知られていた。人間の出現する前に、宇宙は道をもっていた。人が消滅し、天地がたとえ無に帰した後でも、それは残りつづける。しかし法は、時代の必要にかなうように作られたものである。時と所が変わり、聖人の法も世に合わなくなると、道のもとをそこなう。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "言語が違っても、「サプライズ」があると人はドキドキします。 人種が違っても、「ギャップ」があると人は感動します。 地域が違っても、「赤裸裸」なものに人はひきこまれます。 国が違っても、「リピート」があれば記憶に残ります。 文化が違っても、「クライマックス」に注目します。 つまり、地球上の誰に対してでも、心を揺さぶることができるのです。現に、この本では他国の大統領や小説家のコトバを例に使っています。いよいよ、地球上に本格的なグローバル化がはじまっています。当たり前すぎて、グローバルというコトバさえもなくなるときがくるかもしれません。海外にいる友達やビジネスパートナーと話をしたり、メールをするときにもこの技術を使えば、誰の心だって動かすことができるのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "感謝は仏教やストア哲学の基本であり、聖書で教えられ、日本の茶道でも大切にされ、もちろん感謝祭の基本（であり名前の由来） でもある。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "しかし、多くの人が共感し興味を持つ物語の本質は、「純愛」「成長」「青春」「友情」など、いくつかに限られています。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "経験則でいえば、その人材の初めての変革型コミットメント期間は二年から五年ほどになる。この年数はほぼすべての組織や業界に当てはまる普遍的な期間のようだ。ソフトウェア業界では、二〜五年という期間は一般的な製品開発サイクルに合致するので、一人の社員が大きなプロジェクトを最初から最後まで経験できる。シリコンバレーで社員にストック・オプションを与える時に、通常四年間かけて付与（ヴェスト）する慣行もこのサイクルを反映している。一般消費財業界を見ても、プロクター・アンド・ギャンブル（Ｐ＆Ｇ）などの企業では、新しいブランド・マネジャーはまず、二〜四年間のコミットメント期間から始める。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 130, "label": "認知バイアス", "freq": 8, "highlights": [{"text": "世界を正しく眺めるために、そして世のなかのウソにだまされないために、ベーコンが 掲げた４つの「思い込み（彼はそれをイドラと呼びました）」を紹介します。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "人間のからだや脳のしくみなどからくる「人間の思い込み」。 　 自分の考えはすべて正しいと勘違いしてしまう「個人の思い込み」。 　 まわりの評判やうわさ話を鵜吞みにする「言葉の思い込み」。 　 そして、偉い人や有名な人の言うことを信じてしまう「権威の思い込み」。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "おそらく、森鷗外を支配していたのはこんな「思い込み」でしょう。ベーコンが指摘した「権威の思い込み（劇場のイドラ）」です。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "たとえば、ぼくが「Ｋさんはなんであんな人なんだろう」と思うときには、「Ｋさんはこうだろう」、「こうに違いない」といういくつもの推測がすでにあるのです。けれども、その基盤は自分が作ったものですからもともとどこにもない。つまり、われわれが日常行っている考える行為は、ほとんどが自問自答でどこへも向かわないわけです。何か新しいものを発見するために考えるのではなく、常に欲しい答えや結論が先にあって、必ずそれに合うように頭は巡っているということです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "われわれは言葉を使って考えますし、そのときには必ず結論が先行しているんです。すでにお話ししたように、実はその結論は、考えることから出た結論ではなくて、感情の力や存在の力からきている場合が多いんです。その結論に向かって考えは働きやすいんですね。ということは、自我というのは常に非自我と見がちな身体や感情の強い影響下にあるわけです。強い影響下にありながら、自己中心的に頭をどんどん働かせていくわけです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "ようするに、人は疎外されていると感じる痛みを自己調節しようとして、自らの認知能力を誤用する場合があるということだ。つまり、自分をこう見せたいという形に人生を脚色して、偽りのペルソナを作り出す。自己欺瞞としてよく知られる行為だ。必死にやれば、「私がそう言っているのだから、事実そうなのだ」と、自分に思い込ませられることがある。それでもなお、孤独感の生理的・心理的な影響は、害を及ぼさずにはおかない。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "狩猟採集民が草むらを動く影を見て、ライオンかもしれないと警戒すべきかどうか考えるのに統計データを調べていたら、あまり長生きはできず、正確さを何より重視しようという遺伝子は次の世代に伝わらない。ときには即断即決が重要だ。ダニエル・カーネマンも言うように、「システム１はわずかな証拠から結論に飛びつくようにできている（ 13）」", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}, {"text": "われわれは予想を立てるとき、なんらかの数字から出発し、調整する。その元となる数字をアンカー（ 錨）と言う。それが重要なのは、調整はどうしても控えめになるためだ。だからアンカーの設定が不正確だと、予測も不正確になりがちだ。しかもわれわれは驚くほど質の悪いアンカーを選びがちだ。", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}]}, {"id": 131, "label": "社会性", "freq": 8, "highlights": [{"text": "生物種としてのヒトにとっての最大の適応環境とは、おそらく群れ生活そのものにあると考えられます。自然環境に適応するための手段として群れを選んだ結果、今度は群れの中でどう生き残るかについての新たな適応問題が生じてきたわけです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "新皮質の大きさが、個体間で「戦術的なだまし」が見られる頻度とも直線的に関係することを示しました。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "以上の意味で、「人間の最大の味方は人間であるが、最大の敵も人間である」という言葉は、ヒトの生存形式の本質を捉えた極めて納得のできる言葉なのです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "それでも、私たちは実際、しばしば誰かを助けます。このように、いつ誰からともなく、回り回って援助が返ってくる(かもしれない) かたちでの「二者に閉じない助け合い」は、進化生物学で、間接互恵性(indirect reciprocity) と呼ばれます。間接互恵性は、チンパンジーやボノボなどのほかの霊長類を含め、ヒト以外の動物ではほとんど観察されていません。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "人間は進化過程の最初から、固有の身体的特性、人格特性、好き嫌いを備えた、それぞれ異なる個人だったが、同時に、私たちはいつも配偶者や子孫と密接につながり、また、拡大家族から種族、民族国家に至る、より大きな社会的集団の中で生活していた。「", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "ダライ・ラマは「人間は社会的動物であり、社会の一員としてしか生きられない」と語った。その声は今でも僕の耳の奥で響いている。 　そう。僕らは社会なしに生きていけない。", "book_title": "経営リーダーのための社会システム論～構造的問題と僕らの未来～", "author": "宮台 真司、野田 智義"}, {"text": "これは取りも直さず、人間には社会性が必要ということです。自分にとって前述のような相手が必要であると同時に、自分も誰かにとってそういう存在でなければいけません。いつも自分が主役、自分が先生という立場に居続けていると、脳に問題があっても気づけず、裸の王様になってしまいます。意欲を保ち続けることも難しいでしょう。時には脇役になったり、悪役になったり、生徒になったりすることがとても大切です。 　そのために、まず、人との出会いを大切にして下さい。そして、一度つくった人間関係を簡単には壊さないようにして下さい。それをする努力の中で、脳は自然と鍛えられていきます。 　いろいろな役者がそろった舞台の上で、自分もいろいろな役割を演じつつ活動をマルチにし、豊かな人生を送りましょう。それが脳にとっていちばん大切なことです。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}, {"text": "同性にモテることが大切なんじゃないでしょうか。異性にしか人気がない人は、本質的に問題あると思いますよ。そして、同性にモテるほうが、人生長く楽しいと思います。結果、異性にも長くモテるのではないでしょうかね。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 132, "label": "動機づけ", "freq": 8, "highlights": [{"text": "人を動かす秘訣は、この世に、ただ一つしかない。この事実に気づいている人は、はなはだ少ないように思われる。しかし、人を動かす秘訣は、間違いなく、一つしかないのである。すなわち、自ら動きたくなる気持ちを起こさせること──これが、秘訣だ。 　重ねて言うが、これ以外に秘訣はない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "アメリカの心理学者オーヴァストリート教授の名著『人間の行為を支配する力』に次のような言葉がある。 「人間の行動は、心の中の欲求から生まれる……だから、人を動かす最善の法は、まず、相手の心の中に強い欲求を起こさせることである。商売においても、家庭、学校においても、あるいは政治においても、人を動かそうとする者は、このことをよく覚えておく必要がある。これをやれる人は、万人の支持を得ることに成功し、やれない人は、一人の支持者を得ることにも失敗する」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を動かす原則❸　 強い欲求を起こさせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則⓬　 対抗意識を刺激する。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❻　 わずかなことでも惜しみなく心からほめる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❾　 喜んで協力させる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "Leadership of Hoshino Resort│#02 熱狂的ファンをつかむコンセプトを作る 競争力向上のカギは「自分たちで決める」 企業が活力を高めるためには、「社員の主体性」を引き出す必要がある。 そのカギは、仕事に対する共感や納得感である。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "そこには「あなたのご主人（あるいは、奥さん、息子さん、娘さん）の働きは、キヤノン電子にこれだけの貢献をしてくれています。これはそのお礼の品です」という手紙を添えた。これによって、社員が家族にも尊敬され、さらに仕事に精を出してくるという好循環も生まれた。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}]}, {"id": 133, "label": "相互利益", "freq": 8, "highlights": [{"text": "人を変える必要が生じた場合、次の事項を考えてみるべきだ。 　一、誠実であれ。守れない約束はするな。自分の利益は忘れ、相手の利益だけを考えよ。 　二、相手に期待する協力は何か、明確に把握せよ。 　三、相手の身になれ。相手の真の望みは何か？ 　四、あなたに協力すれば相手にどんな利益があるか？ 　五、望みどおりの利益を相手に与えよ。 　六、人に物を頼む場合、その頼みが相手の利益にもなると気づくように話せ。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "「ノー」を「イエス」に変える技術の答えは、相手の中にあります。 ここまで読み進めていただくうちに、気づいた方もいらっしゃると思います。「お願い」は、あなたのコトバではなく、あなたと相手の共作 なのです。あなたのハッピーと相手のハッピーをいっしょにつくりあげることなのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "たとえば、リード・ホフマンはリンクトインの創業当初、才能ある社員にストレートにもちかけた。相手が二〜四年のコミットメント期間に参加し、リンクトインの事業に大きな貢献をしてくれたら、ホフマンおよび同社は、彼らのキャリアアップに力を貸そう——そのキャリアアップが、リンクトイン社内における次のコミットメント期間になることを望みつつ——という条件である。このやり方はうまくいった。会社側は、リンクトインのために目に見える成果を上げようとする熱心な社員を獲得できた。さらにその社員が、一回または複数回のコミットメント期間を経て同社を去った後も、リンクトインのよさをあちこちで喧伝したり、会社にプラス効果をもたらしたりし続けてくれるケースが少なくなかった。社員側も、自分のスキルと経験を高めることでキャリアをガラリと一変できた。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "ここで注目してほしいのは、グルテキンの任務内容が、社員側と会社側の双方のニーズに役立つものでなければならなかった点だ。グルテキンとリンクトインには、双方にメリット（グルテキンにはより包括的なスキルセット、リンクトインには新鮮な視点）をもたらすであろう相互投資（営業への異動）を約束し合えるだけの相互信頼があった。だから、強固なアライアンスが実現しているのである。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "そしてコーラーが見たこともないような独特の「コミットメント期間」を用意して、マッキンゼーにいたコーラーを口説いたのである。それは、ホフマンの右腕として働く、という内容だった。この役割ならＣＥＯから直接学び、会社のすべての部門を非常に広く見ることができるだろう。その見返りとしてコーラーは、肩書きやキャリアパスといった昔ながらの形式とは関係なく、リンクトインの事業を軌道に乗せるためなら何でもする、という決意を表明した。この任務をきちんと完了できれば、コーラーは「リンクトイン」と「リード・ホフマン」という二つのブランドを自分個人の職務経歴書に加えることになる。こうして、ベンチャーキャピタリストになるというコーラーの最終目標は、リンクトインの中では実現しないことがわかっているにもかかわらず、彼とホフマンはお互いの展望と利害を、期間限定で一致させることができたのである。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "アライアンスの合意書 はじめに 私の部署にようこそ。 私は、私たちの関係を、双方に役立つような「アライアンス関係」だと考えています。 この「アライアンスの合意書」を使って、お互いに相手に期待することを具体的に、明確にしましょう。相手に、そしてお互いの関係に、安心して時間と労力を投資できるようにするのです。 あなたには、当社を変革するような貢献を期待しています。 私と当社はあなたの市場価値を高め、（願わくば当社内において）あなたのキャリアを変革するサポートをしなければなりません。 当社はあなたに終身雇用を約束しませんし、あなたも現役引退まで当社に留まるとは約束しません。そのうえで私たちは、この雇用関係が終わった後でも続くような、長期にわたるアライアンス関係を保つために努力します。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第３条 ネットワーク情報収集力 ［原則］ あなたが仕事で培う人脈は、あなたとあなたのキャリアにとっても、私と当社にとっても、価値ある資産です。 仕事上の課題を解決するためには、知識や知見が欠かせません。人は、社内・社外を問わず、貴重な資源です。 当社と私は、あなたが自分の人脈を築き、維持するための時間を差し上げます。そのかわり、自分のコミットメント目標を達成し、当社に成功をもたらすためにその人脈を役立ててください。 〈期待水準〉 私は、何が「非公開かつ社外秘でない情報」にあたるのかを明確に示します。あなたは、それをご自身の人脈ネットワーク上で伝えてもかまいません。 リンクトインやツイッターなどのソーシャルメディア上であなたが活発に活動し、人々の目につきやすい存在となるために、遠慮なく会社の備品（コンピュータやスマートフォンなど）を使って勤務時間内に仕事上のソーシャル・ネットワークを広げてください。なお、このことをわざわざはっきりと公表する必要もありません。 仕事上のネットワーク構築に役立つとあなたが判断するのであれば、どのようなイベントや会議、会員組織であっても出席費や会費として総額《具体的金額》までは経費として自由に使ってください。…", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第３条 ネットワーク情報収集力 ［原則］ あなたが仕事で培う人脈は、あなたとあなたのキャリアにとっても、私と当社にとっても、価値ある資産です。 仕事上の課題を解決するためには、知識や知見が欠かせません。人は、社内・社外を問わず、貴重な資源です。 当社と私は、あなたが自分の人脈を築き、維持するための時間を差し上げます。そのかわり、自分のコミットメント目標を達成し、当社に成功をもたらすためにその人脈を役立ててください。 〈期待水準〉 私は、何が「非公開かつ社外秘でない情報」にあたるのかを明確に示します。あなたは、それをご自身の人脈ネットワーク上で伝えてもかまいません。 リンクトインやツイッターなどのソーシャルメディア上であなたが活発に活動し、人々の目につきやすい存在となるために、遠慮なく会社の備品（コンピュータやスマートフォンなど）を使って勤務時間内に仕事上のソーシャル・ネットワークを広げてください。なお、このことをわざわざはっきりと公表する必要もありません。 仕事上のネットワーク構築に役立つとあなたが判断するのであれば、どのようなイベントや会議、会員組織であっても出席費や会費として総額《具体的金額》までは経費として自由に使ってください。...", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 134, "label": "自立", "freq": 8, "highlights": [{"text": "自分の油で明かりを燃やせるようになるまで、勉強をあきらめました。 　こうして翌春、尊徳は、川岸のわずかな空き地を開墾して、アブラナの種を蒔き、休日をあげて自分の作物の栽培にいそしみました。一年が過ぎ、大きな袋一杯の 菜種 を手にしました。自分の手でえた収穫であります。誠実な労働の報酬として「自然」から授かったものであります。尊徳は、この菜種を近くの油屋へ持参し、油数升と交換しました。尊徳は今や、伯父のものによることなく、勉強を再開できると考え、言いようのない嬉しさを感じていました。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "金銭を下付したり、税を免除する方法では、この困窮を救えないでしょう。まことに救済する秘訣は、彼らに与える金銭的援助をことごとく断ち切ることです。かような援助は、貪欲と怠け癖を引き起こし、しばしば人々の間に争いを起こすもとです。 荒地は荒地自身のもつ資力によって開発されなければならず、 貧困は自力で立ち直らせなくてはなりません。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "なぜそう答えを急ぐのです？　 答えとは、誰かに教えてもらうものではなく、自らの手で導き出していくべきもの です。他者から与えられた答えはしょせん対症療法にすぎず、なんの価値もありません。 たとえばソクラテスは、自身の手による著作は１冊も残しませんでした。彼はひたすらアテナイの人々、特に若者たちと路上での議論を重ね、その哲学を著作という形で後世に残したのは弟子のプラトンです。そしてアドラーもまた、著述活動にほとんど関心を示さず、ウィーンのカフェで人々と対話したり、小さなディスカッショングループで議論することを好んだ人物でした。決して 肘掛け椅子に座る知識人ではなかったのです。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "行動面の目標は「自立すること」と「社会と調和して暮らせること」の２つ。そしてこの行動を支える心理面の目標が「わたしには能力がある」という意識、それから「人々はわたしの仲間である」という意識です。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "ユダヤ教の教えに、こんな言葉があります。「自分が自分のために自分の人生を生きていないのであれば、いったい誰が自分のために生きてくれるだろうか」と。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "片田先生のメッセージは、行政への依存をやめて自立せよということ。行政は、限られた範囲で情報を収集し、行政コストを考えた上で想定ラインを設定します。そんな想定ラインを個人が信じるべきどんな謂われもありません。自分の身体感覚と判断を研ぎ澄ませて対処しなければ非常時を生き延びることはできません。米国草の根右翼クリント・イーストウッドではありませんが、「最後は自分たちしか頼りにならない」という自立が大切です。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "欧州はチェルノブイリ原発事故を機に、食とエネルギーをシステムに過剰に 委ねるのをやめ、スローフード化と自然エネルギー化が進みました。 　いまでは株式時価総額ランキングに１兆円を超える自然エネルギー企業が４社あります（日本企業は皆無）。独占的電力会社を頼るから 滑稽 な計画停電になりました。電力を特定電力会社から買うしかない社会は変です。そのことを指摘するマスコミがあったでしょうか。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "「神に頼るとはなんたることだ。自らの力で自らを助けたまえ」 　この言葉こそ、ベートーベンにとって芸術家としての生涯を通じた座右の銘となっていたのである。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 135, "label": "教育論", "freq": 8, "highlights": [{"text": "いま日本では経済エリートが哲学を持てるかどうかが問われていると思うんです。金になればいい、儲かれば国はよくなる、という新自由主義的な考えはすでに限界が見えた。国家のために、損を承知であえてひとつの道を選択する知恵を財界も政界も持つ時期が来ているのではないでしょうか。 　ですからいまは政治に期待するよりも、間接的なんだけど、むしろ財界に期待したい。例えば、インテリジェンス分野の人材養成に金を出してもらう。人材をつくるのは今は大学しかないと思うんです。早稲田、慶應、東大、東京外大、どこでもいいから、きちんと金をつけてインテリジェンス講座をつくれば、五年で状況は相当変わりますよ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "大学でオンライン授業が始まったとき、僕が最初に言ったのは、教室は全然パブリックなところじゃないということです。パブリックじゃないからこそ好きなことが言えるし、間違ってもいい。その閉鎖性は教室の自由を確保するために大切なことであるわけです。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "でも、パッケージングしたほうがいいという人たちがいるのは、まさにそれも潜在していたものの表面化ですよね。大学をそういうコンテンツ産業として取り扱いたい人っているわけです。ものを考えることに目覚めてない学生もそれでいいと思っているし、なんなら倍速で見たほうが効率的だというわけです。でも、そうじゃないということに、実際に現場で気づいていく空間が大学なわけですから。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "『勉強の哲学』ではそれを「教師の有限性」に触れることなんだと言っています。その有限性から学ぶんですよね。教師の有限性と自分の有限性を照らし合わせたところで何かが起こることが主体化だから。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "講義というのは内容の伝達であると同時に、そうした理解の仕方という思想のレベルでのコミュニケーションであって、それを通じて教師も学生も成長していくわけですよね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "一番の問題は、教育の目的を誰も胸を張って言えなくなったことでしょうか。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "ちゃんと学校に行っても、あとで何もいいことがないことをみんな、知っています。 　今、学校へ行っている人の動機は、「みんなが行ってるから」しかあり得ません。その「みんなと同じことをする」という近代最後の価値観さえも、マスメディアヘの不信によって崩れつつあります。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "しかし現代は、モノ不足でモノそのものに関心がいかず、科学よりも精神世界や人間関係に興味がいく世界です。これら「産業社会用カリキュラム」は、すっかり的外れになってしまいました。 　だからこそ、高校や大学を卒業してから、またアニメーションスクールやデザイン学校といった芸術系の専門学校に入り直す人が、大勢出てしまうのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 136, "label": "現代論", "freq": 8, "highlights": [{"text": "そうです。ハッキリ言えば「動物化」。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "二〇世紀には人間が言語に規定された存在であるというのは哲学的な前提だった。言語は人間がそこから抜け出せないくびきとすら考えられていた。けれども、現代ではむしろ言語のほうが退却してそのくびきから解放されてしまった感がある。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "情動的表現が前面に出てくると、解釈が必要な言語は邪魔なわけですよね。もっと直接に情動を表現できる絵文字、エモティコンが幅を利かすようになる。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "ＬＩＮＥやWhatsAppでわかったのは、日常のコミュニケーションにはスタンプや絵文字などのエモティコンだけで十分だったということでしょう。それは尻尾を振って喜びを表現するタイプのコミュニケーションに近づいている。そして、以前も話した通り、それと並行してメタファーや無意識の弱体化が起こっている。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "いまはインピュタビリティが過剰になって、それを避けることにみんな一生懸命だから、レスポンシビリティが内から湧き起こってくる余裕がないという状態ではないか。レスポンシビリティはまさに中動態的なもので、「俺が悪かった」とか、「俺がこれをなんとかしなきゃ」とか、ある状況にレスポンドしようという気持ちですね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "これは月並みな指摘だけど、インターネットが出てきて、どこの空間も瞬時につなげるようになってしまって、距離がなくなってしまったわけですね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "移動する時間がなくなることだからね。昔は、ある場所からある場所に行くのに時間がかかった。ところが、空間が瞬時に結びつけられるようになったことで空間の多元性がなくなり、時間もなくなっていき、すべてが瞬時的なものになってしまった。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "でも、パッケージングしたほうがいいという人たちがいるのは、まさにそれも潜在していたものの表面化ですよね。大学をそういうコンテンツ産業として取り扱いたい人っているわけです。ものを考えることに目覚めてない学生もそれでいいと思っているし、なんなら倍速で見たほうが効率的だというわけです。でも、そうじゃないということに、実際に現場で気づいていく空間が大学なわけですから。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 137, "label": "専門化", "freq": 7, "highlights": [{"text": "とは言え、科学と科学技術が圧倒的に発達してしまった昨今、「わかる」ことが問題となる世界は、より細分化され、専門化されすぎてしまいました。よほどそのことに精通した専門家でないかぎり、本当の意味で「わかる」ことはもはや不可能なのかもしれません。そんな状況のなかで概念を共有しようとするなら、むしろ「納得する・しない」ということを問題にする方がよいでしょう。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "ひと言でいえば、科学はきわめて良好に機能しているのだ。だが大陸や人体の構造のある部分を発見できる回数が限られているのと同様、進化の法則や超新星や熱力学を発見できるのも、たった一回きりなのである（＊", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "私はレシュナーに、各専門分野内部での科学的発見の将来についてどう思うか訊いてみた（＊ 12）。 「専門分野別の科学はもう死んだ」と彼は一蹴した。「そんなものは、もう存在しませんよ」。レシュナーによれば、そう断言できる根拠はどんどん増えているという。「主要な科学の進歩には、複数の分野が関わっている。著者が一人だけという論文は最近ではめったにないし、著者が複数の場合、それぞれが違う分野の研究者であることが多い」と彼は話す。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "つまり交差的アイデアを生み出したければ、時間をかけて異なる分野でさまざまなプロジェクトに関わることが有益だということになる。残念ながら、ほとんどの組織はそうしたシステムになっておらず、職の多様化を実現するのはなかなかむずかしい。企業とは通常、個々の従業員に最適な職務を見つけようとするものだからだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "もし職務の実行を最優先し、小刻みなイノベーションを一定の方向性をもって積み上げていくことを目的にするなら、専門化という方法は間違っていない。しかし、それまでにない新鮮で画期的なアイデアを生み出したかったら、個々人の体験の多様化を進めることこそが必要である。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "プロセスは、特定の業務に対応するために定義され、事実上の進化を遂げる。このため、ある業務のために作られたプロセスを使って、それを実行した場合は効率よく達成できるが、同じプロセスをまったく別の業務に適用すると、遅くて効率が悪く、役所仕事のようになることが多い。つまり、ある仕事を遂行する 能力 を定義するプロセスが、ほかの仕事については 無能力 を明らかにする。すぐれた経営者が各組織の目的を絞ろうとするのは、プロセスと仕事を連携しやすいからである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "そのときに彼が言っていて興味深かったのが、「脳が変化してしまう」という話。 40 年間、毎日「直感力」だけを使いつづけた結果（自分と違って、すべて直感のみでデザインするらしい）、それ以外の思考能力がまったくなくなってしまったそうです。完全に脳がフォーマット化されてしまった、と。 彼いわく、脳の形状も物理的に変化するそうなんです。そこでピンときたのが、その数時間前までエルメス本社で行っていたデザインコンペの審査作業中に、同社のアーティスティック・ディレクターであるピエール・アレクシス・デュマさんがおっしゃっていたこと。 蜂の脳は容量が限られているため、兵士や偵察、運搬係など、その役割が変わるたびに脳自体の仕様も変化してしまうそうです。 もし２人の「脳が変化する」という話が本当だとしたら、 脳ってやっぱり筋肉と似ている気がします。\n\n脳の可塑性", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}]}, {"id": 138, "label": "脳科学", "freq": 7, "highlights": [{"text": "本書でたびたび述べるように、人生とは、脳のなかの内部モデルの蓄積そのものです。脳の働きが止まってしまったら、それがホモ・サピエンスとしての人生の終わりを意味するということです。それ以後の人生は、私には考えられません。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "遊びは脳の柔軟性と順応性を高め、創造的にしてくれます」と彼は言う。「遊びほど脳を奮い立たせる行動はほかにありません（ ３）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "最近の研究によると、これはストレスが脳に影響を与えるためらしい。ストレスによって感情をつかさどる部分（扁桃体）の働きが強くなり、認知機能をつかさどる部分（海馬）の働きが弱くなるのだ（ ７）。その結果、うまくものを考えられなくなってしまう。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "新皮質の大きさが、個体間で「戦術的なだまし」が見られる頻度とも直線的に関係することを示しました。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "このように、男性同性愛者が男に惹かれるのは、一つには男の性フェロモン、ＡＮＤに対し脳の視床下部が実際に興奮しているからである。男に対し、本当に性的に興奮しているということが、脳を調べることで証明されたのである。 　女性同性愛者の場合も同様で、女の性フェロモン（と言っても差し支えないことが、この研究によってわかった）、ＥＳＴに脳の視床下部が興奮する。女に対し、本当に性的に興奮していることが、やはり脳のレヴェルで証明されたのである。", "book_title": "同性愛の謎　なぜクラスに一人いるのか (文春新書)", "author": "竹内 久美子"}, {"text": "社会としても個人としても、私たちは快楽を手に入れ、かつそれをコントロールすることに全力を傾けている。その努力の中心にあるのが、私たちの脳の奥深くに潜むこの快感回路なのである。", "book_title": "快感回路　なぜ気持ちいいのか　なぜやめられないのか (河出文庫)", "author": "デイヴィッド・Ｊ・リンデン、岩坂彰"}, {"text": "その中で、人間が生きる上で避けることができない「偶有性」の問題という大きなテーマにも出会った。完全に秩序がないわけでもない。かといって、十分に予想することができるというわけでもない。規則性とランダム性が入り混じった「偶有性」という状況に対して脳がどのように対応するか。ここには、私たち人間の脳を考える上での本質的な問題が横たわっていると考えるに至った。 　最も大きな問題は、クオリアと偶有性がどのように結び付くかである。数学者の藤原正彦さんの美しい 比喩 をお借りすれば、「クオリア」と「偶有性」は、今のところ二つの独立した山容のように私たちの前に現れている。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}]}, {"id": 139, "label": "想像力", "freq": 7, "highlights": [{"text": "ちなみに私が「見えない世界」をさかんに強調するのも、大航海時代を実現させた要因に、「磁力」の解明があるからです。航海術の進歩につながった「方位」「方角」といった概念は、「地球が１つの巨大な磁石である」という、目には見えないけれど事実ではある事象をはっきりと認識したことで生まれました。 　そこに必要なのは、地球が１つの巨大な磁石であると考える豊かな想像力であり、その想像力こそが、進歩を可能にする一番の原動力なのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "私たちは教育のファストフード化を容認してきました。その結果、まるでファストフードが体をむしばむように、教育が精神を弱らせることになってしまいました。……あらゆる偉業は、想像力から生まれます。ところが現代の教育システムは、まさにその想像力を奪いつづけているのです（ ２）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "「ユーザーは、必ず作り手の想像を超える」", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "だから、これは 想像力の問題 なのです。 　想像力が無ければ、贈与に関して認知的に失敗する。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "しかし、ずっと気づかれることのない贈与はそもそも贈与として存在しません。 　だから、贈与はいつかどこかで「気づいてもらう」必要があります。 　あれは贈与 だった と 過去時制によって把握される贈与 こそ、贈与の名にふさわしい。 　だから、僕らは受取人としての想像力を発揮するしかない。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "だから、そこには 想像力 が要請されます。 　贈与は差出人に 倫理 を要求し、受取人に 知性 を要求する。 　これは本書の贈与論において、決定的に重要な主張です。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "他方で、ルソーの言う「憐れみ」はいっさい言語的なものではありません。けれども、だからこそ力強く、正義とはなにか、人権とはなにかといった解釈論争を止め、目のまえの不正義に対応することができます。現代の哲学者では、ぼくの知るかぎり、アメリカのプラグマティスト、リチャード・ローティが──彼自身はルソーをまったく引用していないのですが──同じようなことを主張しています。彼は『偶然性・アイロニー・連帯』（ 岩波書店）という本のなかで、人間の連帯で重要なのは理念の共有ではなく、「あなたも苦しんでいるのですか」という想像力に基づいた問いかけだと述べています。これはとても重要な指摘です。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}]}, {"id": 140, "label": "論理思考", "freq": 7, "highlights": [{"text": "１つの例ですが、同様のことは、さまざまな局面で考えられるでしょう。繰り返しになりますが、経験＝見える世界だけに縛られ、進歩をこばむ生き方から我々人類が脱却するには、好むと好まざるとにかかわらず、論理・推論・演繹（数学）的思考を身につけることが絶対条件と言ってもいいでしょう。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "いずれＡＩは人間の思考能力を 凌駕 するが（すでにチェスや将棋でコンピュータは人間に勝利している！）、越えられるのは論理的思考や演算能力の部分であり、精神の奥深いところまではなかなか追いつけないこともあるだろう。となると、人間がロボットに対して優位を保てるのは人のココロや精神性を扱う分野しかない。 21 世紀後半には、精神世界に精通したセラピストや宗教家が、子どもたちの人気職業になっているだろう。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "もし、かつてとは逆の立場で、いまスタッフからこうした企画が出されたとすれば、「データは？」「ファクトは？」と問い詰めるのは間違いありません。 感覚だけで進めようとしている数字のない企画は絶対に認めない のがいまの私です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "また、例えば、経営の世界においても、 　京セラ名誉会長の稲盛和夫氏が、 「狂の世界」の大切さを述べています。 　すなわち、技術開発においても、 　狂人のごとく、考えて、考えて、考え抜き、 「人事を尽くした」とでも言うべき精神状態のなかで 　革新的なブレークスルーが生じるのです。 　このように、もし、我々が、 　論理的に考えて、考えて、考え抜くことによって 「論理を究める」ことができるならば、 　その極限において、必ず、直観力や洞察力、大局観の世界が開けます。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "すなわち、直観力や洞察力、大局観とは、 「感覚を磨く」ことによってではなく、むしろ、 「論理を究める」ことによって身につけることができるのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "「徹底して考え抜く」ことによって「論理を究める」ことができ、 　そして、不思議なことに、「論理を究める」ことによって 「論理を超えた世界」へと突き抜けていくことができるのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "自分がなぜその手を打つのか、説明できないことも多い。ただそれが正しいということがわかるし、そういう直観はたいてい正しい。一つの駒の配置を一時間も吟味したら、堂々巡りになって有効な手は思いつかないだろう。たいてい打つべき手は一〇秒でわかる。それ以降の持ち時間は確認に使っている（ 23）」。カールセンは自分の直観を尊重しており、それ自体とても正しいことだが、同時に「確認」に長い時間を費やす。ときには直観が誤ることもあり、意識的に考えることで最終的な判断の質が高まることを知っているからだ。", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}]}, {"id": 141, "label": "進化", "freq": 7, "highlights": [{"text": "宇宙、地球、生命の歴史を解読してわかったのは、それらの歴史に共通している点として、「分化」する方向に進んでいるということです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "地球も、生まれたばかりの頃は熱い火の玉でドロドロに溶けていました。それが冷えて現在の状態となります。地球が冷える過程で、水蒸気大気から海が生まれ、残ったガスは大気となり、マグマの海から地殻とマントルが生まれ、鉄ニッケル合金が沈んでコアが生まれるなど、異なる物質圏に分かれました。これも分化と呼ばれます。 　生命も、もとは１個の原始的な単細胞でした。それが何十億年もかけて、多くの真核細胞からなる多様な生命に進化してきました。この過程も分化と呼ばれます。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "まず、ヒトの社会行動や心の働きが、ほかの動物たちと比較したときに、どう位置づけられるのかを概観します。ここまでは生物種であるヒトに関わる議論です。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "逆に言えば、私たちの脳はコミュニケーションの力を発達させるように進化してきたのです。 　いま、確実に言えることは、 コミュニケーションがうまくできない人はこれからの人工知能時代では生きにくい という点です。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "だからこそ、これから 人工知能の登場によって、私たち人間の生き方が問われる 時代になるということです。または、人工知能の登場によって、私たちの生き方そのものが進化していくということです。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "私たちが何かをしようとするとき、その動機づけの鍵となるのは快感である。たとえば学習に際しては、快感が中心的な役割を果たす。そもそも人類が生存し、遺伝物質を次世代に伝えていくためには、食べ物、水、セックスが〈報酬〉的なものと感じられなければならない。", "book_title": "快感回路　なぜ気持ちいいのか　なぜやめられないのか (河出文庫)", "author": "デイヴィッド・Ｊ・リンデン、岩坂彰"}, {"text": "狩猟採集民が草むらを動く影を見て、ライオンかもしれないと警戒すべきかどうか考えるのに統計データを調べていたら、あまり長生きはできず、正確さを何より重視しようという遺伝子は次の世代に伝わらない。ときには即断即決が重要だ。ダニエル・カーネマンも言うように、「システム１はわずかな証拠から結論に飛びつくようにできている（ 13）」", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}]}, {"id": 142, "label": "生と死", "freq": 7, "highlights": [{"text": "すでに 21 世紀初頭の音楽がダウンロードになって、ライブやフェスの価値があがったように、人として「生」の価値は高まるだろう。さらには、新しい死生観を伴った宗教や哲学も 流行ると思われる。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "生存だけが価値として認められるようになってしまうことの問題です。それを説明するためにアガンベンは、「 剝 き出しの生 nuda vita / bare life」という概念を持ち出しています。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "アガンベンは人間が生きるということと、人間がただ生存しているということを区別しているのです。その上で、ただ生存するということを何よりも最優先するのならば、人間が生きていると言えるために必要な何かが蔑ろにされはしないかと指摘しているのです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "死者が葬儀の権利をもたないと指摘されています。これは、コロナ危機の中で死者が葬儀を経ることなく埋葬されていった事態を指しています。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "アガンベンは死者の権利について考え、死者にも権利があるのではないかと問題提起している。権利は決して生きている者だけが浴することのできる特権ではない、と。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "二〇世紀を経験した我々は、人間が大義とみなされたもののために死ぬことを強制された事実を知っています。それには何としてでも対抗しなければならない。そんなことがあってはなりません。けれども、だからといって、生存のみを価値として認める社会が当然のこととして受け入れられてしまってよいのか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "ある意味では、哲学の出発点には死刑がある、ソクラテスの死刑の衝撃によって哲学は始まった、", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}]}, {"id": 143, "label": "身体性", "freq": 7, "highlights": [{"text": "デジタル社会への反動から始まった身体性回帰のカルチャーを「モダーン・プリミティブ」という。未開部族の風習だったタトゥーやピアスが、その代表例だ。 21 世紀は、モダーン・プリミティブを実現する手段がデジタル化して、「デジタル・モダーン・プリミティブ」になる", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "それは、富と名声を手にした 成功者の究極の自己啓発として、「身体性の向上」が挙げられる ということ。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "・知識や教養、肩書きや組織に依存しない ・不特定多数の人と自由にコミュニケーションする ・「身体性」を向上させる", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "だがじつは、精神 も 物質であり、肉体との相互作用が頭部にしか起きない精神活動はほとんどない（４）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "インテリジェンスの世界で信頼関係をつくる方法は三つあると思うんです。ひとつは一緒に女遊びをすること。もうひとつは一緒に糞をするとか、排泄行為をする。ロシアではサウナからよく見える野外で一緒に野糞をしたりします。それから一緒に食事をすることですね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "顔のパーツが、真ん中に集中している女性は、人のエネルギーを「吸う」力が強いので、一緒にいる人は下がってしまいます。いわゆるエネルギーヴァンパイアと呼ばれる人々。", "book_title": "黒本", "author": "高城剛"}, {"text": "どうやら、ゲイにはその時代によって異なる「目に見えないなにか」を察知する能力がある、というのが、その調査結果でした。身体的には脳幹の太さが異なるなどとも言われていますが、これはまだ確かではありません。ですが、「別の能力」を持っていることは確かだと僕は思っています。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 144, "label": "個人主義", "freq": 7, "highlights": [{"text": "リバタリアン急増の背景にあるのは、行き過ぎた（主には企業のための）グローバリゼーションと社会保障費の増大であり、社会保障費の負担は今後増えることはあっても減ることはないからだ。リバタリアンは、たとえ国家が破綻しても、リバタリアンであることを望む。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "だから、あくまでもその人それぞれがやれることをすればよいのであって、「絆」や「がんばろう」というような言葉を、むやみやたらに強調しなくてもいいのではないかと考えているんです。 　あくまでも人は自由だから、絆の外にいる人、がんばらない人がいてもいいし、それを「間違った考えをするな！　間違ったことをするな！」「それでもお前は日本人か！」「人でなし！」と説教や強要をするのは好ましくない。現実には、他人を心配することができないくらいに余裕がない人だってたくさんいるし、関心があまりない人がいるっていうことも認めないといけない。でもそこで、間違ってもその人たちをけなしたり、非難したりしてはいけないんじゃないかな、というのが僕の考えなんです。", "book_title": "ひとりぼっちを笑うな (角川oneテーマ21)", "author": "蛭子 能収"}, {"text": "とにかく僕、蛭子能収は、誰かに束縛されたり、自由を脅かされることがなによりも大嫌い。誰もが自由に意見できる世の中こそが、一番いいと思っているから。人は、自由でいることが一番いいと思う。もっと言えば、自由であるべきだとも思っている。 　そのためには〝群れ〟のなかに、自分の身を置いてはいけません。なぜかって？　それは、無言の圧力を感じるのは、その人が〝群れ〟の一員でいるからです。", "book_title": "ひとりぼっちを笑うな (角川oneテーマ21)", "author": "蛭子 能収"}, {"text": "周囲の目ばかり気にしたり、仲間同士で群れたがるのは、自分というものがない 証 といえます。そんなつもりがなくても、いつも集団にいると、グループのやり方、グループの総意、グループの行動に少しずつ影響されていきます。 　しかし、エースの第一条件である「自己確立」ができている人はまず群れません。仲間と必要以上になれ合うことなく、つねに自分として行動するのはエースに共通する特長です。 少なくとも必ず「ひとり時間」を知らず知らず設けているのです。 　この「ひとり時間」というのが、自己を確立していくうえで非常に重要な「時間の使い方」なのです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "この安定と豊かさの担い手であるという自負のもと、当時の都市中間層は、農業従事者や自営業者と比べて所得補捉率が高いことを大きな不満としていた（所得補捉率がサラリーマン９、自営業者６、農家４の割合であることから「クロヨン」と呼ばれた）。この不満を原動力として、中曽根内閣は自民党の「包括政党化」を進めていく。すなわち、それまでの農業従事者や自営業などといった特定の社会層に依存せず、しばしば 紐帯 を欠いて個人主義的なライフスタイルを好む都市住民層からの支持を広げる戦略を進めようとしたのである。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "中曽根に見るヘゲモニー戦略をまとめるならば、次のようになるだろう。まず、社会の変化（オイルショックによる伝統的産業基盤の変化と都市化による個人主義化）によって、それまで自民党が依存していた特定の票田が過少かつ先細りになる。このような状況を乗り越えるためには、それまでのような利益誘導型の政治ではなく、わかりやすいシンボルや目標を提示し、有権者を動員する政治が必要になってくる。その一環として出てきたのが、政治主導による「民営化」や間接税構想であったのである。 　現代において、政治は多かれ少なかれ、ポピュリズム的たらざるを得ない。それは歴史や伝統によって支えられていた社会のなかで人々の結びつきが崩壊し、もはや生産関係からなる社会関係に忠誠心を持たない人々の支持を集めるためには、不可欠の政治スタイルであるからだ。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "社会に出て、子どもを育てている期間までを〝Path of Hero（英雄の道）〟と呼ぶこともあります。なぜ「英雄の道」かというのは単純で、自分は他者とは違うんだという非常にヒロイックな考えが背景にあります。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}]}, {"id": 145, "label": "儒教", "freq": 7, "highlights": [{"text": "儒教には、上に忠節を尽くすことを重視する朱子学と、観念より実践を重視する陽明学がある。朱子学はトップダウン型、陽明学はボトムアップ型といえる。日本では朱子学と陽明学が交互に流行してきた。この流れを押さえると、日本の行く末が見えてくる", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "江戸時代に入ると、儒学の一派である 朱子学 や 陽明学 の理論をもって仏教を排除しようとする 儒家神道が台頭した。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "江戸時代を通じて、武家層を中心として儒教は日本に定着し、やがて 尊皇攘夷 思想と結びついて、明治維新への原動力のひとつとなった。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "このように、日本の古代王朝は儒教を積極的に取り入れていた。仏教を理念に掲げていたとすれば、儒教はじっさいの政治の場で生かされていたといえる。 　さらに、六四五年の大化の改新の後、日本は本格的な 律令 制度を目指していくが、そこにも儒教の理念が多くふくまれていた。天皇が自分の土地を人民に授ける「 班田収授法」などは、儒教的な発想をうかがわせるいい例である。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "中国に仏教が伝わったのは一世紀頃のことだが、当時、中国では、儒教と 道教 が広く信じられていた。儒教は、孔子の思想を基礎とし、礼節と忠義を説く統治者側からの宗教ということができる。それにたいして、庶民の側に立った宗教が道教だった。 　道教は、中国民族の 土着 的・伝統的宗教を背景とし、老子と荘子の考えも加えた、民衆生活の理想を説く宗教といえる。民衆は、宗教に 現世利益 を求めるものだが、道教の指導者は、民衆の幸福に生きたいという願望にこたえ、さまざまな 方術（呪術）をおこなった。その点からも、道教は民衆の人気を集めた。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "また、儒教は、天を 敬い、祖先を崇拝し、「仁」にもとづいて道徳的秩序を保ちなさいと説く。「仁」というのは、ひと言でいえば「人を愛すること」で、自己中心的にならず、他者に「忠」（真心）と「 恕」（思いやり）をもって接することを指す。 　つまり、儒教では、 高次 の愛である「仁」を強調し、現実世界の価値観を超えた理想世界について語られているのだ。 　また、「仁」にもとづいておこなわれる政治（＝「王道」）を理想とし、武力を用いて国を治める「覇道」や、法にもとづく「 法治主義」の上に置く。こうした理想世界を説いている点も、儒教を宗教とするひとつの根拠になるだろう。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "儒教には、とかく四角四面の倫理道徳という印象がついてまわる。古い家族制度を支える思想だとか、 忠君愛国の思想としてとらえられ、封建イデオロギーの代名詞のようにみられてきた。事実、歴史を振り返ると、儒教（というよりも儒学）は、支配者にとって都合のよい理論として扱われてきた経緯がある。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}]}, {"id": 146, "label": "関係性", "freq": 7, "highlights": [{"text": "実際のところ、トラスト・バッテリーは、それまでに起こったあらゆる相互作用の縮図だ。バッテリーを再チャージしたければ、いままでとはちがうことをしなければならない。新たな行動と新たな態度だけがチャージにカウントされる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "冊まるごとファンベースの塊みたいな本『グレイトフル・デッドにマーケティングを学ぶ』（デイヴィッド・ミーアマン・スコット／ブライアン・ハリガン著・日経ＢＰ社） の第一〇章 160 ページに、こんな一節がある。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "そして四番めの関係性のエネルギー源を、ぼくは「別れ」だと思っています。なぜなら、できあがって固定してしまったみずからの関係性を断ち切るには別れるしかないからです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "ぼくのワークショップに出ると離婚率が高くなるのは、そこで出会うからなんですよ。なぜなら、出会っていない夫婦だから別れられないんです。ですから、離婚しようという決意をしたときに、まず出会う努力から始まるんですね。出会わないと別れられませんから、そこで初めて出会うことになるわけです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "本当にロイヤルティの高い顧客は「いつも、必ずしも」金銭的メリットだけを求めているわけではない。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "少子化の一方で、空前のペット社会ができつつあるのだ。そうした〝ペット〟と〝リゾート〟の間に、私は強い連関を感じる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "・「承認欲求」＝有名／人気者になりたい地下アイドルの欲求 ・「認知」＝ファンが地下アイドルから顔と名前を覚えてもらうこと", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}]}, {"id": 147, "label": "社会変革", "freq": 7, "highlights": [{"text": "それが、紀元前 6 世紀頃に誕生した仏教とジャイナ教。ガウダマ・シッダールタが仏教を、マハーヴィーラがジャイナ教を始めました。どちらも、 出自（ヴァルナ） より業（カルマ） を重視して、カーストを否定 したのです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "既得権益（不平等な縦型社会）が新自由主義（フラット化した世界）に移行するには出遅れてしまっているので、一気にその先の地域コミュニティに完全分権した社会（リキッド化した世界）の構築準備を早々に始めるべきだ、もしＴＰＰを締結するにしても、交渉しながら締結して実行までの限られた時間に、地域による新産業の育成と地域コミュニティ型セイフティネットの充実などの整備を一刻も早くすべきだ、と思っています。そのためには、産業構造を大きく変え、新産業の育成、例えば短期的には観光業（移動手段、ガストロノミーが既に資産であるので）、中長期的には代替エネルギー技術（世界的な需要があるので）とバイオメカニクス製品（あたらしいものづくり）などの育成をすべきです。クールジャパンは関係ありません。クールジャパンを発言したのは、もともと米国のＣＦＲ（外交問題評議会）ですから。なにより、今、一番問題なのは、『日本をこんな国にしたい！』というアイデアがないことですよね。これが、政治家でも学者でも論客といわれる人でも、ほとんどないことが問題だと思います。皆、目先の問題と対症療法ばかり。ノービジョン・ノーライフなのです。 　ですので、次の社会の準備、もしくはポスト新自由主義の戦略の準備が整うまで、本来は安易にＴＰＰを推し進めるべきではありませんが、いつも日本は遅すぎるので、きっとダラダラと進んでいくでしょう。そして、いずれ来る改革にはそれなりの痛みを伴うのです。また、ＴＰＰを推し進めた場合、相対的に経団連は強くなるでしょう。それも忘れてはいけませんし、対応も必要です。 　もうひとつの問題はＴＰＰの外交的側面です。お話ししたように、現在、世界は予想通りブロック経済に向かっているように見えます。形はかつてとは異なりますが、ＥＵはドイツを中心に東へ南へと実質的に拡大傾向…", "book_title": "白本", "author": "高城剛"}, {"text": "既得権益（不平等な縦型社会）が新自由主義（フラット化した世界）に移行するには出遅れてしまっているので、一気にその先の地域コミュニティに完全分権した社会（リキッド化した世界）の構築準備を早々に始めるべきだ、もしＴＰＰを締結するにしても、交渉しながら締結して実行までの限られた時間に、地域による新産業の育成と地域コミュニティ型セイフティネットの充実などの整備を一刻も早くすべきだ、と思っています。そのためには、産業構造を大きく変え、新産業の育成、例えば短期的には観光業（移動手段、ガストロノミーが既に資産であるので）、中長期的には代替エネルギー技術（世界的な需要があるので）とバイオメカニクス製品（あたらしいものづくり）などの育成をすべきです。クールジャパンは関係ありません。クールジャパンを発言したのは、もともと米国のＣＦＲ（外交問題評議会）ですから。なにより、今、一番問題なのは、『日本をこんな国にしたい！』というアイデアがないことですよね。これが、政治家でも学者でも論客といわれる人でも、ほとんどないことが問題だと思います。皆、目先の問題と対症療法ばかり。ノービジョン・ノーライフなのです。 　ですので、次の社会の準備、もしくはポスト新自由主義の戦略の準備が整うまで、本来は安易にＴＰＰを推し進めるべきではありませんが、いつも日本は遅すぎるので、きっとダラダラと進んでいくでしょう。そして、いずれ来る改革にはそれなりの痛みを伴うのです。また、ＴＰＰを推し進めた場合、相対的に経団連は強くなるでしょう。それも忘れてはいけませんし、対応も必要です。 　もうひとつの問題はＴＰＰの外交的側面です。お話ししたように、現在、世界は予想通りブロック経済に向かっているように見えます。形はかつてとは異なりますが、ＥＵはドイツを中心に東へ南へと実質的に拡大傾向...", "book_title": "白本", "author": "高城剛"}, {"text": "政治の力だけで国民を救えるというのは実に危険な幻想なのだが、このような考えはいつの時代にもはびこりやすい。しかも、多大な犠牲を払って国の変革が成し遂げられようと、国民の心が変わらなければ、その変革はほとんど功を奏さないだろう。 　人間が無知やエゴイズムや悪徳の束縛から逃れられるかどうかは、ひとえにその人間の人格にかかっている。そして国民一人ひとりの人格の向上こそが、社会の安全と国の進歩の確たる保障となるのだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "ところが25年以上も前に、「技術の変化による価値観の変化」を語る２冊の本が出版されていました。 　１冊目の本は、アルビン・トフラーの『第三の波』（1980年）。 　高名な未来学者アルビン・トフラーは、この著作の中で次のように言っています。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "これに対して、真っ向から批判を挑んだのが、堺屋太一です。 　堺屋は、その最も有名な著書『知価革命――工業社会が終わる　知価社会が始まる』（1985年）の中で「これからの商売で大切なのはモノそのものではなく、それに付加される知的価値である」と主張しました。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "ある時代のパラダイム（社会通念）は、「その時代は何が豊富で、何が貴重な資源であるのか」を見れば明らかになる。 　ということは、それまで豊富だったものが急に不足したり、貴重だったものが急激に豊富になったり、といった変化が起きる時、それに対応して価値観が変化する。その価値観の変化によって社会は変化する。 　これが堺屋の結論でした。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 148, "label": "生き方", "freq": 7, "highlights": [{"text": "私たちの多くは、自分が密かにめぐらしつづけている思いを、隠し通せるものだと信じ込んでいます。しかしながら、そんなことはとうてい不可能なことです。それはまず生き方として、つづいて環境として、その姿を明確にあらわすことになるからです。", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "最期の最期まで独りで生きることを貫いた人が〝幸せだった〟と証言する姿を目撃できる機会はない。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "単に自分の人生をより輝かせ、もっと幸せに、そして末永く良いものにしていくためにどうするのか、という生きていくための哲学の部分がドーンと欠けていると思うんです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "川上 　でも、楽をして生きるほうがよくて、夢を追いかけるのはダメなのかっていうと、そこに「美学」ってものが出てくるんだと思います。僕は、頭がわるいことはしたくないと思う反面、頭がわるいことをやってみたいという欲望を強く持っている。頭がいい人がやるような、とにかく楽をしてうまい汁を吸うっていう生き方は、やっぱり好きじゃないんです。 ──　楽するだけじゃ、おもしろくないですよね。 川上 　そう、おもしろくないんですよ。おもしろいからやるというのは一番重要です。「正しい使命感」を持って、しんどいことをやるのは、なにか違う。だから、バカなことだとわかっていて、バカを一生懸命にやるっていうのが一番いいかなって（笑）。僕はそういう生き方をしたいです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "「自分という人間について考える最良の方法は、どんな精神的、道義的考え方をしたときに、いちばんいきいきと生きていることを実感できるかを探ることだと思う。人はそうした瞬間、心の中の声が聞こえる──これこそが本当の自分だ、と」", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "だからこそ、これから 人工知能の登場によって、私たち人間の生き方が問われる 時代になるということです。または、人工知能の登場によって、私たちの生き方そのものが進化していくということです。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "大切なのは、一生懸命働いて節制に努め、人生の目的をまじめに追究していくことだ。それを周囲に身をもって示している人間は多い。彼らの地位や力はどんなに取るに足らないものだとしても、現代はもとより将来の社会の繁栄に大きく寄与している。 　というのも、彼らの生活や人生観は、意識するしないにかかわらず周りの人間の生活に浸透し、次の時代の理想的な人間像として広まっていくからだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 149, "label": "独立性", "freq": 7, "highlights": [{"text": "許認可を要するものはやらない」というのが僕の今の考えだから、世界自由競争のものしかやりません。役所に頼み事をするような会社に興味はありません。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "とにかく僕、蛭子能収は、誰かに束縛されたり、自由を脅かされることがなによりも大嫌い。誰もが自由に意見できる世の中こそが、一番いいと思っているから。人は、自由でいることが一番いいと思う。もっと言えば、自由であるべきだとも思っている。 　そのためには〝群れ〟のなかに、自分の身を置いてはいけません。なぜかって？　それは、無言の圧力を感じるのは、その人が〝群れ〟の一員でいるからです。", "book_title": "ひとりぼっちを笑うな (角川oneテーマ21)", "author": "蛭子 能収"}, {"text": "企業も同じことだ。すでにできあがった企業は、独立性の高い新しい部門を生み出したり、子会社や事業部を分離独立させたりすることで、既存のネットワークから脱却する必要があるかもしれない。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "周囲の目ばかり気にしたり、仲間同士で群れたがるのは、自分というものがない 証 といえます。そんなつもりがなくても、いつも集団にいると、グループのやり方、グループの総意、グループの行動に少しずつ影響されていきます。 　しかし、エースの第一条件である「自己確立」ができている人はまず群れません。仲間と必要以上になれ合うことなく、つねに自分として行動するのはエースに共通する特長です。 少なくとも必ず「ひとり時間」を知らず知らず設けているのです。 　この「ひとり時間」というのが、自己を確立していくうえで非常に重要な「時間の使い方」なのです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "彼が語った理屈はこうだ。『トイ・ストーリー』がヒットしたとする。それどころか大ヒットしたとする。そうなったとき、ディズニーのマイケル・アイズナーＣＥＯは恐るべき魔物をつくってしまったことに気づく。つまり、ディズニーに対抗し得るライバルだ（ ディズニーには契約上あと二作品の借りがあるだけで、その後は自由の身だ）。『トイ・ストーリー』が公開されるや否やアイズナーは契約の見直しを求め、パートナーとしてピクサーを手元に置こうとするだろう。ならばもっと有利な条件で交渉したい。具体的には、興行収入をディズニーときっちり折半したい。それは道義的な要求でもある。だが、このような条件を出すには、我々自身で制作予算の半分を用意できなければならない。その大金を手に入れるためには新規株式公開（ ＩＰＯ）しかない。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "しかし私の考え方は違っていて、「売れたとしても制約と依存の下、強大なパワーを借りて売れたなら意味はない」と思っているのです。 　例えばもし芸能人を目指すとした場合、まずネットで話題の人物になり、自己マネジメントする会社を１００％オーナーで作っておき、その会社でテレビのオファーを受けていくでしょう。 　私はそもそも芸能人ではないしそこを目指してもいませんが、どんな時でも徒手空拳の弱小であったとしても、どれだけ恥をかこうとも、制約がない大前提の上で常にアイディアと独力を持って突き抜けるという方法を選びます。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "もっとも、独りでいても孤独を感じるとはかぎらない。精神科医アンソニー・ストーは著書『孤独』で、ときおり独りになる喜びについて論じ、それを勧めてさえいる。博物学者が熱帯雨林で調査を行なう、ピアニストが何時間にもわたって練習を続ける、あるいは自転車選手が山道でトレーニングをするといった場合を思い浮かべてみるといい。祈りや瞑想、学問の研究や著述をするにも、長時間、独りになる必要がある。これは多くの芸術的・科学的探究についても言える。家庭を持って時間に追われている現代人の大きな不満の一つは、「自分のための時間がない」ということだ。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}]}, {"id": 150, "label": "客観性", "freq": 7, "highlights": [{"text": "いや、そんなことないよ。「『ストーリーとしての～』なんて言っているけど、ストーリーは成功者があとでつくるものだから参考にならねえぞ」と言っただけ。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "経営学というのはストーリーが出てきたらまず駄目だと思うね。ストーリーというのは思い返して出てくる部分が非常に多い。私もいろんなずるい経営者に会っているけれど、みんなうまい具合に過去が物語になっています。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "「そして、物語を提供する側は、誰よりも視野を広く持っていないといけません。特定の個人への思い入れは厳禁です。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "そうならないためにも、〝想い〟を断ち切り、数字だけを見てドラスティックにやっていく必要があります。そういう意味でプロダクトチームとグロースチームは分けるべきだということになるわけです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "いまや上司や同僚、部下からの３６０度評価だけでなく「Earned Value Management」のような客観的な指標で「こやつはどのくらい価値のある仕事に取り組み、実現してきたか？」というような物差しがどんどん増えてきております。昔", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "世界を正しく眺めるために、そして世のなかのウソにだまされないために、ベーコンが 掲げた４つの「思い込み（彼はそれをイドラと呼びました）」を紹介します。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "「人間はみんな同じである」という客観的な考え方は、「自分は他の人にとって大勢の中の一人にすぎない。でもいいや」という主観的な認識に転換されました。 　つまり、あきらめたわけです。 「あるべき自分の姿を確立する」という現実的な考え方は、「自分の気持ちを大切にする」「自分らしさを大切にする」という精神的・内面的な問題になりました。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 151, "label": "プロセス", "freq": 7, "highlights": [{"text": "ＤＣＡＰは、それぞれの段階で用いられる言葉はＰＤＣＡと同じだが、その順序が異なる。 実行（Do）→チェック（Check）→改善（Action）→計画（Plan）と、計画より実行が先にある のが特徴", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "効率化も、非効率化も、「繰り返し処理」の扱い方で決まるの", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "猛獣園ではこの意思決定法が驚くほど機能する。 ・意見を述べる時間が確保され、言いたいことを伝えられる ・自分の意見をチームメンバーが傾聴してくれる この２つのプロセスを踏んでいるからだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "プロセスは、特定の業務に対応するために定義され、事実上の進化を遂げる。このため、ある業務のために作られたプロセスを使って、それを実行した場合は効率よく達成できるが、同じプロセスをまったく別の業務に適用すると、遅くて効率が悪く、役所仕事のようになることが多い。つまり、ある仕事を遂行する 能力 を定義するプロセスが、ほかの仕事については 無能力 を明らかにする。すぐれた経営者が各組織の目的を絞ろうとするのは、プロセスと仕事を連携しやすいからである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "経営者にとってのジレンマは、プロセスがその性質上、従業員が反復作業を一定の方法で行なうために確立されるということだ。一貫性を保つため、プロセスは基本的に変化しない。変更が必要なときには、厳しく管理された手順にしたがって変更する。つまり、 組織が価値を生みだすメカニズムそのものが、 本質的に、 変化をこばむのである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "でも、我慢というのは何なのか。基本的には、小さな成功体験を積み重ねながら歩み続け、どこかにあるだろう「なりたい自分」や「こうであってほしい環境」を実現しようとするひとつのプロセスである、という話になります。つまりは、いきなり目的地に辿り着くことなどできないから、マイルストーンに一個一個到達するために、我慢して歩き続けなければならない、という話に過ぎません。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "われわれがこの世を去ったのちも、優れた大統領をずっと生み出すために、どんな プロセス をつくることができるのか。どのような国を築きたいのか。国の原則は何か。その原則をどう運用すべきか。われわれが目指す国を築くには、どんな指針と仕組みをつくるべきか」", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}]}, {"id": 152, "label": "承認欲求", "freq": 7, "highlights": [{"text": "自分の行動を「価値あるもの」と認めてくれる人がいることは、涙が出るほど嬉しい。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "国見が一口、水を飲む。 「結局皆、信じるものが欲しいんだと思います。特に、この社会は生きづらい、自分はこの世界に不当に扱われていると感じている人ほど」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "職業に就いているとその肩書きがアイデンティティを与えてくれますが、その職業を辞めてしまうようでは日本の社会ではなかなか認めてもらえないのが現状でしょう。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "リンカーンの書簡に「人間は誰しもお世辞を好む」と書いたのがある。優れた心理学者ウィリアム・ジェイムズは、「人間の持つ性情のうちで最も強いものは、他人に認められることを渇望する気持ちである」と言う。ここでジェイムズが、希望とか要望とか待望とかいう、なまぬるい言葉を使わず、あえて「渇望する」と言っていることに注意されたい。 　これこそ人間の心を絶えず揺さぶっている焼けつくような渇きである。他人のこのような心の渇きを正しく満たしてやれる人はきわめてまれだが、それができる人にしてはじめて他人の心を自己の手中に収めることができるのである。葬儀屋といえども、そういう人が死ねば心から悲しむだろう。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "他者から嫌われたくないと思うこと。これは人間にとって、きわめて自然な欲望であり、衝動です。近代哲学の巨人、カントはそうした欲望のことを「傾向性」 と呼びました。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "彼女たちは可愛い制服や衣装を着たり、接客やライブをしたりすることで、多かれ少なかれ「人にちやほやされたい」という欲求を持っているのです（", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "・「承認欲求」＝有名／人気者になりたい地下アイドルの欲求 ・「認知」＝ファンが地下アイドルから顔と名前を覚えてもらうこと", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}]}, {"id": 153, "label": "人間本性", "freq": 7, "highlights": [{"text": "東南アジアやアフリカを旅していると、ひととの距離がとても近いと感じる。もちろんバンコクのような都会では少し距離を感じるが、ほんの少し地方に行くと、ひととの距離はずっと近い。外国人がいないような地域に行くと珍しがられて周りにひとが集まる。ひととひとは簡単につながるのだとわかる。ひとはコミュニケーションをとる生き物だということを思い出す。 　旧海部町を歩き、私はふと、そういう雰囲気を思い出していた。あいさつをすると、あいさつが返ってくる。それだけで話が弾むことはないが、少しこちらから会話を続けようとすると、少し続く。それはとても自然で、コミュニケーションに慣れていることを感じる。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "ある高名な宗教学者は、「現在の人文学の世界は、人をサルの延長として短絡的に捉える者たちの出現により、貧しくなっている」と断じ、「人間のことはサルを研究すれば分かるのか」と反問しました。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "あなたは「誰ひとりとして悪を欲する人はいない」という言葉をご存じですか？　一般に、 ソクラテスのパラドクス として知られる命題ですが。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "「人間の悩みは、すべて対人関係の悩みである」 とまで断言しているのですから。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "まず、人は無力な存在としてこの世に生を受けます。そしてその無力な状態から脱したいと願う、普遍的な欲求を持っています。アドラーはこれを「優越性の追求」 と呼びました。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "他者から嫌われたくないと思うこと。これは人間にとって、きわめて自然な欲望であり、衝動です。近代哲学の巨人、カントはそうした欲望のことを「傾向性」 と呼びました。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "人間の脳と体は、動いているときがいちばん効率よく機能する。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}]}, {"id": 154, "label": "自己責任", "freq": 7, "highlights": [{"text": "精神的に病むことがあったときに、最初は助けても、助けられないくらい重たいことになると本人を置いてその場から立ち去ってしまうひとが少なからずいると言われている。このとき助けられないことの言い訳をしたり、それを本人の自己責任だとしたりもする。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "誰かを恨みに思っていてもいいことはひとつもないし、それどころか自分自身が損をしてしまう。 反対に、すべての原因を自分にして、自分に何が足りないかを考えるようにすれば、反省点や改善点が見つかり成長につながります。 自分を取り巻く人間関係も明らかによくなります。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "でもネットで起こっていることの大半は、そもそもはユーザーが望んだ結果。ニーズがあるから成立する。ワイドショーとか、報道番組が恣意的に編集されているといってみんなは嫌うけれど、それも視聴者が望んだから始まったし、見られているから続いているわけです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "つまりは、方法論云々よりも自分が選んだものを自分で実行したという事自体が、その後の人生を飛躍的に成長させていく事になっていきます。なぜなら自分の意思に基づく失敗ならば、その後、大きな教訓となって一生忘れられない知恵に昇華されるからです。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "ではどうするべきか。答えは『道草』全編を通して語られている。「己のせいじゃない」としか言いようのないたくさんの道草を食わされて生きている。その細部のひとつひとつを高い視点からしっかり見つめること。「己のせいじゃない」と言いつつ、それをやっているのはやっぱり自分なのだ。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "孔子の書物に「禍福は、向こうから訪れるのではなく、ただ 人間が、 それを招くものである」と記されているではありませんか。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "ユダヤ教の教えに、こんな言葉があります。「自分が自分のために自分の人生を生きていないのであれば、いったい誰が自分のために生きてくれるだろうか」と。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}]}, {"id": 155, "label": "イデオロギー", "freq": 7, "highlights": [{"text": "この二十年ほどの経済政策の論争は、新自由主義に行くか、社会民主主義に行くかというわかりやすい二項対立だった。それぞれ言い分はある。それぞれのロジックは一部有効で、一部有効ではなかった。どちらのイデオロギーに寄っても政策は行き詰まり、イデオロギーの議論によって明確な解は生まれなかった。その状況を見るにつけ、私はイデオロギーによる二項対立論に違和感を覚えるようになった。 「ひょっとしたら、現実の経済社会で起こっている姿をまったく無視した、抽象化されたベースで議論しているだけではないのか」 　やがてその思いが強くなり、経済社会的問題を考えるときは、よけいなフィルターを外して現実を見つめることが大事なのではないかと考えるようになった。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "世界をエミュレーションするために集合した大量の論理というのは、力を持つということです。それを突き崩すのは、非常に難しくなる。世界を曲がりなりにも、正しく記述できちゃってるわけですからね。この構造が、実はイデオロギーというものの正体なんじゃないかと。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "たくさんの人を巻き込めるかどうかって、なにによるんでしょうか。 川上 　知識の集大成としての完成度の高さっていうのは、ひとつの要素としてあるんじゃないでしょうか。完成度が高ければ高いほど、科学や論理からの攻撃に耐えうる。そしてどれだけたくさんの人を説得できるかどうかは、マーケティングの問題かなと思います（笑） ──　たしかに（笑）。宗教もそうですが、広がっていく初期のころにマーケティングがうまい人がいるかどうかはそうとう重要な気がしますね。 川上 　理論武装っていうのも、文系的な言葉ですよね。言葉を道具、手段だと思っている人の言葉。そして、イデオロギーというのは、理論武装された知識の体系なんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "彼らの信念は、「市場を極限まで自由にすることが個人の自由と社会の繁栄につながる」という「市場万能主義」と、「企業は株主のためにあり、経営者の役割は株価を最大限に高めることである」という「株主至上主義」の、二つの考え方によって裏打ちされている。これをあたかも普遍の真理のように信じており、これだけの金融危機のあとにもその信念が揺らぐことがないのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "神様でなくても、旧ソ連や文化大革命時代の中国のように共産主義などの超越的な理念を信じているのも強みになりえます。私はアメリカでは、大した情報屋と知り合う機会がなく、ドイツでも生真面目なボーイスカウト・タイプにしか出会いませんでした。やっぱり悪いのはイスラエル、ロシア、イギリスでしょう。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "プーチンは新しい国家建設のためのイデオロギー 出にも力を入れています。日本ではあまり報道されていませんが、（〇八年）二月八日にクレムリンでおこなわれた大演説で、プーチンは「今後、政府は戦略策定とイデオロギーのセンターになる」と不思議なことを言い出している。プーチンが一九二〇年代のイタリア・ファシズムに近いユーラシア主義を民族思想の中心にしようとしているのは間違いない。哲学研究所や民族学人類学研究所でもイタリア・ファシズムやユーラシア主義の研究を始めていますね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "脱成長コミュニズムを実現しない限り、どんな行動も人類絶滅を防ぐには役に立たないからである。このような考え方には「根本病」という言葉がぴったりである。 　戦前を代表するジャーナリスト石橋湛山は、あらゆる弊害は資本主義に由来すると信じる根本病を痛烈に批判している。", "book_title": "自由と成長の経済学 「人新世」と「脱成長コミュニズム」の罠 (PHP新書)", "author": "柿埜 真吾"}]}, {"id": 156, "label": "現実", "freq": 7, "highlights": [{"text": "とはいっても、こうしたことが〝言うは易く行うは難し〟であるのも認めなければならない。似た者同士が一緒にいたがるのは、人間のもって生まれた性質によるだけではない。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "ぼくたちは、検索を駆使することで無限の情報から無限の物語を引き出すことができる時代に生きています。だからこそ、ひとりひとりが、物語と現実の関係について自覚的でなければなりません。情報だけの世界に生きていると、乱立する物語のなかで現実を見失ってしまいます。新しいモノに出会い、新しい検索ワードを手に入れることで、言葉の環境をたえず更新しなければいけないのです。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "〈自己のホメオスタシス〉のために「虚構」を利用する者は、１９８３年頃から「オタク」と呼ばれるようになり、オタク差別が始まります。オタクたちの多くは、そんな「現実」を憎み、ますます「虚構」へと逃避するとともに、一部は「ハルマゲドン」を待望しました。ところが、そうした者たちの一部が一連のオウム事件を起こした後──実際オウム信者の多くはオタクでした──「ハルマゲドンの待望」はオタクたち自身にとっても馬鹿げた営みになりました。 　その他にも、性愛へのコミットメントが、それまで「カッコイイこと（something cool）」だと見做されたのが、「痛々しいこと（something pitiful）」だと見做されるようになったことなど、いくつかの要素が重なって、１９９６年頃からオタクに対する見方が、非差別的なものへと相対的に変化しました。それに伴って、〈自己のホメオスタシス〉に利用可能な素材であれば、「現実」も「虚構」も等しい価値を持つと見做されるようになりました。そのことが東浩紀の言う「データベース的消費」（↓ 参照） の重大な背景を構成します。「現実」も「虚構」も、〈自己のホメオスタシス〉に利用可能な素材のデータベースに、横並びで登録されるのです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "そして「現実」と「虚構」との差異がフラット化したせいで──すなわち「現実の至高性（paramountness of the reality）」が失われたことで──〈現実の虚構化〉と〈虚構の現実化〉の区別が実質を失いました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "その結果、「現実」と「虚構」の優先順位が、〈自己のホメオスタシス〉の達成に関するコストパフォーマンスによって、決まるようになりました。〈自己のホメオスタシス〉に向けて「現実（生身のコミュニケーション）」をアレンジするのは、もちろんコストとリスクを伴います。だから「現実」と「虚構」を区別しないで〈自己のホメオスタシス〉を達成する方が、効率的なのです。こうして「現実」と「虚構」は等価なツールとして扱われるようになりました。 　こうした動きは、人々が尊厳（自己価値）を維持するために、わざわざ社会の中を生きることによって生身のコミュニケーションを通じて承認を獲得するという必要が、免除されるようになることを意味します。１９９７年頃から、 憎しみがないのに 平気で人を殺す「脱社会的（non-social）」な凶悪犯罪が増えましたが、個人の尊厳が生身社会から無関連なものになっていく動きがもたらしたものだ、と僕は推定しています。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "もう一つ忘れてならないのは、本からいくら貴重な経験を学んだとしても、しょせんは耳学問の域を出ないという点だ。それに反して、現実生活から得た経験は真の知恵となる。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "本の中の事件に心を動かされたとしても、それで現実の自分が困るわけではなく、自分が犠牲を強いられることもない。だからフィクションにばかり感動していると、現実に対してしだいに無感覚になってしまう。精神という 鋼 は徐々に摩耗し、弾力性というかけがえのない特性もいつのまにか失われていく。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 157, "label": "発見", "freq": 7, "highlights": [{"text": "チョプラは人間の健康を理解するうえで重要なことを見落としているのではないかと思いはじめた。きっかけは、「物事は理論だけでは説明できないと気づいた」ことだったという。「理論といったって、実は抜け穴だらけだということがわかってきたんです」。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "未知の良さは、ユーザーにとっても作り手にとっても未知である」", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "でも、思い返すと「好き」というのは実はかなりコントロールされるものだと思うんですよ。というのも、したくない仕事というのは誰にでも降ってくるものですが、やってみたら意外と楽しかった、面白い部分を発見した、まずは取り組んでみたら感謝されてやりがいを感じた、ってことは往々にしてあると思うのです。最初は好きでもなければ興味もない仕事や職場に居場所を見つけて、自分が集中できる環境ができ、頑張っているうちに血路が開けたり、未来に展望が見えたりということもあるかもしれません。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "では、どうやって知っていくかというと、「ファン同士で会ってもらい、盛り上がってもらい、そのポイントを改めて発見してもらう」のである。つまり、ファンを一定数集めて話し合うファン・ミーティングが最適だ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "なぜ盛り上がるかというと、一般人とはできない「マニアックな話＝偏愛な話」ができ、しかも「わかる～！　私もそこが好き！」とか「え！　そこが好きなんだ！　へ～！」とか「そこ好きなの私だけかと思ってた！」みたいに、お互い発見しあうからである。 　 この「偏愛」と「発見」こそ、ファン・ミーティングのポイント だ。ここを理解しないと、商品リニューアルなどで、せっかくファンが支持していた偏愛ポイントを改悪してしまったりしてファンを失ったりする。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "ニュートンは、疑いもなく最高の英知を備えた人間であった。彼は多くの輝かしい発見を成し遂げてきたが、その秘訣をたずねられたとき、「いつもその問題を考えつづけていたからだ」と、こともなげに答えたという。また、別の機会に自分の研究方法について次のように語っている。 「私は、研究中のテーマを常に自分の眼の前に広げてじっと見守る。そうすると、闇に一筋の光が差して、しだいに夜が明けていくように、問題の本質がくっきりと浮かび上がってくるのだ」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "これら研究の成果がメンデルの遺伝の法則だったり、万有引力だったり、ケプラーの法則だったりするのです。これらの発見はたいてい、神様を信じ、神の御わざを見ようという 敬虔 な信者たちによってなされたのです。 　ところが、このような", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 158, "label": "社会問題", "freq": 7, "highlights": [{"text": "バーチャル・スラム」と呼ばれる新たな貧困層が生まれる可能性も懸念されています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "それに加えて、移民政策にはさまざまな負の側面があるのも事実です。国際社会で大きな問題になっている ISIS にイギリス人やフランス人が参加していますが、この多くはイギリスやフランスに「移民」としてやってきた元外国人です。彼らは移民先の国での生活になじめなかったことで経済的困窮に陥り、社会への不満が募ったと言われています。それがテロリストに合流する者を生んだり、暴動が起きる原因になっているという見方もあります。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "いずれにせよ、日本では米欧で見られるような分断と対立の激化は確認されません。この国は永遠にやせ細るだけの忍耐ゲームだとの認識が強くなり過ぎたことで、「親ガチャ」という言葉に代表されるように、むしろ諦めムードが漂っています。ただそれは賃金と経済がプラスの循環に入り、定着していけば、時間が解決してくれる問題だと思います。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "だがこの「セックスワークの最下層が最も可視化されていない」というジレンマについては、実は僕が最も時間と労力を費やしてきた「家出少女」「売春ワークの少女」への取材の中で、ウンザリするほど感じ続けてきたものだった。どれだけ取材しても、どれだけ彼女らの抱えた痛み、苦しさ、貧困や虐待といった過酷な成育歴を描いても、読者に「伝わった」という実感が薄い。", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "総括しよう。本書では、女性の低所得層が増えるほどに、低所得と貧困の境界が分かりづらくなり、その中でも殊にセックスワークの中にある貧困女性が一層不可視状態に陥ってしまうことを前提に、話を進めてきた。不可視状態にある「最貧困女子・少女」にとって、セックスワークには吸引力がある。それは、特に幼少期の虐待や貧困といった経験をもつ少女にとって、そして貧困の中で路上生活に近い状態に陥ってしまった女性にとって、セックスワークが非常に不確かながらも私的なセーフティネットを担っていることや、セックスワーク周辺者が貧困状態にある女性と高い親和性をもっていることが原因だった。そして彼女らに共通するのは、「三つの無縁」「三つの障害」だということにも言及した。 　だが、女性の貧困が拡大すればするほど、セックスワークへの参入者は増え、参入障壁が高くなるほどに最貧困女子は追いやられ、収入手段としてはあまりに過酷な売春ワークの中へと吸収されていってしまう。 　まずは生産的議論の前提として、セックスワーカーを「ワーク系」「サバイブ系」「財布系」で分類することを提案し、生きるためにセックスワークに就かざるを得ないサバイブ系の多くが合法的なセックスワークではなく違法な売春ワーク周辺に偏在する傾向を描いた。 　簡単な解決策など示しようがないが、「彼女らが何を求めているか」の観点から、いくつかの拙い提案もさせていただいた。未成年の最貧困少女はまず小学生時代の居場所ケアによって、「売春ワークへ吸引する地域の縁」を断つこと、家出状態に陥ってからは少女らに親和性の高いシェルター作りの必要性がある。 18 歳以上の最貧困女子については、路上の私的セーフティネットのレベルアップや支援者との断絶を解消するために、セックスワークそのものに…", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "総括しよう。本書では、女性の低所得層が増えるほどに、低所得と貧困の境界が分かりづらくなり、その中でも殊にセックスワークの中にある貧困女性が一層不可視状態に陥ってしまうことを前提に、話を進めてきた。不可視状態にある「最貧困女子・少女」にとって、セックスワークには吸引力がある。それは、特に幼少期の虐待や貧困といった経験をもつ少女にとって、そして貧困の中で路上生活に近い状態に陥ってしまった女性にとって、セックスワークが非常に不確かながらも私的なセーフティネットを担っていることや、セックス きに大きな代価が必要だ。 　だからといって、境界線を放棄してしまったら、もっと大きな代償を払うことになる。人生でもっとも大事なものを選べなくなるからだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "温暖化終末論者は、気候変動が飢饉をもたらすと主張するが、温暖化対策はむしろ飢饉のリスクを高める。植林、太陽光発電、風力発電等といった温暖化対策は膨大な土地を必要とするため、農地を減らして食糧価格を高騰させるからである。パリ協定の２℃目標の達成を目指した厳しい温暖化対策は飢餓リスク人口を７８００万人増加させるという推計さえある（", "book_title": "自由と成長の経済学 「人新世」と「脱成長コミュニズム」の罠 (PHP新書)", "author": "柿埜 真吾"}]}, {"id": 160, "label": "教育", "freq": 7, "highlights": [{"text": "私たちは教育のファストフード化を容認してきました。その結果、まるでファストフードが体をむしばむように、教育が精神を弱らせることになってしまいました。……あらゆる偉業は、想像力から生まれます。ところが現代の教育システムは、まさにその想像力を奪いつづけているのです（ ２）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "第二に、それ以上に重要な答えは、ビジョナリー・カンパニーは理念を宣言しているだけではないことだ。その理念を組織全体に浸透させ、個々の指導者を超えたものにするための方法もとっている（この点についてはあとで触れる）。 　・ビジョナリー・カンパニーは、比較対象企業よりも、従業員に基本理念を徹底して教化し、理念を中心に、カルトに近いほど強力な文化を生み出す。 　・ビジョナリー・カンパニーは、比較対象企業よりも、基本理念に合っているかどうかを基準として、経営陣を慎重に育成し、選別する。 　・ビジョナリー・カンパニーは、比較対象企業よりも、目標、戦略、戦術、組織設計などで、基本理念との一貫性を持たせている。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "教育学の研究からも、子供が悩んでいるときに苦悩をそのまま引き受けてしまう親ほど、適切な援助やアドバイスができない可能性が指摘されています。相手と一緒に共振する情動型の共感はとてもやさしい反面、情動に圧倒される危険も含んでいます。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "鷹山は子供らに「大きな使命を忘れて、自分の利欲の犠牲にしないため」、「貧しい人々への思いやり」を養いました。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "残念ながら、空海の密教は哲学的すぎて、当初、庶民のあいだにはさほど広まらなかったが、空海は、京都に「 綜芸種智院」という私立の教育施設を設け、庶民にも教育の 門戸 を開くなどして布教につとめた。 　なお、空海は、中国に渡る前の青年時代、故郷である四国で山岳修行をしていた。そのときに空海が遍歴した 霊場 が、四国八十八か所霊場めぐりとして現在まで受け継がれ、お 遍路 さんたちが歩くコースとなっている。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "昔は街の大人たちが、教師を尊敬していた。 　無学な大人たちにとっては、大学出というだけで尊敬に値したのだ。 　自分の家の子どもが先生に頭をひっぱたかれれば、親は学校にごめんなさいと謝りに行ったものだ。悪いのは自分の子どもに決まっている。たいていの親がそう思っていた。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "アメリカのある小学校では、子どもたちを「生徒」と呼ぶ代わりに「 小さな学者さん」と呼ぶことによって、学業成績を向上させたという事例があります。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}]}, {"id": 161, "label": "本質", "freq": 7, "highlights": [{"text": "本質目標のステートメントは、美しくなくていい。形よりも中身が大事だ。細かい言いまわしを考える暇があったら、もっと本質的な問いを立てよう。 　「たったひとつのことしかできないとしたら、何をするか？」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "人生の本質目標を決めるのは、容易ではない。勇気と洞察力を持ち、自分の力を最高に発揮できる行動を見定めなくてはならない。そのためには、タフな問いに答えることが必要だ。トレードオフを直視し、本質から外れたものごとを断固として切り捨てなくてはならない。 　厳しいが、やるだけの価値はある。本当に明確な目標だけが、自分や組織の力を最大限に引き出し、真にすぐれた成果を可能にしてくれるのだから。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "一方、エッセンシャル思考の人は目の前の症状に惑わされず、どこが本当の問題なのかを見極めようとする。何が妨げになっているのかを特定し、もっとも効果的に処置をする。非エッセンシャル思考の人は応急処置でつぎはぎだらけになっていくが、エッセンシャル思考の人は本当に必要なところに一度だけメスを入れる。これは問題解決にかぎらず、最小限の努力で最大限の結果を得るための普遍的なやり方である。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "リソース以外の何か」こそがまさに、コンセプトなのです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "・コンセプトは、ものづくりの一部 ・コンセプトは、世界を良くする方法 ・コンセプトは、あなたがしあわせに生きられる方法 ・コンセプトは、母国語を用いた文字 20 字程度の言葉 ・コンセプトは、未知の良さに形を与えたもの ・コンセプトは、ビジョンの集合体から生み出される ・コンセプトは、アイテムの集合体によって伝えられる ・コンセプトは、何を用いて、何をしたいか", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "同性にモテることが大切なんじゃないでしょうか。異性にしか人気がない人は、本質的に問題あると思いますよ。そして、同性にモテるほうが、人生長く楽しいと思います。結果、異性にも長くモテるのではないでしょうかね。", "book_title": "黒本", "author": "高城剛"}, {"text": "取材時の写真チェックなど厳しい人も多いのですが、僕はこの 20 年自分の写真チェックをしたことがありません。それどころか、着ている服もほとんど同じです（汗）。スタイリストもマネージャーもいません。ですので、虚像を売っている人は、なにかあったら、すぐに消えていく人が多いですし、本来の生きる力が乏しいと感じます。しかし、僕の場合はなにもしてませんので、なにかあっても、ほとんど気にせず、日々を送ることができます。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 162, "label": "習慣", "freq": 7, "highlights": [{"text": "エッセンシャル思考で生きるということは、削除と凝縮と修正を、日々の習慣にすることだ。まるで呼吸するように、自然に生き方を編集しよう。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "習慣は妨害に打ち克つための最強の武器だ。習慣がなければ、数知れぬ誘惑に勝つことは難しい。だが本質的な目標に向かう行動を習慣づけてしまえば、無意識のうちに目標を達成できる。いちいち難しい判断をする必要はないし、誘惑から目をそむけるためにエネルギーを使う必要もない。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "この 15 年間で習慣についての研究が進み、習慣を変える方法もわかってきました。研究者によると、あらゆる習慣には『トリガー』『行動』『報酬』の３つの要素があります。トリガーとは、ある行動を自動的に呼び起こすためのきっかけです。次に行動がきます。これは肉体の動作のほかに、感情や思考も含みます。そして最後に、報酬があります。この習慣を次も繰り返したいと思うような、ごほうびです。この３要素のループが繰り返されることによって、", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "アップルによれば、平均的なiPhoneユーザーは1日に80回もロックを解除する。消費者リサーチ会社Dscoutの2016年の調査によれば、 モバイルユーザーが1日にスマホを触る平均回数は2617回 だという。「注意散漫」が新しいデフォルトになっているのだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "僕らのような人は、 スマホで時間を確認するだけのつもりが、いつのまにか無限の泉に引きずり込まれる ことが多い。とくに画面に通知が表示されていようものなら大問題だ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "時間は、学ぶべき価値のある知識を吸収し、すぐれた信念を養い、よい習慣をしっかり身につけるために使われるべきである。実りのない生活を続けて時間を浪費するなど断じて許されない。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "「心の中にいくら美徳の絵を描いても、現実に美徳の習慣が身につくわけではない。むしろ心はコチコチに固まり、しだいに不感症となるだろう」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 163, "label": "使命感", "freq": 7, "highlights": [{"text": "個人的な夢を持つことは大変すばらしいことですが、それ以上に意志を強くし、自己を確立させるのが「使命感」です。 社会のため、誰かのために自分はこれを成し遂げるのだという使命感は「最上級のプライド」であり、どんな試練にも耐えられる力に変わります。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "ＩＧＰＩの８つの質問 １．心は自由であるか？ ２．逃げていないか？ ３．当事者・最高責任者の頭と心で考え、行動しているか？ ４．現実の成果に固執しているか？ ５．本質的な使命は何か？使命に忠実か？ ６．家族、友人、社会に対して誇れるか？ ７．仲間、顧客、ステークホルダーに対してフェアか？ ８．多様性と異質性に対して寛容か？", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "右の引用にもあるように、倫理、義務感、誇り、プロ意識、勇気といった定量的に測ることのできない内的動機に基づいて、消防や教育という公共的な仕事はかろうじて成立しています。 　これらの内的動機は、一言でまとめれば「責任」です。それも外から押しつけられた責任ではなく、自らが気づいた内なる責任の自覚です。もう少し強い言葉を使えば、「使命」です。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "教養とは誤配に気づくこと 　端的に言えば、教養とは、誤配に気づくことです。 　どれだけ多くを知っていたとしても、それだけでは教養とは言えません。 　手に入れた知識や知見そのものが贈与であることに気づき、そしてその知見から世界を眺めたとき、いかに世界が贈与に満ちているかを悟った人を、教養ある人と呼ぶのです。 　そしてその人は
