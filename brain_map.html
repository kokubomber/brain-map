たにない」。 「全部できる」ではなく「何でもできるが、全部はやらない」。 　この３つの真実が、私たちを混乱から救い出してくれる。本当に大事なことを見極め、最高のパフォーマンスを発揮することが可能になる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "努力は大切だ。だが、努力の量が成果に比例するとはかぎらない。がむしゃらにがんばるよりも、「より少なく、しかしより良く」努力したほうがいい。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "ハーバード・ビジネス・レビューの有名な記事『モチベーションとは何か』のなかで、心理学者のフレデリック・ハーズバーグは人の意欲を高める２つの主要因が「達成」と「達成が認められること」であると説いた（ ４）。もっと最近の研究では、テレサ・アマビルとスティーブン・クレイマーが数百人の数千日間にわたる日記を分析したものがある。人の本音が書かれた膨大な記録をもとに、アマビルとクレイマーは「日々のささやかな進歩」こそがやる気を引き出し、高いパフォーマンスを可能にすると結論づけた。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "ハーバード・ビジネス・レビューの有名な記事『モチベーションとは何か』のなかで、心理学者のフレデリック・ハーズバーグは人の意欲を高める２つの主要因が「達成」と「達成が認められること」であると説いた（ ４）。もっと最近の研究では、テレサ・アマビルとスティーブン・クレイマーが数百人の数千日間にわたる日記を分析したものがある。人の本音が書かれた膨大な記録をもとに、アマビルとクレイマーは「日々のささやかな進歩」こそがやる気を引き出し、高いパフォーマンスを可能にすると", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "相手のパフォーマンスについて思うことを伝えても、相手の成功や卓越性の助けにはならず、改善のための方策を意見すると、むしろ相手の学習を妨げるということである。", "book_title": "フィードバックの誤謬 DIAMOND ハーバード・ビジネス・レビュー論文", "author": "マーカス・バッキンガム、アシュリー・グドール、DIAMONDハーバード・ビジネス・レビュー編集部"}]}, {"id": 279, "label": "価値判断", "freq": 5, "highlights": [{"text": "リーダーシップ論の権威ジョン・Ｃ・マクスウェルもこう述べている。 　「ほとんどあらゆるものは、徹底的に無価値である（ ９）」 　努力の量と成果が比例するという考え方を捨てたとき、エッセンシャル思考の大切さが見えてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "川上 　一貫してひとつのやりたいことがないといけないっていう「やりたいこと原理主義」にとらわれている人、多いですよね。なにかひとつのことにこだわる原理主義的な考え方って、僕は一種の宗教だと思っているんですよ。 　たとえば、ドワンゴの女子マネ弁当に対して、「女性差別だ」って怒る人がいるんですけど、その人は「女性差別原理主義者」なんだと思います。物事って、それをしたら誰が困るのか、どんなメリットがあるのか、個別の状況や価値観によって判断するものじゃないですか。だけど、女性差別原理主義者は「女性差別をするような〝におい〟があるものはすべていけない」という決まりを最優先事項においている。それってやっぱり、宗教的ですよね。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "川上 　そうそう、本質は論理じゃないんですよ。論理は人間性の真逆にあります。論理的なことを振りかざす人というのは、人間の幸福に結びつかないことをやるんですよ。でもみんな、論理というか、正論が好きですよね。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "重要なのはノウハウや知識を覚えることではなく、過去に経験のない場面に遭遇したときにも、自分で判断できる独自の基準や肌感覚を持つことです。本書が勧めるマーケット感覚も、マーケティングの細かいノウハウではありません。それは、市場と向き合う経験から得られる、市場に対する嗅覚や根源的な理解力です。そしてその嗅覚の中心が、本章で説明する「価値を見極める力」なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "決断力と裏腹にあるのが、「悩み」や「迷い」ではないか。この「実践篇」の冒頭で紹介した「決められない女性」などはそのいい例。 　まず、判断に困ったときにあまりお勧めしないのは「友人への相談」である。 　ＮＨＫの「 祝女」という番組は、 20 代からアラフォーまでの女性の恋愛・結婚模様を描き出すミニドラマ。そこで紹介されていた言葉が、 「彼氏の価値は、自分の友人からどう評価されるかで決まる」 　これは、私にとっては意外だった。男性にはない視点だったから。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}]}, {"id": 280, "label": "遊び", "freq": 5, "highlights": [{"text": "大量生産による効率の向上こそが存在意義だった。当時のマネジャーたちは軍隊を見習い、厳格な管理法を取り入れた（「営業部隊」など、軍隊を起源とする言葉がよく使われるのはそのせいだ）。産業革命が終わって久しい現代でも、大半の会社がその考え方や行動規範を捨てられずにいる。 　遊びは、それ自体を目的とした行動だ。何かのためでなく、遊びたいから遊ぶ。凧あげ、歌、ボール投げ。どこにもたどり着かない行動は、一見無駄なようにも思える。しかし実は、そうした遊びこそ、人間にとって不可欠な行動なのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "遊びは脳の柔軟性と順応性を高め、創造的にしてくれます」と彼は言う。「遊びほど脳を奮い立たせる行動はほかにありません（ ３）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "遊びは、生きるために不可欠なものだ。 　最近の研究によると、動物は遊びを通じて主要な認知スキルを発達させているらしい。実際、遊びが種の生存を左右することもあるほどだ。 　 15 年間にわたってハイイログマの生態を研究しているボブ・フェイガンは、よく遊ぶ熊ほど長生きすることを発見した。彼はこう説明する。 　「世界はたえず変化し、未知の課題や不確実な状況を突きつけます。遊びはそうした変化への対応力を育むのです（ ４）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "神経科学者のジャーク・パンクセップも、同様の意見を述べている。 　「たしかに言えるのは、遊んでいるときの動物たちがきわめて柔軟で創造的な行動をとるということだ（ ５）」 　動物のなかでも、ヒトという種はとりわけ遊びが好きだ、と先述のスチュアート・ブラウンは言う。人間は遊ぶ生き物であり、遊びを通じて生き方を身につけるのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "遊んでいるとき、私たちはもっとも純粋な形で人間らしさを発揮し、自分らしさをさらけ出す。最高の思い出や、「生きている」という実感をもたらしてくれるのは、遊んでいる時間だ。遊びは発想を豊かにしてくれる。新たなアイデアが生まれ、古いアイデアが新たな命を得る。好奇心が刺激され、未知のものを知りたいという意欲がわいてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}]}, {"id": 281, "label": "責任感", "freq": 5, "highlights": [{"text": "にもかかわらず、彼女たちが素直に私の指示や指摘にしたがってくれたのは、 背負うものが大きいからこそ、もっともっと成長しなければならないという「自覚」と「危機感」があったからでしょう。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "エースが持つべき「よいプライド」とは、自分を高みに置いて、それに責任を持つためのプライドです。 　ですから、よいプライドを持つということは、「群れない」「ゼロになる」に続いて、自己を確立するための要素といえます。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "そのときに私は、なんとかうまく乗り切れるだろうというのはいっさい通用しないということを痛感しました。それとともに、「他人事を自分事化する」 ことの大切さを身をもって知りました。どんなことでも他人事と思わず、自分自身のこととしてやっていくようにすれば、全力投球できるようになるということです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "それとともに、「他人事を自分事化する」 ことの大切さを身をもって知りました。どんなことでも他人事と思わず、自分自身のこととしてやっていくようにすれば、全力投球できるようになるということです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "また、休暇の申請も必要ない。いつでも好きなだけ休暇をとることが可能だ。社員にお願いしているのは３点だけ。（１）妥当な範囲内にとどめること、（２）カレンダーに予定を入れること、（３）チームに迷惑をかけないように調整すること。 　そうやって一人前の大人として扱えば、彼らもけっして無茶", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}]}, {"id": 282, "label": "意志力", "freq": 5, "highlights": [{"text": "「立てない」「歩けない」という壁を乗り越えようというのではなく、視線は壁のもっと先、「踊る！」というところに向いています。 いやなことではなく好きなことを目標にする、そこに気づいたからこそ、大きなエネルギーが生まれるし、壁なんて目に入らなくなる。 そして実際、壁なんてことさら意識しなくても、「踊りたい！」と思って頑張っているうちに、気づけば「立てない」「歩けない」の壁を越えていた。彼女が最初から「立つこと」「歩くこと」を目標にしていたら、短期間に劇的な回復を遂げることは困難だったかもしれません。 　じつはこうした思考はエースの特徴ともいえます。 　たとえばＡＫＢ 48 なら、センターに立つことだけを目標にしている子は、ささいな壁に突きあたっただけで意志がゆらいでしまいがちです。それに対し、ＡＫＢ 48 に入るのもセンターに立つのもすべて通過点、ゆくゆくはソロの歌手になりたい、大女優になりたいという夢を持っている子は、ちょっとやそっとじゃゆるがない。 追いかける夢の大きさが、そのまま意志の強さにつながるのです。 　そして意志の強さこそが、結果を生むのです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "個人的な夢を持つことは大変すばらしいことですが、それ以上に意志を強くし、自己を確立させるのが「使命感」です。 社会のため、誰かのために自分はこれを成し遂げるのだという使命感は「最上級のプライド」であり、どんな試練にも耐えられる力に変わります。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "意思のない人に何を言っても時間の無駄だからです。 意思があった上で習慣をつくり、習慣が個性をつくることを目指します。 一流になりたい人だけが一流になります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "この言葉は「若い頃の雑用は買ってでもしろ」と言い換えてもいいかも知れません。人のやりたがらないような雑用でも自ら買って出て、コツコツとこなしていた人は、前頭葉が鍛えられ、意志的・主体的に行動する力の高い人になりやすいということです。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}, {"text": "「あなたは、望めばどんなものにでもなれる。われわれの意志の力が神の力と結びつくなら、その効果はきわめて大きい。心から真剣に求めつづけていれば、すべては可能となる。だが、謙譲や忍耐、節度や寛大さを身につけたいと強く願わない限りは、何を望んでもかなえられはしないだろう」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 283, "label": "実行力", "freq": 5, "highlights": [{"text": "成功する人に、この「不言実行」という要素は間違いなく不可欠です。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "この鈴木マネジャーは、「直観力」はあるのですが、 「説得力」がないために、意思決定が壁に突き当たるタイプのマネジャーです。 　そして、残念ながら、企業や組織においては、どれほど優れた企画案も、 　それが組織の上層部を説得して了解を取り、実行に移されなければ、 　それは単なる「紙くず」なのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "です。この「０・２％を作るぞ」という力が、その後のベースラインを引き上げる「筋肉」になるんです。単月０・２％の向上が、来月以降はずっと利いてくる。だから僕は０・２％の実現をしつこく言います。 「売れた」と「売った」は違います。何としても「売る」。そのためにサイエンスとサイコロジーを駆使して、知恵を絞って新たな顧客価値を生み続ける。勝ち続けるための道はそれ以外ないと思っています。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "経営方針を打ち出したら、それで自分の仕事はおしまいで、後はよきにはからえ、というタイプの経営者がいるが、多くの場合、それではうまくいかない。 　経営トップが、役員や幹部社員だけでなく、管理職から現場の一般社員に至るまで、粘り強くその実行をフォローして初めて大事は 成就 する。そこまで経営トップが自ら動かないと、なかなかトップの思いというのは、組織の末端まで届かないのが現実だからだ。 　組織が変われるかどうかは、結局、トップの思いの強さ次第である。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "最初は手本を示すことも必要である。できもしないことを要求しているのではないということを自ら示すことが、改革の「最初の一突き」になるのだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}]}, {"id": 284, "label": "効果測定", "freq": 5, "highlights": [{"text": "フェイスブックジャパンでは、テレビＣＭはいっさい使いませんでした。 　テレビＣＭを打てば新規ユーザーは間違いなく獲得できます。しかし、そこで入った新規ユーザーがすぐに利用をやめてしまったり、退会してしまえば意味はありません。 　フェイスブックでは「登録した瞬間に〇名以上の友達とつながるかどうか」が使用を続けるかやめてしまうかの分岐点になる という数値が分析結果から出されていました。「重要業績評価指数＝Key Performance Indicator（ＫＰＩ）」のひとつに設定されていることです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "ファンが購入後に使った金額は、購入時点を 1 として、Ｐ 3 施策の段階で 3・85。「 Cafe」に誘引した段階で 5・24。そして、リアルな体験会に来るところまでコミュニケーションを深めると、ＬＴＶは 5・34 まで上がった そうである。カメラが高額商品であることを考えるとすごい効果だ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "よく言われるのは、〝これやって売り上げにどれくらい効果があるんだ〟という、すぐ売り上げに結びつけちゃう思想があるので、なかなかできないですよね。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "まず１番コンバージョン率が低い名称（ビリの名称）は、実は「サンプル」。 「サンプル」という名称よりコンバージョン率が高いのが「トライアル」。 「トライアル」という名称よりもコンバージョン率が高いのが「お試し」。 「お試し」という名称よりもコンバージョン率が高い、 最高の名称が「モニター」 である！", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ダイレクトマーケティングのクリエイティブ、とりわけネット広告のクリエイティブでは、そんなことはまったくない。 いや、 むしろ逆 なのだ。 ネット広告では、「強いキャッチコピー・強い写真・強いデザイン」など、要素の単純な組合せがレスポンス率を左右している」 と考えるべきである。 そう相性なんか関係ないのである。 単純な組合せの問題 なのである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 285, "label": "老化", "freq": 5, "highlights": [{"text": "世の中には、何かを達成するモチベーションとして「何かが足りておらず、絶望する」というコンプレックスから入る人が少なくありません。これを見ていると結局は「なりたい自分」はあるけど「そうでない自分」を受け入れていく、その過程そのものが人生、ということなのかなあと感じるのです。そして、歳を取っていくごとに、年相応に老けていき、開き直りとか諦めとか受け入れることへのハードルが下がり、やがて何かを成し遂げるパワーすら生まれなくなって、昨日何を食べたのかすら思い出すことのできない平凡な日常の中に人生が埋没していく。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "歳を取るにつれてどんどん 物臭 になっていき、面倒くささが興味や好奇心を上回るようになると、自然と「したい」と思えることしか手掛けなくなるのです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "実際に多くの老人を見ていると、「成長とはより頑なになっていくことだ」と定義したくなります", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "本当は年齢とともに体力の衰えと、それに沿った自己イメージに移っていただければいいんですが、なかなか移れない。特に、社会的にあまりよしとされていないような自己イメージのほうにはなかなか移れないわけですね。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "頭では「人は成長する、どんどん年とって、老成していく」と考えていますが、実際に多くの老人を見ていると、「成長とは、より頑なになっていくことだ」と定義したくなる。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}]}, {"id": 286, "label": "経済構造", "freq": 5, "highlights": [{"text": "やはり、いまの中高年が「俺も我慢した。その結果、良い人生を送ることができた。だから、いまの若い人たちも我慢するべき」という論法を結構平然と出してくるのが悩ましいのです。それは我慢したから良くなったのではなく、日本人が増えて日本の経済が良くなったので、相応に頑張っていれば取り分がおのずから増えた、というだけです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "キンドルが米国でやったことは、ご存知ですよね。目玉商品として、売れ筋のペーパーバックを書店よりも安く売ったんです。それをされるのがいやで、出版社は卸値を高くした。そうしたら、アマゾンは卸値よりも安く販売した。逆ざやを取ったんです。 　これはどういうことかというと、コンテンツビジネスをしていないプラットフォームというのは、とにかくコンテンツの値段を下げようとするということです。ユーザーが集まってプラットフォームが拡大すれば、後で帳尻を合わせられるから。プラットフォームの拡大時期においては、コンテンツなんかスーパーの特売の卵みたいなもので、客寄せのツールなんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "ドコモやａｕ、ソフトバンクがガラケーの時代にコンテンツ競争をしたときも、キャリアはコンテンツメーカーにコンテンツの値段を下げさせようと必死だったんですよ。安いパックをつくったり、会員数でメニュー順位を決めることにして、安いサイトをつくって会員数を増やしたほうが得するようなインセンティブ設計にしたり。どうして値段を下げさせようとするかというと、プラットフォーム側はコンテンツの値段を下げても、懐がいたまないからです。 　電話料金やパケット代を下げるのではなく、コンテンツの値段を下げたほうが、自分の懐をいたませずに値下げ競争ができて、客寄せができる。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "コンテンツをつくらないプラットフォームは、最初はとりあえず、既存のプラットフォームよりも安くコンテンツが手に入る場所にするんです。そして、プラットフォーム自体の競争力を強くしようとする。オープンなプラットフォームっていうのはそうなっちゃうんですよね。みんな自由とか公平とかよくわからない倫理観でオープンを支持するけど、本当はそんなの地獄でしかないんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "チケットの相場はたとえば、インディーズバンドが１５００円でライブをしているとしたら、同じくらいのキャリアと知名度の地下アイドルは、３０００円ほどの入場料でライブを開催することができます。 　さらに地下アイドルはカラオケを使用してライブをするため、バンドのように機材チェンジの手間や時間がかからないので、多めに組数を出演させることができます。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}]}, {"id": 287, "label": "投資", "freq": 5, "highlights": [{"text": "真顔で「人工知能が人間を見抜く」という人がもしいたら、少なくとも現段階では儲け話に弱い、何かに騙されやすい可哀想な人だ、ぐらいに思っておいて損はないと思います。人工知能は儲かると騙されて投資した私が言うんだから間違いありません。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "私が言っているのは、社員の健康のことだけでなく、長い目で見た彼らの生産性や幸福のことだ。こうした投資は、後々きちんと利益になって返ってくる。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "私がしたいのは、そのインパクトを和らげることだ。失敗はあまりたくさんしたくないが、失敗のコストは将来への投資だと考えるべきなのだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "ここで注目してほしいのは、グルテキンの任務内容が、社員側と会社側の双方のニーズに役立つものでなければならなかった点だ。グルテキンとリンクトインには、双方にメリット（グルテキンにはより包括的なスキルセット、リンクトインには新鮮な視点）をもたらすであろう相互投資（営業への異動）を約束し合えるだけの相互信頼があった。だから、強固なアライアンスが実現しているのである。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "その後から現在まで続いている「フリーエージェント型の時代」は、我々を長期的視点の投資から遠ざけ、即効性だけを追求する近視眼的視点へと追い立てた。本論で述べたとおり、忠誠心を得られない企業は、長期的思考ができない企業である。長期的思考ができない企業は、将来に向けた投資のできない企業である。そして、明日のチャンスと技術に投資しない企業は、すでに死に向かっている企業なのだ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 288, "label": "挑戦", "freq": 5, "highlights": [{"text": "大変なところにチャレンジするのがいいんですよ。簡単なことばかりやろうとするのがＩＴ企業でしょ？（笑）それがダメなんですよね。まあこれまではしょうがないところもありました。もともとＩＴ業界っていうのは、資本も人もないところで、するっとうまくやろうとして集まった人ばかりだから。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "大学院にいたころは、どうしたらユタ大学のあの独特の環境をつくることができるのかわからなかった。それが今、一瞬にして見えた。脅威に感じても、つねによりよいほうに賭けてみる、ということだったのだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "ムチャ振りにはいくつか特徴があります。まず、ムチャだと思う時点で、勝手に決めてしまった「できないと思い込んでいること」に気づけます。そのような思い込みがあるから、はみ出している、という言葉が出てくるんです。 そして、ムチャ振りをされたということは、何かしら期待されているということです。「ひょっとしたら、あいつにあれをやらせたら面白いんじゃない？」と。新しい課題に気づき、解決法を考えるチャンスをもらったわけです。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "失敗しないということは、必要なリスクを取っていないことを意味するからです。時", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "考えてみてください。ちゃんとリスクを取っていますか。失敗することを恐れていますか。居心地のよい場所に甘んじずに、そこから外へ踏み出していますか。取り組んでいる仕事に冒険心や創造性が発揮されていますか。あなたがザッポスに貢献できるクリエイティブなこととは何ですか。オープンな心で状況と課題に向き合っていますか。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 289, "label": "夫婦関係", "freq": 5, "highlights": [{"text": "しかし、シュナーチは この行き詰まり状態を、個人的な成長と対人スキル向上のための重要な分岐点 だとしています。 「結婚生活には、予想するより、ずっと大きな緊張感とプレッシャーがあります。じつはその時点こそが始まりなのに、そうしたプレッシャーがあまりにも大きいため、それを離婚の時期だと誤解してしまうのです」 　この行き詰まり状態をうまく克服したふたりは、個人としても、そしてカップルとしても強くなります。ふたりの関係は本物になり、より親密なものとなります。 　お互いに理解し合える親密な関係をつくりあげるためには、ふたりで問題に向かい合うことが重要です。 　シュナーチはふたりで問題に向かい合うことは「親密さの駆動輪（育むもの） であり、 砥石（磨くもの） である」としています。", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "ぼくのワークショップに夫婦で来ると、ほぼ大半の夫婦が別れます。ぼくは実際に「ぜひ別れなさい」といって破綻を勧めます。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "それにしても、「転生」という題は示唆的である。長い夫婦生活を本当に意味あるものとし、真の「関係」を打ち立ててゆくためには、夫婦は何度か死の体験をし、転生してゆくことが必要なのである。その間には相手に食われたり、自殺に追いやったりすることはあっても、転生して関係を続ける限り、それはますます深いものとなってゆくであろう。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "夫婦というのは不思議なもので、お互いに話し合いたいとか、近づきたいと思っていても、ふとしたことですれ違ってしまうと、ものを言う気が起こらなくなったり、いらいらしたりしてしまう。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "高潔な人格の妻は気づかぬうちに夫の品性を高めるが、心の貧しい妻は必ず夫を堕落させる――そうトックビルは信じていた。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 290, "label": "消費者行動", "freq": 5, "highlights": [{"text": "この実験の教訓を教授はこう挙げている。 「選択肢が多ければ多いほど人は選ぶのに悩み、選んだ結果が本当にいいのか気にもなり、自信をなくし、結局選ぶのをやめてしまう」 と。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "「この 10 年間で１度でもネット広告をクリックして、その場で物を買った人はいますか？」 今までこの質問をセミナーで何度もしたことがあるが、 90％以上の方が「１度もない」と答える。我々マーケターでもないのだから、一般的なお客様はもっとないのだ。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ネットのお客様の最大の特徴は、徹底的に「比較検討」 することにある。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ネットという媒体では、お客様は能動的に情報を求めてネットを見ている。広告を見るためではない。やっかいなことに、お客様は広告を自然と無視する習慣を身につけている。本能的に広告を目に入れないのである。これを認識せずに広告原稿でアピールしても、誰もクリックしてくれない。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "何度も繰り返すが、お客様はネットを使って 情報 を求めている。 いかにも広告っぽい、宣伝くさいディスプレイ広告が無視されるのは当たり前である。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 291, "label": "広告効果", "freq": 5, "highlights": [{"text": "広告が流れているから言いやすくなる」の典型", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "ネットという媒体では、お客様は能動的に情報を求めてネットを見ている。広告を見るためではない。やっかいなことに、お客様は広告を自然と無視する習慣を身につけている。本能的に広告を目に入れないのである。これを認識せずに広告原稿でアピールしても、誰もクリックしてくれない。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "「特定のターゲットを狙ったコピー」にすると、 クリック率は上がる！", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "広告を無視しながら、情報のみを求めているネットのお客様にクリックしてもらうためには、ズバリ「情報っぽく」キャッチコピーを書く ことである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "何度も繰り返すが、お客様はネットを使って 情報 を求めている。 いかにも広告っぽい、宣伝くさいディスプレイ広告が無視されるのは当たり前である。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 292, "label": "時間", "freq": 5, "highlights": [{"text": "プレゼントしようと自分のことを考えてくれた「想い」がうれしいのである。プレゼントを選ぶために使ってくれた「時間」がうれしいのである。プレゼントを探すために動いてくれた「努力」がうれしいのである。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "それに対する僕の答えは、ビジネスのオンタイムは〝お客様〟を視ている、オフっていうのは〝自分〟を視る。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "それは私たちの生活から〝オン〟と〝オフ〟の区別が消えた、ということになると思う。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "身体を一定時間非日常のなかに「拘束」すること。そして新しい欲望が芽生えるのをゆっくりと待つこと。これこそが旅の目的であり、別に目的地にある「情報」はなんでもいい。 「ツーリズム」（ 観光）の語源は、宗教における聖地巡礼（ ツアー）ですが、そもそも巡礼者は目的地になにがあるのかすべて事前に知っている。にもかかわらず、時間をかけて目的地を回るその道中で、じっくりものを考え、思考を深めることができる。観光＝巡礼はその時間を確保するためにある。 旅先で新しい情報に出会う必要はありません。出会うべきは新しい欲望なのです。 　いまや情報そのものは稀少財ではない。世界中たいていの場所について、写真や記録映像でほとんどわかってしまう。にもかかわらず、旅をするのは、その「わかってしまった情報」に対して、あらためて感情でタグ付けをするためです。いまや海外旅行なんて必要ない、グーグルストリートビューで写真を見れば十分じゃないかというひとは、このことを見落としています。 　 情報はいくらでも複製できるけど、時間は複製できない。 欲望も複製できない。情報が無限にストック可能で、世界中どこからでもアクセスできるようになったいま、複製不可能なものは旅しかないのです。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "エクセター大聖堂のジャクソン司教はこう語っている。 「世俗の富なら、過去に 放蕩 の限りをつくしても、将来倹約に励めば、それでつりあいがとれるかもしれない。だが〝今日浪費した時間は、明日の時間を借りて埋め合わせよう〟などと誰がいえようか？」 　時間は貴重な財産である。過去の偉人はみな、時間を有効に使って豊かな思想や功績を生み出し、その宝を後進のわれわれに譲り渡してきた。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 293, "label": "市場選択", "freq": 5, "highlights": [{"text": "20 代で、見かけも性格もよく、学歴と年収が低い男性は、どこで結婚相手を探すべきでしょうか？　この判断において、彼にとって最も不適切な市場が（彼が選んだ）結婚情報サービス会社です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "しかし、自然な出会いから結婚に至る場合、そこまで厳密に年収を気にする女性は、ほとんどいません。といっても、誤解のないように。年収２００万円と１千万円の男性が目の前にいたら、その理由で後者を選ぶ女性はたくさんいます。ですが、年収２９０万円の男性と、３１０万円の男性がいたとき、その差が決定的だと感じる女性はいないのです。 それにもかかわらず、検索画面の選択肢に「年収３００万円以上」とあれば、それを選んでしまうことは十分にありえます。そしてこういったシステムにおいては、２９０万円と３１０万円の差は、決定的な差（その男性に会うか会わないかという判断を変えてしまう差）になってしまいます。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "おそらく彼は、「 20 代で結婚情報サービスに登録する女性」が、どんな動機でこういったサービスに登録しているのか、考えたこともなかったのでしょう。 20 代の女性でこういったサービスに登録する人は、多くありません。焦って結婚する必要もないし、恋愛のチャンスも多いのです。それでも、あえて 20 代でそうする人の中には、「若い間に登録したほうが、いい条件で結婚できるのでは？」と考えている人が多そうですよね。そしてそうした女性が、結婚相手を学歴や年収でどのように絞り込むか、火を見るより明らかです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "私に言わせれば、彼に足りないのは学歴でも年収でもありません。足りないのは、マーケット感覚です。若さやルックスや性格など、自分の強みが活きる市場を選んで婚活を行なっていれば、こんな男性が２００連敗するなんてありえません。彼のような男性を好ましいと考える女性は、別の市場にはたくさん存在するし、合コンの場合なら「相手は 20 代の女性がいい」と考えても、高望みでもなんでもありません。 反対にいえば、こういったサービスを使うべき男性は、「口下手でまじめ。ルックスにも自信はないけれど、年収も学歴も高い」という人たちです（ 図 13）。そういう人たちは、街中でナンパをするより、結婚情報サービスを使うほうが圧倒的に有利です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "作業服の法人需要を捨て、個人向けの店売りに特化する。はなから競争しないと決め、絶対に勝てるポジション取りをした。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}]}, {"id": 294, "label": "批判的思考", "freq": 5, "highlights": [{"text": "世界を正しく眺めるために、そして世のなかのウソにだまされないために、ベーコンが 掲げた４つの「思い込み（彼はそれをイドラと呼びました）」を紹介します。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "人間のからだや脳のしくみなどからくる「人間の思い込み」。 　 自分の考えはすべて正しいと勘違いしてしまう「個人の思い込み」。 　 まわりの評判やうわさ話を鵜吞みにする「言葉の思い込み」。 　 そして、偉い人や有名な人の言うことを信じてしまう「権威の思い込み」。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "おそらく、森鷗外を支配していたのはこんな「思い込み」でしょう。ベーコンが指摘した「権威の思い込み（劇場のイドラ）」です。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "両者の分かれ道は、「権威や常識を疑うことができるかどうか」、そして「事実をベースにしてものごとを考えられるか」 にあります。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "このような批判的思考を身につけるためには、「無難な既知」に流れるのではなく、「リスクを取って未知にチャレンジしていく」しかありません。しかし、それがやがてこれからの時代で必要な「個」という知性を磨いていく ことにもなるのです。 　知性というのは、すなわち「危うさ」であるとも言えるのではないでしょうか。なぜなら、危うさを制御するために知性があるからです。そこで何もしないでじっとしているのであれば、知性など要らないのです。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}]}, {"id": 295, "label": "思い込み", "freq": 5, "highlights": [{"text": "世界を正しく眺めるために、そして世のなかのウソにだまされないために、ベーコンが 掲げた４つの「思い込み（彼はそれをイドラと呼びました）」を紹介します。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "人間のからだや脳のしくみなどからくる「人間の思い込み」。 　 自分の考えはすべて正しいと勘違いしてしまう「個人の思い込み」。 　 まわりの評判やうわさ話を鵜吞みにする「言葉の思い込み」。 　 そして、偉い人や有名な人の言うことを信じてしまう「権威の思い込み」。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "おそらく、森鷗外を支配していたのはこんな「思い込み」でしょう。ベーコンが指摘した「権威の思い込み（劇場のイドラ）」です。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "ムチャ振りにはいくつか特徴があります。まず、ムチャだと思う時点で、勝手に決めてしまった「できないと思い込んでいること」に気づけます。そのような思い込みがあるから、はみ出している、という言葉が出てくるんです。 そして、ムチャ振りをされたということは、何かしら期待されているということです。「ひょっとしたら、あいつにあれをやらせたら面白いんじゃない？」と。新しい課題に気づき、解決法を考えるチャンスをもらったわけです。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "視覚というものの便利さと「暴力性」。もちろん、小さなもの、隠れているものを見落としてしまうことはある。それでも、大枠はわかっている。把握していると思い込んでしまっている。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}]}, {"id": 296, "label": "チーム運営", "freq": 5, "highlights": [{"text": "僕らの経験上、毎日４時間はみんな同じ時間に働いたほうがいい。そうすればコミュニケーションもうまくいくし、チームの一体感がでてくるからだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "リモートワークでは、オフィスで働く以上に、人のつながりが重要になってくる。距離を克服するためには、良質なコミュニケーションが不可欠だからだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "だから、チームの雰囲気にはつねに気をつけておいたほうがいい。ネガティブな人間がいると、チームの雰囲気は確実に悪くなる。リモートワークの環境なら、なおさら致命的だ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "また、休暇の申請も必要ない。いつでも好きなだけ休暇をとることが可能だ。社員にお願いしているのは３点だけ。（１）妥当な範囲内にとどめること、（２）カレンダーに予定を入れること、（３）チームに迷惑をかけないように調整すること。 　そうやって一人前の大人として扱えば、彼らもけっして無茶", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "グーグルによる「非常に効果的なマネージャーの８つの習慣（8 Habits Of Highly Effective Google Managers）」 １．優れたコーチになりなさい ２．チームに任せて、マイクロマネジメントしないこと ３．従業員の成功と幸せのために考えていることを表現しなさい ４．生産的かつ結果志向でいなさい ５．優れたコミュニケーションを取り、チームの話を聞きなさい ６．従業員のキャリア開発を支援しなさい ７．チームのための明確なビジョンと戦略を持ちなさい ８．キーとなる技術を持つことで、チームを助けることができるようにしなさい", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}]}, {"id": 297, "label": "ライフスタイル", "freq": 5, "highlights": [{"text": "アフターコロナは 地方分散の時代 になるでしょうから、飾らない、もっと自然に近い暮らしが主流になるかもしれません。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "商品がただ必要性に立脚しただけの〝モノ〟であることをやめ、持つ人のライフスタイルや価値観を表す〝ファッション〟へと転化していった、その大きな曲がり角が 80 年前後だったわけだ。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "それは私たちの生活から〝オン〟と〝オフ〟の区別が消えた、ということになると思う。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "少子化の一方で、空前のペット社会ができつつあるのだ。そうした〝ペット〟と〝リゾート〟の間に、私は強い連関を感じる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "宗教心の強い人が健康で長生きするのは、宗教が促進する、より保守的で健康的なライフスタイルのおかげなのだろうか。それは祈りの力のおかげだろうか。それとも、信心そのものにまつわるものが細胞レベルで私たちに影響を与えているのだろうか（ 26）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}]}, {"id": 298, "label": "自己欺瞞", "freq": 5, "highlights": [{"text": "いい仕事ができない。 　人生が 辛い。 　楽しくない。 　その結果として、人は飲酒やギャンブルと同じような目的でエンターテインメントに一時の救いを求めているのであって、エンターテインメントそのものは、結局「結果」でしかないことを悟った。", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "劣等感は努力や成長を 促すきっかけにもなりうるものです。たとえば、学歴に劣等感を持っていたとしても、そこから「わたしは学歴が低い。だからこそ、他人の何倍も努力しよう」と決心するのだとしたら、むしろ望ましい話です。 一方の 劣等コンプレックスとは、自らの劣等感をある種の言い訳に使いはじめた状態のこと を指します。具体的には「わたしは学歴が低いから、成功できない」と考える。あるいは「わたしは器量が悪いから、結婚できない」と考える。このように日常生活のなかで「Ａであるから、Ｂできない」という論理を振りかざすのは、もはや劣等感の 範疇 に収まりません。劣等コンプレックスです。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "アドラーは、 さまざまな口実を設けて人生のタスクを回避しようとする事態を指して、「人生の 嘘」と呼びました。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "ようするに、人は疎外されていると感じる痛みを自己調節しようとして、自らの認知能力を誤用する場合があるということだ。つまり、自分をこう見せたいという形に人生を脚色して、偽りのペルソナを作り出す。自己欺瞞としてよく知られる行為だ。必死にやれば、「私がそう言っているのだから、事実そうなのだ」と、自分に思い込ませられることがある。それでもなお、孤独感の生理的・心理的な影響は、害を及ぼさずにはおかない。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "こうした率直な対話から浮かび上がってくる会社の真の姿は、経営幹部が予想もしなかったものになるかもしれない。しかし、「自分たちには社会的使命を重視するカルチャーがある」と経営陣が思い込んでいる企業で、実はカネだけで動く傭兵のような姿勢に満ちていた、というケースは非常に多い。マネジャーは自社の真の企業文化を理解しておく必要がある。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 299, "label": "相互依存", "freq": 5, "highlights": [{"text": "ですが、 誰にも迷惑をかけない社会 とは、定義上、自分の存在が 誰からも必要とされない社会 です。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "社会神経科学が示すとおり、心と体を分かつ神秘的な境界などないばかりか、自分自身と他者の間にあるものだと、私たちがずっと決めてかかっていた境界も、かつて思われていたほど確固たるものではない。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "ダライ・ラマは「人間は社会的動物であり、社会の一員としてしか生きられない」と語った。その声は今でも僕の耳の奥で響いている。 　そう。僕らは社会なしに生きていけない。", "book_title": "経営リーダーのための社会システム論～構造的問題と僕らの未来～", "author": "宮台 真司、野田 智義"}, {"text": "アイドルの本質である「ファンに応援されることでアイドルが成長し、それを見守ることでファンも楽しい」という関係を〝純化〟させたのが地下アイドルではないかと私は考えています。 　それなので地下アイドルとファンの関係は、決して一方通行ではありません。普通の人間関係と同じように、喜びや悲しみや病みや楽しみが絡み合った、繊細で複雑なものなのです。 　地下アイドルは、メジャーアイドルへのカウンターカルチャーでもありません。インディーズ文化を面白いと感じ、そこにしか身を置けない女の子もファンも存在していて、地下アイドル文化はそういう人たちの受け皿にもなっています。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "これは取りも直さず、人間には社会性が必要ということです。自分にとって前述のような相手が必要であると同時に、自分も誰かにとってそういう存在でなければいけません。いつも自分が主役、自分が先生という立場に居続けていると、脳に問題があっても気づけず、裸の王様になってしまいます。意欲を保ち続けることも難しいでしょう。時には脇役になったり、悪役になったり、生徒になったりすることがとても大切です。 　そのために、まず、人との出会いを大切にして下さい。そして、一度つくった人間関係を簡単には壊さないようにして下さい。それをする努力の中で、脳は自然と鍛えられていきます。 　いろいろな役者がそろった舞台の上で、自分もいろいろな役割を演じつつ活動をマルチにし、豊かな人生を送りましょう。それが脳にとっていちばん大切なことです。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}]}, {"id": 300, "label": "物語論", "freq": 5, "highlights": [{"text": "「セカイ系」とは、アニメや漫画に関するサブカルチャー論でしばしば言及される物語形式の一つです。主人公たちの「私とあなた」の行動が、社会や国家といった枠組みを介することなくダイレクトに世界の運命を決定する──というストーリーラインのことです。 　 私の一挙手一投足がこの世界を救う。 　これがセカイ系の贈与のスローガンとなります。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "第一段階は「〈秩序〉の時代」です。そこでは現在の社会秩序が理想的なものと考えられ、秩序の 攪乱 は悪なる他者──秩序外部的存在──に起因すると見做されます。「〈秩序〉の時代」は日本では１９４５年から 60 年代まで続きます。例えば漫画や小説などで頻繁に表現されたのは「孤児の少年が活躍して秩序を乱す悪を退治する」という物語です。ところが 60 年代に入ると──特にオリンピック以降──物語が変わります。 　それを「〈未来〉の時代」と呼びます。そこには打って変わって「人間たちの秩序自体が悪」というモチーフが展開します。１９５３年のビキニ環礁水爆実験を踏まえ、 54 年『ゴジラ』が公開されます。ゴジラは水爆実験で突然変異を起こしたジュラ期の恐竜という設定です。つまりゴジラを生み出したのは人間なのです。ちなみに東京を踏み荒らすゴジラが皇居前で回れ右をして退却するので「南洋の英霊たちの化身」だとも解釈されてきました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "60 年代半ばからの円谷プロの「ウルトラ」シリーズもそうです。『ウルトラＱ』にも『ウルトラマン』にも『ウルトラセブン』にも絶対悪としての怪獣は出てきません。人間社会が生み出した悪だったり、人間の傲慢さに対する自然からの復讐だったりするのです。 　ウルトラマンにせよウルトラセブンにせよ、人間社会の中の勧善懲悪ヒーローではなく、人類よりも進化した未来的存在です。彼らは、人間たちの不完全さに呆れかえりながらも、人間たちを助けます。こうした「〈未来〉の時代」のサブカルチャーには、「現在の秩序はダメだが、遠い未来になれば良くなる」との想いが込められていることが分かります。でも「〈未来〉の時代」も 70 年代の半ばには終わり、「〈自己〉の時代」が始まります。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "ところがこの作品のポイントは、そうした「ハルマゲドンを背景とする救済物語」自体が自己現象に過ぎないことを描き出していたことです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "少年向きの読み物においても、物語のパターンが変化しました。「〈秩序〉の時代」には、社会を脅かす秩序の敵と戦うというパターンが主流でしたが、「〈未来〉の時代」には、未来や宇宙から来た「我々を超えた存在（overlord）」が、我々を社会の不合理から救い出すというパターンが主流になりました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 301, "label": "表現力", "freq": 5, "highlights": [{"text": "人を説得する原則⓫　 演出を考える。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "それに、 紙に書くほうが可能性が広がる。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "「５ＧＢのＭＰ３プレイヤー」は単なるスペック情報ですが、「一〇〇〇曲をポケットに」とはプロダクトの体験について語った言葉です。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "ビジョナリーワードの三つの条件として「 解像度」「 目的地までの距離」「 風景の魅力」が必要だと言うことをすでに述べました。 言葉にすることは、未来から届く絵ハガキをつくること。そう意識しながら、頭の中の曖昧な風景を、解像度を上げた言葉で具体化したり、もっと魅力的な景色が浮かぶ単語を探したりと試行錯誤しながら、紙にたくさんの言葉を産み落とす。地味ですが、それが最も本質的で、建設的なやり方です。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "アメリカの２０１１年第１位はアデルです。彼女は当時 23 歳で、ＡＫＢにいてもいい年齢だと思いますが、このアデルとＡＫＢの表現力の差が、僕は国力や表現を通じたその国の現状に出て来ていると思います。アメリカの現実がいかに厳しく、しかし真面目に対応し、日本がいかに不真面目でその場凌ぎなのかがよくわかります。また、ブラジルのトップ１はミッシェル・テオの『Aise eu te pego』ですので、国の勢いが理解できます。間違いなく、今僕にとって「楽しい場所」は、ミッシェル・テオが売れている国なのは間違いありません。それは、南欧や南米です。", "book_title": "白本", "author": "高城剛"}]}, {"id": 302, "label": "仏教", "freq": 5, "highlights": [{"text": "そもそも仏教は、キリスト教やイスラム教のような一神教ではなく、世界的に広がっている宗教のなかではもっとも柔軟性に富む宗教といえる。インド仏教、中国仏教、日本仏教という具合に、それぞれの国、地域で独自の発展、あるいは変貌を遂げても、それでよし、なのだ。 　多少、もとの形とは変わっても、仏の教えが広まるのであれば、それを許容するという懐の深さが仏教の側にもあったのだ。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "仏教は、日本伝来直後こそ、日本固有の宗教だった神道と反目し、朝廷内の勢力争いともからんだ宗教的抗争に発展したが、朝廷が仏教を国教として認めると、日本人全般に受け入れられるようになった。 　ただし、その仏教は、オリジナルな形がそのまま信仰されたわけではなく、日本風に大胆にアレンジされ、独自の日本仏教として発展してきた。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "日本に儒教が伝わったのは、四〇五年とみられるが、広く知られるきっかけとなったのは、五一三年、 百済 から 五経博士（五経に通じる学者のこと）が来日したこととみられる。仏教伝来とほぼ同時期だ。 　その後、仏教が聖徳太子の「仏教 興隆 の 詔」（五九四年）によって、国家の公式イデオロギーになったのはよく知られているとおりである。 　ところが、聖徳太子が取り入れたのは、仏教の思想だけではなかった。聖徳太子は、六〇三年に「 冠位十二階の制」を、六〇四年に「憲法十七条」を制定しているが、そのいずれにも儒教の思想は色濃く反映されている。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "この世では、生物も無生物も、すべてがともに依存して生きていかなければならないが、人間は自己の存在に執着し、矛盾や誤解、抗争を生み出す。それを乗り越えるには、執着を捨てて、悟りを開かなければならない。それが、苦しみの多い輪廻転生の輪から抜け出す唯一の方法である――ということになる。 　仏教では、この真理に目覚めた人を「ブッダ（ 覚者）」とよぶ。庶民にも、こうした真理に目覚めれば、ブッダとなれる可能性があるのだから、それに近づくよう努力することが大事だと、釈迦は説いた。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "日本のような大乗仏教の国では、釈迦像のほかにも多種多様な仏像があるが、タイやミャンマーなどの 上座部 仏教（南伝仏教）の国では、現在も仏像はほとんど釈迦如来像しかつくられていない。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}]}, {"id": 303, "label": "文化と伝統", "freq": 5, "highlights": [{"text": "死者が葬儀の権利をもたないと指摘されています。これは、コロナ危機の中で死者が葬儀を経ることなく埋葬されていった事態を指しています。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "です。それを明確に特定することは困難と言わねばなりませんが、敢えて言うならば、それは人間が人間として歴史の中で培ってきた文化であり、たとえば宗教などはその表現の一つであると言えるでしょう。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "教会こそは、単なる生存には還元できない、人間が人間として歴史の中で培ってきた文化の価値の守り手ではなかったのか、というわけです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "死んだ者たちへの敬意の喪失は、歴史への畏怖の喪失へとつながり、これまでに先人たちが積み上げてきた価値への無関心へとつながるのではないでしょうか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "そうなってしまった時、果たして政治など可能でしょうか。これまでに人間が築きあげてきた価値への敬意なくして政治など可能でしょうか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}]}, {"id": 304, "label": "歴史意識", "freq": 5, "highlights": [{"text": "です。それを明確に特定することは困難と言わねばなりませんが、敢えて言うならば、それは人間が人間として歴史の中で培ってきた文化であり、たとえば宗教などはその表現の一つであると言えるでしょう。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "死んだ者たちへの敬意の喪失は、歴史への畏怖の喪失へとつながり、これまでに先人たちが積み上げてきた価値への無関心へとつながるのではないでしょうか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "そうなってしまった時、果たして政治など可能でしょうか。これまでに人間が築きあげてきた価値への敬意なくして政治など可能でしょうか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "二〇世紀を経験した我々は、人間が大義とみなされたもののために死ぬことを強制された事実を知っています。それには何としてでも対抗しなければならない。そんなことがあってはなりません。けれども、だからといって、生存のみを価値として認める社会が当然のこととして受け入れられてしまってよいのか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "ある意味では、哲学の出発点には死刑がある、ソクラテスの死刑の衝撃によって哲学は始まった、", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}]}, {"id": 305, "label": "時代区分", "freq": 5, "highlights": [{"text": "第一段階は「〈秩序〉の時代」です。そこでは現在の社会秩序が理想的なものと考えられ、秩序の 攪乱 は悪なる他者──秩序外部的存在──に起因すると見做されます。「〈秩序〉の時代」は日本では１９４５年から 60 年代まで続きます。例えば漫画や小説などで頻繁に表現されたのは「孤児の少年が活躍して秩序を乱す悪を退治する」という物語です。ところが 60 年代に入ると──特にオリンピック以降──物語が変わります。 　それを「〈未来〉の時代」と呼びます。そこには打って変わって「人間たちの秩序自体が悪」というモチーフが展開します。１９５３年のビキニ環礁水爆実験を踏まえ、 54 年『ゴジラ』が公開されます。ゴジラは水爆実験で突然変異を起こしたジュラ期の恐竜という設定です。つまりゴジラを生み出したのは人間なのです。ちなみに東京を踏み荒らすゴジラが皇居前で回れ右をして退却するので「南洋の英霊たちの化身」だとも解釈されてきました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "60 年代半ばからの円谷プロの「ウルトラ」シリーズもそうです。『ウルトラＱ』にも『ウルトラマン』にも『ウルトラセブン』にも絶対悪としての怪獣は出てきません。人間社会が生み出した悪だったり、人間の傲慢さに対する自然からの復讐だったりするのです。 　ウルトラマンにせよウルトラセブンにせよ、人間社会の中の勧善懲悪ヒーローではなく、人類よりも進化した未来的存在です。彼らは、人間たちの不完全さに呆れかえりながらも、人間たちを助けます。こうした「〈未来〉の時代」のサブカルチャーには、「現在の秩序はダメだが、遠い未来になれば良くなる」との想いが込められていることが分かります。でも「〈未来〉の時代」も 70 年代の半ばには終わり、「〈自己〉の時代」が始まります。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "見 田 宗 介 図式（↓ 参照） の修正版」を使う必要があります。見田宗介によれば、戦後のサブカルチャーは、「理想の時代」（敗戦から１９６０年）から「夢の時代」（ 60 年から 75 年）を経て「虚構の時代」（ 75 年以降）に至ります。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "「〈秩序〉の時代」には、家の秩序から国家の秩序へと繋がる「今ここ（now-here）」が肯定されがちでしたが、「〈未来〉の時代」には、未来から見た不合理として「今ここ」が否定されがちでした。実際、明るい未来（no-where）を夢見た１９６０年代は、公害や、薬害や、過疎や、家族蒸発など、否定的なニュースが溢れていた時代でもありました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "少年向きの読み物においても、物語のパターンが変化しました。「〈秩序〉の時代」には、社会を脅かす秩序の敵と戦うというパターンが主流でしたが、「〈未来〉の時代」には、未来や宇宙から来た「我々を超えた存在（overlord）」が、我々を社会の不合理から救い出すというパターンが主流になりました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 306, "label": "自己現象", "freq": 5, "highlights": [{"text": "ところがこの作品のポイントは、そうした「ハルマゲドンを背景とする救済物語」自体が自己現象に過ぎないことを描き出していたことです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "この段階で学問ですら自己現象になっていたのです。『終わりなき日常を生きろ』で震災", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "例えば「ネトウヨ」と呼ばれる人たちは、自分らは愛国の営みをしていると思っているのですが、周囲の多くは小林よしのりさんが喝破したように、 抑鬱 的な思いを抱えた人たちがカタルシスを得るための情緒的な噴き上がりのネタとして韓流ドラマなどを持ち出しているだけの、滑稽な営みだと感じます。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "さて、ティーパーティー運動が表明するイデオロギーは米国における草の根右翼のトラディショナルなものですが、実態は失業率上昇で 鬱屈 を抱えた若者たちの感情的ハケ口として政治活動が機能しているのではないかと、当の本国で言われてきました。そして２０１１年のウォール街占拠運動も、イギオロギー自体は富裕層優遇打倒という左翼トラディショナルなものですが、実態はやはり失業率上昇で鬱屈を抱えた若い世代の感情的ハケ口なのだと本国で評されています。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "立場を問わず、あらゆる文化現象や政治現象が自己現象として受け取られてしまうという現実があるのです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 307, "label": "感情論", "freq": 5, "highlights": [{"text": "例えば「ネトウヨ」と呼ばれる人たちは、自分らは愛国の営みをしていると思っているのですが、周囲の多くは小林よしのりさんが喝破したように、 抑鬱 的な思いを抱えた人たちがカタルシスを得るための情緒的な噴き上がりのネタとして韓流ドラマなどを持ち出しているだけの、滑稽な営みだと感じます。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "さて、ティーパーティー運動が表明するイデオロギーは米国における草の根右翼のトラディショナルなものですが、実態は失業率上昇で 鬱屈 を抱えた若者たちの感情的ハケ口として政治活動が機能しているのではないかと、当の本国で言われてきました。そして２０１１年のウォール街占拠運動も、イギオロギー自体は富裕層優遇打倒という左翼トラディショナルなものですが、実態はやはり失業率上昇で鬱屈を抱えた若い世代の感情的ハケ口なのだと本国で評されています。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "最も大事なもの「今の自分の気持ち」 　この「自分の気持ちを大切にする」というのは、現代の若者を語る時の重要なキーワードです。 　恋愛も「相手とうまくいくか」よりも「自分の好き、という気持ちを大切にしたい」と考えています。だから、その気持ちを守るために現実の恋愛が破綻することも辞しません。 　ある意味、すごく純真なのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "エコロジー問題に関するみんなの考え方の変化を見ると、明らかに科学的思想がマイナーなものになってきたというのが分かります。 　このような考え方は、明らかにある種の「あきらめ」という感情の上に成り立っています。科学的・合理的解決法に何も期待しないからこそ、心情的な解決法を採るのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "まあ核の話を「ちょっとした失言」なんて言うと、また青筋立てて怒り出す人がいるかもしれない。「被害者感情を踏みにじる発言」だ、と。現実の問題より、人の気持ちを踏みにじるとか、何を言った言わないということの方が、よっぽど問題になるというのが日本という国の特徴なのかもしれない。", "book_title": "超思考", "author": "北野武"}]}, {"id": 308, "label": "現代性", "freq": 5, "highlights": [{"text": "立場を問わず、あらゆる文化現象や政治現象が自己現象として受け取られてしまうという現実があるのです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "最も大事なもの「今の自分の気持ち」 　この「自分の気持ちを大切にする」というのは、現代の若者を語る時の重要なキーワードです。 　恋愛も「相手とうまくいくか」よりも「自分の好き、という気持ちを大切にしたい」と考えています。だから、その気持ちを守るために現実の恋愛が破綻することも辞しません。 　ある意味、すごく純真なのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "「唯一無二の自分」を大切にするという点で、最先端にいる若者たちはアマチュア活動のような「非営利活動」に対して熱心です。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "しかし現代は、モノ不足でモノそのものに関心がいかず、科学よりも精神世界や人間関係に興味がいく世界です。これら「産業社会用カリキュラム」は、すっかり的外れになってしまいました。 　だからこそ、高校や大学を卒業してから、またアニメーションスクールやデザイン学校といった芸術系の専門学校に入り直す人が、大勢出てしまうのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "彼らの目的は「自分を豊かにする」ことです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 309, "label": "言語論", "freq": 5, "highlights": [{"text": "カントの場合、人間の思考はそもそもいくつかの抽象的なルールによって条件づけられていると考える。それが一九世紀末あたりから、人間の思考や振る舞いを条件づけているのは、歴史的に形成された言語だと捉えるようになったということですね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "動物と人間を言語で分けるのはよくある考え方です。それで、いったい人間の言語能力、あるいは人間の言語能力を可能にするような認知能力が進化的にどこから始まったかというと、はっきりわからないわけですよね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "だがそれは歴史的に始まった。でも、人間が存在する以上、絶対的な先行的条件として言語がある。とすると、アガンベンは、人間が他の存在者から区別されるという、その区別の仕方自体が終わったということを言っていることになりませんか。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "二〇世紀には人間が言語に規定された存在であるというのは哲学的な前提だった。言語は人間がそこから抜け出せないくびきとすら考えられていた。けれども、現代ではむしろ言語のほうが退却してそのくびきから解放されてしまった感がある。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "つまり言語というのは、直接的満足の延期であり、もっと簡単に言うと我慢なんですよ。その直接的満足の延期が、メタファーの存在に通じている。何か言い足りていない、真理に到達していないという不満が言語活動にはあって、その不満の周りでさまざまな言葉をああでもない、こうでもないと展開することによって、豊かな言語態が成立するわけです。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 310, "label": "長期戦略", "freq": 5, "highlights": [{"text": "この何年も、ザッポスの成長の一番の原動力となっているのがリピート顧客とクチコミです。広告にはほとんど費用をかけず、その費用をカスタマー・サービスと顧客体験に投資し、私たちに代わって顧客にクチコミでマーケティングを担ってもらおうというのが私たちの哲学なのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "一般に、マーケティング部門がマーケティングＲＯＩを計算する際、顧客の生涯価値を一定にして考えます。私たちは、顧客の生涯価値を流動的なものと見なしており、あらゆるやり取りを通して顧客の心の中に私たちのブランドとのよりポジティブな絆を作り出せれば、顧客の生涯価値は向上できると考えています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "費用をかけるだけでは自分が望むようなブランドを構築できないとしたら、それでは企業はどうすればいいのでしょうか。 長期的にブランドを構築するための最善の方法とは何でしょうか。 一言で言えば、企業文化です。 ザッポスでは、企業文化がきちんと設定できていれば、素晴らしいカスタマー・サービスも、長期にわたる素晴らしいブランド構築も、情熱的な社員や顧客といったそのほか大部分のことも、自然に始まると考えています。 私たちは、会社の文化と会社のブランドは本質的に一枚のコインの表と裏だと信じているのです。ブランドは初めは文化に後れを取るかもしれませんが、いつかは追いつきます。 企業文化こそがブランドなのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ザッポスにおける私たちの哲学は、長期的な利得が相応にあると信じられるなら、（売上げや利益が減少することも含めて） 短期的な犠牲は厭わないというものです。企業文化を守り、コア・バリューに忠実であることには、長期的な利得があるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "アマゾンの素晴らしい点のひとつは、まさにザッポスでしているように、彼らがとても長期的に考えるという点です。パートナーや投資家とは、非常に長期的に考えるという点で一致することが滅多にありません。私たちは、アマゾンもザッポスもこの同じ理念を共有しているとわかり、非常にラッキーだと感じ、興奮しています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}];

      sliderYear = minYear; slider.value = minYear;
      document.getElementById("year-val").textContent = minYear;
    }
    this.textContent = "⏸ Pause";
    playInterval = setInterval(() => {
      if (sliderYear >= maxYear) {
        clearInterval(playInterval); playInterval = null;
        document.getElementById("play-btn").textContent = "▶ Play";
        return;
      }
      sliderYear++; slider.value = sliderYear;
      document.getElementById("year-val").textContent = sliderYear;
      updateGraph();
    }, 900);
  }
});

// Book filter
let currentFilter = "";
const filterSelect = d3.select("#book-filter");
bookTitles.forEach(t => filterSelect.append("option").attr("value", t).text(t));
filterSelect.on("change", function() {
  currentFilter = this.value;
  document.getElementById("year-control").classList.toggle("hidden", !!currentFilter);
  closeSidebar();
  updateGraph();
});

// Zoom
const zoom = d3.zoom().scaleExtent([0.1, 6])
  .on("zoom", e => gContainer.attr("transform", e.transform));
graphSvg.call(zoom);

let currentSim = null;
let isDragging = false;

function buildData() {
  let filteredNodes, filteredEdges;

  if (currentFilter) {
    filteredNodes = [];
    allNodes.forEach(n => {
      const hl = n.highlights.filter(h => h.book_title === currentFilter);
      if (hl.length > 0) filteredNodes.push({ ...n, freq: hl.length, highlights: hl });
    });
  } else {
    const validBooks = new Set(
      Object.entries(bookYearMap).filter(([, yr]) => yr <= sliderYear).map(([t]) => t)
    );
    filteredNodes = [];
    allNodes.forEach(n => {
      const hl = n.highlights.filter(h => validBooks.has(h.book_title));
      if (hl.length > 0) filteredNodes.push({ ...n, freq: hl.length, highlights: hl });
    });
  }

  const ids = new Set(filteredNodes.map(n => n.id));
  filteredEdges = allEdges
    .filter(e => ids.has(typeof e.source === "object" ? e.source.id : e.source) &&
                 ids.has(typeof e.target === "object" ? e.target.id : e.target))
    .map(e => ({
      source: typeof e.source === "object" ? e.source.id : e.source,
      target: typeof e.target === "object" ? e.target.id : e.target,
      weight: e.weight,
    }));

  return { nodes: filteredNodes, edges: filteredEdges };
}

function updateGraph() {
  if (currentSim) currentSim.stop();
  const { nodes, edges } = buildData();
  const svgEl = document.getElementById("graph-svg");
  const w = svgEl.clientWidth, h = svgEl.clientHeight;

  d3.select("#stats").text(nodes.length + " concepts / " + edges.length + " connections");
  linkG.selectAll("*").remove();
  nodeG.selectAll("*").remove();
  if (!nodes.length) return;

  const lMax = d3.max(nodes, d => d.freq) || 1;
  const rScale = d3.scaleSqrt().domain([1, lMax]).range([8, 42]);
  const cScale = d3.scaleSequential(d3.interpolatePlasma).domain([0, lMax * 0.85]);

  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(edges).id(d => d.id).distance(90).strength(d => Math.min(d.weight * 0.06, 0.7)))
    .force("charge", d3.forceManyBody().strength(d => -rScale(d.freq) * 10))
    .force("center", d3.forceCenter(w / 2, h / 2))
    .force("collision", d3.forceCollide().radius(d => rScale(d.freq) + 6))
    .force("x", d3.forceX(w / 2).strength(0.04))
    .force("y", d3.forceY(h / 2).strength(0.04))
    .alphaDecay(0.028);
  currentSim = sim;

  const link = linkG.selectAll("line").data(edges).enter().append("line")
    .attr("class", "link").attr("stroke", "#222244")
    .attr("stroke-width", d => Math.max(1, Math.min(d.weight * 0.6, 4)));

  const node = nodeG.selectAll("g").data(nodes).enter().append("g").attr("class", "node");
  node.append("circle").attr("r", d => rScale(d.freq)).attr("fill", d => cScale(d.freq));
  node.append("text").text(d => d.label)
    .attr("dy", d => rScale(d.freq) + 13)
    .style("font-size", d => Math.max(10, Math.min(13, 8 + d.freq * 0.4)) + "px");

  node.call(d3.drag()
    .on("start", (ev, d) => { isDragging = false; if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (ev, d) => { isDragging = true; d.fx = ev.x; d.fy = ev.y; })
    .on("end", (ev, d) => {
      if (!ev.active) sim.alphaTarget(0);
      d.fx = null; d.fy = null;
      if (!isDragging) openSidebar(d, node, edges);
      isDragging = false;
    })
  );

  node.on("mouseover", (ev, d) => {
    const conn = new Set([d.id]);
    edges.forEach(e => {
      const s = typeof e.source === "object" ? e.source.id : e.source;
      const t = typeof e.target === "object" ? e.target.id : e.target;
      if (s === d.id) conn.add(t);
      if (t === d.id) conn.add(s);
    });
    node.classed("dimmed", n => !conn.has(n.id));
    link.classed("dimmed", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return s !== d.id && t !== d.id;
    });
    link.classed("highlighted", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return s === d.id || t === d.id;
    });
  });
  node.on("mouseout", () => {
    node.classed("dimmed", false);
    link.classed("dimmed", false);
    link.classed("highlighted", false);
  });

  sim.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

function openSidebar(d, nodeEl, edges) {
  nodeEl.classed("selected", n => n.id === d.id);
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebar-title").textContent = d.label;
  document.getElementById("sidebar-freq").textContent = d.freq + " highlights";
  const books = new Set(d.highlights.map(h => h.book_title));
  document.getElementById("hl-count").textContent =
    d.highlights.length + " highlights from " + books.size + " books";
  document.getElementById("sidebar-content").innerHTML = d.highlights.map(h => `
    <div class="hl-card">
      <div class="book">${h.book_title} — ${h.author}</div>
      <div class="txt">${h.text}</div>
    </div>
  `).join("");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  nodeG.selectAll(".node").classed("selected", false);
}
graphSvg.on("click", e => { if (e.target === graphSvg.node()) closeSidebar(); });

updateGraph();

// ===== STREAMGRAPH =====
function drawStreamGraph() {
  const wrapper = document.getElementById("stream-wrapper");
  const W = wrapper.clientWidth, H = wrapper.clientHeight;
  const m = { top: 30, right: 20, bottom: 44, left: 44 };
  const iW = W - m.left - m.right, iH = H - m.top - m.bottom;

  const svgEl = d3.select("#stream-svg").attr("width", W).attr("height", H);
  const g = svgEl.append("g").attr("transform", `translate(${m.left},${m.top})`);

  const tags = streamInfo.tags, data = streamInfo.data;
  if (!data.length || !tags.length) {
    g.append("text").attr("x", iW/2).attr("y", iH/2)
      .attr("text-anchor", "middle").attr("fill", "#446").text("日付データがありません");
    return;
  }

  const stack = d3.stack().keys(tags)
    .offset(d3.stackOffsetWiggle).order(d3.stackOrderInsideOut);
  const series = stack(data);

  const xScale = d3.scaleLinear().domain(d3.extent(data, d => d.year)).range([0, iW]);
  const allV = series.flatMap(s => s.flatMap(d => [d[0], d[1]]));
  const yScale = d3.scaleLinear().domain([d3.min(allV), d3.max(allV)]).range([iH, 0]);

  const color = i => d3.interpolateSinebow((i + 0.3) / tags.length);

  const area = d3.area()
    .x((d, i) => xScale(data[i].year))
    .y0(d => yScale(d[0])).y1(d => yScale(d[1]))
    .curve(d3.curveBasis);

  const tooltip = document.getElementById("stream-tooltip");
  const infoBar = document.getElementById("stream-info");

  const paths = g.selectAll(".stream-path").data(series).enter().append("path")
    .attr("class", "stream-path").attr("d", area)
    .attr("fill", (d, i) => color(i)).attr("opacity", 0.82)
    .on("mousemove", function(event, d) {
      const [mx] = d3.pointer(event, g.node());
      const yr = Math.round(xScale.invert(mx));
      const row = data.find(r => r.year === yr) || data[data.length - 1];
      const count = row[d.key] || 0;
      const rect = wrapper.getBoundingClientRect();
      tooltip.style.display = "block";
      tooltip.style.left = Math.min(event.clientX - rect.left + 16, W - 180) + "px";
      tooltip.style.top = Math.max(event.clientY - rect.top - 60, 8) + "px";
      tooltip.innerHTML = `<div class="st-tag">${d.key}</div><div class="st-year">${yr}年</div><div class="st-count">${count} highlights</div>`;
      paths.classed("dimmed", p => p.key !== d.key);
      infoBar.textContent = d.key + " — " + yr + "年: " + count + " highlights";
    })
    .on("mouseleave", () => {
      tooltip.style.display = "none";
      paths.classed("dimmed", false);
      infoBar.textContent = "ストリームをホバーするとタグの詳細が表示されます";
    });

  // X axis
  g.append("g").attr("class", "s-axis").attr("transform", `translate(0,${iH})`)
    .call(d3.axisBottom(xScale).tickFormat(d3.format("d")).ticks(data.length));

  // Stream labels at peak width
  series.forEach((s, i) => {
    let maxHt = 0, maxI = 0;
    s.forEach((d, j) => {
      const ht = Math.abs(yScale(d[0]) - yScale(d[1]));
      if (ht > maxHt) { maxHt = ht; maxI = j; }
    });
    if (maxHt < 22) return;
    const midY = (yScale(s[maxI][0]) + yScale(s[maxI][1])) / 2;
    g.append("text")
      .attr("x", xScale(data[maxI].year)).attr("y", midY)
      .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
      .attr("fill", "#fff").attr("opacity", 0.8)
      .style("font-size", "11px").style("pointer-events", "none")
      .style("text-shadow", "0 1px 4px rgba(0,0,0,0.95)")
      .text(s.key);
  });
}
