メッセンジャーとなり、他者へと何かを手渡す使命を帯びるのです。 　使命感という幸福を手にすることができるのです。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "鷹山は子供らに「大きな使命を忘れて、自分の利欲の犠牲にしないため」、「貧しい人々への思いやり」を養いました。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "一番簡単なのが、「自分にとって一番楽しいことはなにか？」を考えてみることです。それを欲望と一緒にしてはいけません。まずは、欲望を除いて考え、それをもっと考えたり、追求したり、実践したりしていると、きっと次の壁にぶつかります。そこで、「自分にとって、これはすべきことなのか？」のような使命というか、「自分とはなんなのか？」を考えるようになると思います。答えは見つからないかもしれません。それで、いいのです。自分としっかり話して、自分の奥の奥の奥と対面することが大事なのです。他人にどう見られていようと。", "book_title": "白本", "author": "高城剛"}, {"text": "それでも「ツアー・オブ・デューティ」という比喩的な表現を使うのは、軍と民間企業のいずれのコミットメント期間にも共通する重要なコンセプトを伝えることができるからだ。それは「 ミッションを期限内に成し遂げることに専念し、そこに個人の信用をかけている」という考え方だ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 164, "label": "本質理解", "freq": 7, "highlights": [{"text": "グロースの本質は〝シーンの創出〟にある と、私は思います。 　やみくもに数字を追うのではなく、どのような状況を現出させたいかをまず考える。 　そして、ゴールといえるその地点に向かっていくための道筋を描き出します。 　いくつか道筋がある場合には、そのなかでの最短ルートを選び出します。 　難関にぶつかったときには、なんとかそれを乗り越えるか、新たなルートを考えます。そうしてイメージしていたシーンを現実にしていく作業こそがグロースハックです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "重要なのはノウハウや知識を覚えることではなく、過去に経験のない場面に遭遇したときにも、自分で判断できる独自の基準や肌感覚を持つことです。本書が勧めるマーケット感覚も、マーケティングの細かいノウハウではありません。それは、市場と向き合う経験から得られる、市場に対する嗅覚や根源的な理解力です。そしてその嗅覚の中心が、本章で説明する「価値を見極める力」なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "マーケティング同様、マネタイズは方法論でありノウハウです。一方、価値を見極めるのは、もっと本質的な能力です。たとえ今は価格付けされていなくても、もしくは、まったく儲かっていなくても、それに価値があるのかどうか、あるとすればどんな価値なのか、誰がその価値を最も高く評価するのか、そういったことが、（最初は論理的にではなくてもいいので）直感的に理解できるようになることが重要なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "だから、もし、皆さんが、「螺旋的発展」を目撃したいのならば、 　申し上げることは、ただ一つ。 　「書を捨てよ、街に出よ」 　そして、「タウン・ウォッチング」をされることを勧めます。 　皆さんは、その街角に、様々な形で「便利になった懐かしいもの」を発見するでしょう。 　そのとき、深く考えていただきたい。 　 何が「懐かしい」のか。 　 何が「便利になった」のか。 　そのことを考えるとき、 　きっと、世の中の変化の「本質」が分かるでしょう。 　そして、世の中の変化の「未来」が見えるでしょう。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "この「シンプルで美しい」というのは、私は仕事をやる上でとても大事なキーワードだと思っている。難しいことをさも難しく話すのは誰でもできるが、誰が聞いてもわかるようにかみ砕いて話すのは、実は相当に難しい。話の核心をきちんと理解し、誰が聞いても心にストンと落ちるような平易で簡潔な言葉に置き換える必要があるからだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "あるいは商品開発にしても、使い手のことをほんとうに考えた優れた設計というのは、驚くほどムダのない、実にシンプルで美しい構成になっている。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "つまり、成すべきことの核心や本質が理解できていないと、シンプルで美しい経営方針も打ち出せないし、報告書も書けないし、商品設計もできないのである。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}]}, {"id": 165, "label": "幸福", "freq": 7, "highlights": [{"text": "家族や仲間でゲームを楽しむというしあわせな時間のイメージは、私にとっては「鍋」という言葉に凝縮されていました。 それは、今でも思い出すたびに心がほっこりするほど大切な、私のプライベートなビジョンでした。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "・コンセプトは、ものづくりの一部 ・コンセプトは、世界を良くする方法 ・コンセプトは、あなたがしあわせに生きられる方法 ・コンセプトは、母国語を用いた文字 20 字程度の言葉 ・コンセプトは、未知の良さに形を与えたもの ・コンセプトは、ビジョンの集合体から生み出される ・コンセプトは、アイテムの集合体によって伝えられる ・コンセプトは、何を用いて、何をしたいか", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "単に自分の人生をより輝かせ、もっと幸せに、そして末永く良いものにしていくためにどうするのか、という生きていくための哲学の部分がドーンと欠けていると思うんです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "川上 　人間の本能って、それこそ彼女がほしいとか、もっと寝たいとか、いっぱい食べたいとか、いろんな方向に向かうものなんです。そこには、基本的に論理性はない。それが自然なんです。だから論理って、人間の感情と離れた結論を出すし、突き詰めると人間の敵になる。これは本能的にみんな感じていることなんじゃないですかね。 ──　みんなを熱狂させるエンターテインメントなんかも、完全に本能よりですよね。 川上 　はい。でも難しいことに、今の世界は論理で動いていますからね。論理のことを知らないと、結局不幸になるのも事実です。 ──　特にお金の周辺は論理で武装されていますよね。 川上 　そうですよね。だから、人間はすでに論理の奴隷なんですよ。そこに背を向けるということは、単純にはできない。論理を利用しながら、なおかつ背を向けるということをしないと。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "私が言っているのは、社員の健康のことだけでなく、長い目で見た彼らの生産性や幸福のことだ。こうした投資は、後々きちんと利益になって返ってくる。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "答えはアダム・グラントが知っている。『ＧＩＶＥ &amp; ＴＡＫＥ　 「与える人」こそ成功する時代』でグラントは、目的には幸福だけでなく生産性も増進する力があると書いている ★ 50。多くの卓見がそうであるように、彼の答えは、指摘されてみれば当たり前のように思える。大いに驚かされるのは、その影響の大きさだ。", "book_title": "ワーク・ルールズ！―君の生き方とリーダーシップを変える", "author": "ラズロ・ボック、鬼澤 忍、矢羽野 薫"}, {"text": "教養とは誤配に気づくこと 　端的に言えば、教養とは、誤配に気づくことです。 　どれだけ多くを知っていたとしても、それだけでは教養とは言えません。 　手に入れた知識や知見そのものが贈与であることに気づき、そしてその知見から世界を眺めたとき、いかに世界が贈与に満ちているかを悟った人を、教養ある人と呼ぶのです。 　そしてその人はメッセンジャーとなり、他者へと何かを手渡す使命を帯びるのです。 　使命感という幸福を手にすることができるのです。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}]}, {"id": 166, "label": "国際関係", "freq": 7, "highlights": [{"text": "当初はフランス政府もゴーン前会長を庇うのかなと思ったら、実は税額の高いフランスで所得を計上せず収入や資産を逃避させやすいオランダで納税していたことが発覚すると、フランス人をして「ゴーン前会長？　あれはレバノン人だから」と見切らしめてしまうというわけです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "私はインド人と食事をした際に「神道と日本人」について色々と聞かれた経験がありますが、「よく知ってるね」と言うと、「インターネットで調べたから、色々と聞こうと思って」という答えが返ってきました。やはり相手に敬意を持って、 相手の国の概要、歴史、最近の主要なニュースを事前にリサーチしていく のが基本だと思います。ここでも外務省のサイトにあるデータや「The World Factbook」が役立ちます。 　一方でこれまた当然ですが、普段から自国、日本の文化について知り、考えていないと話すことができません。これもこうした会食の席が多い人は、事前に調べて英語で話せるようにしておくべきです。日鉄住金総研の出している『日本』（学生社）という本は、あらゆる日本の事象について英訳が載っていて便利です。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "いま欧米では、時価会計、減損会計を見直そうという動きが出はじめている。時価会計を厳格に適用すると、サブプライム関連の商品に対して大量に投資している金融機関の損失額がさらに膨らむからというのだが、日本が厳しい状況のときには時価会計を押しつけておいて、自分たちの都合が悪くなればやめるという、そんな勝手な話があるだろうか。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "ＴＰＰの本質は、農業問題でも医療や保険でもなく、また、日本ｖｓ米国でもなく、日本の既得権益を守りたい人たちｖｓ日本の既得権益を壊したいと思っている人たちだと思います。つまり、国内の問題なんです。実際、米国のトップニュースにＴＰＰがあがることは、ほぼありません。", "book_title": "白本", "author": "高城剛"}, {"text": "東京は「スパイ天国」とよく言われますが、実態はどうなんですか。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "イスラエルの北朝鮮専門家がよく言うのは、なぜ平壌に日本政府代表部を開設しないのか、ということ。高麗ホテルで寝ていれば、向こうからアプローチしてくる。それで金正日と直のチャンネルが出来るじゃないか。情報のための情報、調査のための調査はもういい。何でも知って安心するのはソ連のＫＧＢといっしょだぞ、本当の仕事はその先にあるんだと皮肉をこめて言われました。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "アメリカの占領政策──３Ｒ、５Ｄ、３Ｓ政策", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 167, "label": "未来予測", "freq": 7, "highlights": [{"text": "もうこれ以上は国庫負担では賄いきれないので、地域や家庭に担ってもらう」という筋道です。いや、これはもうどうしようもないのだと思います。政策面でいくら頑張っても、またメディアがどう問題を切り直しても、もう「すでに起こった未来」を回避することはなかなか不可能だということの証左でもあります。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "コミュニティをつくることに成功すれば、その中では楽園ができる。でもインターネットにつながること自体はマイナスでしかない。ただ、インターネットが多様性を破壊して、世界が完全に均質になっていくのかというと、そこはみんなが一生懸命抵抗するでしょうね。そうして、細かい世界をつくろうとするっていうのが、これから起こることだと思います。お山をどうつくるのか。それが次のネットのテーマですよ。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "だから、もし、皆さんが、「螺旋的発展」を目撃したいのならば、 　申し上げることは、ただ一つ。 　「書を捨てよ、街に出よ」 　そして、「タウン・ウォッチング」をされることを勧めます。 　皆さんは、その街角に、様々な形で「便利になった懐かしいもの」を発見するでしょう。 　そのとき、深く考えていただきたい。 　 何が「懐かしい」のか。 　 何が「便利になった」のか。 　そのことを考えるとき、 　きっと、世の中の変化の「本質」が分かるでしょう。 　そして、世の中の変化の「未来」が見えるでしょう。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "このラプラスの悪魔という概念は、その後量子力学の登場によって否定された。量子力学では、電子だとか素粒子だとかそういうミクロのレベルでは、粒子は確率的にしか存在しない（あるかないかが１か０かでは決められなくて、「２分の１ある」みたいな感じでしか存在しない）ことが明らかにされたのだ。どうもよく分かんない話だけどそういうものらしい。あるかないかがはっきり分からないとなるとラプラスの悪魔でも今の状態の次にどんな状態が来るのかが予測できないから、未来はやっぱり予測不可能だということになった。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "ところが25年以上も前に、「技術の変化による価値観の変化」を語る２冊の本が出版されていました。 　１冊目の本は、アルビン・トフラーの『第三の波』（1980年）。 　高名な未来学者アルビン・トフラーは、この著作の中で次のように言っています。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "インターネット普及のはるか前、ここまで先進的なことを言い切っていたトフラーは、その他以下のような未来像を提示しました。 「出勤せずに、自宅にいながらネットで仕事」 「学校へ行かなくても、ネットで勉強」 「買い物に行かなくても、すべて通販で生活が済む」", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "すなわち、あらゆるものが数字化（株式化）されることによって起こった格差がますます酷くなり、食料が買えず貧困に喘ぐ人たちが増え、どこかの都市が破綻するのです。具体的に米国と同じ道を辿ると考えれば、１００万人の富裕層と２０００万人の食事を取れない貧困層に別れる事になります。その間の人々は、大企業に「生かされている」人々となります。それが、日本の未来なんですよ。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 168, "label": "洞察力", "freq": 7, "highlights": [{"text": "細菌学者のルイ・パスツールが有名な講演の中で述べたように、「偶然は心構えのある者にしか微笑まない」のだ。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "友人のトム・ケリーは、「イノベーションは見ることから始まる」を口癖としているが、私はこれをもう一歩先に進めたい。優秀なデザイン思考家は観察するが、偉大なデザイン思考家は「普通」を観察する。一日に一回は立ち止まって、普通の状況について考えるようにしてみよう。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "近年、 深 澤 直人 とジャスパー・モリソンが提唱している「スーパーノーマル」に身を投じれば、われわれの人生を導く暗黙のルールについて、鋭い洞察を得ることができるだろう。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "マーケットとは、生身の人間同士が取引をする場所です。人間の行動が何に動機付けられているのか、そのことに対する深い洞察なしに、マーケット感覚を身につけることはできません。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "そうした情報（Information）を構造化によって洞察（Insight）に変えるためには、「そんなの知ってる、知ってる」という態度ではなく、 謙虚に自分が知らないことを認識して貪欲に情報を収集していく必要があります。 情報（Information）だけならネット上にいくらでもあります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "すなわち、直観力や洞察力、大局観とは、 「感覚を磨く」ことによってではなく、むしろ、 「論理を究める」ことによって身につけることができるのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "ものを考えるに当たっての三つの原則──その一つは、目先にとらわれないで、できるだけ長い目で観察するということであります。第二は、一面にとらわれないで、できるだけ多面的、できるならば全面的にも考察するということであります。第三が、枝葉末節にとらわれないで、できるだけ根本的に観察するということであります。", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 169, "label": "企業理念", "freq": 7, "highlights": [{"text": "決定的な点は、理念の内容ではなく、理念をいかに深く「信じて」いるか、そして、会社の一挙一動に、いかに一貫して理念が実践され、息づき、現れているかだ。ビジョナリー・カンパニーは、「何を価値観とするべきか」と問いを立てることはない。「われわれが 実際に、何よりも大切にしているものは何なのか」という問いを立てる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "一九三五年、ロバート・Ｗ・ジョンソン・ジュニアは、「洗練された自己利益」と呼ぶ理念で、これと同じ考え方を示した。「 顧客 への奉仕が第一であり…… 従業員 と 経営陣 への奉仕がその次で……株主への奉仕は最後である」（傍点は原文による）。そののち、一九四三年に地域社会への奉仕をリストに加え（それも株主への奉仕より上だった）、Ｊ＆Ｊの理念を文書にした。それが「我が信条」である。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "フィリップ・モリス ・選択の自由という権利（喫煙し、自分がほしいものを買う権利）は守るに値する。 ・勝利─トップ企業になり、他社を打ち破る。 ・自主性の発揮を奨励する。 ・性別、人種、階級に関係なく、能力に応じて機会を与える。 ・猛烈に働き、不断の自己改善を進める。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "・ジョンソン＆ジョンソンやウォルマートは 顧客 を理念の柱にしたが、ソニーやフォードはそうしなかった。 　・ＨＰやマリオットは 従業員 への配慮を理念の柱にしたが、ノードストロームやディズニーはそうしなかった。 　・フォードやディズニーは 製品やサービス を基本理念の柱にしたが、ＩＢＭやシティコープはそうしなかった。 　・ソニーやボーイングは大胆な 冒険 を理念の柱にしたが、ＨＰやノードストロームはそうしなかった。 　・モトローラや３Ｍは 革新 を理念の柱にしたが、Ｐ＆Ｇやアメリカン・エキスプレスはそうしなかった。 　　一言でいえば、ビジョナリー・カンパニーの理念に不可欠な要素は ない。わたしたちの調査結果によれば、理念が 本物 であり、企業がどこまで理念を貫き通しているかの方が、理念の 内容 よりも重要である。 　つまり、フィリップ・モリスの理念を好ましいと感じたり同意するかどうかは、フィリップ・モリスの社員でないかぎり、重要ではない。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "ビジョナリー・カンパニーが掲げる基本的価値観はごくわずかで、たいていは三つから六つである。基本的価値観が六つ以上あるビジョナリー・カンパニーはひとつもなく、ほとんどが五つ以下だった。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "会社の価値観を掲げているか、掲げようとしているなら、こう自問するよう勧めたい。「これらの価値観のうち、外部の環境が変わっても、たとえ、これらの価値観が利益に結びつかなくなり、逆に、それによって不利益を被るようになったとしても、百年間にわたって守り続けていくべきものはどれか。逆に、これらの価値観を掲げていては不利になる環境になった場合に、変更でき、捨て去れるものはどれか」。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "カゴメは、 20 年かけて、企業理念に共感してくれた個人株主をじわじわ増やしてきた。そして今や、なんと総株主のうち 99・5％が個人株主であり「ファン株主」なのである（そのうち 3 分の 1 が主婦層だというのもすごい）。そう、ファンが株主として企業活動そのものに参加しているのである。とかく「ファンの顔が見えない」とお嘆きの企業が多いが、カゴメはファンに株主になってもらうことで、ファン個人個人とつきあえるベースを作ったのだ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}]}, {"id": 170, "label": "存在の力", "freq": 7, "highlights": [{"text": "ぼくがセッションを行うときは、その人の持つ問題がなぜ浮上してきたのか、どこをどう修正すればその問題を解消することができるのかということについて、三つの側面から見ていきます。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "その〝存在の力〟のエネルギー源は何か。それは、アイデンティティの放棄、あるいは破綻だと考えています。つまり、自分を明け渡すということです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "徹底的にアイデンティティを破綻させて明け渡すことが一回でもいいからできると、思いっきりスライドでき、人はすごく存在の力がつくんです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "そうやって存在の力がついてくると、受け入れられることがどんどん広がっていきます。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "不安を持っていたとしても、それに突き動かされることが比較的少ない人は存在感が強いということです。なぜ存在の力が情念の背景になるかというと、存在の力が強ければ強いほど、不安に突き動かされることが少なければ少ないほど、情緒・情動は自由を獲得できるからです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "その背景には、自分の持つイメージどおりに他人が自分を見てくれないことに対する大きな不安があるからなんです。それは自我の力、全体を統制する力が弱っているから不安になるんですね。そうではなくて、存在の力が強ければ「そんなことはどうでもいいや」と思えるし、不安を持つこともないんです", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "存在の力をしっかりとつけていく非常に単純な方法は、最初にもお話ししたアイデンティティの破綻です。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}]}, {"id": 171, "label": "システム変革", "freq": 7, "highlights": [{"text": "私はこれらの現象には共通の背景があると考えています。それは「新自由主義への反乱」です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "トランプ大統領の誕生だけでなく、イギリスのブレグジットも根底には新自由主義への反乱や揺り戻しがあります。フランスやオーストリア、ドイツの選挙で極右政党が台頭しているのも根っこは同じです。 　ブレグジットも欧州の極右勢力も、新自由主義的な発想によって正当化されてきたＥＵという人工的な構築物に対するナショナリズムの反乱だとみなすことができます。つまり、土着の文化や言語、民族や宗教といったオーガニックな価値観による逆襲が始まっているのです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかし私は既存システムが崩れていく中、新自由主義の恩恵を最大限に享受した中国が無傷でいられるはずがない、そう信じていました。２００１年にＷＴＯに加盟して以来、中国は国際化の恩恵を受け、それが半永久的に続く前提でビジネスモデルを構築しました。日本が戦後の冷戦構造が半永久的に続く前提でビジネスモデルを作ったのと同じです。しかしその前提が崩れれば、全ては逆流します。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "私はトランプ現象が新自由主義の終わりの始まりだと直感しました。新自由主義の最大の恩恵を受けた二つのグループがグローバリストとデジタリストです。そしてグローバリズムの持つ悪の象徴が中国なのです。グローバリストに任せていたら、アメリカを脅かす怪物を作ってしまったというわけです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかし新自由主義の世界観が信認を失い、「市場ではなく、政治が一番わかっている」という時代が到来すると、サプライチェーンの再構築は企業経営者にとって喫緊の課題になりました。この動きは元々、新型コロナウイルスの流行が引き起こしたサプライチェーンの混乱に端を発したものですが、今では露骨な政府介入が続き、「広い庭に高い壁」の傾向は加速することはあっても、元に戻ることはないと思います。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "新自由主義への移行の下準備は１９８０年代頃から始まり、１９９０年代には世界中に浸透して花を咲かせましたが、その最盛期は短いものでした。まず、リーマンショックが発生し、市場メカニズムと金融政策だけでは課題に対処できないことが明らかになりました。財政出動、公的資金導入、銀行規制の強化と政府介入が息を吹き返します。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "２０１６年の選挙でトランプが大統領となり、居眠りを続けたがっている新自由主義者を叩き起こします。２０２０年にはブレグジットが現実のものとなりました。そしてロシア・ウクライナ戦争（２０２２年～） は、満身創痍となっていた新自由主義の息の根を止めたのです。経済相互依存が進むことで武力紛争や戦争は起きなくなる、その考え方は瓦解します。 　新自由主義の時代、日本と並んで負け組となったのが、冷戦期のヒーローであったＮＡＴＯ（北大西洋条約機構） です。経済優先の時代になり、冷戦構造が終結すると、過去の遺物と化しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}]}, {"id": 172, "label": "対話", "freq": 7, "highlights": [{"text": "人を説得する原則❶　 議論に勝つ唯一の方法として議論を避ける。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "なぜそう答えを急ぐのです？　 答えとは、誰かに教えてもらうものではなく、自らの手で導き出していくべきもの です。他者から与えられた答えはしょせん対症療法にすぎず、なんの価値もありません。 たとえばソクラテスは、自身の手による著作は１冊も残しませんでした。彼はひたすらアテナイの人々、特に若者たちと路上での議論を重ね、その哲学を著作という形で後世に残したのは弟子のプラトンです。そしてアドラーもまた、著述活動にほとんど関心を示さず、ウィーンのカフェで人々と対話したり、小さなディスカッショングループで議論することを好んだ人物でした。決して 肘掛け椅子に座る知識人ではなかったのです。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "だからぼくは日韓関係については、もはや正しい歴史認識を共有すべきではなく、むしろ「歴史認識を共有できないという認識を共有すべき」だと考えています。従軍慰安婦問題に限らず、さまざまな事件について、韓国には韓国の、日本には日本の言い分があって、それぞれの国で過激な主張がある。そこであるひとつの「正しい」歴史認識を強引に共有しようとしたら、下手をすると戦争になる。むろん、真実はひとつです。けれども言葉ではそこには到達できない。だとすれば、「真実を探さない」ことが合理的であることもありえます。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "社員に「あなたが最も大切にしている価値観は？　どんな人でありたい？」などと聞くのは、最初はきまりが悪く感じられるかもしれない。だがこれは、いい人ぶろうという話ではない。価値観について話し合うと、社員とその上司、そして会社との三者間でより強い信頼と信義を築く大事な一歩を踏み出せる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "ただし、率直な質問をする相手が部下の場合、背後にある力関係のせいで高圧的に感じさせる可能性があることを心にとめておかなければならない。だからこそ、最初にあなたのほうから心の奥底にある価値観やありたい姿を打ち明けて口火を切ることが重要なのだ。前述のアーロンの実験でも、お互いに自分の心のうちを開くような回答を相手に伝えるよう、被験者に求めていた。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "コミットメント期間についての対話を実りあるものにするコツは、「体系化」「一貫性」、そして「透明性」だ。三つとも、コミットメント期間を支える要因そのものであることも、押さえておこう。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "変革型または基盤型のコミットメント期間を導入しようとしているなら、踏み込んだ対話を覚悟しよう。社員ごとにパーソナライズされた長期的なアライアンスを築くという話になるからだ。対照的に、ローテーション型なら標準化されており期間も短いため、より定型的なやりとりですむ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 173, "label": "政治思想", "freq": 7, "highlights": [{"text": "江戸時代に入ると、儒学の一派である 朱子学 や 陽明学 の理論をもって仏教を排除しようとする 儒家神道が台頭した。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "とくに、朱子学は幕府によって、 封建 支配のための思想として利用され、幕府および、各藩の政策に大きな影響を与えるようになっていく。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "江戸時代を通じて、武家層を中心として儒教は日本に定着し、やがて 尊皇攘夷 思想と結びついて、明治維新への原動力のひとつとなった。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "日本に儒教が伝わったのは、四〇五年とみられるが、広く知られるきっかけとなったのは、五一三年、 百済 から 五経博士（五経に通じる学者のこと）が来日したこととみられる。仏教伝来とほぼ同時期だ。 　その後、仏教が聖徳太子の「仏教 興隆 の 詔」（五九四年）によって、国家の公式イデオロギーになったのはよく知られているとおりである。 　ところが、聖徳太子が取り入れたのは、仏教の思想だけではなかった。聖徳太子は、六〇三年に「 冠位十二階の制」を、六〇四年に「憲法十七条」を制定しているが、そのいずれにも儒教の思想は色濃く反映されている。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "このように、江戸時代になると、儒教は、国家統治のための重要なイデオロギーへと大変貌を遂げる。それをバックアップしたのが、徳川家康の政治顧問のひとりだった儒官・林羅山（一五八三～一六五七）である。 　羅山は、仏教を非現実的だとして排除し、幕府の封建支配に役立つ思想として、朱子学を押し出した。 　朱子学は、万物の存在根拠「理」から、天然自然や人間社会の秩序が生まれるとする。そして、その秩序は絶対であり、不動であるとした。 　この考えは、将軍を頂点とする封建体制を保つうえで、きわめて都合がいい。その論理にもとづけば、将軍が国家に君臨するのも、家臣が主君に仕えるのも、万物の根源「理」にかなうおこないということになる。 　さらに、羅山は「孝」より「忠」を重視する思想を打ち立てた。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "私的な「孝」の感情よりも、公的な「忠」の原理が優位に立つという考えは、「忠」より「孝」を重んじる儒教の伝統的な考えとは異なるが、朱子学は、こうした日本的な解釈とともに、幕府の支配原理として確立されていったのだ。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "プーチンは新しい国家建設のためのイデオロギー 出にも力を入れています。日本ではあまり報道されていませんが、（〇八年）二月八日にクレムリンでおこなわれた大演説で、プーチンは「今後、政府は戦略策定とイデオロギーのセンターになる」と不思議なことを言い出している。プーチンが一九二〇年代のイタリア・ファシズムに近いユーラシア主義を民族思想の中心にしようとしているのは間違いない。哲学研究所や民族学人類学研究所でもイタリア・ファシズムやユーラシア主義の研究を始めていますね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 174, "label": "情報戦略", "freq": 7, "highlights": [{"text": "インテリジェンスの世界で信頼関係をつくる方法は三つあると思うんです。ひとつは一緒に女遊びをすること。もうひとつは一緒に糞をするとか、排泄行為をする。ロシアではサウナからよく見える野外で一緒に野糞をしたりします。それから一緒に食事をすることですね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "東京は「スパイ天国」とよく言われますが、実態はどうなんですか。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "視野が狭いことと、もうひとつはちょっと話が飛ぶようですが、神様とか超越性に対する感覚が弱いからだと思うんです。人知を尽くせばオペレーションは完遂できる。そう思うから間違える。インテリジェンスがとくに一神教の国で発達しているのは、人知の限界に対する諦念があるからで、自分たちが完璧だと思うオペレーションでも必ず崩れる、どんなに信頼しているやつだって絶対に裏切るという感覚があるからなんですね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "神様でなくても、旧ソ連や文化大革命時代の中国のように共産主義などの超越的な理念を信じているのも強みになりえます。私はアメリカでは、大した情報屋と知り合う機会がなく、ドイツでも生真面目なボーイスカウト・タイプにしか出会いませんでした。やっぱり悪いのはイスラエル、ロシア、イギリスでしょう。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "危ない、危ない。とくに世直し型の思想とか改革志向はインテリジェンス機関にはまったく向かない。理想を追い求めてはいけないんです。たとえば、ニセ文書を見抜いたけれど、これは自分たちの陣営に好都合の部分もあるから真正文書にしておこうとか、敵から出てきた本物の文書をあえてニセ文書として扱うとか、どこまで無節操になれるかが情報屋にとってすごく重要なんですよ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "情報を集めるのがインテリジェンスの本分ではなく、敵と取引するのが本来の仕事だということです。彼", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "日本人は妙に潔癖で、白か黒かはっきりさせないと気がすまないところがあって、特に二重スパイを嫌いますが、ホントに優秀なスパイは概ねダブルですよ。日本でも情報機関を 設すべきかどうかという論議が盛んだけれど、あまりガチガチに考えるとうまく回らなくなる。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 175, "label": "ハピネス", "freq": 7, "highlights": [{"text": "私の「ハピネス」についての哲学は、どこから来たのか、ということです。 話は簡単です。最終的に「幸せになること」が目的で仕事をしているのなら、もっと「幸せそのもの」に焦点をあてるべきだということに気づいたのです。だからザッポスは社員、顧客、取引先、そして世界に幸せを届ける会社でありたいのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "そこで、これまでの人生で最高に幸せを感じた時のリストを作ってみてわかったのは、幸せを感じたどの時も、お金を伴ってはいなかったということでした。わかったのは、何かを作っているとか、クリエイティブで独創的でいると私は幸せだったということでした。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私には、サイエンス・オブ・ハピネスについてもっと学び、その知識を会社経営に生かすのが理にかなったことに思えました。そうすれば、顧客と社員をもっと幸せにする方法の科学的根拠をいくらか学ぶことができるのです。今日、私たちは社員にサイエンス・オブ・ハピネスのセッションさえ提供しているほどです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "この分野について学ぶうちに知ったのが、研究の結果から導き出される結論のひとつが、人は長続きする幸福感をもたらしてくれるものを見抜くのがとても下手だということでした。たいていの人はその人生を、「〇〇を手に入れることができたら、幸せになる」あるいは「〇〇を達成できたら、幸せになる」と考えて過ごしています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ところが実際、手に入れたと思った幸せはかなり短期間のうちに色褪せていく、と研究は示しているのです。 たとえば、宝くじ当選者の幸福度のレベルを、当選直前と当選から一年後で比較した研究がいくつかあります。それらによると、ほとんどの場合当選者の幸福度はどういうレベルにせよ元に戻る、という結果が出ています。 私にとって、この現象について学ぶことは、非常に興味深いものでした。つまり、ほとんどの人にとって、お金儲けをすること、結婚すること、速く走ることなど、それが何であろうと、人生の目標をついに達成したところで長続きする幸福感をもたらしてくれないということです。それにもかかわらず、多くの人はその一生を、自分を幸せにしてくれると考えているものを追い求めることに費やしているのです。 あなたに自問していただきたいのは、あなたが追い求めたいと思っているものが、実際にあなたが手に入れられると思っている幸せを与えてくれるかどうかです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "自分で自分をコントロールしていると感じられるか、自分が進歩していると感じられるか、つながり（関係の数と深さ）、ビジョンと意味（自分自身よりも大きなものの一部となること） の四つのことで決まります。このフレームワークの面白いところは、あなたがこのコンセプトをビジネスにも応用できるということです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私が面白いと思ったのは、多くの人が人生で、快感で得られる幸福感をずっと持ち続けられると考えて、快感で得られる幸福感を一生追求し続けますが、その後情熱について考えるようになり、それを解決できれば、自分にとってより崇高な目的を探すようになることです。 しかし、研究結果によると、適切な戦略とは、最初に自分にとってのより崇高な目標とは何かを見出して、追い求め（というのも、この類いの幸福感が最も長続きするからです）、その後、その下に情熱、さらにその下に快感で得られる幸福感を据えることなのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 176, "label": "人生論", "freq": 6, "highlights": [{"text": "本書でたびたび述べるように、人生とは、脳のなかの内部モデルの蓄積そのものです。脳の働きが止まってしまったら、それがホモ・サピエンスとしての人生の終わりを意味するということです。それ以後の人生は、私には考えられません。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "人生とは道をきわめることにあり。 　そう決めたら、なすべきことに迷いはありません。科学者としての私は、自然をきわめたいと思ったので、「わかること」と「わからないこと」の境界を探索し、頭のなかに膨大な知識のストックをつくり、その蓄積を元手にして、宇宙、地球、生命、文明について何十年にもわたって考え続けてきました。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "私たちは、過去に蓄積した内部モデルを絶えず更新しながら、毎日を過ごしています。その瞬間の事象の蓄積が、宇宙では「時空」と表現されるものです。時空のなかでは時は流れません。古典物理学的には、「過去」も「未来」も幻想にすぎません。「過去」とか「未来」とか「時間は流れる」というのは、人間の記憶のなせるわざで、意識の産物なのです。「瞬間」という事象が凍結され、蓄積されていくのです。宇宙の時空のなかで、個々の人の凍結された瞬間の事象の断面をつなげたものが人生です。 　人生とはなんぞや？　と質問されたら、私たちが脳のなかの内部モデルと呼んでいるものこそが人生の正体ですよ、と私は答えます。 　それだけに、どのような情報、すなわち外界からのインプットを取り入れ──これが事象の認識ということですが──どのような情報を無視するか、という取捨選択の判断はきわめて重要", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "スヌーピーの名言でも「配られたカードで勝負するしかないのさ。それがどういう意味であれ」（You", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "いい仕事ができない。 　人生が 辛い。 　楽しくない。 　その結果として、人は飲酒やギャンブルと同じような目的でエンターテインメントに一時の救いを求めているのであって、エンターテインメントそのものは、結局「結果」でしかないことを悟った。", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "世のなかの人生論は、たいてい二つに分けられます。ひとつの場所にとどまって、いまある人間関係を大切にして、コミュニティを深めて成功しろというタイプのものと、ひとつの場所にとどまらず、どんどん環境を切り替えて、広い世界を見て成功しろというタイプのもの。 村人タイプ と 旅人タイプ です。でも本当はその二つとも同じように狭い生き方なのです。 　だから勧めたいのは、第三の 観光客タイプ の生き方です。 　村人であることを忘れずに、自分の世界を拡げるノイズとして旅を利用すること。旅に過剰な期待をせず（ 自分探しはしない！）、自分の検索ワードを拡げる経験として、クールに付き合うこと。二五年後の観光客が、福島に来て、それまではいちども検索しなかった「原子力」や「放射能」を検索してくれれば、それで福島第一原発観光地化計画は成功です。 　 検索とは一種の旅です。 検索結果一覧を見るぼくたちの視線は、観光客の視線に似ていないでしょうか。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}]}, {"id": 177, "label": "存在論", "freq": 6, "highlights": [{"text": "本書でたびたび述べるように、人生とは、脳のなかの内部モデルの蓄積そのものです。脳の働きが止まってしまったら、それがホモ・サピエンスとしての人生の終わりを意味するということです。それ以後の人生は、私には考えられません。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "自分は何者かという問いも、ＡＩの思考力が人間を超える２０４５年以降は不要になる。自分よりＡＩのほうが賢いのだから、一人で自己対話するより、コンピュータに相談したほうがずっと納得できる答えを得られるだろう。そこには、全人類の英知もシェアされているはずだ。もちろん、スポンサーつきで。そうなると人間の関心は、自分という存在から、自分を超えた存在へと移っていくだろう。人間は何のために存在しているのか。世界とは何なのか。この世に神はいるのだろうか。こうした問いこそが人間を惹きつける。 21 世紀後半は、宗教と哲学の時代になるのだ。もちろん、スポンサーつきで。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "存在するものは、合理的である」", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "アガンベンは人間が生きるということと、人間がただ生存しているということを区別しているのです。その上で、ただ生存するということを何よりも最優先するのならば、人間が生きていると言えるために必要な何かが蔑ろにされはしないかと指摘しているのです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "アガンベンは死者の権利について考え、死者にも権利があるのではないかと問題提起している。権利は決して生きている者だけが浴することのできる特権ではない、と。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "だがそれは歴史的に始まった。でも、人間が存在する以上、絶対的な先行的条件として言語がある。とすると、アガンベンは、人間が他の存在者から区別されるという、その区別の仕方自体が終わったということを言っていることになりませんか。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 178, "label": "思考法", "freq": 6, "highlights": [{"text": "アイデアが勝負の仕事なら、なおさら考える必要があります。 　仕事でよいアイデアを思いつくにはどうしたらよいか。学生時代からずっと考え続けてきた私の結論は、とにかく考え続けること。単純なようですが、これに尽きます。 　考えていなければ、ひらめくことはありません。それも四六時中、考えに考えていなければ、問題を突破できないのです。寝ているときも、考えています。最初からよいアイデアなんか出てきません。執着心と集中力。これが学者にとっては必須の条件です。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "この二十年ほどの経済政策の論争は、新自由主義に行くか、社会民主主義に行くかというわかりやすい二項対立だった。それぞれ言い分はある。それぞれのロジックは一部有効で、一部有効ではなかった。どちらのイデオロギーに寄っても政策は行き詰まり、イデオロギーの議論によって明確な解は生まれなかった。その状況を見るにつけ、私はイデオロギーによる二項対立論に違和感を覚えるようになった。 「ひょっとしたら、現実の経済社会で起こっている姿をまったく無視した、抽象化されたベースで議論しているだけではないのか」 　やがてその思いが強くなり、経済社会的問題を考えるときは、よけいなフィルターを外して現実を見つめることが大事なのではないかと考えるようになった。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "戦略コンサルタントの三谷宏治さんが、『特別講義　コンサルタントの整理術』（実業之日本社）で書いている。 「ホワイトカラーの非効率の原因は『悩み』の蔓延、つまり『悩む』という作業に多くの時間を費やしていることにある」 「まじめなヒトほど、困って悩んでいる」 「悩んでいると、ヒトは深く考えているつもりになるが、実は全く進んでいない」 「資料を作る手は止まり、同僚・友人との雑談に逃避する」", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "今もし問題を感じていらっしゃるなら、できる限り物事をフラットに捉えなくては直感は働きません。人と物事を一緒にしてしまうと混乱しますので（ほとんどの問題はここ）、これを分けてフラットに置き換えるのです。誰々が、なにを言ったということの「誰々」と「なにを言った」を分けて考えることから始めるといいでしょう。", "book_title": "白本", "author": "高城剛"}, {"text": "なぜ、そのニュースが僕の目に留まったのか、をいつも考えています。それは、目の前の情報に僕自身がとらわれていないからなんだと思います。日々、情報が簡単に入手できるようなスタイルを持っていると、実は情報に振り回されてしまって、さらに多くの情報を得ようとし、結果混乱に向かいます。大切なことは、情報を得る前に、自分でしっかりイメージすることにあります。なぜ、この問題が起きて、さらにはなぜ僕自身にひっかかるのだろう？　それを別の情報を探して解決しようとするのではなく、まずイメージするのです。僕は今も昔も政治経済に関してプロフェッショナルではありませんが、プロフェッショナルではないからこそ、自由闊達にイメージし、考え、発言できるのだと思います。すなわち、「今」の情報に裏付けられたプロフェッショナルの発言ほど、「今後」のアテにならないものはありません。プロは、間違ってはいけない訳ですから、常にちょっと前の過去の数字の話だけをします。ですので、大情報時代になればなるほど、プロとは違った自由なイメージを持つことが個々に大切になるのです。", "book_title": "白本", "author": "高城剛"}, {"text": "ものを考えるに当たっての三つの原則──その一つは、目先にとらわれないで、できるだけ長い目で観察するということであります。第二は、一面にとらわれないで、できるだけ多面的、できるならば全面的にも考察するということであります。第三が、枝葉末節にとらわれないで、できるだけ根本的に観察するということであります。", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 179, "label": "可能性", "freq": 6, "highlights": [{"text": "20 世紀初頭のように、一流でない人でも一流の仕事ができるようになるかどうかはわかりません。けれどもいろんなところに現れてくる変化を見逃さず、柔軟に対応できるかどうかが、一流の仕事をするための鍵であることはまちがいないでしょう。量子力学に新しい解釈をもたらしたファインマン流に言えば、「禁止されていないことは何でも起こっているが、実現するのは可能性のもっとも高かったことだ」というのは、比喩でもなんでもなく、ほんとうにその通りなのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "要するに、社員の自己表現を尊重しているのだ。これが来訪者には強烈な印象を与えるらしい。ピクサーに行って帰ってきたら、自分の仕事人生に何か大切なもの──目に見えるエネルギー、連帯感や奔放な創造性、陳腐だが「可能性」──が欠けているような気がして寂しくなった、と言われることがよくある。私", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "どんな形でもいいから、その社会的なプログラミングでできあがった自我からはみ出た人に一種の魅力を感じ、惹かれるんです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "旧政府により、体制維持のために特別に保護された朱子学とは異なり、陽明学は進歩的で前向きで可能性に富んだ教えでありました。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "それに、 紙に書くほうが可能性が広がる。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "「あなたは、望めばどんなものにでもなれる。われわれの意志の力が神の力と結びつくなら、その効果はきわめて大きい。心から真剣に求めつづけていれば、すべては可能となる。だが、謙譲や忍耐、節度や寛大さを身につけたいと強く願わない限りは、何を望んでもかなえられはしないだろう」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 180, "label": "権威", "freq": 6, "highlights": [{"text": "「権威」とは、「常識」の別名にほかなりません。これで長らく、ヨーロッパを主導的立場とする知の体系は、常識を超えることができなくなってしまいました。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "江戸時代は、朱子学が盛んだった。朱子学は儒教の体系の一つで、上への忠誠を重んじる。もともと儒教でいう「忠」は「自分に忠実であれ」という意味だったが、江戸幕府は封建体制を強化するため、「上の言うことに絶対に逆らうな」という意味に変えてしまった。別の言い方をすれば、トップダウンで組織をコントロールするのにちょうどいい学問が朱子学だといえる。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "何らかの 方法論をとり入れると、自分たちのチームが急に権威づけされたような気分になる。多くの人によって検証された方法で進めている「安心感」も得られる。何もない中で進めていくよりも、ずっと成功率が高まるように思える。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "それは「 依 法 不 依 人」、 真理の教えを信じ人に頼るな、との言葉であります。すなわち、人の意見は、どんなにもっともらしく、 耳触りがよくても、頼るべきではない、「仏尊」によって残された経文こそ頼るべきである、あらゆる疑問は、それによってのみ解決しなくてはならない、とわかったのです。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "昔は街の大人たちが、教師を尊敬していた。 　無学な大人たちにとっては、大学出というだけで尊敬に値したのだ。 　自分の家の子どもが先生に頭をひっぱたかれれば、親は学校にごめんなさいと謝りに行ったものだ。悪いのは自分の子どもに決まっている。たいていの親がそう思っていた。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "尊敬や忠誠＝不安定で資産化しにくい 　威信や畏怖＝安定していて資産化可能 　こういう構図があるからこそ、支配者は大きな城を作るんですね。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 181, "label": "文化", "freq": 6, "highlights": [{"text": "そもそも、人間圏の分化には、情報を生成するという面があり、各地域の風土に応じた文化も、社会構造をはじめとするさまざまな秩序なども、すべて情報です。その生成と消滅の過程が文明の歴史と考えれば、いままた新たに、混沌とした均質状態から分化への道をたどろうとしているはずなのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "デジタル社会への反動から始まった身体性回帰のカルチャーを「モダーン・プリミティブ」という。未開部族の風習だったタトゥーやピアスが、その代表例だ。 21 世紀は、モダーン・プリミティブを実現する手段がデジタル化して、「デジタル・モダーン・プリミティブ」になる", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "21 世紀はアフリカの時代」と言う人が増えてきたが、実際、エネルギーならモザンビーク、宗教ならエチオピアというように、それぞれの分野で注目すべき国が多い。文化でいえば断然、ナイジェリアだろう。僕がナイジェリア最大の都市ラゴスを訪れたのは２０１１年だが、アジアにおけるかつてのシャンハイのような熱気があった。順調にいけば、ラゴスはおそらくアフリカ最大の都市へと成長するだろう。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "感謝は仏教やストア哲学の基本であり、聖書で教えられ、日本の茶道でも大切にされ、もちろん感謝祭の基本（であり名前の由来） でもある。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "アメリカの２０１１年第１位はアデルです。彼女は当時 23 歳で、ＡＫＢにいてもいい年齢だと思いますが、このアデルとＡＫＢの表現力の差が、僕は国力や表現を通じたその国の現状に出て来ていると思います。アメリカの現実がいかに厳しく、しかし真面目に対応し、日本がいかに不真面目でその場凌ぎなのかがよくわかります。また、ブラジルのトップ１はミッシェル・テオの『Aise eu te pego』ですので、国の勢いが理解できます。間違いなく、今僕にとって「楽しい場所」は、ミッシェル・テオが売れている国なのは間違いありません。それは、南欧や南米です。", "book_title": "白本", "author": "高城剛"}, {"text": "地下アイドルは自分の誕生日にライブハウスなどで生誕祭イベントをひらく風習があるのですが、その際に有志のファンによってお祝いするための「生誕実行委員会」が結成されるのです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}]}, {"id": 182, "label": "国家戦略", "freq": 6, "highlights": [{"text": "核兵器を開発するというと、国内外のウケがよくない。そこで核を保有したい国は、原発を隠れ蓑にして核兵器の研究をする。たとえばスウェーデンやフィンランドがそうだ。第２次世界大戦後、スウェーデンとフィンランドはソ連の脅威にさらされていた。それに対抗するために核武装を計画し、その実現のために原発をつくった。すでに核を保有しているイギリスやフランスも事情は変わらない。原発をやめると原子力の研究者が減り、核技術が継承できなくなってしまう。だから原発を停められない。これは、「いつかは核保有国」の夢を持つ、日本の自民党も同じだろう。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "新たな基幹産業の立ち上げにおいて日本がもっとも有利な立場にいることも忘れて、それを実現するための知恵もしぼらず、思惑が見え見えの海外からの投資にただただ頼ろうとするのは、きわめて害の多い情けない姿であることを、肝に銘ずるべきである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "そのような国が、将来的にどうなっていくだろうか。そして、そのような国で、お互いに知恵を出し合って磨き合う製造現場が確立できるだろうか。 　そう考えれば、必要以上に日本がインドや中国に追いつかれることを心配して、それへの対処に力を削ぐよりも、むしろ日本がすでにもっている優位性を高める努力を重ねたほうがはるかに有益であろうことは、自明のことではないか。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "今、世界で経済が比較的うまくいっている国は、シンガポールにしても中国にしても、国がけっこうな強権を発動しつつ、上手に国民を誘導しているように見える。結婚というものは自由放任では実はうまくいかない、ということに気づいてもらって、ときにはアメとムチを使い分けて、独身者の目先の居心地の良さから背中を押すような政策にしてもらえるとみんなハッピーなのに、と思う。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "だから何よりもまず国家指導者たちがしっかりした哲学を持って、いかにして日本国家を生き残らせるか考えないといけない。しかしその上で僕が最近、決定的に重要だと思うのはむしろ財界です。財界が政治に対して積極的にクレームをつけて、経済ばかり優先すると、国家が滅びるぞと脅かしてほしい。ＪＲ東海の葛西敬之会長のようなタイプの経営者がもっといて欲しいんですよね。 　 西木 　彼は新幹線を中国に売るのに反対しましたね。儲かればいいという発想ではダメだ、と。その後、新幹線を購入した中国は、純国産だと言い張っているのだから、売ったほうは馬鹿にされたようなものです。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "いま日本では経済エリートが哲学を持てるかどうかが問われていると思うんです。金になればいい、儲かれば国はよくなる、という新自由主義的な考えはすでに限界が見えた。国家のために、損を承知であえてひとつの道を選択する知恵を財界も政界も持つ時期が来ているのではないでしょうか。 　ですからいまは政治に期待するよりも、間接的なんだけど、むしろ財界に期待したい。例えば、インテリジェンス分野の人材養成に金を出してもらう。人材をつくるのは今は大学しかないと思うんです。早稲田、慶應、東大、東京外大、どこでもいいから、きちんと金をつけてインテリジェンス講座をつくれば、五年で状況は相当変わりますよ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 183, "label": "フィードバック", "freq": 6, "highlights": [{"text": "ない。たとえば本書にあるように、誰かを降格させなくてはいけないときに本人の能力不足やミスだと伝えるのではなく、リーダー側の管理ミスという説明も加える、フィードバックで小言を言うときには褒めるのもセットにする、そしてそこから自分のスタイルをつくるといった考え方は、どんな組織でも実践的に役立つだろう。", "book_title": "HARD THINGS　答えがない難問と困難にきみはどう立ち向かうか", "author": "ベン ホロウィッツ、滑川 海彦、高橋 信夫、小澤 隆生（序文）"}, {"text": "レビューの難しさは、「言わなければならないこと」と「傷つけないようにすること」の２つを両立させなければならない点にある。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "どんな効果的なフィードバックグループもそうだが、そこで得られた視点を自分に抗うものではなく、プラスになると考えることがカギになる。競争意識があると、人のアイデアと自分のアイデアを比較するため、議論ではなく、勝ち負けを決める討論になってしまう。反対に、プラスのアプローチは、参加する一人ひとりが何らかの貢献をする（ たとえ議論をわかせるだけで最終的にボツになるアイデアでも）という理解からスタートする。ブレイントラストの価値は、たとえ瞬間的にでも人の目を通して作品を見ることができること、視野を広げてくれるところにある。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "相手のパフォーマンスについて思うことを伝えても、相手の成功や卓越性の助けにはならず、改善のための方策を意見すると、むしろ相手の学習を妨げるということである。", "book_title": "フィードバックの誤謬 DIAMOND ハーバード・ビジネス・レビュー論文", "author": "マーカス・バッキンガム、アシュリー・グドール、DIAMONDハーバード・ビジネス・レビュー編集部"}, {"text": "第２条 整合性 ［原則］ あなた、私、および当社にはそれぞれ自分の核となる価値観とありたい姿があります。 あなた、私、および当社は三者の価値観とありたい姿がなるべく整合するように努力します。その一方で、一〇〇％重なることはあり得ないことも理解しています。 〈期待水準〉 私は自分の核となる価値観とありたい姿を明記します。また、私の理解の範囲で、会社が本当に信じている具体的な価値観とありたい姿も明記します。 私や会社の価値観とありたい姿について、あなたから率直なフィードバックや提案があればぜひお願いします。 私は、あなたの核となる価値観とありたい姿を知りたいと思っています。それが私や会社のものと違っていてもかまいません。 （あなたの核となる価値観とありたい姿） 　　 （私の核となる価値観とありたい姿） 　　 （会社の核となる価値観とありたい姿） 　　 あなたのこれからのキャリアの発展について、一緒に、私たち共通の期待値を設定していきましょう。 私は、あなたのビジネス面での…", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第２条 整合性 ［原則］ あなた、私、および当社にはそれぞれ自分の核となる価値観とありたい姿があります。 あなた、私、および当社は三者の価値観とありたい姿がなるべく整合するように努力します。その一方で、一〇〇％重なることはあり得ないことも理解しています。 〈期待水準〉 私は自分の核となる価値観とありたい姿を明記します。また、私の理解の範囲で、会社が本当に信じている具体的な価値観とありたい姿も明記します。 私や会社の価値観とありたい姿について、あなたから率直なフィードバックや提案があればぜひお願いします。 私は、あなたの核となる価値観とありたい姿を知りたいと思っています。それが私や会社のものと違っていてもかまいません。 （あなたの核となる価値観とありたい姿） 　　 （私の核となる価値観とありたい姿） 　　 （会社の核となる価値観とありたい姿） 　　 あなたのこれからのキャリアの発展について、一緒に、私たち共通の期待値を設定していきましょう。 私は、あなたのビジネス面での...", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 184, "label": "製品開発", "freq": 6, "highlights": [{"text": "担当者の肩書きや社内の組織体系がどうあれ、あらゆる優れた製品の陰には、責任を持ってその製品のプロフィールを決めた 1人の人間がいる、と私は断言する。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "覚えておいてほしい。価値のある、使いやすい、実現可能な製品として作られるべき何かをプロダクトマネージャーから与えられなければ、どんなにエンジニアリング部門が優秀でも意味はない、ということを。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "でも、プロダクトマネージャーの方も、製品開発というのは、自分が思いついた最新のアイデアや最高のアイデアを試す場ではないことを忘れてはならない。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "私はいつも、優秀なエンジニアに対しては、ぜひプロダクトマネジメントに挑戦するべきだ、と勧めている。そして、どんなに君たちのエンジニアリングがすばらしくても、作る価値のある製品でなければ君たちは力を発揮しようがないんだよ、と言い聞かせている。何を作れるかを知っているだけではなく、何を作るかというもっと大きな問題にも取り組んできたエンジニアの貢献があってこそ、すばらしい製品や会社がたくさん生まれたのだ、ということも指摘しておきたい。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "というのは、こういうことが起きてしまう原因でよく目につくのは、プロダクトマネージャーが、作れそうな機能なら何でもめいっぱいくっつける、というようなことを何年にもわたってエンジニアリングチームにやらせてきたために、彼らをボロボロにしてしまうことだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "実際には、今回調べたビジョナリー・カンパニーのうち、すばらしいアイデアや卓越した製品を出発点とする企業はほとんどない。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}]}, {"id": 185, "label": "自己制御", "freq": 6, "highlights": [{"text": "でも、プロダクトマネージャーの方も、製品開発というのは、自分が思いついた最新のアイデアや最高のアイデアを試す場ではないことを忘れてはならない。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "穏やかな心は、この上なく美しい知恵の宝石です。それは、自己コントロールの長く粘り強い努力の結果です。そして、それが存在する場所には、つねに、成熟した人格と、「原因と結果の法則」に関する確かな理解が存在しています。", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "自己コントロールは強さです。 　正しい思いは熟練技能です。 　そして、穏やかさはパワーです。", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "Ａは「action plan（行動計画）」のＡ 　自分は舵取りができない遺伝子や環境の 筏 に乗って漂っているようなものだ、と思い込んでいる人がいる。だが、私たちは無力な被害者ではなく、制御する力をある程度持っていて、他者に対する思考や期待や行動を変えれば状況を変えられると悟るだけで、びっくりするほど力が湧いてくるものだ。とくに自己調節しようと意識して努力する際に効果が大きい。自分の社会的なエネルギーをどこに注ぐか自由に選べることを認識すれば、やはり、自分には制御する力があるのがわかってくる。バタフライ効果のくだりで見たように、進路や目的地を大幅に変えるのに大きな変化は必要ない。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "人が1日をどう感じるかは、自分の身に起こる「できごと」によって決まるのではない。 人は「何に注意を向けるか」によって、みずからの現実をつくりあげている のだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "どの戦術も、根底にある考え方は同じだ。 気を散らさないようにするには、すぐに反応できないようにするのがいちばん ということ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}]}, {"id": 186, "label": "企業哲学", "freq": 6, "highlights": [{"text": "コントロールを撤廃することで「フリーダム＆レスポンシビリティ（自由と責任）」のカルチャーが生まれる（これはネットフリックス社員が頻繁に口にする言葉で、略して「Ｆ＆Ｒ」と言われることも多い）。", "book_title": "NO RULES(ノー・ルールズ) 世界一「自由」な会社、NETFLIX (日本経済新聞出版)", "author": "リード・ヘイスティングス、エリン・メイヤー、土方奈美"}, {"text": "営利企業であれば、事業の評価は通常、売上や利益で測るものでしょう。しかし、任天堂はそういったお金ベースの評価とは別に、ゲームを楽しんでいるユーザーの人口増加をベースにした評価を行っています。しかも、ただのプレイ人口ではなく「世帯あたり」のプレイ人口なのです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "会社のもつ技術を使って世の中に貢献し、その結果として利益も上がる。利益が上がるから、また貢献できる。このくりかえしこそが事業なのだ。そしてそれを実行するもっとも大切な主役は株主ではなく従業員であり、そして、その技術を喜んで使ってくださる地域の顧客なのである。この基本を忘れてはならない。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "私の考える新しい資本主義。それは「公益資本主義」である。 「会社の事業を通じて、公益に貢献すること」──つまり、「会社の事業を通じて、会社が関係する経営者、従業員、仕入れ先、顧客、株主、地域社会、環境、そして地球全体に貢献すること」こそが価値として認められる資本主義を実現したい、ということである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "費用をかけるだけでは自分が望むようなブランドを構築できないとしたら、それでは企業はどうすればいいのでしょうか。 長期的にブランドを構築するための最善の方法とは何でしょうか。 一言で言えば、企業文化です。 ザッポスでは、企業文化がきちんと設定できていれば、素晴らしいカスタマー・サービスも、長期にわたる素晴らしいブランド構築も、情熱的な社員や顧客といったそのほか大部分のことも、自然に始まると考えています。 私たちは、会社の文化と会社のブランドは本質的に一枚のコインの表と裏だと信じているのです。ブランドは初めは文化に後れを取るかもしれませんが、いつかは追いつきます。 企業文化こそがブランドなのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "個人にとっては、個性が運命です。 組織にとっては、文化が運命です。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 187, "label": "成長戦略", "freq": 6, "highlights": [{"text": "ＦＣチェーンが成功するには二つの要素が不可欠だ。店舗などのパッケージを提案する「企画力」と、１店舗では得られない「ネットワーク価値」である。ＴＳＵＴＡＹＡの成長はまさしく、この２点にある。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "わが社だけでもあと３０店は出店する意欲があるのだから、ＴＳＵＴＡＹＡ全体ならごく近い将来に、書籍・雑誌の販売額が２０００億円に届くだろう。そうなると業界は一気に変わってくる」。トップカルチャーの清水秀雄社長はそう言う。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "大企業は、新しい市場が「うまみのある規模に成長する」まで待つことが多い。しかし、第六章で述べる事実は、この戦略が成功しないことが多い理由を示している。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "繰り返しになりますが、 グロースハックとは、単なるテクニックの話ではなく〝いかに発想して、いかに集中するか〟というマインドセット（思考様式や心構え）の話 です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "グロースを考えるうえでの基本となるフレームワークとしては「①新規獲得、②ユーザーをアクティブにすること、③脱退者を減らすこと」の三点が挙げられます。 　ネットサービスに限らず、一般のビジネスでも同じです。 「①新たな顧客の獲得、②リピーターになってもらうこと、③飽きさせずに顧客として 摑 んでおくこと」 です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "「不採算店舗」というものは、時機を逸すると永遠に「負の資産（＊９）」のままです。でも、タイミングよく閉めると、成長のための「投資」になる。前回もお話ししましたが、お金をどう節約するかを工夫するより、成長のためにどうお金を使うかを考えたい、というのが僕のスタンスです。４３３店舗の閉店は、まさに成長のための「お金の使い方」の１つだったと思っています。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}]}, {"id": 188, "label": "人材育成", "freq": 6, "highlights": [{"text": "彼はこれから、中目黒で蔦屋書店をやるの。失敗して、試行錯誤する過程の中で、彼は成長していくと思う。それが知的資本経営。失敗を許容しないと、むしろ会社が潰れる。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "会社が小さいときって人がいないから、やったことがない人にやらせることになる。そういう何もないところから道を切り開く経験をした人はとてつもなく伸びることがある、と思います。やっぱり先輩がいると、なかなか成長しないんですよ。先輩がいないというのは、人が成長するために一番いい環境です。まあ、うまくいかないこともたくさんありますけど。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "もちろんオフィスで働く人たちにも、趣味くらいはあるだろう。でも、趣味を応援するために休暇や支援金まで与えている会社は多くない。 　ひらめきや創造性は、多様な経験のなかから生まれてくる。リモートワークをとりいれるなら、社員の生活の幅を広げるためにどんどん支援したほうがいい。 　メンバーに生き生きと働いてもらうためなら、それくらいは安いものだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "新入社員に売上なんか期待するな！　個々の能力が伸びるほうが重要だ」 と割り切っている。製品知識や接客など、個々の能力は見るが、売上は一切見ない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "いま日本では経済エリートが哲学を持てるかどうかが問われていると思うんです。金になればいい、儲かれば国はよくなる、という新自由主義的な考えはすでに限界が見えた。国家のために、損を承知であえてひとつの道を選択する知恵を財界も政界も持つ時期が来ているのではないでしょうか。 　ですからいまは政治に期待するよりも、間接的なんだけど、むしろ財界に期待したい。例えば、インテリジェンス分野の人材養成に金を出してもらう。人材をつくるのは今は大学しかないと思うんです。早稲田、慶應、東大、東京外大、どこでもいいから、きちんと金をつけてインテリジェンス講座をつくれば、五年で状況は相当変わりますよ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "たとえば、リード・ホフマンはリンクトインの創業当初、才能ある社員にストレートにもちかけた。相手が二〜四年のコミットメント期間に参加し、リンクトインの事業に大きな貢献をしてくれたら、ホフマンおよび同社は、彼らのキャリアアップに力を貸そう——そのキャリアアップが、リンクトイン社内における次のコミットメント期間になることを望みつつ——という条件である。このやり方はうまくいった。会社側は、リンクトインのために目に見える成果を上げようとする熱心な社員を獲得できた。さらにその社員が、一回または複数回のコミットメント期間を経て同社を去った後も、リンクトインのよさをあちこちで喧伝したり、会社にプラス効果をもたらしたりし続けてくれるケースが少なくなかった。社員側も、自分のスキルと経験を高めることでキャリアをガラリと一変できた。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 189, "label": "適応", "freq": 6, "highlights": [{"text": "未来のテクノロジー生活は、終わることのないアップグレードの連続となる。そしてその頻度はどんどん高まっていく。性能は変化し、デフォルトというものはなくなり、メニューが姿を変えていく。いつもは使わないソフトを開いてある機能を使おうとしたら、メニューそのものがすべて消えていたということも起こるだろう。", "book_title": "〈インターネット〉の次に来るもの　未来を決める１２の法則", "author": "ケヴィン・ケリー、服部 桂"}, {"text": "スヌーピーの名言でも「配られたカードで勝負するしかないのさ。それがどういう意味であれ」（You", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "ビジョナリー・カンパニーのような成功を収めようとするなら、チャールズ・ダーウィンの『種の起源』の概念の方が、企業の戦略策定に関するどんな教科書よりも、役に立つ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "しかし、全体としての行動は「生き残りのためのシステム」として理解できる、という視点が、本書を通底する基本的立場です。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "生物種としてのヒトにとっての最大の適応環境とは、おそらく群れ生活そのものにあると考えられます。自然環境に適応するための手段として群れを選んだ結果、今度は群れの中でどう生き残るかについての新たな適応問題が生じてきたわけです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "個人の利益と社会全体の利益とが一致しないこのような事態は、一般に、社会的ジレンマ(social dilemma) と呼ばれます。個体にとっての適応が、群れや社会全体にとっての適応と必ずしも完全一致しない社会的ジレンマの構造は、ヒトの社会行動や集合現象をどう説明するべきかについて、重要なヒントを提供します。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}]}, {"id": 190, "label": "文明論", "freq": 6, "highlights": [{"text": "我々人類は共通の祖先から世界史が始まった という〝事実〟。今は肌の色も言語も違いますが、そうなったのは長い世界史では比較的最近のことなのです。これを〝アフリカ単一起源説〟と言います。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "つまり、もしカバが温和な性格でシマウマがやさしかったら、アフリカで独自の文明が発達してその後も欧米列強に植民地化などされず、今では先進地域になっていたかもしれない。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "我々の思想は、一見関係ないように見えて、実はその地の気候や環境にとても影響を受けている」", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "東洋文明」と「西洋文明」の 止揚 が起こります。 　それは、人類の歴史を振り返ってみれば明らかです。 　五千年前、人類の文明は、東洋において、その夜明けを迎えた。 　よく知られる、四大文明。 　エジプト文明。メソポタミア文明。インダス文明。中国文明。 　いずれも、東洋の地で生まれた文明でした。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "イギリスの著名な哲学者アルフレッド・ノース・ホワイトヘッドは、こうした現代生活の避けて通れない問題を認めて、断言しています、「文明を発展させるには、人間が考えずにできる行動を増やすことである」と。", "book_title": "影響力の正体　説得のカラクリを心理学があばく", "author": "ロバート・Ｂ・チャルディーニ、岩田 佳代子"}, {"text": "ヤマが提唱した「歴史の終わり」、すなわち民主主義と自由経済こそが歴史の最終形態であるという「普遍的価値」を共有する陣営と、それを拒否する陣営による「冷たい戦争」ですね。", "book_title": "新・地政学　「第三次世界大戦」を読み解く (中公新書ラクレ)", "author": "山内昌之、佐藤優"}]}, {"id": 191, "label": "因果関係", "freq": 6, "highlights": [{"text": "つまり、もしカバが温和な性格でシマウマがやさしかったら、アフリカで独自の文明が発達してその後も欧米列強に植民地化などされず、今では先進地域になっていたかもしれない。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "いくつかなされた研究の中で最も確からしいことは、寒い国はアルコールの消費量が多く、アルコールの量が増えることと自殺で亡くなるひとの割合が増えることとは関係ありそうだということである。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "個別のユーザーごとに、時系列で何をしたかが並んでいる「モーメントデータ」は、平安保険の「タイムライン」と同じ考え方です。時系列で行動が可視化されると、ユーザーの置かれた状況や文脈がイメージ・類推できるようになるため、因果関係が分かりやすくなります。こうなると、一般の社員でも分析や企画が格段に実行しやすくなるわけです。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "東洋思想の一つの美点は、経済と道徳とを分けない考え方であります。東洋の思想家たちは、富は常に徳の 結果 であり、両者は木と実との相互の関係と同じであるとみます。木によく肥料をほどこすならば、労せずして確実に結果は実ります。「民を愛する」ならば、富は当然もたらされるでしょう。「ゆえに賢者は木を考えて実をえる。小人は実を考えて実をえない」。このような儒教の教えを、鷹山は、尊師細井から授かりました。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "幸せを手に入れる直接の方法として収入の増加に頼るのはあまり良い考えではない。非情なまでに金銭を追い求めた結果落とし穴にはまってしまう例を、ニュースや本や映画を通して、人はみな数限りなく見聞きしてきたことだろう。現に私たちのデータは、お金で単純に幸せは買えないことを明白に示している。私たちの行なった縦断分析によれば、孤独感の低さと収入の増加はどちらも幸福感の増大と 関連がある ものの、収入の増加は幸福感の増大には 貢献せず、孤独感を減らすこともない。じつは、両者の関係は逆なのだ。幸福感の増大は、社会的なつながりに対するポジティブな効果を通して、収入の増加に貢献する。幸せな人は孤独感が減り、孤独感が低い人はより多くのお金を稼ぐ傾向にある。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "今日の日本の堕落、頽廃、意気地のなさ、こういう有様は昨日今日のことではない。非常に長い由来・因縁があるということを考えないと、これを直すことはできません。", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 192, "label": "持続性", "freq": 6, "highlights": [{"text": "自分の欲望をどれだけ犠牲にできるかにかかっています。そして、私たちが自分の心を高めれば高めるほど……より気高く、より公正な人間になればなるほど……私たちの成功は、より大きな、より祝福された、より持続的なものとなります。", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "一方で、「人生は何かあるもんだ」という意識で組み立てられる組織は、つねに変化に対応する。時代は変化する。仮に旧来の組織が解体することがあっても組織のコンセプトは残るから別の形で何かが生まれる。生まれなかったとしたら、それは同じく時代のせいにしてしまったときである。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "しかし、究極の作品は会社であり、あるアイデアを実現することでも、市場の機会をとらえることでもないと見ているのなら、善し悪しは別にして、ひとつのアイデアにこだわることなく、長く続くすばらしい組織をつくりあげることを目指して、ねばり抜くことができる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "われわれがこの世を去ったのちも、優れた大統領をずっと生み出すために、どんな プロセス をつくることができるのか。どのような国を築きたいのか。国の原則は何か。その原則をどう運用すべきか。われわれが目指す国を築くには、どんな指針と仕組みをつくるべきか」", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "会社の価値観を掲げているか、掲げようとしているなら、こう自問するよう勧めたい。「これらの価値観のうち、外部の環境が変わっても、たとえ、これらの価値観が利益に結びつかなくなり、逆に、それによって不利益を被るようになったとしても、百年間にわたって守り続けていくべきものはどれか。逆に、これらの価値観を掲げていては不利になる環境になった場合に、変更でき、捨て去れるものはどれか」。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "特別できる人や異常に頑張った人しかノルマを達成できないような仕事のやり方では、そもそも他の人に引き継げない。仕事のやり方を変えない限り、問題は先送りされるだけだ。 ワークマンでは「頑張らない」「頑張ってできても意味がない」 と考えている。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}]}, {"id": 193, "label": "経営姿勢", "freq": 6, "highlights": [{"text": "柳井 　いや、そういうことではありませんよ。僕ぐらいの年齢で仕事に本当に集中していたら、オンタイムに全エネルギーを使い果たしますから、家に帰る頃はぐったりしてしまいます。テレビを眺めるくらいしかできないほどにね。逆に、夜もぐったりしないというのは、仕事に集中していないからですよ（笑）。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "日本の起業家は少ないのですから、起業した以上、自分がロールモデルになるべきではないでしょうか。それなのにプライベートを謳歌するとか、大した経営者でもないのに講演をするとか、本を書くとか。まったく「アホか！」と言いたいですよ（笑）。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "重要なのは、 経営トップの本気と社員のやる気。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "社長が目標を一つに定め、それを「愚直」に継続すれば確実に会社は変わる。 重要でない目標をつくり、期限を定め、ノルマにしてプレッシャーをかけ続ける方法は断じて間違っている。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "ビジネス書を１冊読むたびに新しい事業アイデアや改革案が浮かぶ。それを封印するのは結構つらい。でも、未熟な私が並みの経営者になるには、そのつらさを乗り越えなければいけない。鈍感に見えるくらい愚直に一つの目標しか持たず、それに没頭するのが本当にいい経営者だ。 この８年間、ずっとそう自分を戒めてきた。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "そこで「私は意見を変える能力が高い」 と思うようにしている（笑）。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}]}, {"id": 194, "label": "判断力", "freq": 6, "highlights": [{"text": "直観とは分析的な良し悪しの判断の積み重ねを超えたものの総称を指しています。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "何かを決めるとき、選択肢を増やしたほうが安心だと考える人は多い。だが実を言うと、決断の本質は、選択肢を減らすことにある（ ５）。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "こうした問題を解決するカギは、機能しているものとしていないものとを選り分ける方法を見つけることだと思うが、これは言うほどたやすいことではない。今のピクサーはこの原則に従ってマネジメントされているが、私はある意味、生まれてからずっと、どうしたら「見る目」を高められるのか、その方法を探ってきたように思う。そのきっかけは、ピクサーが生まれる何十年も前の出来事だった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "冒頭の数ページを読むことによって、その本が自分の教科書になる可能性があるかどうか判断できる。 　書かれている内容が少々難しそうでも、自分の会社が置かれている状況や自分の悩みに対する「フィット感」があれば、教科書として役立つ。「当社の置かれている環境はまさにこの通りだ」と思える本ならば、ピタッとくる。自分にとっての分かりやすさは非常に大切だ。 　逆に、数ページ読んでも「ピンとこない」という場合もある。これは「理論が難解すぎて手に負えない」というケースと、「本がテーマとして扱っている課題が自社の課題と合致しない」という２つの理由が考えられる。私の経験から、役に立つ教科書は、「今、自分が直面している課題を扱うシンプルな理論」であることが多い。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "基本回転数の話からは少し離れますが、時間の制約を設けることが有効なのは、重要度が判断しやすくなるからでもあります。 　どんな職業でもそうだと思いますが、仕事というのは、突き詰めて考えすぎると、無限個の問題が発見できてしまうものです。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}, {"text": "自分がなぜその手を打つのか、説明できないことも多い。ただそれが正しいということがわかるし、そういう直観はたいてい正しい。一つの駒の配置を一時間も吟味したら、堂々巡りになって有効な手は思いつかないだろう。たいてい打つべき手は一〇秒でわかる。それ以降の持ち時間は確認に使っている（ 23）」。カールセンは自分の直観を尊重しており、それ自体とても正しいことだが、同時に「確認」に長い時間を費やす。ときには直観が誤ることもあり、意識的に考えることで最終的な判断の質が高まることを知っているからだ。", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}]}, {"id": 195, "label": "金融政策", "freq": 6, "highlights": [{"text": "世間に出回るお金の量を意図的に増やして景気を刺激したり、意図的に絞って過熱気味の景気を抑えたりする金融政策は、各国で日常的に行われていますが、ビットコインには中央銀行がないので、流通量をコントロールするという発想がありません。そのため、どこか特定の国の思惑に左右されることなく、安定的に流通量が増えていきます。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "日本全体に存在する貨幣の量のことを「マネーストック」と言います。現在、マネーストックは日銀の発行した現金と、日銀当座預金と、すべての民間の金融機関が持っている預金の量を合計したものになります。マネーストックは民間の金融機関が貸し出しを増やすと増加し、貸し出しを減らすと減少します。", "book_title": "もう銀行はいらない", "author": "上念 司"}, {"text": "ケインズは人々の給料とモノの価格の変化の速度の差に注目し、不景気になるとモノは売れずに価格は下がるが、給料が下落する速度はそれより遅いので、企業からすると賃金（労働者の給料）は高いと感じ、人々を雇わなくなってしまう、すると労働者は失業し、企業の生産量は下落していくと考えました。ケインズはここが政府の出番であり、政府が財政政策によって公共投資を行なうか、金融政策で貨幣供給を増やすことによって金利を下げて有効需要を増やすべきだと考えました。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "そして大蔵省に対し、市場原理に基づいて銀行を潰せと迫ったローレンス・サマーズ財務副長官は、いったん日本で金融危機が起こると手のひらを返し、「金融危機を絶対に世界に波及させるな」と身勝手なことを言い放っていたそうです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "またロバート・ルービン財務長官が、ゴールドマン・サックスの共同会長出身であったこともあり、米金融機関からのロビー活動があったのも事実です。潰れた金融機関や破綻した企業のアセット（資産） を安値で買い取りたいという狙いがあったのでしょう。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "だが、基幹産業というのは、勃興期から成熟期まで、およそ四十年のサイクルで大きく動いていく。そして、ある基幹産業から新しい基幹産業へ移行する端境期には、金融的に過剰流動性が発生しやすい傾向が生じる。なぜなら、成熟期に入ってくると産業の伸びが悪くなり、景気も悪くなってくるので、どうしても当局は金融財政政策を打ち、金融を緩和していくからである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}]}, {"id": 196, "label": "自律性", "freq": 6, "highlights": [{"text": "世間に出回るお金の量を意図的に増やして景気を刺激したり、意図的に絞って過熱気味の景気を抑えたりする金融政策は、各国で日常的に行われていますが、ビットコインには中央銀行がないので、流通量をコントロールするという発想がありません。そのため、どこか特定の国の思惑に左右されることなく、安定的に流通量が増えていきます。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "① 自走を可能にする情報が共有されていること 　② 自身の判断で動いていい権限を与えられていること 　③ 自身が何をすべきか考える能力を備えていること 　④ 失敗してもマイナス評価にならないこと", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "また、休暇の申請も必要ない。いつでも好きなだけ休暇をとることが可能だ。社員にお願いしているのは３点だけ。（１）妥当な範囲内にとどめること、（２）カレンダーに予定を入れること、（３）チームに迷惑をかけないように調整すること。 　そうやって一人前の大人として扱えば、彼らもけっして無茶", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "緊張感は、ムダをなくして利益を出す、稼げる会社になると、自然と社内に芽生えてくるものだ。ムダをなくすには社員が自分自身で考えて行動するようになることが必要だ。そうなれば、 自ずと緊張感を持って働くようになるからだ。新商品の開発はそれまで待ったほうがいいのだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "企業にとって自社で構築するプライベートDMPがなぜ重要かというと、マーケティング最適化のためにユーザーをセグメントできるのは、企業自身であるからだ。自分たちにとって対象となるユーザーをどうセグメントするかは、これから重要なマーケティングスキルとなる。", "book_title": "顧客を知るためのデータマネジメントプラットフォーム　DMP入門 (NextPublishing)", "author": "横山 隆治、菅原 健一、草野 隆史"}, {"text": "前回のコミットメント期間と同じように、今回もグルテキンは、コミットメント期間の途中で自分の任務を修正した。当初予定していた目標に向けて進むには、タイミングがよくなかったのである。そのかわり彼女は、タレント・ソリューション・グループ内で採用情報の新事業をゼロから立ち上げることにした（このサービスは今では「タレント・ブランド」として知られる）。リンクトインにとって手つかずの分野だったため、新事業を実務的に支える部署横断型チームはまだ組成されなかった。それでもグルテキンは起業家タイプにありがちながむしゃらぶりを発揮し、任務遂行に必要なことは何でも自分でした。投資予算を獲得するために事業計画書を書き上げ、社内で自らチームも立ち上げた。新事業のネット上での営業プロセスを改善する作業に自分も直接かかわるべく、ＳＱＬ（データベース用言語）を独学し、セールス・ドットコムの使い方を身につけた。 結果は、実績がすべてを物語っている。二〇〇九年、この事業分野全体の年間売上げは一二〇万ドルにすぎなかったのに、グルテキンのコミットメント期間が終わる二〇一三年の売上げは、年間二億ドルにまで増加した。このタレント・ブランド事業は現在、リンクトインの全タレント・ソリューション事業の二〇％を占め、彼女が二〇一〇年に立ち上げたプリセールス・コンサルタント、アナリスト、顧客担当からなるグローバル・チームは八五人へと増えた。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 197, "label": "希少性", "freq": 6, "highlights": [{"text": "２１００万枚発行された時点で打ち止めになります。計算上は、２１４１年にすべてのビットコインが掘り尽くされる予定です。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "ビットコインは、通貨というよりも、 金 にいちばん近いと私は考えています。もともと発行数が有限だから希少価値が高いし、時間がたつほど採掘するのがむずかしくなるように設計されているからです。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "優秀なクリエイターは論理的にコンテンツをつくるんです。その中で希少性を高めるために、感性を利用するってことはあります。コンテンツがあふれている今は、希少性も勝負のポイントになってきますからね。でも、基本は論理なんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "人は、少ないものに価値を見いだす。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "とにかく、試してみてほしい。直接会う機会が少なくなれば、その価値は驚くほど高まるはずだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "「これしかない」 その商品だけにしかない物語を伝える。開発ストーリーや、その商品が開発されるまでの過程などを詳細に伝えて「これしかない」と理解してもらう。この商品とボクが出会ったことは、運命かもしれない・・・そんな風に感じさせる発信力が大事となる。 「ここしかない」 このお店にしかない。通販限定商品である。お客様に「ここしかない」と納得してもらうことである。他のお店に行ってもあると思われたら購入機会の損失である。 「いましかない」 いつでも買えるが、いちばんの敵。いまなら特別価格で。これから限定●●名様に。期間限定の特典を付加することは購入動機の背中を強く押す。期間セールやタイムセールの設定は、お客様の反応を大きく左右する。", "book_title": "地域Ｎｏ.１を目指すな！地域繁盛店の売上を５０倍にする・中小企業向けダイレクトマーケティング論: 地方だから成功できる！ 売上があがるウェブマーケティングシリーズ", "author": "覚田 義明"}]}, {"id": 198, "label": "時間軸", "freq": 6, "highlights": [{"text": "２１００万枚発行された時点で打ち止めになります。計算上は、２１４１年にすべてのビットコインが掘り尽くされる予定です。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "経済学の論理では、ブラック企業はやがて淘汰され、市場から退出する。しかし、そこに至るまでには百年単位の時間をかけなければならない。サービス産業には情報の非対称とか、選択肢の欠如とか、市場を非効率化し、失敗させる要素が盛りだくさんだからだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "こう考えると、私たちの行動には、「三つの時間軸における合理性」が互いに絡みあうかたちで影響を与えていることが分かります。その結果、私たちの心には三つの時間に由来する異なるベクトルが競合することになります。同じ対象(糖など) に接近したい一方で回避したいとも思う「揺れ動く心」をもつことも、これによって説明できるかもしれません。「接近か回避かのジレンマ」は、それぞれの時間スケールにおける生き残り上の有利さを実現しようとするうえで生じている可能性があるということです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "昔ファンの人から指摘されたのですが、地下アイドルには３年で引退してしまう風潮があって、だいたい１年目は右も左もわからず無我夢中に活動して、２年目に腰を据えて努力するのですが、３年目に見切りをつけて業界を去って行く流れになっています。 　そして不思議なことに、３年を越えると引退のタイミングを逃してしまうんですよね……。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "そこでリーダー層については、１年ほどかけてじっくり観察し、その上で人物を見極めることにした。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "経験則でいえば、その人材の初めての変革型コミットメント期間は二年から五年ほどになる。この年数はほぼすべての組織や業界に当てはまる普遍的な期間のようだ。ソフトウェア業界では、二〜五年という期間は一般的な製品開発サイクルに合致するので、一人の社員が大きなプロジェクトを最初から最後まで経験できる。シリコンバレーで社員にストック・オプションを与える時に、通常四年間かけて付与（ヴェスト）する慣行もこのサイクルを反映している。一般消費財業界を見ても、プロクター・アンド・ギャンブル（Ｐ＆Ｇ）などの企業では、新しいブランド・マネジャーはまず、二〜四年間のコミットメント期間から始める。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 199, "label": "リスク", "freq": 6, "highlights": [{"text": "「役に立つかどうか」だけで物事を判断すると、すでに役立つことが証明されていることにしか時間を使わなくなる。 だが、「役立つ」ことが明らかになってからでは遅すぎる。 「役立つ」ことが証明されている分野では激しい競争が起きるからだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "● アイデアを実行しないことこそ最大の失敗であり、罰の対象になるということを周知徹底する。 ● 全員が過去の失敗から学ぶようにする。同じ失敗には何度も報奨を与えない。 ● 失敗の数が少ないときには疑う必要あり。その人間が十分なリスクを負っていないか、あるいは組織の他のメンバーが自分の失敗から学ぶのを嫌って、失敗を隠している可能性がある。 ● 過去に「知的な」失敗を犯した人を採用し、組織の他のメンバーにそれが採用の理由のひとつであることを知らせる。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "ビジネスにおいてはどれだけの経験値を持っているかがすべてといっていいほどです。そこで問われる経験は、ビジネスに限ったことではありません。 　プライベートでどれくらい失敗しているかということも大きな意味を持ってきます。 　 リスクのないところで本気になる経験をしておかないと、リスクがあるところで本気は出せない というのが私の持論です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "通常の価値観なら、問題のあるビジョンは極力排除したうえで、誰からも否定されないただ１つの強いビジョンを作りたくなるかもしれません。しかし、それでは既知の良さにしかつながらないのです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "⑤アイデアを育てたり、切り落としたり、採り入れたりするには、上層部の「園芸」スキルが必要である。ＭＢＡはこれを「リスク許容度」という言葉で表現している。私", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "このような批判的思考を身につけるためには、「無難な既知」に流れるのではなく、「リスクを取って未知にチャレンジしていく」しかありません。しかし、それがやがてこれからの時代で必要な「個」という知性を磨いていく ことにもなるのです。 　知性というのは、すなわち「危うさ」であるとも言えるのではないでしょうか。なぜなら、危うさを制御するために知性があるからです。そこで何もしないでじっとしているのであれば、知性など要らないのです。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}]}, {"id": 200, "label": "傾聴", "freq": 6, "highlights": [{"text": "猛獣園ではこの意思決定法が驚くほど機能する。 ・意見を述べる時間が確保され、言いたいことを伝えられる ・自分の意見をチームメンバーが傾聴してくれる この２つのプロセスを踏んでいるからだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "自分の話を納得いくまで聞いてもらい、理解、同情してもらえたと実感できた時、女性は自分が相手に愛されていることを確信でき、それだけで心が満たされ始める。不信感や猜疑心はたちまち消し飛んでいく。", "book_title": "ベスト・パートナーになるために―――男と女が知っておくべき「分かち愛」のルール 男は火星から、女は金星からやってきた", "author": "ジョン・グレイ、大島 渚"}, {"text": "偉大な心理学者ジグムント・フロイトは、偉大な聞き手であった。かつてフロイトと話す機会のあった人が、次のように説明している。 「フロイトのことは生涯忘れられない。彼には、私がこれまでに会った誰にもない資質が見受けられた。彼の目は穏やかで優しかった。精神分析の時の〝魂を見通す目〟などまったく感じさせない。声は低く、温かで、身ぶりはほとんどない。私の言葉に注意を集中し、下手な言いまわしにも耳を傾け、それなりの評価を与えてくれた。このような聞き方をしてもらえたことが、私にとってどんなに素晴らしい経験だったかご想像にまかせる」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❻　 相手にしゃべらせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "それほど重要でない内容でも、メモをとりながら聞くことで「こんな与太話も尊重してくれている」とあなたの可愛げが何倍にも増す からである。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "本物の礼節を知る人間は、他人の意見にもよく耳を傾ける。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 201, "label": "現場主義", "freq": 6, "highlights": [{"text": "私が自殺に関する勉強をしっかりとし始めたのは、二〇〇四年頃、二つ目の大学での五年生のときからだった。私は当時、ホームレス問題に強く関心をもっていて、ボランティア活動を続けていた。そのときに衛生学の恩師に言われたのである。 「気持ちは大事だ。研究もしっかりしなさい」 　支援活動はやりっぱなしになりうる。指針がなければ感情が判断基準になる。何が正しいのかを学ばないまま行う活動はただの偽善になるかもしれない。間違った善を押し付けてしまい、かえって不幸を生み出すかもしれない。研究の仕方を知らなければ、自分の考えに合う資料ばかりに目を通してほかの真実を無視してしまっていることに気付く手段がない。 　これを防ぐ唯一の方法は、現場にいながらも勉強をし続けることと、本当の意味の研究を行うことだ。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "効率は、ひとが生きやすくなるための手段である。しかし平成の大合併は、コストを減らすことが目的になってしまった。成果はコストを減らすことだった。すべての計画はひとの生きやすさこそが目的になるはずなのだが、それは見えなくなった。効率を手段ではなく目的に添えてしまっては、それは何も生み出すことはない。それどころかひとを不幸にさえしてしまう。 　意思決定は現場で行うべきである。答えはいつも現場にある。効率化を目的とし組織をまとめた結果、意思決定は現場でより行えなくなった。事務所で行うことになった。この結果、意思決定の間違えはおのずと増える。 　ひとが生きにくくなった原因のひとつは、意思決定を事務所で行わざるを得なくなるような組織の大きさを作ってしまったことにある。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "答えは現場にある。その現場で意思決定があるかどうか。 　組織のよい成果に、このことは大きく影響する。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "そのために、 経営者や幹部は現場に行って極力出社しなければいい。 現場で発見したことは長短あるが、どこかで聞きかじったテーマより重要性が高い。 現場には改善と改革のヒントが隠されている。経営者が新しいテーマを出してもいいが、１年で数回程度にすべきだ。それまでじっと我慢してため込む。その間に忘れたら重要性が低い証拠だ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "これは私が時々する方法だが、現場から順番にたどっていくと、どこで指示が正しく伝わっていないのかを確認することができるのだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "上が現場主義に徹し、下をちゃんと見る、目を光らせる、というのは、組織に緊張感をもたらし、だらけさせない最良の方法である。 ところがダメな会社はそれができない。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}]}, {"id": 202, "label": "思いやり", "freq": 6, "highlights": [{"text": "バスはゆっくりと走っていた。それは、バスを待つ老人を見つけるためである。老人を見つけて、ゆっくり乗せて、ゆっくりと動いて、ゆっくりと目的地にたどり着く。誰のためのバスかをよくわかっている。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "私は先輩格のメンバーに「ちゃんと後輩の面倒をみること」と教えてきました。それはチームワークを推奨しているのではなく、 自分より弱い者にやさしくするのは人として当然の思いやりだからです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "弱き者を思いやり、強き者にライバル心を燃やす──。 　それをもしもチームワークと呼ぶのであれば、私は大いにチームワークを推奨したい、そう思います。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "鷹山は子供らに「大きな使命を忘れて、自分の利欲の犠牲にしないため」、「貧しい人々への思いやり」を養いました。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "真の人格者であるかどうかを測るものさしはたくさんある。中でもまちがいのない方法は、その人間が目下の者にどうふるまうかを見ることだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "こう考えてくると、やさしさと思いやりが人間の人柄を判断する重要な決め手といえそうだ。真の人格者であれば、そのちょっとしたふるまいにも他人に対する気くばりが行き届いている。相手が対等な立場であろうと目下の者であろうと、その気くばりは変わらない。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 203, "label": "自己変革", "freq": 6, "highlights": [{"text": "「相手は変えられない、変えられるのは自分」 　自殺希少地域のひとたちは、大自然との対話をよくしているようだった。厳しい自然があって、相手を変えることはできない。 　よって、自分を変える。工夫する力を得る。相手の動きとよく対話をして新しい工夫をしていく。 　工夫する力、工夫する習慣は、このようにして身に付き、そして他の困難に直面したときも工夫する習慣が助けになっていく。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "だからこそ、あなたが「世界を変えよう」としていることと等しい量の変化を、コンセプトは「あなた自身」にも要求してくるのではないでしょうか。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "世界を変えた勇者に対して、世界は直接「勇者の心を変えること」で報いる。 こんな表現はロマンチックに過ぎるかもしれませんが、少なくとも私にはそう思えます。 世界を良くするコンセプトを作ることによって得られる最高の報酬は、あなた自身の変化という目に見えない形で支払われる、と。 未知の良さを実現するには、あなた自身が、「未知のあなた」になる覚悟が必要です。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "ビジネスパーソンが伸びるかどうかは「 コーチャブルかどうか」にかかっています。これは「素直さ」とも言えますが、コーチを受けて自分を成長させる意思があるかどうかです。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "そしてドイツがその最たる例ですが、新自由主義の時代、経済面での相互依存が深まる中、戦争は起きないという前提でロシア産のエネルギー供給に頼り、 14 億の民を抱える中国需要を取りに行くビジネスモデルを作りましたが、今これが逆流しています。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "恋愛に限らず、すべての人と人とのふれあいの根底に「感謝」の気持ちを本当に持っているのか、がとても大切だと個人的にいつも思っています。「好き」「好かれたい」「愛している」「愛されたい」は、実は自分が相手に求める想いです。そして、それが成就しない気持ちは、多くの場合は悲痛が伴います。しかし「感謝」の気持ちは、相手に求めるものではありません。自分の心に問い、自分の本当の心の中から出る「自然」な思いのはずです。今、まずできることは「手紙を出す」ことでも、「ひたすら待つ」ことでも、「合コン」に行くことでもないように思えます。そのどれかが、結果的にうまく行っても、また、どこかで同じような問題に出会うことになるような気がします。今、ご自身のなにかを変えるチャンスです。その回答は、他者に求めないご自身の感謝の気持ちの先に必ずあると思います。", "book_title": "白本", "author": "高城剛"}]}, {"id": 204, "label": "労働市場", "freq": 6, "highlights": [{"text": "経済学は、貿易財（トレーダブルグッズ）の世界で物事を考えようとする癖がある。その結果バイアスがかかり、サービス産業のことに真剣に向き合わない。むしろ、気がつかないと言ったほうがいいかもしれない。もちろん労働市場が国境を越えて完全に効率的であれば、サービス産業でも貿易財に近い現象が起きやすくなる。しかし、労働市場が国際的に効率的だったためしは人類史上において一度もないし、今後も起きるとは思えない。第", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "これに対し、ローカル経済圏での雇用は、基本的に「ジョブ型」だ。ジョブ型はメンバーシップ型とは正反対で、仕事内容、労働時間、勤務地がおおむね限定される。ローカル経済圏の中心となるサービス産業は、完全にジョブ型である。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "しかし幸か不幸か、日本経済と企業には過去の蓄積があり、雇用を守って痛みを耐え忍ぶだけの余裕があったので、雇用を守りました。 　逆に、幸か不幸か、雇用をカットせざるをえなかったのがお隣の韓国でした。日本の金融危機と同じタイミングでアジア通貨危機が起きたとき、日本のような富の蓄積と国内市場の規模がなかったため、韓国企業は雇用を守れませんでした。雇用を守れなかったがゆえに、新自由主義という荒波に身をさらし、ダーウィンの進化論よろしく、それに適応することに成功したのです。自国のみでこの危機を乗り切ることは無理だと判断した韓国政府は、構造改革に取り組むという条件を吞むことで、国際通貨基金（ＩＭＦ） などの国際金融機関からの金融支援を取りつけます。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "「失われた 30 年」とは、ゾンビ社員が退職するまで待った 30 年だと換言できます。そしてそこまで待ったことで、次のチャートが示すように、日本は絶対的な人手不足時代に突入しています。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "私は彼に言いました、「ビンセント、それは違うよ。私の国は生産性を高めようとしているのではなくて、そうやって雇用を守っているんだ」。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "その意味では、中国の若者に見られる「寝そべり族」の方がより深刻な問題です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}]}, {"id": 205, "label": "効率と非効率", "freq": 6, "highlights": [{"text": "本書の基本的主張はこうだ──「 私たち現代人は、必要以上の整然さを求めるあまり、適度な無秩序を受け入れることがもたらすメリットを取り逃しているのではないか」", "book_title": "ひらめきを生み出すカオスの法則 (T&#x27;s BUSINESS DESIGN)", "author": "ティム・ハーフォード、児島 修"}, {"text": "この１００年から１５０年程度で振り返ると、日本は二度覇権国家に愛され、二度嫌われた経験があります。最初にラブコールを送ってくれたのは、 20 世紀初頭、当時の覇権国家であった英国です。イギリスは帝政ロシアの勢力拡大を抑えるため、東洋に同盟国を求めました。その結果、この時期の日本は、韓国を併合しても、満州に手を出しても許され、経済的に繁栄します。二度目は冷戦下、アメリカがソビエト・ロシアを封じ込めるため、日本の経済発展を助けてくれた時です。 　そして今回、三度目の機会が訪れています。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "新自由主義の時代には、企業経営者にとって必要なものを、必要なときに、必要な分だけ調達する「ジャスト・イン・タイム」が理想的なサプライチェーンでした。無駄なものを何も抱え込むことなく、国家の壁を考える必要もなく、効率を追求しさえすれば、企業収益は拡大します。しかし、このビジネスモデルは通用しなくなり、万が一に備えた「ジャスト・イン・ケース」のサプライチェーンの構築を迫られています。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "戦略コンサルタントの三谷宏治さんが、『特別講義　コンサルタントの整理術』（実業之日本社）で書いている。 「ホワイトカラーの非効率の原因は『悩み』の蔓延、つまり『悩む』という作業に多くの時間を費やしていることにある」 「まじめなヒトほど、困って悩んでいる」 「悩んでいると、ヒトは深く考えているつもりになるが、実は全く進んでいない」 「資料を作る手は止まり、同僚・友人との雑談に逃避する」", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "緊張感は、ムダをなくして利益を出す、稼げる会社になると、自然と社内に芽生えてくるものだ。ムダをなくすには社員が自分自身で考えて行動するようになることが必要だ。そうなれば、 自ずと緊張感を持って働くようになるからだ。新商品の開発はそれまで待ったほうがいいのだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "何かを変えようと思ったら、まずは一番やりやすく、成果の出やすいところから手をつけるのがセオリーだ。 すべてを一度に変えようとすると、結局、何も成果を得られないことが多い。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}]}, {"id": 206, "label": "プラットフォーム", "freq": 6, "highlights": [{"text": "そこで平安保険は、グッドドクターという医療・健康アプリを作りました。これはプラットフォームであり、そこにユーザーを集めて自由に行動してもらうことで行動データを集め、医療に関する興味、関心、不安をデータとして吸い上げる仕掛けを作ったのです。ユーザーの関心が詳しく分かれば、健康に関するペインポイントが浮き彫りになります。一人ひとりのペインポイントが具体的に分かれば、営業員やマーケターに具体的な指示を出して問題解決をしたり、細やかにニーズに応えたりできます。まずはユーザーの行動データをできる限り収集し、リアルとデジタルをフル活用して連携を取るという施策です。これは、まさにOMOの好例といえます。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "アリババがエコシステム化を追求した結果、明確に「エコシステムを作るためのUX（ユーザーエクスペリエンス）方法論」を持っているということです。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "キンドルが米国でやったことは、ご存知ですよね。目玉商品として、売れ筋のペーパーバックを書店よりも安く売ったんです。それをされるのがいやで、出版社は卸値を高くした。そうしたら、アマゾンは卸値よりも安く販売した。逆ざやを取ったんです。 　これはどういうことかというと、コンテンツビジネスをしていないプラットフォームというのは、とにかくコンテンツの値段を下げようとするということです。ユーザーが集まってプラットフォームが拡大すれば、後で帳尻を合わせられるから。プラットフォームの拡大時期においては、コンテンツなんかスーパーの特売の卵みたいなもので、客寄せのツールなんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "ドコモやａｕ、ソフトバンクがガラケーの時代にコンテンツ競争をしたときも、キャリアはコンテンツメーカーにコンテンツの値段を下げさせようと必死だったんですよ。安いパックをつくったり、会員数でメニュー順位を決めることにして、安いサイトをつくって会員数を増やしたほうが得するようなインセンティブ設計にしたり。どうして値段を下げさせようとするかというと、プラットフォーム側はコンテンツの値段を下げても、懐がいたまないからです。 　電話料金やパケット代を下げるのではなく、コンテンツの値段を下げたほうが、自分の懐をいたませずに値下げ競争ができて、客寄せができる。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "コンテンツをつくらないプラットフォームは、最初はとりあえず、既存のプラットフォームよりも安くコンテンツが手に入る場所にするんです。そして、プラットフォーム自体の競争力を強くしようとする。オープンなプラットフォームっていうのはそうなっちゃうんですよね。みんな自由とか公平とかよくわからない倫理観でオープンを支持するけど、本当はそんなの地獄でしかないんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "アマゾンは、複数の象限を開拓しようとする《チャネルシフター》である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}]}, {"id": 207, "label": "感情価値", "freq": 6, "highlights": [{"text": "アフターデジタルにおけるリアル接点の役割」である、体験価値や感情価値をそのまま体現している店舗設計と言えるでしょう。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "アフターデジタルにおいてリアルチャネルは、『密にコミュニケーションを取れる貴重な接点』であり、高い体験価値や感情価値が求められるようになる」", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "スターバックスはコーヒーのおいしさという「機能価値」を提供するだけでなく、体験や、体験を通じたソーシャルでの影響といった「感情価値」「関係性価値」を提供しているのです。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "他に代えがたいストーリーやドラマがあるもの。そこに、我々は「愛着」を覚える のである。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "プレゼントしようと自分のことを考えてくれた「想い」がうれしいのである。プレゼントを選ぶために使ってくれた「時間」がうれしいのである。プレゼントを探すために動いてくれた「努力」がうれしいのである。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "そして、この点に注目して成功したのが、秋元康氏がプロデュースするＡＫＢ 48 です。歌や踊りのレベルが高くなくても、ひたむきに頑張る姿を見せることに価値があるのは、甲子園児だけでなく芸能人でも同じだと見抜いたのは、秋元氏の 慧眼 でしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}]}, {"id": 208, "label": "SNS", "freq": 6, "highlights": [{"text": "本当に、既読システムを人類に持ち込んだ人、いい加減にしてほしい。自分が送ったメッセージが相手に読まれたかどうかなんて、そんなところまで世界の解像度は上がってくれなくてよかった。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "軒並み皆、楽しいことを共有するためではなく、現実で誰にも言えないことを吐き出す感情のゴミ箱としてＳＮＳを使っている感じがする。勝手に自己矛盾に 苛まれたり急に過剰に自己批判的になったり、この、一人で勝手に暗闇に突き進んでいく雰囲気には、確かに身に覚えがある。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「ファンダムとは、程度の差はあれどすでに多少は視野が狭まっている人間の集まりです。その人間たちが、拡散や連帯との相性が良すぎるＳＮＳという場所に集っているんです。私たちは今後そこに意図的に物語を提供していくわけですから、集団心理の暴走が起きないよう細心の注意を払う必要があります。そのためにも、点描でいいので、ファンダムの全体図を把握する作業は大切なんです」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "ツイートを共有する、フェイスブックを更新する、インスタグラムに写真を載せるといった行動は時間クレーターの元凶だが、それらが危険な理由がもう1つある。「見せかけの達成感」を得られる のだ。 ネット上のやりとりにコメントすると、何かをやり遂げたような気になり、「仕事をしたぞ！」と脳が知らせてくる。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "ＳＮＳにつきまして、あまりお話ししたことがなかったので、少しだけ僕の考えをお話ししたいと思います。一般的に「つながり」などと、あらゆる局面で言われておりますが、各民族のもっとも濃く小さな「つながり」の本質を僕は家族にみます。血はインターネットより濃いからです。 　フランスの家族人類学者エマニュエル・トッドの分析から僕が考えることは、今の日本の問題は、新自由主義ではなく、日本的直系家族（長男が家を継ぐことが是）が壊れ核家族化したことにあると思っています。また、柳田國男の『蝸牛考』にもあるように、中心から革新が伝播して周辺に古形が残るという周圏分布を見ると、意外ですが核家族がもっとも古い形態で、次に絶対家族、そして次は共同体家族ということなります。僕は常々、ネットで起きたことは現実でも起きるとお話ししていますので、そう考えると、ネットが向かう次の形態は共同体家族であり、それが日本のＳＮＳが持つ本質であって、核家族型の英米型とは同じシステム（ＳＮＳ）でも「違った使い方」＝共同体家族型をすることになるんだと睨んでいますし、ツイッターの使い方など、英米と日本では違う理由が、アルファベットと漢字の差以外にも、ここにあると思います。 　次に、このもっとも濃く小さな「つながり」である家族形態の変貌がいつどのように起きるのか、ですが、これは、識字率と出生率と大きく関係があると考えています。「アラブの春」をＳＮＳ革命などと安直に話す人がいますが、そうではなく、識字率が上がると（そして出生率が下がると）、社会が不安定になりパラダイムシフトが起きやすくなるのです。ソ連の末期も最近のアラブもそうで、日本だと、江戸末期がまさにそうでした。今、日本の社会が直面しているのはテレビと新聞ｖｓデジタル識字率です。インターネットで自由に情報を得…", "book_title": "白本", "author": "高城剛"}, {"text": "ＳＮＳにつきまして、あまりお話ししたことがなかったので、少しだけ僕の考えをお話ししたいと思います。一般的に「つながり」などと、あらゆる局面で言われておりますが、各民族のもっとも濃く小さな「つながり」の本質を僕は家族にみます。血はインターネットより濃いからです。 　フランスの家族人類学者エマニュエル・トッドの分析から僕が考えることは、今の日本の問題は、新自由主義ではなく、日本的直系家族（長男が家を継ぐことが是）が壊れ核家族化したことにあると思っています。また、柳田國男の『蝸牛考』にもあるように、中心から革新が伝播して周辺に古形が残るという周圏分布を見ると、意外ですが核家族がもっとも古い形態で、次に絶対家族、そして次は共同体家族ということなります。僕は常々、ネットで起きたことは現実でも起きるとお話ししていますので、そう考えると、ネットが向かう次の形態は共同体家族であり、それが日本のＳＮＳが持つ本質であって、核家族型の英米型とは同じシステム（ＳＮＳ）でも「違った使い方」＝共同体家族型をすることになるんだと睨んでいますし、ツイッターの使い方など、英米と日本では違う理由が、アルファベットと漢字の差以外にも、ここにあると思います。 　次に、このもっとも濃く小さな「つながり」である家族形態の変貌がいつどのように起きるのか、ですが、これは、識字率と出生率と大きく関係があると考えています。「アラブの春」をＳＮＳ革命などと安直に話す人がいますが、そうではなく、識字率が上がると（そして出生率が下がると）、社会が不安定になりパラダイムシフトが起きやすくなるのです。ソ連の末期も最近のアラブもそうで、日本だと、江戸末期がまさにそうでした。今、日本の社会が直面しているのはテレビと新聞ｖｓデジタル識字率です。インターネットで自由に情報を得...", "book_title": "白本", "author": "高城剛"}]}, {"id": 209, "label": "経済システム", "freq": 6, "highlights": [{"text": "【個人的な意見になりますが、今、推される側も推す側も、優しさを求めている気がします】 「だからこういう言い換えがムカつくんだって！ 推す側が求めてるのは優秀な運営と良質な供給です！ あと潤沢な在庫とランダムグッズの廃止と良席！」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "新自由主義の下で、日本はまさに最大の敗者となりました。政財官の「鉄の三角形」に支えられた日本株式会社方式の経済はボロボロになり、「失われた 30 年」で日本の地位は低下し続け", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "１９８１年にシカゴ大学のシャーウィン・ローゼン教授が提唱して以来、経済学の分野で活発な議論が行われてきたテーマに「スーパースターの経済学」というものがあります。スポーツや音楽など大衆娯楽の分野では、同じ「プロ」でも末端とトップレベルの間には途方もない収入格差が存在します。プロテニス選手でもプロゴルファーでも、世界ランキングが上位であれば、スポンサーがついて世界のツアーをすべて手配してくれますが、その順位に達しない場合、普段はコーチで稼ぎながら、自費でツアーにチャレンジする必要があったりします。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかし、その頃の日本はアメリカのそうした思惑や戦略をよく理解せず、右肩上がりの成長を自分たちの手腕によるものだと考える傾向が強かったと思います。日本のビジネスモデルを自画自賛し、日本は終身雇用だから社員が安心して会社に勤めることができるし、企業間の株式持ち合いも手伝い、企業経営者も目先の利益を追うのではなく、中長期的な利益を考えることができる、との議論です。それに対して、アメリカの資本主義経営者は投資家のほうを向いていて、クォータリー（四半期） ベースの目先の利益しか見ていない。だからアメリカ企業はダメなんだ、と言って胸を張っていました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかし幸か不幸か、日本経済と企業には過去の蓄積があり、雇用を守って痛みを耐え忍ぶだけの余裕があったので、雇用を守りました。 　逆に、幸か不幸か、雇用をカットせざるをえなかったのがお隣の韓国でした。日本の金融危機と同じタイミングでアジア通貨危機が起きたとき、日本のような富の蓄積と国内市場の規模がなかったため、韓国企業は雇用を守れませんでした。雇用を守れなかったがゆえに、新自由主義という荒波に身をさらし、ダーウィンの進化論よろしく、それに適応することに成功したのです。自国のみでこの危機を乗り切ることは無理だと判断した韓国政府は、構造改革に取り組むという条件を吞むことで、国際通貨基金（ＩＭＦ） などの国際金融機関からの金融支援を取りつけます。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "もう一つの怪物はＧＡＦＡＭに代表されるＩＴ企業です。一昔前、「ＧＭは国家なり」という言葉がありましたが、日本のトヨタ自動車同様、ＧＭは雇用を生み出しましたし、法人税も多く払いました。しかしＧＡＦＡＭになると、雇用はしないわ、税金は払わないわ、プラットフォーマーとその周辺だけが大儲けをするビジネスモデルです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}]}, {"id": 210, "label": "選択と集中", "freq": 6, "highlights": [{"text": "「やらなくては」ではなく「やると決める」。 「どれも大事」ではなく「大事なものはめったにない」。 「全部できる」ではなく「何でもできるが、全部はやらない」。 　この３つの真実が、私たちを混乱から救い出してくれる。本当に大事なことを見極め、最高のパフォーマンスを発揮することが可能になる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "オーストラリアのホスピスで看護師をしていたブロニー・ウェアは、死を迎える患者たちが最後に後悔していることを聞き、記録しつづけた。その結果、もっとも多かった答えは「他人の期待に合わせるのではなく、自分に正直に生きる勇気がほしかった（ ６）」。 　自分に正直に生きるというのは、単にわがままになることではない。不要なことを的確に見定め、排除していくことだ。そのためには、無意味な雑用を断るだけでなく、魅力的なチャンスを切り捨てることも必要になる（ ７）。やることを減らし、人生をシンプルにして、本当に重要なことだけに集中するのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "戦略には選択とトレードオフがつきものだ。 　　　独自性を意図的に選びとるのである。 ── マイケル・ポーター（経営学者）", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "エッセンシャル思考の人は、自らトレードオフを選びとる。誰かに決められる前に、自分で決める。経済学者のトーマス・ソエルはこう言った。 　「完璧な答えなど存在しない。あるのはトレードオフだけだ（ ７）」 　ピーター・ドラッカーは、かつて『ビジョナリー・カンパニー』シリーズの著者ジム・コリンズにこうアドバイスしたと言われている。 　「偉大な企業をつくるか、偉大な思想をつくるか、どちらかだ。両方は選べない」 　そこでコリンズは思想を選んだ。彼の会社は従業員３人の小さな会社にとどまったが、彼の思想は世界中に広まり、数千万人の人びとに影響を与えている（ ８）。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "本質目標のステートメントは、美しくなくていい。形よりも中身が大事だ。細かい言いまわしを考える暇があったら、もっと本質的な問いを立てよう。 　「たったひとつのことしかできないとしたら、何をするか？」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "ツイッター共同創業者のジャック・ドーシーは、たぐいまれなエッセンシャル思考の経営者だ。ディナーに同席したとき、彼はＣＥＯの役割を「最高〝編集〟責任者」と定義していた。別のスタンフォード大学のイベントでは、次のように説明している。 　「なぜ編集かというと、日々やることは山ほどありますよね。でもそのなかで、本当に重要なのは１つか２つ。エンジニアやサポート担当やデザイナーは次から次へとアイデアを持ちかけてきますが……編集者である自分は、そういう情報のなかから１つのこと、あるいは２つか３つの要素の交点を見つけ出し、それだけを実行すると決めるのです（ ３）」 　ただノーと言うだけなら、３歳児にもできる。編集の技術は、ただ減らすことにあるのではない。減らしながら、価値を増やすのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}]}, {"id": 211, "label": "行動変容", "freq": 6, "highlights": [{"text": "この 15 年間で習慣についての研究が進み、習慣を変える方法もわかってきました。研究者によると、あらゆる習慣には『トリガー』『行動』『報酬』の３つの要素があります。トリガーとは、ある行動を自動的に呼び起こすためのきっかけです。次に行動がきます。これは肉体の動作のほかに、感情や思考も含みます。そして最後に、報酬があります。この習慣を次も繰り返したいと思うような、ごほうびです。この３要素のループが繰り返されることによって、", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "第一に、社会心理学の研究によると、人々はある考え方を公言するようになると、 それまではそうした考えを持っていなくても、その考え方に従って行動する傾向が際立って強くなる。つまり、基本理念を公言すること自体で、その理念に従って一貫した行動をとる傾向が強まることになる。ビジョナリー・カンパニーは、比較対象企業に比べて、基本理念を公言する傾向がはるかに強い。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "既にご紹介した通り、リーダーシップ論の世界的権威であるロビン・シャーマによれば、人間は何らかの行為を３週間続ける事ができれば、３週間後には無意識にその行為を「習慣」として続ける事ができるそうです。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "同様に、なんでもかんでも「きっとお金のためだ」といったお手軽な理由で納得し、その時点で思考を止めてしまうのも、非常に危険です。そんなふうに決めつけていると、人間とはどんな生き物なのか、わからなくなってしまいます。 自分の欲望と向き合い、人間のインセンティブシステムに関心を持ちましょう。そして問題に直面したら、「どうすればみんな自発的に、望ましい方向に動いてくれるだろう？」と考えましょう。気持のもち方を少し変えるだけで、マーケット感覚はどんどん鍛えられていくことでしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "要は、 ちょっとだけ不便にする のだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "アメリカのある小学校では、子どもたちを「生徒」と呼ぶ代わりに「 小さな学者さん」と呼ぶことによって、学業成績を向上させたという事例があります。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}]}, {"id": 212, "label": "努力", "freq": 6, "highlights": [{"text": "高みに目を向けず、自分よりレベルの低い層だけを見ていると、人は「私はできる」と錯覚して努力をしなくなります。そんな自分への言い訳として、他人よりほんの少しだけ優れているところにプライドを見出し、「私はできるから大丈夫」と考えるのは「悪いプライド」の典型です。 　あなたのプライドがどちらに属するかは、自分の行動を振り返ってみればすぐにわかります。 　□ 自分に対して批判的な意見にも耳を貸せるか。 　□ いまより成長するための努力をしているか。 　□ 成長できなければ先はないという危機意識を持っているか。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "プレゼントしようと自分のことを考えてくれた「想い」がうれしいのである。プレゼントを選ぶために使ってくれた「時間」がうれしいのである。プレゼントを探すために動いてくれた「努力」がうれしいのである。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "「来た、来た、来た！」と思ったチャンスは、案外チャンスではありません。これはつまり、「めんどくさい」ほうの選択肢にこそチャンスがあり、ビッグゲインがある、ということを意味しています。 チャンスというのはオブラートに包まれているもの。だから、チャンスをつかめないと言う人は、第１は単に気づかない人で、第２はめんどくさいと思ってチャンスから目をそらしている人。めんどくさいものこそ、中途半端にふてくされてやると、ただのロスにしかなりません。 しかし、全力でやればロスではなく、ゲインになります。「めんどくさいこと」こそ、全力でトライするよう意識すれば、チャンスは自然と寄ってきます。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "人間の優劣は、その人がどれだけ精一杯努力してきたかで決まる。怠け者は、どんな分野にしろ、すぐれた業績を上げることなどとうていできない。骨身を惜しまず学び働く以外に、自分をみがき、知性を向上させ、ビジネスに成功する道はない。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "アメリカの言語学者エリヒュー・バリットも「私が成功したのは天賦の才ではない。日々のわずかな時間を有効に利用できたためだ」と述べている。彼は生活費を得るために鍛冶屋職人として働きながら、古今の十八の言語と二十二のヨーロッパ方言をマスターしたのである。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "言語学者エリヒュー・バリットは、「研究を効果的に進めるには重労働が欠かせない」と語っている。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 213, "label": "観察力", "freq": 6, "highlights": [{"text": "この子のどこが面白いかな」と 興味を持って観てあげる ということにあるのです。興味を持って観ると、相手の心を導くための糸口が見えてくる。", "book_title": "コミュニケーションのための催眠誘導～「何となく」が行動を左右する～ (光文社知恵の森文庫)", "author": "石井 裕之"}, {"text": "友人のトム・ケリーは、「イノベーションは見ることから始まる」を口癖としているが、私はこれをもう一歩先に進めたい。優秀なデザイン思考家は観察するが、偉大なデザイン思考家は「普通」を観察する。一日に一回は立ち止まって、普通の状況について考えるようにしてみよう。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "だから、もし、皆さんが、「螺旋的発展」を目撃したいのならば、 　申し上げることは、ただ一つ。 　「書を捨てよ、街に出よ」 　そして、「タウン・ウォッチング」をされることを勧めます。 　皆さんは、その街角に、様々な形で「便利になった懐かしいもの」を発見するでしょう。 　そのとき、深く考えていただきたい。 　 何が「懐かしい」のか。 　 何が「便利になった」のか。 　そのことを考えるとき、 　きっと、世の中の変化の「本質」が分かるでしょう。 　そして、世の中の変化の「未来」が見えるでしょう。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "私の場合、アイデアの「整腸薬」は、日常生活に潜むちょっとした「違和感」です。たとえばスーツを着替えるときに、まず上着を脱いでハンガーにかけますよね。その次にズボンをかけようとすると、上着が邪魔していたりします。 また、片方の手に歯ブラシ、もう片方の手に歯磨き粉を持っていると、歯磨き粉のキャップを開け閉めするときに、歯ブラシが邪魔していることに気づきます。 そういった、ほとんどどうでもいいような「違和感」は、「当たり前の行為」や「ありきたりのモノ」の周囲に何食わぬ顔をして居座っていることが多く、 日々「気づきつづける」ことが、アイデアが出やすい体質にしてくれているようです。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "アメックスカードの、個別ダイレクトセールスは、羽田や成田、Costco などでブースを出し、道行くビジネスマンに声をかける手法。分刻みスケジュールの彼らを立ち止まらせて時間をもらう難易度はすごく高い。 　まず、声をかけたその瞬間の好感度は必須である。彼女らのルックスは採用の合否を決める一つの重要要件。でも、それだけでは話を聞いてはもらえない。 　彼女はまず、「これは」と思った人の持ち物や身に着けているものを、すばやく観察する。で、人と違うポイントを見つける。アイテムとしては、メガネ、時計、カバン、靴などが定番のチェックポイント。スクラッチカードを渡して足を止めさせているその瞬間に、「素敵な、珍しい時計ですね？」と語りかける。こう言われると、男性はちょっと驚きつつ、「よくぞ聞いてくれた！」とばかりに薀蓄やエピソードを語り始める。 　また、社章を着けている人も要チェックだそうだ。わざわざ外出先や出張に行くときまで社章を着けているのは、自分の会社に誇りを持ち、「見て見て」という気持ちが入っていることが多い。これもトークに持ち込む材料になる。 「親密になるためには、答えを出しやすいお天気や『ご出張ですか？』といった一般的な話題に行きがちになるが、『そのひと個人』にフォーカスした話題を見つけられれば一気に壁を飛び越えられる」とは彼女の弁。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "そこでリーダー層については、１年ほどかけてじっくり観察し、その上で人物を見極めることにした。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}]}, {"id": 214, "label": "欲求", "freq": 6, "highlights": [{"text": "ビジョンはそもそも、いっさい責任を取るつもりもなく、実現可能性にも触れられていない〝純然たる欲求〟でなければいけません。なぜなら、それは遊び人から聞こえてくる素直な声でなければいけないからです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "アメリカの第一流の哲学者であり教育家でもあるジョン・デューイ教授も、同様のことを、少し言葉を換えて言い表わしている。つまり、人間の持つ最も根強い衝動は、〝重要人物たらんとする欲求〟だというのである。〝重要人物たらんとする欲求〟とは、実に意味深い文句だ。本書では、それについて詳しく考えてみたいと思う。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "アメリカの心理学者オーヴァストリート教授の名著『人間の行為を支配する力』に次のような言葉がある。 「人間の行動は、心の中の欲求から生まれる……だから、人を動かす最善の法は、まず、相手の心の中に強い欲求を起こさせることである。商売においても、家庭、学校においても、あるいは政治においても、人を動かそうとする者は、このことをよく覚えておく必要がある。これをやれる人は、万人の支持を得ることに成功し、やれない人は、一人の支持者を得ることにも失敗する」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を動かす原則❸　 強い欲求を起こさせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "まず、人は無力な存在としてこの世に生を受けます。そしてその無力な状態から脱したいと願う、普遍的な欲求を持っています。アドラーはこれを「優越性の追求」 と呼びました。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "彼女たちは可愛い制服や衣装を着たり、接客やライブをしたりすることで、多かれ少なかれ「人にちやほやされたい」という欲求を持っているのです（", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}]}, {"id": 215, "label": "ストーリー", "freq": 6, "highlights": [{"text": "「鬼を退治したいため、鬼ヶ島に行きたいと考えている。鬼を退治するには家来が必要で、それは道中で必ず出会える犬・猿・キジが適役だ。彼らを家来にするためには吉備団子が必要になるが、その吉備団子はおじいさん・おばあさんに持たせてもらえることがわかっている。だから、一緒に鬼ヶ島に行こうではないか！」", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "他に代えがたいストーリーやドラマがあるもの。そこに、我々は「愛着」を覚える のである。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "寄付をする人の中には「教育費なら寄付してもいいが、生活費に消えるなら寄付をしたくない」という人もいます。できるだけ高尚なことに貢献したいと考える人です。 国連ＷＦＰ（World Food Programme）では、「途上国では給食が出るから、子供たちは学校にやってくるのです」と、寄付獲得競争において競争力の高い「教育」というキーワードを前面に出し、寄付の集まりにくい食費を集めることに成功しています。「食費なんてその場で消費されるだけだが、教育に寄付をすれば、国づくりにも役立ちそうだ」と考える人の気持ちを理解した、巧みなマーケティングです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "私的援助にしろクラウドファンディングにしろ、資金調達に成功するには、「どんなストーリーを語れば、お金が集まりやすいか」と考えることが重要です。だから寄付を募る側は、一生懸命「私こそ、寄付を受けるのにふさわしい人物です！」とアピールします。そういう人と、私的援助をしたい人がマッチングされる。これはまさに市場です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "そして、この点に注目して成功したのが、秋元康氏がプロデュースするＡＫＢ 48 です。歌や踊りのレベルが高くなくても、ひたむきに頑張る姿を見せることに価値があるのは、甲子園児だけでなく芸能人でも同じだと見抜いたのは、秋元氏の 慧眼 でしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "「これしかない」 その商品だけにしかない物語を伝える。開発ストーリーや、その商品が開発されるまでの過程などを詳細に伝えて「これしかない」と理解してもらう。この商品とボクが出会ったことは、運命かもしれない・・・そんな風に感じさせる発信力が大事となる。 「ここしかない」 このお店にしかない。通販限定商品である。お客様に「ここしかない」と納得してもらうことである。他のお店に行ってもあると思われたら購入機会の損失である。 「いましかない」 いつでも買えるが、いちばんの敵。いまなら特別価格で。これから限定●●名様に。期間限定の特典を付加することは購入動機の背中を強く押す。期間セールやタイムセールの設定は、お客様の反応を大きく左右する。", "book_title": "地域Ｎｏ.１を目指すな！地域繁盛店の売上を５０倍にする・中小企業向けダイレクトマーケティング論: 地方だから成功できる！ 売上があがるウェブマーケティングシリーズ", "author": "覚田 義明"}]}, {"id": 216, "la
