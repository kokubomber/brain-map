ext": "世の中をアッと言わせるような革新的、イノベーティブなアイデアは、異なる分野や文化が出会う場所──「交差点」──で生まれるというのである。一", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "すぐれた 経営こそが、業界リーダーの座を失った最大の理由である。これらの企業は、顧客の意見に耳を傾け、顧客が求める製品を増産し、改良するために新技術に積極的に投資したからこそ、市場の動向を注意深く調査し、システマティックに最も収益率の高そうなイノベーションに投資配分したからこそ、リーダーの地位を失ったのだ。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "しかし、時として「破壊的技術」が現れる。これは、少なくとも短期的には、製品の性能を 引き下げる 効果を持つイノベーションである。皮肉なことに、本書で取りあげた各事例では、大手企業を失敗に導いたのは破壊的技術にほかならない。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "情報が入手でき、計画を立案できる持続的技術では、リーダーシップをとることは、競争上、重要でないことが多い。このような場合、追随者も先駆者も実績は変わらない。先駆者が圧倒的に有利なのは、市場のことがほとんどわからない破壊的イノベーションの場合である。これがイノベーターのジレンマである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "通常の価値観なら、問題のあるビジョンは極力排除したうえで、誰からも否定されないただ１つの強いビジョンを作りたくなるかもしれません。しかし、それでは既知の良さにしかつながらないのです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "日本発の世界的ベンチャーが登場しないと嘆く前に、もうちょっと真剣に長い年月経営するとはどういうことかを考えていくべきなんじゃないかと思います。世界に冠たるトヨタ自動車だって、自動織機から苦労して業態転換を果たしましたし、任天堂もそこまで高くない給料でも社員のイノベーションや創意工夫の意欲を最大限に引き出してあれだけの作品を作り勝負を続けています。さて、浮き沈みの激しいＩＣＴ業界で、それこそ１００年続く組織がどれだけ出てくるものなのでしょうか。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "センスメイキングは、イノベーションを起こすうえで欠かせない条件であり、変化が激しく不確実性の高い現代のリーダーシップで特に重要です。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "たとえばマイクロソフトのビジネスモデルは、ＯＳをどんどん新しくしていくことによって儲けようというものだ。もし、コンピュータやＯＳが不要なポストコンピュータの時代が到来したら、商売はあがったりになってしまう。となれば、ポストコンピュータの産業が勃興することを妨害する方向に努力を傾けることになるのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "井深大氏は「マーケット・サーベイによって新製品を企画することは、アメリカの常識になっているが、真に新しいものは、ものを出すことによって、初めてマーケット・サーベイができるのだ」とし、「マーケット・クリエイション」の必要性を訴えました。 またスティーブ・ジョブズは「人は形にして見せてもらうまで、自分は何が欲しいのかわからないものだ」と仲間に語りました。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "新しい技術は消費者が喜んで受け入れてくれました。しかし技術が成熟してくると、圧倒的な新製品というのは生まれにくくなります。作る側は小さな差別化にこだわるようになり、やがて消費者のニーズからズレていきます。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 26, "label": "文明批評", "freq": 17, "highlights": [{"text": "このように文化に幅があるという話をすると、必ず「日本の特徴の 1 つは、さまざまな文化をうまく取り入れて、自国の文化としてアレンジすることだ」というようなことをおっしゃる方がいますが、それは違います。 　異文化をうまく取り入れるのは、何も日本だけの特徴ではありません。例を出せばきりがありませんが、たとえばヨーロッパにおけるキリスト教はその典型でしょう。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "要するに、川上さんがやろうとしていることは、「テクノロジーを駆使して人間性を追求する」ということです。テクノロジーとグローバリゼーションによって社会が便利になった反面、人間性は疎外されていくばかりです。そんな未来に対して、レジスタンスをするということが、川上さんが目指していることではないかと思います。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "現代のこの社会の在り方はぼくから見ると幼児期における欠如と過剰をベースにしてできあがっているようにしか見えませ", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "近代の西洋文明と、それを安易に受容した近代の日本文明への批判になっている。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "さて、禁尿感と申しますと、したらいけないとがまんする時の感覚です。ですから大人の夢は、全部この禁尿感が出てきたものでしょう。どこへ行っても満足なトイレがない、そのうち、やっと目がさめて、急いで起きるというかたちです。皆さん方それぞれに、こうした夢のパターンを持っておられるだろうと思います。", "book_title": "内臓とこころ (河出文庫)", "author": "三木成夫"}, {"text": "ですから、結論から申しますと、どうも内臓感覚のいちばん麻痺しているのがホモ・サピエンスではないか。しかも文明人というのが、いちばん始末におえない。", "book_title": "内臓とこころ (河出文庫)", "author": "三木成夫"}, {"text": "大企業がグローバル・サプライチェーン・ネットワークを構築するために規模の縮小や生産拠点の海外移転を余儀なくされる中で、政府は融資プログラムの対象を下請けを担う中小企業にも広げて、倒産や失業を抑制した ４。こうした「見えざる福祉」政策によって、日本企業の成功の一端がわかりにくくなっているが、米国の特徴ともいえる焼き畑式アプローチよりもずっと好まれている。日本企業の再興からわかるのは、企業再編や調整は混乱を招いたり破壊的であったりする必要性はないことだ。", "book_title": "再興　THE KAISHA　日本のビジネス・リインベンション (日本経済新聞出版)", "author": "ウリケ・シェーデ、渡部典子"}, {"text": "成功本位の米国主義に倣ふべからず。誠実本位の日本主義に則るべし。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "ＳＮＳにつきまして、あまりお話ししたことがなかったので、少しだけ僕の考えをお話ししたいと思います。一般的に「つながり」などと、あらゆる局面で言われておりますが、各民族のもっとも濃く小さな「つながり」の本質を僕は家族にみます。血はインターネットより濃いからです。 　フランスの家族人類学者エマニュエル・トッドの分析から僕が考えることは、今の日本の問題は、新自由主義ではなく、日本的直系家族（長男が家を継ぐことが是）が壊れ核家族化したことにあると思っています。また、柳田國男の『蝸牛考』にもあるように、中心から革新が伝播して周辺に古形が残るという周圏分布を見ると、意外ですが核家族がもっとも古い形態で、次に絶対家族、そして次は共同体家族ということなります。僕は常々、ネットで起きたことは現実でも起きるとお話ししていますので、そう考えると、ネットが向かう次の形態は共同体家族であり、それが日本のＳＮＳが持つ本質であって、核家族型の英米型とは同じシステム（ＳＮＳ）でも「違った使い方」＝共同体家族型をすることになるんだと睨んでいますし、ツイッターの使い方など、英米と日本では違う理由が、アルファベットと漢字の差以外にも、ここにあると思います。 　次に、このもっとも濃く小さな「つながり」である家族形態の変貌がいつどのように起きるのか、ですが、これは、識字率と出生率と大きく関係があると考えています。「アラブの春」をＳＮＳ革命などと安直に話す人がいますが、そうではなく、識字率が上がると（そして出生率が下がると）、社会が不安定になりパラダイムシフトが起きやすくなるのです。ソ連の末期も最近のアラブもそうで、日本だと、江戸末期がまさにそうでした。今、日本の社会が直面しているのはテレビと新聞ｖｓデジタル識字率です。インターネットで自由に情報を得…", "book_title": "白本", "author": "高城剛"}, {"text": "ＳＮＳにつきまして、あまりお話ししたことがなかったので、少しだけ僕の考えをお話ししたいと思います。一般的に「つながり」などと、あらゆる局面で言われておりますが、各民族のもっとも濃く小さな「つながり」の本質を僕は家族にみます。血はインターネットより濃いからです。 　フランスの家族人類学者エマニュエル・トッドの分析から僕が考えることは、今の日本の問題は、新自由主義ではなく、日本的直系家族（長男が家を継ぐことが是）が壊れ核家族化したことにあると思っています。また、柳田國男の『蝸牛考』にもあるように、中心から革新が伝播して周辺に古形が残るという周圏分布を見ると、意外ですが核家族がもっとも古い形態で、次に絶対家族、そして次は共同体家族ということなります。僕は常々、ネットで起きたことは現実でも起きるとお話ししていますので、そう考えると、ネットが向かう次の形態は共同体家族であり、それが日本のＳＮＳが持つ本質であって、核家族型の英米型とは同じシステム（ＳＮＳ）でも「違った使い方」＝共同体家族型をすることになるんだと睨んでいますし、ツイッターの使い方など、英米と日本では違う理由が、アルファベットと漢字の差以外にも、ここにあると思います。 　次に、このもっとも濃く小さな「つながり」である家族形態の変貌がいつどのように起きるのか、ですが、これは、識字率と出生率と大きく関係があると考えています。「アラブの春」をＳＮＳ革命などと安直に話す人がいますが、そうではなく、識字率が上がると（そして出生率が下がると）、社会が不安定になりパラダイムシフトが起きやすくなるのです。ソ連の末期も最近のアラブもそうで、日本だと、江戸末期がまさにそうでした。今、日本の社会が直面しているのはテレビと新聞ｖｓデジタル識字率です。インターネットで自由に情報を得...", "book_title": "白本", "author": "高城剛"}, {"text": "僕が日本を素晴らしい国だと思う点は、４つほどあります。 　ひとつめは、日本人の勤勉さ、細かさです。 　ふたつめは、日本の山河溢れる大自然です。 　みっつめは、その自然を敬い共生する気持ちです。 　よっつめは、このみっつによって生み出されたテクノロジーの数々です。僕は、これらを大切にして日々を生きています。", "book_title": "白本", "author": "高城剛"}, {"text": "「〈未来〉の時代」は〈ここではないどこか〉追求の時代でした。最初はキューバや北朝鮮など現実世界に〈ここではないどこか〉が探られ、 60 年代末期に挫折すると、今度は観念世界に〈ここではないどこか〉が探られました。それが政治の季節からアングラの季節へのシフトです。〈ここではないどこか〉追求の背景に〈こんなはずじゃなかった感〉がありました。輝きや眩暈を約束した戦後復興や高度経済成長や郊外化がもたらした期待外れです。 　期待が外れても願望は収まらない。そこからオルタナティブな輝きや眩暈を希求するカウンター文化やアングラ文化やドラッグ文化が生まれました。輝きや眩暈への願望はいわば「上への願望」です。願望成就の約束が履行されずに終わったところから「もう一つの高み」が願望されました。その意味でカウンター文化の類は、どれだけ反近代的表象を扮技しても、輝きや眩暈を求める、モダンとしての戦後復興や成長経済の、派生物に過ぎません。 〈こんなはずじゃなかった感〉と「オルタナティブな高み」の結合がカウンター文化の本質です。亡くなったアップルのスティーブ・ジョブズが押し出してきた「Think Different」のコンセプト。僕は「あなたたちは間違っている」と意訳します。速度競争？　スペック競争？　そんなことがあなたたちが求めていたことなのか？　あなたたちが求めていたのは輝きと眩暈ではないのか？　ならばMacを使え！……カウンター文化的な意味論です。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "経済成長を放棄したところで、理想的な状態など決して訪れるはずがない。斎藤幸平氏の『人新世の「資本論」』が提唱するような「脱成長コミュニズム」では、現代の文明を守っていくことは到底できない。かつて、オーストリアの経済思想家フリードリッヒ・ハイエク（１８９９─１９９２） は、『隷従への道』（１９４４年） において、社会主義計画経済は必然的に全体主義体制を招くと警告したが、昨今流行している「脱成長コミュニズム」がもたらすものは、その意図に反して、まさしく新たなる隷従への道に他ならない。", "book_title": "自由と成長の経済学 「人新世」と「脱成長コミュニズム」の罠 (PHP新書)", "author": "柿埜 真吾"}, {"text": "大量生産の大量消費が当たり前になって、電化製品ばかりではなく、なんでもかんでも使い捨てにするようになった。食い物から文化まで、今ではあらゆるものが薄っぺらな三流品だ。良貨は悪貨に駆逐され、本当にいいものがこの世からどんどん消えていく。そっちの方がよっぽど由々しい問題だ。", "book_title": "超思考", "author": "北野武"}, {"text": "多くの人は、「産業化されたスポーツの祭典」にシラケているように僕には見えます。地域に根ざした（特に宗教問題に深く関わる）サッカーと違い、オリンピックは今や巨大なスポーツビジネスです。さらには、地域開発ビジネスでもあります。これは、シラケて当然だと思います。この傾向は、 80 年代のロスアンゼルスオリンピック以降、とても顕著だと思います。どこかで、オリンピックの意義を再考する時が来るでしょう。時代の価値観は、想像以上に早く変わっていると、世界をまわり感じます。また今後、地域の歴史に根ざしているようなスポーツ以外は、人々の関心をあまり呼ばなくなるだろう、と僕は思います。ですので、スペインの人たちは、オリンピックも、ワールドカップもあまり興味がありません。一方、バルセロナ対レアルマドリッドにはとても興味があります。なにしろ、かつて征服された敵国との戦いのようなものですから。", "book_title": "黒本", "author": "高城剛"}, {"text": "「霊性」＝スピリチュアリティに関して日本は、オウム真理教事件の苦い思い出があるのと、その後のテレビのバラエティ化が、「霊性」そのものを完全にダメにしてしまったと思います。また、日本で大きな力を持つ宗教団体も、そのようなものが一般化すると不都合でしょうし、モノを売る人たちも、そのようなものは邪魔だと思います。僕は、この「失った霊性」こそが、今日の日本や日本人をダメにしてしまったと思います。それは、根性論やナショナリズムとは全く違う大和魂の根幹をなすものだと僕は考えています。ですので、霊性が日本のビジネスシーンを手伝う機会は、これからだと思いますね。江戸（東京）は、霊性によって設計された大都市なのを、忘れてはなりませんよ。", "book_title": "黒本", "author": "高城剛"}, {"text": "特に日本などは、その世界的典型の文化的頽廃のモデルケースであります。", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 27, "label": "競争戦略", "freq": 16, "highlights": [{"text": "私はこのときの経験から、研究者としての人生を「サーフィン」にたとえています。一度波をつかんでその先端に立つと、その後はたいした努力をしなくともずっと先頭を維持できる。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "2つ目の問題は、ユーザーが行う比較と入札競争についてである。ユーザーが検索し、結果のページに広告を出せるのは1社だけではない。先の例では「不動産」などで検索するとかなりの数の広告が表示される。つまり、リスティング広告は比較されることを前提とした広告なのである。 　ユーザーは1位に掲載される広告をクリックして自分の求めているものがなければまた検索結果ページに戻り、2位の広告をクリックして自分の求めるものを探すことを繰り返すのである。つまり、他社と商品やなんらかの差別化ができないのであれば、ユーザーに自社のサイトを印象づけることはできない。このようにビッグワードで検索するユーザーを自社に取り込もうとするのであれば、ユーザーが比較する前提で自社のサイトやサービスを見直す必要がある。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "ではなぜ、日本企業は負けてしまったのか。 　 図 10 は、ＤＶＤプレイヤー、ＤＲＡＭメモリ、カーナビ、リチウムイオンの市場規模と、日系企業の市場占有率を示している。これを見ると、産業が世界的に拡大するにつれて、日本企業のシェアが落ちていることがわかる。その理由の一つは、日本企業の整理統合が進まないため、多くの企業が過当競争に陥っていて、集約が進んでいる海外の企業に個別撃破されてしまうからだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "この2社が勝ち残った大きな理由は、常にサービスを改善して磨き込み（これを「体験磨きこみ競争」と呼ぶ）、", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "失敗の理論の第二の要素として、技術革新のペースがときに市場の需要のペースを上回るため（図０・１を参照）、企業が競争相手よりすぐれた製品を供給し、価格と利益率を高めようと努力すると、市場を 追い抜いて しまうことがある。顧客が必要とする以上の、ひいては顧客が対価を支払おうと思う以上のものを提供してしまうのだ。さらに重要な点として、破壊的技術の性能は、現在は市場の需要を下回るかもしれないが、明日には十分な競争力を持つ可能性がある。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "マーケット感覚のある人は、「どんなによい商品を作っても、供給者が多すぎると儲からない」と理解しています。そしてダイソンやアイロボット（ロボット掃除機・ルンバの開発メーカー）のように、他社とはまったくコンセプトの違う商品、すなわち、他の供給者が提供できない商品を作ろうとするのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "市場化が進む社会で高く売れるのは、「よい商品」ではなく、「需要に比べて供給が少ない商品」なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "道州制についての議論の中ではよく、「自由に競争したら、地方が大都市に勝てるはずがない」と言われます。これは、日本の地方にはどこもすばらしい価値があると考えている私には、まったく理解できない感覚です。私から見れば、地方に足りないのは価値ではなく、マーケット感覚だけだからです。 「ふるさと納税」は、納税額の多い都市部の人の税金を、地方がぶんどりに行く制度なのだから、地方行政に携わる方はぜひこの市場で成功体験を積み、地方分権や道州制に関しても、前向きに考えていただければと思います。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "作業服の法人需要を捨て、個人向けの店売りに特化する。はなから競争しないと決め、絶対に勝てるポジション取りをした。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "社内には法人営業部員が３人だけいるが、これは大手法人客の情報収集がおもな仕事だ。そこで勝負する気はそもそもない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "自社で製造するケースでも、多くの業界では、同じ製品を生産する経験を積めば積むほどコストは低下する。生産工程で歩留まりが重要となる場合はそれが顕著だ。競争相手とはコスト競争力で差をつけられ、競争優位が保てる。 本当の低価格帯は競合が少ない のだ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "もともとは捕食関係にある生物同士が競い合って進化し合う循環を、生物進化学で「レッドクイーン効果」 と呼びます。それを経営に置き換えると、「企業はライバルとの競争が激しいほど、自身を進化させることを怠らないので、結果として生き延びやすくなる」というのが基本でした。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "競合相手を過度にベンチマークした瞬間、認知範囲は狭くなります。ワークマンはベンチマークされることはあっても、することはないのですか。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "アマゾンは、複数の象限を開拓しようとする《チャネルシフター》である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "ハードウェアとソフトウェアの両方をみずからの手でつくりあげ、それを統合して高度な知的財産を築き上げられるインフラ基盤があるという点で、圧倒的にトップの位置に躍り出るのは、なんといっても日本である。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "ビルポイントの思い込みとは異なり、イーベイのプラットフォームを利用する企業（とその顧客）は、銀行との強い結びつきをそれほど重視していなかった。彼らは使いやすさ、とりわけ、Ｅメールでのやりとりのしやすさをはるかに重視していたのである。不正行為の防止は衛生要因（訳注：ないと不満だが、あっても動機づけにはならない要因） であり、決済システム採用の推進力とはならなかったのだ。こうした情報すべては一般に公表されていなかったが、かといって機密事項でもなかった。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 28, "label": "感情", "freq": 16, "highlights": [{"text": "とりわけてネガティブな感情は、力強い内的トリガーとなり、私達の日々の日課に大きな影響を与える。退屈、孤独、失望、混乱や優柔不断などの感情は、時に軽い苦悩やもどかしさを駆り立てる。こういったネガティブな感情を鎮めるためには、人は突発的な行動や、やみくもな行動をとることがある。インの例に戻ると、彼女は、特別な一瞬が消え失せてしまうという不安を抱く際はいつもInstagram を使う。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "ある仮説によれば、抑うつ症状を抱えている人は、一般の人よりも頻繁にネガティブな感情に襲われるが、そのたびにインターネットを使い、不安を安心感に変えているという。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "退屈だと感じた時に、一般的に人は刺激や、目を惹くようなニュースの見出しといった変化を求める。それとは逆に、ストレスを多く抱え込んでしまった時は、Pinterest のようなサイトを見て安らぎを求める。そして、孤独感に苛まれる時には、Facebook やTwitter が人とのつながりをすぐに与えてくれる。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "そのための第一歩はプロダクトの特徴に注目するのではなく、ユーザーの感情に寄り添い、特定の不満や苦悩を探り当てることだ。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "多くのソーシャル・ネットワークと同様に、Instagram は「取り残される不安（fear of missing out）」という苦悩を軽減する効果がある。この取り残される不安は、昨今「FOMO」という単語としても知られつつある。Instagram に関して言えば、内的トリガーが新しい習慣の基礎を生み出すのだ。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "自分の行動を「価値あるもの」と認めてくれる人がいることは、涙が出るほど嬉しい。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "過去形で表現した場合、頭の中のイメージはサーフィンをしている自分の視点から見たイメージ、つまり、太陽のまぶしさや、迫りくる波を見ている。自分の目で見ているのだから、そのイメージの中に自分自身の姿はないのです。自分で撮った写真に自分の姿が写っていないのと同じことです。このようにきわめてライブな捉え方は アソシエーション と呼ばれます。 　一方、現在完了形で表現した場合、頭の中のイメージには「自分自身が写っている」のです。サーフィンをしている自分の姿をもう一人の自分が客観的に見ているというような図です。このような捉え方は ディソシエーション と呼ばれます。 　アソシエートされた思い出には感情が伴うが、ディソシエートされた思い出は単なる過去の事実なのです。", "book_title": "コミュニケーションのための催眠誘導～「何となく」が行動を左右する～ (光文社知恵の森文庫)", "author": "石井 裕之"}, {"text": "家族や仲間でゲームを楽しむというしあわせな時間のイメージは、私にとっては「鍋」という言葉に凝縮されていました。 それは、今でも思い出すたびに心がほっこりするほど大切な、私のプライベートなビジョンでした。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "非協力的な行為に対して、多くの人が短期的なコストを払ってでも罰を下し、また長期的な見返りのない第三者であっても罰を下すことがあることを紹介しました。このような罰行動が、直接的には怒りや嫌悪感などの感情に突き動かされて起きることは想像に難くありません。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "その一方で大規模で厳しい競争は、進化時間仕様の私たちの心にストレスをもたらします。そんななか、「情に流される人情家」のことを見聞きして私たちがホッとして温かい気持ちがする背景には、計算をしない相手と付き合いたいという、感情に駆動されたデマンドがあるのかもしれません。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "ホットな感情は身近な相手への利他行動を支える重要な基盤となる反面、共感性の働く範囲を「いま、ここ、私たち(内集団)」に限定しがちです。一", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "そもそも、人間の感情は、まだほとんど解明されていない世界です。感情とは何か、ということ自体、定義もされていないのです。ましてや、それをソフトウェアによってシステムに実装することなど、ほとんどできていません。 　ですから、感情の世界で人間が人工知能に追いつかれる心配はまったくといっていいほどなく、私たちの独壇場といえます。ここは自信をもっていいでしょう。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "ぼくは二〇一一年に『一般意志２・０』（ 講談社）という本を出版しています。そこではルソーをとても高く評価していますが、その理由は彼がそのような実践的な観点をもっていたからです。 　ルソーはフランス革命の理論的支柱になったひとです。近代民主社会の礎を築いたと言われます。しかし、ルソーの人間観や社会観は、ホッブズやロックといった社会契約説の先行者とはまったく異なっています。ホッブズやロックは、人間は自然状態では争いを止められないのであり、だからそれぞれの権利を制限し、社会契約を結ぶのが「合理的」なのだと主張しました。ひらたく言えば、人間は理性的で論理的で、頭がいいので、自分の本性を抑圧し社会を作るということです。 　それに対して、ルソーは、人間は本来は孤立して生きるべきなのに、他人の苦しみをまえにすると「 憐れみ」を抱いてしまうので、群れを作り、社会を作ってしまうと説くのです。つまり彼は、社会契約の根拠は合理的な判断にではなく、むしろ動物的な感情にあると述べているのですね。これはとても独創的で、そして射程の長い思想だと思います。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "今日は「緊急性」「満足感」「喜び」のどれをメインに置いた1日にするのかを、直感で決めることだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "とにかく、聴くといい気分になる曲を選ぶことが大事だ。そうすれば、 それを聴くことはキューにもなり、報酬にもなる。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "本の中の事件に心を動かされたとしても、それで現実の自分が困るわけではなく、自分が犠牲を強いられることもない。だからフィクションにばかり感動していると、現実に対してしだいに無感覚になってしまう。精神という 鋼 は徐々に摩耗し、弾力性というかけがえのない特性もいつのまにか失われていく。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 29, "label": "世代論", "freq": 16, "highlights": [{"text": "だからやっぱり、〝推し活〟はＺ世代にとって重要なアイデンティティ、みたいな言説には素直に頷けない。あの子たちの〝推し活〟は、そのときどきの流行にとりあえず迎合する習性の一環に過ぎなくて、寧ろアイデンティティとは対極の現象だった気がする。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「母親たちの雑談って、よく聞いてみると大抵何かを教え合ってるんです。この漢方いいよとかあのストレッチ腰にいいらしいよとか。今は健康の話が多いですけど、若いころはそれがコスメとかファッションだったのかなって。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "やはり、いまの中高年が「俺も我慢した。その結果、良い人生を送ることができた。だから、いまの若い人たちも我慢するべき」という論法を結構平然と出してくるのが悩ましいのです。それは我慢したから良くなったのではなく、日本人が増えて日本の経済が良くなったので、相応に頑張っていれば取り分がおのずから増えた、というだけです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "彼らに日本は託すんですよ。そして、そのことに対して、僕はそんなに悲観していません。ネットの中の細かい議論を見ると、みんな意外と冷静なんです。一部狂っているような人もいますが、そういう人を冷静に見つめる人もちゃんといて。やっぱりネットって、言論空間としてひとつの方向に流れやすい面もたしかにあるんですけど、トータルで見た自浄作用は高いと思います。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "過去 30 年間、新自由主義でやってきて、この短い間に、富の格差が異常なレベルにまで広がる、移民が急速に増える、人口構成比率における白人のシェアが低下する、ＬＧＢＴの権利保護が法制化される、アメリカ社会の屋台骨だったキリスト教文化が廃れていく……。それだけの激変がたかだか、一世代の時間軸で発生するとなると、アメリカとは何なのか、何がアメリカ人なのか、そうしたソウル・サーチング（自己の再確認作業） が必要になっていくのでしょう。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "私は彼に言いました、「ビンセント、それは違うよ。私の国は生産性を高めようとしているのではなくて、そうやって雇用を守っているんだ」。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "ＯＥＣＤの報告ではアメリカの上位 10％が所有する資産は全体の 79％ですが、日本は 41％と富の集中が最も低い水準の国の一つです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "いずれにせよ、日本では米欧で見られるような分断と対立の激化は確認されません。この国は永遠にやせ細るだけの忍耐ゲームだとの認識が強くなり過ぎたことで、「親ガチャ」という言葉に代表されるように、むしろ諦めムードが漂っています。ただそれは賃金と経済がプラスの循環に入り、定着していけば、時間が解決してくれる問題だと思います。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "団塊の世代を中心とした 50 歳～ 65 歳の、〝大人を変える大人〟のことを、〝プレミアエイジ〟と呼んでいる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "そう、代官山プロジェクトはプレミアエイジを集める装置であると同時に、世代を超えて波及する力を持つ場でもあるのだ。その力とはリアルに存在する場所だけが持ち得る力である。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "優先席なんて、あの頃は必要なかった。本来、電車の席は、全部が優先席だ。前に年寄りが来たら、子どもは有無をいわずに立つ。そこに理由なんて必要ない。 　ところが、今の道徳では、年寄りに席を譲るのは、「気持ちいいから」なんだそうだ。 　席を譲るのは、気持ちがいいという対価を受け取るためなのか。 　だとしたら、席を譲って気持ち良くないなら、席なんか譲らなくていいという理屈になる。 　年寄りに席を譲るのは、人としてのマナーの問題だ。美意識の問題といってもいい。 　マナーにわざわざ小理屈をつけて、気持ちいいから譲りなさいなんていうのは、大人の 欺瞞 以外の何ものでもない。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "年寄りは昔からずっと年寄りだったわけじゃない。何十年も働いて、税金を納めてきた人たちがいるから今の日本がある。電車に乗れるのだって、スマホでゲームができるのだって、つまり年寄りたちがこれまで働いてくれたおかげなのだ。 　そういう基本的なことを話さないのは、そもそも今の大人たちがそれを忘れてるってことかもしれない。なにしろ年寄りのせいで改革が進まないなんて、馬鹿なことをいう大人が山ほどいる世の中なのだ。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "昔は街の大人たちが、教師を尊敬していた。 　無学な大人たちにとっては、大学出というだけで尊敬に値したのだ。 　自分の家の子どもが先生に頭をひっぱたかれれば、親は学校にごめんなさいと謝りに行ったものだ。悪いのは自分の子どもに決まっている。たいていの親がそう思っていた。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "〈シャレからオシャレへ〉は世代交代によるものです。〈ここではないどこか〉の記憶覚めやらぬ年長世代にとっては「あえてする読み替え」だったものが、記憶なき後続世代にとって「記号的な戯れ」へと変異したわけです。しかしこの戯れが性的コミュニケーションと結びついていたことが、多くの若い人たちにとってハードルになりました。そこに助け舟、つまりオルタナティブ・ウェイを提供したのが（後の）オタク的メディアでした。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "こうした生成の経緯が、 77 年以降が「〈自己〉の時代」である理由を説明してくれます。〈ここではないどこか〉探しの頓挫を埋め合わせる代替的営みが〈ここの読み替え〉でした。この代替を要求したのは〈自己のホメオスタシス（恒常性維持）〉（↓ 参照） です。後続世代になるとそこからナンパ系とオタク系が分化していきました。この分岐は、セルフイメージの維持に使えるツールが、対人的能力によって異なるためにもたらされたものです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "二つ目として、これらの活動は相手にとってもなんの腹の足しにもならない、という点です。ここが前世代のボランティア活動と全く違う点です。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 30, "label": "影響力", "freq": 16, "highlights": [{"text": "言うまでもなく、マネジャーは優れたアイデアを持っているだけではだめだ。そのアイデアを取り入れる人たちからの支持が得られなければ。私はこの教訓を胸に刻んだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "今回、私が減量に挑戦した際に一番の学びになったのは「ストイックさは伝播する」という事です。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "さらに言えば、ネットの世界であればあるほど、よりリアリティが大切になってきている気がします。今の時代、匿名性が高い人よりも、実名で顔を出している人の方が影響力を持っています。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "アンバサダーは、その分野のオピニオンリーダー。その分野について次なるトレンドを創り出す影響力を持っている。だからその人の意見を聞くのが一番いい。その分野に詳しくない一般人１０００人の意見を聞くより、影響力のあるアンバサダーの言うことをほぼ「丸呑み」して製品に反映したほうが絶対にいい。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "人を動かす秘訣は、この世に、ただ一つしかない。この事実に気づいている人は、はなはだ少ないように思われる。しかし、人を動かす秘訣は、間違いなく、一つしかないのである。すなわち、自ら動きたくなる気持ちを起こさせること──これが、秘訣だ。 　重ねて言うが、これ以外に秘訣はない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "リンカーンの書簡に「人間は誰しもお世辞を好む」と書いたのがある。優れた心理学者ウィリアム・ジェイムズは、「人間の持つ性情のうちで最も強いものは、他人に認められることを渇望する気持ちである」と言う。ここでジェイムズが、希望とか要望とか待望とかいう、なまぬるい言葉を使わず、あえて「渇望する」と言っていることに注意されたい。 　これこそ人間の心を絶えず揺さぶっている焼けつくような渇きである。他人のこのような心の渇きを正しく満たしてやれる人はきわめてまれだが、それができる人にしてはじめて他人の心を自己の手中に収めることができるのである。葬儀屋といえども、そういう人が死ねば心から悲しむだろう。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "アメリカの心理学者オーヴァストリート教授の名著『人間の行為を支配する力』に次のような言葉がある。 「人間の行動は、心の中の欲求から生まれる……だから、人を動かす最善の法は、まず、相手の心の中に強い欲求を起こさせることである。商売においても、家庭、学校においても、あるいは政治においても、人を動かそうとする者は、このことをよく覚えておく必要がある。これをやれる人は、万人の支持を得ることに成功し、やれない人は、一人の支持者を得ることにも失敗する」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "団塊の世代を中心とした 50 歳～ 65 歳の、〝大人を変える大人〟のことを、〝プレミアエイジ〟と呼んでいる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "そう、代官山プロジェクトはプレミアエイジを集める装置であると同時に、世代を超えて波及する力を持つ場でもあるのだ。その力とはリアルに存在する場所だけが持ち得る力である。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "わたしたちのまわりで見られるさまざまな影響力の中でも１、２を争うほど効果の高いルール──恩義のルールです。このルールは言います、人は、他者にしてもらったのと同等のお返しをすべきだと。", "book_title": "影響力の正体　説得のカラクリを心理学があばく", "author": "ロバート・Ｂ・チャルディーニ、岩田 佳代子"}, {"text": "大切なのは、一生懸命働いて節制に努め、人生の目的をまじめに追究していくことだ。それを周囲に身をもって示している人間は多い。彼らの地位や力はどんなに取るに足らないものだとしても、現代はもとより将来の社会の繁栄に大きく寄与している。 　というのも、彼らの生活や人生観は、意識するしないにかかわらず周りの人間の生活に浸透し、次の時代の理想的な人間像として広まっていくからだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "高潔な人格の妻は気づかぬうちに夫の品性を高めるが、心の貧しい妻は必ず夫を堕落させる――そうトックビルは信じていた。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "結局のところ、人間の性質は目に見えない無数の もの によって形づくられていく。 先達 や古今の格言、人生における実体験や書物、友人や隣人、現在の社会や祖先の英知――これらすべてをわれわれは受け継ぎ、疑いもなくそこから大きな影響を受けている。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "両親の人格は、行動を通じて子供の人格に反映する。日々示される両親の愛情やルール、勤勉や自制心などは、耳から学んだ知識を忘れ去った後も子供の心に生き、その行動を決定する。 　親の無言のふるまいや無意識のまなざしでさえ、時には子供の性格に一生ぬぐいがたい印象を植えつける。すばらしい両親の生き方を思い出して悪の誘惑を断ち切った人間は多いはずだ。彼らはおそらく、恥知らずな行動に走ったり、いやらしい考えにふけったりすれば、両親の美しい思い出を汚すことになると悟ったにちがいない。 　慈善事業家ファウエル・バクストンは、立身出世を果たしてからも母親宛てに次のような手紙を書き送っている。 「子供のころ、母さんから教えこまれた誠実さや道徳心という美徳を、いまでも決して忘れません。とくに他人のために何かしてあげようとする時、母さん譲りの美徳を強く感じずにはいられないのです」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "ストーリーを見ているつもりが、いつの間にかライフスタイル、価値観を刷り込まれている。フランスがよく主張する「ハリウッド映画は、文化侵略である」というのは、こういう意味です。独裁者たちが必ず映画好きなのも、同じ理由です。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "「洗脳と気づかせない影響」が、最も効果的なのです。 　そのうえ、良い作品であればあるほど、作品全体で一つの価値体系や世界観、美意識を表現しています。こういった複雑な意図の押しつけは、もはや影響というよりも洗脳と言って差し支えないでしょう。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 31, "label": "コミュニティ", "freq": 15, "highlights": [{"text": "背景にあるのは、イスラム系移民のコミュニティ形成力の強さだ。イスラム系移民は、移住先に積極的に溶け込もうとせず、むしろ独自のコミュニティをつくってその中に閉じこもる傾向がある。フランスでも同じ状況だ。パリにはイスラム系移民が多い区域がいくつかあるが、そこでは、泥棒をつかまえると、自分たちで泥棒の手首を切ってしまうこともある。彼らはフランスの法律よりイスラム法を優先していて、犯罪者も自分たちのコミュニティの中で勝手に処罰してしまうのだ。 　フランスでは防犯上の理由から、公共の場で顔全面をベールで覆うことが禁止されている。イスラム系女性が着用するブルカという衣装がこれに該当するため、「ブルカ禁止法」として話題になったが、イスラムの女性はおかまいなしで、いまも着用している。 　こうなると悪い意味での文明の衝突が起こる。フランスはそれでもなんとか折り合いをつけようとしているが、同じくイスラム系移民が多いスイスは、逆に排除する方向へと舵を切った。 　ちなみにスイスに流入してくるのは、ドイツに住んでいたトルコ系移民だ。ドイツは１９７０～ 80 年代に労働力確保のためにトルコ移民を呼び込み、いまその２世や３世がドイツから溢れ出し、スイスに流れ込んでいる。ＥＵ域内の移住は制限されないが、スイスはＥＵ加盟国ではない。だから他の国と違って移民制限に踏み切れたという事情もある。 　移民には、どうしてもこのような影の部分がつきまとう。これから移民が増えるにつれて、反作用として排斥の動き、あわせて右傾化も強くなっていくだろう。これは、歴史のサイクルなのである。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "「人間関係は、疎で多。緊密だと人間関係は少なくなる」 「人間関係は、ゆるやかな 紐帯」", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "個人情報を保護 しなくてもよい 地域が生きやすいということなのかもしれない。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "とにかくこの町は構造的にもひととひとの距離が近い。そしてコミュニケーションの量が多いらしい。 　にもかかわらず、調査の結果では互いに緊密ではないということになっている。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "「色んな意味で、生きていくうえで僕たちとは違うレベルでの情報共有が必要だったんだと思います。情報共有ってつまり助け合いじゃないですか。そういう連帯が昔から日常的だったから母は今でも友達がいっぱいいるのかなとか、そんなふうにも思うんです」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「とにかく、無宗教の人が増えたアメリカでは神の力が弱まってて、その代わりになるストーリーが必要で、そのストーリーをコミュニティと一緒に提供できるのがメガチャーチなのね」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "視野を拡げよう、もっと拡げようと 喧伝 する仲間たちのすぐそばで、その意見に賛同しながらも具体的にはどうすればいいかわからなかったころの自分。それでも、所属しているコミュニティから外れることは想像できなくて、仲間がいるという安心感のほうを選び、なんとなくその周辺に存在し続けていた自分。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "オタクは、想像力とこだわりの精神で成立する存在です。特殊な方面の文化の担い手であると同時に、偉大なる消費者でもあります。コミックマーケットでも文学フリマでもe-sportsでもコスチュームプレイでも、その世界ごとのトップがはっきりと見えている中で、知識と活動をベースにした実に見事なヒエラルキーを形成しています。そこでは若い人がそのジャンルに常に供給され、新しい刺激が想像力を搔き立ててくれてはじめて、札束で殴り合う熱心なイキりオタク同士の熱狂が市場を形成するわけです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "コミュニティをつくることに成功すれば、その中では楽園ができる。でもインターネットにつながること自体はマイナスでしかない。ただ、インターネットが多様性を破壊して、世界が完全に均質になっていくのかというと、そこはみんなが一生懸命抵抗するでしょうね。そうして、細かい世界をつくろうとするっていうのが、これから起こることだと思います。お山をどうつくるのか。それが次のネットのテーマですよ。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "また、ソニーはリアル拠点（ソニーストア） を大事にし、使い方講座、テーマ別撮影講座、お出かけ撮影体験会、新商品先行体験会などを開いている。オンラインでのつながりをきっかけに、体験会で実際に会って交流するファンも多いという。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "「オンラインのコミュニケーションに力点が置かれる中で、わざわざソニーストアに足を運んで来てくださるファンは、ソニーにとって一番熱いファンであり、特に大事にしています」 　このような施策によって、顧客はファンとなりコアファンとなっていく。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "ファンが気軽に参加できる場を作り、想いを共有し、企業や商品ブランドの体験を増やしていくことは、確実に「愛着」を強くする。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "事例はたくさんある。「ファン・コミュニティ」「ファン・クラブ」「プレミアム・クラブ」などで検索するとたくさん事例が出てくるだろう。なお、マイレージ・クラブやポイント・クラブなども参加できる場になり得るが、マイレージを貯めている人＝ファンとは限らない。単に得したい人も多く混じる。なので、そのクラブ内でより濃いファンのためのコミュニティを新たに作る必要があるだろう。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "この「普通の人の気軽なコメント」を集めたページには、時に元ネタとなるブログやニュース以上にアクセスが集まります。「何が起こったか」というニュースそのものより、「その記事に対して他の人はどう感じたのか」をチェックしたり、自分も一言コメントを寄せたりすることのほうが楽しいと（価値があると）判断されているのです。 ニコニコ動画も、この価値をサービス化しました。これまで（おそらく今でも）「この女優も年をとったな」とか、「この人、イメージはクールなのに、しゃべりは三枚目だね」などと、誰に聞かせるでもないコメントを、テレビの前でつぶやいている人はたくさんいましたよね。 テレビの場合、それを聞くのは自分と、せいぜい家族だけです。しかし、「もっとたくさんの人に自分の一言コメントを聞いてほしい。他の人のコメントも聞いてみたい。そこに価値がある」と気がついたドワンゴが、それをサービス化し、今や２００万人の有料会員を抱えるサービスとなりました。日経新聞電子版の有料会員が 40 万人弱ですから、その人気のスゴさがわかります。 最近はニュース・キュレーションアプリ（さまざまなメディアから注目ニュースをピックアップし、ひとつのスマホアプリの中で読ませるもの）が大人気ですが、ここでも、ニュース自体は誰でも読めるのに、そのニュースに付けられた一言コメントを読むためには、サイトへの登録が必要となっています。アプリの開発者もユーザーも、ニュースよりコメントのほうに価値があると判断しているのでしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "そう、代官山プロジェクトはプレミアエイジを集める装置であると同時に、世代を超えて波及する力を持つ場でもあるのだ。その力とはリアルに存在する場所だけが持ち得る力である。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}]}, {"id": 32, "label": "目標設定", "freq": 15, "highlights": [{"text": "けれども僕らは、目標が役に立つことは理解している。ただ、その効果に関心がないだけだ。僕らは取りこぼしたお金があっても気にしないし、レモンを最後の一滴まで絞りだす必要も感じていない。いずれにしろ、最後の数滴はたいてい苦みが混じる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "それに、目標の設定には、さらに暗い側面がある。目標を追いかけ、デタラメな数字に到達しようとしているうちに、 モラルや誠実さや健全性が損なわれてしまう ことが多い。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "本質目標のステートメントは、美しくなくていい。形よりも中身が大事だ。細かい言いまわしを考える暇があったら、もっと本質的な問いを立てよう。 　「たったひとつのことしかできないとしたら、何をするか？」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "人生の本質目標を決めるのは、容易ではない。勇気と洞察力を持ち、自分の力を最高に発揮できる行動を見定めなくてはならない。そのためには、タフな問いに答えることが必要だ。トレードオフを直視し、本質から外れたものごとを断固として切り捨てなくてはならない。 　厳しいが、やるだけの価値はある。本当に明確な目標だけが、自分や組織の力を最大限に引き出し、真にすぐれた成果を可能にしてくれるのだから。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "「立てない」「歩けない」という壁を乗り越えようというのではなく、視線は壁のもっと先、「踊る！」というところに向いています。 いやなことではなく好きなことを目標にする、そこに気づいたからこそ、大きなエネルギーが生まれるし、壁なんて目に入らなくなる。 そして実際、壁なんてことさら意識しなくても、「踊りたい！」と思って頑張っているうちに、気づけば「立てない」「歩けない」の壁を越えていた。彼女が最初から「立つこと」「歩くこと」を目標にしていたら、短期間に劇的な回復を遂げることは困難だったかもしれません。 　じつはこうした思考はエースの特徴ともいえます。 　たとえばＡＫＢ 48 なら、センターに立つことだけを目標にしている子は、ささいな壁に突きあたっただけで意志がゆらいでしまいがちです。それに対し、ＡＫＢ 48 に入るのもセンターに立つのもすべて通過点、ゆくゆくはソロの歌手になりたい、大女優になりたいという夢を持っている子は、ちょっとやそっとじゃゆるがない。 追いかける夢の大きさが、そのまま意志の強さにつながるのです。 　そして意志の強さこそが、結果を生むのです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "目の前にある光景をどう変えたいのか。そのイメージを思い描くことが、グロースハックの出発点になります。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "グロースの本質は〝シーンの創出〟にある と、私は思います。 　やみくもに数字を追うのではなく、どのような状況を現出させたいかをまず考える。 　そして、ゴールといえるその地点に向かっていくための道筋を描き出します。 　いくつか道筋がある場合には、そのなかでの最短ルートを選び出します。 　難関にぶつかったときには、なんとかそれを乗り越えるか、新たなルートを考えます。そうしてイメージしていたシーンを現実にしていく作業こそがグロースハックです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "社員はノルマで頑張るのではなく、 良心で行動 する。ノルマは達成できないとあきらめるが、 良心で仕事をすれば自発的に継続 する。 だから、何年かかっても本気で達成したいことだけを、 たった一つ、目標にすべき だ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "多くの人の本当の行動の目的は、「暇潰し」というか「何もしていないと不安だからなんでもいいから何かをやっておく」くらいのものだ。「仕事をこなすことで達成できる何か」なんてものは、何か行動するときにとりあえず目標がないと何をやっていいか分かりにくいから、前方の遠くに飾っておく単なる目印みたいなものだ。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "もっと単純にいえば、時価総額、すなわち「株価×発行株式数」をただ上げることだけが目的となってしまうのである。ただ数字を上げることだけが目的ならば、十年よりも五年、五年よりも三年で上げたほうが、評価は高くなる。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "ビル・ゲイツはこう書いている。「人々の置かれた状況を改善するうえで、測定することがいかに重要かを痛切に感じた。明確な目標を設定し、その目標に向けた進歩を促すような指標を見つければ、すばらしい進歩を達成できる。（中略）当たり前のことに思えるかもしれないが、それがなされていないことが驚くほど多く、またきちんとやるのはとても難しい（ ８）」。進歩を促すのに何が必要かというゲイツの見解は正しく、予測においてもそれが驚くほど欠如している。明確な目標を設定するという簡単な第一ステップでさえ、行なわれていない。", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}, {"text": "この分野について学ぶうちに知ったのが、研究の結果から導き出される結論のひとつが、人は長続きする幸福感をもたらしてくれるものを見抜くのがとても下手だということでした。たいていの人はその人生を、「〇〇を手に入れることができたら、幸せになる」あるいは「〇〇を達成できたら、幸せになる」と考えて過ごしています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私が面白いと思ったのは、多くの人が人生で、快感で得られる幸福感をずっと持ち続けられると考えて、快感で得られる幸福感を一生追求し続けますが、その後情熱について考えるようになり、それを解決できれば、自分にとってより崇高な目的を探すようになることです。 しかし、研究結果によると、適切な戦略とは、最初に自分にとってのより崇高な目標とは何かを見出して、追い求め（というのも、この類いの幸福感が最も長続きするからです）、その後、その下に情熱、さらにその下に快感で得られる幸福感を据えることなのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "第１条 コミットメント期間 ［原則］ あなたのコミットメント期間とは、当社と私の部署に対してあなたが何をして役立とうとするか、同時に、私と当社があなたのキャリアに対して何をして役立とうとするかを定めるものです。 コミットメント期間に関して、あなた、私、および当社には契約的な義務は発生しませんし、計画が変わってしまう可能性もあります。それを前提にしながらも、現時点では、あなた、私、および当社は、このコミットメント期間を完遂することを、相互信頼に基づき約束します。互いに合意した共通の目標に向かって進捗がある限り、当社はあなたを退職させませんし、あなたも当社を辞…", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第１条 コミットメント期間 ［原則］ あなたのコミットメント期間とは、当社と私の部署に対してあなたが何をして役立とうとするか、同時に、私と当社があなたのキャリアに対して何をして役立とうとするかを定めるものです。 コミットメント期間に関して、あなた、私、および当社には契約的な義務は発生しませんし、計画が変わってしまう可能性もあります。それを前提にしながらも、現時点では、あなた、私、および当社は、このコミットメント期間を完遂することを、相互信頼に基づき約束します。互いに合意した共通の目標に向かって進捗がある限り、当社はあなたを退職させませんし、あなたも当社を辞...", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 33, "label": "柔軟性", "freq": 14, "highlights": [{"text": "20 世紀初頭のように、一流でない人でも一流の仕事ができるようになるかどうかはわかりません。けれどもいろんなところに現れてくる変化を見逃さず、柔軟に対応できるかどうかが、一流の仕事をするための鍵であることはまちがいないでしょう。量子力学に新しい解釈をもたらしたファインマン流に言えば、「禁止されていないことは何でも起こっているが、実現するのは可能性のもっとも高かったことだ」というのは、比喩でもなんでもなく、ほんとうにその通りなのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "短期計画はなにかと非難されてきたが、それは不当な評価だと思う。僕らは、 約六週間ごとに次に何をするかを決める。それが唯一の計画だ。それより先のことはなんであれ、「あとで検討」案件とみなす。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "近い将来のことだけを計画することにしておけば、気が変わったときにも決定を変更しやすい。これでかなり気が楽になる。完璧な計画をつくらねばというプレッシャーから解放されるし、それに伴うストレスをずいぶん減らすことができる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "即時に助ける 　　②ソーシャルネットワークの見方 　　③柔軟かつ機動的に 　　④責任の所在の明確化 　　⑤心理的なつながりの連続性 　　⑥不確かさに耐える／寛容 　　⑦対話主義", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "遊びは脳の柔軟性と順応性を高め、創造的にしてくれます」と彼は言う。「遊びほど脳を奮い立たせる行動はほかにありません（ ３）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "神経科学者のジャーク・パンクセップも、同様の意見を述べている。 　「たしかに言えるのは、遊んでいるときの動物たちがきわめて柔軟で創造的な行動をとるということだ（ ５）」 　動物のなかでも、ヒトという種はとりわけ遊びが好きだ、と先述のスチュアート・ブラウンは言う。人間は遊ぶ生き物であり、遊びを通じて生き方を身につけるのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "よく使う言い方をすると、少なくとも「その近所を探検する」ことができる。ここで重要なのは、たとえまちがった場所に出たとしても、まだ正しい場所へ向かう時間があることだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "経済学の教科書なら必ず載っている需要・供給曲線のグラフでは、価格はあたかも需給ラインが交差する一点で、ひとつの価格に決まるかのように見えます。しかし現実には、先進国だろうと途上国だろうと、価格は個別の需要者がいくらまで払うか（いくらの価値を感じるか）に応じて、柔軟に変更されています。つまり、本来モノやサービスの価値は、人によって異なるのが当たり前なのです（ 図 23）。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "仮説は「空白地帯」を 狙って立てる。 　 そして仮説は、時代や状況の変化に応じて 柔軟 に修正していく。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "そこで「私は意見を変える能力が高い」 と思うようにしている（笑）。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "そもそも仏教は、キリスト教やイスラム教のような一神教ではなく、世界的に広がっている宗教のなかではもっとも柔軟性に富む宗教といえる。インド仏教、中国仏教、日本仏教という具合に、それぞれの国、地域で独自の発展、あるいは変貌を遂げても、それでよし、なのだ。 　多少、もとの形とは変わっても、仏の教えが広まるのであれば、それを許容するという懐の深さが仏教の側にもあったのだ。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "よくメディアからの取材で聞かれる。 「結局のところ、結婚できない男性って『低スペック』な人なんですか？」 　その場にいたオーネットの熟練アドバイザーが即答。 「条件面じゃありません。ガンコな人」", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "意外かもしれないが、オーネットではバツイチの人のほうが、相手が決まって成婚退会していくスピードが速い。一般的には、年齢も未婚の人より上のはずだし、条件としても不利に思える。 　それなのに、なぜ早く決まるのか。理由はいくつかある。 ・相手選びの基準が明快。何が譲れて何が譲れないかがわかっている。なので、すべてにおいて「普通」の条件を望む人より、門戸が広がり、お相手の可能性が広がる。 ・結婚に無限大の理想を持っていない。世の中に完全無欠の人間などいないことがわかっているから、欠点を許すことができる。逆に、相手の良いところを見つけて、ポジティブに評価することができる。 　要はバツイチの人は「惚れ力」が高いわけである。 　結婚は、相手のことを好きになれることがいちばん重要。振られても、傷ついても、次々と好きになれるならば道は開ける。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "整合性を高めるには、時に微調整や妥協も必要になる。繰り返しになるが、自分の中核にあるありたい姿や価値観が丸ごと会社の目的として掲げられている、などという社員はまずいない。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 34, "label": "アイデンティティ", "freq": 14, "highlights": [{"text": "文明の誕生には共同幻想が形成されることが条件で、それには言語という共通のルールが必要です。その言語が危うくなったら、日本人のアイデンティティとしての共同幻想は壊れてしまう。すなわち文明（人間圏）の構成要素としてのユニットが壊れてしまうわけです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "だからやっぱり、〝推し活〟はＺ世代にとって重要なアイデンティティ、みたいな言説には素直に頷けない。あの子たちの〝推し活〟は、そのときどきの流行にとりあえず迎合する習性の一環に過ぎなくて、寧ろアイデンティティとは対極の現象だった気がする。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "ます。「バ美肉」とは、つまり「バーチャル美少女受肉」であって、昔はYouTubeやTwitterに 蔓延ったアニメアイコンのようでもあり、", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "当初はフランス政府もゴーン前会長を庇うのかなと思ったら、実は税額の高いフランスで所得を計上せず収入や資産を逃避させやすいオランダで納税していたことが発覚すると、フランス人をして「ゴーン前会長？　あれはレバノン人だから」と見切らしめてしまうというわけです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "その〝存在の力〟のエネルギー源は何か。それは、アイデンティティの放棄、あるいは破綻だと考えています。つまり、自分を明け渡すということです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "人生の中で何度も大きなアイデンティティの破綻を経験し、そのアイデンティティの破綻をしっかりと受け止めることができれば、基本的に存在感と存在力が増していくとぼくは考えています。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "徹底的にアイデンティティを破綻させて明け渡すことが一回でもいいからできると、思いっきりスライドでき、人はすごく存在の力がつくんです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "存在の力をしっかりとつけていく非常に単純な方法は、最初にもお話ししたアイデンティティの破綻です。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "過去 30 年間、新自由主義でやってきて、この短い間に、富の格差が異常なレベルにまで広がる、移民が急速に増える、人口構成比率における白人のシェアが低下する、ＬＧＢＴの権利保護が法制化される、アメリカ社会の屋台骨だったキリスト教文化が廃れていく……。それだけの激変がたかだか、一世代の時間軸で発生するとなると、アメリカとは何なのか、何がアメリカ人なのか、そうしたソウル・サーチング（自己の再確認作業） が必要になっていくのでしょう。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "現代において、固定した「自分」は失われてしまったようである。たとえばネットでは全く異なるハンドルネームを名のることが可能であり、年齢、性別は簡単に越えられてしまう。従って、簡単に別の自分になることが可能になるなかで、自分探しをすることも意味がなくなる。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "この元教授のように、ふだん私たちは社会的なつながりの集団的な面を軽視しがちだが、いざ国家的危機が生じたり、自分が連帯感を抱いている人の名誉が侮辱されたりすると、自分でも驚くほど集団アイデンティティーにとらわれていたことに気づく。二", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "リッツ・カールトンはモットーとして、次の言葉を掲げています。 「紳士淑女をおもてなしする私たちも紳士淑女です」", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "アメリカのある小学校では、子どもたちを「生徒」と呼ぶ代わりに「 小さな学者さん」と呼ぶことによって、学業成績を向上させたという事例があります。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "こうした生成の経緯が、 77 年以降が「〈自己〉の時代」である理由を説明してくれます。〈ここではないどこか〉探しの頓挫を埋め合わせる代替的営みが〈ここの読み替え〉でした。この代替を要求したのは〈自己のホメオスタシス（恒常性維持）〉（↓ 参照） です。後続世代になるとそこからナンパ系とオタク系が分化していきました。この分岐は、セルフイメージの維持に使えるツールが、対人的能力によって異なるためにもたらされたものです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 35, "label": "人生哲学", "freq": 14, "highlights": [{"text": "オーストラリアのホスピスで看護師をしていたブロニー・ウェアは、死を迎える患者たちが最後に後悔していることを聞き、記録しつづけた。その結果、もっとも多かった答えは「他人の期待に合わせるのではなく、自分に正直に生きる勇気がほしかった（ ６）」。 　自分に正直に生きるというのは、単にわがままになることではない。不要なことを的確に見定め、排除していくことだ。そのためには、無意味な雑用を断るだけでなく、魅力的なチャンスを切り捨てることも必要になる（ ７）。やることを減らし、人生をシンプルにして、本当に重要なことだけに集中するのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "自分は何が大好きか？」 　「自分は何がいちばん得意か？」 　「世の中の大きなニーズに貢献できるのは何か？」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "大好きで、才能を生かせて、世界の役に立てる仕事。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "エッセンシャル思考で生きるということは、削除と凝縮と修正を、日々の習慣にすることだ。まるで呼吸するように、自然に生き方を編集しよう。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "この話は、私に２つの教訓を与えてくれた。ひとつは、自分にとって家族がどれほど大切かということ。そしてもうひとつは、人生の残り時間が本当にわずかしかないということだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "単に自分の人生をより輝かせ、もっと幸せに、そして末永く良いものにしていくためにどうするのか、という生きていくための哲学の部分がドーンと欠けていると思うんです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "ほとんどの人がけっきょくは気づくように、長い年月にわたるほんとうの幸せは、便利な器具をたくさん持っているとか、大きい車を持っているとか、食欲が満たされるといった単純な話ではない。幸せは、ただたんに痛みや悲しさ、不快さの対極にあるのではない（ 15）。また、ほんとうの幸せとは、ただいっときの気分の状態でもない（ 16）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "もし私たちが、「ニューヨーカー」誌の漫画で数えきれないほど取り上げられた、あのはるか遠い山の頂を目指して苦労しながら進む孤独な巡礼者だとしたら、そして頂上に端座する 導師 に「健康と富と幸せを得るカギは何ですか」と尋ねることができたとしたら、私たちのデータによれば、彼の答えはきっと次のようなものになるはずだ。「人は本来、社会的な生き物なのです。その三つをすべて得るカギは、あなたにとっても、あなたの近くや遠くにいる人にとっても有意義で満足のいく、強い社会的つながりを築くことです」", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "アメリカ発の金融危機によって、これまで「幸せへの最短コース」だと一部の人間たちが固く信じていた金融資本主義がもろくも崩れた。今後、世界がどのような局面に向かうか、議論も百出している。 　だが、日本人はこんなときにこそ肝に銘ずるべきなのだ。幸せへの最短コースとは、目の前にあるこの道を誠実に歩むことなのだ、と。基本に忠実に、正しいと思うことを「急がばまわれ」の精神でやりとげていくことなのだ、と。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "そして考えたのが、私たちはみな、自分の属する社会と文化によって、どれほどあっけなく、自分で考えることをやめ、結局のところ幸せとは人生を楽しむことであるのにもかかわらず、既定のこととしてお金がたくさんあることイコールより多くの成功と幸せだと思い込むように洗脳されているのか、ということでした。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "この分野について学ぶうちに知ったのが、研究の結果から導き出される結論のひとつが、人は長続きする幸福感をもたらしてくれるものを見抜くのがとても下手だということでした。たいていの人はその人生を、「〇〇を手に入れることができたら、幸せになる」あるいは「〇〇を達成できたら、幸せになる」と考えて過ごしています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ところが実際、手に入れたと思った幸せはかなり短期間のうちに色褪せていく、と研究は示しているのです。 たとえば、宝くじ当選者の幸福度のレベルを、当選直前と当選から一年後で比較した研究がいくつかあります。それらによると、ほとんどの場合当選者の幸福度はどういうレベルにせよ元に戻る、という結果が出ています。 私にとって、この現象について学ぶことは、非常に興味深いものでした。つまり、ほとんどの人にとって、お金儲けをすること、結婚すること、速く走ることなど、それが何であろうと、人生の目標をついに達成したところで長続きする幸福感をもたらしてくれないということです。それにもかかわらず、多くの人はその一生を、自分を幸せにしてくれると考えているものを追い求めることに費やしているのです。 あなたに自問していただきたいのは、あなたが追い求めたいと思っているものが、実際にあなたが手に入れられると思っている幸せを与えてくれるかどうかです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私が面白いと思ったのは、多くの人が人生で、快感で得られる幸福感をずっと持ち続けられると考えて、快感で得られる幸福感を一生追求し続けますが、その後情熱について考えるようになり、それを解決できれば、自分にとってより崇高な目的を探すようになることです。 しかし、研究結果によると、適切な戦略とは、最初に自分にとってのより崇高な目標とは何かを見出して、追い求め（というのも、この類いの幸福感が最も長続きするからです）、その後、その下に情熱、さらにその下に快感で得られる幸福感を据えることなのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "あなたは毎日自分が最高に幸せになるために仕事をしていますか。 毎日、世界の幸せに対してあなたの存在はどんな影響を与えているでしょうか。 あなたの価値観とは何でしょうか。 あなたは何に情熱を傾けていますか。 あなたにやる気を与えるものは何でしょうか。 あなたの人生の目標は何でしょうか。 あなたの会社の価値観とは何でしょうか。 あなたの会社のより崇高な目的とは何でしょうか。 「あなた」のより崇高な目的とは何でしょうか。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 36, "label": "自己実現", "freq": 14, "highlights": [{"text": "オーストラリアのホスピスで看護師をしていたブロニー・ウェアは、死を迎える患者たちが最後に後悔していることを聞き、記録しつづけた。その結果、もっとも多かった答えは「他人の期待に合わせるのではなく、自分に正直に生きる勇気がほしかった（ ６）」。 　自分に正直に生きるというのは、単にわがままになることではない。不要なことを的確に見定め、排除していくことだ。そのためには、無意味な雑用を断るだけでなく、魅力的なチャンスを切り捨てることも必要になる（ ７）。やることを減らし、人生をシンプルにして、本当に重要なことだけに集中するのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "意思のない人に何を言っても時間の無駄だからです。 意思があった上で習慣をつくり、習慣が個性をつくることを目指します。 一流になりたい人だけが一流になります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "アリストテレスの幸福論では、人生の最終的な「目的」は幸福になることだとされています。お金を稼ぐこと、有名になること、モテることなどはそのための「手段」であり、ゴールそのものではない、という考え方です。何が自分にとって幸福なのか、その答えは一人一人違いますが、アリストテレスの言うように、社会生活の中で自己実現をすることが幸福なのだとすると、ヘッジファンドのオーナーたちは、前段部の「社会生活」では輝かしい成果を叩き出していますが、後段部の自己実現はどうなのでしょうか。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "つまり、かけがえのないひとつの人生を、われわれは「つくり出す」のであり、そのような意味で、どのような人間であれ、「創造活動」にかかわっていると考えられる。そのように考えると、どのような人にとっても、「創造の病」にかかる可能性は高いわけである。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "実のところ「道草」には深い意味がある。というよりは、一般に「道草」と見えることに対して意義を見いだすことは可能であり、このごろはやりの「自己実現」などという語を使うとすると、むしろそちらのほうこそが、自己実現の王道であると言えるように思えるのである。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "自分にもわからない自分を生きることは、その自分を自己と呼ぶならば、自己実現ということになる。自己実現は到達するべき目的地なのではなく、過程なのである。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "日本で心理療法に従事するうちに、河合隼雄はいわゆる自己実現なるものはそのように単純ではなく、ゴールは実体化できないことに思い至る。そもそも日本人は自分がはっきりしないから、それに向かい合うものもはっきりとせず、ゴールもわかりにくい。その結果として出てくるのが、「潜在するＸ」であり、「アレとソレ」であり、「 必竟 誰なのだ」という問いである。つまり何かはっきりとした目標ではなくて、何かわからない謎をめぐることになる。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "大きな仕事をするには、何かを良くしているという感覚が必要だ。世界にささやかに貢献している、あなたは重要なものの一部である、という感覚だ。", "book_title": "小さなチーム、大きな仕事　働き方の新しいスタンダード (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、黒沢 健二、松永 肇一、美谷 広海、祐佳 ヤング"}, {"text": "人生の最高の目的は、人格を強く鍛えあげ、可能な限り心身を発展向上させていくことである。これこそ唯一の目標であり、それ以外のものはこのための手段にすぎない。最高の快楽や富、権力、地位、栄誉や名声を得たとしても、それは人生における最大の成功ではない。むしろ、最高の人間性を獲得し、他人の役に立つ仕事に打ちこみ、人間としての義務を果たしていくことこそ、いちばん立派な生き方なのだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "「唯一無二の自分」を大切にするという点で、最先端にいる若者たちはアマチュア活動のような「非営利活動」に対して熱心です。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "三つ目として、彼らの活動の一番の動機が、自分の「好き」とか「おもしろい」という気持ちを大切にしたいから、という点です。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "彼らの目的は「自分を豊かにする」ことです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "自分で自分をコントロールしていると感じられるか、自分が進歩していると感じられるか、つながり（関係の数と深さ）、ビジョンと意味（自分自身よりも大きなものの一部となること） の四つのことで決まります。このフレームワークの面白いところは、あなたがこのコンセプトをビジネスにも応用できるということです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "あなたは毎日自分が最高に幸せになるために仕事をしていますか。 毎日、世界の幸せに対してあなたの存在はどんな影響を与えているでしょうか。 あなたの価値観とは何でしょうか。 あなたは何に情熱を傾けていますか。 あなたにやる気を与えるものは何でしょうか。 あなたの人生の目標は何でしょうか。 あなたの会社の価値観とは何でしょうか。 あなたの会社のより崇高な目的とは何でしょうか。 「あなた」のより崇高な目的とは何でしょうか。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 37, "label": "人格", "freq": 14, "highlights": [{"text": "学者 とは、徳によって与えられる名であって、学識によるのではない。学識は学才であって、生まれつきその才能をもつ人が、学者になることは困難ではない。しかし、いかに学識に秀でていても、徳を欠くなら学者ではない。学識があるだけではただの人である。無学の人でも徳を具えた人は、ただの人ではない。学識はないが学者である。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "恐れるものなく独立心をもっていた藤樹でしたが、その倫理体系でもっとも注目されるのは、謙譲の徳に最高の位置を与えていた事実です。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "このようにリーダー的な役割ができるファンは、リーダーっぽく威張っている人よりも、物腰が柔らかくて社交性が高い人が多いのが特徴です。 　ＴＯは推しの顔でもあるので、ＴＯが他の人に嫌われてしまうと、ＴＯが推している地下アイドルの印象まで悪くなってしまいます。そのため、周囲の人が認められるような人でなければＴＯにはなれないのです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "政治の力だけで国民を救えるというのは実に危険な幻想なのだが、このような考えはいつの時代にもはびこりやすい。しかも、多大な犠牲を払って国の変革が成し遂げられようと、国民の心が変わらなければ、その変革はほとんど功を奏さないだろう。 　人間が無知やエゴイズムや悪徳の束縛から逃れられるかどうかは、ひとえにその人間の人格にかかっている。そして国民一人ひとりの人格の向上こそが、社会の安全と国の進歩の確たる保障となるのだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "大切なのは、一生懸命働いて節制に努め、人生の目的をまじめに追究していくことだ。それを周囲に身をもって示している人間は多い。彼らの地位や力はどんなに取るに足らないものだとしても、現代はもとより将来の社会の繁栄に大きく寄与している。 　というのも、彼らの生活や人生観は、意識するしないにかかわらず周りの人間の生活に浸透し、次の時代の理想的な人間像として広まっていくからだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "高潔な人格の妻は気づかぬうちに夫の品性を高めるが、心の貧しい妻は必ず夫を堕落させる――そうトックビルは信じていた。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "人生の最高の目的は、人格を強く鍛えあげ、可能な限り心身を発展向上させていくことである。これこそ唯一の目標であり、それ以外のものはこのための手段にすぎない。最高の快楽や富、権力、地位、栄誉や名声を得たとしても、それは人生における最大の成功ではない。むしろ、最高の人間性を獲得し、他人の役に立つ仕事に打ちこみ、人間としての義務を果たしていくことこそ、いちばん立派な生き方なのだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "彼はただ、仕事こそが人間の生きがいであり、全能力をそこに注げば人格は向上し、進歩も勝ち取れる、と謙虚に信じていたのである」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "人は誰でも、すぐれた人格を得ることを人生最大の目的とすべきである。正しい手段でそれを得ようと努力すれば、ますます生きる力がみなぎり、人生観もゆるぎないものとなるだろ\n\n優れた人格の定義とは？？", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "言行一致は、立派な人格のバックボーンを成している。常に誠実な言動を心がけるのが人格者のすぐれた特質なのだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "本物の礼節を知る人間は、他人の意見にもよく耳を傾ける。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "真の人格者は自尊心に厚く、何よりも自らの品性に重きを置く。しかも、他人に見える品性より、自分にしか見えない品性を大切にする。それは、心の中の鏡に自分が正しく映ることを望んでいるからだ。 　さらに、人格者は自分を尊ぶのと同じ理由でほかの人々をも敬う。彼にとっては、人間性とは神聖にして侵すべからざるものだ。そしてこのような考え方から、礼節や寛容、思いやりや慈悲の心が生まれてくる。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "真の人格者であるかどうかを測るものさしはたくさんある。中でもまちがいのない方法は、その人間が目下の者にどうふるまうかを見ることだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "こう考えてくると、やさしさと思いやりが人間の人柄を判断する重要な決め手といえそうだ。真の人格者であれば、そのちょっとしたふるまいにも他人に対する気くばりが行き届いている。相手が対等な立場であろうと目下の者であろうと、その気くばりは変わらない。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 38, "label": "地政学", "freq": 13, "highlights": [{"text": "なかでも水源の確保に必死なのが中国とインドだ。中国の人口はいずれピークアウトするが、それでも世界一。インドも人口が増えていて、今後は水がいくらあっても足りない状況になる。 　そして、中国とインドの間には豊富な水源がある。ヒマラヤ山脈を水源とする水系だ。両国はいまこの水系を奪い合っていて、小競り合いが起きている。今後、水不足が深刻化すれば一気に火を噴く可能性もある。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "圧倒的な軍事力と通貨の力を背景にした米国によって主導された世界秩序は、中東でのイスラム国のような武装集団による混乱、先進国内でも頻発するテロ、ウクライナ危機にみられる国連安全保障理事会の機能不全、国際コンセンサス不在の中でのロシアの膨張、政府が積極的に市場介入を行なう国家資本主義をとる中国の経済的、軍事的台頭といった波の中で既存の秩序は崩壊の過程に入ったように見受けられます。 　軍事的な面のみならず経済的な面でも、例えば２０１４年に中国はアジアインフラ投資銀行（ＡＩＩＢ）の設立を進め、世界銀行やアジア開発銀行に対抗する構えを見せています。 　こうした状況を現政権のオバマ大統領は冷戦時のソビエト連邦の脅威よりは良いと述べていますが、政治学者であるイアン・ブレマー氏が唱えるように世界はＧゼロという多極化が進んでおり、政治、ビジネスにおいて米国がスタンダードをつくれない環境を認識すべきです。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "彼に「圧倒的に世界第２位の日本経済を潰したら、世界経済はどうなるんだ」と尋ねたことがあります。 　彼の答えは意図的に 曖昧 でしたが、私なりに意訳すると、「しばらくはアジアのドラゴン（韓国や台湾などの新興国） で時間を稼いで、そのあとは中国がある」というものでした。 　そして実際にその通りになりました。結果としてアメリカにいいように遊ばれてしまったような気がします。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "１９９０年代にアメリカがとったアジア四小龍（韓国、台湾、香港、シンガポール） への支援、そして中国の台頭を促す政策は、日本の相対的地位を低下させる戦略と表裏一体にあり、１９９０年代後半には、「ジャパンパッシング」と呼ばれた現象が示すように、日本以外のアジア諸国の発展を促進するものとなりました。第二次世界大戦後に冷戦が始まったときに日本にアメリカが提供した環境は、今度は彼らに提供されることになったのです。 　かくしてアメリカは世界第２位の経済大国を没落させる一方、代替を探して世界経済を守ることに成功しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "②競合国のＧＤＰがアメリカの 50％近くに迫る。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "新自由主義のもたらした国際化の最大の受益国が中国だとすれば、その逆流の痛みを受ける度合いも必然的に大きくなります。その反面、日本のように新自由主義の波に乗り遅れ、生産拠点を全て外に出さなければならなかった国にとっては、「リショアリング（海外に移した生産拠点の自国回帰）」や「フレンド・ショアリング（同盟国や友好国に限定したサプライチェーン構築）」は相対的にプラスの話です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "机上軍事シミュレーションをすると、台湾有事の際、米国のインド太平洋軍が中国に負ける可能性が示唆されています。その主な理由は、中国が「接近阻止・領域拒否（Anti-Access/Area Denial、Ａ２／ＡＤ） 戦略」を作り上げてしまったからです。単純化して言うと、中国が余りにも多くのミサイルを配備しているので、実際に軍事衝突が発生した場合、米軍は第１列島線の西側では身動きが取れない可能性が高いのです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "２０１０年代半ばになると、ロシアはクリミアを併合し、中国は好き勝手に南シナ海を要塞化するようになります。東海岸と西海岸のエリートたちは「慣性の法則」から抜けきらず、そうした動きを見て見ぬふりをしました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "２０１６年の選挙でトランプが大統領となり、居眠りを続けたがっている新自由主義者を叩き起こします。２０２０年にはブレグジットが現実のものとなりました。そしてロシア・ウクライナ戦争（２０２２年～） は、満身創痍となっていた新自由主義の息の根を止めたのです。経済相互依存が進むことで武力紛争や戦争は起きなくなる、その考え方は瓦解します。 　新自由主義の時代、日本と並んで負け組となったのが、冷戦期のヒーローであったＮＡＴＯ（北大西洋条約機構） です。経済優先の時代になり、冷戦構造が終結すると、過去の遺物と化しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかしロシア・ウクライナ戦争が勃発すると、ＮＡＴＯの価値は急騰します。冷戦期もＮＡＴＯには加盟していなかったスウェーデンとフィンランドも加盟を乞うようになりました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "２０１６年の選挙でトランプが大統領となり、居眠りを続けたがっている新自由主義者を叩き起こします。２０２０年にはブレグジットが現実のものとなりました。そしてロシア・ウクライナ戦争（２０２２年～） は、満身創痍となっていた新自由主義の息の根を止めたのです。経済相互依存が進むことで武力紛争や戦争は起きなくなる、その考え方は瓦解します。 　新自由主義の時代、日本と並んで負け組となったのが、冷戦期のヒーローであった...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかしロシア・ウクライナ戦争が勃発すると、ＮＡＴＯの価値は急騰します。冷戦期もＮＡＴＯには加盟していなかったスウェーデンと...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "「市場が一番よく知っている」から「政治家が一番よく知っている」へ、「何が重要？　経済でしょう！」から「何が重要？　地政学でしょう！」へと人々の世界観が変わりつつありました。ワシントンを見ても、ホワイトハウスの経済チームの地盤沈下は明白...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}]}, {"id": 39, "label": "謙虚さ", "freq": 13, "highlights": [{"text": "「ベースキャンプ」は世界を変えたりしない。ただ、企業やチームでのコミュニケーションや共同作業が簡単にできるようにするだけだ。これはとても価値があることだし、すばらしいビジネスが生まれる。とはいえ、世界の歴史を書きかえられるわけじゃない。けど、それでいい。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "日本の起業家は少ないのですから、起業した以上、自分がロールモデルになるべきではないでしょうか。それなのにプライベートを謳歌するとか、大した経営者でもないのに講演をするとか、本を書くとか。まったく「アホか！」と言いたいですよ（笑）。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "年を重ね、経験を積めば積むほど、無防備な自分をさらけ出すのはどことなく気恥ずかしいことかもしれませんが、新しい知識や成長のきっかけがほしいなら、勇気を出して「ゼロ」になるのが一番です。教える側としても、相手が斜に構えているより、素直に「ゼロ」になってくれたほうが喜んで教えようという気になります。 　だからじつは「ゼロ」にならないのはとても〝もったいない〟こと──。 　一度でも「ゼロ」を経験し、それが成長につながることを実感したら、次からは抵抗なくいつでも「ゼロ」に戻れるようになるはずです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "絶好調のときこそ 〝耳が痛い人〟の話を聞け", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "謙虚に振るまいながらも遠慮はしない──。 　気を遣うより、気を遣わせるな──。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "ふだん心がけている謙虚さは、ただの遠慮や自己満足になっていないだろうか？ 　自分が一歩引くことでかえって相手に気を遣わせたり、勉強のチャンスを逃したりしていないだろうか？ 　自分の謙虚さが本物かどうか、ぜひ一度、振り返ってみてほしいと思います。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "私は、自分にはわからないことがあることを認め、そのための余白を持っているマネジャーこそ優れたマネジャーだと思っている。それは、謙虚さが美徳だからというだけでなく、そうした認識を持たない限り、本当にはっとするようなブレークスルーは起きないからだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "ビジネスパーソンが伸びるかどうかは「 コーチャブルかどうか」にかかっています。これは「素直さ」とも言えますが、コーチを受けて自分を成長させる意思があるかどうかです。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "そうした情報（Information）を構造化によって洞察（Insight）に変えるためには、「そんなの知ってる、知ってる」という態度ではなく、 謙虚に自分が知らないことを認識して貪欲に情報を収集していく必要があります。 情報（Information）だけならネット上にいくらでもあります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "人を変える原則❸　 まず自分の誤りを話したあと相手に注意する。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "古代ギリシャの哲学者ソクラテスが強調した「無知の知」。どんなに智恵ある者でも、知らないことの方が多い。そもそも、「知性」ということ自体が、有限の立場でしか成り立たない属性である。どこまでいっても知性は有限のものでしかないとすれば、「無知」であることを自覚することだけが、最高の知性のあり方となるのであろう。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "視野が狭いことと、もうひとつはちょっと話が飛ぶようですが、神様とか超越性に対する感覚が弱いからだと思うんです。人知を尽くせばオペレーションは完遂できる。そう思うから間違える。インテリジェンスがとくに一神教の国で発達しているのは、人知の限界に対する諦念があるからで、自分たちが完璧だと思うオペレーションでも必ず崩れる、どんなに信頼しているやつだって絶対に裏切るという感覚があるからなんですね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "ただ、そういったことをしても、自分は何でも思い通りにできると高を括らないためには、やはり何か怖いものがある人でないといけない。奥さんが怖い、死んだ父親が怖い、でもいい。怖いものが何もない人がインテリジェンスをやると、だいたい暴走して事故を起こします。だから学校秀才型の人って合わないんですよ。学校秀才型は基本的に怖いものがないですから。 　 西木 　うん、思い込みが激しいしね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 40, "label": "顧客体験", "freq": 13, "highlights": [{"text": "また、購入前の本をカフェに持ち込める「ブック＆ カフェ」は集客と滞在時間への効果が高い。六本木の直営店で導入し効果を確認した後、ノウハウをパッケージ化してＦＣに普及させた。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "蔦屋書店についてはよく、「こんなに喫茶店でタダ読みできたら、本が売れないでしょう」と言われる。けれど、それが売れているのよ。代官山の本は坪月商３０万円だよ？　こんな本屋、なかなかない。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "消費はモノからコトへ」と長く言われ続けていますが、アフターデジタルにおいては、「顧客体験」や「ジャーニー」という言葉を使ったほうが適切 です。「", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "顧客に接する」部署だけでなく、1回限りの接点を超えて、連携して顧客体験を生み出していくことが重要です。「モノからコトへ」ではなく、「モノから寄り添いへ」といった意識に変えたほうがよいのではないかと思います。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "スタートトゥデイは好調の要因を、「ブランドの世界観を尊重し、リアル店舗で購入する以上の顧客経験価値の提供にこだわったこと」と説明している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "この店舗の生鮮食品のコーナーには、商品情報を説明するモニターが設置されている。顧客が店頭で人参を手に取ると、人感センサーと、ジェスチャーと音声で動くマイクロソフト・キネクト・センサーが反応し、その商品の栄養成分や価格、農薬や肥料、アレルギーを引き起こす可能性のある物質、売り場に到着するまでの一部始終が表示されるという仕組みだという。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "オムニチャネルが実現すると、顧客はオンライン店舗にいてもオフライン店舗にいても企業側から正しく「個客」として認識され、統一された対応を受けられることになる。近藤（２０１５）はオムニチャネルを、「すべてのチャネルを統合し、消費者にシームレスなショッピング体験を提供するマーケティング手法」としている。現在のチャネル論においては、このオムニチャネルの状態が、進化の最先端とされている。これがチャネル形態の現在地である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "「新しいタイプの顧客の特性は、マーケティングの未来がカスタマー・ジャーニー全体にわたってオンライン経験とオフライン経験のシームレスな融合になることを、はっきり示している」（Kotler 2017）のである。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "LemonとVerhoefの論文には、筆者らが考えている顧客時間に似た概念図が出てくる。両氏は、カスタマー・ジャーニーは時系列で蓄積されるため、顧客経験を「ブランド・オウンド」「パートナー・オウンド」「カスタマー・オウンド」「ソーシャル／外部」という４つのタッチポイントで管理すべきであるとしている。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "ボノボスの例でもそうだったが、チャネルの進化とは、必ずしも店舗の無人化を意味しない。オンラインを柔軟に組み合わせたチャネル設計によって、オフライン店舗のタスクをシンプルにできれば、顧客にとって価値のある接客に集中できるようになる。すなわち、そこで求められるのは接客の高度化であるということだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "この明らかな価格差は、非会員にとっては、冷遇されているかのように感じる。しかも、それを単なる「情報」ではなく、「体験」することになる。 　 この体験に直面した非会員の顧客はどう思うだろうか。ほぼ間違いなく、「これはプライム会員にならないと損だ」と思うはずだ。アマゾンは意図的にプライム会員と非会員の待遇が異なる場をオフラインに創り出し、差別化された価格を提案し、プライム会員であることの優越感・満足感を提供しているのだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "「マクドナルドらしさ」とは何か。それは、アメリカンテイストのボリューム感あるハンバーガーの味や、機能的で清潔な店舗や、スピーディーかつ温かなサービスにある。その根底にあるのがＱＳＣです。この「土台」を築かなければ、次の戦略に駒を進められないという思いがありました。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "広告原稿にあったキャッチコピーや写真がランディングページにあると、 お客様は安心してそのランディングページを読もうとする。 とにかく広告原稿を読んで 熱の高まったお客様を、見当違いのコンテンツで冷めさせない ことが重要である。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 41, "label": "企業文化", "freq": 13, "highlights": [{"text": "当社には「超継続」という言葉があって、これが企業カルチャーとして浸透しているんですね。「勝つまでやめない。だから負けはない」という。やめたときが負けたときなんです。", "book_title": "「事業を創る人」の大研究", "author": "田中聡、中原淳"}, {"text": "我々の目的は、ただヒット作品を生み出すスタジオをつくるのではなく、問いかけを続ける創造的な企業文化を育てることにある。何かを達成したときに、何がよかったのかをきちんと把握するにはどうすればいいのだろうか。それを次のプロジェクトに生かせるだろうか。あるいは、そもそも同じことを繰り返すのは正しいことなのだろうか。会社を崩壊させかねない、深刻で、ともすれば破滅的な問題が、気づかないうちに忍び寄ってきていないか。それを明るみに出すにはどうすればいいのか。うまくいったことのうち、どの程度が幸運によるものだったか。成功し続けたら我々の自尊心はどうなるのか。尊大になって痛い目に遭うだろうか。それなら、自信過剰にどのように対処できるのか。苦しかった創業時に比べて、業績のいい今、新しいスタッフを迎えるとどのような変化が起こるだろうか。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "業績不振に苦しんでいた就任直後、僕は従業員たちに、まず「ＱＳＣ（＊３） を高める以外のことを考えなくていい」「ＱＳＣのことだけを考えろ」と訴えかけました。 　一般論として、企業というのは「らしさ」を忘れて不振に陥り、「らしさ」を取り戻して復活するものです。日本でマクドナルドが苦戦していた理由は、「健康志向が台頭したこと」でも「ハンバーガーに対して消費者が飽きたこと」でもない。「マクドナルドらしさを失ったこと」にある。僕はそう考えていました。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "「マクドナルドらしさ」とは何か。それは、アメリカンテイストのボリューム感あるハンバーガーの味や、機能的で清潔な店舗や、スピーディーかつ温かなサービスにある。その根底にあるのがＱＳＣです。この「土台」を築かなければ、次の戦略に駒を進められないという思いがありました。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "本当に最高のカスタマー・サービスを提供するザッポスのブランドを築くためには、一部門ではなく、全社を挙げてカスタマー・サービスに取り組む必要がありました。自分たちがコール・センターを設けたいと思う場所に、サンフランシスコから本社をまるごと移転する必要があったのです。ちなみに、コール・センター部隊を、その頃、カスタマー・ロイヤルティ・チーム（ＣＬＴ） と呼ぶことにしました。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "強い企業文化を維持するため、私たちはオフィスの外での付き合いも楽しめるような人たちだけを確実に採用していきたいと思いました。すると結果的に、近所のバーで飲んでいる時に最高にいいアイデアがたくさん生まれるようになったのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "社員〝全員〟に、ザッポス・カルチャーが自分にとってどんな意味を持つのか手短に書いてもらおう。そしてそれを本にするんだ」 こんな風にしてザッポス・カルチャー・ブックのアイデアは生まれ、それ以来それはザッポスにとって不可欠なものとなっています。毎年、ザッポス・カルチャー・ブックの改訂版が作られ、私たちはこの本を採用内定者、メーカーなど取引先、そして顧客にも配っています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ほかの会社のカルチャー・ブックを読みたいと「求めてくる」人がいることに、私はいつも驚きます。（投資家や人事関係者以外で） 会社の年次報告書か従業員の手引きを読みたがっている人がいるという話を聞いたことはありますか。 ザッポスが何を売っているのかさえ知らないのに、カルチャー・ブックの背後にあるアイデアを知りたがる人がいることを考えると信じられません。そのような方が、いつかそのうち、次に新しいジーンズか靴が必要になったらザッポスを思い出してくださるかもしれません（ちなみに、カルチャー・ブックの制作費は一般的に思われているよりもずっと値頃だということは触れておく意味がありますね）。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちはザッポスの文化を一〇のコア・バリューとして正式に定めました。 サービスを通して「ワオ！」という驚きの体験を届ける 変化を受け入れ、変化を推進する 楽しさとちょっと変なものを創造する 冒険好きで、創造的で、オープン・マインドであれ 成長と学びを追求する コミュニケーションにより、オープンで誠実な人間関係を築く ポジティブなチームとファミリー精神を築く より少ないものからより多くの成果を 情熱と強い意志を持て 謙虚であれ", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ザッポスにおける私たちの哲学は、長期的な利得が相応にあると信じられるなら、（売上げや利益が減少することも含めて） 短期的な犠牲は厭わないというものです。企業文化を守り、コア・バリューに忠実であることには、長期的な利得があるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "よく企業の多くが、社員は会社にとって最も大切な財産だと言いますが、そのアプローチにはいくつか問題があります。第一に、誰かが会社を辞めると、財産を失ってしまうことになります。第二に、会社が成長しても、社員が入社した時のスキルのまま成長していないと、そのうち社員が役に立たなくなるかもしれません。そうなってしまうと、通常、多くの企業で用いられる解決策は、社外からより経験豊富な人材を雇い入れるというものですが、これが第三の問題をつくることになります。そのような新しい人材は、しばしば企業文化にフィットしないのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ネットフリックスのＣＥＯリード・ヘイスティングは、同社の企業文化をテーマにした有名なプレゼンテーションで次のように述べている。「我々はチームであって家族ではない」。続けて彼は、マネジャーたちにこう自問するよう勧めた。「うちの社員がもし同業他社に転職して似たような仕事に就くといった時、あなた自ら必死で慰留するのはどの社員だろうか？　それ以外の社員はみな、今すぐ手厚い退職金を出したうえで辞めてもらおう。そうすれば、その仕事ができるスター人材の獲得に向けて、空席ができる」——。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "こうした率直な対話から浮かび上がってくる会社の真の姿は、経営幹部が予想もしなかったものになるかもしれない。しかし、「自分たちには社会的使命を重視するカルチャーがある」と経営陣が思い込んでいる企業で、実はカネだけで動く傭兵のような姿勢に満ちていた、というケースは非常に多い。マネジャーは自社の真の企業文化を理解しておく必要がある。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 42, "label": "リスク管理", "freq": 13, "highlights": [{"text": "ビットコイン取引所である私たちがイメージしているのは、 19 世紀半ばのカリフォルニアのゴールドラッシュで、 金 を掘り当ててリッチになる人ではなく、 金 を目当てに集まってきた人たちに、強くて丈夫なジーンズを売ったリーバイスや、駅馬車網を築いて大陸の東西を結んだウェルズ・ファーゴのようなビジネスです。自ら採掘レースに参加するより、インフラを整備するほうが確実で、マーケットも大きいわけですから、そこを目指そうということです。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "逆に「いつ切られても大丈夫」くらいの自信と余裕のある人がリスクを取り、思い切ってやった仕事の方が面白いものになりますし、突き抜けた結果を残す事ができます。 　そして、後者になるためには、会社への依存度を下げる必要があります。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "文字だけでやりとりするとき、人は悪いほうに流されやすくなる。ちょっとした言葉のあやが、大がかりなケンカを引き起こすかもしれない。トラブルの芽は一瞬のうちに 摘み取らないと、疑いの気持ちがどんどんふくらんでしまう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "季節製品のキャリーコスト（翌期までの保管費用のこと） は 10％なので、それがリスクです。うちがサプライチェーンの中心にいますから、うちがリスクを取ったほうがいい。これを「善意型」サプライチェーン と呼んで", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "この１００年から１５０年程度で振り返ると、日本は二度覇権国家に愛され、二度嫌われた経験があります。最初にラブコールを送ってくれたのは、 20 世紀初頭、当時の覇権国家であった英国です。イギリスは帝政ロシアの勢力拡大を抑えるため、東洋に同盟国を求めました。その結果、この時期の日本は、韓国を併合しても、満州に手を出しても許され、経済的に繁栄します。二度目は冷戦下、アメリカがソビエト・ロシアを封じ込めるため、日本の経済発展を助けてくれた時です。 　そして今回、三度目の機会が訪れています。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "これは、「直観力」も「説得力」もあるが、「責任力」がないために 　意思決定に関わることのできないタイプのマネジャーです。 　この「責任力」とは、私の勝手な造語ですが、 「リスクを取り、責任を取る能力」のことです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "今はそんな風に都会と田舎を行ったり来たりしている生活だけど、いざというとき、例えば都会で本当に金銭的にヤバくなってホームレスになりそうになったときとかに「ここに行けばとりあえず生きていける」というセーフティーネットとして使おうということも考えている。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "しかし、リスクの高い研究開発を定期的に行なわなければならない研究開発型製造業の場合を考えたらどうであろう。資金の調達方法は、 金融機関からの借り入れ、 現行株主に対する株主割当増資、 内部留保の利用、の三つしかない。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "市場機会を評価する ●着くテーブルを選ぶのは、自分で決められる最も重要なこと ●着いたテーブルで勝ち目がないとわかったら、テーブルを替わっても構わない ●テーブルに少々不合理なことをしたり、経験不足の人が多すぎると、最高のプレイヤーでも非常に勝ちにくい", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "失敗しないということは、必要なリスクを取っていないことを意味するからです。時", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "考えてみてください。ちゃんとリスクを取っていますか。失敗することを恐れていますか。居心地のよい場所に甘んじずに、そこから外へ踏み出していますか。取り組んでいる仕事に冒険心や創造性が発揮されていますか。あなたがザッポスに貢献できるクリエイティブなこととは何ですか。オープンな心で状況と課題に向き合っていますか。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ここで、ひとつのデータ分析の特徴を紹介しておくと、「データ分析は本質的にやってみるまで何が出てくるかわからない」。何がわかるのかがわかっているならば、わざわざ分析を行うまでもないため、これはごく当たり前のことながら、企業での活用を考えた場合に非常に悩ましい事態を引き起こす。つまり、データ分析によってどれだけの（売り上げ向上やコストの削減といった）効果があるのかが不明であるため、投資の採算性が判断できず、データ分析への投資の決断が非常に難しくなるのだ。 　さらに、やってみるまでわからないという性質は、どのデータが重要で蓄積しておくべきものなのかを事前に判断することができないことも意味する。この「分析の役に立つかもしれないから残しておこう」という考え方でデータをなんでも収集したり蓄積したりすると、当然その量は膨大になり、蓄積・分析環境への投資額が増えてしまう。 　結果、意思決定者からすると、ROIが不明にもかかわらず、絶対額は大きいというリスクの高い投資になるのである。", "book_title": "顧客を知るためのデータマネジメントプラットフォーム　DMP入門 (NextPublishing)", "author": "横山 隆治、菅原 健一、草野 隆史"}, {"text": "プライシングで大切なのは、 値段を最終的に決めているのは市場であり、消費者である という認識です。「値上げ」には大きなリスクが伴います。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 43, "label": "文化論", "freq": 13, "highlights": [{"text": "日本の歴史には明らかに 歪曲 がある。日本人のファンダメンタルズは、昔から変わっていないのだ。日本人は先祖伝来、ほとんどの人が夫婦で一緒に働いて、一緒に子どもを育ててきた。現代人には、むしろ平均的な日本人本来の姿に戻れと言いたい。はばかりながら、冨山家は正真正銘のドン百姓、明治の御一新でやっとお上から「冨山」という名字を頂戴した、由緒もへったくれもない血筋である。だから、お武家さまやお公家さまたちの「日本の伝統論」には、くそくらえとしか言いようがない。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "このように文化に幅があるという話をすると、必ず「日本の特徴の 1 つは、さまざまな文化をうまく取り入れて、自国の文化としてアレンジすることだ」というようなことをおっしゃる方がいますが、それは違います。 　異文化をうまく取り入れるのは、何も日本だけの特徴ではありません。例を出せばきりがありませんが、たとえばヨーロッパにおけるキリスト教はその典型でしょう。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "ＬＬ型の遺伝子を持つ人は、最も性格がおおらかで楽天的、逆にＳＳ型の人は不安を感じやすく、うつ病の発症リスクが高いことがわかっています。日本人はネガティブな性格のＳＳ型遺伝子を持つ者の割合が世界で最も高いので、不安が強すぎる傾向があります。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "第一段階は「〈秩序〉の時代」です。そこでは現在の社会秩序が理想的なものと考えられ、秩序の 攪乱 は悪なる他者──秩序外部的存在──に起因すると見做されます。「〈秩序〉の時代」は日本では１９４５年から 60 年代まで続きます。例えば漫画や小説などで頻繁に表現されたのは「孤児の少年が活躍して秩序を乱す悪を退治する」という物語です。ところが 60 年代に入ると──特にオリンピック以降──物語が変わります。 　それを「〈未来〉の時代」と呼びます。そこには打って変わって「人間たちの秩序自体が悪」というモチーフが展開します。１９５３年のビキニ環礁水爆実験を踏まえ、 54 年『ゴジラ』が公開されます。ゴジラは水爆実験で突然変異を起こしたジュラ期の恐竜という設定です。つまりゴジラを生み出したのは人間なのです。ちなみに東京を踏み荒らすゴジラが皇居前で回れ右をして退却するので「南洋の英霊たちの化身」だとも解釈されてきました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "60 年代半ばからの円谷プロの「ウルトラ」シリーズもそうです。『ウルトラＱ』にも『ウルトラマン』にも『ウルトラセブン』にも絶対悪としての怪獣は出てきません。人間社会が生み出した悪だったり、人間の傲慢さに対する自然からの復讐だったりするのです。 　ウルトラマンにせよウルトラセブンにせよ、人間社会の中の勧善懲悪ヒーローではなく、人類よりも進化した未来的存在です。彼らは、人間たちの不完全さに呆れかえりながらも、人間たちを助けます。こうした「〈未来〉の時代」のサブカルチャーには、「現在の秩序はダメだが、遠い未来になれば良くなる」との想いが込められていることが分かります。でも「〈未来〉の時代」も 70 年代の半ばには終わり、「〈自己〉の時代」が始まります。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "立場を問わず、あらゆる文化現象や政治現象が自己現象として受け取られてしまうという現実があるのです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "見 田 宗 介 図式（↓ 参照） の修正版」を使う必要があります。見田宗介によれば、戦後のサブカルチャーは、「理想の時代」（敗戦から１９６０年）から「夢の時代」（ 60 年から 75 年）を経て「虚構の時代」（ 75 年以降）に至ります。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "私はその理由のひとつには、日本が、「ヘタウマ」という文化を持つ 稀有 な国であることが関係しているように考えています。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "たとえばアメリカではディーヴァ（歌姫）と呼ばれる圧倒的に歌唱力のある歌手が人気ですし、韓国ではお金も時間もかけて、技術的に完成されたアイドルグループをデビューさせるのが一般的です。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "そういう感覚が政治家やなんかから欠落してしまったのは、日本の文化が駄目になっているってことだ。文化的なことがじゃんじゃんなくなっているから、ちょっとでも変なことを言ったら、ハチの巣をつついたみたいな騒ぎになる。マスコミも政治家も、ワーワー文句を言うしか能がないような教養のない人ばかりが目立つ。「絶対に許せない！」と目に涙を浮かべて怒ってるようなタイプの人が、政治的なリーダーになれるわけないのに。国を良くしようとかいうこととは何も関係ないところで大騒ぎしている。それを誰も感覚として恥ずかしいと思わない。政治というよりも、結局は文化の問題なわけだ。", "book_title": "超思考", "author": "北野武"}, {"text": "だけど今はそういう文化そのものがなくなり、「言わないこと」と「考えないこと」が同義になってしまった。 　かくして、面倒なことはすべて思考停止の状態にしてしまう。 　核の問題も、本質はそういうことだ。 　核廃絶を訴えながら、一方ではアメリカの核の傘で守られているっていう矛盾がどうにもならなくて、思考停止にしてしまった。どういう意見を持っているかではなくて、とにかく反対という以外は何も言っちゃいけない。何も言わなければ、ないことと一緒なんだからっていう滅茶苦茶な論理だ。", "book_title": "超思考", "author": "北野武"}, {"text": "芸の世界に限らず、あらゆるモノが薄っぺらな偽物に置き換えられ、しかもありがたがられている。本物であればあるほど生き難いのが今の世なのだ。", "book_title": "超思考", "author": "北野武"}, {"text": "大量生産の大量消費が当たり前になって、電化製品ばかりではなく、なんでもかんでも使い捨てにするようになった。食い物から文化まで、今ではあらゆるものが薄っぺらな三流品だ。良貨は悪貨に駆逐され、本当にいいものがこの世からどんどん消えていく。そっちの方がよっぽど由々しい問題だ。", "book_title": "超思考", "author": "北野武"}]}, {"id": 44, "label": "説得術", "freq": 13, "highlights": [{"text": "こちらがいかに理路整然と説得しても相手は納得してくれません。 相手に納得させたいことは相手の口から言わせる。そのための一つの方法として、わざと間違えて、相手に正しい答えを言わせるというテクニックがあるのです。", "book_title": "コミュニケーションのための催眠誘導～「何となく」が行動を左右する～ (光文社知恵の森文庫)", "author": "石井 裕之"}, {"text": "人を説得する原則❶　 議論に勝つ唯一の方法として議論を避ける。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❷　 相手の意見に敬意を払い、誤りを指摘しない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❸　 自分の誤りを直ちに快く認める。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❹　 穏やかに話す。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❺　 相手が即座に〝イエス〟と答える問題を選ぶ。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❻　 相手にしゃべらせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❼　 相手に思いつかせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❽　 人の身になる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❾　 相手の考えや希望に対して同情を寄せる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❿　 人の美しい心情に呼びかける。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則⓫　 演出を考える。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則⓬　 対抗意識を刺激する。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}]}, {"id": 45, "label": "学習", "freq": 12, "highlights": [{"text": "数学でも、俯瞰するという意味で、現代数学がどういう地平にあるのかという理解は、いまの方が深まっています。ようするにそれは、若い頃と同じように勉強をしているからです。そのため、局所的に見れば計算能力などは確実に落ちていますが、いままでなら出なかったアイデアを思いついたり、それを具体化したりする可能性も以前より高くなっています。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "いちばん価値のある経験とは、特定の製品分野や技術について何を身につけたかではなく (そういうものは、たぶん、そのうち古くて使えなくなってしまう)、優れた製品を作り出したり、製品開発チームで陣頭指揮を執ったり、事業の成長展開を管理したりするプロセスについて何を学んできたかにある。また、自分自身を知り、次にどう向上させていくかについて何を学んできたか、なのである。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "本当のルネッサンスマンはトレンドやパターンを見つけては、それを統合できる人のこと。言ってみれば好奇心旺盛で、いろんなことに興味をもてる人のことだと思う。おもしろいと思ったら、自分の仕事と直接関係なくてもそれに〝無駄な時間〟を費やすのを厭わない人。でも無意識のうちに、いつかそれを自分の仕事のなかに活かすことができるんです」", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "● アイデアを実行しないことこそ最大の失敗であり、罰の対象になるということを周知徹底する。 ● 全員が過去の失敗から学ぶようにする。同じ失敗には何度も報奨を与えない。 ● 失敗の数が少ないときには疑う必要あり。その人間が十分なリスクを負っていないか、あるいは組織の他のメンバーが自分の失敗から学ぶのを嫌って、失敗を隠している可能性がある。 ● 過去に「知的な」失敗を犯した人を採用し、組織の他のメンバーにそれが採用の理由のひとつであることを知らせる。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "悪い結果が出ても動揺することはありません。データの予測が違っていても、データによる仮説を立ててから実行していたこと自体に意味があるからです。 　仮説にもとづいて実行していたのであれば、 いい結果が出なかったとしても、どこに問題があったかが検証しやすくなります。 　 そのため、すぐにやり方を変えて修正ができるわけです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "一つは簡単だ。リーダーが自らの失敗や失敗に果たした役割について話すことができれば、社員は安心する。失敗から逃げたり、見て見ぬふりをしない。だから私はピクサーの中で起こっている危機的状況についてオープンにするようにしている。そうした経験は大事なことを教えてくれると思うからだ。問題についてオープンにすることが、そこから学ぶことの第一歩になる。私", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "私たちが何かをしようとするとき、その動機づけの鍵となるのは快感である。たとえば学習に際しては、快感が中心的な役割を果たす。そもそも人類が生存し、遺伝物質を次世代に伝えていくためには、食べ物、水、セックスが〈報酬〉的なものと感じられなければならない。", "book_title": "快感回路　なぜ気持ちいいのか　なぜやめられないのか (河出文庫)", "author": "デイヴィッド・Ｊ・リンデン、岩坂彰"}, {"text": "アメリカの言語学者エリヒュー・バリットも「私が成功したのは天賦の才ではない。日々のわずかな時間を有効に利用できたためだ」と述べている。彼は生活費を得るために鍛冶屋職人として働きながら、古今の十八の言語と二十二のヨーロッパ方言をマスターしたのである。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "言語学者エリヒュー・バリットは、「研究を効果的に進めるには重労働が欠かせない」と語っている。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "意思決定能力を養い、高めていってほしいのです。失敗から学ぶ限り、私たちは失敗を奨励します。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちが講演をする際はいつも、ザッポスのコア・バリューを用いています。講演をするという機会をザッポスの広報活動にあからさまに使うのではなく、聴衆が「成長と学びを追求する」よう手助けをするために、私たちがどのように物事に取り組んでいるかについてできるだけ分かち合おうとしています。さらに「コミュニケーションにより、オープンで誠実な人間関係を築く」ように努めようというコア・バリューに沿って、私たちは喜んで数字やそのほかの詳細情報をシェアしています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私には、サイエンス・オブ・ハピネスについてもっと学び、その知識を会社経営に生かすのが理にかなったことに思えました。そうすれば、顧客と社員をもっと幸せにする方法の科学的根拠をいくらか学ぶことができるのです。今日、私たちは社員にサイエンス・オブ・ハピネスのセッションさえ提供しているほどです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 46, "label": "グローバル化", "freq": 12, "highlights": [{"text": "リバタリアン急増の背景にあるのは、行き過ぎた（主には企業のための）グローバリゼーションと社会保障費の増大であり、社会保障費の負担は今後増えることはあっても減ることはないからだ。リバタリアンは、たとえ国家が破綻しても、リバタリアンであることを望む。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "単純なイデオロギーだけで、明快な解を得ることができなかった 　これまでの新古典派の経済政策は、基本的に小さな政府、規制緩和、自由放任主義を善しとする枠組みのなかで進められてきた。経済人として、それもさまざまな企業の生き死にの修羅場に関わってきた体験に照らして、実際、これはかなり正しい。 　しかしその一方で、社会全体としては格差問題が起こっていて、どの国もこの格差問題に苦しんでいる。格差をなくそうと所得再分配を強化しようとしても、グローバル化が進んでいるので、生産性の高いセクターほど空洞化が起こってしまう。 「懸命に努力し、イノベーションを起こし、生産性を高めるという動機づけを持つこと」 「そこから生まれた成果が、極端に一部に集中しないようにすること」 　この二つのテーマを、どのようにすれば両立させることができるか。これがグローバル化が進展した現代の経済政策の命題として残っていた。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "この時代、ローカル企業の多くがこうした下請けの中小メーカーだった。このようにグローバル経済圏とローカル経済圏が直結している時代であれば、トリクルダウンは起きる。 　しかし、グローバル化の進展で大手製造業の多くがローコスト大量生産モデルの生産拠点を海外に移転してしまった。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "人件費を削減するために、賃金の安い国や地域の人を雇うという戦略がある。 　業種によってはうまくいくこともあるが、頭脳労働のリモートワークについていえば、あまり関係のない話だと思ってもらったほうがいい。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "発展途上国において人々が企業の長期的なビジョンや方針といったものに目もくれず、得しそうなことに飛びついてしまったり、噓をついてしまうのは、そもそも政府や制度が不安定なので、長期的な社会システムを信じる土壌がないという理由があります。国によっては社会に通底する考え方として血縁、地縁しか信じず、あとは仮想敵というところもあります。 ここでは日本のビジネスにおける信頼関係や「当然わかってるよね」といったコミュニケーションは通じません。 言語化、明文化、ルール化、そして明示的なインセンティブが必要となります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "あなたの身の回りからできるだけ多様化すべき です。日本は諸外国に比較すれば均質性の高い社会を形成していますので、日本企業がグローバルに業務を行ないたいのであれば、 日本人同士だけで思考する自己満足の罠を避け、意識的に多様化すべき です。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "圧倒的な軍事力と通貨の力を背景にした米国によって主導された世界秩序は、中東でのイスラム国のような武装集団による混乱、先進国内でも頻発するテロ、ウクライナ危機にみられる国連安全保障理事会の機能不全、国際コンセンサス不在の中でのロシアの膨張、政府が積極的に市場介入を行なう国家資本主義をとる中国の経済的、軍事的台頭といった波の中で既存の秩序は崩壊の過程に入ったように見受けられます。 　軍事的な面のみならず経済的な面でも、例えば２０１４年に中国はアジアインフラ投資銀行（ＡＩＩＢ）の設立を進め、世界銀行やアジア開発銀行に対抗する構えを見せています。 　こうした状況を現政権のオバマ大統領は冷戦時のソビエト連邦の脅威よりは良いと述べていますが、政治学者であるイアン・ブレマー氏が唱えるように世界はＧゼロという多極化が進んでおり、政治、ビジネスにおいて米国がスタンダードをつくれない環境を認識すべきです。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "２０１４年に『 21 世紀の資本』が世界的なベストセラーとなったパリ経済学校教授のトマ・ピケティ氏も、グローバル化そのものは肯定しながらも、グローバル化による格差拡大を放置するリスクは人々がグローバル化を自分のためにならないと感じて極端な国家主義に向かうことだとしています。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "また、新自由主義は、性別、人種、国籍など属性の異なる各個人が、市場を通じて、世界中から自由に参加するシステムを目指すので、より平等で民主的な世界を目指す価値観でもあります。マイノリティの尊厳、権利、機会の尊重も１９９０年代以降、急速に浸透しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "新自由主義のもたらした国際化の最大の受益国が中国だとすれば、その逆流の痛みを受ける度合いも必然的に大きくなります。その反面、日本のように新自由主義の波に乗り遅れ、生産拠点を全て外に出さなければならなかった国にとっては、「リショアリング（海外に移した生産拠点の自国回帰）」や「フレンド・ショアリング（同盟国や友好国に限定したサプライチェーン構築）」は相対的にプラスの話です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "言語が違っても、「サプライズ」があると人はドキドキします。 人種が違っても、「ギャップ」があると人は感動します。 地域が違っても、「赤裸裸」なものに人はひきこまれます。 国が違っても、「リピート」があれば記憶に残ります。 文化が違っても、「クライマックス」に注目します。 つまり、地球上の誰に対してでも、心を揺さぶることができるのです。現に、この本では他国の大統領や小説家のコトバを例に使っています。いよいよ、地球上に本格的なグローバル化がはじまっています。当たり前すぎて、グローバルというコトバさえもなくなるときがくるかもしれません。海外にいる友達やビジネスパートナーと話をしたり、メールをするときにもこの技術を使えば、誰の心だって動かすことができるのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "「誰が誰のために何をするのか」。いまやこの問いは、近代民主主義の先進ぶりを誇ってきた国を含めて、全ての国、全ての人のものになった。エリートにどんな価値コミットメントがあるのか。彼らが言う公や公共が果たして何を指すのか。グローバル化による社会的流動性の上昇と、共同体の空洞化を背景に、これらが誰から見ても自明ではなくなったのだ。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 47, "label": "心理学", "freq": 12, "highlights": [{"text": "とりわけてネガティブな感情は、力強い内的トリガーとなり、私達の日々の日課に大きな影響を与える。退屈、孤独、失望、混乱や優柔不断などの感情は、時に軽い苦悩やもどかしさを駆り立てる。こういったネガティブな感情を鎮めるためには、人は突発的な行動や、やみくもな行動をとることがある。インの例に戻ると、彼女は、特別な一瞬が消え失せてしまうという不安を抱く際はいつもInstagram を使う。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "ある仮説によれば、抑うつ症状を抱えている人は、一般の人よりも頻繁にネガティブな感情に襲われるが、そのたびにインターネットを使い、不安を安心感に変えているという。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "退屈だと感じた時に、一般的に人は刺激や、目を惹くようなニュースの見出しといった変化を求める。それとは逆に、ストレスを多く抱え込んでしまった時は、Pinterest のようなサイトを見て安らぎを求める。そして、孤独感に苛まれる時には、Facebook やTwitter が人とのつながりをすぐに与えてくれる。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "ではなぜ私たちは、多様な構成のチームで働くことにためらいを感じるのだろうか。少なくとも理由の一部は、人間の本性に関わっている。人間には生来、同類同士で群れ、自分と違う人間を避けようとする傾向がある。心理学者はこうした傾向を「シミラー・アトラクション（似た者同士が惹かれ合う）効果」と呼んでいる。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "認知療法の基本的前提は、「人は出来事そのものに対して反応するというより、その出来事への自分の解釈に反応する」というものです。", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "人は、少ないものに価値を見いだす。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "リンカーンの書簡に「人間は誰しもお世辞を好む」と書いたのがある。優れた心理学者ウィリアム・ジェイムズは、「人間の持つ性情のうちで最も強いものは、他人に認められることを渇望する気持ちである」と言う。ここでジェイムズが、希望とか要望とか待望とかいう、なまぬるい言葉を使わず、あえて「渇望する」と言っていることに注意されたい。 　これこそ人間の心を絶えず揺さぶっている焼けつくような渇きである。他人のこのような心の渇きを正しく満たしてやれる人はきわめてまれだが、それができる人にしてはじめて他人の心を自己の手中に収めることができるのである。葬儀屋といえども、そういう人が死ねば心から悲しむだろう。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "偉大な心理学者ジグムント・フロイトは、偉大な聞き手であった。かつてフロイトと話す機会のあった人が、次のように説明している。 「フロイトのことは生涯忘れられない。彼には、私がこれまでに会った誰にもない資質が見受けられた。彼の目は穏やかで優しかった。精神分析の時の〝魂を見通す目〟などまったく感じさせない。声は低く、温かで、身ぶりはほとんどない。私の言葉に注意を集中し、下手な言いまわしにも耳を傾け、それなりの評価を与えてくれた。このような聞き方をしてもらえたことが、私にとってどんなに素晴らしい経験だったかご想像にまかせる」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "カスタマー・リテンション（＊ 10） という考え方です。新たに「獲得」した顧客をどう「維持」し、その顧客満足からどう利益を生んでいくかを考える。従って、メニューや価格などの商品政策は、ポートフォリオ（＊ 11） で考える必要があるということになります。「驚かせる」ことで新たな顧客を誘引する商品もあれば、マーケティングコストゼロで利益を生むキャッシュカウもある。この組み合わせの結果、メニュー全体でマージン（利益）を生み出す構造を目指します。 　どうやって消費者を驚かせてわくわくさせるかという「サイコロジー（心理学）」と、理詰めで考えて、その「驚き」を含めた顧客満足をマージンに変えていく「サイエンス（科学）」。経営には両方とも必要だと思います。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "です。この「０・２％を作るぞ」という力が、その後のベースラインを引き上げる「筋肉」になるんです。単月０・２％の向上が、来月以降はずっと利いてくる。だから僕は０・２％の実現をしつこく言います。 「売れた」と「売った」は違います。何としても「売る」。そのためにサイエンスとサイコロジーを駆使して、知恵を絞って新たな顧客価値を生み続ける。勝ち続けるための道はそれ以外ないと思っています。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "この分野について学ぶうちに知ったのが、研究の結果から導き出される結論のひとつが、人は長続きする幸福感をもたらしてくれるものを見抜くのがとても下手だということでした。たいていの人はその人生を、「〇〇を手に入れることができたら、幸せになる」あるいは「〇〇を達成できたら、幸せになる」と考えて過ごしています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ところが実際、手に入れたと思った幸せはかなり短期間のうちに色褪せていく、と研究は示しているのです。 たとえば、宝くじ当選者の幸福度のレベルを、当選直前と当選から一年後で比較した研究がいくつかあります。それらによると、ほとんどの場合当選者の幸福度はどういうレベルにせよ元に戻る、という結果が出ています。 私にとって、この現象について学ぶことは、非常に興味深いものでした。つまり、ほとんどの人にとって、お金儲けをすること、結婚すること、速く走ることなど、それが何であろうと、人生の目標をついに達成したところで長続きする幸福感をもたらしてくれないということです。それにもかかわらず、多くの人はその一生を、自分を幸せにしてくれると考えているものを追い求めることに費やしているのです。 あなたに自問していただきたいのは、あなたが追い求めたいと思っているものが、実際にあなたが手に入れられると思っている幸せを与えてくれるかどうかです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 48, "label": "現実主義", "freq": 12, "highlights": [{"text": "「ベースキャンプ」は世界を変えたりしない。ただ、企業やチームでのコミュニケーションや共同作業が簡単にできるようにするだけだ。これはとても価値があることだし、すばらしいビジネスが生まれる。とはいえ、世界の歴史を書きかえられるわけじゃない。けど、それでいい。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "「議論を尽くせば、みなが納得できる結論に至り、気持ちよく仕事をしていける」 猛獣園ではこんなキレイごとは成立しない。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "この二十年ほどの経済政策の論争は、新自由主義に行くか、社会民主主義に行くかというわかりやすい二項対立だった。それぞれ言い分はある。それぞれのロジックは一部有効で、一部有効ではなかった。どちらのイデオロギーに寄っても政策は行き詰まり、イデオロギーの議論によって明確な解は生まれなかった。その状況を見るにつけ、私はイデオロギーによる二項対立論に違和感を覚えるようになった。 「ひょっとしたら、現実の経済社会で起こっている姿をまったく無視した、抽象化されたベースで議論しているだけではないのか」 　やがてその思いが強くなり、経済社会的問題を考えるときは、よけいなフィルターを外して現実を見つめることが大事なのではないかと考えるようになった。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "グローバル経済圏のオリンピックの世界は、ますますレベルが上がり、ワールドスーパーメジャーリーグになっている。グローバル経済圏とローカル経済圏の距離感はますます大きくなっている。かつては国別のリーグしかなかったので、ローカル経済圏の住人でもある程度がんばればリーグに参加できる可能性もあった。ところが今は、ワールドスーパーメジャーリーグになっているので、参加する可能性すら見えない。 　突出した才能をぶつけて戦う世界に、ごく平均的な人を吸収していくことは現実的ではない。むしろ、ローカル経済圏において、県大会レベル程度の高い水準の生産活動を行うことができるようにすることだ。 　ローカル経済圏では、オリンピックチャンピオンを目指す必要はない。市大会、県大会でチャンピオンを目指すべきだ。平均的な人を世界大会に引きずり出すのではなく、県大会で優勝を狙えるレベルに引き上げることを考えたほうがはるかに現実的だ。 　そもそも、ローカル経済圏の産業は、グローバルの完全競争ではなく、地域ごとの非完全競争である。ローカルのバス会社は世界一でなければ生き残れないことはない。地域一番になりさえすれば、十分生き残っていける。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "ＧかＬかではなく、ＧもＬもいいではないか！ 　ローカル経済圏の話をするとき、どうしても 藻 谷 浩介氏の『里山資本主義』（角川ｏｎｅテーマ 21）にふれないわけにはいかない。藻谷氏が言っているように、マネー資本主義すなわちＧの世界の住人から、里山資本主義すなわちＬの世界の住人に移行するという話は現実のトレンドとしては間違ってはいない。現実には、地域のなかで循環させたほうが効率的な経済圏というものがある。まさにその背景には密度の経済性が横たわっているからだ。 　ただし、グローバルか里山かという二項対立の議論ではないことに要注意だ。 　グローバル経済圏のプレイヤーを排除する必要はなく、彼らには、むしろがんばって金メダルを獲得してもらうよう競争環境を整えてあげればいい。また、日本が人口減少社会だからといって、Ｇの世界のプレイヤーが衰退する必然性もまったくない。 　それにローカル経済圏においても、今後の人手不足経済においては、自動化やＩＴ化といったマネー資本主義的な意味での生産性の向上もやはり重要なテーマである。 　前にも述べたように、加工貿易立国時代と違い、今や「Ｇの世界」と「Ｌの世界」の経済的な関連性は良くも悪くも薄くなっている。だからこそ「ＧかＬか」の二項対立ではなく、「ＧもＬも」の共存共栄を目指しても、本質的な不都合は起きないはずなのだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "スヌーピーの名言でも「配られたカードで勝負するしかないのさ。それがどういう意味であれ」（You", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "川上 　そう、全部本当でやっていきたいんですよ。たしかに、世の中の役に立ちたいという気持ちはありますよ。でも、それが第一義になったら会社はつぶれるじゃないですか。会社としては生存することを第一にするしかないし、それを基準に考えるべきなんです。そうではない正義や使命感を軸にすることは、会社にとってはマイナスにしかなりません。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "しかし、ビジョナリー・カンパニーにとって、理念を守り、理念に従うことがいつも容易であったわけではない。ＧＥのジャック・ウェルチは、現実主義と理想主義、本人の言葉を借りれば「数字と価値観」の緊張関係を処理することの難しさをこう語っている。 　　数字と価値観。決定的な答えは、少なくともわたしにはわからない。数字をあげて、われわれの価値観を共有する者は昇進する。数字をあげられないが、われわれの価値観を共有する者には、もう一度チャンスが与えられる。価値観を共有せず、数字もあげられない者がどうなるかは、容易に想像…", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "しかし、ビジョナリー・カンパニーにとって、理念を守り、理念に従うことがいつも容易であったわけではない。ＧＥのジャック・ウェルチは、現実主義と理想主義、本人の言葉を借りれば「数字と価値観」の緊張関係を処理することの難しさをこう語っている。 　　数字と価値観。決定的な答えは、少なくともわたしにはわからない。数字をあげて、われわれの価値観を共有する者は昇進する。数字をあげられないが、われわれの価値観を共有する者には、もう一度チャンスが与えられる。価値観を共有せず、数字もあげられない者がどうなるかは、容易に想像...", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "ビジネスに対して「利益を上げる方法は将来見つける」なんて態度をとる人は話にならない。ロケットを建造するのに「とりあえず重力はないことにしましょう」と言って始めるようなものだ。利益にいたる方針のないものはビジネスとは言わない。それは趣味だ。 　だからスタートアップというアイディアに頼ってはいけない。そのかわり、本物のビジネスを始めよう。", "book_title": "小さなチーム、大きな仕事　働き方の新しいスタンダード (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、黒沢 健二、松永 肇一、美谷 広海、祐佳 ヤング"}, {"text": "しかし八〇〇万人くらいの人々が現にＩＳに統治されています。", "book_title": "新・地政学　「第三次世界大戦」を読み解く (中公新書ラクレ)", "author": "山内昌之、佐藤優"}, {"text": "とにかく兵家は明白に恥じも恐れもせず、「兵は詭道なり、兵は偽をもって立つ」と言い切っておる。", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 49, "label": "ネットワーク", "freq": 12, "highlights": [{"text": "ＦＣチェーンが成功するには二つの要素が不可欠だ。店舗などのパッケージを提案する「企画力」
