le": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}]}, {"id": 81, "label": "社会貢献", "freq": 10, "highlights": [{"text": "個人的な夢を持つことは大変すばらしいことですが、それ以上に意志を強くし、自己を確立させるのが「使命感」です。 社会のため、誰かのために自分はこれを成し遂げるのだという使命感は「最上級のプライド」であり、どんな試練にも耐えられる力に変わります。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "カネ儲けというのは、会社が存在していることの結果としては重要であるが、われわれはもっと深く考えて、われわれが存在している真の理由を見つけ出さなければならない。この点を追求していくと、人々が集まり、われわれが会社と呼ぶ組織として存在しているのは、人々が集まれば、個人ではできないことができるようになるからだ、つまり、社会に貢献できるようになるからだという結論に必ず行き着く。社会への貢献とは使い古された言葉だが、すべての基本である。……〔", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "時代の流れとして、今現在は、いわゆる「ソーシャルグッド」の要素を増やしていくのが一番応援されやすいだろう。 　ソーシャルグッド。平たく言うと、「世の中のためになる活動」である。何度も書いているように、企業にとって本業こそが社会貢献である。それは生活者の課題を解決し、社会の課題を解決し、雇用も生み出している。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "ＮＰＯや社会起業といった選択肢が、社会に貢献できる唯一の方法であるかのように、「世の中の役に立ちたい」と考えるナイーブな学生に思わせたのは、非営利セクターの作戦勝ちと言えるでしょう。 一方、営利セクターに属する企業は、他の民間企業との採用競争のみに注力し、事業を通して利益を上げ、税金を納めて社会に貢献することの意味や、革新的なサービスや商品の提供を通して世界を発展させるという営利セクターの意義を、就活学生に広めることに成功していません。 アップルやアマゾン、そしてトヨタやパナソニックのような営利企業の多くは、長きにわたって、人々の生活を驚くほど豊かにし、社会の役に立ってきました。本来、営利企業と非営利組織の違いは、「社会の役に立つか、立たないか」などという違いではありません。 それなのに、「社会のためになる仕事がしたい。だから公的機関かＮＰＯで働く！」などと非論理的なことを言う人が現れるのも、営利セクターに属する企業が採用市場における市場の入れ子構造を十分に踏まえたうえで、メッセージを発信できていないためなのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "だから、幸せに生きるためには自分とある程度同じ価値観や同じ世界を共有する友人や仲間を持つことが大事だ。 　人間は、自分のやっていることを他人に認めてもらえるとむなしさから遠ざかりやすい。仕事というのは他人のためとか社会のために何か貢献をすることだから、働いていれば周りの人に必要とされることが多くて、だから働くというのはむなしさから逃れる手段として昔から一番よく選ばれる効率的な手段だ。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "一つ目は、最新テクノロジーを活用することによる貧困の 撲滅。二つ目は、民間の力で進める飢餓と栄養失調の劇的改善。そして三つ目は、マイクロクレジットなどを通じた生活の向上である。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "会社のもつ技術を使って世の中に貢献し、その結果として利益も上がる。利益が上がるから、また貢献できる。このくりかえしこそが事業なのだ。そしてそれを実行するもっとも大切な主役は株主ではなく従業員であり、そして、その技術を喜んで使ってくださる地域の顧客なのである。この基本を忘れてはならない。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "私の考える新しい資本主義。それは「公益資本主義」である。 「会社の事業を通じて、公益に貢献すること」──つまり、「会社の事業を通じて、会社が関係する経営者、従業員、仕入れ先、顧客、株主、地域社会、環境、そして地球全体に貢献すること」こそが価値として認められる資本主義を実現したい、ということである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "年寄りは昔からずっと年寄りだったわけじゃない。何十年も働いて、税金を納めてきた人たちがいるから今の日本がある。電車に乗れるのだって、スマホでゲームができるのだって、つまり年寄りたちがこれまで働いてくれたおかげなのだ。 　そういう基本的なことを話さないのは、そもそも今の大人たちがそれを忘れてるってことかもしれない。なにしろ年寄りのせいで改革が進まないなんて、馬鹿なことをいう大人が山ほどいる世の中なのだ。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "大切なのは、一生懸命働いて節制に努め、人生の目的をまじめに追究していくことだ。それを周囲に身をもって示している人間は多い。彼らの地位や力はどんなに取るに足らないものだとしても、現代はもとより将来の社会の繁栄に大きく寄与している。 　というのも、彼らの生活や人生観は、意識するしないにかかわらず周りの人間の生活に浸透し、次の時代の理想的な人間像として広まっていくからだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 82, "label": "価格戦略", "freq": 10, "highlights": [{"text": "このことをフィリップ・コトラー（２０１７）は、「デジタル時代には標準価格設定から、ダイナミック・プライシング（動的価格設定）に進化する。企業は、過去の購入パターン、店舗までの距離など、顧客プロフィールのさまざまな要素にもとづいて、顧客ごとに異なる価格を請求し、収益性を最適化することができる」と指摘している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "この明らかな価格差は、非会員にとっては、冷遇されているかのように感じる。しかも、それを単なる「情報」ではなく、「体験」することになる。 　 この体験に直面した非会員の顧客はどう思うだろうか。ほぼ間違いなく、「これはプライム会員にならないと損だ」と思うはずだ。アマゾンは意図的にプライム会員と非会員の待遇が異なる場をオフラインに創り出し、差別化された価格を提案し、プライム会員であることの優越感・満足感を提供しているのだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "アマゾンブックスの経営における収益は、ほぼゼロと言われている。価格提案を通した顧客との対話のためだけに、アマゾンはこのチャネルを展開していると言ってもよい。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "価格提案は、諸刃の剣だ。アマゾンのように、幅広い商材をすべてアマゾンで買ってもらうことが狙いなら、一定の会費を課金して全員に対する価格提案を行うことも可能だろう。しかしそうではない場合、購入金額に応じたインセンティブ付与は、単なる値下げになってしまう。 　 重要なことは、自社が獲得したい顧客はどんな人々で、どんな行動を獲得したいのかを明確にし、そのためにどんな行動データを獲得するのか、である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "そもそも価格というものは、価値に対して設定するものです。２００１年にはＱＳＣが悪化して顧客に提供する価値の水準が落ちていました。そんな中で、ただやみくもに「世の中がデフレだから」と価格を下げても「安かろう悪かろう」を自ら認めるようなものです。うまくいくはずがない。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "２００４年以降、僕はまずＱＳＣを引き上げました。その結果、「おいしい」「サービスがいい」「きれい」と、顧客の価値認識が上がっています。そのうえで「１００円」を打ち出す。まず価値を固めて、その後に価格で訴求したわけです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "マーケティングでは、１％の値上げに対して、何％売上が減少するかという反応度を分析し、それを「 価格 弾力性」と呼んでいます。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "プライシングで大切なのは、 値段を最終的に決めているのは市場であり、消費者である という認識です。「値上げ」には大きなリスクが伴います。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "先にブランド価値を顕著に高めておいて、価格弾力性をできるだけ小さくしておく ことです。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "それは ＵＳＪが中長期で消費者に信頼されるブランドになるためです。言い換えれば「普通の人が、普通の時に、普通の値段で買えるブランド」であり続けるために、Pricing をできる限りコントロール下に置くことが大切だと考えているからです。そして、チケットに寄生して消費者から暴利を 貪る社会悪と戦うことは企業の責任だと考えています。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 83, "label": "覇権論", "freq": 10, "highlights": [{"text": "日本側の不満は、アメリカが常にゴールポストを動かすことでした。一つの協議で合意しても、アメリカは話を蒸し返して次々に要求を拡大するのです。しかしそれは、日本側が交渉の本質を見抜いていない証拠です。アメリカにとって協議で合意した数字や方法は物事の本質ではないのです。それはあくまで手段であって、狙いは日本経済を潰すことですから。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "彼に「圧倒的に世界第２位の日本経済を潰したら、世界経済はどうなるんだ」と尋ねたことがあります。 　彼の答えは意図的に 曖昧 でしたが、私なりに意訳すると、「しばらくはアジアのドラゴン（韓国や台湾などの新興国） で時間を稼いで、そのあとは中国がある」というものでした。 　そして実際にその通りになりました。結果としてアメリカにいいように遊ばれてしまったような気がします。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "１９９０年代にアメリカがとったアジア四小龍（韓国、台湾、香港、シンガポール） への支援、そして中国の台頭を促す政策は、日本の相対的地位を低下させる戦略と表裏一体にあり、１９９０年代後半には、「ジャパンパッシング」と呼ばれた現象が示すように、日本以外のアジア諸国の発展を促進するものとなりました。第二次世界大戦後に冷戦が始まったときに日本にアメリカが提供した環境は、今度は彼らに提供されることになったのです。 　かくしてアメリカは世界第２位の経済大国を没落させる一方、代替を探して世界経済を守ることに成功しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "②競合国のＧＤＰがアメリカの 50％近くに迫る。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "このとき私が強調したのは、覇権国家（アメリカ） とそれに下駄をはかせてもらって経済成長している国家（中国） の違いです。カジノのオーナーは好きにルール変更をすることができるので、圧倒的に優位であることは、日本の経験から明らかでした。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "アメリカは当然、中国に対する締めつけを厳しくしていきます。たとえば、２０１９年の中国の通信機器大手、ファーウェイ（華為技術） に対する事実上の輸出禁止措置です。トランプ政権がこの決定をしたとき、自由貿易の観点から「これはやりすぎだ」という反対の声も上がりましたが、今では誰も非難する人はいません。しかし、普通に考えたらこれはＷＴＯ違反です。確かに、ＷＴＯには「国家安全保障」に関わる免責条項がありますが、これをＷＴＯの裏書人であるアメリカが恣意的に乱用したら、ＷＴＯは機能停止してしまいます。 　これこそまさに、覇権国であるアメリカが、「カジノのオーナーとしてルールを好きなように変更する」、そのわかりやすい例です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "「市場が一番よく知っている」から「政治家が一番よく知っている」へ、「何が重要？　経済でしょう！」から「何が重要？　地政学でしょう！」へと人々の世界観が変わりつつありました。ワシントンを見ても、ホワイトハウスの経済チームの地盤沈下は明白...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "それまで漂流していたＮＡＴＯが勝ち組になったのと同じことが、日本にも起こり出しています。ソ連と激しく対立していた冷戦期のように、アメリカという「カジノのオーナー」...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "第一次トランプ政権時代にまとめられた対中基本政策「インド太平洋のための米国の戦略的枠組み」では、「日本がインド太平洋安全保障構造の中で『地域的に統合され、技術的に進んだ柱』になるよう助力する」と明記しています。つまり、先端技術の分野で日本がアジア太平洋地域のコアになることを助ける、という方針を明確に持っているのです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "私個人の価値観に照らすと、トランプはアメリカの持つダークサイドの多くを体現した指導者という側面を持ちます。しかし人であれ、国であれ、何がしかのダークサイドを抱えながら生きています。本当に自己変革をしようと思えば、それを直視することも必要です。自分を見つける、自分がどうなりたいかという思いに直面するようになった思春期の少年少女が苦しいのと同じです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}]}, {"id": 84, "label": "身体と意識", "freq": 10, "highlights": [{"text": "そのときに彼が言っていて興味深かったのが、「脳が変化してしまう」という話。 40 年間、毎日「直感力」だけを使いつづけた結果（自分と違って、すべて直感のみでデザインするらしい）、それ以外の思考能力がまったくなくなってしまったそうです。完全に脳がフォーマット化されてしまった、と。 彼いわく、脳の形状も物理的に変化するそうなんです。そこでピンときたのが、その数時間前までエルメス本社で行っていたデザインコンペの審査作業中に、同社のアーティスティック・ディレクターであるピエール・アレクシス・デュマさんがおっしゃっていたこと。 蜂の脳は容量が限られているため、兵士や偵察、運搬係など、その役割が変わるたびに脳自体の仕様も変化してしまうそうです。 もし２人の「脳が変化する」という話が本当だとしたら、 脳ってやっぱり筋肉と似ている気がします。\n\n脳の可塑性", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "人間に関しては、孤独感そのものの有無でアルツハイマー病の進行が占えることが明らかになっている（ 14）。さらに、私たちの最近の研究によると、孤独感は免疫系細胞のＤＮＡ転写に影響を及ぼす力さえ持つようだ（ 15）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "松果体は多くの伝統的な考え方では霊的な力があるとされてきた。デカルトはそれを「魂の宿る場所」と考え、ヨガの世界では「六番目のチャクラ」あるいは「第三の目」と言う。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "メイクタイムの3つめの要素として、この「運動や食事、睡眠、静寂、親密な時間などでバッテリーを 充電 する」 ことが入っているのは、そのためだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "人間の脳と体は、動いているときがいちばん効率よく機能する。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "30 代前半の僕は、睡眠時間がとても少ない生活をしていました。それは、寝るのがもったいない、と思っていたことが第一にあったんだと思います。そして、食事もジャンクフードやファミレス中心でした。それは、なにを食べようが関係ない、と思っていたからなんだと思います。ですので、言うまでもなく、夜が中心の生活でした。極端な僕は、２００１年の９１１以降、我に返って突然健康志向になります。夜はたっぷり寝て、食べ物も改善。そして、昼中心の生活になりました。これは、時代背景もあったんだと思います。また数年ほど前に、スペインに引っ越してから学んだことは、昼寝です。とにかく、皆昼から飲んで、昼寝します。たまに、東京に戻って日中の打ち合わせ後に、「このあと昼寝」などと言うと驚かれますが、今では、この昼寝の使い方が、僕の規則正しい生活にインストールされた良いアプリとなっています。", "book_title": "白本", "author": "高城剛"}, {"text": "僕が行っているのは、スリランカの首都コロンボから南に４、５時間ほど行った『バーベリンビーチ』です。アーユルヴェーダを効果的に体験するには、最低２週間必要だと思います。", "book_title": "白本", "author": "高城剛"}, {"text": "世界保健機構（ＷＴＯ）は、健康であることを、「身体的」「精神的」「社会的」そして「霊的」であるとしました。この最後の「霊的」が足されたのは、１９９９年のことでＷＴＯ会議満場一致で決まり、その後世界的に「霊的」健康に対して取り組みが行なわれました。", "book_title": "白本", "author": "高城剛"}, {"text": "足や手や口を動かす運動系の機能は、脳の表面中央付近に分布しています。その脳領域を十分に働かせるということは、そこに至る脳の血流を良くすることとイコールです。特に足を動かすための機能は、頭頂部に近いところにある脳領域が担っているので、よく歩いているうちに、血液が脳の高いところまで汲み上げられます。歩くというのは、足を中心とする全身運動ですから、脳全体に血液が巡りやすくなる。散歩をした後に脳が働きやすいのは、そういう理屈からも説明することができます。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}, {"text": "僕がオススメしているのは、頭の問題は身体で解決する、という方法です。ジョギングでもウォーキングでもなんでも構いません。決まった時間に決まった距離を走り、その距離を少しずつ伸ばしていきます。なにも考えずに黙々と走っても、音楽を聴きながら走っても、悶々と悩みながら走っても構いません。今日はもう走れない、と思ったところからあと１００メートルだけ走ります。信じられないかもしれませんが、ほとんどの場合、これを数ヶ月続けることで、ご自身で作った巨大な壁の「設定」を変えることができるのです。頭の中で作ってしまった問題は、身体に訊くのがなによりです。頭に訊いても混乱するだけです。身体は頭以上に、ご自身の未来を知っているものですよ。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 85, "label": "社会保障", "freq": 9, "highlights": [{"text": "リバタリアン急増の背景にあるのは、行き過ぎた（主には企業のための）グローバリゼーションと社会保障費の増大であり、社会保障費の負担は今後増えることはあっても減ることはないからだ。リバタリアンは、たとえ国家が破綻しても、リバタリアンであることを望む。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "なお、東京都であれば国が定める家賃を含めた最低生活費は一二万円程度である。これ以下だと憲法で保障された生活ができないとされている。年金は最低生活費以下のひとも少なくなく、年金をもらいながら路上生活の状態にあるひとも少なくない（", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "地域の中小企業とそこでの働き手の人たちのことをどう考えるか。それが難しい問題になる。あのころは、退職金を支払うことはできても再雇用先はなかなかなかった。その意味でローカル経済圏のサービス産業は、下手に労働生産性を上げず、低賃金でもいいから一人でも多くの人を雇う、ある種の社会的ワークシェアリングを行ったほうが、社会全体としては合理的なのかなと思うことも正直あった。しかし、当時と違い、労働需給の構造が大きく転換した現在、そういう発想の合理性がほとんど失われつつあることは既に述べた通りだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "もうこれ以上は国庫負担では賄いきれないので、地域や家庭に担ってもらう」という筋道です。いや、これはもうどうしようもないのだと思います。政策面でいくら頑張っても、またメディアがどう問題を切り直しても、もう「すでに起こった未来」を回避することはなかなか不可能だということの証左でもあります。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "ここで問題となるのが、「未富先老（豊かになる前に老いる）」と言われる途上国型経済を脱し切っていない点です。高齢社会に移行した段階として比較すると、日本の一人当たりの名目ＧＤＰは４万ドルを超えていましたが、中国では１万ドル台半ばです。そして公的社会保障制度の整備状況が不十分なままなので、米国との競争が長期化すればするほど、中国は高齢者対策にお金を回す必要があることを意味します。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "それは「それまで家族が果たしていた役割を家族以外が分担する」という仕組みなわけだけど、「介護保険なんかを導入すると日本の家族はお互い支え合う心を持たなくなって崩壊する」という批判も当時はあったらしい。だけど二〇〇〇年に介護保険制度が施行されたことによって家族が崩壊したかというとそんなことはなくて、むしろ「それが家族の崩壊を救った」と上野さんは言っている。そうした制度がなければあまりにも家族の負担が大きすぎて家族というシステムは崩壊してしまっただろう、という意味だ。僕", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "僕なりの考察では、人は低所得に加えて「三つの無縁」「三つの障害」から貧困に陥ると考えている。 　三つの無縁とは、「家族の無縁・地域の無縁・制度の無縁」だ。家族の無縁とは、困ったときに支援してくれる家族・親族がいないこと。親も貧困であれば頼る術はそもそもないし、貧困家庭に育つことは教育というその後の所得を保証する（最近は保証しないが）自己資産を得られないことにも繋がる。地域の無縁とは友達の無縁にも置き換えられるが、苦しいときに相談したり助力を求められる友人がいないこと。制度の無縁とは、そもそも生活保護の捕捉率が非常に低いことに代表されるように、社会保障制度の不整備・認知度の低さ・実用性の低さのこと。貧困とはひとつの条件で陥るものではないから、これらがオーバーラップして人は貧困に陥るのだと考えている。 　一方で三つの障害については「精神障害・発達障害・知的障害」と考える。これを挙げることは差別論にも繋がりかねないので慎重を要するが、これらの障害は「三つの無縁」の原因ともなっている、無視できない問題だ。", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "だから刑期を終えて出獄しても、またすぐに万引きしたり無銭飲食をしたりして、刑務所へ戻ろうとする高齢者の懲役囚が少なくないのだそうだ。", "book_title": "超思考", "author": "北野武"}, {"text": "ごく普通の老人が、生き延びるためにわざわざ罪を犯して、刑務所に入るという時代もおそらくそう遠くない。", "book_title": "超思考", "author": "北野武"}]}, {"id": 86, "label": "責任", "freq": 9, "highlights": [{"text": "担当者の肩書きや社内の組織体系がどうあれ、あらゆる優れた製品の陰には、責任を持ってその製品のプロフィールを決めた 1人の人間がいる、と私は断言する。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "でも、プロダクトマネージャーの方も、製品開発というのは、自分が思いついた最新のアイデアや最高のアイデアを試す場ではないことを忘れてはならない。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "いまや、僕らも議論のなかでこの表現を使っている。「反対だけど、コミットする」 は、僕らの会社で、特定の製品や戦略の決定について熱い議論を戦わせたあとによく聞かれる言葉になった。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "では何をマネジャーは求めるべきでしょうか。 　それは、「役割を果たしているかどうか」 です。 　そもそも仕事というのは、各人の役割をメンバー全員が果たしてくれれば、それでいいのです。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "ビジョンはそもそも、いっさい責任を取るつもりもなく、実現可能性にも触れられていない〝純然たる欲求〟でなければいけません。なぜなら、それは遊び人から聞こえてくる素直な声でなければいけないからです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "だからこそ、あなたが「世界を変えよう」としていることと等しい量の変化を、コンセプトは「あなた自身」にも要求してくるのではないでしょうか。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "このようにリーダー的な役割ができるファンは、リーダーっぽく威張っている人よりも、物腰が柔らかくて社交性が高い人が多いのが特徴です。 　ＴＯは推しの顔でもあるので、ＴＯが他の人に嫌われてしまうと、ＴＯが推している地下アイドルの印象まで悪くなってしまいます。そのため、周囲の人が認められるような人でなければＴＯにはなれないのです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "シンガポールの「２ちゃんねる」のダミー会社があっさり情報公開に応じたことから（２０１３年４月現在、日本国警察への正式書類は、最後の１通がまだ届いていませんが時間の問題です。その後、起訴になるでしょう。）、", "book_title": "黒本", "author": "高城剛"}, {"text": "それでも「ツアー・オブ・デューティ」という比喩的な表現を使うのは、軍と民間企業のいずれのコミットメント期間にも共通する重要なコンセプトを伝えることができるからだ。それは「 ミッションを期限内に成し遂げることに専念し、そこに個人の信用をかけている」という考え方だ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 87, "label": "戦略", "freq": 9, "highlights": [{"text": "製品化によって具体的にどんな問題を解決するのか？ (バリュープロポジション) だれのためにこの問題を解決しようとしているのか？ (ターゲット市場) 市場の大きさは？ (市場規模) 製品化の成功をどうやって評価するのか？ (指標、収益戦略) 現在、他に競合する製品はあるか？ (競合の見通し) なぜ当社がこの製品化をやるのに最適なプレーヤーと言えるのか？ (差別化要因) なぜ今なのか？ (市場投入の時期) どうやって製品を市場に出すのか？ (市場投入戦略) 成功のために絶対に必要な要素は何か？ (ソリューションの要件) これらを前提とした上で、最終的な提案は何か？（やるかやらないか）", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "この質問リストの中では、実際の問題の解決方法 (ソリューション) には触れていないことに注意してほしい。これは意図的なものであり、とても大切なポイントだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "製品を生み出す組織がやるべきこととは、優れた市場機会を追求することと、優れた製品による解決方法 (ソリューション) を提供することに尽きる。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "● 職の多様化 ● 多様な構成のグループ ● 交差点ハンティング", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "ガディシュは自分自身を「ジェネラリストのエキスパート」と呼ぶ（あるいは「エキスパート・ジェネラリスト」とも──これは彼女が社内で流通させている言葉で、どんな業界についても革新的な戦略を考案することに長けた人間を指す）。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "二つの異なる分野が結びつくことによって、ユニークな概念の組み合わせが飛躍的に増加し、さながらアイデアの爆発といった状況が生まれるのだ。いいかえれば、もし生産的であることがイノベーションを起こす最良の戦略であるなら、交差点こそ、それにもっとも適した場所だということにある。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "彼が語った理屈はこうだ。『トイ・ストーリー』がヒットしたとする。それどころか大ヒットしたとする。そうなったとき、ディズニーのマイケル・アイズナーＣＥＯは恐るべき魔物をつくってしまったことに気づく。つまり、ディズニーに対抗し得るライバルだ（ ディズニーには契約上あと二作品の借りがあるだけで、その後は自由の身だ）。『トイ・ストーリー』が公開されるや否やアイズナーは契約の見直しを求め、パートナーとしてピクサーを手元に置こうとするだろう。ならばもっと有利な条件で交渉したい。具体的には、興行収入をディズニーときっちり折半したい。それは道義的な要求でもある。だが、このような条件を出すには、我々自身で制作予算の半分を用意できなければならない。その大金を手に入れるためには新規株式公開（ ＩＰＯ）しかない。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "日本は、短期的には観光産業にもっと重きを置くべきでしょう。それは、観光産業で必要なインフラやガストロノミー、歴史的要素すべてが揃っているからであり、あとは、戦略とセンスの問題だけだからです。", "book_title": "黒本", "author": "高城剛"}, {"text": "当時ペイパルの上級幹部だったリード・ホフマンだった。彼は幹部クラスから個々のエンジニアに至るまでスタッフ全員に、各自のネットワークを活用して、ビルポイントの戦略を探るよう命じた。一方、ビルポイント側の担当チームは、ペイパルの戦略を読み取るのにネットワーク情報収集力の活用を一切考えなかった。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 88, "label": "時間管理", "freq": 9, "highlights": [{"text": "会社は多くのものを守っているけれど、たいていは、いちばん価値があっていちばん大切なものを守れていない。それは 従業員の時間と集中力だ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "だから、僕らは大学のアイデアを借りた。つまり 開講時間（オフィス・アワー）をつくった。 ベースキャンプのそれぞれ分野の異なるエキスパートは、いまでは開講時間を掲げている。たとえば、ある人は毎週木曜の午後が開講時間だし、一日一時間開講している人もいる。各エキスパートが自分の都合に合わせて決めているのだ。 　でも、月曜日に疑問が生じて、訊きたい相手の開講時間が木曜だったら？　そのときは待つのだ。木曜までほかの仕事をするか木曜までに自分で答えを見つけるかだ。大学で教授と話をしたいなら講義の日まで待たねばならないのと同じだ。 　これは一見効率が悪そうにみえるかもしれない。お役所仕事みたいだとさえ思われるかもしれない。けれども、僕らはこれ以外の方法も試したことがある。開講時間はベースキャンプでは大人気のシステムだ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "僕らの経験上、毎日４時間はみんな同じ時間に働いたほうがいい。そうすればコミュニケーションもうまくいくし、チームの一体感がでてくるからだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "不思議なことに「いつでもいいですよ」「時間がかかってもいいからやってくださいね」といって仕事を任せたケースで、想定以上に時間がかかったことはほとんどない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "僕らのような人は、 スマホで時間を確認するだけのつもりが、いつのまにか無限の泉に引きずり込まれる ことが多い。とくに画面に通知が表示されていようものなら大問題だ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "僕の朝の日課（戦術14） の重要な柱だ。僕にとって朝はハイライトにうってつけの時間で、しかもパソコンで作業をすることが多い。だから毎晩、ツイッターとフェイスブックからはログアウトする（戦術18）。おかげで、起きてコーヒーを淹れたら、朝の巡回で気を散らされずに、すぐにハイライトを始められるというわけ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "タイムアロケーション（時間配分）こそが超一流のプロの基本だ」 とおっしゃっていた。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "時間は、学ぶべき価値のある知識を吸収し、すぐれた信念を養い、よい習慣をしっかり身につけるために使われるべきである。実りのない生活を続けて時間を浪費するなど断じて許されない。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "一般的にお客様が広告をクリックしてサイトに訪れると、 10 秒以内で離脱するお客様、つまり、 わずか 10 秒で立ち去っているお客様は約 90％ だと言われている。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 89, "label": "一貫性", "freq": 9, "highlights": [{"text": "でも、両方するという道はないのか？　小さなビジネスを行なう会社にひとつのモデルを売り、大企業に提供する製品用に専属で働く一グループをつくればいいのでは？　そう考える人もいるだろう。けれども、僕らはふたつの文化を持つ、頭がふたつある会社になりたいとは思わない。中小企業とも、大企業とも取引を行なうなら、かなり異なる種類の人びとと異なるアプローチでつきあうことになる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "すべて自然体。自分の言いたいことを言う。それに対して気にくわないという人には、「あなたはうちの株を買わないほうがいいんじゃないか」と申し上げる。「われわれはパブリックカンパニーだから、株主を選べない。でも、あなた方投資家は会社を選べるでしょう。さっきから私のことをさんざんに言うけれど、そんなに嫌いな社長の会社の株をなぜ買うんです？　会場を出たらすぐ売ってくださいよ」と、平気で言いますからね。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "経営者にとってのジレンマは、プロセスがその性質上、従業員が反復作業を一定の方法で行なうために確立されるということだ。一貫性を保つため、プロセスは基本的に変化しない。変更が必要なときには、厳しく管理された手順にしたがって変更する。つまり、 組織が価値を生みだすメカニズムそのものが、 本質的に、 変化をこばむのである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "決定的な点は、理念の内容ではなく、理念をいかに深く「信じて」いるか、そして、会社の一挙一動に、いかに一貫して理念が実践され、息づき、現れているかだ。ビジョナリー・カンパニーは、「何を価値観とするべきか」と問いを立てることはない。「われわれが 実際に、何よりも大切にしているものは何なのか」という問いを立てる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "第一に、社会心理学の研究によると、人々はある考え方を公言するようになると、 それまではそうした考えを持っていなくても、その考え方に従って行動する傾向が際立って強くなる。つまり、基本理念を公言すること自体で、その理念に従って一貫した行動をとる傾向が強まることになる。ビジョナリー・カンパニーは、比較対象企業に比べて、基本理念を公言する傾向がはるかに強い。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "ファンが一番喜ぶのは「支持している価値」のブレのない改善である", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "唯一の対抗策はすべての施策・接点・活動において、誠実であること だ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "広告原稿にあったキャッチコピーや写真がランディングページにあると、 お客様は安心してそのランディングページを読もうとする。 とにかく広告原稿を読んで 熱の高まったお客様を、見当違いのコンテンツで冷めさせない ことが重要である。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "コミットメント期間についての対話を実りあるものにするコツは、「体系化」「一貫性」、そして「透明性」だ。三つとも、コミットメント期間を支える要因そのものであることも、押さえておこう。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 90, "label": "経営判断", "freq": 9, "highlights": [{"text": "問題は、良し悪しの基準で形式的に切ってしまうタイミングが早すぎるということにある。趣味や私的生活のもろもろはもちろん、仕事にしても単純に良し悪しでは割り切れないものを多分に含んでいる。良し悪しの基準で人間の思考や行動を形式的に切り取ってしまえば、話があまりにも浅くなる。経営という仕事はその最たるものだろう。 　当たり前の話だが、好き嫌いだけでは経営できない。しかし、好き嫌いを抜きにして経営を語れないのもまた事実。好き嫌いに目を向けなければ、その経営者なり経営の本当の動因はつかめない。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "アイデアはあきらめたり、 変えたり、 発展させることはあるが（ＧＥは当初の直流方式を廃止し、交流方式に転換した）、 会社は絶対にあきらめない。会社の成功とは、あるアイデアの成功だと考える起業家や経営幹部が多いが、こう考えていると、そのアイデアが失敗した場合、会社まであきらめる可能性が高くなる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "しかし、ビジョナリー・カンパニーにとって、理念を守り、理念に従うことがいつも容易であったわけではない。ＧＥのジャック・ウェルチは、現実主義と理想主義、本人の言葉を借りれば「数字と価値観」の緊張関係を処理することの難しさをこう語っている。 　　数字と価値観。決定的な答えは、少なくともわたしにはわからない。数字をあげて、われわれの価値観を共有する者は昇進する。数字をあげられないが、われわれの価値観を共有する者には、もう一度チャンスが与えられる。価値観を共有せず、数字もあげられない者がどうなるかは、容易に想像…", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "しかし、ビジョナリー・カンパニーにとって、理念を守り、理念に従うことがいつも容易であったわけではない。ＧＥのジャック・ウェルチは、現実主義と理想主義、本人の言葉を借りれば「数字と価値観」の緊張関係を処理することの難しさをこう語っている。 　　数字と価値観。決定的な答えは、少なくともわたしにはわからない。数字をあげて、われわれの価値観を共有する者は昇進する。数字をあげられないが、われわれの価値観を共有する者には、もう一度チャンスが与えられる。価値観を共有せず、数字もあげられない者がどうなるかは、容易に想像...", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "やりたいこと、やらなくてはいけないことが先立つと、どうしても自社優先の硬直した目線になってしまう。「これは必要なはず」「買ってくれるはず」という思いばかりだと、机上の空論で大損するリスクがある。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "そもそも価格というものは、価値に対して設定するものです。２００１年にはＱＳＣが悪化して顧客に提供する価値の水準が落ちていました。そんな中で、ただやみくもに「世の中がデフレだから」と価格を下げても「安かろう悪かろう」を自ら認めるようなものです。うまくいくはずがない。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "でも、これは出血を止めるための急場しのぎの退店ではありません。僕が閉じることに決めた４３３店舗は、厨房のサイズが制約となって新たな厨房システムが導入できない小型店や、ＱＳＣの水準がどうしても上がらない繁華街の店など。全社の戦術展開についてこれない店です。 　目先の数字を落としてでも、将来の成長の足を引っ張るところは切っておく。元気なうちにです。つまり、「手術で元気になる」じゃなく「元気になったから手術を受けられる」というシーケンスなんです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "もちろん、外部環境や市場のトレンドを無視していいわけではない。しかし、より根本的な問題は全員がこのオポチュニティーを見ているということだ。繰り返しになるが、戦略は違いを生み出すこと。ほかの多くの人と同じものを見て、同じことを考えて、同じことをやっていたら戦略にならない。だから原田さんは簡単にはオポチュニティーに飛びつかない。常に自分のストーリーを優先させる。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "このような会社に投資をしていることを、時価会計や減損会計の会計基準に基づく公認会計士の目で判断したら、「投資はすでに破綻状態であり、これを投資勘定に置いておくのは株主に対する不誠実な行為だから、損失として落とすように」となるのは間違いない。いまや公認会計士に楯突いたことが漏れたら、日本の経営者はクビになりかねないから、ふつうの企業であれば、減損を迫られればそれを受けることも大いにありえよう。 　すると、その時点で、投資した金額ぶんの利益が吹っ飛んでしまうことになる。そのときに、もし本業で思うような利益が上がっていなかったら、それこそ一大事である。事情を知らない一般投資家が危険を感じて投資を引き揚げてしまう可能性も多分に出てくる。まさに時限爆弾になりかねないのだ。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}]}, {"id": 91, "label": "協働", "freq": 9, "highlights": [{"text": "どんなことでもそうだが、自分と同種の能力について秀でた人を尊敬することはできても、異なる能力に対しては適切に評価できないことがある。 例えば、火のエンジニアは、より激しく燃え盛る火のエンジニアに対しては惜しみない尊敬の念を抱きやすい。その反面、自分たちが作り上げたものの品質を支えてくれる山のエンジニアに対する関心は低いケースが多々ある。 私が、自分と異なるタイプのエンジニアの偉大さを感じるようになったのは、一緒に開発を進めていく中で何度も助けられたからだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "私はレシュナーに、各専門分野内部での科学的発見の将来についてどう思うか訊いてみた（＊ 12）。 「専門分野別の科学はもう死んだ」と彼は一蹴した。「そんなものは、もう存在しませんよ」。レシュナーによれば、そう断言できる根拠はどんどん増えているという。「主要な科学の進歩には、複数の分野が関わっている。著者が一人だけという論文は最近ではめったにないし、著者が複数の場合、それぞれが違う分野の研究者であることが多い」と彼は話す。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "つまり、交差的アイデアを生み出したいと思ったら、自分とは異質の人間と一緒に働けるような環境を探し求めるべきだということである。いいかえれば、あなたの創造性を阻害する確実な方法は、自分と同類の人間がいる環境を探すことなのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "ＩＤＥＯには、「いかなる個人よりも全員の方が賢い」という有名な格言がある。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "判断を焦らない」、「野蛮なアイデアは歓迎」、「話題から逸れない」などのルールがあるが、中でも私が最重要視しているのは、「他者のアイデアをもとに考える」というルールだ。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "個人の創造的貢献と、集団としての力とのせめぎ合いは、クリエイティブな環境にはつきものだが、私にとってはこれが初めての経験となった。個人ですばらしい仕事をする天才がいる対極には、いろいろな考えが集まるからこそ卓越する集団がある。私は思った。では、この二つの対極をどう両立すべきなのだろうか。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "「いっしょに勉強しよう」 と言い、居間で子どもが勉強している間、じぶんは好きな本を読むようにしたら、子どもが隣で黙々と勉強をするようになりました。人は本能的に、誰かといっしょに何かをやりたいのです。それは太古の時代から人間が生き延びてきた知恵です。誰かが狩りをするときは、協力していっしょに行い、木の実を集めるときも、外敵に襲われないよういっしょに行った。その記憶が私たちの奥底にあるのです。 ただ、これは 自分も動くことが前提 です。動くといっても、子どもといっしょに同じ机で真剣に何か好きなことをすればいいのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "地下アイドルは自分の誕生日にライブハウスなどで生誕祭イベントをひらく風習があるのですが、その際に有志のファンによってお祝いするための「生誕実行委員会」が結成されるのです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "みんなの価値観と目指す姿が明瞭になったら、次は、関係者全員の整合性を高めるために力を合わせていこう。トップダウン方式ではなくコラボレーション型の作業だ。これは会社側だけの仕事ではなく、社員側にとっても大事な仕事となる。社員、上司、会社の三者が協力してこの作業にあたることで長期的関係が築きやすくなる、前向きな作業だ。ジョン・ドナホーも次の点を強調する。「（社員のありたい姿を探り当てたら）次に、その目標と結びつく経験をイーベイで得るにはどうすればよいか、一緒に考えるのです」", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 92, "label": "相互作用", "freq": 9, "highlights": [{"text": "ひとがとりまく環境とうまく対話ができなくなったときに、ひとは病む。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "カウンセリングの世界では 相手に母親のことをしゃべらせたかったら、まずカウンセラーが自分の母親のことを話す というテクニックがあります。", "book_title": "コミュニケーションのための催眠誘導～「何となく」が行動を左右する～ (光文社知恵の森文庫)", "author": "石井 裕之"}, {"text": "だからこそ、あなたが「世界を変えよう」としていることと等しい量の変化を、コンセプトは「あなた自身」にも要求してくるのではないでしょうか。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "人との相互作用は、相対性理論やヒモ理論よりもはるかに複雑だが、それだからこそ面白くもあり重要でもある。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "一方はまったく面白味がなく、もう一方は心底感動的だった。その理由は、才能あるストーリーテラーは、観る人を夢中にさせる方法を知っているからだ。そして今回のストーリーラインの進化で十分すぎるほど明白になったことがある。それは、いいアイデアを二流のチームに与えたら台無しにされる。二流のアイデアを優秀なチームに与えたらそれを修正するか、捨ててもっといいものを思いついてくれる。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "現在おおかたの神経科学者が認める見解によると、何万年もの長きにわたって人類の大脳皮質の拡大と、その内部での相互接続の強化を促したのは、しだいに複雑化する社会的な手がかりを送受したり、読み取ったり、中継したりする必要性だったという。言い換えれば、現在の私たちを形作ったのはおもに、他人とかかわり合う必要性だったのだ（ 11）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "さらに最近になると、その数は再び下方修正され、二万から二万五〇〇〇の間となった（７）。私たちを人間たらしめている独特の複雑さは、遺伝子の数にはそれほど依存しておらず、またしても、遺伝子どうしがどのように相互作用し、また、その支配下にある感覚系・統合系・運動系を通して、私たちを取り巻く世界とどう作用し合うかによって決まるのだ。これは、相互に作用する社会的なつながりにこれほど依存し、新しい環境への適応にこれほど長けている生物には、じつにふさわしい仕組みに思える。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "だがじつは、精神 も 物質であり、肉体との相互作用が頭部にしか起きない精神活動はほとんどない（４）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "ファンの人数が少なければ、「物販」でも長く会話ができるので、地下アイドルはひとりひとりの名前と顔を覚えることができます。ファンにとっても、歌っている間に「レス」をもらえる確率が上がります。これが距離感が近いということです。 「レス」とはアイドルから客席のファンに手を振ったり、指を差したり、目を合わせたりするアクションのことで、「物販」とはライブ後に地下アイドルが自ら、グッズの販売や、サインや握手を行なうことです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}]}, {"id": 93, "label": "制度設計", "freq": 9, "highlights": [{"text": "一般的に、市場の規律には資本市場の規律、製品市場の規律、労働市場の規律という三種類がある。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "ブレイントラストとは、卓越した作品づくりに向けて、妥協を一切排除するための仕組みだ。スタッフが忌憚なく話し合いをするための要となる制度で、およそ数カ月ごとに集まり、制作中の作品を評価する。その仕組みはいたってシンプルだ。賢く熱意あふれるスタッフを一堂に集め、問題の発見と解決という課題を与え、率直に話し合うよう促す。正直になることが義務のように感じられる人は、率直さを求められると多少気が楽になる。率直な意見を述べるかどうかを選ぶことができ、実際に発言すると、本音である場合が多い。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "発展途上国において人々が企業の長期的なビジョンや方針といったものに目もくれず、得しそうなことに飛びついてしまったり、噓をついてしまうのは、そもそも政府や制度が不安定なので、長期的な社会システムを信じる土壌がないという理由があります。国によっては社会に通底する考え方として血縁、地縁しか信じず、あとは仮想敵というところもあります。 ここでは日本のビジネスにおける信頼関係や「当然わかってるよね」といったコミュニケーションは通じません。 言語化、明文化、ルール化、そして明示的なインセンティブが必要となります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "また、 19 世紀に哲学者であり経済学者であったジョン・スチュアート・ミルは著書『自由論』の中で、「他人に危害を加えない限り人々は自由に考え行動することが認められるべきである」と述べていますが、一方で多数派が少数派を抑圧すること、すなわち「多数者の専制」の危険性を説き、たとえある時代にある思想が正しいとしても、その思想自体の効力を維持する点検のために多様な思想が必要だと述べています。こうした現行システムの点検のために、多様性の維持は組織と制度設計において必要な概念だと思います。 　なお、ミルに対する思想的な批判としては、抑圧された社会的弱者はそもそも思想や政策を表現する機会が与えられていないというものです。これもまた、考えさせられる論点です。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "新しい仕組みによって屈辱を受けたと感じた多くの消防士たちが、それを悪用するか、けがをしていたり、体調が優れないときでさえ、人々に奉仕をするという過去の 倫理 を捨て去ったりした。（…）", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "そしてあれだけ日本を小ばかにしていたアメリカもまた、投資銀行を含んだノンバンク金融機関への公的資金枠組みがないことに気づかされます。ただ、リーマンショックから僅か１か月で緊急経済安定化法を成立させ、巨額の公的資金をぶち込んだことは見事でしたが。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "また、五年以上株式を保有する株主だけが取引できる市場をつくっていくべきであろう。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "少なくとも現状の居場所ケアは子供にとってあまり居心地の良いものではないようだし、これは「制度より私的なセーフティネットのほうが肌触りが良い」というセックスワーク周辺の事情とまったく同じだ。だが、学童保育が子供を委託され管理する場ではなく、子供自身のＱＯＬを上げることを目的とした居場所ケア、サービス性の高い場となれば、状況は随分と変わるはずではないだろうか。", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "付録—Ａ 「アライアンスの合意書」の見本 この「アライアンスの合意書」は、変革型コミットメント期間に用いることを念頭に書かれている。あなたの会社やチームが置かれた環境に合わせて、細かい方針や施策（たとえばネットワークづくりのための予算）は変えていい。また、アライアンス関係を結ぶ社員ごとに個別目標もカスタマイズしよう。ただし、社員間の公平性を期すために、全般的な方針と原則は変えないほうがいい。 私＝マネジャーを指す 私たち＝マネジャーとその部下の社員を指す 当社＝マネジャーとその部下の社員が所属する会社を指す 組織が大きい場合、会社のニーズに合わせて、まず、トップ経営層と人事部門の幹部がアライアンスの合意書の中身を調整して基本型をつくる。個々のマネジャーがそれぞれのチームに合わせてさらに調整できる余地を残しておこう。 宣言文の全文は次のサイトからダウンロードできる（英文）。 www.theallianceframework.com", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 94, "label": "長期視点", "freq": 9, "highlights": [{"text": "「我々がやりたいのはこの図の通りです。免許を取る、車を買う、車を使う、車を売る、そしてまた買うプロセスに戻る、これを我々は顧客中心の『カーライフサイクル』と呼んでいます。このカーライフサイクルのすべてをデータで明らかにし、それによって、より顧客中心のカーライフを提供することが我々の使命です。そのために、この図に登場する様々な企業に投資したり提携したりしています」", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "日本発の世界的ベンチャーが登場しないと嘆く前に、もうちょっと真剣に長い年月経営するとはどういうことかを考えていくべきなんじゃないかと思います。世界に冠たるトヨタ自動車だって、自動織機から苦労して業態転換を果たしましたし、任天堂もそこまで高くない給料でも社員のイノベーションや創意工夫の意欲を最大限に引き出してあれだけの作品を作り勝負を続けています。さて、浮き沈みの激しいＩＣＴ業界で、それこそ１００年続く組織がどれだけ出てくるものなのでしょうか。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "ビジョナリー・カンパニーは、自らに勝つことを第一に考えている。これらの企業が成功し、競争に勝っているのは、最終目標を達成しているからというより、「明日にはどうすれば、今日よりうまくやれるか」と厳しく問い続けた 結果、自然に成功が生まれてくるからだ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "一言でいえば、 企業として早い時期に成功することと、 ビジョナリー・カンパニーとして成功することは、 逆相関しているのだ。長距離レースで勝つのはカメであり、ウサギではない。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "私が言っているのは、社員の健康のことだけでなく、長い目で見た彼らの生産性や幸福のことだ。こうした投資は、後々きちんと利益になって返ってくる。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "〝何でこんなことやるんだ〟、〝何の売り上げにつながるんですか？〟と言われていたんですけど、〝いやいや、これは大事なんだ。ファンの支持がなかったら駄目なんだ〟と。 　結果的にそれが、ファンのロイヤリティ、愛着とか支持してくれる源泉みたいな思いが芽生えてくるし、いろいろな人に広めてくれることにつながっていく。（中略） 　 お客さんが喜んでくれさえすれば、後からしっかり売り上げがついてきて、経営が成り立つ。 　なかなか難しい選択なんですけども、私たちの場合には、幸いというか、どん底の時代があったので、そういう過程をたまたま踏んだので、今はそれを勇気をもってやれるということだと思います。（注・太字は筆者）", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "新入社員に売上なんか期待するな！　個々の能力が伸びるほうが重要だ」 と割り切っている。製品知識や接客など、個々の能力は見るが、売上は一切見ない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "もの言う株主であるアクティビストファンドは、上場会社に対して「現金や余剰資産を持ちすぎている経営は非効率だ。現金を配当にまわすか、自社株買いをしろ」と迫り、こうした経営の効率化はグローバルスタンダードであると主張しました。 　しかしながら、この主張には論理的に破綻している部分があり、一つ目は会社の持つ現金価値は市場の効率性を前提にすれば既に株価に反映されており（モジリアーニ・ミラー理論）、株主が現金を欲しいのであれば、ただ株式を市場で売却すれば良いことになります。モジリアーニ・ミラー理論は完全な市場においては、配当政策は企業価値と無関係であるというものです。二つ目は株主と会社の考える時間軸に乖離があるということです。会社自体が長期的な存続を前提として従業員や取引先といったステークホルダーとの関係を続けることによって価値を創出しているのであれば、長期的には必ずリーマンショックのような経済危機によって現金が調達できなくなることに備えるべきなので、短期的な効率性によって現金を吐き出せと主張するアクティビストファンドの主張に耳を傾ける必要はなくなります。事実、リーマンショックの際には多くの米国の企業が現金の調達ができないという市場の流動性の枯渇に直面しました。短期的な株式保有を行なう投資家は市場への流動性供給においては必要な存在ですが、その主張は論理的に分析する必要があります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "企業としては、とても怖くてそのような投資には踏み切れない。長期にわたってリスクを取りつつ研究開発を続けていくということがマイナス評価されかねない。 　まさにこのような考え方が、何年間も赤字が続くような未来の技術に対する投資を行ないづらくする傾向を助長しているのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}]}, {"id": 95, "label": "長期関係", "freq": 9, "highlights": [{"text": "寄り添い続け、顧客を知り続けるからこそ、その顧客に良い体験が提供できるという意味で同じ考えを共有する同志と捉えています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "カゴメは、 20 年かけて、企業理念に共感してくれた個人株主をじわじわ増やしてきた。そして今や、なんと総株主のうち 99・5％が個人株主であり「ファン株主」なのである（そのうち 3 分の 1 が主婦層だというのもすごい）。そう、ファンが株主として企業活動そのものに参加しているのである。とかく「ファンの顔が見えない」とお嘆きの企業が多いが、カゴメはファンに株主になってもらうことで、ファン個人個人とつきあえるベースを作ったのだ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "加盟店とは長期的なおつき合いになる。みなさん 72 歳の定年まで続け、子どもたちに引き継ぐ。いまや親子２代はあたりまえだ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "たとえば、リード・ホフマンはリンクトインの創業当初、才能ある社員にストレートにもちかけた。相手が二〜四年のコミットメント期間に参加し、リンクトインの事業に大きな貢献をしてくれたら、ホフマンおよび同社は、彼らのキャリアアップに力を貸そう——そのキャリアアップが、リンクトイン社内における次のコミットメント期間になることを望みつつ——という条件である。このやり方はうまくいった。会社側は、リンクトインのために目に見える成果を上げようとする熱心な社員を獲得できた。さらにその社員が、一回または複数回のコミットメント期間を経て同社を去った後も、リンクトインのよさをあちこちで喧伝したり、会社にプラス効果をもたらしたりし続けてくれるケースが少なくなかった。社員側も、自分のスキルと経験を高めることでキャリアをガラリと一変できた。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "みんなの価値観と目指す姿が明瞭になったら、次は、関係者全員の整合性を高めるために力を合わせていこう。トップダウン方式ではなくコラボレーション型の作業だ。これは会社側だけの仕事ではなく、社員側にとっても大事な仕事となる。社員、上司、会社の三者が協力してこの作業にあたることで長期的関係が築きやすくなる、前向きな作業だ。ジョン・ドナホーも次の点を強調する。「（社員のありたい姿を探り当てたら）次に、その目標と結びつく経験をイーベイで得るにはどうすればよいか、一緒に考えるのです」", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "このような課題を長期にわたり確実に解消する方法は、「選ばれた」元社員だけの「卒業生」グループを設立することだ。そうすれば、参加メンバーとそこから得られるメリットに関して、会社側がより細かくコントロールできる。たとえば、辞めた後も会社との関係を大切にしている元スター社員にきめこまやかなサービスを提供し、そのかわりに会社により深くかかわってもらうといった形でもいい。元スター社員たちは会社を離れた後でも面白いことにかかわり、人脈の中核でいる可能性が高い。会社の事業にも大きな価値をもたらしてくれるだろう。加えて「選ばれた」元社員であることに誇りやメリットを感じてもらえれば、会社にマイナスになるような言動を控えるようにもなる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "アライアンスの合意書 はじめに 私の部署にようこそ。 私は、私たちの関係を、双方に役立つような「アライアンス関係」だと考えています。 この「アライアンスの合意書」を使って、お互いに相手に期待することを具体的に、明確にしましょう。相手に、そしてお互いの関係に、安心して時間と労力を投資できるようにするのです。 あなたには、当社を変革するような貢献を期待しています。 私と当社はあなたの市場価値を高め、（願わくば当社内において）あなたのキャリアを変革するサポートをしなければなりません。 当社はあなたに終身雇用を約束しませんし、あなたも現役引退まで当社に留まるとは約束しません。そのうえで私たちは、この雇用関係が終わった後でも続くような、長期にわたるアライアンス関係を保つために努力します。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第４条「卒業生」ネットワーク ［原則］ 大半の人にとって終身雇用は過去のものとなっています。でも、価値ある関係は生涯続けるべきだと考えています。 もし当社を退職することになっても、あなたが当社と円満な関係であれば、当社と私は、あなたを当社の「卒業生」ネットワークに招待します。 あなたが「卒業生」になっても、当社とあなたの関係の原則は、現役時代のアライアンス関係の原則を変わらず維持します。その原則とは、相互信頼、相互投資、相互利益です。 当社の現役の社員として、ビジネス上の課題解決に役立てるために「卒業生」ネットワークを自由に活用してください。 〈期待水準〉 当社と私は、（あなたの退職後も）当社で何が起きているか最新情報をあなたに伝えることを約束します。コンサルティング・プロジェクトや求人情報など、あなたの仕事に結びつくかもしれない情報もお伝えします。 当社もしくは私が、あなたに力になってほしい、知恵を貸してほしいと相談した時、少なくとも私たちの…", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第４条「卒業生」ネットワーク ［原則］ 大半の人にとって終身雇用は過去のものとなっています。でも、価値ある関係は生涯続けるべきだと考えています。 もし当社を退職することになっても、あなたが当社と円満な関係であれば、当社と私は、あなたを当社の「卒業生」ネットワークに招待します。 あなたが「卒業生」になっても、当社とあなたの関係の原則は、現役時代のアライアンス関係の原則を変わらず維持します。その原則とは、相互信頼、相互投資、相互利益です。 当社の現役の社員として、ビジネス上の課題解決に役立てるために「卒業生」ネットワークを自由に活用してください。 〈期待水準〉 当社と私は、（あなたの退職後も）当社で何が起きているか最新情報をあなたに伝えることを約束します。コンサルティング・プロジェクトや求人情報など、あなたの仕事に結びつくかもしれない情報もお伝えします。 当社もしくは私が、あなたに力になってほしい、知恵を貸してほしいと相談した時、少なくとも私たちの...", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 96, "label": "データ分析", "freq": 9, "highlights": [{"text": "同時に「人の発言を信用してはならない」ということを意味しています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "要するに、イェルプの評価が星三つから四つに高まると、売り上げが五～九パーセント増えるということだ。", "book_title": "アンバサダー・マーケティング", "author": "ロブ フュジェッタ、土方 奈美、徳力 基彦（解説）、藤崎 実"}, {"text": "フェイスブックジャパンでは、テレビＣＭはいっさい使いませんでした。 　テレビＣＭを打てば新規ユーザーは間違いなく獲得できます。しかし、そこで入った新規ユーザーがすぐに利用をやめてしまったり、退会してしまえば意味はありません。 　フェイスブックでは「登録した瞬間に〇名以上の友達とつながるかどうか」が使用を続けるかやめてしまうかの分岐点になる という数値が分析結果から出されていました。「重要業績評価指数＝Key Performance Indicator（ＫＰＩ）」のひとつに設定されていることです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "現在、ＫＤＤＩで新たなプロジェクトをスタートさせている私はＱｒａｎｋ（クランク）というユーザー投稿型のランキングアプリのサービスにも関わっています。そこでは、最初の段階でチームメンバーに対して「数字以外は信じない」と断言 したほどです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "現場のことは現場で根拠になる数字を出して少人数で判断するからさっさと意志決定しようというのが、データサイエンスの目指す民主的で本来の美しい姿だと思います。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "この分析を始めたときに、オーストラリア人が観光に一番お金を使っているという国連のデータを見て、少し意外な気がしました。ただ、分析をすすめていくと、ほどなくその理由がわかりました。図表 5‐7 を見ればすぐわかるように、オーストラリアは観光支出額ランキングトップ 10 の国のなかで、 1 人あたり名目 GDP が一番高いのです。 　それと同時に、オーストラリアのロケーションも関係しています。オーストラリアから国外へ観光したいと考えたとき、ニュージーランド以外はどこに行くにも遠いのです。これがポイントで、さまざまな調査で、訪れる国が遠くなればなるほど、長く滞在する傾向が確認されています。当たり前でしょうが、やはり航空券が高くなるし、飛ぶ時間が長いから、長く滞在したくなるものなのです。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "そのとき悟った。コンピュータは結局、私自身が仕掛けた「原因」ではなく、 10 倍売れたという「結果」にしか反応できない。", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "ここで、ひとつのデータ分析の特徴を紹介しておくと、「データ分析は本質的にやってみるまで何が出てくるかわからない」。何がわかるのかがわかっているならば、わざわざ分析を行うまでもないため、これはごく当たり前のことながら、企業での活用を考えた場合に非常に悩ましい事態を引き起こす。つまり、データ分析によってどれだけの（売り上げ向上やコストの削減といった）効果があるのかが不明であるため、投資の採算性が判断できず、データ分析への投資の決断が非常に難しくなるのだ。 　さらに、やってみるまでわからないという性質は、どのデータが重要で蓄積しておくべきものなのかを事前に判断することができないことも意味する。この「分析の役に立つかもしれないから残しておこう」という考え方でデータをなんでも収集したり蓄積したりすると、当然その量は膨大になり、蓄積・分析環境への投資額が増えてしまう。 　結果、意思決定者からすると、ROIが不明にもかかわらず、絶対額は大きいというリスクの高い投資になるのである。", "book_title": "顧客を知るためのデータマネジメントプラットフォーム　DMP入門 (NextPublishing)", "author": "横山 隆治、菅原 健一、草野 隆史"}, {"text": "「この 10 年間で１度でもネット広告をクリックして、その場で物を買った人はいますか？」 今までこの質問をセミナーで何度もしたことがあるが、 90％以上の方が「１度もない」と答える。我々マーケターでもないのだから、一般的なお客様はもっとないのだ。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 97, "label": "視野拡大", "freq": 9, "highlights": [{"text": "視野を拡げれば拡げるほど、この世界が平和や平等からはほど遠くて、理想を叶えるための道のりがあまりに長すぎて、現在も未来も絶望に満ちているような気持ちになってしまう。様々な世界を知るほど、何をしても誰かにとっては本質的な行為ではないこと、誰にとっても正しいことなんてこの世に存在しないことも同時に知ってしまって、身動きが取れなくなってしまう。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "その事実を受け入れず、可能な限り本質的でありたいあまり、そして誰からも攻撃されたくないあまり、さらに視野を拡げるべく視点をどんどん後ろへ引いていくと、いつの間にか誰の姿も見えないくらいに自分だけが全てから遠ざかっている。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "そうなるともう、何の行動にも出られなくなる。全ての角度からの審判を 俯瞰 できるまで視野を拡げることは、誰とも何とも連帯できないほどこの世界から遠く離れることと同義だからだ。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「そういうとき、資金や時間や思考力、つまり自分が余ってしまっていると、余白がある分、視野は拡がり迷いも膨らみます。その余白を使って自分を客観視できてしまうから、我に返ることができてしまうんです」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「そして、物語を提供する側は、誰よりも視野を広く持っていないといけません。特定の個人への思い入れは厳禁です。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "視野を拡げるというのは物事を多角的に捉えるということで、つまり自分自身のことも多角的に捉えるということで、そうなると、想定外の本物の感情に突き動かされたとき、思い切った行動に出たい自分を他ならぬ自分自身が認められなくなりませんか。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "視野を拡げよう、もっと拡げようと 喧伝 する仲間たちのすぐそばで、その意見に賛同しながらも具体的にはどうすればいいかわからなかったころの自分。それでも、所属しているコミュニティから外れることは想像できなくて、仲間がいるという安心感のほうを選び、なんとなくその周辺に存在し続けていた自分。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "古典は読む者の視野を広げ、時の試練に耐えた本質的な思想に立ち戻らせてくれる。 　私のお気に入りは、インスピレーションを与えてくれる思想書だ。禅や儒教、ユダヤ教やキリスト教、道教、イスラム教、モルモン教、ジェームズ・アレン、ガンジー、ヘンリー・デイヴィッド・ソロー、アウレリウス、ウパニシャッド哲学。何を選んでもいい。私たちとはまったく違う時代に書かれ、それでいて現代に通じるような思想を読んでほしい。そういう思想は、私たちの「当たり前」を打ち壊してくれるはずだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "どんな効果的なフィードバックグループもそうだが、そこで得られた視点を自分に抗うものではなく、プラスになると考えることがカギになる。競争意識があると、人のアイデアと自分のアイデアを比較するため、議論ではなく、勝ち負けを決める討論になってしまう。反対に、プラスのアプローチは、参加する一人ひとりが何らかの貢献をする（ たとえ議論をわかせるだけで最終的にボツになるアイデアでも）という理解からスタートする。ブレイントラストの価値は、たとえ瞬間的にでも人の目を通して作品を見ることができること、視野を広げてくれるところにある。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}]}, {"id": 98, "label": "顧客サービス", "freq": 9, "highlights": [{"text": "海外では、いまどきこれはありえません。説明がさしていらないインパクトのある文化財でも、その価値を最大限にアピールするために、説明の努力は惜しまないのです。 　たとえば、ヴェルサイユ宮殿の公式ホームページを見てみましょう。 11 カ国語のオーディオガイドがありますし、インタラクティブマップ、イベントカレンダーなど細かい情報が満載で、「見学の参考に」という Q＆ A も充実しています。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "本当に最高のカスタマー・サービスを提供するザッポスのブランドを築くためには、一部門ではなく、全社を挙げてカスタマー・サービスに取り組む必要がありました。自分たちがコール・センターを設けたいと思う場所に、サンフランシスコから本社をまるごと移転する必要があったのです。ちなみに、コール・センター部隊を、その頃、カスタマー・ロイヤルティ・チーム（ＣＬＴ） と呼ぶことにしました。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "配送料の増加は私たちにとって負担ですが、私たちはこのコストをマーケティング費用と考えています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ロイヤルティの高いリピート顧客には、翌日配達にアップグレードして驚かせています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちにはマニュアル原稿がありません。どんな顧客に対応する際も、ザッポスの社員は常に最善の判断をしてくれると信じているからです。私たちは 顧客と個人的な気持ちのつながり——社内ではＰＥＣ＝personal emotional connection と呼んでいます——を育くむことができるように、電話でのやり取りではいつもオペレーター各自が自分本来のパーソナリティを発揮してほしいと願っています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "電話経由での売上げは総売上げの五％程度にすぎないのに、ネット企業がそれほど電話を重視することを不思議がる人も多いことでしょう。実際、私たちが受ける電話のほとんどが売上げを生んでいません。しかし、平均的に見て、私たちの顧客は一生にどこかの時点で少なくとも一度は私たちに電話をかけてくることを知っているので、私たちはその機会を使っていつまでも記憶に残る思い出を生み出すように心がける必要があるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "あなたの会社にカスタマー・サービスを浸透させる一〇の方法 カスタマー・サービスを一部門だけではなく、会社全体の優先事項に位置づけます。カスタマー・サービスと向き合う姿勢は経営トップから示されねばなりません。 あなたの会社で日常的に使われる言葉のひとつに、「ワオ！」と驚かせる、を加えます。 あなたの会社のカスタマー・サービス担当者に権限を与え、信頼することです。社員は素晴らしいサービスを提供したいと願っていると信じましょう。なぜなら、彼らはそのようなことをしたいと心底望んでいるからです。スーパーバイザーまで問題を上げることは、極力避けるようにすべきです。 強欲な、あるいは社員をひどく扱う顧客はこちらから縁を切ってもいいのだとはっきりと認識します。 通話時間を計らず、社員にアップセルさせず、マニュアル原稿を使わないようにします。 フリーダイヤルを隠さないこと。あなたの顧客のみならず、社員に対しても、カスタマー・サービスを重視していることを伝えるメッセージになります。 どの電話も、カスタマー・サービス重視を標榜するブランド構築への投資だと考え、最小に抑えるべき経費と見なさないようにします。 全社を挙げて、素晴らしいサービスを讃えるようにします。全社員に「ワオ！」と驚く体験があった話を伝えるようにします。 カスタマー・サービスに対してかねてより情熱を持っている人を見つけ、雇います。 顧客、社員、取引先といったあらゆる人に素晴らしいサービスを提供します。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "あなたは期待をはるかに超えたことをしなければなりません。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "自社の商品とサービスで常に人を「ワオ！」と驚かせることに専念していれば、いずれメディアがそのことを聞きつけるということです。あなたの会社が素晴らしい商品や体験を人々に届けるようなことで面白いエピソードという副産物を自然に生み出しているのなら、メディアに働きかけることに多大な労力を使う必要はないのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 99, "label": "指導法", "freq": 9, "highlights": [{"text": "人を変える原則❷　 遠まわしに注意を与える。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❸　 まず自分の誤りを話したあと相手に注意する。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❹　 命令をせず、意見を求める。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❺　 顔を立てる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❻　 わずかなことでも惜しみなく心からほめる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❼　 期待をかける。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❽　 激励して、能力に自信を持たせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える必要が生じた場合、次の事項を考えてみるべきだ。 　一、誠実であれ。守れない約束はするな。自分の利益は忘れ、相手の利益だけを考えよ。 　二、相手に期待する協力は何か、明確に把握せよ。 　三、相手の身になれ。相手の真の望みは何か？ 　四、あなたに協力すれば相手にどんな利益があるか？ 　五、望みどおりの利益を相手に与えよ。 　六、人に物を頼む場合、その頼みが相手の利益にもなると気づくように話せ。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❾　 喜んで協力させる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}]}, {"id": 100, "label": "自己認識", "freq": 8, "highlights": [{"text": "ソクラテスの「無知の知」とはまさにそのことを言っているのです。智者というのは、「わかること」と「わからないこと」の境界、すなわち自分がいかに無知かを知っている人のことを言うのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "いちばん価値のある経験とは、特定の製品分野や技術について何を身につけたかではなく (そういうものは、たぶん、そのうち古くて使えなくなってしまう)、優れた製品を作り出したり、製品開発チームで陣頭指揮を執ったり、事業の成長展開を管理したりするプロセスについて何を学んできたかにある。また、自分自身を知り、次にどう向上させていくかについて何を学んできたか、なのである。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "人間は自分の人格の制作者であり、自分の環境と運命の設計者である」という真実に必ず行き着くことになるでしょう。 　人間にとって、自分自身に関するこの真実を身をもって知ることは、悟りであり、知恵とパワーの獲得にほかなりません。", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "そうだと思います。経営者というのは、主体的に経営する自分がいて、その自分を客観的に見る「もう１人の自分」がいないと、うまくいかないものです。ほとんどの経営者は、主体的な自分か客観的な自分のどちらかにバランスが崩れたときに失敗するのではないでしょうか。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "我々人間は、意図のよくわからない相手から、自分の現状や、「真の」素晴らしさ、改善のためにしなければならないことを指摘されても、よい働きはできない。卓越性を伸ばせる唯一の機会は、自分のことをよく知り気にかけてくれる相手から、その人が体験したことや感じたことを教えてもらった時──特に、我々の中で本当に有効な何かが発揮された瞬間を見つけて、教えてもらった時なのである。", "book_title": "フィードバックの誤謬 DIAMOND ハーバード・ビジネス・レビュー論文", "author": "マーカス・バッキンガム、アシュリー・グドール、DIAMONDハーバード・ビジネス・レビュー編集部"}, {"text": "だから、たとえ手に入る可能性が低くても、欲しいものを「欲しい！」と強く意識し、自分の欲望に真正面から向き合うことが、これからはとても大事になります。日本では学校でも家庭でも、「我慢すること」に価値があるかのように教えますが、我慢するよりも「自分は何が不満なのか 自分が求めている理想的な状態とは、どのような状態なのか 自分が欲しいものは何なのか」と考えるほうが、よほど建設的です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "しかし、その頃の日本はアメリカのそうした思惑や戦略をよく理解せず、右肩上がりの成長を自分たちの手腕によるものだと考える傾向が強かったと思います。日本のビジネスモデルを自画自賛し、日本は終身雇用だから社員が安心して会社に勤めることができるし、企業間の株式持ち合いも手伝い、企業経営者も目先の利益を追うのではなく、中長期的な利益を考えることができる、との議論です。それに対して、アメリカの資本主義経営者は投資家のほうを向いていて、クォータリー（四半期） ベースの目先の利益しか見ていない。だからアメリカ企業はダメなんだ、と言って胸を張っていました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "それに対して、ある場所である時に、自分のみが「ウン、これが私だ」と感じたことは、他との比較を超え、一般的尺度に還元しがたいものとしての独自性をもつと言える。前者のみならず後者のような観点からも「私」とは何か、と言えてこそ、「私」というものがわかってきたと言えるのではなかろうか。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}]}, {"id": 101, "label": "宗教", "freq": 8, "highlights": [{"text": "すでに 21 世紀初頭の音楽がダウンロードになって、ライブやフェスの価値があがったように、人として「生」の価値は高まるだろう。さらには、新しい死生観を伴った宗教や哲学も 流行ると思われる。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "自分は何者かという問いも、ＡＩの思考力が人間を超える２０４５年以降は不要になる。自分よりＡＩのほうが賢いのだから、一人で自己対話するより、コンピュータに相談したほうがずっと納得できる答えを得られるだろう。そこには、全人類の英知もシェアされているはずだ。もちろん、スポンサーつきで。そうなると人間の関心は、自分という存在から、自分を超えた存在へと移っていくだろう。人間は何のために存在しているのか。世界とは何なのか。この世に神はいるのだろうか。こうした問いこそが人間を惹きつける。 21 世紀後半は、宗教と哲学の時代になるのだ。もちろん、スポンサーつきで。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "カルトな宗教に入っている人に対して、外部の人は「なぜ脱会しないのか」とよく聞きますよね。でもその宗教の内部では「こう聞かれたらこう返せば論破できる」といった教育がすごくされてるんですよね。それを批判してるわけじゃないんですけど、正しい・正しくないにかかわらず、論理が集合すると、世の中のほとんどのことが説明できて、それが力を持つということの表れだなと思います。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "西洋では古代ギリシャや古代ローマのように、同性愛がむしろ賛美された時代さえあった。ところが、まずユダヤ教が、そしてユダヤ教から派生したキリスト教とイスラム教が同性愛を厳しく取り締まるようになった。そうして差別や偏見だけでなく、投獄や処刑までも行なわれるようになっていった。ただし貴族のような特権階級では大目に見られていたという。 　西洋以外では、いずれの地域でも元来同性愛というものに（男女いずれの同性愛についても）、差別も偏見もないに等しかった。 　それどころかアフリカや太平洋の島々では同性愛行動が男の通過儀礼の一つにさえなる場合があり、ネイティヴ・アメリカンの部族の中には異性の服装や髪型をする男装者、女装者が第三、第四の性に属するとみなされたりしていた。アフリカの一夫多妻の社会では、一人の男の妻たちの間で同性愛行動がごく普通に行なわれていた。", "book_title": "同性愛の謎　なぜクラスに一人いるのか (文春新書)", "author": "竹内 久美子"}, {"text": "感謝は仏教やストア哲学の基本であり、聖書で教えられ、日本の茶道でも大切にされ、もちろん感謝祭の基本（であり名前の由来） でもある。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "80 年代に新興宗教系に入信する人が急増するのですが、内訳を見ると風俗・水商売の女の子の割合が非常に高かったのです。僕の解釈は、性愛と宗教はともに包括的承認を与えるツールとして機能的に等価だから、というもの。だから性の期待外れが宗教への要求を生んだのだと思います。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "「霊性」＝スピリチュアリティに関して日本は、オウム真理教事件の苦い思い出があるのと、その後のテレビのバラエティ化が、「霊性」そのものを完全にダメにしてしまったと思います。また、日本で大きな力を持つ宗教団体も、そのようなものが一般化すると不都合でしょうし、モノを売る人たちも、そのようなものは邪魔だと思います。僕は、この「失った霊性」こそが、今日の日本や日本人をダメにしてしまったと思います。それは、根性論やナショナリズムとは全く違う大和魂の根幹をなすものだと僕は考えています。ですので、霊性が日本のビジネスシーンを手伝う機会は、これからだと思いますね。江戸（東京）は、霊性によって設計された大都市なのを、忘れてはなりませんよ。", "book_title": "黒本", "author": "高城剛"}, {"text": "かの山本七平は、日本の宗教すべて、たとえキリスト教だろうが、仏教だろうが、それらは、「日本教」の中のキリスト教や仏教で、他国のそれとは違うと論じました。日本における宗教は、すべて「日本教」と呼ばれるものの中に組み込まれているというのです。僕も概ね同意しますが、さらに日本最大の宗教は「消費活動」にあると思います。クリスマスも正月もバレンタインも、「消費活動」がメインにあると言っても過言ではありません。神様を讃え、家族と家で質素に過ごすようなことはありません。街中、メディア中、ジャラジャラ音をたてながら、消費活動を煽っていると思います。ですので、僕は海外で日本の宗教を話す際に、高度経済成長が生んだ日本の「消費教」の話を、必ずするようにしています。一方、政権与党同然な政治政党は、海外では「カルト」と呼ばれる人たちが多くいます。実に不思議な国だと思いますが、「消費教」が国教同然ですので、株価があがったり景気さえよければ、国民の多くは政治も実際の宗教も無関心である、と識者には見えていると思います。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 102, "label": "霊性", "freq": 8, "highlights": [{"text": "経済的不遇と急速なテクノロジーの進化に伴い、宗教と哲学の時代に入ると、神秘的なものや、自分の神秘性を高めてくれるものが流行する。兆しは、すでにあらわれている。日本有数のパワースポットである伊勢神宮の２０１３年の参拝客は、１４２０万人を突破した。これは記録が残る明治 28 年以降で過去最多の人数で、国民の 10 人に１人が参拝している計算になる。 　この傾向は海外も同じだ。アメリカではネイティブ・アメリカンの聖地であるセドナが人気で、オーストラリアではアボリジニの聖地であるウルル（エアーズロック）に観光客が押しかける。どちらもネイティブ・アメリカンやアボリジニが押しかけるわけではない。原住民文化と直接関係ない人たちが、霊的な癒しを求めて殺到しているのだ。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "霊的なものというと日本ではオカルト扱いされるが、世界の反応は違う。ＷＨＯ（世界保健機関）は１９９０年代の終わりに、健康の概念を４つの観点で再規定した。「心身」「精神」「社会性」、そして４つめに新たに付け加えられたのが「霊的健康」で、満場一致で決定した。日本は当時、オウム真理教問題があったためにこの話題はオミットされたが、世界は霊性についてきちんと認めはじめている。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "藤樹の内には、自分を絶対君主とする一大王国がありました。藤樹の外面のおだやかさは、内面的充足の自然の反映でした。藤樹は、天使にひとしい人物に称されるように「九分の霊とわずか一分の肉からなる」といってよいでありましょう。もっと進んだ「救済論」や「終末論」をあわせ持っている私どもが、この人物の半分でも幸福であるかというと、疑問であります。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "松果体は多くの伝統的な考え方では霊的な力があるとされてきた。デカルトはそれを「魂の宿る場所」と考え、ヨガの世界では「六番目のチャクラ」あるいは「第三の目」と言う。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "世界保健機構（ＷＴＯ）は、健康であることを、「身体的」「精神的」「社会的」そして「霊的」であるとしました。この最後の「霊的」が足されたのは、１９９９年のことでＷＴＯ会議満場一致で決まり、その後世界的に「霊的」健康に対して取り組みが行なわれました。", "book_title": "白本", "author": "高城剛"}, {"text": "観光産業が短期的に大事だと僕が思う理由のひとつに、「地域復権による中央集権の崩壊」へとつながるからというのがあります。観光産業の大きな立ち上がりで、権力や予算の分散へとつながり、ビジョンある伸びる地域と、ビジョンなき衰退する地域に分かれる事になると思います。現在、地域による切磋琢磨が中央集権の日本でもっとも欠如し、同時に地方を疲弊させているのです。中央がとっくに地方を支えられない事は明白です。また、観光産業によって国際交流が増えると、必然的に国際的な目指しが生まれ、「世界の中の日本」を考える人が増える事を意味します。そうすると、日本人の霊性の高さや勤勉さ、そしてそれらが生み出すテクノロジーを、再び日本人が考え直すと思うのです。", "book_title": "黒本", "author": "高城剛"}, {"text": "インドでは、Ｍ＆Ａの時に必ず星を見ます。さらに中国では、政治家は本当の自分の生年月日を公表しません。敵に星を読まれてしまうからです。特にアメリカでは、ヨーロッパからの流れを汲んでいますので、「霊性」を気にしない起業家はいません。モチロン、それを表立って口にする人もいませんが、実は大きな部分を占めていると思います。典型的な人物が、ビル・ゲイツです。ウインドウズのあたらしい発売日は、いつも占星術を参考にして決めている、と言われています。", "book_title": "黒本", "author": "高城剛"}, {"text": "「霊性」＝スピリチュアリティに関して日本は、オウム真理教事件の苦い思い出があるのと、その後のテレビのバラエティ化が、「霊性」そのものを完全にダメにしてしまったと思います。また、日本で大きな力を持つ宗教団体も、そのようなものが一般化すると不都合でしょうし、モノを売る人たちも、そのようなものは邪魔だと思います。僕は、この「失った霊性」こそが、今日の日本や日本人をダメにしてしまったと思います。それは、根性論やナショナリズムとは全く違う大和魂の根幹をなすものだと僕は考えています。ですので、霊性が日本のビジネスシーンを手伝う機会は、これからだと思いますね。江戸（東京）は、霊性によって設計された大都市なのを、忘れてはなりませんよ。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 103, "label": "メディア", "freq": 8, "highlights": [{"text": "20 世紀最大の発明は何かと問われれば、僕は「大衆」と答える。 　その大衆をつくりあげたのは、言うまでもなく新聞やテレビといったマスメディアだ。新聞やテレビの登場以前は、一人一人が入手する情報の量や質に大きな開きがあった。情報の量や質が違えば、それをもとに形成される意見も異なる。ところが新聞やテレビの登場によって、遠く離れた場所にいる人々も同じ情報に接することができるようになった。時には誘導されながら、こうした情報環境が「大衆」を生み、ただの地域新聞はマスメディアへと昇華した。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "21 世紀初頭でも、マスメディアでは「情報談合」が行われているので、文句を言う人も多いが、国家から放送免許を認可され、スポンサーに頼るテレビでは当たり前の話である。政府やスポンサーに気を使い、意向をくむのはビジネスとして当たり前だ。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "だがこの「セックスワークの最下層が最も可視化されていない」というジレンマについては、実は僕が最も時間と労力を費やしてきた「家出少女」「売春ワークの少女」への取材の中で、ウンザリするほど感じ続けてきたものだった。どれだけ取材しても、どれだけ彼女らの抱えた痛み、苦しさ、貧困や虐待といった過酷な成育歴を描いても、読者に「伝わった」という実感が薄い。", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "60 年代半ばからの円谷プロの「ウルトラ」シリーズもそうです。『ウルトラＱ』にも『ウルトラマン』にも『ウルトラセブン』にも絶対悪としての怪獣は出てきません。人間社会が生み出した悪だったり、人間の傲慢さに対する自然からの復讐だったりするのです。 　ウルトラマンにせよウルトラセブンにせよ、人間社会の中の勧善懲悪ヒーローではなく、人類よりも進化した未来的存在です。彼らは、人間たちの不完全さに呆れかえりながらも、人間たちを助けます。こうした「〈未来〉の時代」のサブカルチャーには、「現在の秩序はダメだが、遠い未来になれば良くなる」との想いが込められていることが分かります。でも「〈未来〉の時代」も 70 年代の半ばには終わり、「〈自己〉の時代」が始まります。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "少年向きの読み物においても、物語のパターンが変化しました。「〈秩序〉の時代」には、社会を脅かす秩序の敵と戦うというパターンが主流でしたが、「〈未来〉の時代」には、未来や宇宙から来た「我々を超えた存在（overlord）」が、我々を社会の不合理から救い出すというパターンが主流になりました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "コメンテーターが明らかに持っている才能は、説得力のある説を確信を持って語る能力であり、それだけで十分なのだ。", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}, {"text": "そういう感覚が政治家やなんかから欠落してしまったのは、日本の文化が駄目になっているってことだ。文化的なことがじゃんじゃんなくなっているから、ちょっとでも変なことを言ったら、ハチの巣をつついたみたいな騒ぎになる。マスコミも政治家も、ワーワー文句を言うしか能がないような教養のない人ばかりが目立つ。「絶対に許せない！」と目に涙を浮かべて怒ってるようなタイプの人が、政治的なリーダーになれるわけないのに。国を良くしようとかいうこととは何も関係ないところで大騒ぎしている。それを誰も感覚として恥ずかしいと思わない。政治というよりも、結局は文化の問題なわけだ。", "book_title": "超思考", "author": "北野武"}, {"text": "「霊性」＝スピリチュアリティに関して日本は、オウム真理教事件の苦い思い出があるのと、その後のテレビのバラエティ化が、「霊性」そのものを完全にダメにしてしまったと思います。また、日本で大きな力を持つ宗教団体も、そのようなものが一般化すると不都合でしょうし、モノを売る人たちも、そのようなものは邪魔だと思います。僕は、この「失った霊性」こそが、今日の日本や日本人をダメにしてしまったと思います。それは、根性論やナショナリズムとは全く違う大和魂の根幹をなすものだと僕は考えています。ですので、霊性が日本のビジネスシーンを手伝う機会は、これからだと思いますね。江戸（東京）は、霊性によって設計された大都市なのを、忘れてはなりませんよ。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 104, "label": "ビジネス", "freq": 8, "highlights": [{"text": "21 世紀初頭でも、マスメディアでは「情報談合」が行われているので、文句を言う人も多いが、国家から放送免許を認可され、スポンサーに頼るテレビでは当たり前の話である。政府やスポンサーに気を使い、意向をくむのはビジネスとして当たり前だ。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "そう考えてみればレンタルとは、顧客の〝所有〟という概念を拡大してあげるサービスなのだとわかる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "それに対する僕の答えは、ビジネスのオンタイムは〝お客様〟を視ている、オフっていうのは〝自分〟を視る。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "言い換えれば、いまは、特殊な経験や知識よりも、 顧客の要望に応じていかに適切に検索するか、その能力こそがビジネスにおいて重要になっているということです。だからこそ、たえず新しい検索ワードを手に入れる必要がある。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "スタートアップのピボットには、すばらしく成功したものもある。「トート」というモバイル・ショッピングサイトは、ピボットして「ピンタレスト」 になった。「オデオ」というポッドキャストのベンチャーは、ピボットして「ツイッター」 になった。「バーブン」というチェックインアプリがピボットして「インスタグラム」 になり、カメラ用のOSがピボットして「アンドロイド」 になった。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "日本にはこの「ＶＩＰサービス」がほとんどありません。もし、僕が京都で「ＶＩＰサービス」を提供するとしたら、桜の季節と秋の紅葉の時期しか働かないと思います。その時期だけがんばります。あとは、個人的に気の合った世界の顧客をまわってご馳走になりながら暮らすでしょう。", "book_title": "白本", "author": "高城剛"}, {"text": "どんなビジネスにも、それを効率よく運営するのに欠かせない原則が六つある。それは、①注意力、②勤勉さ、③正確さ、④手際のよさ、⑤時間厳守、そして⑥迅速さである。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "第一級のビジネスマンをめざすには、さらに、すばやい直観力と計画を断固やり抜く強い意志が必要だ。 　それとあわせて、世渡りをする上での如才なさも重要な資質である。この資質は、一つには生まれつきの才能にもよるが、観察や経験によってこれをみがき、伸ばしていくこともできる。如才ない人間は、正しい行動パターンを実にすばやく見つけ出せる。だから目標さえはっきり定まっていれば、引き受けた仕事をたちどころに成功へと導いていけるのだ。 　鋭い直観力、断固たる意志、如才なさ――", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 105, "label": "経済政策", "freq": 8, "highlights": [{"text": "モデル都市はアメリカのポートランドだ。ポートランドは電車が無料で、徒歩や自転車での移動もしやすい。暮らしやすいので優秀な人材が集まり、それに引き寄せられて企業もやってくる。ナイキの本社やインテルの世界最大の研究所も、ポートランドにある。 　コンパクトシティを目指す都市が反面教師にしているのは、デトロイトだ。デトロイトは際限なく開発を続け、労働者として貧困層が大量に流入した。それだけでスラム化の要因になるが、さらにデトロイトは自動車産業のために公共交通機関をつぶしてしまった。貧困層は車を買えないため、移動もできなくなる。移動が止まると産業が停滞して、スラム化がさらに進む。その結果、税収も落ち込んで破綻してしまった。 　日本の都市も事情は変わらない。ポートランドか、デトロイトか。日本の都市計画でも、その選択を迫られていることになるだろうし、たとえば東京も４分割され、「税収が多く治安の良い地域」と「そうではない地域」に、ハッキリと分かれる未来が待ち受けているのではないだろうか。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "単純なイデオロギーだけで、明快な解を得ることができなかった 　これまでの新古典派の経済政策は、基本的に小さな政府、規制緩和、自由放任主義を善しとする枠組みのなかで進められてきた。経済人として、それもさまざまな企業の生き死にの修羅場に関わってきた体験に照らして、実際、これはかなり正しい。 　しかしその一方で、社会全体としては格差問題が起こっていて、どの国もこの格差問題に苦しんでいる。格差をなくそうと所得再分配を強化しようとしても、グローバル化が進んでいるので、生産性の高いセクターほど空洞化が起こってしまう。 「懸命に努力し、イノベーションを起こし、生産性を高めるという動機づけを持つこと」 「そこから生まれた成果が、極端に一部に集中しないようにすること」 　この二つのテーマを、どのようにすれば両立させることができるか。これがグローバル化が進展した現代の経済政策の命題として残っていた。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "英国のサッチャー元首相が喝破した通り、「金持ちを貧乏にしても、貧乏人は金持ちにならない」のである。穏やかでも多少なりともトリクルダウンはあるし、一部の才能に恵まれた人や企業が、世界で活躍して外貨を稼いでくれるのをみんなで応援していればいい。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "ＧかＬかではなく、ＧもＬもいいではないか！ 　ローカル経済圏の話をするとき、どうしても 藻 谷 浩介氏の『里山資本主義』（角川ｏｎｅテーマ 21）にふれないわけにはいかない。藻谷氏が言っているように、マネー資本主義すなわちＧの世界の住人から、里山資本主義すなわちＬの世界の住人に移行するという話は現実のトレンドとしては間違ってはいない。現実には、地域のなかで循環させたほうが効率的な経済圏というものがある。まさにその背景には密度の経済性が横たわっているからだ。 　ただし、グローバルか里山かという二項対立の議論ではないことに要注意だ。 　グローバル経済圏のプレイヤーを排除する必要はなく、彼らには、むしろがんばって金メダルを獲得してもらうよう競争環境を整えてあげればいい。また、日本が人口減少社会だからといって、Ｇの世界のプレイヤーが衰退する必然性もまったくない。 　それにローカル経済圏においても、今後の人手不足経済においては、自動化やＩＴ化といったマネー資本主義的な意味での生産性の向上もやはり重要なテーマである。 　前にも述べたように、加工貿易立国時代と違い、今や「Ｇの世界」と「Ｌの世界」の経済的な関連性は良くも悪くも薄くなっている。だからこそ「ＧかＬか」の二項対立ではなく、「ＧもＬも」の共存共栄を目指しても、本質的な不都合は起きないはずなのだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "これは極論かもしれませんが、日本という国の戦後は、あまり大胆に制度を変えずに、管理と維持さえしっかりとやれば、物事が好転していく環境が整っていたのかもしれません。事実、リスクをとることもなく、何もしないでじっとしているほうが「得策」とよく言われたものです。それが徐々に通用しなくなってきたのは、バブル崩壊、そして銀行の膨大な不良債権が明らかになった頃からでしょう。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "しかし新自由主義の世界観が信認を失い、「市場ではなく、政治が一番わかっている」という時代が到来すると、サプライチェーンの再構築は企業経営者にとって喫緊の課題になりました。この動きは元々、新型コロナウイルスの流行が引き起こしたサプライチェーンの混乱に端を発したものですが、今では露骨な政府介入が続き、「広い庭に高い壁」の傾向は加速することはあっても、元に戻ることはないと思います。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "新自由主義のもたらした国際化の最大の受益国が中国だとすれば、その逆流の痛みを受ける度合いも必然的に大きくなります。その反面、日本のように新自由主義の波に乗り遅れ、生産拠点を全て外に出さなければならなかった国にとっては、「リショアリング（海外に移した生産拠点の自国回帰）」や「フレンド・ショアリング（同盟国や友好国に限定したサプライチェーン構築）」は相対的にプラスの話です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "アメリカ、ＥＵ、カナダによる最近の高関税に見られるように、この戦略は他国の対抗措置の引き金になることは不可避でしょう。その意味において、中国は自らの首を締め、グローバリズムを退潮させ、ブロック経済の台頭を加速させているとも言えます。ただ生産のための生産をしていないと、経済が回らない状態なのです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}]}, {"id": 106, "label": "進化論", "freq": 8, "highlights": [{"text": "ダーウィンの進化論はとっくに否定され、ＤＮＡの最新解析によれば、すべての人類の起源はアフリカ（アフリカ単一起源説）ではない、と言われている。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "ビジョナリー・カンパニーのような成功を収めようとするなら、チャールズ・ダーウィンの『種の起源』の概念の方が、企業の戦略策定に関するどんな教科書よりも、役に立つ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "もともとは捕食関係にある生物同士が競い合って進化し合う循環を、生物進化学で「レッドクイーン効果」 と呼びます。それを経営に置き換えると、「企業はライバルとの競争が激しいほど、自身を進化させることを怠らないので、結果として生き延びやすくなる」というのが基本でした。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "なぜ人種ごとにペニスサイズが違うように進化が起きたのかについては、ここでは詳しく説明する余地がない。拙著『女は男の指を見る』（新潮新書）、『あなたの知らない精子競争──ＢＣな世界へようこそ』（文春文庫）などを参照していただきたい。", "book_title": "同性愛の謎　なぜクラスに一人いるのか (文春新書)", "author": "竹内 久美子"}, {"text": "アメリカのＥ・Ｏ・ウィルソンは大著、『社会生物学』（原著は一九七五年刊。邦訳あり）の中で、同性愛者は血縁者の繁殖の「手助け」をすることで、彼らが血縁の近さに応じた確率で持つ同性愛に関わる遺伝子（それは一つとは限らない。複数の可能性が高い）のコピーを間接的によく残しているのではないかと言っている。 　この考えは後に、ウィルソンの「ヘルパー仮説」として有名になるが、実は彼のオリジナルのアイディアではない。", "book_title": "同性愛の謎　なぜクラスに一人いるのか (文春新書)", "author": "竹内 久美子"}, {"text": "自らを犠牲にしても他者を救おうとする遺伝子がどのように受け継がれていくかを説明するハミルトンの理論は、当初は「血縁淘汰」と呼ばれたが、現在では「包括適応度」と呼ばれている。そして、「互恵的利他主義」と呼ばれる、より広義の概念へ発達していった。人間は、血縁者以外に対しても利他的行為を行なう。こうした行動は種に典型的なものだ。なぜなら利他主義は、社会的なつながりを強め、社会的なつながりは、それと表裏を成す孤独への遺伝的恐怖と相まって人類の祖先が生き残るのを助けたからだ。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "動物と人間を言語で分けるのはよくある考え方です。それで、いったい人間の言語能力、あるいは人間の言語能力を可能にするような認知能力が進化的にどこから始まったかというと、はっきりわからないわけですよね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "動物と進化的に連続的なものとしての人間、ということになりますね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 107, "label": "朱子学", "freq": 8, "highlights": [{"text": "儒教には、上に忠節を尽くすことを重視する朱子学と、観念より実践を重視する陽明学がある。朱子学はトップダウン型、陽明学はボトムアップ型といえる。日本では朱子学と陽明学が交互に流行してきた。この流れを押さえると、日本の行く末が見えてくる", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "江戸時代は、朱子学が盛んだった。朱子学は儒教の体系の一つで、上への忠誠を重んじる。もともと儒教でいう「忠」は「自分に忠実であれ」という意味だったが、江戸幕府は封建体制を強化するため、「上の言うことに絶対に逆らうな」という意味に変えてしまった。別の言い方をすれば、トップダウンで組織をコントロールするのにちょうどいい学問が朱子学だといえる。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "第一は、その国の同時代の人と同じく、保守的な朱子学のなかで育てられた時期です。朱子学により、藤樹は、なによりも自己自身の内部への不断の探求を求められました。この神経の細い若者が、自分自身の内部の欠点と弱点とを、たえず反省した結果、神経過敏をつのらせてしまったことは容易にわかります。過度な自己探求の結果は、初期の生涯と著述とに明瞭に反映しています。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "とくに、朱子学は幕府によって、 封建 支配のための思想として利用され、幕府および、各藩の政策に大きな影響を与えるようになっていく。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "その後、儒教は宗教としてというより、基本的に貴族や僧侶の教養として学ばれていく。とくに、 朱子学 が伝わってからは、禅宗の寺院の基礎教養として広まっていった。 　儒教が、日本で宗教として歴史の表舞台に 躍り出るのは、江戸時代に入ってからのことだ。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "このように、江戸時代になると、儒教は、国家統治のための重要なイデオロギーへと大変貌を遂げる。それをバックアップしたのが、徳川家康の政治顧問のひとりだった儒官・林羅山（一五八三～一六五七）である。 　羅山は、仏教を非現実的だとして排除し、幕府の封建支配に役立つ思想として、朱子学を押し出した。 　朱子学は、万物の存在根拠「理」から、天然自然や人間社会の秩序が生まれるとする。そして、その秩序は絶対であり、不動であるとした。 　この考えは、将軍を頂点とする封建体制を保つうえで、きわめて都合がいい。その論理にもとづけば、将軍が国家に君臨するのも、家臣が主君に仕えるのも、万物の根源「理」にかなうおこないということになる。 　さらに、羅山は「孝」より「忠」を重視する思想を打ち立てた。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "私的な「孝」の感情よりも、公的な「忠」の原理が優位に立つという考えは、「忠」より「孝」を重んじる儒教の伝統的な考えとは異なるが、朱子学は、こうした日本的な解釈とともに、幕府の支配原理として確立されていったのだ。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "朱熹が大成した「朱子学」では、宇宙の根源であり、道徳の源である「理」を説く。そして「理」に立ち返るためには、「 窮理」（個々の事物に見出される「理」を一つ一つ極めて、「理」そのものに至ること）、および「 居敬」（いかなる時も心を安静の状態に置くこと）が必要とした。 　朱子学は、たちまち儒学の主流となり、元代には科挙の課題とされ、 清 代まで官学の地位を保った。 　いっぽう、 明代には、朱子学に対抗する形で、 王陽明（一四七三～一五二八）の「陽明学」が起こる。陽明学は、「理」は外にあるのではなく、わが心こそが「理」であると主張する徹底した 唯心論だ。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}]}, {"id": 108, "label": "物語", "freq": 8, "highlights": [{"text": "もし、大衆を対象としたプロダクトを作りたいのであれば、自分自身がユーザーの立場になり、ユーザーの視点から物語を書かなくてはならないだろう。だからこそ、私達はじっくりと時間をかけてユーザー・ナラティブ（語り）と呼ばれるものを書き上げている」（50） と答えている。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "「楽曲やパフォーマンスのクオリティも大切だけど、そういうものを全部まとめて乗せられる船代わりの物語があると、ファンダムの結束度が全然違うんだ」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「オーディション番組出身のグループはどうしても、デビュー時が人気のピークになりがちだ。オーディションは物語としての強度が本当に高い。そこに視聴者投票が加わると、ファンダムの熱狂度は殆ど悪魔的と言っていいくらいになる」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「物語への没入というのは、手っ取り早く我を忘れるために有効な手段の一つなんですよね」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「とにかく、無宗教の人が増えたアメリカでは神の力が弱まってて、その代わりになるストーリーが必要で、そのストーリーをコミュニティと一緒に提供できるのがメガチャーチなのね」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "検索というのは、自分に都合のいい物語を引き出すのに最適な手段です。検索ワードごとにさまざまな物語が生まれるからです。 　裏返せば、ネットは原理的に、「あるひとが検索で辿りついた世界観」と「別のひとが検索で辿りついた世界観」を調停することができないメディアなのです。これは、一〇年以上まえにキャス・サンスティーンというアメリカの憲法学者が指摘しています（『インターネットは民主主義の敵か』）。ぼくは、一方でデリダの哲学を研究し、言葉の無力さを学んできたという経緯から、他方でネットにずっと触れ、自分や友人の「炎上」を数多く見てきたという経験から、「言葉だけでは争いを止められないということを前提として、では争いを止めるためにはどうすればよいのか」に関心をもち、考えてきました。 　そこでぼくが辿りついたのは、「モノ」が大事だという結論です。より正確に言えば、時間や経験といった「言葉の外部にあるもの」。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "ぼくたちは、検索を駆使することで無限の情報から無限の物語を引き出すことができる時代に生きています。だからこそ、ひとりひとりが、物語と現実の関係について自覚的でなければなりません。情報だけの世界に生きていると、乱立する物語のなかで現実を見失ってしまいます。新しいモノに出会い、新しい検索ワードを手に入れることで、言葉の環境をたえず更新しなければいけないのです。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "しかし、多くの人が共感し興味を持つ物語の本質は、「純愛」「成長」「青春」「友情」など、いくつかに限られています。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}]}, {"id": 109, "label": "シンプル化", "freq": 8, "highlights": [{"text": "Blogger の共同創設者でのちにTwitter を共同創設するエヴァン・ウィリアムズは、2社を成功に導いたことに関して、ハウプトリーの革新法則に共感している（59）。つまり、「長い間存在している人間の欲望や好みを特定した上で、現代のテクノロジーを使ってそこに到達するのに不要なステップを取り除く」のである。Blogger はブログをネットに公開するプロセスを劇的に簡素化した。その結果、ネット上でコンテンツを作成する人の割合が急上昇したのである。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "ジャック・ドーシーは「シンプリファイズ・ザ・ワールド」と呼んでいます。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "何かを決めるとき、選択肢を増やしたほうが安心だと考える人は多い。だが実を言うと、決断の本質は、選択肢を減らすことにある（ ５）。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "反射的に手を出すのをやめて、何もしないことを選ぶのだ。たとえば、社内メールで議論が巻き起こっているとき、反射的に「全員に返信」ボタンを押さない。ミーティングのとき、よけいな口出しをしない。 　まずは立ち止まって、様子を見る。すると、全体の流れがクリアになる。「より少なく」というエッセンシャル思考のやり方は、すぐれた編集術でもあるのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "エッセンシャル思考で生きるということは、削除と凝縮と修正を、日々の習慣にすることだ。まるで呼吸するように、自然に生き方を編集しよう。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "リピート法をつくるのにも２つのステップがあります。 伝えたいコトバを決める。 くり返す。 これだけです。リピート法は「強いコトバ」をつくる技術で最もカンタンな方法といえます。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "「自然のままの食品を食べよう。ただし、食べすぎないように。野菜中心の食事をしよう」", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "ダイレクトマーケティングのクリエイティブ、とりわけネット広告のクリエイティブでは、そんなことはまったくない。 いや、 むしろ逆 なのだ。 ネット広告では、「強いキャッチコピー・強い写真・強いデザイン」など、要素の単純な組合せがレスポンス率を左右している」 と考えるべきである。 そう相性なんか関係ないのである。 単純な組合せの問題 なのである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 110, "label": "キャリア", "freq": 8, "highlights": [{"text": "私はいつも、優秀なエンジニアに対しては、ぜひプロダクトマネジメントに挑戦するべきだ、と勧めている。そして、どんなに君たちのエンジニアリングがすばらしくても、作る価値のある製品でなければ君たちは力を発揮しようがないんだよ、と言い聞かせている。何を作れるかを知っているだけではなく、何を作るかというもっと大きな問題にも取り組んできたエンジニアの貢献があってこそ、すばらしい製品や会社がたくさん生まれたのだ、ということも指摘しておきたい。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "いちばん価値のある経験とは、特定の製品分野や技術について何を身につけたかではなく (そういうものは、たぶん、そのうち古くて使えなくなってしまう)、優れた製品を作り出したり、製品開発チームで陣頭指揮を執ったり、事業の成長展開を管理したりするプロセスについて何を学んできたかにある。また、自分自身を知り、次にどう向上させていくかについて何を学んできたか、なのである。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "仕事がきついかどうかなどということは、そもそも良し悪しというよりその人の好き嫌いで決まることですね。「プレッシャーは大歓迎。そういうところでガンガンやるのが大好き！」という人がいるわけで、そういう人は伝統的にメガバンクとか総合商社とかリクルート、最近では昼も夜もなく働くベンチャー企業に就職するでしょう。「生計を立てていかなきゃいけないけれど、生活を大切にして、人間的なゆとりを持って仕事をしたい」という人ももちろんいる。そういう人は自分の好き嫌いで選択して、もっとゆったりした仕事に就きますね。自由時間がたっぷりある学者とかですね。僕のことですけど（笑）。これは言うまでもなく、良し悪しでなく個人の好き嫌いの問題です。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "境界線を引くのが簡単だと言うつもりはない。ジン・ユンやクリステンセンのようにうまくいくケースばかりではないだろう。出世の妨げになるかもしれないし、最悪仕事を失うことも考えられる。自分の領域を守るには、ときに大きな代価が必要だ。 　だからといって、境界線を放棄してしまったら、もっと大きな代償を払うことになる。人生でもっとも大事なものを選べなくなるからだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "やはり、仕事をしなければ生きていけないのが人生だとするならば、何を武器にして、誰と肩を並べて仕事をするのかという自分の中の整理ができていないと、なかなか展望が拓けないんじゃないでしょうか。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "たとえば、リード・ホフマンはリンクトインの創業当初、才能ある社員にストレートにもちかけた。相手が二〜四年のコミットメント期間に参加し、リンクトインの事業に大きな貢献をしてくれたら、ホフマンおよび同社は、彼らのキャリアアップに力を貸そう——そのキャリアアップが、リンクトイン社内における次のコミットメント期間になることを望みつつ——という条件である。このやり方はうまくいった。会社側は、リンクトインのために目に見える成果を上げようとする熱心な社員を獲得できた。さらにその社員が、一回または複数回のコミットメント期間を経て同社を去った後も、リンクトインのよさをあちこちで喧伝したり、会社にプラス効果をもたらしたりし続けてくれるケースが少なくなかった。社員側も、自分のスキルと経験を高めることでキャリアをガラリと一変できた。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "ゼネラル・エレクトリック（ＧＥ）がジャック・ウェルチの後継者にジェフ・イメルトを選んだ時、何が起きたか思い返してほしい。ほかの有力なＣＥＯ候補はほとんど即座にＧＥを去った。他社でＣＥＯ職に就くためだ（ボブ・ナーデリはホーム・デポへ、ジム・マクナーニは３Ｍへ）。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "リンクトインでは上司がこう自問する。「当社で働くことによってこの社員のキャリアはどのような『変革』を遂げるだろうか？」。リンクトインでは全社員に「変革計画」への記入を求める。一人ひとりが、自分自身、会社、世界をそれぞれどのように変革したいと思うのか、明確にする。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 111, "label": "市場分析", "freq": 8, "highlights": [{"text": "少なくとも理屈の上では、MRDとは、製品の市場性を記述", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "製品化によって具体的にどんな問題を解決するのか？ (バリュープロポジション) だれのためにこの問題を解決しようとしているのか？ (ターゲット市場) 市場の大きさは？ (市場規模) 製品化の成功をどうやって評価するのか？ (指標、収益戦略) 現在、他に競合する製品はあるか？ (競合の見通し) なぜ当社がこの製品化をやるのに最適なプレーヤーと言えるのか？ (差別化要因) なぜ今なのか？ (市場投入の時期) どうやって製品を市場に出すのか？ (市場投入戦略) 成功のために絶対に必要な要素は何か？ (ソリューションの要件) これらを前提とした上で、最終的な提案は何か？（やるかやらないか）", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "投資のプロセスで、市場規模や収益率を数量化してからでなければ市場に参入できない企業は、破壊的技術に直面したときに、身動きがとれなくなるか、取り返しのつかない間違いをおかす。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "他にもまだまだたくさん投資のコツはあります。ただし、私がより本質的だと思うのは、やはり「ファンダメンタルズの良いものに風が吹くかどうか」と、「多くの投資家が気付いていない含み資産」を発見し、それを正しく評価する事だと思っています。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "マーケット感覚のある人は、「どんなによい商品を作っても、供給者が多すぎると儲からない」と理解しています。そしてダイソンやアイロボット（ロボット掃除機・ルンバの開発メーカー）のように、他社とはまったくコンセプトの違う商品、すなわち、他の供給者が提供できない商品を作ろうとするのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "フランスにデカトロンというワークマンと似た低価格が売りの会社がある。デカトロンのフランス国内の売上を、日本の人口比で計算すると ４０００億円 近くあることがわかった。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "食品は生活において、最も接触頻度が高い商材である。１日３食と考えれば、人間は１カ月当たりおよそ１００回、１年間では１０００回以上も食事をする。個人による程度の差はあれ、アパレルのようにその頻度が極端に違うといったこともない。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "マーケティングでは、１％の値上げに対して、何％売上が減少するかという反応度を分析し、それを「 価格 弾力性」と呼んでいます。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 112, "label": "バランス", "freq": 8, "highlights": [{"text": "豪華な福利厚生は、仕事と遊びの境界をあいまいにする。だから、気づくとほぼ仕事ばかりという状態になる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "本書の基本的主張はこうだ──「 私たち現代人は、必要以上の整然さを求めるあまり、適度な無秩序を受け入れることがもたらすメリットを取り逃しているのではないか」", "book_title": "ひらめきを生み出すカオスの法則 (T&#x27;s BUSINESS DESIGN)", "author": "ティム・ハーフォード、児島 修"}, {"text": "このことを「リスク・ホメオスタシス」と呼んでいる。簡単に言えば、ある部分で高いリスクを負うと、別の部分で負うリスクを低くすることで埋め合わせようとする傾向のことである（＊６）。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "謙虚に振るまいながらも遠慮はしない──。 　気を遣うより、気を遣わせるな──。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "個人の創造的貢献と、集団としての力とのせめぎ合いは、クリエイティブな環境にはつきものだが、私にとってはこれが初めての経験となった。個人ですばらしい仕事をする天才がいる対極には、いろいろな考えが集まるからこそ卓越する集団がある。私は思った。では、この二つの対極をどう両立すべきなのだろうか。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "中年の「分別」という言葉は、ともに「わける」ことを意味する分と別という字を組み合わせてつくってある。分別とエロスとは敵対関係にある。分別の強すぎる人は、エロスをおさえこもうとする（もっとも、そんなことは不可能であることは、後に述べる）。エロスの強すぎる人は、分別がなくなってしまう。青年期ならともかく、中年になると、いかにして自分を超えるものとしてエロスを体験しつつ、自分という分別をなくしてしまわずにいるか、という課題に取り組むことになる。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "メイクタイムの3つめの要素として、この「運動や食事、睡眠、静寂、親密な時間などでバッテリーを 充電 する」 ことが入っているのは、そのためだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "ニュースをいっさい見るなとは言わないが、週に一度まとめて読むことを勧めたい。 これより頻度を下げると、文明社会に背を向けて洋上暮らしをしているような気分になるし、", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}]}, {"id": 113, "label": "コミット", "freq": 8, "highlights": [{"text": "いまや、僕らも議論のなかでこの表現を使っている。「反対だけど、コミットする」 は、僕らの会社で、特定の製品や戦略の決定について熱い議論を戦わせたあとによく聞かれる言葉になった。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "そのときに私は、なんとかうまく乗り切れるだろうというのはいっさい通用しないということを痛感しました。それとともに、「他人事を自分事化する」 ことの大切さを身をもって知りました。どんなことでも他人事と思わず、自分自身のこととしてやっていくようにすれば、全力投球できるようになるということです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "それとともに、「他人事を自分事化する」 ことの大切さを身をもって知りました。どんなことでも他人事と思わず、自分自身のこととしてやっていくようにすれば、全力投球できるようになるということです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "それでも「ツアー・オブ・デューティ」という比喩的な表現を使うのは、軍と民間企業のいずれのコミットメント期間にも共通する重要なコンセプトを伝えることができるからだ。それは「 ミッションを期限内に成し遂げることに専念し、そこに個人の信用をかけている」という考え方だ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "経験則でいえば、その人材の初めての変革型コミットメント期間は二年から五年ほどになる。この年数はほぼすべての組織や業界に当てはまる普遍的な期間のようだ。ソフトウェア業界では、二〜五年という期間は一般的な製品開発サイクルに合致するので、一人の社員が大きなプロジェクトを最初から最後まで経験できる。シリコンバレーで社員にストック・オプションを与える時に、通常四年間かけて付与（ヴェスト）する慣行もこのサイクルを反映している。一般消費財業界を見ても、プロクター・アンド・ギャンブル（Ｐ＆Ｇ）などの企業では、新しいブランド・マネジャーはまず、二〜四年間のコミットメント期間から始める。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "変革型または基盤型のコミットメント期間を導入しようとしているなら、踏み込んだ対話を覚悟しよう。社員ごとにパーソナライズされた長期的なアライアンスを築くという話になるからだ。対照的に、ローテーション型なら標準化されており期間も短いため、より定型的なやりとりですむ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第１条 コミットメント期間 ［原則］ あなたのコミットメント期間とは、当社と私の部署に対してあなたが何をして役立とうとするか、同時に、私と当社があなたのキャリアに対して何をして役立とうとするかを定めるものです。 コミットメント期間に関して、あなた、私、および当社には契約的な義務は発生しませんし、計画が変わってしまう可能性もあります。それを前提にしながらも、現時点では、あなた、私、および当社は、このコミットメント期間を完遂することを、相互信頼に基づき約束します。互いに合意した共通の目標に向かって進捗がある限り、当社はあなたを退職させませんし、あなたも当社を辞…", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第１条 コミットメント期間 ［原則］ あなたのコミットメント期間とは、当社と私の部署に対してあなたが何をして役立とうとするか、同時に、私と当社があなたのキャリアに対して何をして役立とうとするかを定めるものです。 コミットメント期間に関して、あなた、私、および当社には契約的な義務は発生しませんし、計画が変わってしまう可能性もあります。それを前提にしながらも、現時点では、あなた、私、および当社は、このコミットメント期間を完遂することを、相互信頼に基づき約束します。互いに合意した共通の目標に向かって進捗がある限り、当社はあなたを退職させませんし、あなたも当社を辞...", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 114, "label": "権力構造", "freq": 8, "highlights": [{"text": "11 世紀にカトリックというローマのバチカンを本拠とする西方教会と、コンスタンティノープルを本拠とするギリシャ正教の東方教会とに分裂しました。さらに 16 世紀にカトリックに反抗するプロテスタントが現れ、現在は大きく分けるとカトリック、プロテスタント、正教会の 3 派があります。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "一九六〇年代の新左翼や、途上国で民主化を求める人々は「権力を人民に！（Power to the People!）」と叫んだのではなかったのか。こう考えると、ポピュリズムこそが、実は民主主義の究極の形態ではないのかとさえ言いたくなってくる。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "そして大蔵省に対し、市場原理に基づいて銀行を潰せと迫ったローレンス・サマーズ財務副長官は、いったん日本で金融危機が起こると手のひらを返し、「金融危機を絶対に世界に波及させるな」と身勝手なことを言い放っていたそうです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "またロバート・ルービン財務長官が、ゴールドマン・サックスの共同会長出身であったこともあり、米金融機関からのロビー活動があったのも事実です。潰れた金融機関や破綻した企業のアセット（資産） を安値で買い取りたいという狙いがあったのでしょう。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "このとき私が強調したのは、覇権国家（アメリカ） とそれに下駄をはかせてもらって経済成長している国家（中国） の違いです。カジノのオーナーは好きにルール変更をすることができるので、圧倒的に優位であることは、日本の経験から明らかでした。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "私はトランプ現象が新自由主義の終わりの始まりだと直感しました。新自由主義の最大の恩恵を受けた二つのグループがグローバリストとデジタリストです。そしてグローバリズムの持つ悪の象徴が中国なのです。グローバリストに任せていたら、アメリカを脅かす怪物を作ってしまったというわけです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "とくに、朱子学は幕府によって、 封建 支配のための思想として利用され、幕府および、各藩の政策に大きな影響を与えるようになっていく。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "西木 　たしかに、エリツィン時代は頼むとどんな資料でも出てきましたね。プーチン政権になってからピタッと取れなくなった。 　 佐藤 　プーチンはエリツィンとは逆ベクトルの政治家ですから。彼はベルリンの壁が崩壊した時に、なぜソ連軍は出動しないのかと地団駄を踏んだ口ですよ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 115, "label": "経営戦略", "freq": 8, "highlights": [{"text": "自社資源の活用こそが、成熟した企業の中で新規事業を生み出す最大のメリット だからです。", "book_title": "「事業を創る人」の大研究", "author": "田中聡、中原淳"}, {"text": "川上 　会社としてのビジョンはあっていいんじゃないでしょうか。ただそのビジョンが、会社の目的と合致できるかどうかですよね。「世の中のために」というところが強いと、会社の利益がどこかにいっちゃう。でも、たとえば「誰も見たことがない動画の新しいシステムをつくろう」というビジョンは、会社の利益に合致する。だから、それは言っても大丈夫。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "ビジョナリー・カンパニーのような成功を収めようとするなら、チャールズ・ダーウィンの『種の起源』の概念の方が、企業の戦略策定に関するどんな教科書よりも、役に立つ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "会社を究極の作品と見るのは、きわめて大きな発想の転換である。会社を築き、経営しているのであれば、この発想の転換によって、時間の使い方が大きく変わる。製品ラインや市場戦略について考える時間を減らし、組織の設計について考える時間を増やすべきなのだ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "企業が新しいジャンプアップを図るときに大切なのは、飛躍した発想をしないことだ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "その結果、企業にとって悩ましいのが、「中期経営計画」 　これは、ほとんどの場合、「三ヵ年計画」として策定されてきました。 　しかし、この「三ヵ年」という時間の長さが、悩ましい。 　なぜなら、わずか「三年後」が予測できないからです。 　昔ならば、世の中の変化が緩やかであり、現在の変化の方向が、三年後にも、概ね正しかった。しかし、変化が激しいこの時代には、わずか三年で、世の中が大きく変わってしまう。しかも、「螺旋的発展」が起こるときは、まったく逆の方向に向いてしまう。 　だから、いま、多くの企業では、この変化の速さに頭を悩まし、その結果、言葉の矛盾とも思える「三ヵ年計画を、毎年、見直す」ということを余儀なくされているのです。 　そして、「螺旋的発展」が加速される時代においては、ビジョンや戦略を立案するとき、その業界や市場において、次にどのような「原点回帰」が起こるのかを予見して立案しなければならなくなる。 　いま、多くの企業が、その悩ましさに直面しているのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "業績不振に苦しんでいた就任直後、僕は従業員たちに、まず「ＱＳＣ（＊３） を高める以外のことを考えなくていい」「ＱＳＣのことだけを考えろ」と訴えかけました。 　一般論として、企業というのは「らしさ」を忘れて不振に陥り、「らしさ」を取り戻して復活するものです。日本でマクドナルドが苦戦していた理由は、「健康志向が台頭したこと」でも「ハンバーガーに対して消費者が飽きたこと」でもない。「マクドナルドらしさを失ったこと」にある。僕はそう考えていました。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "難しいことです。しかし、私たちがもし努力しなければ、ビジネスは立ち行かなくなるでしょう。ライバルに圧倒されずにいられる唯一の理由は、私たちが取り組んでいることが難しいことであり、私たちは誰よりもそれをうまく行っているからなのです。もしもあまりにも簡単なことであれば、私たちを押し流す大きな競争の波を招くことになるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 116, "label": "組織変革", "freq": 8, "highlights": [{"text": "そうであれば、いっそのこと、新規事業ではなく「 育成事業」と呼び方を変えてしまったほうがよいかもしれません。", "book_title": "「事業を創る人」の大研究", "author": "田中聡、中原淳"}, {"text": "すばらしいアイデアがひらめくという大きな幸運がめぐってくるまで、じっと待たなくてもよい。カリスマ的指導者が登場しなければ、ビジョナリー・カンパニーにはなれないという、誤った考えに苦しむこともない。神秘性も、つかみどころのない魔法も、必要ない。基本的な点を学べば、自分たちの会社をビジョナリー・カンパニーにする困難な作業に、だれでも、いますぐ、とりかかることができる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "緊張感は、ムダをなくして利益を出す、稼げる会社になると、自然と社内に芽生えてくるものだ。ムダをなくすには社員が自分自身で考えて行動するようになることが必要だ。そうなれば、 自ずと緊張感を持って働くようになるからだ。新商品の開発はそれまで待ったほうがいいのだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "経営方針を打ち出したら、それで自分の仕事はおしまいで、後はよきにはからえ、というタイプの経営者がいるが、多くの場合、それではうまくいかない。 　経営トップが、役員や幹部社員だけでなく、管理職から現場の一般社員に至るまで、粘り強くその実行をフォローして初めて大事は 成就 する。そこまで経営トップが自ら動かないと、なかなかトップの思いというのは、組織の末端まで届かないのが現実だからだ。 　組織が変われるかどうかは、結局、トップの思いの強さ次第である。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "何かを変えようと思ったら、まずは一番やりやすく、成果の出やすいところから手をつけるのがセオリーだ。 すべてを一度に変えようとすると、結局、何も成果を得られないことが多い。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "最初は手本を示すことも必要である。できもしないことを要求しているのではないということを自ら示すことが、改革の「最初の一突き」になるのだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "本当に最高のカスタマー・サービスを提供するザッポスのブランドを築くためには、一部門ではなく、全社を挙げてカスタマー・サービスに取り組む必要がありました。自分たちがコール・センターを設けたいと思う場所に、サンフランシスコから本社をまるごと移転する必要があったのです。ちなみに、コール・センター部隊を、その頃、カスタマー・ロイヤルティ・チーム（ＣＬＴ） と呼ぶことにしました。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "リンクトインでは上司がこう自問する。「当社で働くことによってこの社員のキャリアはどのような『変革』を遂げるだろうか？」。リンクトインでは全社員に「変革計画」への記入を求める。一人ひとりが、自分自身、会社、世界をそれぞれどのように変革したいと思うのか、明確にする。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 117, "label": "人格形成", "freq": 8, "highlights": [{"text": "「人間は思いの主人であり、人格の制作者であり、環境と運命の設計者である」", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "幼少期に精神的な傷を負った子供はＰの傾向が強くなる。一方、肉体的な虐待を受けた子供はＥの傾向がより育ってくる。そういうことが言えると思います。", "book_title": "コミュニケーションのための催眠誘導～「何となく」が行動を左右する～ (光文社知恵の森文庫)", "author": "石井 裕之"}, {"text": "ただそれは単に人格形成上の問題だけではなくて、われわれの人生にとって最も重要になってくる死とは何かという問題と深くかかわっています。死の受容の問題です。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "学校もあり教師もいたが、それは諸君の大いなる西洋にみられ、今日わが国でも模倣しているような学校教育とは、まったくちがったものである。まず第一に、私どもは、学校を知的修練の売り場とは決して考えなかった。修練を積めば生活費が 稼げるようになるとの目的で、学校に行かされたのではなく、 真の人間 になるためだった。私どもは、それを真の人、 君子 と称した。英語でいうジェントルマンに近い。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "このふたつの結果から示唆されるのは、「両親に愛されて育ったからこそ、人に愛される喜びを知っているのが、地下アイドルになった女の子たちの本来の姿」であることです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "人間は、読書ではなく労働によって自己を完成させる。つまり、人間を向上させるのは文学ではなく生活であり、学問ではなく行動であり、そして伝記ではなくその人の人間性なのである。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "結局のところ、人間の性質は目に見えない無数の もの によって形づくられていく。 先達 や古今の格言、人生における実体験や書物、友人や隣人、現在の社会や祖先の英知――これらすべてをわれわれは受け継ぎ、疑いもなくそこから大きな影響を受けている。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "両親の人格は、行動を通じて子供の人格に反映する。日々示される両親の愛情やルール、勤勉や自制心などは、耳から学んだ知識を忘れ去った後も子供の心に生き、その行動を決定する。 　親の無言のふるまいや無意識のまなざしでさえ、時には子供の性格に一生ぬぐいがたい印象を植えつける。すばらしい両親の生き方を思い出して悪の誘惑を断ち切った人間は多いはずだ。彼らはおそらく、恥知らずな行動に走ったり、いやらしい考えにふけったりすれば、両親の美しい思い出を汚すことになると悟ったにちがいない。 　慈善事業家ファウエル・バクストンは、立身出世を果たしてからも母親宛てに次のような手紙を書き送っている。 「子供のころ、母さんから教えこまれた誠実さや道徳心という美徳を、いまでも決して忘れません。とくに他人のために何かしてあげようとする時、母さん譲りの美徳を強く感じずにはいられないのです」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 118, "label": "主体性", "freq": 8, "highlights": [{"text": "「人間は思いの主人であり、人格の制作者であり、環境と運命の設計者である」", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "私たちは、自分の環境を直接はコントロールできないかもしれません。でも、自分の思いは完璧にコントロールできます。よって、私たちは間接的に、しかし明らかに、自分の環境をコントロールすることができます。", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "人を説得する原則❼　 相手に思いつかせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❹　 命令をせず、意見を求める。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "Leadership of Hoshino Resort│#02 熱狂的ファンをつかむコンセプトを作る 競争力向上のカギは「自分たちで決める」 企業が活力を高めるためには、「社員の主体性」を引き出す必要がある。 そのカギは、仕事に対する共感や納得感である
