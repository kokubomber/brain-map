ン・マインドであれ 成長と学びを追求する コミュニケーションにより、オープンで誠実な人間関係を築く ポジティブなチームとファミリー精神を築く より少ないものからより多くの成果を 情熱と強い意志を持て 謙虚であれ", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ザッポスにおける私たちの哲学は、長期的な利得が相応にあると信じられるなら、（売上げや利益が減少することも含めて） 短期的な犠牲は厭わないというものです。企業文化を守り、コア・バリューに忠実であることには、長期的な利得があるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちが講演をする際はいつも、ザッポスのコア・バリューを用いています。講演をするという機会をザッポスの広報活動にあからさまに使うのではなく、聴衆が「成長と学びを追求する」よう手助けをするために、私たちがどのように物事に取り組んでいるかについてできるだけ分かち合おうとしています。さらに「コミュニケーションにより、オープンで誠実な人間関係を築く」ように努めようというコア・バリューに沿って、私たちは喜んで数字やそのほかの詳細情報をシェアしています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "自分で自分をコントロールしていると感じられるか、自分が進歩していると感じられるか、つながり（関係の数と深さ）、ビジョンと意味（自分自身よりも大きなものの一部となること） の四つのことで決まります。このフレームワークの面白いところは、あなたがこのコンセプトをビジネスにも応用できるということです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私が面白いと思ったのは、多くの人が人生で、快感で得られる幸福感をずっと持ち続けられると考えて、快感で得られる幸福感を一生追求し続けますが、その後情熱について考えるようになり、それを解決できれば、自分にとってより崇高な目的を探すようになることです。 しかし、研究結果によると、適切な戦略とは、最初に自分にとってのより崇高な目標とは何かを見出して、追い求め（というのも、この類いの幸福感が最も長続きするからです）、その後、その下に情熱、さらにその下に快感で得られる幸福感を据えることなのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "あなたは毎日自分が最高に幸せになるために仕事をしていますか。 毎日、世界の幸せに対してあなたの存在はどんな影響を与えているでしょうか。 あなたの価値観とは何でしょうか。 あなたは何に情熱を傾けていますか。 あなたにやる気を与えるものは何でしょうか。 あなたの人生の目標は何でしょうか。 あなたの会社の価値観とは何でしょうか。 あなたの会社のより崇高な目的とは何でしょうか。 「あなた」のより崇高な目的とは何でしょうか。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "多くの人は、「産業化されたスポーツの祭典」にシラケているように僕には見えます。地域に根ざした（特に宗教問題に深く関わる）サッカーと違い、オリンピックは今や巨大なスポーツビジネスです。さらには、地域開発ビジネスでもあります。これは、シラケて当然だと思います。この傾向は、 80 年代のロスアンゼルスオリンピック以降、とても顕著だと思います。どこかで、オリンピックの意義を再考する時が来るでしょう。時代の価値観は、想像以上に早く変わっていると、世界をまわり感じます。また今後、地域の歴史に根ざしているようなスポーツ以外は、人々の関心をあまり呼ばなくなるだろう、と僕は思います。ですので、スペインの人たちは、オリンピックも、ワールドカップもあまり興味がありません。一方、バルセロナ対レアルマドリッドにはとても興味があります。なにしろ、かつて征服された敵国との戦いのようなものですから。", "book_title": "黒本", "author": "高城剛"}, {"text": "ある日突然すべての価値観が変わった時に、大切なのは「食物がある土地や周辺」ということに他なりません。実際、ソ連の末期も混乱に巻き込まれなかった人たちは「ダーチャ」と呼ばれる「田舎の土地」を所有していた人たちでした。", "book_title": "黒本", "author": "高城剛"}, {"text": "かの山本七平は、日本の宗教すべて、たとえキリスト教だろうが、仏教だろうが、それらは、「日本教」の中のキリスト教や仏教で、他国のそれとは違うと論じました。日本における宗教は、すべて「日本教」と呼ばれるものの中に組み込まれているというのです。僕も概ね同意しますが、さらに日本最大の宗教は「消費活動」にあると思います。クリスマスも正月もバレンタインも、「消費活動」がメインにあると言っても過言ではありません。神様を讃え、家族と家で質素に過ごすようなことはありません。街中、メディア中、ジャラジャラ音をたてながら、消費活動を煽っていると思います。ですので、僕は海外で日本の宗教を話す際に、高度経済成長が生んだ日本の「消費教」の話を、必ずするようにしています。一方、政権与党同然な政治政党は、海外では「カルト」と呼ばれる人たちが多くいます。実に不思議な国だと思いますが、「消費教」が国教同然ですので、株価があがったり景気さえよければ、国民の多くは政治も実際の宗教も無関心である、と識者には見えていると思います。", "book_title": "黒本", "author": "高城剛"}, {"text": "目指すべきは、会社と個人の目標をあらゆる面で完璧に一致させることではない。ある期間、一定の条件のもとでのみ、自然な形で両者をそろえる「 整合性」を目指そう。 整合性を目指すには、「企業の目標と価値観」と「社員のキャリア目標と価値観」との間にある共通点を、マネジャーが意識的に探して明示しなければならない。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "社員に「あなたが最も大切にしている価値観は？　どんな人でありたい？」などと聞くのは、最初はきまりが悪く感じられるかもしれない。だがこれは、いい人ぶろうという話ではない。価値観について話し合うと、社員とその上司、そして会社との三者間でより強い信頼と信義を築く大事な一歩を踏み出せる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第２条 整合性 ［原則］ あなた、私、および当社にはそれぞれ自分の核となる価値観とありたい姿があります。 あなた、私、および当社は三者の価値観とありたい姿がなるべく整合するように努力します。その一方で、一〇〇％重なることはあり得ないことも理解しています。 〈期待水準〉 私は自分の核となる価値観とありたい姿を明記します。また、私の理解の範囲で、会社が本当に信じている具体的な価値観とありたい姿も明記します。 私や会社の価値観とありたい姿について、あなたから率直なフィードバックや提案があればぜひお願いします。 私は、あなたの核となる価値観とありたい姿を知りたいと思っています。それが私や会社のものと違っていてもかまいません。 （あなたの核となる価値観とありたい姿） 　　 （私の核となる価値観とありたい姿） 　　 （会社の核となる価値観とありたい姿） 　　 あなたのこれからのキャリアの発展について、一緒に、私たち共通の期待値を設定していきましょう。 私は、あなたのビジネス面での…", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第２条 整合性 ［原則］ あなた、私、および当社にはそれぞれ自分の核となる価値観とありたい姿があります。 あなた、私、および当社は三者の価値観とありたい姿がなるべく整合するように努力します。その一方で、一〇〇％重なることはあり得ないことも理解しています。 〈期待水準〉 私は自分の核となる価値観とありたい姿を明記します。また、私の理解の範囲で、会社が本当に信じている具体的な価値観とありたい姿も明記します。 私や会社の価値観とありたい姿について、あなたから率直なフィードバックや提案があればぜひお願いします。 私は、あなたの核となる価値観とありたい姿を知りたいと思っています。それが私や会社のものと違っていてもかまいません。 （あなたの核となる価値観とありたい姿） 　　 （私の核となる価値観とありたい姿） 　　 （会社の核となる価値観とありたい姿） 　　 あなたのこれからのキャリアの発展について、一緒に、私たち共通の期待値を設定していきましょう。 私は、あなたのビジネス面での...", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "付録—Ｂ 「尊敬する人のリスト」の実例 アライアンスについて述べた第３章で、社員の価値観を理解することが大事だと述べた。そして、尊敬する人物とその理由を聞いてみるというテクニックを紹介した。著者三人がその作業を行った結果を以下に示す。 まず、我々の尊敬する三人の人物を挙げ、それぞれの人物について最も尊敬できる資質を三つ挙げ、それら九つの資質を自分が大事だと思う順番にざっと並べたリストである。 リード・ホフマン １．マーティン・ルーサー・キング・ジュニア 偉大な英雄であり、彼のビジョンと勇気はすべてのアメリカ人、そして世界中の人々を今でも鼓舞している。 ビジョン 勇気 共感 ２．マリー・キュリー 科学の世界の英雄である彼女は、大きな組織のリーダーでなくても、本質を問いなおすような知的リスクをとり、人々の先頭に立って道を切り開くことができることを身をもって示した。 知性 思考の独立性 集中 ３．アンドリュー・カーネギー 実業家から慈善家（フィランソロピスト）へと進化した彼の生き方は、その後何十年にもわたり灯台のような役目を果たしている。 物心ともに与えようという優しさ リーダーシップ 起業家精神 資質のランキング １．共感 ２．勇気 ３．集中 ４．知性 ５．物心ともに与えようという優しさ ６．ビジョン ７．リーダーシップ ８．起業家精神 ９．思考の独立性", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 4, "label": "意思決定", "freq": 65, "highlights": [{"text": "人生とは道をきわめることにあり。 　そう決めたら、なすべきことに迷いはありません。科学者としての私は、自然をきわめたいと思ったので、「わかること」と「わからないこと」の境界を探索し、頭のなかに膨大な知識のストックをつくり、その蓄積を元手にして、宇宙、地球、生命、文明について何十年にもわたって考え続けてきました。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "スティーブは、 重要でない機能をカットしたほうが、ユーザーが一から学びやすく、長い目で見て使いやすくなる と考えていた。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "だから何かを生み出す人、リーダー、起業家となる人には、ふたつの能力が必要になる。ひとつは、現状を正しく把握する力。雨雲が立ち込めて雨がパラパラと降ってきたら、すぐにやむ雨なのか、嵐になるのかを見極めなくてはいけない。ふたつ目は、困難の嵐がやってきたときに、次々と手を打つ能力だ。傘をさすのか、雨宿りをするのか、雨雲を避けるよう移動するのかをその時々のコンディションと自分の能力などを鑑みて、的確に判断し行動しなければならない。", "book_title": "HARD THINGS　答えがない難問と困難にきみはどう立ち向かうか", "author": "ベン ホロウィッツ、滑川 海彦、高橋 信夫、小澤 隆生（序文）"}, {"text": "担当者の肩書きや社内の組織体系がどうあれ、あらゆる優れた製品の陰には、責任を持ってその製品のプロフィールを決めた 1人の人間がいる、と私は断言する。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "でも、プロダクトマネージャーの方も、製品開発というのは、自分が思いついた最新のアイデアや最高のアイデアを試す場ではないことを忘れてはならない。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "製品化によって具体的にどんな問題を解決するのか？ (バリュープロポジション) だれのためにこの問題を解決しようとしているのか？ (ターゲット市場) 市場の大きさは？ (市場規模) 製品化の成功をどうやって評価するのか？ (指標、収益戦略) 現在、他に競合する製品はあるか？ (競合の見通し) なぜ当社がこの製品化をやるのに最適なプレーヤーと言えるのか？ (差別化要因) なぜ今なのか？ (市場投入の時期) どうやって製品を市場に出すのか？ (市場投入戦略) 成功のために絶対に必要な要素は何か？ (ソリューションの要件) これらを前提とした上で、最終的な提案は何か？（やるかやらないか）", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "この質問リストの中では、実際の問題の解決方法 (ソリューション) には触れていないことに注意してほしい。これは意図的なものであり、とても大切なポイントだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "短期計画はなにかと非難されてきたが、それは不当な評価だと思う。僕らは、 約六週間ごとに次に何をするかを決める。それが唯一の計画だ。それより先のことはなんであれ、「あとで検討」案件とみなす。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "いまや、僕らも議論のなかでこの表現を使っている。「反対だけど、コミットする」 は、僕らの会社で、特定の製品や戦略の決定について熱い議論を戦わせたあとによく聞かれる言葉になった。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "やましく思われるかどうかは俺らにとって重要じゃない。いい企画を作れるかどうかが軸。それを曲げてまで、世間体を気にするつもりは僕にはない。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "イノベーションって執念がいるの。俺、代官山（蔦屋書店）をやるときにも、役員全員に反対されたのをやり抜いたんだから。 　組織や社会の意思決定においては大きな声を出す人がいる。株主総会でも１株しか持っていない人が発言できる。開かれている反面、本当にリスクを取っている株主の発言機会が失われることもある。そういうのはどうなのかなって、総会の議長をしながらずっと思っていた。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "それは一神教が、何もない砂漠の中で生まれたことに起因すると考えられます。砂漠の中で生き抜く時、人は他のものから何かを恵んでもらうのではなく、自分で何かを得るための決断をします。「西へ行くべきか？　東へ行くべきか？　どちらかにはオアシスがあるはずだけど」。そのように、自分自身が生死を決める究極の判断をするしかないからです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "経営者の仕事の中核は判断をすること。右に行くか左に行くか。大きな意思決定を迫られたときに、決断するのが経営者の仕事です。その判断が良いか悪いかはやってみなければわからないことが多分にある。良し悪し以前に、明確な選択をすることそれ自体が大切なのです。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "「議論を尽くせば、みなが納得できる結論に至り、気持ちよく仕事をしていける」 猛獣園ではこんなキレイごとは成立しない。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "猛獣園ではこの意思決定法が驚くほど機能する。 ・意見を述べる時間が確保され、言いたいことを伝えられる ・自分の意見をチームメンバーが傾聴してくれる この２つのプロセスを踏んでいるからだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "効率は、ひとが生きやすくなるための手段である。しかし平成の大合併は、コストを減らすことが目的になってしまった。成果はコストを減らすことだった。すべての計画はひとの生きやすさこそが目的になるはずなのだが、それは見えなくなった。効率を手段ではなく目的に添えてしまっては、それは何も生み出すことはない。それどころかひとを不幸にさえしてしまう。 　意思決定は現場で行うべきである。答えはいつも現場にある。効率化を目的とし組織をまとめた結果、意思決定は現場でより行えなくなった。事務所で行うことになった。この結果、意思決定の間違えはおのずと増える。 　ひとが生きにくくなった原因のひとつは、意思決定を事務所で行わざるを得なくなるような組織の大きさを作ってしまったことにある。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "答えは現場にある。その現場で意思決定があるかどうか。 　組織のよい成果に、このことは大きく影響する。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "数学者のハナー・フライは、オーケーキューピッドには根本的な限界があると指摘している。「アルゴリズムは、設計された通りに実行されている。それは、条件を満たす独身者同士をマッチングさせることだ。問題は、アルゴリズムではない。問題は、私たちが自分がなにを望んでいるかを正確に理解していないことなのだ」", "book_title": "ひらめきを生み出すカオスの法則 (T&#x27;s BUSINESS DESIGN)", "author": "ティム・ハーフォード、児島 修"}, {"text": "投資のプロセスで、市場規模や収益率を数量化してからでなければ市場に参入できない企業は、破壊的技術に直面したときに、身動きがとれなくなるか、取り返しのつかない間違いをおかす。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "「やらなくては」ではなく「やると決める」。 「どれも大事」ではなく「大事なものはめったにない」。 「全部できる」ではなく「何でもできるが、全部はやらない」。 　この３つの真実が、私たちを混乱から救い出してくれる。本当に大事なことを見極め、最高のパフォーマンスを発揮することが可能になる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "戦略には選択とトレードオフがつきものだ。 　　　独自性を意図的に選びとるのである。 ── マイケル・ポーター（経営学者）", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "エッセンシャル思考の人は、自らトレードオフを選びとる。誰かに決められる前に、自分で決める。経済学者のトーマス・ソエルはこう言った。 　「完璧な答えなど存在しない。あるのはトレードオフだけだ（ ７）」 　ピーター・ドラッカーは、かつて『ビジョナリー・カンパニー』シリーズの著者ジム・コリンズにこうアドバイスしたと言われている。 　「偉大な企業をつくるか、偉大な思想をつくるか、どちらかだ。両方は選べない」 　そこでコリンズは思想を選んだ。彼の会社は従業員３人の小さな会社にとどまったが、彼の思想は世界中に広まり、数千万人の人びとに影響を与えている（ ８）。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "非エッセンシャル思考の人は、周囲の期待やプレッシャーに負けて、不本意なイエスを言ってしまう。よく考えもせず、相手を喜ばせるためだけに仕事を引き受ける。単純に、そのほうが気分がいいからだ。 　一方、エッセンシャル思考の人は、そうした気分のよさが長続きしないことを知っている。一瞬の満足のあとでやってくるのは、深い後悔だ。なぜこんなことをやらねばならないのかと、相手を恨み、自分を責める。もっと重要な仕事が犠牲になったことに気づき、ショックを受ける。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "この世のトラブルの半分は、イエスを言うのを焦りすぎ、 　　　ノーを言うのを渋りすぎることからくる。 ── ジョシュ・ビリングス（作家）", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "この世のトラブルの半分は、イエスを言うのを焦りすぎ、 　　　ノーを言うのを渋りすぎることからくる。 ──", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "何かを決めるとき、選択肢を増やしたほうが安心だと考える人は多い。だが実を言うと、決断の本質は、選択肢を減らすことにある（ ５）。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "彼は社員たちに「ＦＣＳ（フォーカス）」の思想を繰り返し語る。「少数のことをより良くやれ」「正しい情報を正しい人に正しいタイミングで伝えろ」「意思決定のスピードと質を追求しろ」という３つのセンテンスの頭文字をとったものだ。これはエッセンシャル思考のリーダーシップを簡潔に、的確に言い表している。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "それによって、「外資系のやり方に慣れた英語ができる日本人では失敗する」→「日本のマーケットを知っていて日本人の心をグリップできる人間を採って任務にあたらせるべきだ」 と判断したのだと考えられます。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "フェイスブックジャパンでは、テレビＣＭはいっさい使いませんでした。 　テレビＣＭを打てば新規ユーザーは間違いなく獲得できます。しかし、そこで入った新規ユーザーがすぐに利用をやめてしまったり、退会してしまえば意味はありません。 　フェイスブックでは「登録した瞬間に〇名以上の友達とつながるかどうか」が使用を続けるかやめてしまうかの分岐点になる という数値が分析結果から出されていました。「重要業績評価指数＝Key Performance Indicator（ＫＰＩ）」のひとつに設定されていることです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "もし、かつてとは逆の立場で、いまスタッフからこうした企画が出されたとすれば、「データは？」「ファクトは？」と問い詰めるのは間違いありません。 感覚だけで進めようとしている数字のない企画は絶対に認めない のがいまの私です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "現在、ＫＤＤＩで新たなプロジェクトをスタートさせている私はＱｒａｎｋ（クランク）というユーザー投稿型のランキングアプリのサービスにも関わっています。そこでは、最初の段階でチームメンバーに対して「数字以外は信じない」と断言 したほどです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "そうならないためにも、〝想い〟を断ち切り、数字だけを見てドラスティックにやっていく必要があります。そういう意味でプロダクトチームとグロースチームは分けるべきだということになるわけです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "現場のことは現場で根拠になる数字を出して少人数で判断するからさっさと意志決定しようというのが、データサイエンスの目指す民主的で本来の美しい姿だと思います。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "③アイデアの良し悪しは、誰がそのアイデアを発案したかに基づいて判断してはならない（この原則は、声に出して繰り返してほしい）。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "⑤アイデアを育てたり、切り落としたり、採り入れたりするには、上層部の「園芸」スキルが必要である。ＭＢＡはこれを「リスク許容度」という言葉で表現している。私", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "そのやり方には、彼がヨーダというキャラクターに込めた哲学がいくらか反映されているように感じられた。「やるかやらないかだ。やってみる、というのはなしじゃ」というヨーダのセリフのように、ジョージは、人生の矛盾を噛み砕いて何かに端的にたとえるのが好きだった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "この実験の教訓を教授はこう挙げている。 「選択肢が多ければ多いほど人は選ぶのに悩み、選んだ結果が本当にいいのか気にもなり、自信をなくし、結局選ぶのをやめてしまう」 と。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "つまりは、方法論云々よりも自分が選んだものを自分で実行したという事自体が、その後の人生を飛躍的に成長させていく事になっていきます。なぜなら自分の意思に基づく失敗ならば、その後、大きな教訓となって一生忘れられない知恵に昇華されるからです。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "こう考えると、私たちの行動には、「三つの時間軸における合理性」が互いに絡みあうかたちで影響を与えていることが分かります。その結果、私たちの心には三つの時間に由来する異なるベクトルが競合することになります。同じ対象(糖など) に接近したい一方で回避したいとも思う「揺れ動く心」をもつことも、これによって説明できるかもしれません。「接近か回避かのジレンマ」は、それぞれの時間スケールにおける生き残り上の有利さを実現しようとするうえで生じている可能性があるということです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "効果的なテレビＣＭを打てば売れるだろうとは思ったが、その案は却下した。１セット１万５０００円の空調服のＣＭを流したら、「ワークマンは安い」「ワークマンは値札を見なくても買える」というブランドイメージを損なう。そのほうが痛手だ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "戦略家としての表現方法 ❶結論から述べる ❷「ＡプランとＢプランがあるが、自分はＡプランが良いと思う、何故ならＣであるから」と、必ず自分のポジションを取って言い切る ❸Ｐｒｏｓ（メリット）、Ｃｏｎｓ（デメリット）で整理する ❹アクションプラン（施策）は実行可能性×インパクトで整理する ❺論点はナンバリング（数字を振る）、グルーピング（集合をつくる）、ラベリング（集合に名称をつける）する", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "それは事前購買段階（ＺＭＯＴ：Zero Moment of Truth、真実のゼロの瞬間）、購買段階（ＦＭＯＴ：First Moment of Truth、真実の第１の瞬間）、事後購買段階（ＳＭＯＴ：Second Moment of Truth、真実の第２の瞬間）と段階ごとに顧客の意思決定プロセスを捉える考え方だ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "「来た、来た、来た！」と思ったチャンスは、案外チャンスではありません。これはつまり、「めんどくさい」ほうの選択肢にこそチャンスがあり、ビッグゲインがある、ということを意味しています。 チャンスというのはオブラートに包まれているもの。だから、チャンスをつかめないと言う人は、第１は単に気づかない人で、第２はめんどくさいと思ってチャンスから目をそらしている人。めんどくさいものこそ、中途半端にふてくされてやると、ただのロスにしかなりません。 しかし、全力でやればロスではなく、ゲインになります。「めんどくさいこと」こそ、全力でトライするよう意識すれば、チャンスは自然と寄ってきます。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "幾層もの低レベルの機能の上にさらに幾層もの高レベルの機能を重ねてあるので、私たちは、脊髄や脳幹や大脳辺縁系の刺激反応メカニズムを必要に応じて利用できる。「赤ちゃんが落ちる──手を伸ばして受け止めろ！」といった「とっさの」反射反応などだ。しかし私たちはもっと高度な皮質機能も持っていて、長い時間考えたり、頭の中でタイムトラベルをしたり、微妙な意思決定をしたりできる。 　このように高低二レベルの機能を維持することには利点があるとはいえ、ときにはそれが苦悩やジレンマや自己矛盾を招きうる。すでに見たように、孤独感はそうした葛藤を引き起こすのがお手の物で、私たちに温かさや仲間を求めさせる一方で、私たちの知覚を恐ろしさで歪め、自分が親しくなりたいと思う人たちに向かって厳しく批判的な態度をとらせる。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "なぜならば、企業や組織のマネジメントとは、ある意味で、 「意思決定の連続」であり、また、その意思決定も、 「正解のない意思決定」であることが大半だからです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "これは、「直観力」も「説得力」もあるが、「責任力」がないために 　意思決定に関わることのできないタイプのマネジャーです。 　この「責任力」とは、私の勝手な造語ですが、 「リスクを取り、責任を取る能力」のことです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "これからの時代のマネジャーは、その意思決定に際して、 「メンバーの意見を聞いたうえで、多数の意見に従って意思決定を行う」 　というスタイルを安易にとるべきではありません。 　それは、自分がリスクを取ることを避け、 　責任を回避するという意味では有効な方法ですが、 　こうしたスタイルからは、 　革新的な商品や創造的な戦略が生まれてこないからです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "従って、むしろ、これからの時代のマネジャーは、 「メンバーの意見を聞いたうえで、自分の信念に従って意思決定を行う」 　というスタイルを心掛けていく必要があります。 　そして、そのとき求められるのは、 　その意思決定をメンバーに納得させる力、すなわち「説得力」なのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "たしかに、非常に高度な直観力が求められる意思決定の局面において、 　最も大切なことは「いかなる選択肢を選ぶか」ではありません。 　最も大切なことは「いかなる心境で選ぶか」なのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "でも、これは出血を止めるための急場しのぎの退店ではありません。僕が閉じることに決めた４３３店舗は、厨房のサイズが制約となって新たな厨房システムが導入できない小型店や、ＱＳＣの水準がどうしても上がらない繁華街の店など。全社の戦術展開についてこれない店です。 　目先の数字を落としてでも、将来の成長の足を引っ張るところは切っておく。元気なうちにです。つまり、「手術で元気になる」じゃなく「元気になったから手術を受けられる」というシーケンスなんです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "今日は「緊急性」「満足感」「喜び」のどれをメインに置いた1日にするのかを、直感で決めることだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "「決意の切り替え」を減らす", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "決断力と裏腹にあるのが、「悩み」や「迷い」ではないか。この「実践篇」の冒頭で紹介した「決められない女性」などはそのいい例。 　まず、判断に困ったときにあまりお勧めしないのは「友人への相談」である。 　ＮＨＫの「 祝女」という番組は、 20 代からアラフォーまでの女性の恋愛・結婚模様を描き出すミニドラマ。そこで紹介されていた言葉が、 「彼氏の価値は、自分の友人からどう評価されるかで決まる」 　これは、私にとっては意外だった。男性にはない視点だったから。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "戦略コンサルタントの三谷宏治さんが、『特別講義　コンサルタントの整理術』（実業之日本社）で書いている。 「ホワイトカラーの非効率の原因は『悩み』の蔓延、つまり『悩む』という作業に多くの時間を費やしていることにある」 「まじめなヒトほど、困って悩んでいる」 「悩んでいると、ヒトは深く考えているつもりになるが、実は全く進んでいない」 「資料を作る手は止まり、同僚・友人との雑談に逃避する」", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "三谷さんが著書でどんな解決方法を提示しているか。いくつか結婚に当てはめてご紹介しよう。 ・「こだわるもの」「こだわらないもの」を切り分ける。 →なるほど。結婚ではまさにそのとおり当てはまる。あらゆる「普通」を求め続けて、譲れないポイントが多くなって「あれもこれも」で捨てられない、相手の粗探しをしてしまう人は、なかなか決まらない。 ・「決め方」を決める。判断基準を作る。 →自分でルールを作っておくことで、こだわるにしても動きやすくなる。これもいい案。結婚でいうなら、「欠点を許せるかどうかの自分なりの判断基準」なんていうのが当てはまるかもしれない。 ・迷ったら「最初の感覚」を信じる。 →なんだかんだ言っても、最初の直感は当たっていることが多い。ひょっとすると、単にルックスが好みだったのかもしれない。でも、人間 30 代以上になってくると「顔」に人間性が多かれ少なかれ現れるものである。迷ったら、最初に戻るのはアリ。 ・迷ったら、「よりわからない方」へ進む。 →これを結婚や恋愛に適用するのは賛否が分かれそうだが、面白い考え方だと思う。リスクテイクできる方なら、試してみると意外な発見があるかも。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "構想を言葉にするときには、正しいことを言うときとはまったく違うマインドセットが必要になります。慎重になるのではなく、大胆になること。根拠より、信念を持つこと。きれいごとよりも、まだ誰も言っていないことを話すこと。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "つまり、ものすごく近くにある課題とものすごく遠くにある関心事の両方を大事にする。なぜこんな話をするのかというと、その間にある中間的な領域のことはなかなか思い通りにならないんですね。どんな大学に行きたいとか、どんな会社に行きたいとか、そういったことはなかなか思い通りにはなりません。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "経営方針を打ち出したら、それで自分の仕事はおしまいで、後はよきにはからえ、というタイプの経営者がいるが、多くの場合、それではうまくいかない。 　経営トップが、役員や幹部社員だけでなく、管理職から現場の一般社員に至るまで、粘り強くその実行をフォローして初めて大事は 成就 する。そこまで経営トップが自ら動かないと、なかなかトップの思いというのは、組織の末端まで届かないのが現実だからだ。 　組織が変われるかどうかは、結局、トップの思いの強さ次第である。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "自分がなぜその手を打つのか、説明できないことも多い。ただそれが正しいということがわかるし、そういう直観はたいてい正しい。一つの駒の配置を一時間も吟味したら、堂々巡りになって有効な手は思いつかないだろう。たいてい打つべき手は一〇秒でわかる。それ以降の持ち時間は確認に使っている（ 23）」。カールセンは自分の直観を尊重しており、それ自体とても正しいことだが、同時に「確認」に長い時間を費やす。ときには直観が誤ることもあり、意識的に考えることで最終的な判断の質が高まることを知っているからだ。", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}, {"text": "市場機会を評価する ●着くテーブルを選ぶのは、自分で決められる最も重要なこと ●着いたテーブルで勝ち目がないとわかったら、テーブルを替わっても構わない ●テーブルに少々不合理なことをしたり、経験不足の人が多すぎると、最高のプレイヤーでも非常に勝ちにくい", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "意思決定能力を養い、高めていってほしいのです。失敗から学ぶ限り、私たちは失敗を奨励します。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ここで、ひとつのデータ分析の特徴を紹介しておくと、「データ分析は本質的にやってみるまで何が出てくるかわからない」。何がわかるのかがわかっているならば、わざわざ分析を行うまでもないため、これはごく当たり前のことながら、企業での活用を考えた場合に非常に悩ましい事態を引き起こす。つまり、データ分析によってどれだけの（売り上げ向上やコストの削減といった）効果があるのかが不明であるため、投資の採算性が判断できず、データ分析への投資の決断が非常に難しくなるのだ。 　さらに、やってみるまでわからないという性質は、どのデータが重要で蓄積しておくべきものなのかを事前に判断することができないことも意味する。この「分析の役に立つかもしれないから残しておこう」という考え方でデータをなんでも収集したり蓄積したりすると、当然その量は膨大になり、蓄積・分析環境への投資額が増えてしまう。 　結果、意思決定者からすると、ROIが不明にもかかわらず、絶対額は大きいというリスクの高い投資になるのである。", "book_title": "顧客を知るためのデータマネジメントプラットフォーム　DMP入門 (NextPublishing)", "author": "横山 隆治、菅原 健一、草野 隆史"}, {"text": "インドでは、Ｍ＆Ａの時に必ず星を見ます。さらに中国では、政治家は本当の自分の生年月日を公表しません。敵に星を読まれてしまうからです。特にアメリカでは、ヨーロッパからの流れを汲んでいますので、「霊性」を気にしない起業家はいません。モチロン、それを表立って口にする人もいませんが、実は大きな部分を占めていると思います。典型的な人物が、ビル・ゲイツです。ウインドウズのあたらしい発売日は、いつも占星術を参考にして決めている、と言われています。", "book_title": "黒本", "author": "高城剛"}, {"text": "ならばどうしてもっと早く結果が出なかったのか？　それは会社として頑張るべき焦点「どこで戦うか」を正しく明確に設定できていなかったからです。「マーケター」にとって、それが最重要の使命です。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "しかし「落としどころ」は、ほとんどの場合において消費者最適ではありません。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 5, "label": "創造性", "freq": 61, "highlights": [{"text": "ダーウィンが『地質学原理』を読んで進化論、すなわち自然選択説という考え方を生み出したのは有名な話です。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "アイデアが勝負の仕事なら、なおさら考える必要があります。 　仕事でよいアイデアを思いつくにはどうしたらよいか。学生時代からずっと考え続けてきた私の結論は、とにかく考え続けること。単純なようですが、これに尽きます。 　考えていなければ、ひらめくことはありません。それも四六時中、考えに考えていなければ、問題を突破できないのです。寝ているときも、考えています。最初からよいアイデアなんか出てきません。執着心と集中力。これが学者にとっては必須の条件です。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "日本人が数多くのノーベル賞を受賞してきたのは、日本語でモノを考え続けてきたことと、決して無関係ではないはずです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "たしかにインド経済は大きく成長するだろう。ただ、僕は個別のインド企業についてあまり高く評価していない。カースト制度が根強く、創造的ではないからだ。 　インドは北と南で風土が違うといわれるが、実際はもっと細かい地域に分かれている。なにしろ民族が 33 あり、言語も３３０ある。それぞれの地域にはマハラジャ（王様）がいて、マハラジャを頂点とした強固な身分制度がいまも大きくある。これが厄介なのだ。 　中国は共産党の一党独裁だが、意外に実力主義であり、優秀な人は上に登っていける仕組みがある。しかしカースト制度が根強いインドでは、いくら能力があっても身分が低ければ一生上に行けることはない。政府はもちろん、民間も同じだ。だから、優秀な人材は米国へと向かう。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "ヘンリーは、私にプレッシャーをかけたところでバグの修正法を見つけるスピードが上がるわけではなく、むしろ現在の作業がおざなりになってしまうのをわかってくれていたようだった。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "つまり「テクノロジーとリベラルアーツを融合し、ソフトウェア（中身）とハードウェア（器）の最新の進歩をデザインや文化の要素と融合させ、人々が日常生活のなかで便利で意義深いと思うような機能や製品をつくる」", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "あえて難しい解決法を採用するのが、製品を使いやすくするための最良の方法 だという気づきをよく与えてくれたグレッグは、けっして人を甘やかすタイプではない。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "こういう状況にある会社では、プロダクトマネージャーは、仕様書を作るぐらいのことしかやっていない。そんな仕事では、新しいアイデアの芽を摘みかねず、売れる製品を作るのはまず無理で、イライラがたまるばかりだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "そこで印象的だったのは、現地のメンバーが、「顧客のユーザーストーリー」を徹底的に考えていたことだ。 顧客がどんな気持ちで製品に触れ、それが顧客にとってどうプラスになるのか。この議論を何度も何度も行っていた のだ。 数多 の成功事例で自信をつけ、「遊び心のあるダイナミックな発想」と「洗練された品質」との両立を力強く推進しているように思えた。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "「あのとき君はテンパってただろう？ だからリフレッシュしてリラックスすれば、本当にやらなければならないことと、やらなくてもよいことに自分で気づくことができるだろうと思って、レイクタホに行ったのさ。シリコンバレーでダイナミックなアイデアが次々と出てくるのは、こういうやり方をするからだ」", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "行動科学者のダン・アリエリーは、出会い系サイトとブライアン・イーノの「オブリーク・ストラテジーズ」を組み合わせたような実験を行っている。", "book_title": "ひらめきを生み出すカオスの法則 (T&#x27;s BUSINESS DESIGN)", "author": "ティム・ハーフォード、児島 修"}, {"text": "その答えは、サミュエルソンの連想のバリアが低いことにある。つまり彼には、異なる概念を分野の壁を越えてやすやすと結びつける能力がある。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "これに対して連想バリアの低い人は、過去の経験とはほとんど関係のないアイデアや概念を結びつけたり、論理的に飛躍のある連想をすることが多い。そのため、せっかくのアイデアが抵抗に遭ったり、「そんなにいいアイデアなら、もう誰かが過去に思いついているはずだ」という反応をされることも少なくない。だが実際には、その結びつきは意外性に富んだものであるゆえ、過去に誰かが思いついた可能性はきわめて低いのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "もし職務の実行を最優先し、小刻みなイノベーションを一定の方向性をもって積み上げていくことを目的にするなら、専門化という方法は間違っていない。しかし、それまでにない新鮮で画期的なアイデアを生み出したかったら、個々人の体験の多様化を進めることこそが必要である。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "サットンが奨励する「変わったアイデア」のひとつは、自分を居心地悪くさせる人間、違和感を覚える人間、さらには好きになれない人間を採用せよというものだ。もし自分が「気に入った」から、あるいは「われわれと同類」だからという理由で候補者を採用しようと考えているとしたら、それは逆にその人間を採用 すべきでない 理由と考えるべきだと、サットンは言う（もちろんあくまで、その職やチームに創造性が求められる場合だが）。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "つまり、交差的アイデアを生み出したいと思ったら、自分とは異質の人間と一緒に働けるような環境を探し求めるべきだということである。いいかえれば、あなたの創造性を阻害する確実な方法は、自分と同類の人間がいる環境を探すことなのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "私たちは教育のファストフード化を容認してきました。その結果、まるでファストフードが体をむしばむように、教育が精神を弱らせることになってしまいました。……あらゆる偉業は、想像力から生まれます。ところが現代の教育システムは、まさにその想像力を奪いつづけているのです（ ２）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "大量生産による効率の向上こそが存在意義だった。当時のマネジャーたちは軍隊を見習い、厳格な管理法を取り入れた（「営業部隊」など、軍隊を起源とする言葉がよく使われるのはそのせいだ）。産業革命が終わって久しい現代でも、大半の会社がその考え方や行動規範を捨てられずにいる。 　遊びは、それ自体を目的とした行動だ。何かのためでなく、遊びたいから遊ぶ。凧あげ、歌、ボール投げ。どこにもたどり着かない行動は、一見無駄なようにも思える。しかし実は、そうした遊びこそ、人間にとって不可欠な行動なのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "遊びは脳の柔軟性と順応性を高め、創造的にしてくれます」と彼は言う。「遊びほど脳を奮い立たせる行動はほかにありません（ ３）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "遊びは、生きるために不可欠なものだ。 　最近の研究によると、動物は遊びを通じて主要な認知スキルを発達させているらしい。実際、遊びが種の生存を左右することもあるほどだ。 　 15 年間にわたってハイイログマの生態を研究しているボブ・フェイガンは、よく遊ぶ熊ほど長生きすることを発見した。彼はこう説明する。 　「世界はたえず変化し、未知の課題や不確実な状況を突きつけます。遊びはそうした変化への対応力を育むのです（ ４）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "神経科学者のジャーク・パンクセップも、同様の意見を述べている。 　「たしかに言えるのは、遊んでいるときの動物たちがきわめて柔軟で創造的な行動をとるということだ（ ５）」 　動物のなかでも、ヒトという種はとりわけ遊びが好きだ、と先述のスチュアート・ブラウンは言う。人間は遊ぶ生き物であり、遊びを通じて生き方を身につけるのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "遊んでいるとき、私たちはもっとも純粋な形で人間らしさを発揮し、自分らしさをさらけ出す。最高の思い出や、「生きている」という実感をもたらしてくれるのは、遊んでいる時間だ。遊びは発想を豊かにしてくれる。新たなアイデアが生まれ、古いアイデアが新たな命を得る。好奇心が刺激され、未知のものを知りたいという意欲がわいてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "目の前にある光景をどう変えたいのか。そのイメージを思い描くことが、グロースハックの出発点になります。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "リソース以外の何か」こそがまさに、コンセプトなのです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "・コンセプトは、ものづくりの一部 ・コンセプトは、世界を良くする方法 ・コンセプトは、あなたがしあわせに生きられる方法 ・コンセプトは、母国語を用いた文字 20 字程度の言葉 ・コンセプトは、未知の良さに形を与えたもの ・コンセプトは、ビジョンの集合体から生み出される ・コンセプトは、アイテムの集合体によって伝えられる ・コンセプトは、何を用いて、何をしたいか", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "「ユーザーは、必ず作り手の想像を超える」", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "オタクは、想像力とこだわりの精神で成立する存在です。特殊な方面の文化の担い手であると同時に、偉大なる消費者でもあります。コミックマーケットでも文学フリマでもe-sportsでもコスチュームプレイでも、その世界ごとのトップがはっきりと見えている中で、知識と活動をベースにした実に見事なヒエラルキーを形成しています。そこでは若い人がそのジャンルに常に供給され、新しい刺激が想像力を搔き立ててくれてはじめて、札束で殴り合う熱心なイキりオタク同士の熱狂が市場を形成するわけです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "細菌学者のルイ・パスツールが有名な講演の中で述べたように、「偶然は心構えのある者にしか微笑まない」のだ。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "判断を焦らない」、「野蛮なアイデアは歓迎」、「話題から逸れない」などのルールがあるが、中でも私が最重要視しているのは、「他者のアイデアをもとに考える」というルールだ。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "優秀なクリエイターは論理的にコンテンツをつくるんです。その中で希少性を高めるために、感性を利用するってことはあります。コンテンツがあふれている今は、希少性も勝負のポイントになってきますからね。でも、基本は論理なんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "要するに、社員の自己表現を尊重しているのだ。これが来訪者には強烈な印象を与えるらしい。ピクサーに行って帰ってきたら、自分の仕事人生に何か大切なもの──目に見えるエネルギー、連帯感や奔放な創造性、陳腐だが「可能性」──が欠けているような気がして寂しくなった、と言われることがよくある。私", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "私が思うマネジャーとしての自分の仕事は、豊かな環境をつくり、それを健全に維持し、それを妨げるものに目を光らせることだ。誰にでも創造性を発揮できるポテンシャルがあり、それがどのようなかたちであれ花開くのを後押しすることは心底尊いことだと思う。けれども私はそれ以上に、知らず知らずのうちにそれを邪魔し、繁栄する企業に内在する創造性を阻害するものに興味がある。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "個人の創造的貢献と、集団としての力とのせめぎ合いは、クリエイティブな環境にはつきものだが、私にとってはこれが初めての経験となった。個人ですばらしい仕事をする天才がいる対極には、いろいろな考えが集まるからこそ卓越する集団がある。私は思った。では、この二つの対極をどう両立すべきなのだろうか。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "数学においては、年齢とともに積み重なる経験などよりも、若者がもつ直感や大胆さの方が重要であるらしい。", "book_title": "フェルマーの最終定理（新潮文庫）", "author": "サイモン・シン、青木薫"}, {"text": "数学上の大きな一歩が、五十を過ぎた人間によって踏み出された例を私は知らない」", "book_title": "フェルマーの最終定理（新潮文庫）", "author": "サイモン・シン、青木薫"}, {"text": "しかし私の考え方は違っていて、「売れたとしても制約と依存の下、強大なパワーを借りて売れたなら意味はない」と思っているのです。 　例えばもし芸能人を目指すとした場合、まずネットで話題の人物になり、自己マネジメントする会社を１００％オーナーで作っておき、その会社でテレビのオファーを受けていくでしょう。 　私はそもそも芸能人ではないしそこを目指してもいませんが、どんな時でも徒手空拳の弱小であったとしても、どれだけ恥をかこうとも、制約がない大前提の上で常にアイディアと独力を持って突き抜けるという方法を選びます。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "これを文化市場での言葉に言い換えると、「本当にすばらしい作品は大コケはしないし、本当にひどい作品が大ヒットするということもないが、それ以外はなんでもあり得る」ということになります(つまり、傑作が平均以下しか売れないこともあるし、凡作が大ヒットすることもあるということです)。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "もちろんオフィスで働く人たちにも、趣味くらいはあるだろう。でも、趣味を応援するために休暇や支援金まで与えている会社は多くない。 　ひらめきや創造性は、多様な経験のなかから生まれてくる。リモートワークをとりいれるなら、社員の生活の幅を広げるためにどんどん支援したほうがいい。 　メンバーに生き生きと働いてもらうためなら、それくらいは安いものだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "僕らの会社では、働きすぎをふせぐためにユニークなしくみを用意している。 　たとえば５月から 10 月にかけては、週の休みを１日多くする。気候のいい時期に、なるべく外にでて息抜きをしてほしいからだ。また社員の趣味活動を支援しているし、クリスマス休暇にはさまざまな企画旅行をプレゼントしている。 　働かないチームはいらないが、仕事ひとすじのチームも困りものだ。うまく息抜きできる人のほうが、長く安定して成果をだしやすい。 　働きすぎず、休みすぎず。週 40 時間くらいが、ちょうどいい目安になるだろう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "一方で人間がコンピュータが行なう相関関係の解析に比べて優位なのは、 少ないサンプルからパターンを見つけ出し、知識を転移させていく想像力を使った仕事 です。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "つまり、偉大な創造的な仕事をした人は、中年において重い病的体験をし、それを克服した後に創造活動が展開される、というのである。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "人を説得する原則❼　 相手に思いつかせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "そして〝産業革命〟の意味を、誰でも高品質の商品を作り出すことを可能にしたものととらえるなら、〝情報革命〟とは誰でもが高品質の企画を生産することを可能にするものになるはずだ。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "香水は、いいにおいばかりで作るとうまくいかず、１つぐらいすごく臭いにおいを入れると魅力的な香りになるといいます。同様に、欠点のないアイデアは、愛着もわかないし、記憶にも残らない。メーカーから、ネガティブ・チェックやユーザー調査をしすぎた結果、たしかにコスト・パフォーマンスはいいし、使い勝手もいいけれども、わざわざ買わないな、という個性のないものができてしまった、といった話を聞くこともあります。 商品はやっぱりキャラが大事。キャラクターにはみんな欠点があります。「ドラえもん」はネズミが苦手だし、しっぽを引っ張られたら電源オフになっちゃう。その「弱さ」があるからストーリーが生まれるし、感情移入もできるんです。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "私の場合、アイデアの「整腸薬」は、日常生活に潜むちょっとした「違和感」です。たとえばスーツを着替えるときに、まず上着を脱いでハンガーにかけますよね。その次にズボンをかけようとすると、上着が邪魔していたりします。 また、片方の手に歯ブラシ、もう片方の手に歯磨き粉を持っていると、歯磨き粉のキャップを開け閉めするときに、歯ブラシが邪魔していることに気づきます。 そういった、ほとんどどうでもいいような「違和感」は、「当たり前の行為」や「ありきたりのモノ」の周囲に何食わぬ顔をして居座っていることが多く、 日々「気づきつづける」ことが、アイデアが出やすい体質にしてくれているようです。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "もっとも、独りでいても孤独を感じるとはかぎらない。精神科医アンソニー・ストーは著書『孤独』で、ときおり独りになる喜びについて論じ、それを勧めてさえいる。博物学者が熱帯雨林で調査を行なう、ピアニストが何時間にもわたって練習を続ける、あるいは自転車選手が山道でトレーニングをするといった場合を思い浮かべてみるといい。祈りや瞑想、学問の研究や著述をするにも、長時間、独りになる必要がある。これは多くの芸術的・科学的探究についても言える。家庭を持って時間に追われている現代人の大きな不満の一つは、「自分のための時間がない」ということだ。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "幸せで孤独感の低い人のほうが、職場でのものも含めて良好な人間関係を築いていることは確かだ。幸福そのものよりも、むしろこの良い関係こそが業績を伸ばし、良い勤務評定を得て昇進する可能性を増やし、キャリアを発展させるのによりふさわしいネットワーク作りの機会を提供するのかもしれない。幸福感は、低い孤独感と組み合わさった場合、より独創的な意思決定も促すようで（ 22）、それが経済的報酬の増加につながりうる。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "人間の祖先は、協力的な行動を目にすると、現在では愛情や信頼と呼ばれる感覚を味わった。ごまかしや裏切りに遭うと、現在では敵意や不信、怒りと呼ばれる感覚を味わった。これまで何十という例を通して述べたように、私たちは、孤立感を覚えているときには攻撃にさらされているようにも感じ、健康を損ね、人生がつまらなくなり、人と協力してうまい解決策を見つける能力が衰える。逆に、社会的なつながりに満足していると安心感を覚える。安心感があると、より創造的に考えられる。そのうえ、ポジティブな情動を期待し、しばしばそれを味わう。これは長い目で見て生理的に良いだけではなく、気分もすぐに高揚し、それが持続する。気分が高揚すると、他者に対するその後の行動にも良い影響が出て、それが今度は私たちに対する他者の行動にも良い影響を与える。するとそれがまた創造的な協力関係を促す。因果が巡り巡って、ポジティブな影響がさざなみのように四方八方へ広がり続ける。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "そして、この例に象徴されるように、これからの時代には、 　革新的な商品の開発や、創造的な戦略の創出は、 　優れた一人のプロデューサやマネジャーの 　直観力によって生み出される場合が増えていくのです。 　そして、そのことは、裏返して言えば、 　多数の意見が正しさを保証しない場合が増えていくことを 　意味しているのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "これからの時代のマネジャーは、その意思決定に際して、 「メンバーの意見を聞いたうえで、多数の意見に従って意思決定を行う」 　というスタイルを安易にとるべきではありません。 　それは、自分がリスクを取ることを避け、 　責任を回避するという意味では有効な方法ですが、 　こうしたスタイルからは、 　革新的な商品や創造的な戦略が生まれてこないからです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "少子高齢化とか健康志向とか言われる時に、あえてボリューム満点のハンバーガーをぶつける。なぜか、と理由づけしろと言われればできますが、一番の理由は単純な話で「驚かせたかった」ということです。コンシューマー（消費者）の心を引くために大事なのは、いい意味でお客さんの期待を裏切ること。驚かせることです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "人類の歴史を振り返れば、非典型的な脳の持ち主の中に、興味深い可能性が見いだされてきた。アルベルト・アインシュタインは、五歳になるまで 殆ど言葉を 喋らなかったという。今日の基準から言えば「学習障害」だったのではないかと推定される。そのアインシュタインが、長じて、「相対性理論」によって人類の認識の革命を起こしたのである。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "また、 紙のほうが気の向くままに取り組める。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "それに、 紙に書くほうが可能性が広がる。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "構想を言葉にするときには、正しいことを言うときとはまったく違うマインドセットが必要になります。慎重になるのではなく、大胆になること。根拠より、信念を持つこと。きれいごとよりも、まだ誰も言っていないことを話すこと。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "ビジョナリーワードの三つの条件として「 解像度」「 目的地までの距離」「 風景の魅力」が必要だと言うことをすでに述べました。 言葉にすることは、未来から届く絵ハガキをつくること。そう意識しながら、頭の中の曖昧な風景を、解像度を上げた言葉で具体化したり、もっと魅力的な景色が浮かぶ単語を探したりと試行錯誤しながら、紙にたくさんの言葉を産み落とす。地味ですが、それが最も本質的で、建設的なやり方です。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "井深大氏は「マーケット・サーベイによって新製品を企画することは、アメリカの常識になっているが、真に新しいものは、ものを出すことによって、初めてマーケット・サーベイができるのだ」とし、「マーケット・クリエイション」の必要性を訴えました。 またスティーブ・ジョブズは「人は形にして見せてもらうまで、自分は何が欲しいのかわからないものだ」と仲間に語りました。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "あるいは商品開発にしても、使い手のことをほんとうに考えた優れた設計というのは、驚くほどムダのない、実にシンプルで美しい構成になっている。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "つまり言語というのは、直接的満足の延期であり、もっと簡単に言うと我慢なんですよ。その直接的満足の延期が、メタファーの存在に通じている。何か言い足りていない、真理に到達していないという不満が言語活動にはあって、その不満の周りでさまざまな言葉をああでもない、こうでもないと展開することによって、豊かな言語態が成立するわけです。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "そこで、これまでの人生で最高に幸せを感じた時のリストを作ってみてわかったのは、幸せを感じたどの時も、お金を伴ってはいなかったということでした。わかったのは、何かを作っているとか、クリエイティブで独創的でいると私は幸せだったということでした。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "考えてみてください。ちゃんとリスクを取っていますか。失敗することを恐れていますか。居心地のよい場所に甘んじずに、そこから外へ踏み出していますか。取り組んでいる仕事に冒険心や創造性が発揮されていますか。あなたがザッポスに貢献できるクリエイティブなこととは何ですか。オープンな心で状況と課題に向き合っていますか。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 6, "label": "コミュニケーション", "freq": 59, "highlights": [{"text": "考えたり、その内容を伝えたりすることがなければ、言葉をしゃべる意味などありません。それはただ、動物がシグナルを交換し合うのと大差はないのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "「知らない人」には「知ってもらう」 【認知施策】 「知っている人」には「欲しいと思ってもらう」 【欲求施策】 「欲しいと思った人」には「買って（申し込んで）もらう」【獲得施策】 　必ず上の対象者が存在し、下の施策が必要となる。 　外部オーディエンスデータは自社ブランドを知っている可能性が低いため、知ってもらう【認知施策】から行う必要がある。 　一方、内部オーディエンスデータはサイト訪問経験があることがわかっているため、そのブランドをより理解してほしいと思ってもらう【欲求施策】からの開始となる。 　内部と外部のデータ性質を理解し、自社のデジタルマーケティング戦略の中での位置を明確にしたうえで実践することで、より正しいオーディエンスへ正しいコミュニケーションを取ることが可能となる。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "ベースキャンプでは、回答はすぐに来るものではなく、そのうちくるものという文化をせっせと育んできた。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "世の中が複雑になり、個人の利害が錯綜するようになると、法律によって利害を調整し、紛争を解決する必要性が大きくなる。客観的に判断できる形で物事の良し悪しを定めたものが法である。法化社会とは人々の生活のなかに良し悪しの基準がより深く入り込んだ社会を意味している。 　インターネットに代表される電子的なコミュニケーションの発達が「良し悪し優先、好き嫌い劣後」の傾向に拍車をかけている。自分の個人的な好き嫌いについての発言であっても、それを受け取る他者が良し悪しの基準を持ち出して「間違っている！」と批判する。ちょっと考えてみれば単に好き嫌いの違いによることが多いのだが、出来合いの良し悪しにすり替えた批判や苦情が即座に不特定多数の人々に拡散し、場合によっては「炎上」という成り行きになる。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "複雑なことを簡単に理解させる。これで初めて相手が行動するわけです。常に簡単に考える。非常にシンプルに考える。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "私はよく「難しい話をするのは、その人が本当のことをわかってない証拠」と言っています。これは医学、数学、物理、人文科学でも社会科学でも何でも一緒だと思います。本当に理解している人の話は簡単でわかりやすいです。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "レビューの難しさは、「言わなければならないこと」と「傷つけないようにすること」の２つを両立させなければならない点にある。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "都会育ちの私は、個人情報が保護されるとか、プライバシーが守られるとか、そういうものが生きる上で大事なことなのだと教えられてきた。しかし、こうした地域ではそんなものは無用である。もしかしたらむしろ有害であるかもしれないとも思わされる。 　個人情報の保護とは、ひとが効率というものに支配されて互いに非効率であるコミュニケーションをとらなくてもよくなるためのツールである、と、こうした地域にいると思う。効率のためにやめたコミュニケーションは個人情報の保護を必要とし、その制度を作ったことでますますコミュニケーションはしなくてよくなってしまった。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "東南アジアやアフリカを旅していると、ひととの距離がとても近いと感じる。もちろんバンコクのような都会では少し距離を感じるが、ほんの少し地方に行くと、ひととの距離はずっと近い。外国人がいないような地域に行くと珍しがられて周りにひとが集まる。ひととひとは簡単につながるのだとわかる。ひとはコミュニケーションをとる生き物だということを思い出す。 　旧海部町を歩き、私はふと、そういう雰囲気を思い出していた。あいさつをすると、あいさつが返ってくる。それだけで話が弾むことはないが、少しこちらから会話を続けようとすると、少し続く。それはとても自然で、コミュニケーションに慣れていることを感じる。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "「病、 市 に出せ」 　この地域には昔から大事にされているこのことばがあると事前に聞かされていたから、私はなるほどと納得した。 　内にためず、どんどん市、自分の住む空間に出しなさいという教訓。 　確かに私はたくさんの病を聞いた。私は自分が精神科医だと名乗ってはいなかった。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "その理由は「説明はするけど相談はしない」といった話に象徴された。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "これによって空いた時間は、より信頼を創るコミュニケーションに当てることで、ユーザー側にも企業側にもメリットがある仕組み", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "アフターデジタルにおいてリアルチャネルは、『密にコミュニケーションを取れる貴重な接点』であり、高い体験価値や感情価値が求められるようになる」", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "現金支払いと大きく違う点は、会計が一瞬で終わるので、ほとんど支払いを意識しなくなってきている点です。支払いを意識しなくなると、コーヒースタンドは「コーヒーを買いに行く店」というより、「気のいいお兄ちゃんがコーヒーをふるまってくれる場所」へと変わっていきます。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "商品を使うときや見かけたときに思い浮かぶバックストーリーではなく、ユーザーにその世界観の上に乗ってもらい、そこでいかに自発的にコミュニケーションや体験を創り出していくかが求められています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "本当に、既読システムを人類に持ち込んだ人、いい加減にしてほしい。自分が送ったメッセージが相手に読まれたかどうかなんて、そんなところまで世界の解像度は上がってくれなくてよかった。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「なんか、生き物として弱いことが前提のコミュニケーションなんですよね、今って。お互いに、困ってることがある、助けてほしいことがあるっていうのがデフォなんです。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「雑談って多分、ケアなんですよ。内容がどうっていうよりも、相手とかその場自体をケアするものなんですよね。父親にはそういう精神がないっていうか、そういうのを身につける機会がなかったんだろうなって。強いことが前提のコミュニケーションばっかりだっただろうから、ある意味仕方ないんでしょうけど」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "目標を共有するためには、お互いに隠すところなくすべてをさらけ出し、深いところでわかり合うことが必要 です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "この子のどこが面白いかな」と 興味を持って観てあげる ということにあるのです。興味を持って観ると、相手の心を導くための糸口が見えてくる。", "book_title": "コミュニケーションのための催眠誘導～「何となく」が行動を左右する～ (光文社知恵の森文庫)", "author": "石井 裕之"}, {"text": "ところが、面白いことに、表現の仕方はこの逆になるのです。Ｐは本心を含ませて遠回しに話し、Ｅは自分の言いたいことをはっきりと言う。", "book_title": "コミュニケーションのための催眠誘導～「何となく」が行動を左右する～ (光文社知恵の森文庫)", "author": "石井 裕之"}, {"text": "これって、人間関係の「空気を読む」から、仕事本来の価値に関する「行間を読む」能力にシフトしてきたんだなと思うわけであります。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "会議で出席者を見定める彼独自のやり方があり、それは、「こんなチャートはあてにならない！」とか「クソみたいな取引だ！」などと乱暴で決定的な発言をし、相手の反応を見るというものだった。反論する勇気のある相手は、一目置かれることがある。スティーブに小突かれ、そして覚えてもらえる。それが人の考え方やそれを押し通す覚悟があるかどうかを見極める彼なりのやり方だった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "彼を見ていると、エンジニアリングの原則を思い出した。イルカが魚の群れの居場所を突き止めるためにエコロケーションを使うように、鋭いパルスを発信することは、自分を取り巻く環境の重要な事柄について知る手だてになる。人に対するあの強気な接し方は、生物学的な超音波探知機のようなものだった。スティーブはそうやって周囲を見定めていた。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "僕らの経験上、毎日４時間はみんな同じ時間に働いたほうがいい。そうすればコミュニケーションもうまくいくし、チームの一体感がでてくるからだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "リモートワークでは、オフィスで働く以上に、人のつながりが重要になってくる。距離を克服するためには、良質なコミュニケーションが不可欠だからだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "文字だけでやりとりするとき、人は悪いほうに流されやすくなる。ちょっとした言葉のあやが、大がかりなケンカを引き起こすかもしれない。トラブルの芽は一瞬のうちに 摘み取らないと、疑いの気持ちがどんどんふくらんでしまう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "人を動かす原則❶　 批判も非難もしない。苦情も言わない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を動かす原則❷　 率直で、誠実な評価を与える。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人に好かれる原則❶　 誠実な関心を寄せる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人に好かれる原則❷　 笑顔で接する。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人に好かれる原則❸　 名前は、当人にとって、最も快い、最も大切な響きを持つ言葉であることを忘れない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "偉大な心理学者ジグムント・フロイトは、偉大な聞き手であった。かつてフロイトと話す機会のあった人が、次のように説明している。 「フロイトのことは生涯忘れられない。彼には、私がこれまでに会った誰にもない資質が見受けられた。彼の目は穏やかで優しかった。精神分析の時の〝魂を見通す目〟などまったく感じさせない。声は低く、温かで、身ぶりはほとんどない。私の言葉に注意を集中し、下手な言いまわしにも耳を傾け、それなりの評価を与えてくれた。このような聞き方をしてもらえたことが、私にとってどんなに素晴らしい経験だったかご想像にまかせる」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人に好かれる原則❺　 相手の関心を見抜いて話題にする。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❷　 相手の意見に敬意を払い、誤りを指摘しない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❹　 穏やかに話す。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❺　 相手が即座に〝イエス〟と答える問題を選ぶ。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❻　 相手にしゃべらせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❷　 遠まわしに注意を与える。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "逆に言えば、私たちの脳はコミュニケーションの力を発達させるように進化してきたのです。 　いま、確実に言えることは、 コミュニケーションがうまくできない人はこれからの人工知能時代では生きにくい という点です。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "・知識や教養、肩書きや組織に依存しない ・不特定多数の人と自由にコミュニケーションする ・「身体性」を向上させる", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "「ノー」を「イエス」に変える技術の答えは、相手の中にあります。 ここまで読み進めていただくうちに、気づいた方もいらっしゃると思います。「お願い」は、あなたのコトバではなく、あなたと相手の共作 なのです。あなたのハッピーと相手のハッピーをいっしょにつくりあげることなのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "視線をやりとりすることは、相手の心を読み取る上で大切な働きである。それと同時に、場合によってはコミュニケーションを縛る 桎梏 にもなる。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "シンプルなショートメッセージなど、急な用件の連絡方法を1つだけ残しておけばいい。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "たとえば家族と連絡を取り合うためにフェイスブックを使っている場合、本当にそれがいちばんいい方法だろうか？　電話をかけたほうがよくはないだろうか？", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "アメックスカードの、個別ダイレクトセールスは、羽田や成田、Costco などでブースを出し、道行くビジネスマンに声をかける手法。分刻みスケジュールの彼らを立ち止まらせて時間をもらう難易度はすごく高い。 　まず、声をかけたその瞬間の好感度は必須である。彼女らのルックスは採用の合否を決める一つの重要要件。でも、それだけでは話を聞いてはもらえない。 　彼女はまず、「これは」と思った人の持ち物や身に着けているものを、すばやく観察する。で、人と違うポイントを見つける。アイテムとしては、メガネ、時計、カバン、靴などが定番のチェックポイント。スクラッチカードを渡して足を止めさせているその瞬間に、「素敵な、珍しい時計ですね？」と語りかける。こう言われると、男性はちょっと驚きつつ、「よくぞ聞いてくれた！」とばかりに薀蓄やエピソードを語り始める。 　また、社章を着けている人も要チェックだそうだ。わざわざ外出先や出張に行くときまで社章を着けているのは、自分の会社に誇りを持ち、「見て見て」という気持ちが入っていることが多い。これもトークに持ち込む材料になる。 「親密になるためには、答えを出しやすいお天気や『ご出張ですか？』といった一般的な話題に行きがちになるが、『そのひと個人』にフォーカスした話題を見つけられれば一気に壁を飛び越えられる」とは彼女の弁。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "偉くなる人に限って文章が簡潔でうまい」という仮説を私が働く業界の大物に話してみたところ、その人も「文章能力は仕事能力の大きな部分を予測させる」 とおっしゃっていたものだ。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "心理学者のヴィゴツキーは、人は語彙を増やすことで対人的コミュニケーション能力だけでなく、内面における思考能力を高めていると考えました。そして外側に向かう言葉を「外言」、内側で思考の道具となる言葉を「内言」と呼んで区別したのです。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "パソコン通信やインターネットの世界に、コミュニケーション・チャンスを見出したオタクたちが、「包摂（inclusion）」によって 剥奪 感を軽減されていくという変化もありました。そうした変化によって、オタクのコミュニケーションは、「薀蓄の競争（a kind of knowledge-battle）」から「コミュニケーションの戯れ（a kind of dalliance）」へとシフトしました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "ファンの人数が少なければ、「物販」でも長く会話ができるので、地下アイドルはひとりひとりの名前と顔を覚えることができます。ファンにとっても、歌っている間に「レス」をもらえる確率が上がります。これが距離感が近いということです。 「レス」とはアイドルから客席のファンに手を振ったり、指を差したり、目を合わせたりするアクションのことで、「物販」とはライブ後に地下アイドルが自ら、グッズの販売や、サインや握手を行なうことです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "とにかく定期的に人前でライブをして、物販（終演後に行なわれるチェキ撮影や、ＣＤ、オリジナルＴシャツやタオルなどを販売する場）で直接ファンと会話をすることが地下アイドルの仕事であり、唯一、地下アイドルであり続けるための条件とも言えます。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "この「シンプルで美しい」というのは、私は仕事をやる上でとても大事なキーワードだと思っている。難しいことをさも難しく話すのは誰でもできるが、誰が聞いてもわかるようにかみ砕いて話すのは、実は相当に難しい。話の核心をきちんと理解し、誰が聞いても心にストンと落ちるような平易で簡潔な言葉に置き換える必要があるからだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "情動的表現が前面に出てくると、解釈が必要な言語は邪魔なわけですよね。もっと直接に情動を表現できる絵文字、エモティコンが幅を利かすようになる。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "ＬＩＮＥやWhatsAppでわかったのは、日常のコミュニケーションにはスタンプや絵文字などのエモティコンだけで十分だったということでしょう。それは尻尾を振って喜びを表現するタイプのコミュニケーションに近づいている。そして、以前も話した通り、それと並行してメタファーや無意識の弱体化が起こっている。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "講義というのは内容の伝達であると同時に、そうした理解の仕方という思想のレベルでのコミュニケーションであって、それを通じて教師も学生も成長していくわけですよね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "マーケティング担当者が陥りがちなもうひとつの落とし穴は、本来ならエンゲージメント（絆） や信頼を築くことに集中すべき時に、いかに話題性を持つかを考えることに集中しすぎることです。私の母はもの静かなタイプですが、そんな母が何か言う時、私は耳を傾けます。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "強い絆を持つための重要な要素は、気持ちのつながりを育むことです。人間関係において常に正直に行動し、思いやりを持ち、気さくで、誠意を持ち、すべきことをするように気を配り、人間関係を大切にすることが重要です。信頼を築くことは最も難しいことですが、信頼があれば、はるかにたくさんのことを成し遂げられます。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ザッポスでは、考え方、意見、バックグラウンドの多様性を歓迎しています。あなたの人間関係が広く多様なものになればなるほど、あなたが会社に与えられるプラスの影響は大きくなり、あなたはますます会社にとって価値のある人になります。人間関係構築のためには、心に響き、オープンで、誠実なコミュニケーションがきわめて重要なのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちが講演をする際はいつも、ザッポスのコア・バリューを用いています。講演をするという機会をザッポスの広報活動にあからさまに使うのではなく、聴衆が「成長と学びを追求する」よう手助けをするために、私たちがどのように物事に取り組んでいるかについてできるだけ分かち合おうとしています。さらに「コミュニケーションにより、オープンで誠実な人間関係を築く」ように努めようというコア・バリューに沿って、私たちは喜んで数字やそのほかの詳細情報をシェアしています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 7, "label": "マーケティング", "freq": 55, "highlights": [{"text": "日本では、埼玉県の川越市が成功例だと思う。 20 年前の観光客数は２００万人だったが、古い街並みを「小江戸」とブランディングしてから観光客数が増加。いまや４５０万人に達している。川越以上の観光資源を持つ地域は、日本中に数多くあるが、戦略がいかに大事であるか、の好例だと思う。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "アンバサダー・マーケティングの効果が高い最大の理由は、信頼性が高いからだ。", "book_title": "アンバサダー・マーケティング", "author": "ロブ フュジェッタ、土方 奈美、徳力 基彦（解説）、藤崎 実"}, {"text": "アンバサダーは一〇〇人を超えているか", "book_title": "アンバサダー・マーケティング", "author": "ロブ フュジェッタ、土方 奈美、徳力 基彦（解説）、藤崎 実"}, {"text": "必ずしも万人が知っているブランドである必要はない。ただ消費者があなたのブランドを少しでも知っていないと、おススメする可能性は低い。", "book_title": "アンバサダー・マーケティング", "author": "ロブ フュジェッタ、土方 奈美、徳力 基彦（解説）、藤崎 実"}, {"text": "あるマーケターは最近、こんな言葉を口にした。「今日、レストランのマーケティングの成否は、自らが何を言うかではなく、周囲に何と言われるかにかかっている」と。", "book_title": "アンバサダー・マーケティング", "author": "ロブ フュジェッタ、土方 奈美、徳力 基彦（解説）、藤崎 実"}, {"text": "「応援広告って正直、相当斬新なものでない限りファンダムとアイドル本人だけが盛り上がって終わり、なんですよね。あそこに充てられた資金分、ＣＤやグッズの購入に誘導できたはずなので、そこは我々の反省点です」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "たくさんの人を巻き込めるかどうかって、なにによるんでしょうか。 川上 　知識の集大成としての完成度の高さっていうのは、ひとつの要素としてあるんじゃないでしょうか。完成度が高ければ高いほど、科学や論理からの攻撃に耐えうる。そしてどれだけたくさんの人を説得できるかどうかは、マーケティングの問題かなと思います（笑） ──　たしかに（笑）。宗教もそうですが、広がっていく初期のころにマーケティングがうまい人がいるかどうかはそうとう重要な気がしますね。 川上 　理論武装っていうのも、文系的な言葉ですよね。言葉を道具、手段だと思っている人の言葉。そして、イデオロギーというのは、理論武装された知識の体系なんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "ＮＰＯや社会起業といった選択肢が、社会に貢献できる唯一の方法であるかのように、「世の中の役に立ちたい」と考えるナイーブな学生に思わせたのは、非営利セクターの作戦勝ちと言えるでしょう。 一方、営利セクターに属する企業は、他の民間企業との採用競争のみに注力し、事業を通して利益を上げ、税金を納めて社会に貢献することの意味や、革新的なサービスや商品の提供を通して世界を発展させるという営利セクターの意義を、就活学生に広めることに成功していません。 アップルやアマゾン、そしてトヨタやパナソニックのような営利企業の多くは、長きにわたって、人々の生活を驚くほど豊かにし、社会の役に立ってきました。本来、営利企業と非営利組織の違いは、「社会の役に立つか、立たないか」などという違いではありません。 それなのに、「社会のためになる仕事がしたい。だから公的機関かＮＰＯで働く！」などと非論理的なことを言う人が現れるのも、営利セクターに属する企業が採用市場における市場の入れ子構造を十分に踏まえたうえで、メッセージを発信できていないためなのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "寄付をする人の中には「教育費なら寄付してもいいが、生活費に消えるなら寄付をしたくない」という人もいます。できるだけ高尚なことに貢献したいと考える人です。 国連ＷＦＰ（World Food Programme）では、「途上国では給食が出るから、子供たちは学校にやってくるのです」と、寄付獲得競争において競争力の高い「教育」というキーワードを前面に出し、寄付の集まりにくい食費を集めることに成功しています。「食費なんてその場で消費されるだけだが、教育に寄付をすれば、国づくりにも役立ちそうだ」と考える人の気持ちを理解した、巧みなマーケティングです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "そして、この点に注目して成功したのが、秋元康氏がプロデュースするＡＫＢ 48 です。歌や踊りのレベルが高くなくても、ひたむきに頑張る姿を見せることに価値があるのは、甲子園児だけでなく芸能人でも同じだと見抜いたのは、秋元氏の 慧眼 でしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "効果的なテレビＣＭを打てば売れるだろうとは思ったが、その案は却下した。１セット１万５０００円の空調服のＣＭを流したら、「ワークマンは安い」「ワークマンは値札を見なくても買える」というブランドイメージを損なう。そのほうが痛手だ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "もともとあった製品をマネキンに着せて違う客層（アウトドア一般客） に販売する。これがすべてだ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "当社のマーケティング戦略では、広告宣伝しなくても自然に売れる製品を目指している。それにはダントツ製品が必要だが、いきなりは無理だ。強みの強化には時間がかかる。 大切なのは、社員に ノルマや期限を設定せず、プレッシャーをかけない こと。 プレッシャーをかけてできるくらいの「強み」は数十年市場で耐えられる「本物」の強みではない。強みは企業風土とも関わり、そう簡単にはできない。時間をかけてじっくり育て上げるべきだ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "それを回避するには、 自分たちがお客様とする消費者になりきって考える ことが大切だ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "アンバサダーは、その分野のオピニオンリーダー。その分野について次なるトレンドを創り出す影響力を持っている。だからその人の意見を聞くのが一番いい。その分野に詳しくない一般人１０００人の意見を聞くより、影響力のあるアンバサダーの言うことをほぼ「丸呑み」して製品に反映したほうが絶対にいい。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "「勝者は、ちがいをつくりだす」 　ということだ。前述の通り、代官山蔦屋書店は「お金と時間に余裕のある大人向け」のおしゃれな店づくりをしている。お金のある大人たちが車で来店し、たくさんの商品を買って、車に積んで帰っていくことを狙っている。ということは、そんな大人たちがどうすれば「来店したくなるか」を考え抜いたはずだ。 　私は、そのひとつの答えが「駐車場」にあると確信している。", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "他に覚えておくとよいフレームワークとしては、コトラーのマーケティングのプロセスであるＲＳＴＰＭＭＩＣも覚えておくとよいでしょう。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "「新しいタイプの顧客の特性は、マーケティングの未来がカスタマー・ジャーニー全体にわたってオンライン経験とオフライン経験のシームレスな融合になることを、はっきり示している」（Kotler 2017）のである。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "ある調査によると、いまでは「マーケティング・コミュニケーションよりもＦファクター（friends=友達、families=家族、Facebook fans=フェイスブックのファン、Twitter followers=ツイッターのフォロワー）が信頼されるという」（Kotler 2017）。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "１つは消費者はどのようにして購買意思決定に必要な情報を集めているのか、もう１つは商品はどのようにFulfill（運ばれる／満たされる）されるのか、である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "「これしかない」 その商品だけにしかない物語を伝える。開発ストーリーや、その商品が開発されるまでの過程などを詳細に伝えて「これしかない」と理解してもらう。この商品とボクが出会ったことは、運命かもしれない・・・そんな風に感じさせる発信力が大事となる。 「ここしかない」 このお店にしかない。通販限定商品である。お客様に「ここしかない」と納得してもらうことである。他のお店に行ってもあると思われたら購入機会の損失である。 「いましかない」 いつでも買えるが、いちばんの敵。いまなら特別価格で。これから限定●●名様に。期間限定の特典を付加することは購入動機の背中を強く押す。期間セールやタイムセールの設定は、お客様の反応を大きく左右する。", "book_title": "地域Ｎｏ.１を目指すな！地域繁盛店の売上を５０倍にする・中小企業向けダイレクトマーケティング論: 地方だから成功できる！ 売上があがるウェブマーケティングシリーズ", "author": "覚田 義明"}, {"text": "少子高齢化とか健康志向とか言われる時に、あえてボリューム満点のハンバーガーをぶつける。なぜか、と理由づけしろと言われればできますが、一番の理由は単純な話で「驚かせたかった」ということです。コンシューマー（消費者）の心を引くために大事なのは、いい意味でお客さんの期待を裏切ること。驚かせることです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "メガマックやクォーターパウンダー、最近では「Big America」シリーズがその好例ですが、そういった消費者を「驚かせる」ような新商品を出し、消費者の関心をぐいっと引き寄せて爆発的にヒットさせる。でも、それだけでは「儲からない」んです。 　なぜか。消費者の認知を集めるために、大きなプロモーションコストがかかるからです。じゃあなぜ奇抜な新商品を出し続けるのか。それは、その集客力でキャッシュカウを育み続けるためです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "普段あまりマクドナルドに足を運んでおられない方が、「クォーターパウンダー」という新商品の魅力で足を運ぶ。１時間目にお話ししたように、ＱＳＣ（＊９） の水準を高めていれば、その「新規顧客」は「マクドナルド、いいじゃないか」と認知してくれて、また来訪してくれる。その顧客は、いつかキャッシュカウであるビッグマックを注文してくれます。そこできちんと利益が取れるわけです。 　つまり、極論すれば「ビッグマックをどれだけ買ってもらえるか」を指標として経営の舵取りをしていく、ということです。サイドメニューの開発、新デザインの店舗の出店、ドライブスルーの拡充、コーヒーの無料配布。様々な手を打ち続けていますが、いずれも「ビッグマックを買ってもらうため」と言うこともできるんです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "「５ＧＢのＭＰ３プレイヤー」は単なるスペック情報ですが、「一〇〇〇曲をポケットに」とはプロダクトの体験について語った言葉です。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "社員〝全員〟に、ザッポス・カルチャーが自分にとってどんな意味を持つのか手短に書いてもらおう。そしてそれを本にするんだ」 こんな風にしてザッポス・カルチャー・ブックのアイデアは生まれ、それ以来それはザッポスにとって不可欠なものとなっています。毎年、ザッポス・カルチャー・ブックの改訂版が作られ、私たちはこの本を採用内定者、メーカーなど取引先、そして顧客にも配っています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ほかの会社のカルチャー・ブックを読みたいと「求めてくる」人がいることに、私はいつも驚きます。（投資家や人事関係者以外で） 会社の年次報告書か従業員の手引きを読みたがっている人がいるという話を聞いたことはありますか。 ザッポスが何を売っているのかさえ知らないのに、カルチャー・ブックの背後にあるアイデアを知りたがる人がいることを考えると信じられません。そのような方が、いつかそのうち、次に新しいジーンズか靴が必要になったらザッポスを思い出してくださるかもしれません（ちなみに、カルチャー・ブックの制作費は一般的に思われているよりもずっと値頃だということは触れておく意味がありますね）。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "この何年も、ザッポスの成長の一番の原動力となっているのがリピート顧客とクチコミです。広告にはほとんど費用をかけず、その費用をカスタマー・サービスと顧客体験に投資し、私たちに代わって顧客にクチコミでマーケティングを担ってもらおうというのが私たちの哲学なのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "配送料の増加は私たちにとって負担ですが、私たちはこのコストをマーケティング費用と考えています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "一般に、マーケティング部門がマーケティングＲＯＩを計算する際、顧客の生涯価値を一定にして考えます。私たちは、顧客の生涯価値を流動的なものと見なしており、あらゆるやり取りを通して顧客の心の中に私たちのブランドとのよりポジティブな絆を作り出せれば、顧客の生涯価値は向上できると考えています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "マーケティング担当者が陥りがちなもうひとつの落とし穴は、本来ならエンゲージメント（絆） や信頼を築くことに集中すべき時に、いかに話題性を持つかを考えることに集中しすぎることです。私の母はもの静かなタイプですが、そんな母が何か言う時、私は耳を傾けます。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "電話経由での売上げは総売上げの五％程度にすぎないのに、ネット企業がそれほど電話を重視することを不思議がる人も多いことでしょう。実際、私たちが受ける電話のほとんどが売上げを生んでいません。しかし、平均的に見て、私たちの顧客は一生にどこかの時点で少なくとも一度は私たちに電話をかけてくることを知っているので、私たちはその機会を使っていつまでも記憶に残る思い出を生み出すように心がける必要があるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "自社の商品とサービスで常に人を「ワオ！」と驚かせることに専念していれば、いずれメディアがそのことを聞きつけるということです。あなたの会社が素晴らしい商品や体験を人々に届けるようなことで面白いエピソードという副産物を自然に生み出しているのなら、メディアに働きかけることに多大な労力を使う必要はないのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "企業にとって自社で構築するプライベートDMPがなぜ重要かというと、マーケティング最適化のためにユーザーをセグメントできるのは、企業自身であるからだ。自分たちにとって対象となるユーザーをどうセグメントするかは、これから重要なマーケティングスキルとなる。", "book_title": "顧客を知るためのデータマネジメントプラットフォーム　DMP入門 (NextPublishing)", "author": "横山 隆治、菅原 健一、草野 隆史"}, {"text": "「まずは広告で〝見込客〟 を徹底的に集め、その見込客の多くを購入に引き上げ〝既存客〟 にして、その既存客に何度もリピート購入してもらい、〝固定客〟 に育てる」", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ネット広告を行う場合、 商品を売ってはいけない。 ネット広告を行う場合、「商品に興味がある人を募集すべき」 である。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "つまり、ネットにおけるあなたの１番の敵は「比較検討されること」 である。 であるならば、 比較検討される前に個人情報を奪ってしまえ！ 具体的には、〝無料モニター（サンプル・お試し）〟や〝１００円モニター（サンプル・お試し）〟や〝５００円モニター（サンプル・お試し）〟 を通じて、商品を購入する可能性が高い「見込客」リストを手に入れることだけに広告を集中 させるのである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "そう、商品を売る広告よりも、商品に興味のある「見込客」を集めるほうが圧倒的にカンタンなのである。レスポンス率もまったく違う。 当然ながらＣＰＡ（Cost Per Action：１人のレスポンス獲得にかかったコスト）もまったく違うのである。 どれくらい違うかというと、商品をいきなり売る広告よりも、「見込客」を集める広告のほうが、楽々数十倍以上のレスポンスを獲得することができる。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "実際に世の中でネット広告をガンガンやっている通販会社（広告主）を今後しっかりと意識して見てほしい。 ほぼすべての会社がネット広告から直接商品を売っていない。 ほぼすべての会社がネットから 無料、１００円、５００円などの低価格モニター（サンプル・お試し）で「見込客」を集めることに特化 しているのだ。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "「いきなりネット広告で本商品を売る」方法論のことを〝ワンステップマーケティング〟 と言い、「ネット広告で〝見込客〟を集め、本商品購入に引き上げる」方法論のことを〝ツーステップマーケティング〟 と言う。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "「ネット広告におけるワンステップマーケティングはダメ。ツーステップマーケティングに変えましょう。しかも７日分の〝無料モニター〟でいきましょう」 と提案した。 そこで、ツーステップマーケティングで、まったく同じヤフーでの純広告枠（具体的に言うと「ログインパネル」という枠）を使って７日分の〝無料モニター〟に変えた瞬間、なんと ＣＰＡが１万５２００円から８００円まで劇的に改善 した。 でも、無料だから当たり前。これが無料のパワーである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ただ、無料モニターと１００円モニターは微妙なところで、 大手通販会社であれば無料モニターのほうが効率がいいのだが、中小通販会社であれば１００円モニターのほうが効率がいい傾向 にある。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "「特定のターゲットを狙ったコピー」にすると、 クリック率は上がる！", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "広告を無視しながら、情報のみを求めているネットのお客様にクリックしてもらうためには、ズバリ「情報っぽく」キャッチコピーを書く ことである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "広告原稿にあったキャッチコピーや写真がランディングページにあると、 お客様は安心してそのランディングページを読もうとする。 とにかく広告原稿を読んで 熱の高まったお客様を、見当違いのコンテンツで冷めさせない ことが重要である。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ネットの特性からコンバージョン率を劇的に上げる王道のシナリオテクニックは、「まず問題提起の情報でひっかけて、途中から商品へ落としていく」 ことである。 ちょっとイヤラシイ言い方をすると（笑）、「 不安感を増大させる情報を提供→ 解決策として商品を提示する」 パターンが昔から通販業界でコンバージョン率を上げるための王道のテクニックである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "お客様はネットを使って「面白い情報」や「悩みを解決する情報」や「欲求を満たす情報」を探している。 情報を求めている人たちに対してだからこそ、お客様自身の問題や欲求に気づかせ、その問題や欲求を解決する方法として「自社の商品を提案」すると、お客様は自然と申し込みたくなり、コンバージョン率が上がる。 つまり、コンバージョン率を上げるには、商品の売込は途中からさりげなくしたほうが効果的なのである。 読んでいくうちについほしくなるシナリオ設計 をすると、コンバージョン率は必ず上がる。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "なぜ、こんなにも〝確認画面でアップセル〟 は効果があるのか？ それは申込の判断をして、面倒なフォームを記入して、完了まであと一歩のところでアップセル商品を提案するからだ。 まさに、お客様の心理状態をうまく利用していると言える。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ダイレクトマーケティングのクリエイティブ、とりわけネット広告のクリエイティブでは、そんなことはまったくない。 いや、 むしろ逆 なのだ。 ネット広告では、「強いキャッチコピー・強い写真・強いデザイン」など、要素の単純な組合せがレスポンス率を左右している」 と考えるべきである。 そう相性なんか関係ないのである。 単純な組合せの問題 なのである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "「レスポンス」「引上」「リピート」のそれぞれのステージでは目的が違うので、当たり前だが、ランディングページ内でのメッセージング（口説き方）も違うのである。 それぞれのステージでのメッセージングは…… ・レスポンス＝「広告専用ランディングページ」＝「まずは試してくれ！」 ・引上＝「引上専用ランディングページ」＝「本商品を買ってくれ！」 ・リピート＝「リピート専用ランディングページ」＝「本商品を定期コースで買ってくれ！」 ……である。 恋愛にたとえると…… レスポンス＝「僕とデートしてくれ！」 引上＝「僕とつき合ってくれ！」 リピート＝「僕と結婚してくれ！」 ……である（笑）。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "たとえば、 10 時くらいに初回申込をしたお客様には、それ以降のフォローメールを〝 10 時台〟に送るのである。 その時間が、その特定のお客様がネットにアクセスしている時間帯である可能性が高いし、消費意欲がある時間帯である可能性が高い。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "マーケティングでは、１％の値上げに対して、何％売上が減少するかという反応度を分析し、それを「 価格 弾力性」と呼んでいます。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "先にブランド価値を顕著に高めておいて、価格弾力性をできるだけ小さくしておく ことです。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "ならばどうしてもっと早く結果が出なかったのか？　それは会社として頑張るべき焦点「どこで戦うか」を正しく明確に設定できていなかったからです。「マーケター」にとって、それが最重要の使命です。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "私達マーケターの仕事は、彼ら天才が努力すべき焦点を明確にすることであり、彼らの才能と努力がビジネスの結果によって報われるように導くことです。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 8, "label": "哲学", "freq": 35, "highlights": [{"text": "色々なことを深く知るということは、どんなに掘り下げてもわからないものはわからないという、限界を知ることでもあります。限界を知るということは、一面において、とても気持ちを楽にしてくれるものです。 　以前、", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "ソクラテスの「無知の知」とはまさにそのことを言っているのです。智者というのは、「わかること」と「わからないこと」の境界、すなわち自分がいかに無知かを知っている人のことを言うのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "すでに 21 世紀初頭の音楽がダウンロードになって、ライブやフェスの価値があがったように、人として「生」の価値は高まるだろう。さらには、新しい死生観を伴った宗教や哲学も 流行ると思われる。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "自分は何者かという問いも、ＡＩの思考力が人間を超える２０４５年以降は不要になる。自分よりＡＩのほうが賢いのだから、一人で自己対話するより、コンピュータに相談したほうがずっと納得できる答えを得られるだろう。そこには、全人類の英知もシェアされているはずだ。もちろん、スポンサーつきで。そうなると人間の関心は、自分という存在から、自分を超えた存在へと移っていくだろう。人間は何のために存在しているのか。世界とは何なのか。この世に神はいるのだろうか。こうした問いこそが人間を惹きつける。 21 世紀後半は、宗教と哲学の時代になるのだ。もちろん、スポンサーつきで。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "ストールマンは「フリーソフトウェア菓子店の店長」として、利用者がソフトウェアを無料で次の利用者に引き継ぐ必要がある、という骨組みをつくりあげた。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "60 年もかかったが、私は最近になってやっとある啓示を得た。それは、どんなものも例外なく、そのままの形を維持するためには、付加的なエネルギーや秩序が必要だということだ。", "book_title": "〈インターネット〉の次に来るもの　未来を決める１２の法則", "author": "ケヴィン・ケリー、服部 桂"}, {"text": "これは、翼を腕にくくりつけ、高い場所から力一杯羽ばたいて飛びおりた古代の人びとが、例外なく失敗したのに似ている。夢を抱き、必死に努力したが、強力な自然の力に逆らっていたのだ。この戦いに勝てるほど強い人間はいなかった。飛行が可能になったのは、人間が、世界の動きをつかさどる自然の法則や原理、すなわち重力の法則、ベルヌーイの原理、揚力、抗力、抵抗の概念を理解するようになってからのことだ。その後、これらの法則や原理と戦うのではなく、それを認め、その力と調和する飛行システムを設計することによって、人間はついに、かつては想像もできなかった高度と距離を飛行できるようになった。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "そのやり方には、彼がヨーダというキャラクターに込めた哲学がいくらか反映されているように感じられた。「やるかやらないかだ。やってみる、というのはなしじゃ」というヨーダのセリフのように、ジョージは、人生の矛盾を噛み砕いて何かに端的にたとえるのが好きだった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "無限大の景品に有限の確率を掛けたものはやはり無限大だから、信仰は──パスカルの定義にしたがえば──無限大の興奮を得られるゲームだというのである。", "book_title": "フェルマーの最終定理（新潮文庫）", "author": "サイモン・シン、青木薫"}, {"text": "また、 19 世紀に哲学者であり経済学者であったジョン・スチュアート・ミルは著書『自由論』の中で、「他人に危害を加えない限り人々は自由に考え行動することが認められるべきである」と述べていますが、一方で多数派が少数派を抑圧すること、すなわち「多数者の専制」の危険性を説き、たとえある時代にある思想が正しいとしても、その思想自体の効力を維持する点検のために多様な思想が必要だと述べています。こうした現行システムの点検のために、多様性の維持は組織と制度設計において必要な概念だと思います。 　なお、ミルに対する思想的な批判としては、抑圧された社会的弱者はそもそも思想や政策を表現する機会が与えられていないというものです。これもまた、考えさせられる論点です。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "哲学者の戸田山和久は、「哲学は結局のところ何をしているのか」という問いに、「哲学の 生業 は概念づくりだ」と答えています。では哲学は何のために概念をつくるのか。答えは「人類の幸福な生存のため」です。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "アリストテレスの幸福論では、人生の最終的な「目的」は幸福になることだとされています。お金を稼ぐこと、有名になること、モテることなどはそのための「手段」であり、ゴールそのものではない、という考え方です。何が自分にとって幸福なのか、その答えは一人一人違いますが、アリストテレスの言うように、社会生活の中で自己実現をすることが幸福なのだとすると、ヘッジファンドのオーナーたちは、前段部の「社会生活」では輝かしい成果を叩き出していますが、後段部の自己実現はどうなのでしょうか。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "存在するものは、合理的である」", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "なぜそう答えを急ぐのです？　 答えとは、誰かに教えてもらうものではなく、自らの手で導き出していくべきもの です。他者から与えられた答えはしょせん対症療法にすぎず、なんの価値もありません。 たとえばソクラテスは、自身の手による著作は１冊も残しませんでした。彼はひたすらアテナイの人々、特に若者たちと路上での議論を重ね、その哲学を著作という形で後世に残したのは弟子のプラトンです。そしてアドラーもまた、著述活動にほとんど関心を示さず、ウィーンのカフェで人々と対話したり、小さなディスカッショングループで議論することを好んだ人物でした。決して 肘掛け椅子に座る知識人ではなかったのです。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "あなたは「誰ひとりとして悪を欲する人はいない」という言葉をご存じですか？　一般に、 ソクラテスのパラドクス として知られる命題ですが。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "ユダヤ教の教えに、こんな言葉があります。「自分が自分のために自分の人生を生きていないのであれば、いったい誰が自分のために生きてくれるだろうか」と。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "他者から嫌われたくないと思うこと。これは人間にとって、きわめて自然な欲望であり、衝動です。近代哲学の巨人、カントはそうした欲望のことを「傾向性」 と呼びました。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "検索というのは、自分に都合のいい物語を引き出すのに最適な手段です。検索ワードごとにさまざまな物語が生まれるからです。 　裏返せば、ネットは原理的に、「あるひとが検索で辿りついた世界観」と「別のひとが検索で辿りついた世界観」を調停することができないメディアなのです。これは、一〇年以上まえにキャス・サンスティーンというアメリカの憲法学者が指摘しています（『インターネットは民主主義の敵か』）。ぼくは、一方でデリダの哲学を研究し、言葉の無力さを学んできたという経緯から、他方でネットにずっと触れ、自分や友人の「炎上」を数多く見てきたという経験から、「言葉だけでは争いを止められないということを前提として、では争いを止めるためにはどうすればよいのか」に関心をもち、考えてきました。 　そこでぼくが辿りついたのは、「モノ」が大事だという結論です。より正確に言えば、時間や経験といった「言葉の外部にあるもの」。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "二〇世紀の哲学は、記号や言語の力をとても重視しました。 　けれどもぼくは、二一世紀の哲学は、あらためて「物理的な実在」の力を評価しなおすべきだと考えています。それは存在論的な意味においてではなく、実践的（ プラグマティック）な意味においてです。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "イギリスの著名な哲学者アルフレッド・ノース・ホワイトヘッドは、こうした現代生活の避けて通れない問題を認めて、断言しています、「文明を発展させるには、人間が考えずにできる行動を増やすことである」と。", "book_title": "影響力の正体　説得のカラクリを心理学があばく", "author": "ロバート・Ｂ・チャルディーニ、岩田 佳代子"}, {"text": "古代ギリシャの哲学者ソクラテスが強調した「無知の知」。どんなに智恵ある者でも、知らないことの方が多い。そもそも、「知性」ということ自体が、有限の立場でしか成り立たない属性である。どこまでいっても知性は有限のものでしかないとすれば、「無知」であることを自覚することだけが、最高の知性のあり方となるのであろう。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "一、人もし全世界を得るとも其霊魂を失はば何の益あらんや。 　　人生の目的は金銭を得るに非ず。品性を完成するにあり。 　　以上", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "感謝は仏教やストア哲学の基本であり、聖書で教えられ、日本の茶道でも大切にされ、もちろん感謝祭の基本（であり名前の由来） でもある。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "私がおすすめしたいのはスタンフォード大学で教鞭をとるケリー・マクゴニガル氏の動画を見るか著書を読んで「ストレスは悪いものではないのだ」とストレスの解釈の仕方を変えることだが、さらに哲学的におすすめしたいのが仏さまの教えである。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "ユダヤ人ってのは、何千年も前から自分の国を追い払われて、どこに行っても迫害されてきた人たちですよね。そういう歴史の中でユダヤの人が見つけたのは、金や土地なんてものは、侵略されたら奪われておしまいってことなんですよ。だから彼らは、他人が奪うことができない知識とか教育とかを、宗教の中にシステムとして組み込んで、一生お勉強って習慣を当たり前にしました。ノーベル賞多いの当たり前ですよね。でもこれ、女と同じなんですよ。女にとって、最後まで奪われない財産ってなんですか？　女であることですよね。風俗でトップの子らがどのぐらいの努力してるか知ってますか？　ファッション誌全部目ぇ通して、メイク勉強してエステしてジム通いして、そうやって女の子は『誰からも奪われない女力』を磨くんですよ。女が女を磨く理由は、それが保険だからなんです。そうやって頑張ってる子がいるから、店の側も必死にサポートできるんじゃないですか」", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "生存だけが価値として認められるようになってしまうことの問題です。それを説明するためにアガンベンは、「 剝 き出しの生 nuda vita / bare life」という概念を持ち出しています。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "アガンベンは死者の権利について考え、死者にも権利があるのではないかと問題提起している。権利は決して生きている者だけが浴することのできる特権ではない、と。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "だとしたら、「哲学者」というのは、考えることの危険と向き合ってきた人々の別名かもしれませ", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "ある意味では、哲学の出発点には死刑がある、ソクラテスの死刑の衝撃によって哲学は始まった、", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "哲学者というのは社会（ポリス） にとってチクリと刺してくる虻のような存在であり、チクリと刺すことによって人々を目覚めさせる役割を担っているというわけです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "だから何よりもまず国家指導者たちがしっかりした哲学を持って、いかにして日本国家を生き残らせるか考えないといけない。しかしその上で僕が最近、決定的に重要だと思うのはむしろ財界です。財界が政治に対して積極的にクレームをつけて、経済ばかり優先すると、国家が滅びるぞと脅かしてほしい。ＪＲ東海の葛西敬之会長のようなタイプの経営者がもっといて欲しいんですよね。 　 西木 　彼は新幹線を中国に売るのに反対しましたね。儲かればいいという発想ではダメだ、と。その後、新幹線を購入した中国は、純国産だと言い張っているのだから、売ったほうは馬鹿にされたようなものです。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "いま日本では経済エリートが哲学を持てるかどうかが問われていると思うんです。金になればいい、儲かれば国はよくなる、という新自由主義的な考えはすでに限界が見えた。国家のために、損を承知であえてひとつの道を選択する知恵を財界も政界も持つ時期が来ているのではないでしょうか。 　ですからいまは政治に期待するよりも、間接的なんだけど、むしろ財界に期待したい。例えば、インテリジェンス分野の人材養成に金を出してもらう。人材をつくるのは今は大学しかないと思うんです。早稲田、慶應、東大、東京外大、どこでもいいから、きちんと金をつけてインテリジェンス講座をつくれば、五年で状況は相当変わりますよ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "哲学者はそれぞれに世界との向き合い方を練り上げており、そのそれぞれに価値がある。これは哲学それ自体の多元論である。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "こうした哲学観を批判し、議論を通して何か普遍的な「世界のＯＳ」みたいなものを追究するのが哲学だ、というような、科学的と言えるだろう哲学観もあるのだとは思うが、少なくとも僕はそういうタイプではない。世界の本質をいろんな角度から捉える。そのそれぞれが面白い。それでいいじゃないかと思うし、それはすこぶる倫理的なことである。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "死というものを意識してはじめて本当に命の尊さがわかるわけで、死を身近に感じなくても済むようになった現代人が、生きることの意味を見失うのは当然のことなのだ。", "book_title": "超思考", "author": "北野武"}]}, {"id": 9, "label": "多様性", "freq": 34, "highlights": [{"text": "実は上司が「自分が安心したいから一体感を持たせたい」と思っているだけ。 本来人間はみな違う考え方をします。人それぞれの事情も考え方も違います。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "ガートナーではその考え方を『バイモーダル』と呼び、これからの組織のあり方として位置づけています」というコメントをもらった。 バイモーダルは、２つのモードをうまく活かし合いながら、切磋琢磨していく。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "この改革の根底にあったのは、 肩の力を抜いてゆったりと構え、異なる他者を認めていこうとする姿勢 だ。 文化の異なる２つの組織をつなぐには、まず自分の常識に 蓋 をして、相手の常識を受け止める。そして相手のよさを理解するよう努めるしかない。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "だがいまは、 突出した特性や技能を持つ人同士が互いに補い合いながら強いチームを作っていく時代 だ。均質的な組織は相対的に弱体化する。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "どんなことでもそうだが、自分と同種の能力について秀でた人を尊敬することはできても、異なる能力に対しては適切に評価できないことがある。 例えば、火のエンジニアは、より激しく燃え盛る火のエンジニアに対しては惜しみない尊敬の念を抱きやすい。その反面、自分たちが作り上げたものの品質を支えてくれる山のエンジニアに対する関心は低いケースが多々ある。 私が、自分と異なるタイプのエンジニアの偉大さを感じるようになったのは、一緒に開発を進めていく中で何度も助けられたからだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "だから、あくまでもその人それぞれがやれることをすればよいのであって、「絆」や「がんばろう」というような言葉を、むやみやたらに強調しなくてもいいのではないかと考えているんです。 　あくまでも人は自由だから、絆の外にいる人、がんばらない人がいてもいいし、それを「間違った考えをするな！　間違ったことをするな！」「それでもお前は日本人か！」「人でなし！」と説教や強要をするのは好ましくない。現実には、他人を心配することができないくらいに余裕がない人だってたくさんいるし、関心があまりない人がいるっていうことも認めないといけない。でもそこで、間違ってもその人たちをけなしたり、非難したりしてはいけないんじゃないかな、というのが僕の考えなんです。", "book_title": "ひとりぼっちを笑うな (角川oneテーマ21)", "author": "蛭子 能収"}, {"text": "● 職の多様化 ● 多様な構成のグループ ● 交差点ハンティング", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "もし職務の実行を最優先し、小刻みなイノベーションを一定の方向性をもって積み上げていくことを目的にするなら、専門化という方法は間違っていない。しかし、それまでにない新鮮で画期的なアイデアを生み出したかったら、個々人の体験の多様化を進めることこそが必要である。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "ではなぜ私たちは、多様な構成のチームで働くことにためらいを感じるのだろうか。少なくとも理由の一部は、人間の本性に関わっている。人間には生来、同類同士で群れ、自分と違う人間を避けようとする傾向がある。心理学者はこうした傾向を「シミラー・アトラクション（似た者同士が惹かれ合う）効果」と呼んでいる。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "サットンが奨励する「変わったアイデア」のひとつは、自分を居心地悪くさせる人間、違和感を覚える人間、さらには好きになれない人間を採用せよというものだ。もし自分が「気に入った」から、あるいは「われわれと同類」だからという理由で候補者を採用しようと考えているとしたら、それは逆にその人間を採用 すべきでない 理由と考えるべきだと、サットンは言う（もちろんあくまで、その職やチームに創造性が求められる場合だが）。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "たとえ多様なメンバーからなるグループを利用する機会に恵まれていても、組織はそれを活用するとは限らない。第", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "自分の嫌いなタイプの人間を採用すれば、言い合いやとげとげしい雰囲気など、トラブルが生じる可能性がある。ただ異なる専門分野や文化、思考様式、価値観や考え方などをもつ人間を寄せ集めれば、革新的なチームができるわけではない。グループを適切に管理しなければ、問題を引き起こすグループダイナミクスがはたらいてしまうのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "脆く、弱く、否定されやすいビジョンを無数に集めることこそが、コンセプトへの最大の近道となる。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "そういう虚構の世界の住人が虚しいと思うか、それとも新しい文化的アプローチのあけぼのだと思うかどうかはその人の価値観です。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "では、日本の「特徴」は何でしょう。学問的に言えば、古い文化を残しながら、次にやってきた新しい文化を取り入れること、と言われています。 　たとえば、公家文化を残して、武家文化も認める。天皇制を残しつつ、征夷大将軍という制度を加える。 装束 を残しつつ、武家の着物も足していく。以前の文化を駆逐したり、それまで行なわれてきたことを止めたりしないというのが、最大の特徴と言われています。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "極端な話、外国人観光客が非常にたくさん訪れても、みなバックパックを背負って安宿に泊まり、つつましい滞在をするような国は、「観光立国」にはなれません。このような観光客を軽んじろというわけではなく、このような人々が楽しめる環境もあり、一方で観光にはしっかりとお金を使いたいという人々向けにもお金を落とせる場所、サービスを整備している国こそが、「観光立国」だと言いたいのです。 　そのような意味では、フランスがわかりやすいかもしれません。観光客数では断然トップなのに、収入は 3 番目です。これは、ヨーロッパ近隣諸国からの短期滞在者が多いという要因が大きいのです。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "やっぱりネットの中でも、弱者に厳しい人は成績が良かった人だと思うんです。多様性って言葉があるじゃないですか。多様性は大事だってみんなが言いますよね。多様性のない社会っていうのが、一番厳しい世界なんですよ。ひとつの指標で競争させられるわけですから。僕は、インターネットって社会の多様性をなくすものだと思うんです。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "コミュニティをつくることに成功すれば、その中では楽園ができる。でもインターネットにつながること自体はマイナスでしかない。ただ、インターネットが多様性を破壊して、世界が完全に均質になっていくのかというと、そこはみんなが一生懸命抵抗するでしょうね。そうして、細かい世界をつくろうとするっていうのが、これから起こることだと思います。お山をどうつくるのか。それが次のネットのテーマですよ。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "・ジョンソン＆ジョンソンやウォルマートは 顧客 を理念の柱にしたが、ソニーやフォードはそうしなかった。 　・ＨＰやマリオットは 従業員 への配慮を理念の柱にしたが、ノードストロームやディズニーはそうしなかった。 　・フォードやディズニーは 製品やサービス を基本理念の柱にしたが、ＩＢＭやシティコープはそうしなかった。 　・ソニーやボーイングは大胆な 冒険 を理念の柱にしたが、ＨＰやノードストロームはそうしなかった。 　・モトローラや３Ｍは 革新 を理念の柱にしたが、Ｐ＆Ｇやアメリカン・エキスプレスはそうしなかった。 　　一言でいえば、ビジョナリー・カンパニーの理念に不可欠な要素は ない。わたしたちの調査結果によれば、理念が 本物 であり、企業がどこまで理念を貫き通しているかの方が、理念の 内容 よりも重要である。 　つまり、フィリップ・モリスの理念を好ましいと感じたり同意するかどうかは、フィリップ・モリスの社員でないかぎり、重要ではない。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "世の中には「自分で選ぶのが大好き」な人と、「選ぶのは面倒。誰かに選んでほしい」という人がいます。同じモノを買うときでも、両者が求める価値はまったく異なっています。前者は比較サイトやレビュー情報に価値を感じ、後者は「選んでくれる人」に価値を感じるのです。特に、多すぎるほどのモノやサービスが溢れている先進的な消費大国においては、「誰かに選んでもらうという価値」は、今後ますます重要になります。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "よく「市場では強いものしか生き残れない。市場は弱肉強食だ」と言う人がいますが、現実には反対です。組織型の意思決定方式では、少数の「選ばれたもの」のみが絶賛され、選ばれなかったものには、まったくチャンスが与えられません。 それが市場での評価に変われば、すべての施設の良い点と悪い点が明らかにされ、際立った特徴のある個性豊かな宿泊施設にもチャンスが与えられます。結果として、最高の宿泊施設を探すのではなく、自分の好みや目的に合った施設を探せばよいのだという考え方も広まります。より多くの人に、より多彩な人にチャンスを与えるのが市場型の評価方式であり、意思決定方式なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "もちろんオフィスで働く人たちにも、趣味くらいはあるだろう。でも、趣味を応援するために休暇や支援金まで与えている会社は多くない。 　ひらめきや創造性は、多様な経験のなかから生まれてくる。リモートワークをとりいれるなら、社員の生活の幅を広げるためにどんどん支援したほうがいい。 　メンバーに生き生きと働いてもらうためなら、それくらいは安いものだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "あなたの身の回りからできるだけ多様化すべき です。日本は諸外国に比較すれば均質性の高い社会を形成していますので、日本企業がグローバルに業務を行ないたいのであれば、 日本人同士だけで思考する自己満足の罠を避け、意識的に多様化すべき です。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "また、 19 世紀に哲学者であり経済学者であったジョン・スチュアート・ミルは著書『自由論』の中で、「他人に危害を加えない限り人々は自由に考え行動することが認められるべきである」と述べていますが、一方で多数派が少数派を抑圧すること、すなわち「多数者の専制」の危険性を説き、たとえある時代にある思想が正しいとしても、その思想自体の効力を維持する点検のために多様な思想が必要だと述べています。こうした現行システムの点検のために、多様性の維持は組織と制度設計において必要な概念だと思います。 　なお、ミルに対する思想的な批判としては、抑圧された社会的弱者はそもそも思想や政策を表現する機会が与えられていないというものです。これもまた、考えさせられる論点です。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "また、新自由主義は、性別、人種、国籍など属性の異なる各個人が、市場を通じて、世界中から自由に参加するシステムを目指すので、より平等で民主的な世界を目指す価値観でもあります。マイノリティの尊厳、権利、機会の尊重も１９９０年代以降、急速に浸透しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "て、「１つの正しい人間観」を探そうとするより、異なる人生を歩んできた多くの人による多様な人間観に触れた方が有益だろう と、私はそう思います。", "book_title": "人間らしさとは何か　生きる意味をさぐる人類学講義 (河出新書)", "author": "海部陽介"}, {"text": "仏教には、禅宗や日蓮宗など、いろいろな宗派がある。キリスト教も、カトリック、プロテスタント、ギリシャ正教などに分かれている。イスラム教にも、大別してスンニ派とシーア派がある。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "「幸せ」とか「意味」を感じられる手がかりになりそうなものはなんでもいいから利用して自分がうまく生きられる世界を作り上げればいい。そういうことができるのが単なる遺伝子の乗り物ではない人間の一番面白いところだ。そして、たくさんある「生きる意味の根拠」からそれぞれの人間が何を選ぶかが違うということが、この世界に多様性をもたらして、世界を複雑で面白くしているのだと思う。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "それぞれの人によって何によって幸せを感じるかが偏っているから、それがその人の個性にもなるし生きる意味にも繫がるんだろう。そして有限な人生の中で、多種多様な「生きる意味の根拠」の中から自分が何によって幸せを得られるかをきちんと探すことが生きるということなのだと思う。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "人類の歴史を振り返れば、非典型的な脳の持ち主の中に、興味深い可能性が見いだされてきた。アルベルト・アインシュタインは、五歳になるまで 殆ど言葉を 喋らなかったという。今日の基準から言えば「学習障害」だったのではないかと推定される。そのアインシュタインが、長じて、「相対性理論」によって人類の認識の革命を起こしたのである。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "ある。「みんなちがって、みんないい」という金子みすゞの精神を実践できるか。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "自閉症の人たちの一部には、「サヴァン」と呼ばれる特別な能力を示すケースがある。常人では考えられないような記憶力を持っていたり、ある年のある月日が何曜日かを即座に言い当てる「カレンダー計算」ができたり、あるいは複雑な計算を瞬時にこなすなどの目覚ましい力を持つ。一度聴いた曲を正確に再現することができる人もいる。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "ザッポスでは、考え方、意見、バックグラウンドの多様性を歓迎しています。あなたの人間関係が広く多様なものになればなるほど、あなたが会社に与えられるプラスの影響は大きくなり、あなたはますます会社にとって価値のある人になります。人間関係構築のためには、心に響き、オープンで、誠実なコミュニケーションがきわめて重要なのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "どうやら、ゲイにはその時代によって異なる「目に見えないなにか」を察知する能力がある、というのが、その調査結果でした。身体的には脳幹の太さが異なるなどとも言われていますが、これはまだ確かではありません。ですが、「別の能力」を持っていることは確かだと僕は思っています。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 10, "label": "効率性", "freq": 33, "highlights": [{"text": "こういう状況にある会社では、プロダクトマネージャーは、仕様書を作るぐらいのことしかやっていない。そんな仕事では、新しいアイデアの芽を摘みかねず、売れる製品を作るのはまず無理で、イライラがたまるばかりだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "話をまとめると、インターネットサービス企業にとっては、プロダクトマネジメントとプロジェクトマネジメントの役割をはっきりと分けることが非常に重要だ。そうしないと、リリースの管理に悪戦苦闘する羽目になり、リリースはいつも遅れ、必要以上に時間をかけなければならなくなるだろう。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "いったんエンジニアリングチームが開発を始めてしまったら、極力、それをかき回さないようにすること。かき回す", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "というのは、こういうことが起きてしまう原因でよく目につくのは、プロダクトマネージャーが、作れそうな機能なら何でもめいっぱいくっつける、というようなことを何年にもわたってエンジニアリングチームにやらせてきたために、彼らをボロボロにしてしまうことだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "eBay ではこれをヘッドルーム (頭上の空間) と呼んでいた。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "この組織で問題なのは、マーケティング部門の中で、プロダクトマーケティングの役割とプロダクトマネジメントの役割がいっしょくたにされてしまうことがよく起こる、という現実である。この 2つはまったく違う役割だし、その役割をこなすのに必要なスキルもまったく違っているので、たいていの場合、どちらかの役割 (あるいはその両方) がおろそかになってしまうという結果になる。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "けれども僕らは、目標が役に立つことは理解している。ただ、その効果に関心がないだけだ。僕らは取りこぼしたお金があっても気にしないし、レモンを最後の一滴まで絞りだす必要も感じていない。いずれにしろ、最後の数滴はたいてい苦みが混じる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "組織にいるからこそ抱える悩みのひとつは、会社がまちがった方向に進んでいるのに、「計画」のせいでいまさら方向転換できず、「最後までやり通すしかない！」と悟ったときに生まれる。ある時点でいいアイデアだと思えたとしても、けっきょくはマズいアイデアだったのなら、最後までそれを押し通すのはエネルギーと能力の無駄づかいだ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "だから、僕らは大学のアイデアを借りた。つまり 開講時間（オフィス・アワー）をつくった。 ベースキャンプのそれぞれ分野の異なるエキスパートは、いまでは開講時間を掲げている。たとえば、ある人は毎週木曜の午後が開講時間だし、一日一時間開講している人もいる。各エキスパートが自分の都合に合わせて決めているのだ。 　でも、月曜日に疑問が生じて、訊きたい相手の開講時間が木曜だったら？　そのときは待つのだ。木曜までほかの仕事をするか木曜までに自分で答えを見つけるかだ。大学で教授と話をしたいなら講義の日まで待たねばならないのと同じだ。 　これは一見効率が悪そうにみえるかもしれない。お役所仕事みたいだとさえ思われるかもしれない。けれども、僕らはこれ以外の方法も試したことがある。開講時間はベースキャンプでは大人気のシステムだ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "一番下にあわせたら、上がつまらない。レベルのあわせ方で、ついてこられない人が出てくるのはしかたないわけです。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "全部の柿を残したら、いい柿も小粒になってしまう。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "効率化も、非効率化も、「繰り返し処理」の扱い方で決まるの", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "地域やそこで生活する顧客との密着度合いが経済効率を決めるので、下手にグローバルに拡大・拡散するより、地域における密度を高める努力をしたほうが経済的に 儲かる。裏返して言えば、規模の不経済性に陥りやすい産業領域とも言える。したがっていったん地域ドミナントをつくり上げると、競争上、ディフェンスには強い。世の中の人は、グローバル企業に代表される規模の経済性を常に過大評価する傾向があるが、現実のビジネスの世界ではほとんどの産業で密度の経済性が効く。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "プロセスは、特定の業務に対応するために定義され、事実上の進化を遂げる。このため、ある業務のために作られたプロセスを使って、それを実行した場合は効率よく達成できるが、同じプロセスをまったく別の業務に適用すると、遅くて効率が悪く、役所仕事のようになることが多い。つまり、ある仕事を遂行する 能力 を定義するプロセスが、ほかの仕事については 無能力 を明らかにする。すぐれた経営者が各組織の目的を絞ろうとするのは、プロセスと仕事を連携しやすいからである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "努力は大切だ。だが、努力の量が成果に比例するとはかぎらない。がむしゃらにがんばるよりも、「より少なく、しかしより良く」努力したほうがいい。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "リーダーシップ論の権威ジョン・Ｃ・マクスウェルもこう述べている。 　「ほとんどあらゆるものは、徹底的に無価値である（ ９）」 　努力の量と成果が比例するという考え方を捨てたとき、エッセンシャル思考の大切さが見えてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "忙しく動きまわることを有能さの証だと思っている人は、考えたり眠ったりする時間をなるべく減らそうとする。しかし本当は、立ち止まる時間こそが、生産性を高めるための特効薬だ。立ち止まる時間は無駄な寄り道ではなく、前に進むための最短コースを教えてくれるのである。 　エッセンシャル思考の人は、なるべく時間をかけて調査・検討し、意見を交わし、じっくりと考える。そうすることで初めて、本当に重要なものを見極めることが可能になるのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "私たちは教育のファストフード化を容認してきました。その結果、まるでファストフードが体をむしばむように、教育が精神を弱らせることになってしまいました。……あらゆる偉業は、想像力から生まれます。ところが現代の教育システムは、まさにその想像力を奪いつづけているのです（ ２）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "大量生産による効率の向上こそが存在意義だった。当時のマネジャーたちは軍隊を見習い、厳格な管理法を取り入れた（「営業部隊」など、軍隊を起源とする言葉がよく使われるのはそのせいだ）。産業革命が終わって久しい現代でも、大半の会社がその考え方や行動規範を捨てられずにいる。 　遊びは、それ自体を目的とした行動だ。何かのためでなく、遊びたいから遊ぶ。凧あげ、歌、ボール投げ。どこにもたどり着かない行動は、一見無駄なようにも思える。しかし実は、そうした遊びこそ、人間にとって不可欠な行動なのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "何かをやめるときにも、同じやり方が応用できる。本格的に撤廃する前に、簡単な形で試してみるのだ。リンクトインのディレクターをつとめるダニエル・シャペロは、これを「逆プロトタイプ」と呼んでいる（ 10）。 　逆プロトタイプのやり方は簡単。今やっていることを試験的にやめてみて、不都合があるかどうかたしかめるのだ。 　私のクライアントだったある男性は、会社で新たなポストについたとき、前任者のこなしていた仕事量に仰天した。数えきれないほどのテーマについて、非常に精密でグラフィカルな報告書を、毎週欠かさず作成していたのだ。彼はその仕事を引き継ぐことになったわけだが、そこまでやる意味があるのかと疑問に思った。あまりに手間がかかりすぎるし、それほど利益に貢献するとも思えない。 　そこで彼は、逆プロトタイプを試してみることにした。報告書をつくるのをやめて、どんな不都合が起こるか様子を見てみたのだ。その結果、誰も困っていないことがわかった。何週間ものあいだ、誰ひとりそのことに気づかなかったほどだ。 　こうして報告書が不要であることを実証できたので、彼は堂々と報告書を撤廃することにした。 　同じことは、さまざまな分野に当てはまる。顧客や友人や家族のために苦労してやっていたことが、実は相手にとって何の意味もなかったということがあるかもしれない。ためしに、その行動をやめてみるか、あるいは簡素化してみよう。しばらく様子を見て、とくに誰も困らないようならやめてしまったほうがいい。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "一方、エッセンシャル思考の人は目の前の症状に惑わされず、どこが本当の問題なのかを見極めようとする。何が妨げになっているのかを特定し、もっとも効果的に処置をする。非エッセンシャル思考の人は応急処置でつぎはぎだらけになっていくが、エッセンシャル思考の人は本当に必要なところに一度だけメスを入れる。これは問題解決にかぎらず、最小限の努力で最大限の結果を得るための普遍的なやり方である。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "巷では「働き方改革」などさまざまな掛け声が広がっていますけど、現場で起きていることは間違いなく「生産性を上げるために何を重視するか」ってことじゃないでしょうか。やはり、働くからには価値を高めなければならない、限られた時間で出せる成果を最大限にしよう、というのは、私は健全な方向だと思っています。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "しかし、そのことは、間違っても、「個店主義」や「地域主義」という店舗運営のスタイルの「存在理由」が無くなったことを意味しているのではありません。ただ、その時代の流通革命の主眼である「合理化」と「効率化」を進めていくためには、ひとたび、「個店主義」や「地域主義」を後に回して、まずは、「合理化」と「効率化」に取り組み、全国一律の品質の商品やサービスを提供していく。そのことが最優先の課題として求められたのです。 　しかし、流通革命が大きく進展し、全国にコンビニエンス・ストアが普及し、店舗における「合理化」と「効率化」がかなりのレベルまで進んだ現在の段階において、この「個店主義」や「地域主義」が復活しつつあります。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "スーパーコンピュータの回路では一秒間に地球を七周半もするほどの速度で情報が行き交っているのに対し、人間の神経の伝達速度はたったの二メートル。だが、人間のほうがスーパーコンピュータよりもはるかに優れている。効率のよい「アナログ制御」が、人間のなかでは行なわれているからである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "「決意の切り替え」を減らす", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "たとえば家族と連絡を取り合うためにフェイスブックを使っている場合、本当にそれがいちばんいい方法だろうか？　電話をかけたほうがよくはないだろうか？", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "当時の人間の労働時間は週30時間ほどだった と人類学者は推定している。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "タイムアロケーション（時間配分）こそが超一流のプロの基本だ」 とおっしゃっていた。", "bo
