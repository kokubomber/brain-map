ok_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "その結果、「現実」と「虚構」の優先順位が、〈自己のホメオスタシス〉の達成に関するコストパフォーマンスによって、決まるようになりました。〈自己のホメオスタシス〉に向けて「現実（生身のコミュニケーション）」をアレンジするのは、もちろんコストとリスクを伴います。だから「現実」と「虚構」を区別しないで〈自己のホメオスタシス〉を達成する方が、効率的なのです。こうして「現実」と「虚構」は等価なツールとして扱われるようになりました。 　こうした動きは、人々が尊厳（自己価値）を維持するために、わざわざ社会の中を生きることによって生身のコミュニケーションを通じて承認を獲得するという必要が、免除されるようになることを意味します。１９９７年頃から、 憎しみがないのに 平気で人を殺す「脱社会的（non-social）」な凶悪犯罪が増えましたが、個人の尊厳が生身社会から無関連なものになっていく動きがもたらしたものだ、と僕は推定しています。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "チケットの相場はたとえば、インディーズバンドが１５００円でライブをしているとしたら、同じくらいのキャリアと知名度の地下アイドルは、３０００円ほどの入場料でライブを開催することができます。 　さらに地下アイドルはカラオケを使用してライブをするため、バンドのように機材チェンジの手間や時間がかからないので、多めに組数を出演させることができます。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "そう、商品を売る広告よりも、商品に興味のある「見込客」を集めるほうが圧倒的にカンタンなのである。レスポンス率もまったく違う。 当然ながらＣＰＡ（Cost Per Action：１人のレスポンス獲得にかかったコスト）もまったく違うのである。 どれくらい違うかというと、商品をいきなり売る広告よりも、「見込客」を集める広告のほうが、楽々数十倍以上のレスポンスを獲得することができる。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "「ネット広告におけるワンステップマーケティングはダメ。ツーステップマーケティングに変えましょう。しかも７日分の〝無料モニター〟でいきましょう」 と提案した。 そこで、ツーステップマーケティングで、まったく同じヤフーでの純広告枠（具体的に言うと「ログインパネル」という枠）を使って７日分の〝無料モニター〟に変えた瞬間、なんと ＣＰＡが１万５２００円から８００円まで劇的に改善 した。 でも、無料だから当たり前。これが無料のパワーである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ただ、無料モニターと１００円モニターは微妙なところで、 大手通販会社であれば無料モニターのほうが効率がいいのだが、中小通販会社であれば１００円モニターのほうが効率がいい傾向 にある。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 11, "label": "価値創造", "freq": 31, "highlights": [{"text": "覚えておいてほしい。価値のある、使いやすい、実現可能な製品として作られるべき何かをプロダクトマネージャーから与えられなければ、どんなにエンジニアリング部門が優秀でも意味はない、ということを。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "私はいつも、優秀なエンジニアに対しては、ぜひプロダクトマネジメントに挑戦するべきだ、と勧めている。そして、どんなに君たちのエンジニアリングがすばらしくても、作る価値のある製品でなければ君たちは力を発揮しようがないんだよ、と言い聞かせている。何を作れるかを知っているだけではなく、何を作るかというもっと大きな問題にも取り組んできたエンジニアの貢献があってこそ、すばらしい製品や会社がたくさん生まれたのだ、ということも指摘しておきたい。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "製品を生み出す組織がやるべきこととは、優れた市場機会を追求することと、優れた製品による解決方法 (ソリューション) を提供することに尽きる。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "ＣＣＣはネットサービスに置き換わるようなことは基本的にやらない。企画会社としてリアルでしかできないことを掘り起こそう。加盟企業さんのためにね。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "やましく思われるかどうかは俺らにとって重要じゃない。いい企画を作れるかどうかが軸。それを曲げてまで、世間体を気にするつもりは僕にはない。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "まず書店は、お客さんが来てくれないと売れません。これが大前提。だからとにかく、来たくなる本屋にすること。人が来ない、売れない、つまり本屋として価値がないのに、「もっと儲かるようにして」って出版取次に言うのはダメじゃない？", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "円やドルは「信用」で成り立っているというのは、どういうことでしょうか。 考えてみれば、紙の「一万円札」をつくる原価は 20 円ほどにすぎません。銀行に預金してある１万円や電子マネーの１万円はただのデジタルデータなので、コストはほとんどゼロです。にもかかわらず、１万円がマネーとして通用するのは、誰もが「１万円の価値がある」と信じているからです。 そうした「信用」を支えているのは、国に対する信頼です。そのため、国の将来に不安を感じる人が増えると、円やドルの価値は下がっていきます。その結果、かつて１万円で買えたものが、１万１０００円出さないと買えなくなったりします。通貨の価値がそれだけ下がったわけです。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "よいアイデアとは、誰かの役に立つもの だ。裏返して言うと、喜ぶ人の顔が見えてこないアイデアは、すべてダメだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "つまるところ、「よいアイデア」とは、「誰がどんなふうにこれで喜んでくれるか」が考え抜かれたもの なのだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "自分は何が大好きか？」 　「自分は何がいちばん得意か？」 　「世の中の大きなニーズに貢献できるのは何か？」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "大好きで、才能を生かせて、世界の役に立てる仕事。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "ツイッター共同創業者のジャック・ドーシーは、たぐいまれなエッセンシャル思考の経営者だ。ディナーに同席したとき、彼はＣＥＯの役割を「最高〝編集〟責任者」と定義していた。別のスタンフォード大学のイベントでは、次のように説明している。 　「なぜ編集かというと、日々やることは山ほどありますよね。でもそのなかで、本当に重要なのは１つか２つ。エンジニアやサポート担当やデザイナーは次から次へとアイデアを持ちかけてきますが……編集者である自分は、そういう情報のなかから１つのこと、あるいは２つか３つの要素の交点を見つけ出し、それだけを実行すると決めるのです（ ３）」 　ただノーと言うだけなら、３歳児にもできる。編集の技術は、ただ減らすことにあるのではない。減らしながら、価値を増やすのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "「売上げは価値の総和であり、利益は工夫の総和である」 　とはインディバルの初代社長、岩下順二郎さんから教えてもらった言葉です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "仕事はすべて「価値提供」です。 　飲食店を経営するにしても、電車やタクシーの運転手をするにしても、お客さんに価値を提供して、その対価として料金をとっています。会社に勤めて給料をもらっている場合、個人として会社に価値提供をしているわけであり、その仕事が世間に価値提供していることにつながります。 　価値提供できていないのであれば、それは仕事ではありません。 　また、 どうせ価値提供するなら、会社の資金や力を使って、一人ではできないような大きなことをやるべき です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "巷では「働き方改革」などさまざまな掛け声が広がっていますけど、現場で起きていることは間違いなく「生産性を上げるために何を重視するか」ってことじゃないでしょうか。やはり、働くからには価値を高めなければならない、限られた時間で出せる成果を最大限にしよう、というのは、私は健全な方向だと思っています。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "彼ら彼女らは、日々、苦心しながら、そういう愛着を作っているのである。 　くり返すが、 単なる企業からの一方的お知らせを発信するのが彼らの仕事ではない。ＳＮＳ担当者は、他に代えがたい愛着を作ってくれている貴重な存在 なのだ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "市場化が進む社会で高く売れるのは、「よい商品」ではなく、「需要に比べて供給が少ない商品」なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "ＮＰＯや社会起業といった選択肢が、社会に貢献できる唯一の方法であるかのように、「世の中の役に立ちたい」と考えるナイーブな学生に思わせたのは、非営利セクターの作戦勝ちと言えるでしょう。 一方、営利セクターに属する企業は、他の民間企業との採用競争のみに注力し、事業を通して利益を上げ、税金を納めて社会に貢献することの意味や、革新的なサービスや商品の提供を通して世界を発展させるという営利セクターの意義を、就活学生に広めることに成功していません。 アップルやアマゾン、そしてトヨタやパナソニックのような営利企業の多くは、長きにわたって、人々の生活を驚くほど豊かにし、社会の役に立ってきました。本来、営利企業と非営利組織の違いは、「社会の役に立つか、立たないか」などという違いではありません。 それなのに、「社会のためになる仕事がしたい。だから公的機関かＮＰＯで働く！」などと非論理的なことを言う人が現れるのも、営利セクターに属する企業が採用市場における市場の入れ子構造を十分に踏まえたうえで、メッセージを発信できていないためなのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "この「普通の人の気軽なコメント」を集めたページには、時に元ネタとなるブログやニュース以上にアクセスが集まります。「何が起こったか」というニュースそのものより、「その記事に対して他の人はどう感じたのか」をチェックしたり、自分も一言コメントを寄せたりすることのほうが楽しいと（価値があると）判断されているのです。 ニコニコ動画も、この価値をサービス化しました。これまで（おそらく今でも）「この女優も年をとったな」とか、「この人、イメージはクールなのに、しゃべりは三枚目だね」などと、誰に聞かせるでもないコメントを、テレビの前でつぶやいている人はたくさんいましたよね。 テレビの場合、それを聞くのは自分と、せいぜい家族だけです。しかし、「もっとたくさんの人に自分の一言コメントを聞いてほしい。他の人のコメントも聞いてみたい。そこに価値がある」と気がついたドワンゴが、それをサービス化し、今や２００万人の有料会員を抱えるサービスとなりました。日経新聞電子版の有料会員が 40 万人弱ですから、その人気のスゴさがわかります。 最近はニュース・キュレーションアプリ（さまざまなメディアから注目ニュースをピックアップし、ひとつのスマホアプリの中で読ませるもの）が大人気ですが、ここでも、ニュース自体は誰でも読めるのに、そのニュースに付けられた一言コメントを読むためには、サイトへの登録が必要となっています。アプリの開発者もユーザーも、ニュースよりコメントのほうに価値があると判断しているのでしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "マーケティング同様、マネタイズは方法論でありノウハウです。一方、価値を見極めるのは、もっと本質的な能力です。たとえ今は価格付けされていなくても、もしくは、まったく儲かっていなくても、それに価値があるのかどうか、あるとすればどんな価値なのか、誰がその価値を最も高く評価するのか、そういったことが、（最初は論理的にではなくてもいいので）直感的に理解できるようになることが重要なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "ジャパネットたかたが売っているのは「孫のアドバイスという価値」だと思っています。実際の孫は、祖父母の買い物に、毎回つきあってくれたりはしません。自分たちの生活やニーズも、そこまで把握してくれていません。でも「孫のように、全幅の信頼を寄せられる売り手」を求めている消費者は、たくさんいるのです。 同じような価値を売っている売り手は、他にもたくさんいます。糸井重里さんの運営する「ほぼ日」や、カリスマ主婦の栗原はるみさんが勧める料理グッズも同じでしょう。彼らも、ごく限られた数の商品を取り上げ、その特徴や使い方、さらには、顧客がなぜその商品を選ぶべきなのか、詳細に説明します。 ここで重要なのは、その説明の合理性ではありません。説明を聞く前から、顧客側が「この人は、私が信じられる人だ」「この人は、自分に合う商品を理解してくれている」と感じていることが重要なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "マーケット感覚を身につけることの最大の利点は、それさえ身につければ、変化が恐くなくなるということです。今、急速に進む社会の変化を目の当たりにした人たちは、大きくふたつのグループに分かれ始めています。ひとつは、ワクワクしながら自分自身もその変化を楽しんでいる人、もうひとつは、日々伝えられる変化のニュースに不安を深め、どうやって自分と家族を守ろうか、戦々恐々としている人たちです。 このふたつのグループの違いは、どこにあるのでしょう？　学歴でしょうか？　貯金額でしょうか？　私が見る限り、一流大学を出て大企業に勤め、たくさんの貯金を持っている人でも、後者のグループに属している人がたくさんいます。 ふたつのグループの根本的な違いは、いち早く変化の兆しに気づき、新しい世界で価値を提供する方法を、市場から（失敗しながら）学ぶことができるかどうかです。それさえできれば、変化は恐れるものではなく、心から楽しめるモノになります。 そして、そのために必要なものこそが、「マーケット感覚」なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "人は、少ないものに価値を見いだす。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "とにかく、試してみてほしい。直接会う機会が少なくなれば、その価値は驚くほど高まるはずだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "一般に、会社の中に価値を生まない仕事は８割あるといわれている。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "人は価値のある情報を半分くらいしか漏らさないが、最優秀な人の半分の情報は私のような凡人にとって超貴重なものだ。 私は価値の高い情報を持っている社外有識者に１時間の話を聞くために、１か月くらいの準備をいとわない。２〜３人くらいを経由して、その人物を紹介してもらえることが多いが、不成立のケースもある。年数回だけでも、本当に価値のある人に会って話を聞ければ十分ではないかと思う。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "マルクスの言葉を「贈与」に置き換えるとこうなります。 「贈与は、贈与を生まなければ無力である」", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "「マクドナルドらしさ」とは何か。それは、アメリカンテイストのボリューム感あるハンバーガーの味や、機能的で清潔な店舗や、スピーディーかつ温かなサービスにある。その根底にあるのがＱＳＣです。この「土台」を築かなければ、次の戦略に駒を進められないという思いがありました。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "そもそも価格というものは、価値に対して設定するものです。２００１年にはＱＳＣが悪化して顧客に提供する価値の水準が落ちていました。そんな中で、ただやみくもに「世の中がデフレだから」と価格を下げても「安かろう悪かろう」を自ら認めるようなものです。うまくいくはずがない。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "２００４年以降、僕はまずＱＳＣを引き上げました。その結果、「おいしい」「サービスがいい」「きれい」と、顧客の価値認識が上がっています。そのうえで「１００円」を打ち出す。まず価値を固めて、その後に価格で訴求したわけです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "このような課題を長期にわたり確実に解消する方法は、「選ばれた」元社員だけの「卒業生」グループを設立することだ。そうすれば、参加メンバーとそこから得られるメリットに関して、会社側がより細かくコントロールできる。たとえば、辞めた後も会社との関係を大切にしている元スター社員にきめこまやかなサービスを提供し、そのかわりに会社により深くかかわってもらうといった形でもいい。元スター社員たちは会社を離れた後でも面白いことにかかわり、人脈の中核でいる可能性が高い。会社の事業にも大きな価値をもたらしてくれるだろう。加えて「選ばれた」元社員であることに誇りやメリットを感じてもらえれば、会社にマイナスになるような言動を控えるようにもなる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 12, "label": "組織文化", "freq": 30, "highlights": [{"text": "eBay ではこれをヘッドルーム (頭上の空間) と呼んでいた。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "それに、目標の設定には、さらに暗い側面がある。目標を追いかけ、デタラメな数字に到達しようとしているうちに、 モラルや誠実さや健全性が損なわれてしまう ことが多い。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "ベースキャンプでは、回答はすぐに来るものではなく、そのうちくるものという文化をせっせと育んできた。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "会社の役員たちが、自分の会社は大きな家族みたいなものだという話をしはじめたら、用心したほうがいい。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "いまや、僕らも議論のなかでこの表現を使っている。「反対だけど、コミットする」 は、僕らの会社で、特定の製品や戦略の決定について熱い議論を戦わせたあとによく聞かれる言葉になった。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "コントロールを撤廃することで「フリーダム＆レスポンシビリティ（自由と責任）」のカルチャーが生まれる（これはネットフリックス社員が頻繁に口にする言葉で、略して「Ｆ＆Ｒ」と言われることも多い）。", "book_title": "NO RULES(ノー・ルールズ) 世界一「自由」な会社、NETFLIX (日本経済新聞出版)", "author": "リード・ヘイスティングス、エリン・メイヤー、土方奈美"}, {"text": "① 自走を可能にする情報が共有されていること 　② 自身の判断で動いていい権限を与えられていること 　③ 自身が何をすべきか考える能力を備えていること 　④ 失敗してもマイナス評価にならないこと", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "その理由は「説明はするけど相談はしない」といった話に象徴された。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "緩やかな共同体型で、人格円満で模範的なムラ人からみんなで社長を選び、選ばれた人はみんなが何となく幸せになれるように経営を進めるという日本型「カイシャ」モデルは、完全に農耕社会の仕組みである。現代の日本企業のような組織は、戦国時代ではあり得ない。当時は力のある人物が権力を握っていたから、何となく決まるということは起こらない。権力者とそうでない者の間には絶対的な主従関係がある。権力者に腹を切れと言われたら、何があっても切らなければならない。そうなっていないということは、日本人に流れる 通奏低音 的な文化は、どう考えても農耕文化なのである。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "● アイデアを実行しないことこそ最大の失敗であり、罰の対象になるということを周知徹底する。 ● 全員が過去の失敗から学ぶようにする。同じ失敗には何度も報奨を与えない。 ● 失敗の数が少ないときには疑う必要あり。その人間が十分なリスクを負っていないか、あるいは組織の他のメンバーが自分の失敗から学ぶのを嫌って、失敗を隠している可能性がある。 ● 過去に「知的な」失敗を犯した人を採用し、組織の他のメンバーにそれが採用の理由のひとつであることを知らせる。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "「企業はある一定のネットワークのなかで経験を積むと、そのネットワークに特有の要求に即した能力や組織構造、企業文化を形成する傾向がある」と", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "決定的な点は、理念の内容ではなく、理念をいかに深く「信じて」いるか、そして、会社の一挙一動に、いかに一貫して理念が実践され、息づき、現れているかだ。ビジョナリー・カンパニーは、「何を価値観とするべきか」と問いを立てることはない。「われわれが 実際に、何よりも大切にしているものは何なのか」という問いを立てる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "フィリップ・モリス ・選択の自由という権利（喫煙し、自分がほしいものを買う権利）は守るに値する。 ・勝利─トップ企業になり、他社を打ち破る。 ・自主性の発揮を奨励する。 ・性別、人種、階級に関係なく、能力に応じて機会を与える。 ・猛烈に働き、不断の自己改善を進める。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "第一に、社会心理学の研究によると、人々はある考え方を公言するようになると、 それまではそうした考えを持っていなくても、その考え方に従って行動する傾向が際立って強くなる。つまり、基本理念を公言すること自体で、その理念に従って一貫した行動をとる傾向が強まることになる。ビジョナリー・カンパニーは、比較対象企業に比べて、基本理念を公言する傾向がはるかに強い。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "第二に、それ以上に重要な答えは、ビジョナリー・カンパニーは理念を宣言しているだけではないことだ。その理念を組織全体に浸透させ、個々の指導者を超えたものにするための方法もとっている（この点についてはあとで触れる）。 　・ビジョナリー・カンパニーは、比較対象企業よりも、従業員に基本理念を徹底して教化し、理念を中心に、カルトに近いほど強力な文化を生み出す。 　・ビジョナリー・カンパニーは、比較対象企業よりも、基本理念に合っているかどうかを基準として、経営陣を慎重に育成し、選別する。 　・ビジョナリー・カンパニーは、比較対象企業よりも、目標、戦略、戦術、組織設計などで、基本理念との一貫性を持たせている。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "ビジョナリー・カンパニーが掲げる基本的価値観はごくわずかで、たいていは三つから六つである。基本的価値観が六つ以上あるビジョナリー・カンパニーはひとつもなく、ほとんどが五つ以下だった。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "要するに、社員の自己表現を尊重しているのだ。これが来訪者には強烈な印象を与えるらしい。ピクサーに行って帰ってきたら、自分の仕事人生に何か大切なもの──目に見えるエネルギー、連帯感や奔放な創造性、陳腐だが「可能性」──が欠けているような気がして寂しくなった、と言われることがよくある。私", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "ピクサーを特別足らしめているもの、それは「問題は必ず起こる」と思って仕事をしていることだ。問題の多くは隠れて見えない。それを明るみに出すことが自分たちにとってどれほど不快なことであっても、その努力をする。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "効率は目標の一つだが、品質は究極の目標であると社員に言ったならば、その本気度を示すことが必要だ。私は、人を最優先する──ただ口でそう言うのではなく実際の行動で証明する──ことで、その文化を守っていることを実感している。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "だから、チームの雰囲気にはつねに気をつけておいたほうがいい。ネガティブな人間がいると、チームの雰囲気は確実に悪くなる。リモートワークの環境なら、なおさら致命的だ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "働きすぎをふせぐためには、チーム全員でお互いに目を光らせておくことだ。そして何より、チームをまとめるリーダーや経営者が「働きすぎはよくない」というムードをつくっていく必要がある。リーダーが残業好きだと、部下もそれに引きずられてしまう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "私の「ハピネス」についての哲学は、どこから来たのか、ということです。 話は簡単です。最終的に「幸せになること」が目的で仕事をしているのなら、もっと「幸せそのもの」に焦点をあてるべきだということに気づいたのです。だからザッポスは社員、顧客、取引先、そして世界に幸せを届ける会社でありたいのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "●私は会社には単なる利益追求を超えた崇高な目標があると信じている。 ●ザッポスでの私の役割には真の目的がある——それは単なる仕事以上のものである。 ●私は、自分で自分のキャリアをコントロールしており、ザッポスで個人的にも仕事の上でも成長しているのを感じている。 ●私は同僚を自分の家族や友人のように考えている。 ●私は仕事にとても満足している。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "費用をかけるだけでは自分が望むようなブランドを構築できないとしたら、それでは企業はどうすればいいのでしょうか。 長期的にブランドを構築するための最善の方法とは何でしょうか。 一言で言えば、企業文化です。 ザッポスでは、企業文化がきちんと設定できていれば、素晴らしいカスタマー・サービスも、長期にわたる素晴らしいブランド構築も、情熱的な社員や顧客といったそのほか大部分のことも、自然に始まると考えています。 私たちは、会社の文化と会社のブランドは本質的に一枚のコインの表と裏だと信じているのです。ブランドは初めは文化に後れを取るかもしれませんが、いつかは追いつきます。 企業文化こそがブランドなのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "個人にとっては、個性が運命です。 組織にとっては、文化が運命です。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "よく企業の多くが、社員は会社にとって最も大切な財産だと言いますが、そのアプローチにはいくつか問題があります。第一に、誰かが会社を辞めると、財産を失ってしまうことになります。第二に、会社が成長しても、社員が入社した時のスキルのまま成長していないと、そのうち社員が役に立たなくなるかもしれません。そうなってしまうと、通常、多くの企業で用いられる解決策は、社外からより経験豊富な人材を雇い入れるというものですが、これが第三の問題をつくることになります。そのような新しい人材は、しばしば企業文化にフィットしないのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちが講演をする際はいつも、ザッポスのコア・バリューを用いています。講演をするという機会をザッポスの広報活動にあからさまに使うのではなく、聴衆が「成長と学びを追求する」よう手助けをするために、私たちがどのように物事に取り組んでいるかについてできるだけ分かち合おうとしています。さらに「コミュニケーションにより、オープンで誠実な人間関係を築く」ように努めようというコア・バリューに沿って、私たちは喜んで数字やそのほかの詳細情報をシェアしています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "本書の関連リンク ［英語］ 本書のウェブサイト http://www.deliveringhappinessbook.com 推薦図書 http://www.deliveringhappinessbook.com/books ザッポスのコア・バリュー http://www.deliveringhappinessbook.com/zappos-core-values あなたの所属組織のコア・バリューを設定するには http://www.deliveringhappinessbook.com/core-values 「いかにツイッターがあなたをよりよく、より幸せな人にできるのか」 http://www.deliveringhappinessbook.com/twitter-better/ バスツアー http://www.deliveringhappinessbus.com/ トニー・シェイのツイッター（@zappos） http://twitter.com/zappos ザッポスとザッポス社員のツイートに対する皆のコメント http://twitter.zappos.com ザッポス・カルチャーに関する写真とビデオ http://blogs.zappos.com ザッポスについて http://about.zappos.com ザッポス・インサイト・ビデオ　起業家と企業のための申し込み http://www.zapposinsights.com ザッポスのリクルート情報 http://jobs.zappos.com カルチャーブック（郵送先住所をご記入ください：アメリカ国内のみ） ceo@zappos.com ラスベガスのザッポス本社見学ツアーについて http://tours.zappos.com ［日本語］ 日本語翻訳スタッフによるブログ http://dhbookj.typepad.jp/ 日本語翻訳スタッフのツイッター（@dhbookj） http://twitter.com/dhbookj/", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ガムソン、スコット、どちらのやり方もコミットメント期間の抱える根本的な矛盾をよく示している。「この社員はいずれ辞めるだろう」と認識することが、実は相手から信頼を得るベストの方法であり、それゆえ優れた人材に会社に留まろうと思わせるような関係を育てるベストの方法でもあるのだ。 ボストン・コンサルティング・グループのＣＥＯリッチ・レッサーは、これを「オプト・イン（本人の事前承諾）」カルチャーの育成と呼ぶ。「実際に雇用する側になってみるとわかりますが、会社に留まることを期待されているからといって、その期待に応える『義務』があるなんて社員は思っていません」とレッサー。「", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "社内の人々のネットワーク情報収集力を活用する変わった仕組みを導入している。毎回パートナー会議の冒頭に「うわさ」を持ち寄り、一番いいものに一〇〇ドルの賞金を出しているのだ（うわさ話の真偽は問われない）。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 13, "label": "人間性", "freq": 28, "highlights": [{"text": "いずれＡＩは人間の思考能力を 凌駕 するが（すでにチェスや将棋でコンピュータは人間に勝利している！）、越えられるのは論理的思考や演算能力の部分であり、精神の奥深いところまではなかなか追いつけないこともあるだろう。となると、人間がロボットに対して優位を保てるのは人のココロや精神性を扱う分野しかない。 21 世紀後半には、精神世界に精通したセラピストや宗教家が、子どもたちの人気職業になっているだろう。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "一番憧れるのは自然な人、素直な人ですね。どんな事象に対しても、まったく同じ態度で、素直に受け入れることができる。人間の能力のなかでは素直であることが一番高い能力であると思いますね。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "とはいっても、こうしたことが〝言うは易く行うは難し〟であるのも認めなければならない。似た者同士が一緒にいたがるのは、人間のもって生まれた性質によるだけではない。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "神経科学者のジャーク・パンクセップも、同様の意見を述べている。 　「たしかに言えるのは、遊んでいるときの動物たちがきわめて柔軟で創造的な行動をとるということだ（ ５）」 　動物のなかでも、ヒトという種はとりわけ遊びが好きだ、と先述のスチュアート・ブラウンは言う。人間は遊ぶ生き物であり、遊びを通じて生き方を身につけるのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "遊んでいるとき、私たちはもっとも純粋な形で人間らしさを発揮し、自分らしさをさらけ出す。最高の思い出や、「生きている」という実感をもたらしてくれるのは、遊んでいる時間だ。遊びは発想を豊かにしてくれる。新たなアイデアが生まれ、古いアイデアが新たな命を得る。好奇心が刺激され、未知のものを知りたいという意欲がわいてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "要するに、川上さんがやろうとしていることは、「テクノロジーを駆使して人間性を追求する」ということです。テクノロジーとグローバリゼーションによって社会が便利になった反面、人間性は疎外されていくばかりです。そんな未来に対して、レジスタンスをするということが、川上さんが目指していることではないかと思います。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "川上 　そうそう、本質は論理じゃないんですよ。論理は人間性の真逆にあります。論理的なことを振りかざす人というのは、人間の幸福に結びつかないことをやるんですよ。でもみんな、論理というか、正論が好きですよね。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "われわれは人間から知識だけを分離して抽出、精製する集合知は目指しません。われわれが収集するのは知識ではなく人間の感情そのものです。人間がなにかに対して思った感情を表現することは、人間が社会のなかで生きるという行為そのものにほかなりません。われわれは人間の生きるという行為をネット上での新しいコミュニケーション手段を提供することで実現します。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "「相手の信用状態が不明な時は、彼を立派な紳士と見なし、そのつもりで取引を進めると間違いがないと、私は経験で知っている。要するに、人間は誰でも正直で、義務を果たしたいと思っているのだ。これに対する例外は、比較的少ない。人をごまかすような人間でも、相手に心から信頼され、正直で公正な人物として扱われると、なかなか不正なことはできないものなのだ」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❿　 人の美しい心情に呼びかける。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "そもそも、人間の感情は、まだほとんど解明されていない世界です。感情とは何か、ということ自体、定義もされていないのです。ましてや、それをソフトウェアによってシステムに実装することなど、ほとんどできていません。 　ですから、感情の世界で人間が人工知能に追いつかれる心配はまったくといっていいほどなく、私たちの独壇場といえます。ここは自信をもっていいでしょう。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "だからこそ、これから 人工知能の登場によって、私たち人間の生き方が問われる 時代になるということです。または、人工知能の登場によって、私たちの生き方そのものが進化していくということです。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "おまえは、他のだれもがしたがらない仕事をしたのである。人目を気にせず、まことに村人のためになることだけを考えてしたのだ。おまえが切り株を取り除いたお陰で、邪魔物は片づけられ、我々の仕事は、たいへんしやすくなった。おまえのような人間に報賞を与えなかったら、わが前途にある仕事を、とうてい遂行することはできないだろう。おまえの誠実に報いる天からの御褒美である。感謝して受けとり、老後の安楽な生活の足しにするため役立てるがよい。おまえのような誠実な人間を知って、私はとても嬉しい」", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "最先端の科学技術を活用して「ハイテク」を追求する社会は、その極点において、人間にとっての優しさを大切にする「ハイタッチ」の社会に向かうのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "ですから、結論から申しますと、どうも内臓感覚のいちばん麻痺しているのがホモ・サピエンスではないか。しかも文明人というのが、いちばん始末におえない。", "book_title": "内臓とこころ (河出文庫)", "author": "三木成夫"}, {"text": "香水は、いいにおいばかりで作るとうまくいかず、１つぐらいすごく臭いにおいを入れると魅力的な香りになるといいます。同様に、欠点のないアイデアは、愛着もわかないし、記憶にも残らない。メーカーから、ネガティブ・チェックやユーザー調査をしすぎた結果、たしかにコスト・パフォーマンスはいいし、使い勝手もいいけれども、わざわざ買わないな、という個性のないものができてしまった、といった話を聞くこともあります。 商品はやっぱりキャラが大事。キャラクターにはみんな欠点があります。「ドラえもん」はネズミが苦手だし、しっぽを引っ張られたら電源オフになっちゃう。その「弱さ」があるからストーリーが生まれるし、感情移入もできるんです。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "とはいえ、私たちの誰もが孤独な思いをしたり、そこから脱したりすることを覚えておいてほしい。ときおり孤独に感じるのは、人間である証拠だ。実際、意義ある社会的なつながりへの欲求と、そうしたつながりが欠けているときに私たちが感じる痛みこそが人間ならではの特徴であることを示すために、本書のかなりの部分が費やされている。孤独感が深刻な問題となるのは、それが慢性化し、ネガティブな思考や感覚や行動の執拗な悪循環を生み出した場合に限られる。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "さらに最近になると、その数は再び下方修正され、二万から二万五〇〇〇の間となった（７）。私たちを人間たらしめている独特の複雑さは、遺伝子の数にはそれほど依存しておらず、またしても、遺伝子どうしがどのように相互作用し、また、その支配下にある感覚系・統合系・運動系を通して、私たちを取り巻く世界とどう作用し合うかによって決まるのだ。これは、相互に作用する社会的なつながりにこれほど依存し、新しい環境への適応にこれほど長けている生物には、じつにふさわしい仕組みに思える。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "孤独を感じると、ついつい相手を喜ばせたくなるという罠にも落ちる。社会的なつながりには超人的な強さはいらない。心を開いてつながりを得ようとして、手に負えない人数を相手にあれもこれも頑張りすぎると、逆に過労でストレスがたまり、失敗しかねない。肝心なのは、 ただ 人間たれということ、つまり人間に共通の絆に対応できるようにしておくことだ。また、誰も長きにわたって苦難に耐える聖人たれと言っているわけではない。最も適応しやすいモデルは、人との関係に対して心を開きつつも過度な期待を抱かず、用心を促すものを含めた社会的シグナルを的確に察知し、自分が現実的にこなせる関係の種類と数を承知しておく、というものだ。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "には「人間らしさの上に立った、合理的思想」を", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "しかし、多くの人が共感し興味を持つ物語の本質は、「純愛」「成長」「青春」「友情」など、いくつかに限られています。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "アガンベンは人間が生きるということと、人間がただ生存しているということを区別しているのです。その上で、ただ生存するということを何よりも最優先するのならば、人間が生きていると言えるために必要な何かが蔑ろにされはしないかと指摘しているのです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "です。それを明確に特定することは困難と言わねばなりませんが、敢えて言うならば、それは人間が人間として歴史の中で培ってきた文化であり、たとえば宗教などはその表現の一つであると言えるでしょう。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "教会こそは、単なる生存には還元できない、人間が人間として歴史の中で培ってきた文化の価値の守り手ではなかったのか、というわけです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "動物と人間を言語で分けるのはよくある考え方です。それで、いったい人間の言語能力、あるいは人間の言語能力を可能にするような認知能力が進化的にどこから始まったかというと、はっきりわからないわけですよね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "だがそれは歴史的に始まった。でも、人間が存在する以上、絶対的な先行的条件として言語がある。とすると、アガンベンは、人間が他の存在者から区別されるという、その区別の仕方自体が終わったということを言っていることになりませんか。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "そうです。ハッキリ言えば「動物化」。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "動物と進化的に連続的なものとしての人間、ということになりますね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 14, "label": "社会変化", "freq": 23, "highlights": [{"text": "既存の秩序が壊れ、新しい秩序が生まれるという意味では必要です。相変化の起こる前の状態と言っていいでしょう。ただ、歴史の流れからすれば、分化が自然な方向性ですから、均質化した状態のネットワーク社会をこれからどのように分化させていくかが重要な問題となっていきます。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "仮に１つの極論として、均質化した社会をよしとするなら、インターネット社会は個人を主体にした、混沌として無秩序な社会だということをも受け入れる必要があります。そのかわり、そのような社会では情報が拡散していきます。情報の拡散とは、リアル社会での噂の伝播と同じで、それが広まるにしたがい、どんどん情報の質が落ちていく危険性をはらんでいることも知っておくべきでしょう。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "テレビ局ばかりではない。これからは、いままで合併が起こりえないと考えられていた業界で再編が活発になる。たとえば僕が注目しているのはお寺などの宗教法人だ。これから檀家が減っていくため、経営難に陥るお寺が続出する。とはいえお墓があるので簡単に廃寺にもできない。そこで宗派を超えて大きなお寺が小さなお寺を吸収合併する動きが出てくるに違いない。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "大量のコピー問題はなくならない。大規模な情報のトラッキングや全体的な監視状況は変わらない。所有はなくなっていく。バーチャル・リアリティー（ＶＲ）はリアルになっていく。人工知能（ＡＩ）やロボットが改良され、新しい仕事を生み出すのと同時にわれわれの仕事を奪うことは阻止できない。", "book_title": "〈インターネット〉の次に来るもの　未来を決める１２の法則", "author": "ケヴィン・ケリー、服部 桂"}, {"text": "世の中が複雑になり、個人の利害が錯綜するようになると、法律によって利害を調整し、紛争を解決する必要性が大きくなる。客観的に判断できる形で物事の良し悪しを定めたものが法である。法化社会とは人々の生活のなかに良し悪しの基準がより深く入り込んだ社会を意味している。 　インターネットに代表される電子的なコミュニケーションの発達が「良し悪し優先、好き嫌い劣後」の傾向に拍車をかけている。自分の個人的な好き嫌いについての発言であっても、それを受け取る他者が良し悪しの基準を持ち出して「間違っている！」と批判する。ちょっと考えてみれば単に好き嫌いの違いによることが多いのだが、出来合いの良し悪しにすり替えた批判や苦情が即座に不特定多数の人々に拡散し、場合によっては「炎上」という成り行きになる。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "日本の歴史には明らかに 歪曲 がある。日本人のファンダメンタルズは、昔から変わっていないのだ。日本人は先祖伝来、ほとんどの人が夫婦で一緒に働いて、一緒に子どもを育ててきた。現代人には、むしろ平均的な日本人本来の姿に戻れと言いたい。はばかりながら、冨山家は正真正銘のドン百姓、明治の御一新でやっとお上から「冨山」という名字を頂戴した、由緒もへったくれもない血筋である。だから、お武家さまやお公家さまたちの「日本の伝統論」には、くそくらえとしか言いようがない。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "やはり、いまの中高年が「俺も我慢した。その結果、良い人生を送ることができた。だから、いまの若い人たちも我慢するべき」という論法を結構平然と出してくるのが悩ましいのです。それは我慢したから良くなったのではなく、日本人が増えて日本の経済が良くなったので、相応に頑張っていれば取り分がおのずから増えた、というだけです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "一九七〇年代初頭は、田中角栄による「福祉元年」も宣言されており、勤労者の社会的安定と社会保障に対する期待を前提に、中曽根政治は展開されていったと言えるだろう。ここで自民党は従来の支持基盤である農村・商工業者から都市部のサラリーマン層の票を獲得する戦略へと打って出て、これが一定度の成功を収めることになる。一九八四年には経済学者 村上 泰 亮 の言う「新中間大衆の時代」が時代のキーワードとなったように、この時期は「大企業に勤めるホワイトカラー」による安定と豊かさこそが日本の誇るモデルだという、一つの「神話」が勢いを持って流通していた時期にあたる。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "中曽根に見るヘゲモニー戦略をまとめるならば、次のようになるだろう。まず、社会の変化（オイルショックによる伝統的産業基盤の変化と都市化による個人主義化）によって、それまで自民党が依存していた特定の票田が過少かつ先細りになる。このような状況を乗り越えるためには、それまでのような利益誘導型の政治ではなく、わかりやすいシンボルや目標を提示し、有権者を動員する政治が必要になってくる。その一環として出てきたのが、政治主導による「民営化」や間接税構想であったのである。 　現代において、政治は多かれ少なかれ、ポピュリズム的たらざるを得ない。それは歴史や伝統によって支えられていた社会のなかで人々の結びつきが崩壊し、もはや生産関係からなる社会関係に忠誠心を持たない人々の支持を集めるためには、不可欠の政治スタイルであるからだ。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "弁護士の需給バランスが大きく崩れたことに気がつかないまま、「資格をとれば一生安心」と考えていた人は、現実の厳しさにびっくりしていることでしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "ところがこの間、医師への需要は大きく増えました。高齢化の進展で病気になる人が増え、栄養過多と運動不足で生活習慣病も増えています。晩婚化による高齢出産の増加に伴い、自然分娩が多かった出産にも高度な医療が必要となりました。夜間に活動する人が増え、夜の急患も増加。最近はストレスで精神科を受診する人も多いし、昔なら「寝ていれば治る」と言われた風邪でも、病院を訪れる人が増えています。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "これからはあらゆるものが市場型取引に移行し、今よりずっと多くの人が、市場化という現象に巻き込まれます。本章で挙げた例からも、投資やビジネスに縁がない人も含め、すべての人にマーケット感覚は必要なのだということが、理解していただけたと思います。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "アフターコロナは 地方分散の時代 になるでしょうから、飾らない、もっと自然に近い暮らしが主流になるかもしれません。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "社会の価値観や行動規範は、人々が新しく、異質なものと出会うことで、大きく変質しますし、その変化が人類の歴史そのものです。しかし誰にとっても、変化は苦しいものですし、そこにはおのずと許容範囲があります。先ほど、日本の鎖国は「英知」だと述べた箇所で指摘したかったポイントです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "過去 30 年間、新自由主義でやってきて、この短い間に、富の格差が異常なレベルにまで広がる、移民が急速に増える、人口構成比率における白人のシェアが低下する、ＬＧＢＴの権利保護が法制化される、アメリカ社会の屋台骨だったキリスト教文化が廃れていく……。それだけの激変がたかだか、一世代の時間軸で発生するとなると、アメリカとは何なのか、何がアメリカ人なのか、そうしたソウル・サーチング（自己の再確認作業） が必要になっていくのでしょう。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "非近代社会においては 通過儀礼 というものがあって、儀礼を通して一挙に「大人」になるのだから問題はない。しかし、近代以降は、いったい、どこからどの程度に大人になるのか不明なのである。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "少子化の一方で、空前のペット社会ができつつあるのだ。そうした〝ペット〟と〝リゾート〟の間に、私は強い連関を感じる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "この変化には２つ理由があります。「組織へのうたがい」と「情報の洪水」 です。「組織へのうたがい」は、企業や政府などの組織はいいことしか言ってないのではないかと疑うきもちです。震災での政府や一部企業の対応も「組織は信じられない」という世の中の空気に拍車をかけました。人はどんどん裏読みをするようになり、「企業が語ることを、そのまま信じないぞ」という空気が世の中にできました。 「情報の洪水」は、ＷＥＢの普及により、あまりにも情報が増え、人が処理できる量を超えてしまったことをさします。人は自分の周りにあるすべての情報を追うことができなくなりました。そこで、知っている人／特定できる個人のコトバ以外をシャットアウトする状況になったのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "こうした社会の動きの背景には、弁証法の「螺旋的発展の法則」があり、「否定の否定による発展の法則」がある。 　そのことを理解していただきたいのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "結局、昔あったという「家族の絆」なんてものは、「お金持ち以外は家の中で大人しくしていなさい」というのと「女性は家の中で大人しくしていなさい」というのに支えられていただけで、そんなにいいものでもなかったように思う。それよりは、お金はなくても（お金がないからこそ）家族以外にいろんな繫がりを求めるようになった今の状況のほうが健全なんじゃないだろうか。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "ＳＮＳにつきまして、あまりお話ししたことがなかったので、少しだけ僕の考えをお話ししたいと思います。一般的に「つながり」などと、あらゆる局面で言われておりますが、各民族のもっとも濃く小さな「つながり」の本質を僕は家族にみます。血はインターネットより濃いからです。 　フランスの家族人類学者エマニュエル・トッドの分析から僕が考えることは、今の日本の問題は、新自由主義ではなく、日本的直系家族（長男が家を継ぐことが是）が壊れ核家族化したことにあると思っています。また、柳田國男の『蝸牛考』にもあるように、中心から革新が伝播して周辺に古形が残るという周圏分布を見ると、意外ですが核家族がもっとも古い形態で、次に絶対家族、そして次は共同体家族ということなります。僕は常々、ネットで起きたことは現実でも起きるとお話ししていますので、そう考えると、ネットが向かう次の形態は共同体家族であり、それが日本のＳＮＳが持つ本質であって、核家族型の英米型とは同じシステム（ＳＮＳ）でも「違った使い方」＝共同体家族型をすることになるんだと睨んでいますし、ツイッターの使い方など、英米と日本では違う理由が、アルファベットと漢字の差以外にも、ここにあると思います。 　次に、このもっとも濃く小さな「つながり」である家族形態の変貌がいつどのように起きるのか、ですが、これは、識字率と出生率と大きく関係があると考えています。「アラブの春」をＳＮＳ革命などと安直に話す人がいますが、そうではなく、識字率が上がると（そして出生率が下がると）、社会が不安定になりパラダイムシフトが起きやすくなるのです。ソ連の末期も最近のアラブもそうで、日本だと、江戸末期がまさにそうでした。今、日本の社会が直面しているのはテレビと新聞ｖｓデジタル識字率です。インターネットで自由に情報を得…", "book_title": "白本", "author": "高城剛"}, {"text": "ＳＮＳにつきまして、あまりお話ししたことがなかったので、少しだけ僕の考えをお話ししたいと思います。一般的に「つながり」などと、あらゆる局面で言われておりますが、各民族のもっとも濃く小さな「つながり」の本質を僕は家族にみます。血はインターネットより濃いからです。 　フランスの家族人類学者エマニュエル・トッドの分析から僕が考えることは、今の日本の問題は、新自由主義ではなく、日本的直系家族（長男が家を継ぐことが是）が壊れ核家族化したことにあると思っています。また、柳田國男の『蝸牛考』にもあるように、中心から革新が伝播して周辺に古形が残るという周圏分布を見ると、意外ですが核家族がもっとも古い形態で、次に絶対家族、そして次は共同体家族ということなります。僕は常々、ネットで起きたことは現実でも起きるとお話ししていますので、そう考えると、ネットが向かう次の形態は共同体家族であり、それが日本のＳＮＳが持つ本質であって、核家族型の英米型とは同じシステム（ＳＮＳ）でも「違った使い方」＝共同体家族型をすることになるんだと睨んでいますし、ツイッターの使い方など、英米と日本では違う理由が、アルファベットと漢字の差以外にも、ここにあると思います。 　次に、このもっとも濃く小さな「つながり」である家族形態の変貌がいつどのように起きるのか、ですが、これは、識字率と出生率と大きく関係があると考えています。「アラブの春」をＳＮＳ革命などと安直に話す人がいますが、そうではなく、識字率が上がると（そして出生率が下がると）、社会が不安定になりパラダイムシフトが起きやすくなるのです。ソ連の末期も最近のアラブもそうで、日本だと、江戸末期がまさにそうでした。今、日本の社会が直面しているのはテレビと新聞ｖｓデジタル識字率です。インターネットで自由に情報を得...", "book_title": "白本", "author": "高城剛"}, {"text": "近代が貨幣経済行為が自由になった社会であるのに対して、現在、新しく変化しつつある私たちの社会とは「影響行為・洗脳行為が自由になり、個人に開放されつつある社会」なのだと。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 15, "label": "競争優位", "freq": 23, "highlights": [{"text": "書店では委託販売制により、売れ残りを出版社に返本できる。だが近年は出版点数の増加を受け、返本率が業界平均で４０％ に上昇。５冊に２冊が消費者に届かず廃棄となる状況は、書店・出版社・取次の３者すべてを疲弊させている。この中で、ＴＳＵＴＡＹＡのＦＣの返本率は平均３２～３３％ と一段低い。早期に全ＦＣ平均で２５％ を目指しており、一部にはこの目標が達成できた店舗もある。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "発見できたのは、ネットでは絶対に実現できない居心地、おすすめを発見できる空間価値。そして収益はカフェを複合することで実現する」", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "「役に立つかどうか」だけで物事を判断すると、すでに役立つことが証明されていることにしか時間を使わなくなる。 だが、「役立つ」ことが明らかになってからでは遅すぎる。 「役立つ」ことが証明されている分野では激しい競争が起きるからだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "地域やそこで生活する顧客との密着度合いが経済効率を決めるので、下手にグローバルに拡大・拡散するより、地域における密度を高める努力をしたほうが経済的に 儲かる。裏返して言えば、規模の不経済性に陥りやすい産業領域とも言える。したがっていったん地域ドミナントをつくり上げると、競争上、ディフェンスには強い。世の中の人は、グローバル企業に代表される規模の経済性を常に過大評価する傾向があるが、現実のビジネスの世界ではほとんどの産業で密度の経済性が効く。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "一時期、カルフールなど外国のスーパーが日本に進出した。しばらくして、日本から撤退した。ウォルマートにしても、苦戦しているのは明らかだ。グローバルサプライチェーンと言ってみても、食の世界では限度がある。生鮮品は腐ってしまうし、地域ごとに異なる味付けや食感は、グローバル一括管理では対応できない。結局、最後の最後でローカル調整コストがかかってしまう。調整コストが高くなると、規模の経済が効かなくなってくる。かえって、地産地消型でやったほうが効率がいい場合が多くなる。 　結局、地域との接合面が強いので、これを切り離してスイッチするというのは経済的に不合理である。スイッチングコストが大きいところに、さらには地域でドミナントをつくってしまうと、そこに攻め込むことがかなり困難になるのだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "地域で濃密な寡占構造をつくられてしまうと、圧倒的に物流効率と管理効率でかなわなくなる。一〇〇メートル歩くごとにセブン－イレブンがあるので、集中的に管理できるだけでなく、物流もあっという間に終わる。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "しかし、時として「破壊的技術」が現れる。これは、少なくとも短期的には、製品の性能を 引き下げる 効果を持つイノベーションである。皮肉なことに、本書で取りあげた各事例では、大手企業を失敗に導いたのは破壊的技術にほかならない。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "情報が入手でき、計画を立案できる持続的技術では、リーダーシップをとることは、競争上、重要でないことが多い。このような場合、追随者も先駆者も実績は変わらない。先駆者が圧倒的に有利なのは、市場のことがほとんどわからない破壊的イノベーションの場合である。これがイノベーターのジレンマである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "戦略的な部分では、グロースさせたいサービスの 最大の特徴をいかに生かしていくかを考えるのが重要です。 　フェイスブックの場合であれば「実名制」です。 　それまでの匿名性とは逆を行く実名制では何がどう変わるのか？　現実世界とインターネットの世界をどのように結び付けられるのか？", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "ビジョナリー・カンパニーは、自らに勝つことを第一に考えている。これらの企業が成功し、競争に勝っているのは、最終目標を達成しているからというより、「明日にはどうすれば、今日よりうまくやれるか」と厳しく問い続けた 結果、自然に成功が生まれてくるからだ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "一言でいえば、 企業として早い時期に成功することと、 ビジョナリー・カンパニーとして成功することは、 逆相関しているのだ。長距離レースで勝つのはカメであり、ウサギではない。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "フィリップ・モリス ・選択の自由という権利（喫煙し、自分がほしいものを買う権利）は守るに値する。 ・勝利─トップ企業になり、他社を打ち破る。 ・自主性の発揮を奨励する。 ・性別、人種、階級に関係なく、能力に応じて機会を与える。 ・猛烈に働き、不断の自己改善を進める。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "私に言わせれば、彼に足りないのは学歴でも年収でもありません。足りないのは、マーケット感覚です。若さやルックスや性格など、自分の強みが活きる市場を選んで婚活を行なっていれば、こんな男性が２００連敗するなんてありえません。彼のような男性を好ましいと考える女性は、別の市場にはたくさん存在するし、合コンの場合なら「相手は 20 代の女性がいい」と考えても、高望みでもなんでもありません。 反対にいえば、こういったサービスを使うべき男性は、「口下手でまじめ。ルックスにも自信はないけれど、年収も学歴も高い」という人たちです（ 図 13）。そういう人たちは、街中でナンパをするより、結婚情報サービスを使うほうが圧倒的に有利です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "ちなみに高尚とされる寄付項目には国ごとに違いがあり、日本人が好きな分野は教育ですが、欧州ではイルカや鯨などの「ほ乳類」や「環境」、アメリカでは「人権」や「アート」も競争力が高いキーワードです。寄付を集める際には、こういったことを理解しているかどうかで、結果が大きく左右されるのです。 また寄付をする人と、それを受けとる人の間に適度な距離があることも重要です。日本で大人に寄付をすると、寄付を受けた人が「ビールを飲んでいた！」「タバコを吸っていた！」とか、ひどいときには「楽しそうに笑っていた！」とまで、騒がれます。「かわいそうだと思ったから寄付をしたのに、あたしより楽しそうだ！」となれば、被援助者は一気に競争優位性を失ってしまうのです。 ところが海外の子供たちへの寄付であれば、寄付したお金がどう使われているか、日本からはよく見えません。海外の子供たちへの寄付だって、一部が関係者のタバコ代に消えたり、物資の横流しがあったりもするはずです。しかしそれらが、日本から見えることはほとんどありません。これが寄付を獲得するうえで、極めて有利に働くのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "モノ以外でも、日本ではみんな普通にやっているけれど、世界から見れば、驚くほどレベルが高い、ということはたくさんあります。YouTubeで日本人女性がメイクアップ（化粧）の方法を紹介する動画が海外の女の子からも人気なのは、日本人女性のお化粧スキル自体が、極めて高いレベルにあるからです。 同じくキャラ弁の作り方を紹介する動画も世界中から驚嘆されていますが、あんなスゴイお弁当でなくても、日本人の普通のお母さんが作るお弁当は、世界でトップクラスのクオリティです。アメリカやイギリスでは、パンを切ってピーナツバターを塗っただけのサンドイッチを子供に持たせるのは、手抜きでもなんでもなく、ごく普通のことです。日本のお母さんが日常的に作っているサンドイッチを紹介するだけでも、世界の人はびっくりすることでしょう。 その他、秘書もファストフード店のアルバイトも、日本はスキルが高すぎるくらい高いです。そういった人たちにマーケット感覚があれば、日本ではごく当たり前の自分のスキルや経験が、世界ではものすごく高く売れるのだと気がつくはずです。 スーパーマーケットやファミレスで働く人たちは、自分たちより、大銀行に勤める人のほうが有能だと思っているかもしれません。しかしグローバル金融の世界において、日本のメガバンクに勤めていることは、決して優秀とは見做されていません。一方、日本のスーパーのレジスキルやファミレスの接客スキルは、どこの国の人たちと比べても圧倒的にスゴイのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "アマゾンは Place（チャネル）によって顧客からの行動データを把握し、これを使ってPromotion（販促）・Price（価格）・Product（商品）を変革し、顧客にさらに新しい価値を提案できる のだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "彼らは消費者のオムニチャネル化が小売業の情報発信や商品の提供方法に革新をもたらすことを指摘している。その上で、伝統的小売業もオンライン専業企業の戦略も取り込んだ、ネットとリアルの融合を考慮するべきであると提唱している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "新たな基幹産業の立ち上げにおいて日本がもっとも有利な立場にいることも忘れて、それを実現するための知恵もしぼらず、思惑が見え見えの海外からの投資にただただ頼ろうとするのは、きわめて害の多い情けない姿であることを、肝に銘ずるべきである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "そのような国が、将来的にどうなっていくだろうか。そして、そのような国で、お互いに知恵を出し合って磨き合う製造現場が確立できるだろうか。 　そう考えれば、必要以上に日本がインドや中国に追いつかれることを心配して、それへの対処に力を削ぐよりも、むしろ日本がすでにもっている優位性を高める努力を重ねたほうがはるかに有益であろうことは、自明のことではないか。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "チケットの相場はたとえば、インディーズバンドが１５００円でライブをしているとしたら、同じくらいのキャリアと知名度の地下アイドルは、３０００円ほどの入場料でライブを開催することができます。 　さらに地下アイドルはカラオケを使用してライブをするため、バンドのように機材チェンジの手間や時間がかからないので、多めに組数を出演させることができます。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "難しいことです。しかし、私たちがもし努力しなければ、ビジネスは立ち行かなくなるでしょう。ライバルに圧倒されずにいられる唯一の理由は、私たちが取り組んでいることが難しいことであり、私たちは誰よりもそれをうまく行っているからなのです。もしもあまりにも簡単なことであれば、私たちを押し流す大きな競争の波を招くことになるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "当時ペイパルの上級幹部だったリード・ホフマンだった。彼は幹部クラスから個々のエンジニアに至るまでスタッフ全員に、各自のネットワークを活用して、ビルポイントの戦略を探るよう命じた。一方、ビルポイント側の担当チームは、ペイパルの戦略を読み取るのにネットワーク情報収集力の活用を一切考えなかった。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "先にブランド価値を顕著に高めておいて、価格弾力性をできるだけ小さくしておく ことです。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 16, "label": "信頼関係", "freq": 22, "highlights": [{"text": "実際のところ、トラスト・バッテリーは、それまでに起こったあらゆる相互作用の縮図だ。バッテリーを再チャージしたければ、いままでとはちがうことをしなければならない。新たな行動と新たな態度だけがチャージにカウントされる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "もっとも家族も部下も女性も、人の心をつかむ大本は全部一緒。会社はロングタームですから、簡単にはいきません。でも、社長と社員がお金だけ、ビジネスだけの関係だったら、必死で働けないですよ。誰だって嫌な人の下で働きたくないでしょう？", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "目標を共有するためには、お互いに隠すところなくすべてをさらけ出し、深いところでわかり合うことが必要 です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "その潜在意識がいちばん大切にしているのは「自分を守ること」なのです。したがって、潜在意識を味方にするためには、相手を守ってあげるという姿勢がどうしても必要になる。これはテクニックよりもはるかに大切なことです。", "book_title": "コミュニケーションのための催眠誘導～「何となく」が行動を左右する～ (光文社知恵の森文庫)", "author": "石井 裕之"}, {"text": "ブレイントラスト会議で相手がヒートアップしても、それは問題解決に向けた熱意の表れであり、自分に向けられた感情ではないことを誰もがわかっていた。そうした互いへの敬意や信頼関係のおかげで、彼らは凄まじい問題解決能力を発揮した。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "友の体験や意見は、自分にとって役に立つ確率がとても高い からだ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "コアファンは、「信頼」する企業やブランド、商品を、もう一歩踏み込んで「応援」したい。大っぴらに力強く応援したい。そういう「応援できる要素」を少しずつ増やしていく施策 がこの項である。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "我々人間は、意図のよくわからない相手から、自分の現状や、「真の」素晴らしさ、改善のためにしなければならないことを指摘されても、よい働きはできない。卓越性を伸ばせる唯一の機会は、自分のことをよく知り気にかけてくれる相手から、その人が体験したことや感じたことを教えてもらった時──特に、我々の中で本当に有効な何かが発揮された瞬間を見つけて、教えてもらった時なのである。", "book_title": "フィードバックの誤謬 DIAMOND ハーバード・ビジネス・レビュー論文", "author": "マーカス・バッキンガム、アシュリー・グドール、DIAMONDハーバード・ビジネス・レビュー編集部"}, {"text": "自分の話を納得いくまで聞いてもらい、理解、同情してもらえたと実感できた時、女性は自分が相手に愛されていることを確信でき、それだけで心が満たされ始める。不信感や猜疑心はたちまち消し飛んでいく。", "book_title": "ベスト・パートナーになるために―――男と女が知っておくべき「分かち愛」のルール 男は火星から、女は金星からやってきた", "author": "ジョン・グレイ、大島 渚"}, {"text": "ジャパネットたかたが売っているのは「孫のアドバイスという価値」だと思っています。実際の孫は、祖父母の買い物に、毎回つきあってくれたりはしません。自分たちの生活やニーズも、そこまで把握してくれていません。でも「孫のように、全幅の信頼を寄せられる売り手」を求めている消費者は、たくさんいるのです。 同じような価値を売っている売り手は、他にもたくさんいます。糸井重里さんの運営する「ほぼ日」や、カリスマ主婦の栗原はるみさんが勧める料理グッズも同じでしょう。彼らも、ごく限られた数の商品を取り上げ、その特徴や使い方、さらには、顧客がなぜその商品を選ぶべきなのか、詳細に説明します。 ここで重要なのは、その説明の合理性ではありません。説明を聞く前から、顧客側が「この人は、私が信じられる人だ」「この人は、自分に合う商品を理解してくれている」と感じていることが重要なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "また、休暇の申請も必要ない。いつでも好きなだけ休暇をとることが可能だ。社員にお願いしているのは３点だけ。（１）妥当な範囲内にとどめること、（２）カレンダーに予定を入れること、（３）チームに迷惑をかけないように調整すること。 　そうやって一人前の大人として扱えば、彼らもけっして無茶", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "発展途上国において人々が企業の長期的なビジョンや方針といったものに目もくれず、得しそうなことに飛びついてしまったり、噓をついてしまうのは、そもそも政府や制度が不安定なので、長期的な社会システムを信じる土壌がないという理由があります。国によっては社会に通底する考え方として血縁、地縁しか信じず、あとは仮想敵というところもあります。 ここでは日本のビジネスにおける信頼関係や「当然わかってるよね」といったコミュニケーションは通じません。 言語化、明文化、ルール化、そして明示的なインセンティブが必要となります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "ある調査によると、いまでは「マーケティング・コミュニケーションよりもＦファクター（friends=友達、families=家族、Facebook fans=フェイスブックのファン、Twitter followers=ツイッターのフォロワー）が信頼されるという」（Kotler 2017）。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "この変化には２つ理由があります。「組織へのうたがい」と「情報の洪水」 です。「組織へのうたがい」は、企業や政府などの組織はいいことしか言ってないのではないかと疑うきもちです。震災での政府や一部企業の対応も「組織は信じられない」という世の中の空気に拍車をかけました。人はどんどん裏読みをするようになり、「企業が語ることを、そのまま信じないぞ」という空気が世の中にできました。 「情報の洪水」は、ＷＥＢの普及により、あまりにも情報が増え、人が処理できる量を超えてしまったことをさします。人は自分の周りにあるすべての情報を追うことができなくなりました。そこで、知っている人／特定できる個人のコトバ以外をシャットアウトする状況になったのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "ＢＲＡＣやグラミン銀行では、借り逃げする悪徳な利用者を避けるために、お互いに返済を助け合うという数人の互助グループを結成した人びとにだけお金を融資する方式をとっている。お互いが必要な金額や収益性についてチェックするし、また一人が返済できなくなったらほかの人が借りられなくなるから、責任性も高まる。これによって、九九パーセント近くの返済率を実現しているのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "マーケティング担当者が陥りがちなもうひとつの落とし穴は、本来ならエンゲージメント（絆） や信頼を築くことに集中すべき時に、いかに話題性を持つかを考えることに集中しすぎることです。私の母はもの静かなタイプですが、そんな母が何か言う時、私は耳を傾けます。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちにはマニュアル原稿がありません。どんな顧客に対応する際も、ザッポスの社員は常に最善の判断をしてくれると信じているからです。私たちは 顧客と個人的な気持ちのつながり——社内ではＰＥＣ＝personal emotional connection と呼んでいます——を育くむことができるように、電話でのやり取りではいつもオペレーター各自が自分本来のパーソナリティを発揮してほしいと願っています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "強い絆を持つための重要な要素は、気持ちのつながりを育むことです。人間関係において常に正直に行動し、思いやりを持ち、気さくで、誠意を持ち、すべきことをするように気を配り、人間関係を大切にすることが重要です。信頼を築くことは最も難しいことですが、信頼があれば、はるかにたくさんのことを成し遂げられます。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ガムソン、スコット、どちらのやり方もコミットメント期間の抱える根本的な矛盾をよく示している。「この社員はいずれ辞めるだろう」と認識することが、実は相手から信頼を得るベストの方法であり、それゆえ優れた人材に会社に留まろうと思わせるような関係を育てるベストの方法でもあるのだ。 ボストン・コンサルティング・グループのＣＥＯリッチ・レッサーは、これを「オプト・イン（本人の事前承諾）」カルチャーの育成と呼ぶ。「実際に雇用する側になってみるとわかりますが、会社に留まることを期待されているからといって、その期待に応える『義務』があるなんて社員は思っていません」とレッサー。「", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "ここで注目してほしいのは、グルテキンの任務内容が、社員側と会社側の双方のニーズに役立つものでなければならなかった点だ。グルテキンとリンクトインには、双方にメリット（グルテキンにはより包括的なスキルセット、リンクトインには新鮮な視点）をもたらすであろう相互投資（営業への異動）を約束し合えるだけの相互信頼があった。だから、強固なアライアンスが実現しているのである。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "社員に「あなたが最も大切にしている価値観は？　どんな人でありたい？」などと聞くのは、最初はきまりが悪く感じられるかもしれない。だがこれは、いい人ぶろうという話ではない。価値観について話し合うと、社員とその上司、そして会社との三者間でより強い信頼と信義を築く大事な一歩を踏み出せる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "ただし、率直な質問をする相手が部下の場合、背後にある力関係のせいで高圧的に感じさせる可能性があることを心にとめておかなければならない。だからこそ、最初にあなたのほうから心の奥底にある価値観やありたい姿を打ち明けて口火を切ることが重要なのだ。前述のアーロンの実験でも、お互いに自分の心のうちを開くような回答を相手に伝えるよう、被験者に求めていた。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 17, "label": "成長", "freq": 21, "highlights": [{"text": "いちばん価値のある経験とは、特定の製品分野や技術について何を身につけたかではなく (そういうものは、たぶん、そのうち古くて使えなくなってしまう)、優れた製品を作り出したり、製品開発チームで陣頭指揮を執ったり、事業の成長展開を管理したりするプロセスについて何を学んできたかにある。また、自分自身を知り、次にどう向上させていくかについて何を学んできたか、なのである。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "能力があるいい人を集めて会社をどんどん大きくしていくわけですから、経営者も能力を高めて、魅力を感じてもらわないといけない。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "人や組織の成長を長年見守ってきましたが、大きな進歩を望むなら、日々何度も繰り返す小さな行動にこそ着目すべきです。小さな改善を地道に繰り返すことが、大きな変化につながるのです（ ６）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "なぜこんなことをさせたかといえば、自分に辛苦をもたらす人間こそ、自分を成長させてくれる恩人だからです。 安倍は後藤が抜けたり入ったりしたおかげでひと回り成長できたのだし、新垣も久住がいたからこそお姉さん役としてチームに貢献できたのです。 　もうひとつ、この行動には「失敗の原因を自分に戻す」という意味もありました。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "誰かを恨みに思っていてもいいことはひとつもないし、それどころか自分自身が損をしてしまう。 反対に、すべての原因を自分にして、自分に何が足りないかを考えるようにすれば、反省点や改善点が見つかり成長につながります。 自分を取り巻く人間関係も明らかによくなります。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "ビジネスにおいてはどれだけの経験値を持っているかがすべてといっていいほどです。そこで問われる経験は、ビジネスに限ったことではありません。 　プライベートでどれくらい失敗しているかということも大きな意味を持ってきます。 　 リスクのないところで本気になる経験をしておかないと、リスクがあるところで本気は出せない というのが私の持論です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "でも、我慢というのは何なのか。基本的には、小さな成功体験を積み重ねながら歩み続け、どこかにあるだろう「なりたい自分」や「こうであってほしい環境」を実現しようとするひとつのプロセスである、という話になります。つまりは、いきなり目的地に辿り着くことなどできないから、マイルストーンに一個一個到達するために、我慢して歩き続けなければならない、という話に過ぎません。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "会社が小さいときって人がいないから、やったことがない人にやらせることになる。そういう何もないところから道を切り開く経験をした人はとてつもなく伸びることがある、と思います。やっぱり先輩がいると、なかなか成長しないんですよ。先輩がいないというのは、人が成長するために一番いい環境です。まあ、うまくいかないこともたくさんありますけど。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "最も頭の切れるメンバーを引きつけるには、自分自身の不安感を追いやる必要があった。ＡＲＰＡの教訓が頭にこびりついていた。難問にぶち当たったときは賢くなれ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "「来た、来た、来た！」と思ったチャンスは、案外チャンスではありません。これはつまり、「めんどくさい」ほうの選択肢にこそチャンスがあり、ビッグゲインがある、ということを意味しています。 チャンスというのはオブラートに包まれているもの。だから、チャンスをつかめないと言う人は、第１は単に気づかない人で、第２はめんどくさいと思ってチャンスから目をそらしている人。めんどくさいものこそ、中途半端にふてくされてやると、ただのロスにしかなりません。 しかし、全力でやればロスではなく、ゲインになります。「めんどくさいこと」こそ、全力でトライするよう意識すれば、チャンスは自然と寄ってきます。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "まず、人は無力な存在としてこの世に生を受けます。そしてその無力な状態から脱したいと願う、普遍的な欲求を持っています。アドラーはこれを「優越性の追求」 と呼びました。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "劣等感は努力や成長を 促すきっかけにもなりうるものです。たとえば、学歴に劣等感を持っていたとしても、そこから「わたしは学歴が低い。だからこそ、他人の何倍も努力しよう」と決心するのだとしたら、むしろ望ましい話です。 一方の 劣等コンプレックスとは、自らの劣等感をある種の言い訳に使いはじめた状態のこと を指します。具体的には「わたしは学歴が低いから、成功できない」と考える。あるいは「わたしは器量が悪いから、結婚できない」と考える。このように日常生活のなかで「Ａであるから、Ｂできない」という論理を振りかざすのは、もはや劣等感の 範疇 に収まりません。劣等コンプレックスです。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "アイドルの本質である「ファンに応援されることでアイドルが成長し、それを見守ることでファンも楽しい」という関係を〝純化〟させたのが地下アイドルではないかと私は考えています。 　それなので地下アイドルとファンの関係は、決して一方通行ではありません。普通の人間関係と同じように、喜びや悲しみや病みや楽しみが絡み合った、繊細で複雑なものなのです。 　地下アイドルは、メジャーアイドルへのカウンターカルチャーでもありません。インディーズ文化を面白いと感じ、そこにしか身を置けない女の子もファンも存在していて、地下アイドル文化はそういう人たちの受け皿にもなっています。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "『勉強の哲学』ではそれを「教師の有限性」に触れることなんだと言っています。その有限性から学ぶんですよね。教師の有限性と自分の有限性を照らし合わせたところで何かが起こることが主体化だから。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "講義というのは内容の伝達であると同時に、そうした理解の仕方という思想のレベルでのコミュニケーションであって、それを通じて教師も学生も成長していくわけですよね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "●私は会社には単なる利益追求を超えた崇高な目標があると信じている。 ●ザッポスでの私の役割には真の目的がある——それは単なる仕事以上のものである。 ●私は、自分で自分のキャリアをコントロールしており、ザッポスで個人的にも仕事の上でも成長しているのを感じている。 ●私は同僚を自分の家族や友人のように考えている。 ●私は仕事にとても満足している。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "失敗しないということは、必要なリスクを取っていないことを意味するからです。時", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "意思決定能力を養い、高めていってほしいのです。失敗から学ぶ限り、私たちは失敗を奨励します。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "考えてみてください。ちゃんとリスクを取っていますか。失敗することを恐れていますか。居心地のよい場所に甘んじずに、そこから外へ踏み出していますか。取り組んでいる仕事に冒険心や創造性が発揮されていますか。あなたがザッポスに貢献できるクリエイティブなこととは何ですか。オープンな心で状況と課題に向き合っていますか。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "よく企業の多くが、社員は会社にとって最も大切な財産だと言いますが、そのアプローチにはいくつか問題があります。第一に、誰かが会社を辞めると、財産を失ってしまうことになります。第二に、会社が成長しても、社員が入社した時のスキルのまま成長していないと、そのうち社員が役に立たなくなるかもしれません。そうなってしまうと、通常、多くの企業で用いられる解決策は、社外からより経験豊富な人材を雇い入れるというものですが、これが第三の問題をつくることになります。そのような新しい人材は、しばしば企業文化にフィットしないのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "自分で自分をコントロールしていると感じられるか、自分が進歩していると感じられるか、つながり（関係の数と深さ）、ビジョンと意味（自分自身よりも大きなものの一部となること） の四つのことで決まります。このフレームワークの面白いところは、あなたがこのコンセプトをビジネスにも応用できるということです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 18, "label": "技術革新", "freq": 19, "highlights": [{"text": "20 世紀後半の素材革命は、カーボンファイバーの発明だった。カーボンファイバーは、とにかく軽くて強い。鉄と比べて約４分の１の重さなのに、強度は約 10 倍だ。この新素材の登場によって、さまざまなものが軽量化された。たとえば航空機が軽くなって速くなったのも、あるいはノートパソコンを気軽に持ち運べるのも、カーボンファイバーのおかげだといっていい。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "そのうち人類の歴史で実際に家畜化されたのは 14 種だけなのだそうです。特に先に挙げたヒツジ、ヤギ、ウシ、ウマ、ラクダがメジャーな 5 種類で、この 家畜がいたから人類は文明化を達成できた のです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "このように世界史を動かす原動力とは、「移動力」の変化なのです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "資産総額１億円以上の顧客に限定されていた資産管理サービスも、疲れを知らないロボアドバイザーなら、年収数百万円の人をターゲットにしても、十分成り立ちます。企業から見れば、ピラミッドの頂点付近の人しか相手にできなかったのが、裾野のほうの人まで視野に入ってくるわけです。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "金融は本来、お金が余っているところと足りないところをつなぐ独占的なポジションをとることで、利ざやを稼ぐビジネスです。他に代替が効かないポジションに位置しているからこそ、大量の人間が一つひとつの取引を手作業で確認するという、ある意味、贅沢な仕事のやり方が許されてきたともいえます。しかし、フィンテックによって、そうした機能が低コストで実現できるようになると、既存の金融機関も現在の高い人件費を維持できなくなるかもしれません。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "今では、人間の体内に注射で埋め込んだ、とても小さいマイクロチップでデジタル決済を行っているそうです。電車に乗るとき、改札口のゲートで、チップを埋め込んだ手の甲をピッとかざして電車やバスに乗ります。マイクロチップには移動データはもちろんのこと、その人の個人情報まで入っています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "失敗の理論の第二の要素として、技術革新のペースがときに市場の需要のペースを上回るため（図０・１を参照）、企業が競争相手よりすぐれた製品を供給し、価格と利益率を高めようと努力すると、市場を 追い抜いて しまうことがある。顧客が必要とする以上の、ひいては顧客が対価を支払おうと思う以上のものを提供してしまうのだ。さらに重要な点として、破壊的技術の性能は、現在は市場の需要を下回るかもしれないが、明日には十分な競争力を持つ可能性がある。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "ピクサーは、最先端の技術とオリジナルのストーリーテリングを柱に持つ前代未聞の映画スタジオだ、とスティーブは言った。そして『トイ・ストーリー』公開の一週間後に株式を公開した。このタイミングでピクサーの本気を疑う人は誰もいなかった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "机上軍事シミュレーションをすると、台湾有事の際、米国のインド太平洋軍が中国に負ける可能性が示唆されています。その主な理由は、中国が「接近阻止・領域拒否（Anti-Access/Area Denial、Ａ２／ＡＤ） 戦略」を作り上げてしまったからです。単純化して言うと、中国が余りにも多くのミサイルを配備しているので、実際に軍事衝突が発生した場合、米軍は第１列島線の西側では身動きが取れない可能性が高いのです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "それまで漂流していたＮＡＴＯが勝ち組になったのと同じことが、日本にも起こり出しています。ソ連と激しく対立していた冷戦期のように、アメリカという「カジノのオーナー」...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "ラッダイト運動とは、１８１０年代にイギリス中・北部の織物工業地帯に起こった機械破壊運動のことです。産業革命のときに効率的な機械の発明によって、それまで手作業で行われていた仕事が激減し、多くの人が職を失いました。そんな彼らの怒りの矛先は、彼らの仕事を奪った機械に向かっていったのです。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "そして〝産業革命〟の意味を、誰でも高品質の商品を作り出すことを可能にしたものととらえるなら、〝情報革命〟とは誰でもが高品質の企画を生産することを可能にするものになるはずだ。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "従って、「電子ブック」がどれほど普及しても、「紙の書籍」は、決して無くならない。 　 両者は、かならず、共存し、共生し、それぞれに棲み分けていくでしょう。 　それは、 生物の世界の「進化」 の姿を見れば、明らかです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "螺旋的発展」において、何が「復活」してくるかを、読む。 　「合理化」と「効率化」の中で「何が消えていったのか」を、見る。 　「その段階」で、それが「なぜ消えていったのか」を、考える。 　「新しい技術や方法」で、どうすれば「復活」できるかを、考える。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "なぜなら、かつて、昔の社会においては、この「言葉で表せない智恵」が大きな価値を持っていたからです。 　例えば、徒弟制度の現場などでは、「体で覚えろ」「呼吸で摑め」という言葉に象徴されるように、スキルやセンス、テクニックやノウハウなどの「智恵」が、大きな価値を持っていました。それらの「智恵」は、言葉に表すことができず、容易に伝達したり、修得したりすることのできないものだったからです。 　しかし、そこに、印刷技術の発明によってマスメディアが生まれてきた。このマスメディアは、「言葉で表せる知識」を多くの人々に伝えることができるものであり、専門知識や最新知識を多くの人々が共有し、活用することを可能とすることによって、社会全体の生産力を向上させ、豊かな文化を生み出し、この社会の発展を促していった。 　しかし、まだ、この段階においては、人々が「知識」を学ぶためには、場所と時間に拘束される「学校」や、流通にコストと時間がかかる「書物」が必要でした。そのため、「言葉で表せる知識」というものが、この段階の社会においては、まだ、大きな価値を持っていたのです。 　しかし、そこに、ネット革命が到来した。この革命は、マスメディアを超えたパーソナルメディアを実現したため、誰でも情報端末さえ持てば、容易に専門知識や最新知識を入手することができるようになった。そのため、「言葉で表せる知識」が相対的な価値を失い、新たな次元で、ふたたび「言葉で表せない智恵」が大きな価値を持つようになってきたわけです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "たとえば、私はパソコンが切り拓いた「前期デジタル時代」、そして「ポストコンピュータ」の「後期デジタル時代」の次には、「ネオアナログ革命」がやってくると考えている。 　デジタルはすべてを「０」と「１」の二律に分解する。デジタルカメラの写真が無数のドットで構成されていることに象徴されるように、「対象物」を「対象物そのもの」としては認識せず、無数の細かいブロックに分解して、それをもう一度組み立てなおすような作業を行なっている。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "しかし、全体のものを全体として説明できる「複雑系の数学」の理論がさらに進展すれば、アナログ制御を理論的に説明することも可能になり、理論を技術に落とし込むこともできるようになるだろう。そのときついに、「ネオアナログ革命」が到来し、「人間がやりたいこと」を、現在のデジタルの技術よりもはるかに省資源、かつ高性能で実現できる時代がやってくるのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "ところが25年以上も前に、「技術の変化による価値観の変化」を語る２冊の本が出版されていました。 　１冊目の本は、アルビン・トフラーの『第三の波』（1980年）。 　高名な未来学者アルビン・トフラーは、この著作の中で次のように言っています。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "インターネット普及のはるか前、ここまで先進的なことを言い切っていたトフラーは、その他以下のような未来像を提示しました。 「出勤せずに、自宅にいながらネットで仕事」 「学校へ行かなくても、ネットで勉強」 「買い物に行かなくても、すべて通販で生活が済む」", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 19, "label": "現代社会", "freq": 19, "highlights": [{"text": "本書の基本的主張はこうだ──「 私たち現代人は、必要以上の整然さを求めるあまり、適度な無秩序を受け入れることがもたらすメリットを取り逃しているのではないか」", "book_title": "ひらめきを生み出すカオスの法則 (T&#x27;s BUSINESS DESIGN)", "author": "ティム・ハーフォード、児島 修"}, {"text": "は、【時代そのものが厳しくなっていく中で、〝推し活〟は趣味というより福祉に近い存在なのではないか】と分析する。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "今の私たちに必要なのは、他者との優しくて健やかな繫がりなんです】", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「なんか、生き物として弱いことが前提のコミュニケーションなんですよね、今って。お互いに、困ってることがある、助けてほしいことがあるっていうのがデフォなんです。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「やっぱさ、人間って完全な無宗教状態で生きていくのって難しいんだよ。何かを信じてたほうが楽っていうか。MBTIの爆 流行りとかもそうじゃん？ 皆こぞってアテにしてさ、ＩだからこうとかＰだからどうとか目の前の現実より診断を信頼したりして。道標が欲しいんだよね、何でもいいから」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "何もかもが揺らぎやすい今、確固たる信仰対象があり、それに対して自分を使い切っている姿そのものに希少価値が生まれるんです。たとえその対象が社会通念的に無価値だったり、いっそ人類存続に不都合なものであっても、客観性を伴わない猪突猛進さこそ今の時代に機能し得る唯一の物差しなんです。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「我慢」できない人を煽って転がすテクニックに、「我慢なんて無駄だ」「やりたいことを仕事にすれば我慢しなくていい」という文言が、週刊誌やネットで躍ることは多くあります。その人の「好き」を仕事にするのがベスト、と言われる嗜好至上主義者です。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "それこそ、宮台真司さんが著書『終わりなき日常を生きろ』で喝破したように、理想も幻想も失われてそれぞれの人生を物語として紡いでいく時代となった割に、人間として生きるための確たる規範を求めがちで、しかしそれが示されずに漂流する現代日本人、みたいなものが常態化しているのかもしれません。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "先ほど述べた「人生がデザインできない」がゆえの漂流は、「こうしたらみんな幸せなんじゃないですかね」という決まった類型や規範がなくなったから、あまりある現代の自由の中で、誰もが堂々と迷子になっている状態です。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "なぜ、現代社会では情動が発達しにくいのか？　それは情報過多であることと、知識の偏重が大きいからだと思います。自分の体験とは関係のない知識や情報が集積されていますが、そのことが情動や自分自身の独自の印象を開発することを抑制する非常に大きな理由の一つです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "現代は男をなびかせる女性性と子どもを育てる母性とがうまく合致しない時代だといえますし、時代全体が母性そのものを育てる状況ではないとぼくは見ています。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "現代のこの社会の在り方はぼくから見ると幼児期における欠如と過剰をベースにしてできあがっているようにしか見えませ", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "現代を生きる僕らは「意味の欠如」を恐れます。無益と思えることを極端に避けようとします。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "ですから、結論から申しますと、どうも内臓感覚のいちばん麻痺しているのがホモ・サピエンスではないか。しかも文明人というのが、いちばん始末におえない。", "book_title": "内臓とこころ (河出文庫)", "author": "三木成夫"}, {"text": "現代は社会が複雑に発展して物や情報が溢れかえっている上に、お金があれば大体のことはなんでもできる仕組みだから、「お金以外の自分なりの基準や感性や感覚」というのを見失いやすい。現代ではお金と全く無縁で生きていくことはできないけれど、充実感を持って生きるためにはハイスピードで動いていく社会に自分を全て適応させるのではなくて、お金以外の論理で動く部分も忘れないようにして、自分のペースを保つことが大切だ。そのためのコツとしては「体を動かして何かをする」とか「自分の手を動かして何かを作る」などを、日常的にすることが有効だと感じる。それは、お金とは別の基準となる「自分の感覚や感情」を大切にすることに繫がっているからだ。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "アップルによれば、平均的なiPhoneユーザーは1日に80回もロックを解除する。消費者リサーチ会社Dscoutの2016年の調査によれば、 モバイルユーザーが1日にスマホを触る平均回数は2617回 だという。「注意散漫」が新しいデフォルトになっているのだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "そもそもなぜみんな気を散らすものにとりつかれているのか？ それは、みんながやっているから だ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "死刑が極刑であるためには、ひとつの前提が必要だ。「人間がいちばん恐れるのは死であって、死は人生における最悪の出来事だ」という前提が。世の中の人がみんなそう思っていて、はじめて死刑が極刑として成立する。 　現代では、その前提が崩れてしまっている。生きることに価値があるんだかないんだか、よくわからないという人間がやたらと増えた気がする。 　自殺者がこれだけ増えているのも、不況のせいだけではない。一緒に心中してくれる相手だの、自分を殺してくれる人間だのをインターネットで募集するような時代に、死刑が極刑だと考えるのは幻想でしかないのだ。", "book_title": "超思考", "author": "北野武"}, {"text": "芸の世界に限らず、あらゆるモノが薄っぺらな偽物に置き換えられ、しかもありがたがられている。本物であればあるほど生き難いのが今の世なのだ。", "book_title": "超思考", "author": "北野武"}]}, {"id": 20, "label": "戦略思考", "freq": 19, "highlights": [{"text": "これは、翼を腕にくくりつけ、高い場所から力一杯羽ばたいて飛びおりた古代の人びとが、例外なく失敗したのに似ている。夢を抱き、必死に努力したが、強力な自然の力に逆らっていたのだ。この戦いに勝てるほど強い人間はいなかった。飛行が可能になったのは、人間が、世界の動きをつかさどる自然の法則や原理、すなわち重力の法則、ベルヌーイの原理、揚力、抗力、抵抗の概念を理解するようになってからのことだ。その後、これらの法則や原理と戦うのではなく、それを認め、その力と調和する飛行システムを設計することによって、人間はついに、かつては想像もできなかった高度と距離を飛行できるようになった。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "持続的技術に対応するために開発された計画とマーケティングの手法を、まったく異なる破壊的技術に適用することは、翼をつけた腕で羽ばたくようなものだ。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "戦略には選択とトレードオフがつきものだ。 　　　独自性を意図的に選びとるのである。 ── マイケル・ポーター（経営学者）", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "エッセンシャル思考の人は、自らトレードオフを選びとる。誰かに決められる前に、自分で決める。経済学者のトーマス・ソエルはこう言った。 　「完璧な答えなど存在しない。あるのはトレードオフだけだ（ ７）」 　ピーター・ドラッカーは、かつて『ビジョナリー・カンパニー』シリーズの著者ジム・コリンズにこうアドバイスしたと言われている。 　「偉大な企業をつくるか、偉大な思想をつくるか、どちらかだ。両方は選べない」 　そこでコリンズは思想を選んだ。彼の会社は従業員３人の小さな会社にとどまったが、彼の思想は世界中に広まり、数千万人の人びとに影響を与えている（ ８）。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "フェイスブックジャパンでは、テレビＣＭはいっさい使いませんでした。 　テレビＣＭを打てば新規ユーザーは間違いなく獲得できます。しかし、そこで入った新規ユーザーがすぐに利用をやめてしまったり、退会してしまえば意味はありません。 　フェイスブックでは「登録した瞬間に〇名以上の友達とつながるかどうか」が使用を続けるかやめてしまうかの分岐点になる という数値が分析結果から出されていました。「重要業績評価指数＝Key Performance Indicator（ＫＰＩ）」のひとつに設定されていることです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "目の前にある光景をどう変えたいのか。そのイメージを思い描くことが、グロースハックの出発点になります。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "戦略的な部分では、グロースさせたいサービスの 最大の特徴をいかに生かしていくかを考えるのが重要です。 　フェイスブックの場合であれば「実名制」です。 　それまでの匿名性とは逆を行く実名制では何がどう変わるのか？　現実世界とインターネットの世界をどのように結び付けられるのか？", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "グロースの本質は〝シーンの創出〟にある と、私は思います。 　やみくもに数字を追うのではなく、どのような状況を現出させたいかをまず考える。 　そして、ゴールといえるその地点に向かっていくための道筋を描き出します。 　いくつか道筋がある場合には、そのなかでの最短ルートを選び出します。 　難関にぶつかったときには、なんとかそれを乗り越えるか、新たなルートを考えます。そうしてイメージしていたシーンを現実にしていく作業こそがグロースハックです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "20 代で、見かけも性格もよく、学歴と年収が低い男性は、どこで結婚相手を探すべきでしょうか？　この判断において、彼にとって最も不適切な市場が（彼が選んだ）結婚情報サービス会社です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "「勝者は、ちがいをつくりだす」 　ということだ。前述の通り、代官山蔦屋書店は「お金と時間に余裕のある大人向け」のおしゃれな店づくりをしている。お金のある大人たちが車で来店し、たくさんの商品を買って、車に積んで帰っていくことを狙っている。ということは、そんな大人たちがどうすれば「来店したくなるか」を考え抜いたはずだ。 　私は、そのひとつの答えが「駐車場」にあると確信している。", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "他に覚えておくとよいフレームワークとしては、コトラーのマーケティングのプロセスであるＲＳＴＰＭＭＩＣも覚えておくとよいでしょう。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "ドイツ帝国の宰相であったビスマルクは「愚者は経験に学び、賢者は歴史に学ぶ」と述べましたが、 戦略を学ぶにあたって歴史はアナロジーの宝庫 であると言えます。また、すべての事象には始まりがあり、歴史的経緯からインサイトを得ることができます。分析においてもまずは過去の知見にあたってみることが基本となります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "彼に「圧倒的に世界第２位の日本経済を潰したら、世界経済はどうなるんだ」と尋ねたことがあります。 　彼の答えは意図的に 曖昧 でしたが、私なりに意訳すると、「しばらくはアジアのドラゴン（韓国や台湾などの新興国） で時間を稼いで、そのあとは中国がある」というものでした。 　そして実際にその通りになりました。結果としてアメリカにいいように遊ばれてしまったような気がします。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "１９９０年代にアメリカがとったアジア四小龍（韓国、台湾、香港、シンガポール） への支援、そして中国の台頭を促す政策は、日本の相対的地位を低下させる戦略と表裏一体にあり、１９９０年代後半には、「ジャパンパッシング」と呼ばれた現象が示すように、日本以外のアジア諸国の発展を促進するものとなりました。第二次世界大戦後に冷戦が始まったときに日本にアメリカが提供した環境は、今度は彼らに提供されることになったのです。 　かくしてアメリカは世界第２位の経済大国を没落させる一方、代替を探して世界経済を守ることに成功しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "螺旋的発展」において、何が「復活」してくるかを、読む。 　「合理化」と「効率化」の中で「何が消えていったのか」を、見る。 　「その段階」で、それが「なぜ消えていったのか」を、考える。 　「新しい技術や方法」で、どうすれば「復活」できるかを、考える。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "何かを変えようと思ったら、まずは一番やりやすく、成果の出やすいところから手をつけるのがセオリーだ。 すべてを一度に変えようとすると、結局、何も成果を得られないことが多い。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "市場機会を評価する ●着くテーブルを選ぶのは、自分で決められる最も重要なこと ●着いたテーブルで勝ち目がないとわかったら、テーブルを替わっても構わない ●テーブルに少々不合理なことをしたり、経験不足の人が多すぎると、最高のプレイヤーでも非常に勝ちにくい", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "つまり、ネットにおけるあなたの１番の敵は「比較検討されること」 である。 であるならば、 比較検討される前に個人情報を奪ってしまえ！ 具体的には、〝無料モニター（サンプル・お試し）〟や〝１００円モニター（サンプル・お試し）〟や〝５００円モニター（サンプル・お試し）〟 を通じて、商品を購入する可能性が高い「見込客」リストを手に入れることだけに広告を集中 させるのである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "実際に世の中でネット広告をガンガンやっている通販会社（広告主）を今後しっかりと意識して見てほしい。 ほぼすべての会社がネット広告から直接商品を売っていない。 ほぼすべての会社がネットから 無料、１００円、５００円などの低価格モニター（サンプル・お試し）で「見込客」を集めることに特化 しているのだ。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 21, "label": "問題解決", "freq": 18, "highlights": [{"text": "・疑問が発生するようなら、その答えを探すのではなく、「どうしたら疑問そのものをなくせるだろうか」 と考える。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "そのための第一歩はプロダクトの特徴に注目するのではなく、ユーザーの感情に寄り添い、特定の不満や苦悩を探り当てることだ。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "この質問リストの中では、実際の問題の解決方法 (ソリューション) には触れていないことに注意してほしい。これは意図的なものであり、とても大切なポイントだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "一般に脳は、物事に秩序を見出したり、概念を分類してグループ化したり、周囲の環境に構造を見つけたりすることを好む。連想のバリアが高い人は、問題に直面したとき物事を集中して考えられるため、迅速に結論を出すことができる。同じ問題が過去に生じたとき、それをどのように処理したか、あるいは似たような状況に置かれた他人が、どのようにその問題を解決したかを思い起こすからだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "自分の嫌いなタイプの人間を採用すれば、言い合いやとげとげしい雰囲気など、トラブルが生じる可能性がある。ただ異なる専門分野や文化、思考様式、価値観や考え方などをもつ人間を寄せ集めれば、革新的なチームができるわけではない。グループを適切に管理しなければ、問題を引き起こすグループダイナミクスがはたらいてしまうのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "本人の解決すべき問題は、本人に解決させる。それがあなたのためであり、相手のためでもあるのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "一方、エッセンシャル思考の人は目の前の症状に惑わされず、どこが本当の問題なのかを見極めようとする。何が妨げになっているのかを特定し、もっとも効果的に処置をする。非エッセンシャル思考の人は応急処置でつぎはぎだらけになっていくが、エッセンシャル思考の人は本当に必要なところに一度だけメスを入れる。これは問題解決にかぎらず、最小限の努力で最大限の結果を得るための普遍的なやり方である。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "しかし、シュナーチは この行き詰まり状態を、個人的な成長と対人スキル向上のための重要な分岐点 だとしています。 「結婚生活には、予想するより、ずっと大きな緊張感とプレッシャーがあります。じつはその時点こそが始まりなのに、そうしたプレッシャーがあまりにも大きいため、それを離婚の時期だと誤解してしまうのです」 　この行き詰まり状態をうまく克服したふたりは、個人としても、そしてカップルとしても強くなります。ふたりの関係は本物になり、より親密なものとなります。 　お互いに理解し合える親密な関係をつくりあげるためには、ふたりで問題に向かい合うことが重要です。 　シュナーチはふたりで問題に向かい合うことは「親密さの駆動輪（育むもの） であり、 砥石（磨くもの） である」としています。", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "ブレイントラスト会議で相手がヒートアップしても、それは問題解決に向けた熱意の表れであり、自分に向けられた感情ではないことを誰もがわかっていた。そうした互いへの敬意や信頼関係のおかげで、彼らは凄まじい問題解決能力を発揮した。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "だから、たとえ手に入る可能性が低くても、欲しいものを「欲しい！」と強く意識し、自分の欲望に真正面から向き合うことが、これからはとても大事になります。日本では学校でも家庭でも、「我慢すること」に価値があるかのように教えますが、我慢するよりも「自分は何が不満なのか 自分が求めている理想的な状態とは、どのような状態なのか 自分が欲しいものは何なのか」と考えるほうが、よほど建設的です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "まったくあたらしい課題に取り組むとき、考えても考えても答えが見つからないとき、そんなときには、目の前にある「事実」を拾っていきましょう。 たくさんの事実を積み重ねていった先に、答えは見えてくるはずです。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "ムチャ振りにはいくつか特徴があります。まず、ムチャだと思う時点で、勝手に決めてしまった「できないと思い込んでいること」に気づけます。そのような思い込みがあるから、はみ出している、という言葉が出てくるんです。 そして、ムチャ振りをされたということは、何かしら期待されているということです。「ひょっとしたら、あいつにあれをやらせたら面白いんじゃない？」と。新しい課題に気づき、解決法を考えるチャンスをもらったわけです。", "book_title": "問題解決ラボ", "author": "佐藤 オオキ"}, {"text": "前職の限界とは、業界、人間関係、日本式システムなど、どれかは存じませんが、その問題点をちゃんと自分なりに解決しないと、また同じことを感じると思います。ですので、まず、その問題と向き合うことが、「はじめること」の前に大事だと思います。", "book_title": "白本", "author": "高城剛"}, {"text": "今もし問題を感じていらっしゃるなら、できる限り物事をフラットに捉えなくては直感は働きません。人と物事を一緒にしてしまうと混乱しますので（ほとんどの問題はここ）、これを分けてフラットに置き換えるのです。誰々が、なにを言ったということの「誰々」と「なにを言った」を分けて考えることから始めるといいでしょう。", "book_title": "白本", "author": "高城剛"}, {"text": "これは私が時々する方法だが、現場から順番にたどっていくと、どこで指示が正しく伝わっていないのかを確認することができるのだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "僕がオススメしているのは、頭の問題は身体で解決する、という方法です。ジョギングでもウォーキングでもなんでも構いません。決まった時間に決まった距離を走り、その距離を少しずつ伸ばしていきます。なにも考えずに黙々と走っても、音楽を聴きながら走っても、悶々と悩みながら走っても構いません。今日はもう走れない、と思ったところからあと１００メートルだけ走ります。信じられないかもしれませんが、ほとんどの場合、これを数ヶ月続けることで、ご自身で作った巨大な壁の「設定」を変えることができるのです。頭の中で作ってしまった問題は、身体に訊くのがなによりです。頭に訊いても混乱するだけです。身体は頭以上に、ご自身の未来を知っているものですよ。", "book_title": "黒本", "author": "高城剛"}, {"text": "ネットの特性からコンバージョン率を劇的に上げる王道のシナリオテクニックは、「まず問題提起の情報でひっかけて、途中から商品へ落としていく」 ことである。 ちょっとイヤラシイ言い方をすると（笑）、「 不安感を増大させる情報を提供→ 解決策として商品を提示する」 パターンが昔から通販業界でコンバージョン率を上げるための王道のテクニックである。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "面接では、仕事において最も助けてくれる人について聞くといい。採用候補者の問題解決のやり方を探り出すのだ。自分の人脈にいる専門家に電話をかけるタイプだろうか——。また、組織の外部からネットワーク情報収集力の使い方をよく心得た人材を採用するだけでなく、経営陣がネットワーク力を重視する姿勢を示すことで、組織の内部に対しても「ネットワーク力が重視される」という強烈なメッセージを送ることになる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 22, "label": "日本論", "freq": 18, "highlights": [{"text": "縄文時代が紀元前 2 世紀頃という比較的新しい時代まで長く続いたのは、恵まれすぎた環境だったからなのです。この〝日本は恵まれすぎた環境〟というのも、世界史の中の日本を知る上で重要なポイントです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "新自由主義の下で、日本はまさに最大の敗者となりました。政財官の「鉄の三角形」に支えられた日本株式会社方式の経済はボロボロになり、「失われた 30 年」で日本の地位は低下し続け", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかし、その頃の日本はアメリカのそうした思惑や戦略をよく理解せず、右肩上がりの成長を自分たちの手腕によるものだと考える傾向が強かったと思います。日本のビジネスモデルを自画自賛し、日本は終身雇用だから社員が安心して会社に勤めることができるし、企業間の株式持ち合いも手伝い、企業経営者も目先の利益を追うのではなく、中長期的な利益を考えることができる、との議論です。それに対して、アメリカの資本主義経営者は投資家のほうを向いていて、クォータリー（四半期） ベースの目先の利益しか見ていない。だからアメリカ企業はダメなんだ、と言って胸を張っていました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "１９９０年代にアメリカがとったアジア四小龍（韓国、台湾、香港、シンガポール） への支援、そして中国の台頭を促す政策は、日本の相対的地位を低下させる戦略と表裏一体にあり、１９９０年代後半には、「ジャパンパッシング」と呼ばれた現象が示すように、日本以外のアジア諸国の発展を促進するものとなりました。第二次世界大戦後に冷戦が始まったときに日本にアメリカが提供した環境は、今度は彼らに提供されることになったのです。 　かくしてアメリカは世界第２位の経済大国を没落させる一方、代替を探して世界経済を守ることに成功しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかし幸か不幸か、日本経済と企業には過去の蓄積があり、雇用を守って痛みを耐え忍ぶだけの余裕があったので、雇用を守りました。 　逆に、幸か不幸か、雇用をカットせざるをえなかったのがお隣の韓国でした。日本の金融危機と同じタイミングでアジア通貨危機が起きたとき、日本のような富の蓄積と国内市場の規模がなかったため、韓国企業は雇用を守れませんでした。雇用を守れなかったがゆえに、新自由主義という荒波に身をさらし、ダーウィンの進化論よろしく、それに適応することに成功したのです。自国のみでこの危機を乗り切ることは無理だと判断した韓国政府は、構造改革に取り組むという条件を吞むことで、国際通貨基金（ＩＭＦ） などの国際金融機関からの金融支援を取りつけます。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "新自由主義のもたらした国際化の最大の受益国が中国だとすれば、その逆流の痛みを受ける度合いも必然的に大きくなります。その反面、日本のように新自由主義の波に乗り遅れ、生産拠点を全て外に出さなければならなかった国にとっては、「リショアリング（海外に移した生産拠点の自国回帰）」や「フレンド・ショアリング（同盟国や友好国に限定したサプライチェーン構築）」は相対的にプラスの話です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "「失われた 30 年」とは、ゾンビ社員が退職するまで待った 30 年だと換言できます。そしてそこまで待ったことで、次のチャートが示すように、日本は絶対的な人手不足時代に突入しています。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "「市場が一番よく知っている」から「政治家が一番よく知っている」へ、「何が重要？　経済でしょう！」から「何が重要？　地政学でしょう！」へと人々の世界観が変わりつつありました。ワシントンを見ても、ホワイトハウスの経済チームの地盤沈下は明白...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "それまで漂流していたＮＡＴＯが勝ち組になったのと同じことが、日本にも起こり出しています。ソ連と激しく対立していた冷戦期のように、アメリカという「カジノのオーナー」...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "第一次トランプ政権時代にまとめられた対中基本政策「インド太平洋のための米国の戦略的枠組み」では、「日本がインド太平洋安全保障構造の中で『地域的に統合され、技術的に進んだ柱』になるよう助力する」と明記しています。つまり、先端技術の分野で日本がアジア太平洋地域のコアになることを助ける、という方針を明確に持っているのです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "そして私が重視しているポイントは、労働供給が「ルイスの転換点」を超えたことで、既存雇用を守るという社会的要請の重要性が低下し、政治家も企業も自らの手を汚さずに労働者の適正化が進むことです。 　実際、 30 歳以下の若手は引く手あまたで、転職を前向きにとらえたり、最初の就職を将来の起業のためのステップアップと考える人が増えていることは報告されている通りです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "ＯＥＣＤの報告ではアメリカの上位 10％が所有する資産は全体の 79％ですが、日本は 41％と富の集中が最も低い水準の国の一つです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "彼らの基本戦略は中国とマラソン競争をして、中国が自らの弱さによって潰れるのを待つアプローチです。政権によってよりアグレッシブであったり、マイルドであったりと匙加減は異なるでしょうが、基本的には米ソ冷戦での枠組みと似た形になります。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "これまで政治的にできなかったゾンビ企業の淘汰は賃金設定メカニズムが行ってくれるので、政府が表立って手を汚す必要はありません。 　岸田政権はそれを理解していたので、最低賃金を引き上げたり、個別の業界の流れを後押ししました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "この 15 年で私の認識は変化した。思えば、日本が見本としてきた先進社会がいま直面しつつある、社会の過剰流動性（共同体空洞化）に起因する問題の多くが、 30 年程前から日本で顕在化してきた。その歴史的事実の前提と帰結を注視し、 処方箋 を思考することは、日本という枠を超える意味を持つ。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "彼は有名な全共闘との対話で「君たちが天皇陛下万歳とさえ言えば、自分は全面的に君たちを支援する」と言いました。全ての新幕府が征夷大将軍という天皇からのタイトルを必要としたことや、南北朝時代においても倒幕運動においても維新政府においても民権運動においても２・26 事件においても世直し勢力こそが錦旗を要求したことを踏まえて、天皇を持ち出さない限り日本における革命は絶対に不可能だと分析していました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "まあ核の話を「ちょっとした失言」なんて言うと、また青筋立てて怒り出す人がいるかもしれない。「被害者感情を踏みにじる発言」だ、と。現実の問題より、人の気持ちを踏みにじるとか、何を言った言わないということの方が、よっぽど問題になるというのが日本という国の特徴なのかもしれない。", "book_title": "超思考", "author": "北野武"}, {"text": "特に日本などは、その世界的典型の文化的頽廃のモデルケースであります。", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 23, "label": "経営哲学", "freq": 17, "highlights": [{"text": "スティーブはハイテク企業のＣＥＯでありながら、ソフトウェア業界の諸事情など一切関知しない顧客の立場になって考える。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "許認可を要するものはやらない」というのが僕の今の考えだから、世界自由競争のものしかやりません。役所に頼み事をするような会社に興味はありません。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "経営なんて、本に書いているようなきれい事ではできない。たぶん若い頃は、かなり厳しいことをやっておられるわけですよ。それでも最後は天国へ行きたいから、仕上げは神様みたいにいい人になる（笑）。年配の経営者が心の話をするようになるのは、仕上げの段階に入った人間の性質じゃないかな。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "柳井 　ベンチャービジネスではなく、「日本の」ベンチャービジネスですね。日本のベンチャービジネスの起業家の人は、虚業家ですよ。こういうことを言うと嫌がられるのですが、志がない。自分の金儲けのことばかり、人を利用してやろうということばかり考えているようです。いかにうまく売り逃げるかを考えるような人は駄目ですよ。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "株主構成も面白い。大株主の１位、２位は創業者である私と畑慎也（現サイボウズ取締役）。これはベンチャーならよくあるケース。ただし、３位が「社員持株会」である。全社員の約 90％が社員持株会に加入し、毎月サイボウズの株式を買い続けている。その結果、社員の持ち株比率は高まり続けている。「株式会社は株主のもの」などとマネー資本主義者は言うが、サイボウズはそのうち社員に買収され、社員のものになりそうだ。", "book_title": "チームのことだけ、考えた。", "author": "青野 慶久"}, {"text": "しかし、究極の作品は会社であり、あるアイデアを実現することでも、市場の機会をとらえることでもないと見ているのなら、善し悪しは別にして、ひとつのアイデアにこだわることなく、長く続くすばらしい組織をつくりあげることを目指して、ねばり抜くことができる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "スローンの本は……ひとつの側面しか見ていない。効率的に生産し、雇用を創出し、市場をつくり、売り上げを伸ばし、利益を生み出す企業経営しか考えていない。社会のなかの企業、生活のためではなく人生の場としての企業、隣人としての企業、パワーセンターとしての企業……。スローンの世界には、このすべてが欠けている。 　ドラッカーは、著書『マネジメント』（風間禎三郎他訳　ダイヤモンド社）でこう付け加えた。「ゼネラル・モーターズは、スローンの遺産で持ちこたえている。そして、スローンの立場から見れば……みごとな成功を遂げた。しかし、みじめなほど失敗したとも言える」", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "収益力は、会社が存続するために必要な条件であり、もっと重要な目的を達成するための手段だが、多くのビジョナリー・カンパニーにとって、それ自体が目的ではない。利益とは、人間の体にとっての酸素や食料や水や血液のようなものだ。人生の目的ではないが、それがなければ生きられない。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "〝何でこんなことやるんだ〟、〝何の売り上げにつながるんですか？〟と言われていたんですけど、〝いやいや、これは大事なんだ。ファンの支持がなかったら駄目なんだ〟と。 　結果的にそれが、ファンのロイヤリティ、愛着とか支持してくれる源泉みたいな思いが芽生えてくるし、いろいろな人に広めてくれることにつながっていく。（中略） 　 お客さんが喜んでくれさえすれば、後からしっかり売り上げがついてきて、経営が成り立つ。 　なかなか難しい選択なんですけども、私たちの場合には、幸いというか、どん底の時代があったので、そういう過程をたまたま踏んだので、今はそれを勇気をもってやれるということだと思います。（注・太字は筆者）", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "私が尊敬するファーストリテイリングの柳井正会長兼社長の言葉で強烈に印象に残っているのが、「小売業は一日一日が死活問題。毎日、最大の売り上げを更新しても、次の日はまたゼロから始まる」というもの。 　ビジネスでは１日の利益を把握し、それを最大化して積み上げていかないと通年の利益を伸ばす事はできません。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "大正十五年七月二十八日、星野温泉若主人の為に草す 成功の秘訣　六十六翁　内村鑑三 一、自己に頼るべし、他人に頼るべからず。 一、本を固うすべし、然らば事業は自づから発展すべし。 一、急ぐべからず、自働車の如きも成るべく徐行すべし。 一、成功本位の米国主義に倣ふべからず。誠実本位の日本主義に則るべし。 一、濫費は罪悪なりと知るべし。 一、能く天の命に聴いて行ふべし。自から己が運命を作らんと欲すべからず。 一、雇人は兄弟と思ふべし。客人は家族として扱ふべし。 一、誠実に由りて得たる信用は最大の財産なりと知るべし。 一、清潔、整頓、堅実を主とすべし。 一、人もし全世界を得るとも其霊魂を失はば何の益あらんや。 　　人生の目的は金銭を得るに非ず。品性を完成するにあり。 　　以上", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "成功本位の米国主義に倣ふべからず。誠実本位の日本主義に則るべし。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "「成功の秘訣」には、「人もし全世界を得るとも其霊魂を失はば何の益あらんや。人生の目的は金銭を得るに非ず。品性を完成するにあり」という言葉がある。 　経営者にとって、事業を伸ばし、収益力を高めるのは、もちろん大切な役割である。だが、経営者が一番大切にしなければいけないのは、お金でない。それは品性である──。星野社長は内村の考えに強く共感した。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "そんな中で自分が確実に残せるのは何か。星野社長は答えを探した。そして気づいた。 　社員やその家族に対して、堂々とした姿勢を残せばいい──。 「星野リゾートの社員は、人生の大切な時間をこの会社で過ごし、そしていつか会社を去っていく。そのときに『星野リゾートで過ごせてよかった、あの職場はとても幸せだった』と思ってもらえるようにしたい」。これが星野社長の思いである。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "あなたの会社にカスタマー・サービスを浸透させる一〇の方法 カスタマー・サービスを一部門だけではなく、会社全体の優先事項に位置づけます。カスタマー・サービスと向き合う姿勢は経営トップから示されねばなりません。 あなたの会社で日常的に使われる言葉のひとつに、「ワオ！」と驚かせる、を加えます。 あなたの会社のカスタマー・サービス担当者に権限を与え、信頼することです。社員は素晴らしいサービスを提供したいと願っていると信じましょう。なぜなら、彼らはそのようなことをしたいと心底望んでいるからです。スーパーバイザーまで問題を上げることは、極力避けるようにすべきです。 強欲な、あるいは社員をひどく扱う顧客はこちらから縁を切ってもいいのだとはっきりと認識します。 通話時間を計らず、社員にアップセルさせず、マニュアル原稿を使わないようにします。 フリーダイヤルを隠さないこと。あなたの顧客のみならず、社員に対しても、カスタマー・サービスを重視していることを伝えるメッセージになります。 どの電話も、カスタマー・サービス重視を標榜するブランド構築への投資だと考え、最小に抑えるべき経費と見なさないようにします。 全社を挙げて、素晴らしいサービスを讃えるようにします。全社員に「ワオ！」と驚く体験があった話を伝えるようにします。 カスタマー・サービスに対してかねてより情熱を持っている人を見つけ、雇います。 顧客、社員、取引先といったあらゆる人に素晴らしいサービスを提供します。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ザッポスにおける私たちの哲学は、長期的な利得が相応にあると信じられるなら、（売上げや利益が減少することも含めて） 短期的な犠牲は厭わないというものです。企業文化を守り、コア・バリューに忠実であることには、長期的な利得があるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "アマゾンの素晴らしい点のひとつは、まさにザッポスでしているように、彼らがとても長期的に考えるという点です。パートナーや投資家とは、非常に長期的に考えるという点で一致することが滅多にありません。私たちは、アマゾンもザッポスもこの同じ理念を共有しているとわかり、非常にラッキーだと感じ、興奮しています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 24, "label": "差別化", "freq": 17, "highlights": [{"text": "Look-alikeはリターゲティング拡張と似ているが、リターゲティング拡張があくまでもCV（やその他指定のアクション）をしたユーザーに似ている人を探すのに対し、Look-alikeはCV（やその他指定のアクション）した人が外部オーディエンスのどこに所属していたかを知る手法である。どちらも利用するオーディエンスデータは外部オーディエンスなので【認知施策】から行う必要があるが、違いは外部オーディエンスとしての名前がわかるかどうかである。リターゲティング拡張はCVした人に似ている人と機械的にユーザーを抽出しているので名前はない。仮に付けるとしたら「CVした人に似ている人」である。一方Look-alikeは名前が付いている既存の外部オーディエンスデータとCVの関連性を調べるため、関連がある外部オーディエンスの名称がわかる。このことによって先の例のように今まで知り得なかった顧客像がわかるだけでなく、そのオーディエンスデータへ広告配信時に対象者に合わせて適切なメッセージやクリエイティブを作ることが可能である。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "2つ目の問題は、ユーザーが行う比較と入札競争についてである。ユーザーが検索し、結果のページに広告を出せるのは1社だけではない。先の例では「不動産」などで検索するとかなりの数の広告が表示される。つまり、リスティング広告は比較されることを前提とした広告なのである。 　ユーザーは1位に掲載される広告をクリックして自分の求めているものがなければまた検索結果ページに戻り、2位の広告をクリックして自分の求めるものを探すことを繰り返すのである。つまり、他社と商品やなんらかの差別化ができないのであれば、ユーザーに自社のサイトを印象づけることはできない。このようにビッグワードで検索するユーザーを自社に取り込もうとするのであれば、ユーザーが比較する前提で自社のサイトやサービスを見直す必要がある。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "ＣＣＣはネットサービスに置き換わるようなことは基本的にやらない。企画会社としてリアルでしかできないことを掘り起こそう。加盟企業さんのためにね。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "でも、だからこそ危機感を持ちつづけられる人はすばらしく、差がつきやすいポイントでもあります。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "戦略的な部分では、グロースさせたいサービスの 最大の特徴をいかに生かしていくかを考えるのが重要です。 　フェイスブックの場合であれば「実名制」です。 　それまでの匿名性とは逆を行く実名制では何がどう変わるのか？　現実世界とインターネットの世界をどのように結び付けられるのか？", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "ファンの支持を強くするための 3 カ条 ・その価値自体を、アップさせること ・その価値を、他に代えがたいものにすること ・その価値の提供元の評価・評判を、アップさせること", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "マーケット感覚のある人は、「どんなによい商品を作っても、供給者が多すぎると儲からない」と理解しています。そしてダイソンやアイロボット（ロボット掃除機・ルンバの開発メーカー）のように、他社とはまったくコンセプトの違う商品、すなわち、他の供給者が提供できない商品を作ろうとするのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "アマゾンから学んだことは大きい。その最大のエッセンスは、「コンピュータには、結果は分析できても、その結果を招いた原因を作り出すことはできない」ということ。人をベースにして言い換えれば、 「原因を作り出す作業こそが、人間の価値である」", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "「勝者は、ちがいをつくりだす」 　ということだ。前述の通り、代官山蔦屋書店は「お金と時間に余裕のある大人向け」のおしゃれな店づくりをしている。お金のある大人たちが車で来店し、たくさんの商品を買って、車に積んで帰っていくことを狙っている。ということは、そんな大人たちがどうすれば「来店したくなるか」を考え抜いたはずだ。 　私は、そのひとつの答えが「駐車場」にあると確信している。", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "スタートトゥデイは好調の要因を、「ブランドの世界観を尊重し、リアル店舗で購入する以上の顧客経験価値の提供にこだわったこと」と説明している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "この明らかな価格差は、非会員にとっては、冷遇されているかのように感じる。しかも、それを単なる「情報」ではなく、「体験」することになる。 　 この体験に直面した非会員の顧客はどう思うだろうか。ほぼ間違いなく、「これはプライム会員にならないと損だ」と思うはずだ。アマゾンは意図的にプライム会員と非会員の待遇が異なる場をオフラインに創り出し、差別化された価格を提案し、プライム会員であることの優越感・満足感を提供しているのだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "まさに「アマゾン・プライムの世界へようこそ！」であり、訪れるすべての人に、「アマゾンとのつながりを持つことが、どれほど生活を豊かに便利にするか」を、オフライン店舗全体で表現している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "「これしかない」 その商品だけにしかない物語を伝える。開発ストーリーや、その商品が開発されるまでの過程などを詳細に伝えて「これしかない」と理解してもらう。この商品とボクが出会ったことは、運命かもしれない・・・そんな風に感じさせる発信力が大事となる。 「ここしかない」 このお店にしかない。通販限定商品である。お客様に「ここしかない」と納得してもらうことである。他のお店に行ってもあると思われたら購入機会の損失である。 「いましかない」 いつでも買えるが、いちばんの敵。いまなら特別価格で。これから限定●●名様に。期間限定の特典を付加することは購入動機の背中を強く押す。期間セールやタイムセールの設定は、お客様の反応を大きく左右する。", "book_title": "地域Ｎｏ.１を目指すな！地域繁盛店の売上を５０倍にする・中小企業向けダイレクトマーケティング論: 地方だから成功できる！ 売上があがるウェブマーケティングシリーズ", "author": "覚田 義明"}, {"text": "少子高齢化とか健康志向とか言われる時に、あえてボリューム満点のハンバーガーをぶつける。なぜか、と理由づけしろと言われればできますが、一番の理由は単純な話で「驚かせたかった」ということです。コンシューマー（消費者）の心を引くために大事なのは、いい意味でお客さんの期待を裏切ること。驚かせることです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "もちろん、外部環境や市場のトレンドを無視していいわけではない。しかし、より根本的な問題は全員がこのオポチュニティーを見ているということだ。繰り返しになるが、戦略は違いを生み出すこと。ほかの多くの人と同じものを見て、同じことを考えて、同じことをやっていたら戦略にならない。だから原田さんは簡単にはオポチュニティーに飛びつかない。常に自分のストーリーを優先させる。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "だけど、ちょっと待ってください。よく考えてみてください。温かいコーヒーやおにぎりを用意するだけで、「やさしく、礼儀正しく、癒し系で、あなた思い」の女性を、見事に演出でき、将来の二人の家庭の姿さえも想像させてしまうことができるのである。ほんの小さなお土産を渡すことで別れた後も、あなたを思い出させ、印象づけることができる。 　それほどまで認識にギャップがあり、なおかつ多くの女性が「そこまでやりたくない」と考えているということは、やっている人がそれだけ少ないということ。そこには大きな大きなチャンスが隠れていると考えないといけない。「戦略」というものは、人が気づいていないところで戦うこと。人がやっていないやり方で戦うこと。 　だから、ベタなテクニックは、女性のみなさんが思っている以上に、効くのだ。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "難しいことです。しかし、私たちがもし努力しなければ、ビジネスは立ち行かなくなるでしょう。ライバルに圧倒されずにいられる唯一の理由は、私たちが取り組んでいることが難しいことであり、私たちは誰よりもそれをうまく行っているからなのです。もしもあまりにも簡単なことであれば、私たちを押し流す大きな競争の波を招くことになるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 25, "label": "イノベーション", "freq": 17, "highlights": [{"text": "Blogger の共同創設者でのちにTwitter を共同創設するエヴァン・ウィリアムズは、2社を成功に導いたことに関して、ハウプトリーの革新法則に共感している（59）。つまり、「長い間存在している人間の欲望や好みを特定した上で、現代のテクノロジーを使ってそこに到達するのに不要なステップを取り除く」のである。Blogger はブログをネットに公開するプロセスを劇的に簡素化した。その結果、ネット上でコンテンツを作成する人の割合が急上昇したのである。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "イノベーションって執念がいるの。俺、代官山（蔦屋書店）をやるときにも、役員全員に反対されたのをやり抜いたんだから。 　組織や社会の意思決定においては大きな声を出す人がいる。株主総会でも１株しか持っていない人が発言できる。開かれている反面、本当にリスクを取っている株主の発言機会が失われることもある。そういうのはどうなのかなって、総会の議長をしながらずっと思っていた。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "単純なイデオロギーだけで、明快な解を得ることができなかった 　これまでの新古典派の経済政策は、基本的に小さな政府、規制緩和、自由放任主義を善しとする枠組みのなかで進められてきた。経済人として、それもさまざまな企業の生き死にの修羅場に関わってきた体験に照らして、実際、これはかなり正しい。 　しかしその一方で、社会全体としては格差問題が起こっていて、どの国もこの格差問題に苦しんでいる。格差をなくそうと所得再分配を強化しようとしても、グローバル化が進んでいるので、生産性の高いセクターほど空洞化が起こってしまう。 「懸命に努力し、イノベーションを起こし、生産性を高めるという動機づけを持つこと」 「そこから生まれた成果が、極端に一部に集中しないようにすること」 　この二つのテーマを、どのようにすれば両立させることができるか。これがグローバル化が進展した現代の経済政策の命題として残っていた。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "派手に寡占化、コンソリデーションが進んだグローバル企業が目立つのでついつい目を奪われてしまうが、世の中ではそういう産業のほうが例外的で、ほとんどの産業は分散的。その中で、時々大きなイノベーションが起こってグローバルに化ける産業が出てくる。自動車産業だって、ヘンリー・フォードが出てきてフォード生産方式を発明するまでは、アメリカだけで三〇〇社もあったほどの超分散型の産業だった。フォードのおかげで強烈に設備集約産業化が進んだ結果、規模の経済が勝ってガラッと変わった。 　グローバルなレベルで規模の経済性やネットワークの経済性が効く産業は、それほど多くないというのが事実なのだ。結局、どこで飯を食っているのか、どこで価値を得ているのかということがすべてになる。そう考えると、ほとんどのビジネスはローカルだ。ローカルということは、まるまる空洞化が起こるような事態にはならないということだ。 「製造業が空洞化したら、日本にはぺんぺん草も生えない」 　一時期盛んだった空洞化論で、そんなことを言っていた人がいる。しかし、現実にはそんなことは起こっていない。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "これに対して連想バリアの低い人は、過去の経験とはほとんど関係のないアイデアや概念を結びつけたり、論理的に飛躍のある連想をすることが多い。そのため、せっかくのアイデアが抵抗に遭ったり、「そんなにいいアイデアなら、もう誰かが過去に思いついているはずだ」という反応をされることも少なくない。だが実際には、その結びつきは意外性に富んだものであるゆえ、過去に誰かが思いついた可能性はきわめて低いのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "もし職務の実行を最優先し、小刻みなイノベーションを一定の方向性をもって積み上げていくことを目的にするなら、専門化という方法は間違っていない。しかし、それまでにない新鮮で画期的なアイデアを生み出したかったら、個々人の体験の多様化を進めることこそが必要である。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "イノベーターは成功したから多くを生み出すのではなく、 多くを生み出すから成功した のだ、と。いいかえれば、量が質を生むということだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"t
