<!DOCTYPE html>
<html lang="ja">
<head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #0a0a1a; color: #e0e0e0; overflow: hidden; height: 100vh;
}
#app { display: flex; flex-direction: column; height: 100vh; }

/* Tab bar */
#tab-bar {
  display: flex; align-items: center; background: #0c0c24;
  border-bottom: 1px solid #1c1c3a; padding: 0 16px; flex-shrink: 0; height: 44px;
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: #446; padding: 0 22px; height: 100%; cursor: pointer;
  font-size: 13px; font-family: inherit; transition: color 0.15s;
}
.tab-btn:hover { color: #99b; }
.tab-btn.active { color: #8bf; border-bottom-color: #8bf; }
#tab-title { margin-left: auto; font-size: 18px; color: #6af; font-weight: 200; letter-spacing: 3px; }

/* Panes */
.tab-pane { display: none; flex: 1; overflow: hidden; min-height: 0; }
.tab-pane.active { display: flex; }

/* ===== TAB 1: Force Graph ===== */
#graph-container { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
#sidebar {
  width: 420px; min-width: 420px; background: #10102a;
  border-left: 1px solid #2a2a4a; display: none; flex-direction: column;
}
#sidebar.open { display: flex; }
#sidebar-header {
  padding: 14px 18px; border-bottom: 1px solid #2a2a4a;
  display: flex; justify-content: space-between; align-items: center;
  background: #14143a; flex-shrink: 0;
}
#sidebar-header h2 { font-size: 16px; color: #8bf; }
.freq { font-size: 12px; color: #446; margin-left: 6px; font-weight: 400; }
.close-btn {
  cursor: pointer; font-size: 20px; color: #446; background: none;
  border: none; width: 28px; height: 28px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { color: #fff; background: #2a2a5a; }
#hl-count { padding: 6px 18px; font-size: 11px; color: #3a3a5a; border-bottom: 1px solid #1a1a3a; flex-shrink: 0; }
#sidebar-content { padding: 10px 12px; flex: 1; overflow-y: auto; }
.hl-card {
  background: #141432; border-radius: 6px; padding: 11px 13px;
  margin-bottom: 8px; border-left: 3px solid #3a7a5a; transition: background 0.1s;
}
.hl-card:hover { background: #1a1a40; }
.hl-card .book { font-size: 11px; color: #6a8fc8; margin-bottom: 4px; font-weight: 600; }
.hl-card .txt { font-size: 13px; line-height: 1.75; color: #aab; }

/* Controls */
#controls { position: absolute; top: 14px; left: 14px; z-index: 10; }
#controls select {
  background: #141432; color: #bbc; border: 1px solid #2a2a4a;
  padding: 7px 10px; border-radius: 5px; font-size: 13px;
  min-width: 270px; cursor: pointer; appearance: auto;
}
#controls select:focus { outline: none; border-color: #6af; }
#stats { position: absolute; bottom: 14px; left: 14px; font-size: 11px; color: #2a2a4a; z-index: 10; }

/* Year slider */
#year-control {
  background: #0c0c24; border-top: 1px solid #1c1c3a;
  padding: 0 16px; height: 44px; display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
#year-control.hidden { display: none; }
#year-label { font-size: 13px; color: #6af; min-width: 90px; font-variant-numeric: tabular-nums; }
#year-slider { flex: 1; accent-color: #6af; cursor: pointer; }
#play-btn {
  background: #161638; border: 1px solid #2a2a4a; color: #99b;
  padding: 4px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;
}
#play-btn:hover { background: #222250; color: #fff; }
#year-max-label { font-size: 11px; color: #2a2a4a; }

/* SVG */
#svg-wrapper { flex: 1; min-height: 0; position: relative; overflow: hidden; }
#graph-svg { width: 100%; height: 100%; }
#stream-svg { display: block; }
.node { cursor: pointer; }
.node circle { stroke: #0a0a1a; stroke-width: 1.5px; }
.node text { fill: #99a; pointer-events: none; text-anchor: middle; font-weight: 500; }
.node:hover circle { stroke: #ccc; stroke-width: 2px; }
.node.selected circle { stroke: #ffd700; stroke-width: 3px; }
.link { stroke-opacity: 0.12; }
.link.highlighted { stroke-opacity: 0.65; stroke: #6af !important; }
.node.dimmed circle { opacity: 0.07; }
.node.dimmed text { opacity: 0.04; }
.link.dimmed { stroke-opacity: 0.02; }

/* ===== TAB 2: Streamgraph ===== */
#timeline-tab { flex-direction: column; }
#stream-wrapper { flex: 1; position: relative; overflow: hidden; }
#stream-svg { display: block; }
.stream-path { transition: opacity 0.2s; cursor: pointer; }
.stream-path.dimmed { opacity: 0.07; }
#stream-tooltip {
  position: absolute; background: rgba(8,8,24,0.96);
  border: 1px solid #2a2a4a; padding: 10px 14px; border-radius: 6px;
  font-size: 13px; pointer-events: none; display: none; z-index: 20;
}
#stream-tooltip .st-tag { font-size: 15px; color: #8bf; font-weight: 600; margin-bottom: 3px; }
#stream-tooltip .st-year { font-size: 11px; color: #446; }
#stream-tooltip .st-count { font-size: 13px; color: #bbc; margin-top: 3px; }
#stream-info {
  height: 44px; background: #0c0c24; border-top: 1px solid #1c1c3a;
  display: flex; align-items: center; padding: 0 20px;
  font-size: 12px; color: #334; flex-shrink: 0;
}
.s-axis text { fill: #446; font-size: 11px; }
.s-axis line, .s-axis path { stroke: #1e1e3a; }
</style>
</head>

<script>
// ===== DATA =====
const allNodes = [{"id": 0, "label": "組織論", "freq": 100, "highlights": [{"text": "ヘンリーは、私にプレッシャーをかけたところでバグの修正法を見つけるスピードが上がるわけではなく、むしろ現在の作業がおざなりになってしまうのをわかってくれていたようだった。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "ない。たとえば本書にあるように、誰かを降格させなくてはいけないときに本人の能力不足やミスだと伝えるのではなく、リーダー側の管理ミスという説明も加える、フィードバックで小言を言うときには褒めるのもセットにする、そしてそこから自分のスタイルをつくるといった考え方は、どんな組織でも実践的に役立つだろう。", "book_title": "HARD THINGS　答えがない難問と困難にきみはどう立ち向かうか", "author": "ベン ホロウィッツ、滑川 海彦、高橋 信夫、小澤 隆生（序文）"}, {"text": "こういう状況にある会社では、プロダクトマネージャーは、仕様書を作るぐらいのことしかやっていない。そんな仕事では、新しいアイデアの芽を摘みかねず、売れる製品を作るのはまず無理で、イライラがたまるばかりだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "覚えておいてほしい。価値のある、使いやすい、実現可能な製品として作られるべき何かをプロダクトマネージャーから与えられなければ、どんなにエンジニアリング部門が優秀でも意味はない、ということを。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "話をまとめると、インターネットサービス企業にとっては、プロダクトマネジメントとプロジェクトマネジメントの役割をはっきりと分けることが非常に重要だ。そうしないと、リリースの管理に悪戦苦闘する羽目になり、リリースはいつも遅れ、必要以上に時間をかけなければならなくなるだろう。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "というのは、こういうことが起きてしまう原因でよく目につくのは、プロダクトマネージャーが、作れそうな機能なら何でもめいっぱいくっつける、というようなことを何年にもわたってエンジニアリングチームにやらせてきたために、彼らをボロボロにしてしまうことだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "この組織で問題なのは、マーケティング部門の中で、プロダクトマーケティングの役割とプロダクトマネジメントの役割がいっしょくたにされてしまうことがよく起こる、という現実である。この 2つはまったく違う役割だし、その役割をこなすのに必要なスキルもまったく違っているので、たいていの場合、どちらかの役割 (あるいはその両方) がおろそかになってしまうという結果になる。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "おそらく、私が製品開発の仕事を通じて学んだ最大の教訓は、まず会社でいちばん頭の切れる人を探し出すことから始める、ということだ。私の経験では、どんな会社にも、本当に頭のいい人が何人かはいる。そういう人たちを探し当てることができれば、彼らは、会社の潜在力を目覚めさせるきっかけを作ってくれるかもしれない。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "製品を生み出す組織がやるべきこととは、優れた市場機会を追求することと、優れた製品による解決方法 (ソリューション) を提供することに尽きる。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "組織にいるからこそ抱える悩みのひとつは、会社がまちがった方向に進んでいるのに、「計画」のせいでいまさら方向転換できず、「最後までやり通すしかない！」と悟ったときに生まれる。ある時点でいいアイデアだと思えたとしても、けっきょくはマズいアイデアだったのなら、最後までそれを押し通すのはエネルギーと能力の無駄づかいだ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "会社は多くのものを守っているけれど、たいていは、いちばん価値があっていちばん大切なものを守れていない。それは 従業員の時間と集中力だ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "彼はこれから、中目黒で蔦屋書店をやるの。失敗して、試行錯誤する過程の中で、彼は成長していくと思う。それが知的資本経営。失敗を許容しないと、むしろ会社が潰れる。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "11 世紀にカトリックというローマのバチカンを本拠とする西方教会と、コンスタンティノープルを本拠とするギリシャ正教の東方教会とに分裂しました。さらに 16 世紀にカトリックに反抗するプロテスタントが現れ、現在は大きく分けるとカトリック、プロテスタント、正教会の 3 派があります。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "全部の柿を残したら、いい柿も小粒になってしまう。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "管理は大成功とまったく反対です。大成功するにはブレークスルーしないといけないのだから、管理から成功は生まれないですね。だから、人を管理するのも嫌いです。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "実は上司が「自分が安心したいから一体感を持たせたい」と思っているだけ。 本来人間はみな違う考え方をします。人それぞれの事情も考え方も違います。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "では何をマネジャーは求めるべきでしょうか。 　それは、「役割を果たしているかどうか」 です。 　そもそも仕事というのは、各人の役割をメンバー全員が果たしてくれれば、それでいいのです。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "ガートナーではその考え方を『バイモーダル』と呼び、これからの組織のあり方として位置づけています」というコメントをもらった。 バイモーダルは、２つのモードをうまく活かし合いながら、切磋琢磨していく。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "経営学用語に「スパン・オブ・コントロール」 という言葉がある。 これは、マネージャーの担当領域の限界や人員適正範囲を表す。スパン・オブ・コントロールが適正範囲内に収まっていないと、部下の業務把握や心身ケアが十分に行えず、重大事故の予兆も見逃してしまう。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "「議論を尽くせば、みなが納得できる結論に至り、気持ちよく仕事をしていける」 猛獣園ではこんなキレイごとは成立しない。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "効率は、ひとが生きやすくなるための手段である。しかし平成の大合併は、コストを減らすことが目的になってしまった。成果はコストを減らすことだった。すべての計画はひとの生きやすさこそが目的になるはずなのだが、それは見えなくなった。効率を手段ではなく目的に添えてしまっては、それは何も生み出すことはない。それどころかひとを不幸にさえしてしまう。 　意思決定は現場で行うべきである。答えはいつも現場にある。効率化を目的とし組織をまとめた結果、意思決定は現場でより行えなくなった。事務所で行うことになった。この結果、意思決定の間違えはおのずと増える。 　ひとが生きにくくなった原因のひとつは、意思決定を事務所で行わざるを得なくなるような組織の大きさを作ってしまったことにある。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "一方で、「人生は何かあるもんだ」という意識で組み立てられる組織は、つねに変化に対応する。時代は変化する。仮に旧来の組織が解体することがあっても組織のコンセプトは残るから別の形で何かが生まれる。生まれなかったとしたら、それは同じく時代のせいにしてしまったときである。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "組織マネジメントの学問で、組織内の人間関係がよい組織はメンバーが共通のゴールを目指しているという研究成果がある。それぞれ方法も速度も違うかもしれないが向いている方向は同じであることが、互いによい関係を保つ組織のコツとなる。 　小さい地域であるならば、その地域の理念が定まっていさえすれば地域という組織はうまくいく。 　例えば、旧海部町では、「人生は何かあるもんだ」と、問題が起こることを前提としそれを解決するための組織がある。問題が起こっても失敗しても、それは人生として当たり前だという共通認識があるし、問題が起こったらみんなで解決しようという意識があるから地域組織は同じ方角を向いていられる。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "この話のポイントは、信金や銀行の融資は事業の中身や将来性よりも、「誰の紹介か」ということが重視されているという点です。いったい、いつの時代の話なのかと 愕然 としたのは言うまでもありません。", "book_title": "もう銀行はいらない", "author": "上念 司"}, {"text": "恐ろしいことに、銀行には融資の審査能力がないのです。", "book_title": "もう銀行はいらない", "author": "上念 司"}, {"text": "● 職の多様化 ● 多様な構成のグループ ● 交差点ハンティング", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "つまり交差的アイデアを生み出したければ、時間をかけて異なる分野でさまざまなプロジェクトに関わることが有益だということになる。残念ながら、ほとんどの組織はそうしたシステムになっておらず、職の多様化を実現するのはなかなかむずかしい。企業とは通常、個々の従業員に最適な職務を見つけようとするものだからだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "サットンが奨励する「変わったアイデア」のひとつは、自分を居心地悪くさせる人間、違和感を覚える人間、さらには好きになれない人間を採用せよというものだ。もし自分が「気に入った」から、あるいは「われわれと同類」だからという理由で候補者を採用しようと考えているとしたら、それは逆にその人間を採用 すべきでない 理由と考えるべきだと、サットンは言う（もちろんあくまで、その職やチームに創造性が求められる場合だが）。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "たとえ多様なメンバーからなるグループを利用する機会に恵まれていても、組織はそれを活用するとは限らない。第", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "アンバサダーは一〇〇人を超えているか", "book_title": "アンバサダー・マーケティング", "author": "ロブ フュジェッタ、土方 奈美、徳力 基彦（解説）、藤崎 実"}, {"text": "顧客と投資家を満足させる投資パターンを持たない企業は生き残れないため、実質的に資金の配分を決めるのは顧客と投資家であるという理論を要約する。業績のすぐれた企業ほどこの傾向が強く、顧客が望まないアイデアを排除するシステムが整っている。その結果、このような企業にとって、顧客がその技術を求めるようになる前に、顧客が望まず利益率の低い破壊的技術に十分な資源を投資することはきわめて難しい。そして、顧客が求め始めてからでは遅すぎる。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "目標とする市場の大きさに見合った規模の組織に、破壊的技術を商品化する任務を与えることによって成功している。小規模な組織のほうが、小規模な市場での好機に容易に対応できる。大", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "投資のプロセスで、市場規模や収益率を数量化してからでなければ市場に参入できない企業は、破壊的技術に直面したときに、身動きがとれなくなるか、取り返しのつかない間違いをおかす。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "プロセスは、特定の業務に対応するために定義され、事実上の進化を遂げる。このため、ある業務のために作られたプロセスを使って、それを実行した場合は効率よく達成できるが、同じプロセスをまったく別の業務に適用すると、遅くて効率が悪く、役所仕事のようになることが多い。つまり、ある仕事を遂行する 能力 を定義するプロセスが、ほかの仕事については 無能力 を明らかにする。すぐれた経営者が各組織の目的を絞ろうとするのは、プロセスと仕事を連携しやすいからである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "経営者にとってのジレンマは、プロセスがその性質上、従業員が反復作業を一定の方法で行なうために確立されるということだ。一貫性を保つため、プロセスは基本的に変化しない。変更が必要なときには、厳しく管理された手順にしたがって変更する。つまり、 組織が価値を生みだすメカニズムそのものが、 本質的に、 変化をこばむのである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "大量生産による効率の向上こそが存在意義だった。当時のマネジャーたちは軍隊を見習い、厳格な管理法を取り入れた（「営業部隊」など、軍隊を起源とする言葉がよく使われるのはそのせいだ）。産業革命が終わって久しい現代でも、大半の会社がその考え方や行動規範を捨てられずにいる。 　遊びは、それ自体を目的とした行動だ。何かのためでなく、遊びたいから遊ぶ。凧あげ、歌、ボール投げ。どこにもたどり着かない行動は、一見無駄なようにも思える。しかし実は、そうした遊びこそ、人間にとって不可欠な行動なのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "チームの調和を最優先にすることは、チームにとっても本人にとっても決してよい結果を生みません。 そもそもチーム内で目的を共有できてさえいれば、必要に応じて自然と歩み寄るようになるのだから、最初から協調性やチームワークを第一に考える必要はないのです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "それによって、「外資系のやり方に慣れた英語ができる日本人では失敗する」→「日本のマーケットを知っていて日本人の心をグリップできる人間を採って任務にあたらせるべきだ」 と判断したのだと考えられます。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "そうならないためにも、〝想い〟を断ち切り、数字だけを見てドラスティックにやっていく必要があります。そういう意味でプロダクトチームとグロースチームは分けるべきだということになるわけです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "現場のことは現場で根拠になる数字を出して少人数で判断するからさっさと意志決定しようというのが、データサイエンスの目指す民主的で本来の美しい姿だと思います。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "株主構成も面白い。大株主の１位、２位は創業者である私と畑慎也（現サイボウズ取締役）。これはベンチャーならよくあるケース。ただし、３位が「社員持株会」である。全社員の約 90％が社員持株会に加入し、毎月サイボウズの株式を買い続けている。その結果、社員の持ち株比率は高まり続けている。「株式会社は株主のもの」などとマネー資本主義者は言うが、サイボウズはそのうち社員に買収され、社員のものになりそうだ。", "book_title": "チームのことだけ、考えた。", "author": "青野 慶久"}, {"text": "ＩＤＥＯには、「いかなる個人よりも全員の方が賢い」という有名な格言がある。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "③アイデアの良し悪しは、誰がそのアイデアを発案したかに基づいて判断してはならない（この原則は、声に出して繰り返してほしい）。", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "大変なところにチャレンジするのがいいんですよ。簡単なことばかりやろうとするのがＩＴ企業でしょ？（笑）それがダメなんですよね。まあこれまではしょうがないところもありました。もともとＩＴ業界っていうのは、資本も人もないところで、するっとうまくやろうとして集まった人ばかりだから。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "会社が小さいときって人がいないから、やったことがない人にやらせることになる。そういう何もないところから道を切り開く経験をした人はとてつもなく伸びることがある、と思います。やっぱり先輩がいると、なかなか成長しないんですよ。先輩がいないというのは、人が成長するために一番いい環境です。まあ、うまくいかないこともたくさんありますけど。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "が、ビジョナリー・カンパニーをつくり、築くには、すばらしいアイデアも、カリスマ的指導者も、まったく必要ないことがわかった。しかも、調査結果によれば、カリスマ的指導者によるすばらしいアイデアは、ビジョナリー・カンパニーを築くことと 逆相関 するとも思える。こうした驚くべき発見によって、企業の成功を、まったく新しい角度から、いままでとは違ったレンズをとおして見なければならなくなった。そしてこれは、経営者や経営幹部にとっても、起業家にとっても、大きな重石がひとつなくなることを意味している。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "こうしてわたしたちは、 会社を製品の手段として見るのではなく、 製品を会社の手段として見るように、 発想を転換する ことになった。そして、時を告げることと、時計をつくることには決定的な違いがあるという見方をとるようになった。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "アイデアはあきらめたり、 変えたり、 発展させることはあるが（ＧＥは当初の直流方式を廃止し、交流方式に転換した）、 会社は絶対にあきらめない。会社の成功とは、あるアイデアの成功だと考える起業家や経営幹部が多いが、こう考えていると、そのアイデアが失敗した場合、会社まであきらめる可能性が高くなる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "しかし、究極の作品は会社であり、あるアイデアを実現することでも、市場の機会をとらえることでもないと見ているのなら、善し悪しは別にして、ひとつのアイデアにこだわることなく、長く続くすばらしい組織をつくりあげることを目指して、ねばり抜くことができる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "スローンの本は……ひとつの側面しか見ていない。効率的に生産し、雇用を創出し、市場をつくり、売り上げを伸ばし、利益を生み出す企業経営しか考えていない。社会のなかの企業、生活のためではなく人生の場としての企業、隣人としての企業、パワーセンターとしての企業……。スローンの世界には、このすべてが欠けている。 　ドラッカーは、著書『マネジメント』（風間禎三郎他訳　ダイヤモンド社）でこう付け加えた。「ゼネラル・モーターズは、スローンの遺産で持ちこたえている。そして、スローンの立場から見れば……みごとな成功を遂げた。しかし、みじめなほど失敗したとも言える」", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "カネ儲けというのは、会社が存在していることの結果としては重要であるが、われわれはもっと深く考えて、われわれが存在している真の理由を見つけ出さなければならない。この点を追求していくと、人々が集まり、われわれが会社と呼ぶ組織として存在しているのは、人々が集まれば、個人ではできないことができるようになるからだ、つまり、社会に貢献できるようになるからだという結論に必ず行き着く。社会への貢献とは使い古された言葉だが、すべての基本である。……〔", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "スティーブは、建物でも社員のコラボレーション能力を高め、仕事を支援したかったのだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "① クラフトマン（職工型＝専門分野にのみ心を奪われるタイプ） ② ジャングル・ファイター（一匹狼型＝モーレツ主義） ③ カンパニーマン（会社人間型＝組織重視） ④ ゲームズマン（ギャンブラー型＝勝利にのみ満足を求める）", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "社内には法人営業部員が３人だけいるが、これは大手法人客の情報収集がおもな仕事だ。そこで勝負する気はそもそもない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "当社のマーケティング戦略では、広告宣伝しなくても自然に売れる製品を目指している。それにはダントツ製品が必要だが、いきなりは無理だ。強みの強化には時間がかかる。 大切なのは、社員に ノルマや期限を設定せず、プレッシャーをかけない こと。 プレッシャーをかけてできるくらいの「強み」は数十年市場で耐えられる「本物」の強みではない。強みは企業風土とも関わり、そう簡単にはできない。時間をかけてじっくり育て上げるべきだ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "重要なのは、 経営トップの本気と社員のやる気。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "不思議なことに「いつでもいいですよ」「時間がかかってもいいからやってくださいね」といって仕事を任せたケースで、想定以上に時間がかかったことはほとんどない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "特別できる人や異常に頑張った人しかノルマを達成できないような仕事のやり方では、そもそも他の人に引き継げない。仕事のやり方を変えない限り、問題は先送りされるだけだ。 ワークマンでは「頑張らない」「頑張ってできても意味がない」 と考えている。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "小手先で売上が上がっても会社は全然うれしくない。 誰にでもできる仕事に標準化するからこそ、 30 年、 40 年と続くダントツ経営ができる。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "それにはまず、 絶対に勝てるポジション取り をすることが重要で、次に 誰がやっても売上が伸び続けるしくみ が重要となる。 会社は個人の頑張りには頼らない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "優秀な経営者や幹部ほど、社員の余計な仕事をつくる。思いついたことをまわりに言うと、経営者や幹部の言うことだから関心を持たざるをえない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "それには報酬も大切。私が入社したときの社員の平均年収は５００万円台でしたが、現在は ７００万円台 にまで上がりました。今後は １０００万円 に近づけていきます。それまでは 役員を増やさない、役員報酬を上げない と決めています。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "昔は経営者と社員の給与格差がいま以上にありました。それをどんどん縮めています。そもそも役員が社員の数倍も働けるわけがないのです。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "しくみをつくり、社員一人ひとりの力を発揮させるのは典型的なサーバントリーダー。従来の強い権力を握るリーダーの弊害は、情報化社会において顕著に表れてきました。というのも、情報化社会では扱う知識量が膨大になるため、一人のリーダーの力だけでは処理することができない。その結果、時代の流れについていけなくなる恐れがあります。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "あなたの身の回りからできるだけ多様化すべき です。日本は諸外国に比較すれば均質性の高い社会を形成していますので、日本企業がグローバルに業務を行ないたいのであれば、 日本人同士だけで思考する自己満足の罠を避け、意識的に多様化すべき です。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "しかし、その頃の日本はアメリカのそうした思惑や戦略をよく理解せず、右肩上がりの成長を自分たちの手腕によるものだと考える傾向が強かったと思います。日本のビジネスモデルを自画自賛し、日本は終身雇用だから社員が安心して会社に勤めることができるし、企業間の株式持ち合いも手伝い、企業経営者も目先の利益を追うのではなく、中長期的な利益を考えることができる、との議論です。それに対して、アメリカの資本主義経営者は投資家のほうを向いていて、クォータリー（四半期） ベースの目先の利益しか見ていない。だからアメリカ企業はダメなんだ、と言って胸を張っていました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "実際、彼らは何が起こったのかを、本当の意味で理解することができていなかったと思います。武藤元事務次官が今になっても、「我々は何を間違えたのか」を自問していることはすでに書きました。実際、大蔵省は、「何となく」金融危機を引き起こしてしまいましたし、通産省で言えば、日米協議でアメリカがゴールポストを動かすと文句をぶちまけていましたが、それが本質ではないことは前述した通りです。 　そして、終身雇用という日本の強みがここにきて「弱み」に転じます。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "その結果、企業にとって悩ましいのが、「中期経営計画」 　これは、ほとんどの場合、「三ヵ年計画」として策定されてきました。 　しかし、この「三ヵ年」という時間の長さが、悩ましい。 　なぜなら、わずか「三年後」が予測できないからです。 　昔ならば、世の中の変化が緩やかであり、現在の変化の方向が、三年後にも、概ね正しかった。しかし、変化が激しいこの時代には、わずか三年で、世の中が大きく変わってしまう。しかも、「螺旋的発展」が起こるときは、まったく逆の方向に向いてしまう。 　だから、いま、多くの企業では、この変化の速さに頭を悩まし、その結果、言葉の矛盾とも思える「三ヵ年計画を、毎年、見直す」ということを余儀なくされているのです。 　そして、「螺旋的発展」が加速される時代においては、ビジョンや戦略を立案するとき、その業界や市場において、次にどのような「原点回帰」が起こるのかを予見して立案しなければならなくなる。 　いま、多くの企業が、その悩ましさに直面しているのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "大きな仕事をするには、何かを良くしているという感覚が必要だ。世界にささやかに貢献している、あなたは重要なものの一部である、という感覚だ。", "book_title": "小さなチーム、大きな仕事　働き方の新しいスタンダード (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、黒沢 健二、松永 肇一、美谷 広海、祐佳 ヤング"}, {"text": "なぜならば、企業や組織のマネジメントとは、ある意味で、 「意思決定の連続」であり、また、その意思決定も、 「正解のない意思決定」であることが大半だからです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "この鈴木マネジャーは、「直観力」はあるのですが、 「説得力」がないために、意思決定が壁に突き当たるタイプのマネジャーです。 　そして、残念ながら、企業や組織においては、どれほど優れた企画案も、 　それが組織の上層部を説得して了解を取り、実行に移されなければ、 　それは単なる「紙くず」なのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "業績不振に苦しんでいた就任直後、僕は従業員たちに、まず「ＱＳＣ（＊３） を高める以外のことを考えなくていい」「ＱＳＣのことだけを考えろ」と訴えかけました。 　一般論として、企業というのは「らしさ」を忘れて不振に陥り、「らしさ」を取り戻して復活するものです。日本でマクドナルドが苦戦していた理由は、「健康志向が台頭したこと」でも「ハンバーガーに対して消費者が飽きたこと」でもない。「マクドナルドらしさを失ったこと」にある。僕はそう考えていました。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "Leadership of Hoshino Resort│#02 熱狂的ファンをつかむコンセプトを作る 競争力向上のカギは「自分たちで決める」 企業が活力を高めるためには、「社員の主体性」を引き出す必要がある。 そのカギは、仕事に対する共感や納得感である。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "雇人は兄弟と思ふべし。客人は家族として扱ふべし。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "そんな中で自分が確実に残せるのは何か。星野社長は答えを探した。そして気づいた。 　社員やその家族に対して、堂々とした姿勢を残せばいい──。 「星野リゾートの社員は、人生の大切な時間をこの会社で過ごし、そしていつか会社を去っていく。そのときに『星野リゾートで過ごせてよかった、あの職場はとても幸せだった』と思ってもらえるようにしたい」。これが星野社長の思いである。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "リッツ・カールトンはモットーとして、次の言葉を掲げています。 「紳士淑女をおもてなしする私たちも紳士淑女です」", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "ですから、「アジアナンバーワン」「未来を切り拓く」「お客様に最高の価値を約束する」といった言葉はビジョナリーワードとはなりえません。ビジョンと呼ばれていたとしても、何ら新しい景色を見せてはくれない。その意味では、「号令」や「かけ声」と名づけた方が正確だと思われます。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "日本人は妙に潔癖で、白か黒かはっきりさせないと気がすまないところがあって、特に二重スパイを嫌いますが、ホントに優秀なスパイは概ねダブルですよ。日本でも情報機関を 設すべきかどうかという論議が盛んだけれど、あまりガチガチに考えるとうまく回らなくなる。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "だから情報機関のトップは官僚的な知性には向かないと思うんですね。私は政治家がいいと思うんですよ。ウェーバーが言うとおり、政治家は国民の平均的な水準から著しく乖離することはない。裏返すと政治家がダメで情報機関がうまくいかなかったら、それはそういう国なんだと諦めるしかないと思う。いま行われている議論は、外務官僚と警察官僚の綱引きであって、本質的な議論になっていません。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "僕自身は「戦う人」という印象が強いかもしれませんが、経験したからこそ言えます、組織は最終的には上の味方です。戦いを挑んではいけません。相手との距離感を適切に維持する実用的な日本語が使えることこそ、普通の人が生き抜くための話術です。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "業績のよくないダメな会社では、部門間の協力が欠如し、自部門の利益を守るために壁を高くしがちである。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "ドラッカーは『非営利組織の経営』で、このような組織が未来企業として主流になる、と予言しています。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "強い企業文化を維持するため、私たちはオフィスの外での付き合いも楽しめるような人たちだけを確実に採用していきたいと思いました。すると結果的に、近所のバーで飲んでいる時に最高にいいアイデアがたくさん生まれるようになったのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "社員〝全員〟に、ザッポス・カルチャーが自分にとってどんな意味を持つのか手短に書いてもらおう。そしてそれを本にするんだ」 こんな風にしてザッポス・カルチャー・ブックのアイデアは生まれ、それ以来それはザッポスにとって不可欠なものとなっています。毎年、ザッポス・カルチャー・ブックの改訂版が作られ、私たちはこの本を採用内定者、メーカーなど取引先、そして顧客にも配っています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちにはマニュアル原稿がありません。どんな顧客に対応する際も、ザッポスの社員は常に最善の判断をしてくれると信じているからです。私たちは 顧客と個人的な気持ちのつながり——社内ではＰＥＣ＝personal emotional connection と呼んでいます——を育くむことができるように、電話でのやり取りではいつもオペレーター各自が自分本来のパーソナリティを発揮してほしいと願っています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "あなたの会社にカスタマー・サービスを浸透させる一〇の方法 カスタマー・サービスを一部門だけではなく、会社全体の優先事項に位置づけます。カスタマー・サービスと向き合う姿勢は経営トップから示されねばなりません。 あなたの会社で日常的に使われる言葉のひとつに、「ワオ！」と驚かせる、を加えます。 あなたの会社のカスタマー・サービス担当者に権限を与え、信頼することです。社員は素晴らしいサービスを提供したいと願っていると信じましょう。なぜなら、彼らはそのようなことをしたいと心底望んでいるからです。スーパーバイザーまで問題を上げることは、極力避けるようにすべきです。 強欲な、あるいは社員をひどく扱う顧客はこちらから縁を切ってもいいのだとはっきりと認識します。 通話時間を計らず、社員にアップセルさせず、マニュアル原稿を使わないようにします。 フリーダイヤルを隠さないこと。あなたの顧客のみならず、社員に対しても、カスタマー・サービスを重視していることを伝えるメッセージになります。 どの電話も、カスタマー・サービス重視を標榜するブランド構築への投資だと考え、最小に抑えるべき経費と見なさないようにします。 全社を挙げて、素晴らしいサービスを讃えるようにします。全社員に「ワオ！」と驚く体験があった話を伝えるようにします。 カスタマー・サービスに対してかねてより情熱を持っている人を見つけ、雇います。 顧客、社員、取引先といったあらゆる人に素晴らしいサービスを提供します。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちはザッポスの文化を一〇のコア・バリューとして正式に定めました。 サービスを通して「ワオ！」という驚きの体験を届ける 変化を受け入れ、変化を推進する 楽しさとちょっと変なものを創造する 冒険好きで、創造的で、オープン・マインドであれ 成長と学びを追求する コミュニケーションにより、オープンで誠実な人間関係を築く ポジティブなチームとファミリー精神を築く より少ないものからより多くの成果を 情熱と強い意志を持て 謙虚であれ", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "強い絆を持つための重要な要素は、気持ちのつながりを育むことです。人間関係において常に正直に行動し、思いやりを持ち、気さくで、誠意を持ち、すべきことをするように気を配り、人間関係を大切にすることが重要です。信頼を築くことは最も難しいことですが、信頼があれば、はるかにたくさんのことを成し遂げられます。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ザッポスでは、考え方、意見、バックグラウンドの多様性を歓迎しています。あなたの人間関係が広く多様なものになればなるほど、あなたが会社に与えられるプラスの影響は大きくなり、あなたはますます会社にとって価値のある人になります。人間関係構築のためには、心に響き、オープンで、誠実なコミュニケーションがきわめて重要なのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "最高のリーダーとは、模範を示して部下を指導し、チーム・リーダーであると同時にチームに従う人のことです。私たちは、一般に、最もよいアイデアや意思決定はボトムアップ、つまり、問題か顧客あるいは両方に最も近い人から生まれると信じています。マネジャーの役割とは、障害を取り除き、自分の直属の部下が成功できるように支えることです。つまり、最高のリーダーとは、仲間を支援するサーバント（奉仕者） なのです。このようなリーダーは自分が率いる人たちに奉仕します。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちはオペレーション（業務） の卓越が大切だと信じていますし、私たちがするあらゆることに常に改善の余地があると承知しています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私には、サイエンス・オブ・ハピネスについてもっと学び、その知識を会社経営に生かすのが理にかなったことに思えました。そうすれば、顧客と社員をもっと幸せにする方法の科学的根拠をいくらか学ぶことができるのです。今日、私たちは社員にサイエンス・オブ・ハピネスのセッションさえ提供しているほどです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ネットフリックスのＣＥＯリード・ヘイスティングは、同社の企業文化をテーマにした有名なプレゼンテーションで次のように述べている。「我々はチームであって家族ではない」。続けて彼は、マネジャーたちにこう自問するよう勧めた。「うちの社員がもし同業他社に転職して似たような仕事に就くといった時、あなた自ら必死で慰留するのはどの社員だろうか？　それ以外の社員はみな、今すぐ手厚い退職金を出したうえで辞めてもらおう。そうすれば、その仕事ができるスター人材の獲得に向けて、空席ができる」——。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "コミットメント期間という枠組みが社員の離職を「あらかじめ許す」ことにならないかと心配する向きもいた。だが、離職は会社側が許す・許さないと決められるものではない。そのような権限が会社にあると思うのはただの自己欺瞞であり、社員との間に不誠実な関係を生み出すことにつながる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "必要なのは、社員のコミットメント期間における目標と一致するよう整合性を構築することだ。なにも社員の「人生の目標や価値観」とまでも一致させる必要はない。前にも述べたが、会社は家族ではない。社員の価値観と将来展望は尊重すべきだが、無条件に支援する義務はないのだ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "ならばどうしてもっと早く結果が出なかったのか？　それは会社として頑張るべき焦点「どこで戦うか」を正しく明確に設定できていなかったからです。「マーケター」にとって、それが最重要の使命です。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "それは素人である消費者とは真逆の感覚に進むことを意味しています。 　プロとしての技術を業界で毎日毎日見ていると、どんどん目が慣れてしまって、彼ら自身の「感動の水準」が一般消費者のそれとはどんどん離れていきます。多くの消費者にとってわかりやすくて面白いものが、彼らには刺激や品質が足りないものに見えたりするのです。そしていつしか無意識のうちに自分が良いと思うもの（＝玄人好みのもの）を作るようになっていくのです。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "私達マーケターの仕事は、彼ら天才が努力すべき焦点を明確にすることであり、彼らの才能と努力がビジネスの結果によって報われるように導くことです。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "しかし「落としどころ」は、ほとんどの場合において消費者最適ではありません。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}, {"text": "東洋の政治学で言いますと、能率の究極は、 「賢を尊んで」、「能を用い」、「俊傑位にあり」", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 1, "label": "人間関係", "freq": 94, "highlights": [{"text": "ない。たとえば本書にあるように、誰かを降格させなくてはいけないときに本人の能力不足やミスだと伝えるのではなく、リーダー側の管理ミスという説明も加える、フィードバックで小言を言うときには褒めるのもセットにする、そしてそこから自分のスタイルをつくるといった考え方は、どんな組織でも実践的に役立つだろう。", "book_title": "HARD THINGS　答えがない難問と困難にきみはどう立ち向かうか", "author": "ベン ホロウィッツ、滑川 海彦、高橋 信夫、小澤 隆生（序文）"}, {"text": "退屈だと感じた時に、一般的に人は刺激や、目を惹くようなニュースの見出しといった変化を求める。それとは逆に、ストレスを多く抱え込んでしまった時は、Pinterest のようなサイトを見て安らぎを求める。そして、孤独感に苛まれる時には、Facebook やTwitter が人とのつながりをすぐに与えてくれる。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "ベースキャンプでは、誰かほかの人のスケジュールを押さえるには、手間をかけて直接交渉しなければならず、簡単に都合よく自動的に予定を入れることはできない。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "幸せと生産性の源泉は、安定した仲間と働くことだ。僕らの会社が少ない人数で多くのことを成しとげられる鍵は、まさにここにある。この重要な強みが、ほかの会社ではあまり追求されていないことが、僕らには不思議でならない。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "もっとも家族も部下も女性も、人の心をつかむ大本は全部一緒。会社はロングタームですから、簡単にはいきません。でも、社長と社員がお金だけ、ビジネスだけの関係だったら、必死で働けないですよ。誰だって嫌な人の下で働きたくないでしょう？", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "楠木 　人心の掌握というと、会社のなかの統率と、お客様の気持ちをつかむことは同じなのでしょうか。 永守 　そうですね。さっき女性にモテた話をしたけれど、何でも一緒。営業も、部下のコントロールも嫁さんのコントロールも、全部が人心掌握。嫁さんの心もつかめないようでは、仕事なんかできませんよ。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "みんながお悩みを送ってくれて、それにポインティが答えるのも人間関係だし、仲のいい友達と遊ぶことも、ポインティと仕事を一緒にしてくれる人もそう。「巡り合ってよかったな～！」とかさ、 そういう奥行きが楽しいんだよね。 でね、老後はもう思い出し笑いしかしたくない（笑）。", "book_title": "おいでよ ポインティの相談天国", "author": "佐伯ポインティ"}, {"text": "実は上司が「自分が安心したいから一体感を持たせたい」と思っているだけ。 本来人間はみな違う考え方をします。人それぞれの事情も考え方も違います。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "「人間関係は、疎で多。緊密だと人間関係は少なくなる」 「人間関係は、ゆるやかな 紐帯」", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "とにかくこの町は構造的にもひととひとの距離が近い。そしてコミュニケーションの量が多いらしい。 　にもかかわらず、調査の結果では互いに緊密ではないということになっている。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "私は、国の「平成の大合併」と呼ばれる市区町村の合併事業を、メンタルヘルスの視点からは大失敗だったと思っている。ひととひとの距離は明らかに遠くなった。ひとを大事にするのはひとであり、支え手の数は多いほうがいい。ひとを支えるための行動は、効率を重視すれば難しくなる。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "しかし神津島の特養では、互いにみんな知っているから互いの人間関係を維持できていた。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "ではなぜ私たちは、多様な構成のチームで働くことにためらいを感じるのだろうか。少なくとも理由の一部は、人間の本性に関わっている。人間には生来、同類同士で群れ、自分と違う人間を避けようとする傾向がある。心理学者はこうした傾向を「シミラー・アトラクション（似た者同士が惹かれ合う）効果」と呼んでいる。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "現金支払いと大きく違う点は、会計が一瞬で終わるので、ほとんど支払いを意識しなくなってきている点です。支払いを意識しなくなると、コーヒースタンドは「コーヒーを買いに行く店」というより、「気のいいお兄ちゃんがコーヒーをふるまってくれる場所」へと変わっていきます。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "決済という作業は、商品を売る側と購入する人が仕方なくやらなければいけない行為で、もしこれを短縮したり不可視化できたりすれば、買い物という行為は本来の人間対人間のコミュニケーションや物語の交換に戻って、売りたい人と買いたい人の意識が一瞬でつながることができる」", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "今の私たちに必要なのは、他者との優しくて健やかな繫がりなんです】", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "この世のトラブルの半分は、イエスを言うのを焦りすぎ、 　　　ノーを言うのを渋りすぎることからくる。 ── ジョシュ・ビリングス（作家）", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "この世のトラブルの半分は、イエスを言うのを焦りすぎ、 　　　ノーを言うのを渋りすぎることからくる。 ──", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "私は先輩格のメンバーに「ちゃんと後輩の面倒をみること」と教えてきました。それはチームワークを推奨しているのではなく、 自分より弱い者にやさしくするのは人として当然の思いやりだからです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "誰かを恨みに思っていてもいいことはひとつもないし、それどころか自分自身が損をしてしまう。 反対に、すべての原因を自分にして、自分に何が足りないかを考えるようにすれば、反省点や改善点が見つかり成長につながります。 自分を取り巻く人間関係も明らかによくなります。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "若いスタッフにはいつも言っていることですが、 あらゆる誘いを断らないことを徹底すべき です。仕事に関係した誘いに限らず、プライベートでもそうです。 　誰かに誘われるということは、何かしらの理由で存在を求められているからです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "プライベートの誘いでも、やはりその存在が求められているという事実を忘れてはいけません。飲み会であれば、場をなごませてほしいなど、何かしらの期待がかけられているはずです。草野球やマージャン、引っ越しの手伝いなどであれば、単に頭数を揃えたいだけかもしれません。それでも呼ぶ側とすれば、意味や理由があって、呼ぶ相手を選んでいるわけです。 　そういう誘いを断っていては、やがて誘いの声はまったくかからなくなり、出会いの機会を広げることもハプニングに遭遇することもできなくなります。経験値を積めない状況になるわけです。それによって、あらゆるチャンスを失うことになります。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "人脈を意識しすぎることはマイナスです。 　現実として、いかに人脈が形成されていくかといえば、そういう意識とは無関係なところで、どれだけ楽しい体験を共有しているかにかかってきます。 　私自身の人脈といえる仕事仲間を考えてみても、最初の段階ではビジネス上のつながりなどはなかった人たちが大半です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "みんな気軽に人脈が欲しいって言いますが、誰かに気に入られれば仕事や人生や家庭がイージーモードになるものだと誤解しているように思います。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "しかし、シュナーチは この行き詰まり状態を、個人的な成長と対人スキル向上のための重要な分岐点 だとしています。 「結婚生活には、予想するより、ずっと大きな緊張感とプレッシャーがあります。じつはその時点こそが始まりなのに、そうしたプレッシャーがあまりにも大きいため、それを離婚の時期だと誤解してしまうのです」 　この行き詰まり状態をうまく克服したふたりは、個人としても、そしてカップルとしても強くなります。ふたりの関係は本物になり、より親密なものとなります。 　お互いに理解し合える親密な関係をつくりあげるためには、ふたりで問題に向かい合うことが重要です。 　シュナーチはふたりで問題に向かい合うことは「親密さの駆動輪（育むもの） であり、 砥石（磨くもの） である」としています。", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "たいていの人は、軋轢があるのはふたりの関係そのものに問題があるからだと解釈します。いざこざのない完全な調和、それこそが私たちみなが懸命に追い求めなければならないあたりまえの姿だと思いこんでいます。 　しかし 実際には、いざこざは避けられないものであるだけでなく、長期にわたる良好な関係にとって非常に重要なものです。", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "人との接し方が独特なのだ。苛立ち、無愛想になることがよくあった。見込み客との打ち合わせに出て、相手に凡庸さや準備不足を感じ取ると、ためらいもなく相手を糾弾した。取引やひいきを得ようとしているときの戦術として最悪だ。彼", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "人との相互作用は、相対性理論やヒモ理論よりもはるかに複雑だが、それだからこそ面白くもあり重要でもある。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "人は、類友＝「強いつながり（強い紐帯）」の人（ 5 ～ 15 人程度） と、そこに準ずる「弱いつながり（弱い紐帯）」の人（ 50 ～ 500 人程度） とつながって生きている。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "我々人間は、意図のよくわからない相手から、自分の現状や、「真の」素晴らしさ、改善のためにしなければならないことを指摘されても、よい働きはできない。卓越性を伸ばせる唯一の機会は、自分のことをよく知り気にかけてくれる相手から、その人が体験したことや感じたことを教えてもらった時──特に、我々の中で本当に有効な何かが発揮された瞬間を見つけて、教えてもらった時なのである。", "book_title": "フィードバックの誤謬 DIAMOND ハーバード・ビジネス・レビュー論文", "author": "マーカス・バッキンガム、アシュリー・グドール、DIAMONDハーバード・ビジネス・レビュー編集部"}, {"text": "以上の意味で、「人間の最大の味方は人間であるが、最大の敵も人間である」という言葉は、ヒトの生存形式の本質を捉えた極めて納得のできる言葉なのです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "リモートワークでは、オフィスで働く以上に、人のつながりが重要になってくる。距離を克服するためには、良質なコミュニケーションが不可欠だからだ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "文字だけでやりとりするとき、人は悪いほうに流されやすくなる。ちょっとした言葉のあやが、大がかりなケンカを引き起こすかもしれない。トラブルの芽は一瞬のうちに 摘み取らないと、疑いの気持ちがどんどんふくらんでしまう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "では、アダムの得た洞察とは何だろうか？　たとえ数分間であれ、手を貸そうとしている相手に従業員を会わせることは、彼らへの最大の動機付け要因なのだ。それは、人の仕事に出世主義や金銭を超えた意味を吹き込むのである。", "book_title": "ワーク・ルールズ！―君の生き方とリーダーシップを変える", "author": "ラズロ・ボック、鬼澤 忍、矢羽野 薫"}, {"text": "ぼくは子ども時代の関係性を五つのカテゴリーに分けています。「父との関係」「母との関係」「兄弟姉妹など血縁関係」「同世代との関係」、さらに「自然との関係」です。自然との関係に加えて、「社会との関係」というのもあります。ただし、五つに分けた関係性も本当は分けられることではありません。なぜなら、母との関係が最大であり、それ以外はほぼ「社会・自然との関係」だからです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "そして四番めの関係性のエネルギー源を、ぼくは「別れ」だと思っています。なぜなら、できあがって固定してしまったみずからの関係性を断ち切るには別れるしかないからです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "ほとんどの人が相手のイメージを持っていて、その人の特定の部分とだけ出会っています。ぼくが見ていると、ほとんどのカップルは互いに互いのイメージをぶつけ合っているだけで、プロセス指向心理学でいう「夢見状態＊１」で出会っています。だから、その人の人間としての全体性とは出会ってはいないんですね。全体性との出会いというのは非常に難しいことです。それぞれの当人がしっかり自分を見る目を持っていればわかると思いますが、それはめったにないことです。片方の人がそういう目を持っていても、もう片一方がそうではないことも多いからです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "すべてのこと、自己観や社会観も、幼い頃の関係性によって作り上げられています。すると、幼い頃の人間関係を健全にすればよくなるのかと考えがちですが、そんなことじゃない。幼い頃の健全な人間関係というものは、基本的には存在しないからです。子どもに不健全な人間関係のない幼児期を送らせようとして、そういうことに基づいた家庭を作り、関係性を作っていったとしても、社会には不健全が充満していますから、必ずそのメカニズムでフィードバックが起こってきます。それが人間存在の基本的な在り方だとぼくは考えています。何かの執着や傷を与えられない人間関係というものは存在しないからこそ、初めて社会があるわけです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "いわく、甘えるというのは、本当は自分でできることを他人に頼むという意味であり、頼るというのは自分ではできないことを他人に頼むことを意味する、と。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "ある調査によると、いまでは「マーケティング・コミュニケーションよりもＦファクター（friends=友達、families=家族、Facebook fans=フェイスブックのファン、Twitter followers=ツイッターのフォロワー）が信頼されるという」（Kotler 2017）。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "啓作は骨董に、千賀子は坂に、それぞれエロスの対象を求め、「平和」な暮らしをしている。しかし、それはやはり味気ない感じがする。エロスは何と言っても人を対象にしてこそ、深く体験することになるからであろう。生きた人間を相手にし、異性を理解するという、不可能とも言える課題に挑戦し続けることによってこそ、中年のエロスの味がわかってくる。しかし、そのためには相当な苦しみも体験しなくてはならないだろう。千賀子にとって、啓作を相手にそれをやり抜くことは絶望的だった。だからこそ「坂」にそれを求めたのだ。しかし、人間の形をとって表されるエロスは、いろいろな「来訪者」となって千賀子の前に出現する。実際、中年の男女にとって、このような来訪者（ 偶然に 来たりすることが多い）とどのようなつき合い方をするかは、その後の生き方を左右する重大さをもつのである。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "人を動かす原則❶　 批判も非難もしない。苦情も言わない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を動かす原則❷　 率直で、誠実な評価を与える。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人に好かれる原則❶　 誠実な関心を寄せる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人に好かれる原則❷　 笑顔で接する。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人に好かれる原則❸　 名前は、当人にとって、最も快い、最も大切な響きを持つ言葉であることを忘れない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人に好かれる原則❺　 相手の関心を見抜いて話題にする。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "「相手の信用状態が不明な時は、彼を立派な紳士と見なし、そのつもりで取引を進めると間違いがないと、私は経験で知っている。要するに、人間は誰でも正直で、義務を果たしたいと思っているのだ。これに対する例外は、比較的少ない。人をごまかすような人間でも、相手に心から信頼され、正直で公正な人物として扱われると、なかなか不正なことはできないものなのだ」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❺　 顔を立てる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "「いっしょに勉強しよう」 と言い、居間で子どもが勉強している間、じぶんは好きな本を読むようにしたら、子どもが隣で黙々と勉強をするようになりました。人は本能的に、誰かといっしょに何かをやりたいのです。それは太古の時代から人間が生き延びてきた知恵です。誰かが狩りをするときは、協力していっしょに行い、木の実を集めるときも、外敵に襲われないよういっしょに行った。その記憶が私たちの奥底にあるのです。 ただ、これは 自分も動くことが前提 です。動くといっても、子どもといっしょに同じ机で真剣に何か好きなことをすればいいのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "なにしろ、人間は生まれつき社会的な生き物だ。何から得られる喜びが幸せに最もつながりやすいかと訊かれると、大多数の人が富や名声、さらには身体的な健康よりもなお、愛と親密さと社会的帰属を高く評価する（１）。人間という 種 にとって社会的なつながりがどれほど重要かを考えるとなおさら悩ましいのだが、常時、人口のおよそ二〇パーセント（つまり、アメリカだけでも六〇〇〇万人） が強い孤立感を覚え、それが人生での不幸せの大きな原因となっている（２）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "社会的に満足していても花形になれるとはかぎらないが、人を寛大で前向きな気持ちにさせる作用のおかげで、周囲から感じが良い人、さらには好奇心をそそる人とさえ見られることも多い。 　対人関係での満足感についての私たちの発見でとくに興味深いのは、社会的な痛みやそれが引き起こしうる歪んだ社会的認識とは無縁のこの心性を持つ人は、非常に落ち着いていて、健全であるという点だ。人", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "ようするに、最も友愛精神にあふれ敵意の少ないものが、進化には有利であり、淘汰は、このように人間関係の最適化の後押しをする性質を優遇するに違いない（６）」。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "人間は、個人的に近しく支持されることを必要とし、それより広い範囲で友人や親族と親交を持つ必要があり、また、特定の集団（それがミシガン大学同窓会にしろ、ウェールズ歩兵連隊や配管工組合、改造バイク愛好会にしろ） に帰属しているという感覚を必要とする。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "社会神経科学が示すとおり、心と体を分かつ神秘的な境界などないばかりか、自分自身と他者の間にあるものだと、私たちがずっと決めてかかっていた境界も、かつて思われていたほど確固たるものではない。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "以上のように、「仁」には、大別して「仁愛」と「仁徳」というふたつの側面があり、それらを大まかにまとめれば、人と人との関係を律する最高の規範ということになる。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "世のなかの多くのひとは、リアルの人間関係は強くて、ネットはむしろ浅く広く弱い絆を作るのに向いていると考えている。でもこれは本当はまったく逆です。 　ネットは、強い絆をどんどん強くするメディアです。ミクシィやフェイスブックを考えてみてください。 　弱い絆はノイズに満ちたものです。そのノイズこそがチャンスなのだというのがグラノヴェターの教えです。けれども、現実のネットは、そのようなノイズを排除するための技法をどんどん開発しています。いまのネットでは、「パーティでたまたま隣り合って、めんどうだなと思いながら話しているうちにだれかを紹介される」という状況を実現するのがとてもむずかしい。めんどうだ、と思ったら、すぐにブロックしたりミュートしたりできるからです。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "わたしたちのまわりで見られるさまざまな影響力の中でも１、２を争うほど効果の高いルール──恩義のルールです。このルールは言います、人は、他者にしてもらったのと同等のお返しをすべきだと。", "book_title": "影響力の正体　説得のカラクリを心理学があばく", "author": "ロバート・Ｂ・チャルディーニ、岩田 佳代子"}, {"text": "だから、幸せに生きるためには自分とある程度同じ価値観や同じ世界を共有する友人や仲間を持つことが大事だ。 　人間は、自分のやっていることを他人に認めてもらえるとむなしさから遠ざかりやすい。仕事というのは他人のためとか社会のために何か貢献をすることだから、働いていれば周りの人に必要とされることが多くて、だから働くというのはむなしさから逃れる手段として昔から一番よく選ばれる効率的な手段だ。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "人生の中で自分が体験する家族の数というのは、自分の育った家族と新しく作る家族の一つか二つくらいだったりすることが多いけど、シェアハウスとか寮とかに住むといろんな人との何パターンもの共同生活を体験することができる。そうすると「世の中にはいろんな人がいるんだ」とか「いろんな生活スタイルがあるんだ」という勉強になるし、試行錯誤をしながら共同生活をすることで、人間関係を調整することについても慣れてくるところがあるように思う。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "もし何か困った状態になったとしてもある程度までなら友人知人を頼ればなんとかなりそうな気もするし、それでどうにもならないような事態なら仕方ないと諦めるしかないな、と思う。どうにもならなかったら死ぬだけだ。心配なのは死ぬときに潔くサックリ死ねるかどうかということだろうか。認知症とかになってしまったらキツいな……というのは思う。あんまり年をとりすぎないうちにサクッと死んでおくのがいいかもしれない。六十代前半くらいで。 　老後にもっと保障を求めるなら若いうちから真面目に働いて備えを作っておいたほうがいいんだろうけど、そういうのは僕にはできなかったから仕方ない。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "視線をやりとりすることは、相手の心を読み取る上で大切な働きである。それと同時に、場合によってはコミュニケーションを縛る 桎梏 にもなる。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "大正十五年七月二十八日、星野温泉若主人の為に草す 成功の秘訣　六十六翁　内村鑑三 一、自己に頼るべし、他人に頼るべからず。 一、本を固うすべし、然らば事業は自づから発展すべし。 一、急ぐべからず、自働車の如きも成るべく徐行すべし。 一、成功本位の米国主義に倣ふべからず。誠実本位の日本主義に則るべし。 一、濫費は罪悪なりと知るべし。 一、能く天の命に聴いて行ふべし。自から己が運命を作らんと欲すべからず。 一、雇人は兄弟と思ふべし。客人は家族として扱ふべし。 一、誠実に由りて得たる信用は最大の財産なりと知るべし。 一、清潔、整頓、堅実を主とすべし。 一、人もし全世界を得るとも其霊魂を失はば何の益あらんや。 　　人生の目的は金銭を得るに非ず。品性を完成するにあり。 　　以上", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "雇人は兄弟と思ふべし。客人は家族として扱ふべし。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "そんな中で自分が確実に残せるのは何か。星野社長は答えを探した。そして気づいた。 　社員やその家族に対して、堂々とした姿勢を残せばいい──。 「星野リゾートの社員は、人生の大切な時間をこの会社で過ごし、そしていつか会社を去っていく。そのときに『星野リゾートで過ごせてよかった、あの職場はとても幸せだった』と思ってもらえるようにしたい」。これが星野社長の思いである。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "たとえば家族と連絡を取り合うためにフェイスブックを使っている場合、本当にそれがいちばんいい方法だろうか？　電話をかけたほうがよくはないだろうか？", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "あるグループインタビューで、とても示唆深いコメントがあった。アラサー女性の言葉。 「最近は、同性で付き合う人には刺激を、異性には自然体や、やすらぎを求めるようになった。 20 代前半の頃は逆だった」 　これは、言い得ていると思う。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "それほど重要でない内容でも、メモをとりながら聞くことで「こんな与太話も尊重してくれている」とあなたの可愛げが何倍にも増す からである。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "部下ができる年齢になると感じることだが、メモをまったくとらない部下ほど憎らしい生き物は世の中に存在しない。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "なお、「いい人」とは「運がいい人」になる蓋然性が高い。「運」とは決して、怪しげな超常現象のことを指しているわけではない。「運」とは文字通り、「運ばれてくる好機」である。そして「好機」を運んできてくれるのは、自分のことを気に入ってくれている、良好な関係を築いている他人 にほかならない。 　「運がいい人」というのは総じて、リラックスしていて、肯定的で、明るくニコニコ笑っており、一緒にいる人を幸せな気分にさせる。そしてなんといっても「可愛げ」があるので、いろいろな人が、いろいろな機会を運んできてくれる。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "自分に合ったいいものを長い間愛用するというのは、長期的な人間関係を大切にする一流の人に共通する行動パターン である。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "僕なりの考察では、人は低所得に加えて「三つの無縁」「三つの障害」から貧困に陥ると考えている。 　三つの無縁とは、「家族の無縁・地域の無縁・制度の無縁」だ。家族の無縁とは、困ったときに支援してくれる家族・親族がいないこと。親も貧困であれば頼る術はそもそもないし、貧困家庭に育つことは教育というその後の所得を保証する（最近は保証しないが）自己資産を得られないことにも繋がる。地域の無縁とは友達の無縁にも置き換えられるが、苦しいときに相談したり助力を求められる友人がいないこと。制度の無縁とは、そもそも生活保護の捕捉率が非常に低いことに代表されるように、社会保障制度の不整備・認知度の低さ・実用性の低さのこと。貧困とはひとつの条件で陥るものではないから、これらがオーバーラップして人は貧困に陥るのだと考えている。 　一方で三つの障害については「精神障害・発達障害・知的障害」と考える。これを挙げることは差別論にも繋がりかねないので慎重を要するが、これらの障害は「三つの無縁」の原因ともなっている、無視できない問題だ。", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "これは月収 10 万円付近のワーキングプアの人々が、子供を何人も抱えて月に 20 万円以上の生活保護を受給するシングルマザーを叩く構図と同じだし、永崎さんらも小島さんの糾弾側に回る可能性だってある。 　だが、小島さんに足りなかったのは、努力ではない。随分と前のことになるが、年越し派遣村などを率いた湯浅誠さんが「貧困と貧乏は違う」と発言していたことがある。貧乏とは、単に低所得であること。低所得であっても、家族や地域との関係性が良好で、助け合いつつワイワイとやっていれば、決して不幸せではない。一方で貧困とは、低所得は当然のこととして、家族・地域・友人などあらゆる人間関係を失い、もう一歩も踏み出せないほど精神的に困窮している状態。貧乏で幸せな人間はいても、貧困で幸せな人はいない。貧乏と貧困は別ものである。そんな言葉だったと思う。", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "恋愛に限らず、すべての人と人とのふれあいの根底に「感謝」の気持ちを本当に持っているのか、がとても大切だと個人的にいつも思っています。「好き」「好かれたい」「愛している」「愛されたい」は、実は自分が相手に求める想いです。そして、それが成就しない気持ちは、多くの場合は悲痛が伴います。しかし「感謝」の気持ちは、相手に求めるものではありません。自分の心に問い、自分の本当の心の中から出る「自然」な思いのはずです。今、まずできることは「手紙を出す」ことでも、「ひたすら待つ」ことでも、「合コン」に行くことでもないように思えます。そのどれかが、結果的にうまく行っても、また、どこかで同じような問題に出会うことになるような気がします。今、ご自身のなにかを変えるチャンスです。その回答は、他者に求めないご自身の感謝の気持ちの先に必ずあると思います。", "book_title": "白本", "author": "高城剛"}, {"text": "インテリジェンスの世界で信頼関係をつくる方法は三つあると思うんです。ひとつは一緒に女遊びをすること。もうひとつは一緒に糞をするとか、排泄行為をする。ロシアではサウナからよく見える野外で一緒に野糞をしたりします。それから一緒に食事をすることですね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "性悪説にもとづいて、相手を利用することだけを徹底的に考えている。だからこそぎりぎりの信頼関係が生まれるわけです。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "僕自身は「戦う人」という印象が強いかもしれませんが、経験したからこそ言えます、組織は最終的には上の味方です。戦いを挑んではいけません。相手との距離感を適切に維持する実用的な日本語が使えることこそ、普通の人が生き抜くための話術です。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "ましてや子供がいじめられているとしたら、理屈の通じない相手には話しても何ともならない。下手に対抗するより、子供にも学校へ行かなくていい、逃げていいと言ってやるべき。人間関係の損切りは早いほうがいい。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "孤独死や無縁死が拡がる昨今、このようにリソースを融通し合える程度に絆の強い人間関係を、外に持たない家族が普通だと思います。ネットの繋がりは、平時に寂しさを紛らわせてくれても、非常時に大切な私的リソースを融通し合う相互扶助には役立ちません。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "子供を疎開させなかった家庭は政府や東電の発表を信じたのか。 　違うでしょう。ソーシャルキャピタル（人間関係資本）が乏しくて疎開させられなかったところも少なくないだろうと思います。でも自分の人間関係資本が乏しいと思いたくない。だから政府や東電を懐疑する発言をデマだと決めつける。そうした認知均衡理論的な歪曲もあったはずです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "ファンの人数が少なければ、「物販」でも長く会話ができるので、地下アイドルはひとりひとりの名前と顔を覚えることができます。ファンにとっても、歌っている間に「レス」をもらえる確率が上がります。これが距離感が近いということです。 「レス」とはアイドルから客席のファンに手を振ったり、指を差したり、目を合わせたりするアクションのことで、「物販」とはライブ後に地下アイドルが自ら、グッズの販売や、サインや握手を行なうことです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "アイドルの本質である「ファンに応援されることでアイドルが成長し、それを見守ることでファンも楽しい」という関係を〝純化〟させたのが地下アイドルではないかと私は考えています。 　それなので地下アイドルとファンの関係は、決して一方通行ではありません。普通の人間関係と同じように、喜びや悲しみや病みや楽しみが絡み合った、繊細で複雑なものなのです。 　地下アイドルは、メジャーアイドルへのカウンターカルチャーでもありません。インディーズ文化を面白いと感じ、そこにしか身を置けない女の子もファンも存在していて、地下アイドル文化はそういう人たちの受け皿にもなっています。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "これは取りも直さず、人間には社会性が必要ということです。自分にとって前述のような相手が必要であると同時に、自分も誰かにとってそういう存在でなければいけません。いつも自分が主役、自分が先生という立場に居続けていると、脳に問題があっても気づけず、裸の王様になってしまいます。意欲を保ち続けることも難しいでしょう。時には脇役になったり、悪役になったり、生徒になったりすることがとても大切です。 　そのために、まず、人との出会いを大切にして下さい。そして、一度つくった人間関係を簡単には壊さないようにして下さい。それをする努力の中で、脳は自然と鍛えられていきます。 　いろいろな役者がそろった舞台の上で、自分もいろいろな役割を演じつつ活動をマルチにし、豊かな人生を送りましょう。それが脳にとっていちばん大切なことです。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}, {"text": "とくに、高い地位にあり交際範囲も広い人にとっては、愛想のよさと立派なマナーが成功のカギを握っているといえよう。いくら勤勉で誠実を絵に描いたような人間であっても、行儀作法が落第点なら人柄のよさまで帳消しにされてしまう。 　むろん、マナーの善し悪しなど気にかけず、むしろその奥に隠されたほんとうの人柄に目を向けようとする奇特な人も中にはいる。だが、多くの人はそれほど寛大ではない。外面に表われるふるまいを見てその人間を判断し、好き嫌いを決める、というのが世間一般の常識なの", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "そこには「あなたのご主人（あるいは、奥さん、息子さん、娘さん）の働きは、キヤノン電子にこれだけの貢献をしてくれています。これはそのお礼の品です」という手紙を添えた。これによって、社員が家族にも尊敬され、さらに仕事に精を出してくるという好循環も生まれた。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "既婚者の素晴らしい点は、欲の手離れが良いところだと思います。赤の他人や言葉が通じない赤子との生活で、彼らは毎日思い通りに事が進まないことに慣れる訓練を積んでいます。自分がコントロールできる範囲なんて、そんなに大きくはない。そのことを知っている人の方が、突発的な事態に適応する能力が高いように、私は思います。すべての既婚者が徳のある人間だとは言いませんが、不快なものをどんどん切り捨ててきた独身者は、挙句に陸の孤島で孤独を嚙みしめることになる。それが嫌なら、手放せない自由裁量権の存在を実感する前に、さっさと入籍するしか手はないでしょう。と言うか、それ以外に方法が見当たらない。", "book_title": "貴様いつまで女子でいるつもりだ問題 (幻冬舎単行本)", "author": "ジェーン・スー"}, {"text": "強い企業文化を維持するため、私たちはオフィスの外での付き合いも楽しめるような人たちだけを確実に採用していきたいと思いました。すると結果的に、近所のバーで飲んでいる時に最高にいいアイデアがたくさん生まれるようになったのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "●私は会社には単なる利益追求を超えた崇高な目標があると信じている。 ●ザッポスでの私の役割には真の目的がある——それは単なる仕事以上のものである。 ●私は、自分で自分のキャリアをコントロールしており、ザッポスで個人的にも仕事の上でも成長しているのを感じている。 ●私は同僚を自分の家族や友人のように考えている。 ●私は仕事にとても満足している。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "強い絆を持つための重要な要素は、気持ちのつながりを育むことです。人間関係において常に正直に行動し、思いやりを持ち、気さくで、誠意を持ち、すべきことをするように気を配り、人間関係を大切にすることが重要です。信頼を築くことは最も難しいことですが、信頼があれば、はるかにたくさんのことを成し遂げられます。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ザッポスでは、考え方、意見、バックグラウンドの多様性を歓迎しています。あなたの人間関係が広く多様なものになればなるほど、あなたが会社に与えられるプラスの影響は大きくなり、あなたはますます会社にとって価値のある人になります。人間関係構築のためには、心に響き、オープンで、誠実なコミュニケーションがきわめて重要なのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "自分で自分をコントロールしていると感じられるか、自分が進歩していると感じられるか、つながり（関係の数と深さ）、ビジョンと意味（自分自身よりも大きなものの一部となること） の四つのことで決まります。このフレームワークの面白いところは、あなたがこのコンセプトをビジネスにも応用できるということです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "顔のパーツが、真ん中に集中している女性は、人のエネルギーを「吸う」力が強いので、一緒にいる人は下がってしまいます。いわゆるエネルギーヴァンパイアと呼ばれる人々。", "book_title": "黒本", "author": "高城剛"}, {"text": "同性にモテることが大切なんじゃないでしょうか。異性にしか人気がない人は、本質的に問題あると思いますよ。そして、同性にモテるほうが、人生長く楽しいと思います。結果、異性にも長くモテるのではないでしょうかね。", "book_title": "黒本", "author": "高城剛"}, {"text": "古い友人からネットワークビジネスの勧誘を受けました。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 2, "label": "リーダーシップ", "freq": 76, "highlights": [{"text": "ヘンリーは、私にプレッシャーをかけたところでバグの修正法を見つけるスピードが上がるわけではなく、むしろ現在の作業がおざなりになってしまうのをわかってくれていたようだった。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "スティーブはハイテク企業のＣＥＯでありながら、ソフトウェア業界の諸事情など一切関知しない顧客の立場になって考える。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "だから何かを生み出す人、リーダー、起業家となる人には、ふたつの能力が必要になる。ひとつは、現状を正しく把握する力。雨雲が立ち込めて雨がパラパラと降ってきたら、すぐにやむ雨なのか、嵐になるのかを見極めなくてはいけない。ふたつ目は、困難の嵐がやってきたときに、次々と手を打つ能力だ。傘をさすのか、雨宿りをするのか、雨雲を避けるよう移動するのかをその時々のコンディションと自分の能力などを鑑みて、的確に判断し行動しなければならない。", "book_title": "HARD THINGS　答えがない難問と困難にきみはどう立ち向かうか", "author": "ベン ホロウィッツ、滑川 海彦、高橋 信夫、小澤 隆生（序文）"}, {"text": "担当者の肩書きや社内の組織体系がどうあれ、あらゆる優れた製品の陰には、責任を持ってその製品のプロフィールを決めた 1人の人間がいる、と私は断言する。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "私はいつも、優秀なエンジニアに対しては、ぜひプロダクトマネジメントに挑戦するべきだ、と勧めている。そして、どんなに君たちのエンジニアリングがすばらしくても、作る価値のある製品でなければ君たちは力を発揮しようがないんだよ、と言い聞かせている。何を作れるかを知っているだけではなく、何を作るかというもっと大きな問題にも取り組んできたエンジニアの貢献があってこそ、すばらしい製品や会社がたくさん生まれたのだ、ということも指摘しておきたい。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "おそらく、私が製品開発の仕事を通じて学んだ最大の教訓は、まず会社でいちばん頭の切れる人を探し出すことから始める、ということだ。私の経験では、どんな会社にも、本当に頭のいい人が何人かはいる。そういう人たちを探し当てることができれば、彼らは、会社の潜在力を目覚めさせるきっかけを作ってくれるかもしれない。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "もっとも家族も部下も女性も、人の心をつかむ大本は全部一緒。会社はロングタームですから、簡単にはいきません。でも、社長と社員がお金だけ、ビジネスだけの関係だったら、必死で働けないですよ。誰だって嫌な人の下で働きたくないでしょう？", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "能力があるいい人を集めて会社をどんどん大きくしていくわけですから、経営者も能力を高めて、魅力を感じてもらわないといけない。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "おそらく長い時間、働いているからでしょう。質的にも量的にも社員よりはるかに働いていますし、常に陣頭指揮を執っています。そういう点において、社員から後ろ指をさされることは絶対ない。「", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "経営学用語に「スパン・オブ・コントロール」 という言葉がある。 これは、マネージャーの担当領域の限界や人員適正範囲を表す。スパン・オブ・コントロールが適正範囲内に収まっていないと、部下の業務把握や心身ケアが十分に行えず、重大事故の予兆も見逃してしまう。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "英国のサッチャー元首相が喝破した通り、「金持ちを貧乏にしても、貧乏人は金持ちにならない」のである。穏やかでも多少なりともトリクルダウンはあるし、一部の才能に恵まれた人や企業が、世界で活躍して外貨を稼いでくれるのをみんなで応援していればいい。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "緩やかな共同体型で、人格円満で模範的なムラ人からみんなで社長を選び、選ばれた人はみんなが何となく幸せになれるように経営を進めるという日本型「カイシャ」モデルは、完全に農耕社会の仕組みである。現代の日本企業のような組織は、戦国時代ではあり得ない。当時は力のある人物が権力を握っていたから、何となく決まるということは起こらない。権力者とそうでない者の間には絶対的な主従関係がある。権力者に腹を切れと言われたら、何があっても切らなければならない。そうなっていないということは、日本人に流れる 通奏低音 的な文化は、どう考えても農耕文化なのである。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "企業経営、特にＬの世界の中堅、中小企業にとって、経営者は最大の希少資源である。ベストプラクティスを取り入れる能力を持つ経営者が少ないのだとしたら、数少ない優秀な経営者のもとに集約化を進めたほうが、労働生産性も賃金も上がるはずだ。 「そんな優秀な経営者なんているんですか」 　よくそう尋ねられる。気をつけなければならないのは、優秀な経営者は世界チャンピオンである必要はないことだ。ローカル経済圏の非製造業では、世界チャンピオンを目指す必要はなく、県大会上位レベルでいい。たしかに世界チャンピオンを狙える経営者はいないかもしれないが、県大会上位レベルの経営者であれば少なくないはずだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "第一に重要なのは、対立を個人的な問題にしないことである。グループのなかでは互いに反対意見を自由に言い合えなければならない──だが必ず、理由をはっきりさせることが必要だ。具体的に焦点を絞った反論でなければ、反対意見を言われた側は不当に攻撃されたと感じかねない。さらに、すべてのアイデアが公平に扱われるというオープンな環境を保つことも重要だ（＊ 17）。チームのリーダーは意識的にせよ無意識的にせよ、出されるアイデアの範囲を限定してしまうことがある。だが交差点においては、できるだけ多くの意外性に富んだアイデアの組み合わせを可能にする必要がある。それができるのは、まさに多様なメンバーで構成され、各自が自由に意見を言えるグループなのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "情報が入手でき、計画を立案できる持続的技術では、リーダーシップをとることは、競争上、重要でないことが多い。このような場合、追随者も先駆者も実績は変わらない。先駆者が圧倒的に有利なのは、市場のことがほとんどわからない破壊的イノベーションの場合である。これがイノベーターのジレンマである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "リーダーシップ論の権威ジョン・Ｃ・マクスウェルもこう述べている。 　「ほとんどあらゆるものは、徹底的に無価値である（ ９）」 　努力の量と成果が比例するという考え方を捨てたとき、エッセンシャル思考の大切さが見えてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "ツイッター共同創業者のジャック・ドーシーは、たぐいまれなエッセンシャル思考の経営者だ。ディナーに同席したとき、彼はＣＥＯの役割を「最高〝編集〟責任者」と定義していた。別のスタンフォード大学のイベントでは、次のように説明している。 　「なぜ編集かというと、日々やることは山ほどありますよね。でもそのなかで、本当に重要なのは１つか２つ。エンジニアやサポート担当やデザイナーは次から次へとアイデアを持ちかけてきますが……編集者である自分は、そういう情報のなかから１つのこと、あるいは２つか３つの要素の交点を見つけ出し、それだけを実行すると決めるのです（ ３）」 　ただノーと言うだけなら、３歳児にもできる。編集の技術は、ただ減らすことにあるのではない。減らしながら、価値を増やすのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "彼は社員たちに「ＦＣＳ（フォーカス）」の思想を繰り返し語る。「少数のことをより良くやれ」「正しい情報を正しい人に正しいタイミングで伝えろ」「意思決定のスピードと質を追求しろ」という３つのセンテンスの頭文字をとったものだ。これはエッセンシャル思考のリーダーシップを簡潔に、的確に言い表している。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "私は先輩格のメンバーに「ちゃんと後輩の面倒をみること」と教えてきました。それはチームワークを推奨しているのではなく、 自分より弱い者にやさしくするのは人として当然の思いやりだからです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "一緒に仕事をしているスタッフに対しては「人生って思い出づくりだよね」という話をよくしています。思い出をつくるには本気を出さなければ意味がないので、そういう経験を積んでほしいと願っているからです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "そのなかでもやはり岩下さんや小澤さんから学んだことは大きく、ひと言でいえば、「仕切り力」ということになるのだと思います。 　日本では飲み会でもなんでも、誰かが仕切りますが、アメリカの企業ではそうした概念がありません。しかし、実際のビジネスの中では、忘年会や結婚式の二次会を仕切れるような力が生きてくるのは確かです。 　その力はそのままプロデュース能力につながります。想像力を生かして段取りをして、抜けなどもないように作業を進行させていくうえでは、共通する部分も大きいからです。 　ビジネスで成果をあげるには、チームをつくりあげること、そこで人を動かしていくことも大切になります。そうであるからこそ「志」や「仕切り力」といった要素が重要になってきます。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "⑤アイデアを育てたり、切り落としたり、採り入れたりするには、上層部の「園芸」スキルが必要である。ＭＢＡはこれを「リスク許容度」という言葉で表現している。私", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "が、ビジョナリー・カンパニーをつくり、築くには、すばらしいアイデアも、カリスマ的指導者も、まったく必要ないことがわかった。しかも、調査結果によれば、カリスマ的指導者によるすばらしいアイデアは、ビジョナリー・カンパニーを築くことと 逆相関 するとも思える。こうした驚くべき発見によって、企業の成功を、まったく新しい角度から、いままでとは違ったレンズをとおして見なければならなくなった。そしてこれは、経営者や経営幹部にとっても、起業家にとっても、大きな重石がひとつなくなることを意味している。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "スティーブは、建物でも社員のコラボレーション能力を高め、仕事を支援したかったのだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "ピクサーを特別足らしめているもの、それは「問題は必ず起こる」と思って仕事をしていることだ。問題の多くは隠れて見えない。それを明るみに出すことが自分たちにとってどれほど不快なことであっても、その努力をする。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "私が思うマネジャーとしての自分の仕事は、豊かな環境をつくり、それを健全に維持し、それを妨げるものに目を光らせることだ。誰にでも創造性を発揮できるポテンシャルがあり、それがどのようなかたちであれ花開くのを後押しすることは心底尊いことだと思う。けれども私はそれ以上に、知らず知らずのうちにそれを邪魔し、繁栄する企業に内在する創造性を阻害するものに興味がある。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "最も頭の切れるメンバーを引きつけるには、自分自身の不安感を追いやる必要があった。ＡＲＰＡの教訓が頭にこびりついていた。難問にぶち当たったときは賢くなれ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "そのやり方には、彼がヨーダというキャラクターに込めた哲学がいくらか反映されているように感じられた。「やるかやらないかだ。やってみる、というのはなしじゃ」というヨーダのセリフのように、ジョージは、人生の矛盾を噛み砕いて何かに端的にたとえるのが好きだった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "一つは簡単だ。リーダーが自らの失敗や失敗に果たした役割について話すことができれば、社員は安心する。失敗から逃げたり、見て見ぬふりをしない。だから私はピクサーの中で起こっている危機的状況についてオープンにするようにしている。そうした経験は大事なことを教えてくれると思うからだ。問題についてオープンにすることが、そこから学ぶことの第一歩になる。私", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "リーダーシップ論の世界的権威であるロビン・シャーマは、「人間は３週間、何かを続ける事ができれば、その行為は習慣となり、３週間後には無意識にその行為を続ける事ができる」と語っています。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "だから、チームの雰囲気にはつねに気をつけておいたほうがいい。ネガティブな人間がいると、チームの雰囲気は確実に悪くなる。リモートワークの環境なら、なおさら致命的だ。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "働きすぎをふせぐためには、チーム全員でお互いに目を光らせておくことだ。そして何より、チームをまとめるリーダーや経営者が「働きすぎはよくない」というムードをつくっていく必要がある。リーダーが残業好きだと、部下もそれに引きずられてしまう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "重要なのは、 経営トップの本気と社員のやる気。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "社長が目標を一つに定め、それを「愚直」に継続すれば確実に会社は変わる。 重要でない目標をつくり、期限を定め、ノルマにしてプレッシャーをかけ続ける方法は断じて間違っている。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "優秀な経営者や幹部ほど、社員の余計な仕事をつくる。思いついたことをまわりに言うと、経営者や幹部の言うことだから関心を持たざるをえない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "そのために、 経営者や幹部は現場に行って極力出社しなければいい。 現場で発見したことは長短あるが、どこかで聞きかじったテーマより重要性が高い。 現場には改善と改革のヒントが隠されている。経営者が新しいテーマを出してもいいが、１年で数回程度にすべきだ。それまでじっと我慢してため込む。その間に忘れたら重要性が低い証拠だ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "ビジネス書を１冊読むたびに新しい事業アイデアや改革案が浮かぶ。それを封印するのは結構つらい。でも、未熟な私が並みの経営者になるには、そのつらさを乗り越えなければいけない。鈍感に見えるくらい愚直に一つの目標しか持たず、それに没頭するのが本当にいい経営者だ。 この８年間、ずっとそう自分を戒めてきた。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "オーセンティック・リーダーシップは、倫理観を重視し、自分はどういう人間か、自分が大事にする価値観は何かなど、自分の考えに根ざしたリーダーシップを指します。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "センスメイキングは、イノベーションを起こすうえで欠かせない条件であり、変化が激しく不確実性の高い現代のリーダーシップで特に重要です。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "昭和天皇は過去に第一次世界大戦で独仏合わせて 70 万人以上の戦死者を出したヴェルダン古戦場を視察した経験があり、本当の消耗戦に入った際のイメージがあったのかもしれません。このやりとりからは陸軍の杉山元参謀総長にリーダーに必須のリアリズムを感じることはできません。こうしたエリート、軍部トップを擁した日本と日本国民は対米開戦へと進んでいったのです。日本は米国と１９４１年 12 月に開戦し、１９４５年９月に終戦しました。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "グーグルによる「非常に効果的なマネージャーの８つの習慣（8 Habits Of Highly Effective Google Managers）」 １．優れたコーチになりなさい ２．チームに任せて、マイクロマネジメントしないこと ３．従業員の成功と幸せのために考えていることを表現しなさい ４．生産的かつ結果志向でいなさい ５．優れたコミュニケーションを取り、チームの話を聞きなさい ６．従業員のキャリア開発を支援しなさい ７．チームのための明確なビジョンと戦略を持ちなさい ８．キーとなる技術を持つことで、チームを助けることができるようにしなさい", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "そしてドイツがその最たる例ですが、新自由主義の時代、経済面での相互依存が深まる中、戦争は起きないという前提でロシア産のエネルギー供給に頼り、 14 億の民を抱える中国需要を取りに行くビジネスモデルを作りましたが、今これが逆流しています。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "彼らの基本戦略は中国とマラソン競争をして、中国が自らの弱さによって潰れるのを待つアプローチです。政権によってよりアグレッシブであったり、マイルドであったりと匙加減は異なるでしょうが、基本的には米ソ冷戦での枠組みと似た形になります。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "人を動かす原則❶　 批判も非難もしない。苦情も言わない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を動かす秘訣は、この世に、ただ一つしかない。この事実に気づいている人は、はなはだ少ないように思われる。しかし、人を動かす秘訣は、間違いなく、一つしかないのである。すなわち、自ら動きたくなる気持ちを起こさせること──これが、秘訣だ。 　重ねて言うが、これ以外に秘訣はない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "団塊の世代を中心とした 50 歳～ 65 歳の、〝大人を変える大人〟のことを、〝プレミアエイジ〟と呼んでいる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "赤ん坊は自分の知識を持ち合わせていない。しかし母親は子の要求をくみとって世話をする。それは真心があるからである。真心は慈愛を生む。慈愛は知識を生む。真心さえあれば、不可能なものはない。役人は、民には母のように接しなければならない。 民をいつくしむ心さえ汝にあるならば、 才能の不足を心配する必要はない」", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "尊徳の「土地と人心の荒廃との闘い」については、ここではくわしく記しません。そこには権謀術策はありませんでした。あるのは、 ただ魂のみ至誠であれば、 よく天地をも動かす、との信念だけでした。ぜいたくな食事はさけ、木綿以外は身につけず、人の家では食事をとりませんでした。一日の睡眠はわずか二時間のみ、畑には部下のだれよりも早く出て、最後まで残り、村人に望んだ苛酷な運命を、みずからも共に耐え忍んだのでした。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "支配に関してしばしば見落とされているのは、社会のピラミッドの頂点に立つ 最上位者 が、自らの自己調節と共調節の能力にどの程度まで頼っているのか、という点だ。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "ホモ・サピエンスの世界の指導者たちは注目してほしい。どちらのオスも率先して行動をとる必要はなく、どちらも顔を潰さずに済み、それでいて群れは均衡を取り戻したのだ（ 12）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "なぜならば、企業や組織のマネジメントとは、ある意味で、 「意思決定の連続」であり、また、その意思決定も、 「正解のない意思決定」であることが大半だからです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "これは、「直観力」も「説得力」もあるが、「責任力」がないために 　意思決定に関わることのできないタイプのマネジャーです。 　この「責任力」とは、私の勝手な造語ですが、 「リスクを取り、責任を取る能力」のことです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "第一は、理屈だけでは答えの出ない問題に、 　正しい答えを見出すための「直観力」です。 　言い換えれば、「勘が鋭い」ということです。 　第二は、組織内での合意を得て、 　組織を動かしていくための「説得力」です。 　言わば、「言葉に力がある」ということです。 　第三は、意思決定に伴うリスクを取り、 　その結果に責任を取る「責任力」です。 　すなわち、「腹が据わっている」ということです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "従って、むしろ、これからの時代のマネジャーは、 「メンバーの意見を聞いたうえで、自分の信念に従って意思決定を行う」 　というスタイルを心掛けていく必要があります。 　そして、そのとき求められるのは、 　その意思決定をメンバーに納得させる力、すなわち「説得力」なのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "Leadership of Hoshino Resort│#02 熱狂的ファンをつかむコンセプトを作る 競争力向上のカギは「自分たちで決める」 企業が活力を高めるためには、「社員の主体性」を引き出す必要がある。 そのカギは、仕事に対する共感や納得感である。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "「成功の秘訣」には、「人もし全世界を得るとも其霊魂を失はば何の益あらんや。人生の目的は金銭を得るに非ず。品性を完成するにあり」という言葉がある。 　経営者にとって、事業を伸ばし、収益力を高めるのは、もちろん大切な役割である。だが、経営者が一番大切にしなければいけないのは、お金でない。それは品性である──。星野社長は内村の考えに強く共感した。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "参加者の頭脳をつないで皆の知見を引き出し、異なる意見をひとつに集約することが、知的リーダーシップの基本 なのである。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}, {"text": "構想を言葉にするときには、正しいことを言うときとはまったく違うマインドセットが必要になります。慎重になるのではなく、大胆になること。根拠より、信念を持つこと。きれいごとよりも、まだ誰も言っていないことを話すこと。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "ですから、「アジアナンバーワン」「未来を切り拓く」「お客様に最高の価値を約束する」といった言葉はビジョナリーワードとはなりえません。ビジョンと呼ばれていたとしても、何ら新しい景色を見せてはくれない。その意味では、「号令」や「かけ声」と名づけた方が正確だと思われます。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "だから情報機関のトップは官僚的な知性には向かないと思うんですね。私は政治家がいいと思うんですよ。ウェーバーが言うとおり、政治家は国民の平均的な水準から著しく乖離することはない。裏返すと政治家がダメで情報機関がうまくいかなかったら、それはそういう国なんだと諦めるしかないと思う。いま行われている議論は、外務官僚と警察官僚の綱引きであって、本質的な議論になっていません。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "だから何よりもまず国家指導者たちがしっかりした哲学を持って、いかにして日本国家を生き残らせるか考えないといけない。しかしその上で僕が最近、決定的に重要だと思うのはむしろ財界です。財界が政治に対して積極的にクレームをつけて、経済ばかり優先すると、国家が滅びるぞと脅かしてほしい。ＪＲ東海の葛西敬之会長のようなタイプの経営者がもっといて欲しいんですよね。 　 西木 　彼は新幹線を中国に売るのに反対しましたね。儲かればいいという発想ではダメだ、と。その後、新幹線を購入した中国は、純国産だと言い張っているのだから、売ったほうは馬鹿にされたようなものです。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "我々はオバマを単に批判できない。ウェーバーによれば、市民の責任は法令遵守だが、政治家の責任はそれに止まらない。法令遵守に意味を与える社会の存続が危うい場合、法令を踏み越えても社会の存続に邁進するのが、政治家の責任である。これを彼は、心情倫理と対比させて責任倫理と呼んだ。政治家には、失敗したら血祭りにあげられる覚悟で法令を踏み越えるべきときがある。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "このようにリーダー的な役割ができるファンは、リーダーっぽく威張っている人よりも、物腰が柔らかくて社交性が高い人が多いのが特徴です。 　ＴＯは推しの顔でもあるので、ＴＯが他の人に嫌われてしまうと、ＴＯが推している地下アイドルの印象まで悪くなってしまいます。そのため、周囲の人が認められるような人でなければＴＯにはなれないのです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "将軍というのは、兵士として優秀なだけでなく、実務家としてもずば抜けた手腕を持っていなければならない。なぜなら、兵士たちが勝利の日まで戦いつづけられるよう、食糧や衣服、そのほか何でも必要な物資をあてがい、こまごまと面倒を見なくてはいけないからだ。そのため将軍には、あふれんばかりの機知と人間の本質についての深い知識、そして全軍の動きを把握する能力が要求される。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "上が現場主義に徹し、下をちゃんと見る、目を光らせる、というのは、組織に緊張感をもたらし、だらけさせない最良の方法である。 ところがダメな会社はそれができない。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "そこでリーダー層については、１年ほどかけてじっくり観察し、その上で人物を見極めることにした。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "経営方針を打ち出したら、それで自分の仕事はおしまいで、後はよきにはからえ、というタイプの経営者がいるが、多くの場合、それではうまくいかない。 　経営トップが、役員や幹部社員だけでなく、管理職から現場の一般社員に至るまで、粘り強くその実行をフォローして初めて大事は 成就 する。そこまで経営トップが自ら動かないと、なかなかトップの思いというのは、組織の末端まで届かないのが現実だからだ。 　組織が変われるかどうかは、結局、トップの思いの強さ次第である。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "最初は手本を示すことも必要である。できもしないことを要求しているのではないということを自ら示すことが、改革の「最初の一突き」になるのだ。", "book_title": "見抜く力　リーダーは本質を見極めよ", "author": "酒巻久"}, {"text": "そういう感覚が政治家やなんかから欠落してしまったのは、日本の文化が駄目になっているってことだ。文化的なことがじゃんじゃんなくなっているから、ちょっとでも変なことを言ったら、ハチの巣をつついたみたいな騒ぎになる。マスコミも政治家も、ワーワー文句を言うしか能がないような教養のない人ばかりが目立つ。「絶対に許せない！」と目に涙を浮かべて怒ってるようなタイプの人が、政治的なリーダーになれるわけないのに。国を良くしようとかいうこととは何も関係ないところで大騒ぎしている。それを誰も感覚として恥ずかしいと思わない。政治というよりも、結局は文化の問題なわけだ。", "book_title": "超思考", "author": "北野武"}, {"text": "最高のリーダーとは、模範を示して部下を指導し、チーム・リーダーであると同時にチームに従う人のことです。私たちは、一般に、最もよいアイデアや意思決定はボトムアップ、つまり、問題か顧客あるいは両方に最も近い人から生まれると信じています。マネジャーの役割とは、障害を取り除き、自分の直属の部下が成功できるように支えることです。つまり、最高のリーダーとは、仲間を支援するサーバント（奉仕者） なのです。このようなリーダーは自分が率いる人たちに奉仕します。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ネットフリックスのＣＥＯリード・ヘイスティングは、同社の企業文化をテーマにした有名なプレゼンテーションで次のように述べている。「我々はチームであって家族ではない」。続けて彼は、マネジャーたちにこう自問するよう勧めた。「うちの社員がもし同業他社に転職して似たような仕事に就くといった時、あなた自ら必死で慰留するのはどの社員だろうか？　それ以外の社員はみな、今すぐ手厚い退職金を出したうえで辞めてもらおう。そうすれば、その仕事ができるスター人材の獲得に向けて、空席ができる」——。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "ゼネラル・エレクトリック（ＧＥ）がジャック・ウェルチの後継者にジェフ・イメルトを選んだ時、何が起きたか思い返してほしい。ほかの有力なＣＥＯ候補はほとんど即座にＧＥを去った。他社でＣＥＯ職に就くためだ（ボブ・ナーデリはホーム・デポへ、ジム・マクナーニは３Ｍへ）。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "みんなの価値観と目指す姿が明瞭になったら、次は、関係者全員の整合性を高めるために力を合わせていこう。トップダウン方式ではなくコラボレーション型の作業だ。これは会社側だけの仕事ではなく、社員側にとっても大事な仕事となる。社員、上司、会社の三者が協力してこの作業にあたることで長期的関係が築きやすくなる、前向きな作業だ。ジョン・ドナホーも次の点を強調する。「（社員のありたい姿を探り当てたら）次に、その目標と結びつく経験をイーベイで得るにはどうすればよいか、一緒に考えるのです」", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "彼らの価値観とありたい姿を「なんとなくの手がかり」から「明確なポイント」へと転換する必要はある。部下の目標を知らないマネジャーに、どうして変革型コミットメント期間を設計することができようか？", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "付録—Ｂ 「尊敬する人のリスト」の実例 アライアンスについて述べた第３章で、社員の価値観を理解することが大事だと述べた。そして、尊敬する人物とその理由を聞いてみるというテクニックを紹介した。著者三人がその作業を行った結果を以下に示す。 まず、我々の尊敬する三人の人物を挙げ、それぞれの人物について最も尊敬できる資質を三つ挙げ、それら九つの資質を自分が大事だと思う順番にざっと並べたリストである。 リード・ホフマン １．マーティン・ルーサー・キング・ジュニア 偉大な英雄であり、彼のビジョンと勇気はすべてのアメリカ人、そして世界中の人々を今でも鼓舞している。 ビジョン 勇気 共感 ２．マリー・キュリー 科学の世界の英雄である彼女は、大きな組織のリーダーでなくても、本質を問いなおすような知的リスクをとり、人々の先頭に立って道を切り開くことができることを身をもって示した。 知性 思考の独立性 集中 ３．アンドリュー・カーネギー 実業家から慈善家（フィランソロピスト）へと進化した彼の生き方は、その後何十年にもわたり灯台のような役目を果たしている。 物心ともに与えようという優しさ リーダーシップ 起業家精神 資質のランキング １．共感 ２．勇気 ３．集中 ４．知性 ５．物心ともに与えようという優しさ ６．ビジョン ７．リーダーシップ ８．起業家精神 ９．思考の独立性", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "私達マーケターの仕事は、彼ら天才が努力すべき焦点を明確にすることであり、彼らの才能と努力がビジネスの結果によって報われるように導くことです。", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 3, "label": "価値観", "freq": 74, "highlights": [{"text": "すでに 21 世紀初頭の音楽がダウンロードになって、ライブやフェスの価値があがったように、人として「生」の価値は高まるだろう。さらには、新しい死生観を伴った宗教や哲学も 流行ると思われる。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "もともとイギリスの資産家は質素にふるまう傾向があったが、リーマンショック以降、さらにその傾向が強くなったのは間違いない。マネーゲームに熱中していた人たちが落ちぶれていく姿を見て、物質的な豊かさは 儚いものだと悟ったのだろう。 　今後景気が回復してもバブル時代のような成金志向は、本当に成熟した国家では絶対に起こらない。質素なラグジュアリーが、これからのスタンダードになるだろうし、そこを目指す人やメディアも増えるだろう。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "けれども僕らは、目標が役に立つことは理解している。ただ、その効果に関心がないだけだ。僕らは取りこぼしたお金があっても気にしないし、レモンを最後の一滴まで絞りだす必要も感じていない。いずれにしろ、最後の数滴はたいてい苦みが混じる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "「ベースキャンプ」は世界を変えたりしない。ただ、企業やチームでのコミュニケーションや共同作業が簡単にできるようにするだけだ。これはとても価値があることだし、すばらしいビジネスが生まれる。とはいえ、世界の歴史を書きかえられるわけじゃない。けど、それでいい。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "会社は多くのものを守っているけれど、たいていは、いちばん価値があっていちばん大切なものを守れていない。それは 従業員の時間と集中力だ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "お金さえ出せば泊まれますよ。でも、身分相応でないといけない。自分が考える身分相応というものがあるから、今の自分にはまだ、真ん中あたりの部屋が合っていると思います。それに「長生きして、売上げが３兆円になったら、もう１ランク上の部屋に泊まろう」という楽しみができるでしょう？　楽しみがなくなったら、「今からどこへ行くんだ？」となってしまいますよ。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "この意味で「好き嫌いの復権」が本書のメッセージですね。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "「私、わかったんです。じいちゃん、ばあちゃんが、ずっと私に言ってくれたことを」 　都会生活をしながら思い出したことばが、 「ちいちゃいころから、「そのまんまでいいんだよ」「かっこつけなくていいんだよ」って、言ってたのを聞いていた」 　それを思い出して、この地域に戻ってきた。そして今、とても生きやすいという。都会へのあこがれはかっこつけだったと結論付けた。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "「生き方の正解や成功の条件、つまり万人に通ずる物差しが存在すると思われていたころは、自分を使い切る対象の価値が問われていました。こういうことを頑張っているんだね、世のため人のために偉いね、", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "この話は、私に２つの教訓を与えてくれた。ひとつは、自分にとって家族がどれほど大切かということ。そしてもうひとつは、人生の残り時間が本当にわずかしかないということだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "通常の価値観なら、問題のあるビジョンは極力排除したうえで、誰からも否定されないただ１つの強いビジョンを作りたくなるかもしれません。しかし、それでは既知の良さにしかつながらないのです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "「我慢」できない人を煽って転がすテクニックに、「我慢なんて無駄だ」「やりたいことを仕事にすれば我慢しなくていい」という文言が、週刊誌やネットで躍ることは多くあります。その人の「好き」を仕事にするのがベスト、と言われる嗜好至上主義者です。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "そういう虚構の世界の住人が虚しいと思うか、それとも新しい文化的アプローチのあけぼのだと思うかどうかはその人の価値観です。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "それこそ、宮台真司さんが著書『終わりなき日常を生きろ』で喝破したように、理想も幻想も失われてそれぞれの人生を物語として紡いでいく時代となった割に、人間として生きるための確たる規範を求めがちで、しかしそれが示されずに漂流する現代日本人、みたいなものが常態化しているのかもしれません。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "単に自分の人生をより輝かせ、もっと幸せに、そして末永く良いものにしていくためにどうするのか、という生きていくための哲学の部分がドーンと欠けていると思うんです。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "決定的な点は、理念の内容ではなく、理念をいかに深く「信じて」いるか、そして、会社の一挙一動に、いかに一貫して理念が実践され、息づき、現れているかだ。ビジョナリー・カンパニーは、「何を価値観とするべきか」と問いを立てることはない。「われわれが 実際に、何よりも大切にしているものは何なのか」という問いを立てる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "一九三五年、ロバート・Ｗ・ジョンソン・ジュニアは、「洗練された自己利益」と呼ぶ理念で、これと同じ考え方を示した。「 顧客 への奉仕が第一であり…… 従業員 と 経営陣 への奉仕がその次で……株主への奉仕は最後である」（傍点は原文による）。そののち、一九四三年に地域社会への奉仕をリストに加え（それも株主への奉仕より上だった）、Ｊ＆Ｊの理念を文書にした。それが「我が信条」である。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "フィリップ・モリス ・選択の自由という権利（喫煙し、自分がほしいものを買う権利）は守るに値する。 ・勝利─トップ企業になり、他社を打ち破る。 ・自主性の発揮を奨励する。 ・性別、人種、階級に関係なく、能力に応じて機会を与える。 ・猛烈に働き、不断の自己改善を進める。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "・ジョンソン＆ジョンソンやウォルマートは 顧客 を理念の柱にしたが、ソニーやフォードはそうしなかった。 　・ＨＰやマリオットは 従業員 への配慮を理念の柱にしたが、ノードストロームやディズニーはそうしなかった。 　・フォードやディズニーは 製品やサービス を基本理念の柱にしたが、ＩＢＭやシティコープはそうしなかった。 　・ソニーやボーイングは大胆な 冒険 を理念の柱にしたが、ＨＰやノードストロームはそうしなかった。 　・モトローラや３Ｍは 革新 を理念の柱にしたが、Ｐ＆Ｇやアメリカン・エキスプレスはそうしなかった。 　　一言でいえば、ビジョナリー・カンパニーの理念に不可欠な要素は ない。わたしたちの調査結果によれば、理念が 本物 であり、企業がどこまで理念を貫き通しているかの方が、理念の 内容 よりも重要である。 　つまり、フィリップ・モリスの理念を好ましいと感じたり同意するかどうかは、フィリップ・モリスの社員でないかぎり、重要ではない。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "第一に、社会心理学の研究によると、人々はある考え方を公言するようになると、 それまではそうした考えを持っていなくても、その考え方に従って行動する傾向が際立って強くなる。つまり、基本理念を公言すること自体で、その理念に従って一貫した行動をとる傾向が強まることになる。ビジョナリー・カンパニーは、比較対象企業に比べて、基本理念を公言する傾向がはるかに強い。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "しかし、ビジョナリー・カンパニーにとって、理念を守り、理念に従うことがいつも容易であったわけではない。ＧＥのジャック・ウェルチは、現実主義と理想主義、本人の言葉を借りれば「数字と価値観」の緊張関係を処理することの難しさをこう語っている。 　　数字と価値観。決定的な答えは、少なくともわたしにはわからない。数字をあげて、われわれの価値観を共有する者は昇進する。数字をあげられないが、われわれの価値観を共有する者には、もう一度チャンスが与えられる。価値観を共有せず、数字もあげられない者がどうなるかは、容易に想像…", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "しかし、ビジョナリー・カンパニーにとって、理念を守り、理念に従うことがいつも容易であったわけではない。ＧＥのジャック・ウェルチは、現実主義と理想主義、本人の言葉を借りれば「数字と価値観」の緊張関係を処理することの難しさをこう語っている。 　　数字と価値観。決定的な答えは、少なくともわたしにはわからない。数字をあげて、われわれの価値観を共有する者は昇進する。数字をあげられないが、われわれの価値観を共有する者には、もう一度チャンスが与えられる。価値観を共有せず、数字もあげられない者がどうなるかは、容易に想像...", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "ビジョナリー・カンパニーが掲げる基本的価値観はごくわずかで、たいていは三つから六つである。基本的価値観が六つ以上あるビジョナリー・カンパニーはひとつもなく、ほとんどが五つ以下だった。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "会社の価値観を掲げているか、掲げようとしているなら、こう自問するよう勧めたい。「これらの価値観のうち、外部の環境が変わっても、たとえ、これらの価値観が利益に結びつかなくなり、逆に、それによって不利益を被るようになったとしても、百年間にわたって守り続けていくべきものはどれか。逆に、これらの価値観を掲げていては不利になる環境になった場合に、変更でき、捨て去れるものはどれか」。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "ちなみに高尚とされる寄付項目には国ごとに違いがあり、日本人が好きな分野は教育ですが、欧州ではイルカや鯨などの「ほ乳類」や「環境」、アメリカでは「人権」や「アート」も競争力が高いキーワードです。寄付を集める際には、こういったことを理解しているかどうかで、結果が大きく左右されるのです。 また寄付をする人と、それを受けとる人の間に適度な距離があることも重要です。日本で大人に寄付をすると、寄付を受けた人が「ビールを飲んでいた！」「タバコを吸っていた！」とか、ひどいときには「楽しそうに笑っていた！」とまで、騒がれます。「かわいそうだと思ったから寄付をしたのに、あたしより楽しそうだ！」となれば、被援助者は一気に競争優位性を失ってしまうのです。 ところが海外の子供たちへの寄付であれば、寄付したお金がどう使われているか、日本からはよく見えません。海外の子供たちへの寄付だって、一部が関係者のタバコ代に消えたり、物資の横流しがあったりもするはずです。しかしそれらが、日本から見えることはほとんどありません。これが寄付を獲得するうえで、極めて有利に働くのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "こういったセレクトショップを訪れる客は、お店の選球眼や、商品の選択センスを気に入っています。「この店のバイヤーが選んだものなら、私が気に入る商品が見つかるはずだ」と考えているのです。 ここでも、店側が売っているのは商品ではありません。売られているのは、「商品選択のセンスと、そのセンスに合った商品を揃える手間」です。セレクトショップの顧客は「自分の価値観に合ったものを選んでもらうという価値」に、お金を払っているのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "これから親が子供に伝えるべきことは、特定の資格や専門性を勧めることでも、ましてや特定の企業を目指させることでもありません。そんなことより、変化は恐れるものではなく、楽しむものなのだと身をもって教えてあげましょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "このような生物学的基礎をもつ「ヒトの心」が、人文社会科学が対象とするような「人の社会」の成り立ちとどう関わるのかを論考します。 　人のもつ価値や倫理といった、人文社会科学が数千年にわたって積み重ねてきた人間本性に関わるさまざまな知恵(wisdom) は、自然科学の知識(knowledge)、つまり、脳科学や進化生物学、霊長類学、行動科学などが明らかにしてきた経験的な事実とどう関わるのでしょうか。具体的には、利他性、共感性、正義やモラルといったテーマを中心に、本書では、人文知と自然知が隔絶した互いに無縁のものではなく、豊かな関わり合いをもち得る可能性を、思考実験を適宜交えながら、探ろうとします。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "オーセンティック・リーダーシップは、倫理観を重視し、自分はどういう人間か、自分が大事にする価値観は何かなど、自分の考えに根ざしたリーダーシップを指します。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "人を説得する原則❿　 人の美しい心情に呼びかける。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "て、「１つの正しい人間観」を探そうとするより、異なる人生を歩んできた多くの人による多様な人間観に触れた方が有益だろう と、私はそう思います。", "book_title": "人間らしさとは何か　生きる意味をさぐる人類学講義 (河出新書)", "author": "海部陽介"}, {"text": "そう考えてみればレンタルとは、顧客の〝所有〟という概念を拡大してあげるサービスなのだとわかる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "商品がただ必要性に立脚しただけの〝モノ〟であることをやめ、持つ人のライフスタイルや価値観を表す〝ファッション〟へと転化していった、その大きな曲がり角が 80 年前後だったわけだ。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "逆にお金を使うためには、人は自分を視る必要があるのだ。自分自身にとって大切なものは何なのかを見極め、それを手にするために人は出費する。 　さらにいえば、そんなふうに人が自分自身を視るための場所として、〝リゾート〟というものはあるのだ。広い海が見渡せる場所で、あるいは深い森に包まれる場所で、人は自分と向き合う時間を与えられる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "西洋では古代ギリシャや古代ローマのように、同性愛がむしろ賛美された時代さえあった。ところが、まずユダヤ教が、そしてユダヤ教から派生したキリスト教とイスラム教が同性愛を厳しく取り締まるようになった。そうして差別や偏見だけでなく、投獄や処刑までも行なわれるようになっていった。ただし貴族のような特権階級では大目に見られていたという。 　西洋以外では、いずれの地域でも元来同性愛というものに（男女いずれの同性愛についても）、差別も偏見もないに等しかった。 　それどころかアフリカや太平洋の島々では同性愛行動が男の通過儀礼の一つにさえなる場合があり、ネイティヴ・アメリカンの部族の中には異性の服装や髪型をする男装者、女装者が第三、第四の性に属するとみなされたりしていた。アフリカの一夫多妻の社会では、一人の男の妻たちの間で同性愛行動がごく普通に行なわれていた。", "book_title": "同性愛の謎　なぜクラスに一人いるのか (文春新書)", "author": "竹内 久美子"}, {"text": "この価値観があるために、「賢い人は金融で〈効率的に〉儲ける。苦労するのは馬鹿のすること」という発想になる。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "著名なヘッジファンドが何十兆円も儲けた挙げ句に慈善活動をやるのを 褒め 称えるようなメディアはアメリカにもたくさんあるが、ちゃんちゃらおかしい。こんなものを日本は真似るべきではないのだ。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "昔は街の大人たちが、教師を尊敬していた。 　無学な大人たちにとっては、大学出というだけで尊敬に値したのだ。 　自分の家の子どもが先生に頭をひっぱたかれれば、親は学校にごめんなさいと謝りに行ったものだ。悪いのは自分の子どもに決まっている。たいていの親がそう思っていた。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "ヤマが提唱した「歴史の終わり」、すなわち民主主義と自由経済こそが歴史の最終形態であるという「普遍的価値」を共有する陣営と、それを拒否する陣営による「冷たい戦争」ですね。", "book_title": "新・地政学　「第三次世界大戦」を読み解く (中公新書ラクレ)", "author": "山内昌之、佐藤優"}, {"text": "大正十五年七月二十八日、星野温泉若主人の為に草す 成功の秘訣　六十六翁　内村鑑三 一、自己に頼るべし、他人に頼るべからず。 一、本を固うすべし、然らば事業は自づから発展すべし。 一、急ぐべからず、自働車の如きも成るべく徐行すべし。 一、成功本位の米国主義に倣ふべからず。誠実本位の日本主義に則るべし。 一、濫費は罪悪なりと知るべし。 一、能く天の命に聴いて行ふべし。自から己が運命を作らんと欲すべからず。 一、雇人は兄弟と思ふべし。客人は家族として扱ふべし。 一、誠実に由りて得たる信用は最大の財産なりと知るべし。 一、清潔、整頓、堅実を主とすべし。 一、人もし全世界を得るとも其霊魂を失はば何の益あらんや。 　　人生の目的は金銭を得るに非ず。品性を完成するにあり。 　　以上", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "成功本位の米国主義に倣ふべからず。誠実本位の日本主義に則るべし。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "雇人は兄弟と思ふべし。客人は家族として扱ふべし。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "一、人もし全世界を得るとも其霊魂を失はば何の益あらんや。 　　人生の目的は金銭を得るに非ず。品性を完成するにあり。 　　以上", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "「成功の秘訣」には、「人もし全世界を得るとも其霊魂を失はば何の益あらんや。人生の目的は金銭を得るに非ず。品性を完成するにあり」という言葉がある。 　経営者にとって、事業を伸ばし、収益力を高めるのは、もちろん大切な役割である。だが、経営者が一番大切にしなければいけないのは、お金でない。それは品性である──。星野社長は内村の考えに強く共感した。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "リッツ・カールトンはモットーとして、次の言葉を掲げています。 「紳士淑女をおもてなしする私たちも紳士淑女です」", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "には「人間らしさの上に立った、合理的思想」を", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "また、常に僕は「お金のために働くこと」は、考えていません。そして、株なども買ったことは一度もなく、こうやって客観的に考えると、目的は時代によって違えど、自分が面白いと思ったことをずっとやり続けているだけなんだと思います。たとえ、今それが収入の低下につながっても、常に面白い仕事を選択します。そうすると、その過程にある「面倒なこと」も、それほど面倒ではなくなります。もし、お金のために働いていたら、面倒なことは、本当に面倒でしょう。また、人から賞賛されたいとは、全くとは言いませんが、ほとんど考えていません。時代も僕も変わって行きますが、その時の自分が面白いと思ったことを、今も昔もこれからもやり続けているだけなのです。ですので、あらためて考えると「自分にとって面白いこと」→「自由な時間」→「収入」や「他者からの評価」が優先順位になります。それは紆余曲折あって、この年齢になってわかったことも多くあるんだと思います。だから今、迷ったりすることは、悪いことではありませんよ。", "book_title": "白本", "author": "高城剛"}, {"text": "僕が日本を素晴らしい国だと思う点は、４つほどあります。 　ひとつめは、日本人の勤勉さ、細かさです。 　ふたつめは、日本の山河溢れる大自然です。 　みっつめは、その自然を敬い共生する気持ちです。 　よっつめは、このみっつによって生み出されたテクノロジーの数々です。僕は、これらを大切にして日々を生きています。", "book_title": "白本", "author": "高城剛"}, {"text": "私はその理由のひとつには、日本が、「ヘタウマ」という文化を持つ 稀有 な国であることが関係しているように考えています。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "時間は、学ぶべき価値のある知識を吸収し、すぐれた信念を養い、よい習慣をしっかり身につけるために使われるべきである。実りのない生活を続けて時間を浪費するなど断じて許されない。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "世間には、財を貯めこむことだけを生きがいにして、金もうけに奔走する人間もいる。確かに、身も心も金もうけに捧げつくせば、十中八九金持ちにはなれるだろう。頭を使う必要などほとんどない。稼ぎより支出を少なくしてケチケチ蓄えていけば、やがて黄金の山も築けるというわけだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "だいたいにおいて、金の力は過大評価されている。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "まず一つ目は、ボランティア活動と同様に、お金儲けを度外視している点です。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "一番の問題は、教育の目的を誰も胸を張って言えなくなったことでしょうか。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "ストーリーを見ているつもりが、いつの間にかライフスタイル、価値観を刷り込まれている。フランスがよく主張する「ハリウッド映画は、文化侵略である」というのは、こういう意味です。独裁者たちが必ず映画好きなのも、同じ理由です。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "死刑が極刑であるためには、ひとつの前提が必要だ。「人間がいちばん恐れるのは死であって、死は人生における最悪の出来事だ」という前提が。世の中の人がみんなそう思っていて、はじめて死刑が極刑として成立する。 　現代では、その前提が崩れてしまっている。生きることに価値があるんだかないんだか、よくわからないという人間がやたらと増えた気がする。 　自殺者がこれだけ増えているのも、不況のせいだけではない。一緒に心中してくれる相手だの、自分を殺してくれる人間だのをインターネットで募集するような時代に、死刑が極刑だと考えるのは幻想でしかないのだ。", "book_title": "超思考", "author": "北野武"}, {"text": "芸の世界に限らず、あらゆるモノが薄っぺらな偽物に置き換えられ、しかもありがたがられている。本物であればあるほど生き難いのが今の世なのだ。", "book_title": "超思考", "author": "北野武"}, {"text": "私の「ハピネス」についての哲学は、どこから来たのか、ということです。 話は簡単です。最終的に「幸せになること」が目的で仕事をしているのなら、もっと「幸せそのもの」に焦点をあてるべきだということに気づいたのです。だからザッポスは社員、顧客、取引先、そして世界に幸せを届ける会社でありたいのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "そこで、これまでの人生で最高に幸せを感じた時のリストを作ってみてわかったのは、幸せを感じたどの時も、お金を伴ってはいなかったということでした。わかったのは、何かを作っているとか、クリエイティブで独創的でいると私は幸せだったということでした。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "そして考えたのが、私たちはみな、自分の属する社会と文化によって、どれほどあっけなく、自分で考えることをやめ、結局のところ幸せとは人生を楽しむことであるのにもかかわらず、既定のこととしてお金がたくさんあることイコールより多くの成功と幸せだと思い込むように洗脳されているのか、ということでした。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "私たちはザッポスの文化を一〇のコア・バリューとして正式に定めました。 サービスを通して「ワオ！」という驚きの体験を届ける 変化を受け入れ、変化を推進する 楽しさとちょっと変なものを創造する 冒険好きで、創造的で、オープ
