bel": "適応性", "freq": 6, "highlights": [{"text": "でも、思い返すと「好き」というのは実はかなりコントロールされるものだと思うんですよ。というのも、したくない仕事というのは誰にでも降ってくるものですが、やってみたら意外と楽しかった、面白い部分を発見した、まずは取り組んでみたら感謝されてやりがいを感じた、ってことは往々にしてあると思うのです。最初は好きでもなければ興味もない仕事や職場に居場所を見つけて、自分が集中できる環境ができ、頑張っているうちに血路が開けたり、未来に展望が見えたりということもあるかもしれません。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "私たちはニーズを見出し、それにデザインで応えるのが難しい理由を自問する時期に来ているといえるだろう。人間の抱える基本的な問題とは、人間は不便な状況に適応するのに長けているということ", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "仮説は「空白地帯」を 狙って立てる。 　 そして仮説は、時代や状況の変化に応じて 柔軟 に修正していく。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "そもそも仏教は、キリスト教やイスラム教のような一神教ではなく、世界的に広がっている宗教のなかではもっとも柔軟性に富む宗教といえる。インド仏教、中国仏教、日本仏教という具合に、それぞれの国、地域で独自の発展、あるいは変貌を遂げても、それでよし、なのだ。 　多少、もとの形とは変わっても、仏の教えが広まるのであれば、それを許容するという懐の深さが仏教の側にもあったのだ。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "仏教は、日本伝来直後こそ、日本固有の宗教だった神道と反目し、朝廷内の勢力争いともからんだ宗教的抗争に発展したが、朝廷が仏教を国教として認めると、日本人全般に受け入れられるようになった。 　ただし、その仏教は、オリジナルな形がそのまま信仰されたわけではなく、日本風に大胆にアレンジされ、独自の日本仏教として発展してきた。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "言い換えれば、いまは、特殊な経験や知識よりも、 顧客の要望に応じていかに適切に検索するか、その能力こそがビジネスにおいて重要になっているということです。だからこそ、たえず新しい検索ワードを手に入れる必要がある。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}]}, {"id": 217, "label": "自己受容", "freq": 6, "highlights": [{"text": "世の中には、何かを達成するモチベーションとして「何かが足りておらず、絶望する」というコンプレックスから入る人が少なくありません。これを見ていると結局は「なりたい自分」はあるけど「そうでない自分」を受け入れていく、その過程そのものが人生、ということなのかなあと感じるのです。そして、歳を取っていくごとに、年相応に老けていき、開き直りとか諦めとか受け入れることへのハードルが下がり、やがて何かを成し遂げるパワーすら生まれなくなって、昨日何を食べたのかすら思い出すことのできない平凡な日常の中に人生が埋没していく。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "その背景には、自分の持つイメージどおりに他人が自分を見てくれないことに対する大きな不安があるからなんです。それは自我の力、全体を統制する力が弱っているから不安になるんですね。そうではなくて、存在の力が強ければ「そんなことはどうでもいいや」と思えるし、不安を持つこともないんです", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "そうすると、いかに自分の本質が愚かであるかということをしっかりと受け止める状態ができてきます。自分が愚かであるということを本当に知っている人は存在感がだいたい強いですね。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "排泄という行為がコントロール下にないことを受け入れることができるなら、少々は長く生きられるかもしれないわけです。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "ぼくが人間は成長しようとするのは妄想だと言ったり、進化しようとしたりするのは妄想だと言ったりするのは、大半の人は現状の自分すらも認めることができないということだからなんです。現状の自分をしっかり認めることができない状態にもかかわらず、現状の自分を手放すこともできない。そんな状態でどうして人が成長するんですか。それでは人は成長なんかしませんよ、それらを捨てないと。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "人を説得する原則❸　 自分の誤りを直ちに快く認める。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}]}, {"id": 218, "label": "持続可能性", "freq": 6, "highlights": [{"text": "日本発の世界的ベンチャーが登場しないと嘆く前に、もうちょっと真剣に長い年月経営するとはどういうことかを考えていくべきなんじゃないかと思います。世界に冠たるトヨタ自動車だって、自動織機から苦労して業態転換を果たしましたし、任天堂もそこまで高くない給料でも社員のイノベーションや創意工夫の意欲を最大限に引き出してあれだけの作品を作り勝負を続けています。さて、浮き沈みの激しいＩＣＴ業界で、それこそ１００年続く組織がどれだけ出てくるものなのでしょうか。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "僕らの会社では、働きすぎをふせぐためにユニークなしくみを用意している。 　たとえば５月から 10 月にかけては、週の休みを１日多くする。気候のいい時期に、なるべく外にでて息抜きをしてほしいからだ。また社員の趣味活動を支援しているし、クリスマス休暇にはさまざまな企画旅行をプレゼントしている。 　働かないチームはいらないが、仕事ひとすじのチームも困りものだ。うまく息抜きできる人のほうが、長く安定して成果をだしやすい。 　働きすぎず、休みすぎず。週 40 時間くらいが、ちょうどいい目安になるだろう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "しかも、スピルリナは、きわめて生産性が高い。牛肉の場合、一キログラムのたんぱく質を得るのに、一〇五トンの水と一九〇平方メートルの土地が必要で、大豆の場合は同じく九トンの水と、一六平方メートルの土地が必要だが、スピルリナから一キログラムのたんぱく質を得るには、二・一トンの水と、〇・六平方メートルの土地があればいいのである。しかも、悪条件でも生育が可能である。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "とかく他国の援助は、村の組織を育てるという意識がないので、「金の切れ目がすべての終わり」ということにもなりかねない。その点、一回かぎり立ち上げ資金を支援するだけで、あとはザンビアの農民が持続的にプロジェクトを続けていくのが、ＰａＶｉＤＩＡの特徴であり、この日本の取り組みにザンビア政府の最高首脳の評価も高く、さらに北欧やＥＵなどの援助関係者から注目が集まりはじめているという。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "当時唯一のエネルギー源だった森林資源が薪を得るための乱伐で枯渇し始めたのです。高度成長に伴う乱伐によって森林が消え、乾いた土地になってしまいました。このため公共事業も農機材の生産も、船や建物の建造も一挙に衰退します。ローマ帝国の没落の原因は、こんなところにもあったと言われています。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "難しいことです。しかし、私たちがもし努力しなければ、ビジネスは立ち行かなくなるでしょう。ライバルに圧倒されずにいられる唯一の理由は、私たちが取り組んでいることが難しいことであり、私たちは誰よりもそれをうまく行っているからなのです。もしもあまりにも簡単なことであれば、私たちを押し流す大きな競争の波を招くことになるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 219, "label": "内省", "freq": 6, "highlights": [{"text": "「自分という人間について考える最良の方法は、どんな精神的、道義的考え方をしたときに、いちばんいきいきと生きていることを実感できるかを探ることだと思う。人はそうした瞬間、心の中の声が聞こえる──これこそが本当の自分だ、と」", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "逆にお金を使うためには、人は自分を視る必要があるのだ。自分自身にとって大切なものは何なのかを見極め、それを手にするために人は出費する。 　さらにいえば、そんなふうに人が自分自身を視るための場所として、〝リゾート〟というものはあるのだ。広い海が見渡せる場所で、あるいは深い森に包まれる場所で、人は自分と向き合う時間を与えられる。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "第一は、その国の同時代の人と同じく、保守的な朱子学のなかで育てられた時期です。朱子学により、藤樹は、なによりも自己自身の内部への不断の探求を求められました。この神経の細い若者が、自分自身の内部の欠点と弱点とを、たえず反省した結果、神経過敏をつのらせてしまったことは容易にわかります。過度な自己探求の結果は、初期の生涯と著述とに明瞭に反映しています。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "もっとも、独りでいても孤独を感じるとはかぎらない。精神科医アンソニー・ストーは著書『孤独』で、ときおり独りになる喜びについて論じ、それを勧めてさえいる。博物学者が熱帯雨林で調査を行なう、ピアニストが何時間にもわたって練習を続ける、あるいは自転車選手が山道でトレーニングをするといった場合を思い浮かべてみるといい。祈りや瞑想、学問の研究や著述をするにも、長時間、独りになる必要がある。これは多くの芸術的・科学的探究についても言える。家庭を持って時間に追われている現代人の大きな不満の一つは、「自分のための時間がない」ということだ。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "一番簡単なのが、「自分にとって一番楽しいことはなにか？」を考えてみることです。それを欲望と一緒にしてはいけません。まずは、欲望を除いて考え、それをもっと考えたり、追求したり、実践したりしていると、きっと次の壁にぶつかります。そこで、「自分にとって、これはすべきことなのか？」のような使命というか、「自分とはなんなのか？」を考えるようになると思います。答えは見つからないかもしれません。それで、いいのです。自分としっかり話して、自分の奥の奥の奥と対面することが大事なのです。他人にどう見られていようと。", "book_title": "白本", "author": "高城剛"}, {"text": "前職の限界とは、業界、人間関係、日本式システムなど、どれかは存じませんが、その問題点をちゃんと自分なりに解決しないと、また同じことを感じると思います。ですので、まず、その問題と向き合うことが、「はじめること」の前に大事だと思います。", "book_title": "白本", "author": "高城剛"}]}, {"id": 220, "label": "発想転換", "freq": 6, "highlights": [{"text": "起業家になって、会社を設立し、ビジョナリー・カンパニーを築きたいと強く願っているが、「すばらしいアイデア」がないため、一歩を踏み出せない読者には、すばらしいアイデアの神話という重荷を肩から下ろすよう勧めたい。わたしたちの調査の結果を見ると、むしろ、すばらしいアイデアを見つけてから会社をはじめることにこだわら ない ほうがよいかもしれない。なぜなのか。すばらしいアイデアにこだわっていると、企業が究極の作品だとは考えられなくなってしまうからだ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "こうしてわたしたちは、 会社を製品の手段として見るのではなく、 製品を会社の手段として見るように、 発想を転換する ことになった。そして、時を告げることと、時計をつくることには決定的な違いがあるという見方をとるようになった。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "会社を究極の作品と見るのは、きわめて大きな発想の転換である。会社を築き、経営しているのであれば、この発想の転換によって、時間の使い方が大きく変わる。製品ラインや市場戦略について考える時間を減らし、組織の設計について考える時間を増やすべきなのだ。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "企業が新しいジャンプアップを図るときに大切なのは、飛躍した発想をしないことだ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "「わずらわしさ」を逆転、「サービス」に変えたコトバがあります。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "民主主義も貨幣経済も、人間とか利益、富といったものを一律に定量的にとらえて考えようという、とてつもなく大胆な発想から生まれました。キリスト教時代では、とても受け入れられそうにない「罪深い」アイデアです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 221, "label": "企業価値", "freq": 6, "highlights": [{"text": "こうしてわたしたちは、 会社を製品の手段として見るのではなく、 製品を会社の手段として見るように、 発想を転換する ことになった。そして、時を告げることと、時計をつくることには決定的な違いがあるという見方をとるようになった。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "しかし、究極の作品は会社であり、あるアイデアを実現することでも、市場の機会をとらえることでもないと見ているのなら、善し悪しは別にして、ひとつのアイデアにこだわることなく、長く続くすばらしい組織をつくりあげることを目指して、ねばり抜くことができる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "ピクサーは、最先端の技術とオリジナルのストーリーテリングを柱に持つ前代未聞の映画スタジオだ、とスティーブは言った。そして『トイ・ストーリー』公開の一週間後に株式を公開した。このタイミングでピクサーの本気を疑う人は誰もいなかった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "もの言う株主であるアクティビストファンドは、上場会社に対して「現金や余剰資産を持ちすぎている経営は非効率だ。現金を配当にまわすか、自社株買いをしろ」と迫り、こうした経営の効率化はグローバルスタンダードであると主張しました。 　しかしながら、この主張には論理的に破綻している部分があり、一つ目は会社の持つ現金価値は市場の効率性を前提にすれば既に株価に反映されており（モジリアーニ・ミラー理論）、株主が現金を欲しいのであれば、ただ株式を市場で売却すれば良いことになります。モジリアーニ・ミラー理論は完全な市場においては、配当政策は企業価値と無関係であるというものです。二つ目は株主と会社の考える時間軸に乖離があるということです。会社自体が長期的な存続を前提として従業員や取引先といったステークホルダーとの関係を続けることによって価値を創出しているのであれば、長期的には必ずリーマンショックのような経済危機によって現金が調達できなくなることに備えるべきなので、短期的な効率性によって現金を吐き出せと主張するアクティビストファンドの主張に耳を傾ける必要はなくなります。事実、リーマンショックの際には多くの米国の企業が現金の調達ができないという市場の流動性の枯渇に直面しました。短期的な株式保有を行なう投資家は市場への流動性供給においては必要な存在ですが、その主張は論理的に分析する必要があります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "「会社は株主のものだ」などと嘯くアクティビストが日本企業の株式を買った場合、日本人だけが株主だった時代に何十年にもわたって貯めた内部留保を吐き出させられて、ただ盗まれるだけになりかねない。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "たとえばＴＣＩというイギリスの会社が、Ｊパワー（電源開発株式会社）の大株主になって、「自己資本比率が高すぎるのは、ＲＯＥを下げるだけだから、有効にお金をまわすために内部留保を配当金として吐き出してほしい」と主張したが、これは典型的である。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}]}, {"id": 222, "label": "直感", "freq": 6, "highlights": [{"text": "数学においては、年齢とともに積み重なる経験などよりも、若者がもつ直感や大胆さの方が重要であるらしい。", "book_title": "フェルマーの最終定理（新潮文庫）", "author": "サイモン・シン、青木薫"}, {"text": "今日は「緊急性」「満足感」「喜び」のどれをメインに置いた1日にするのかを、直感で決めることだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "三谷さんが著書でどんな解決方法を提示しているか。いくつか結婚に当てはめてご紹介しよう。 ・「こだわるもの」「こだわらないもの」を切り分ける。 →なるほど。結婚ではまさにそのとおり当てはまる。あらゆる「普通」を求め続けて、譲れないポイントが多くなって「あれもこれも」で捨てられない、相手の粗探しをしてしまう人は、なかなか決まらない。 ・「決め方」を決める。判断基準を作る。 →自分でルールを作っておくことで、こだわるにしても動きやすくなる。これもいい案。結婚でいうなら、「欠点を許せるかどうかの自分なりの判断基準」なんていうのが当てはまるかもしれない。 ・迷ったら「最初の感覚」を信じる。 →なんだかんだ言っても、最初の直感は当たっていることが多い。ひょっとすると、単にルックスが好みだったのかもしれない。でも、人間 30 代以上になってくると「顔」に人間性が多かれ少なかれ現れるものである。迷ったら、最初に戻るのはアリ。 ・迷ったら、「よりわからない方」へ進む。 →これを結婚や恋愛に適用するのは賛否が分かれそうだが、面白い考え方だと思う。リスクテイクできる方なら、試してみると意外な発見があるかも。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "今もし問題を感じていらっしゃるなら、できる限り物事をフラットに捉えなくては直感は働きません。人と物事を一緒にしてしまうと混乱しますので（ほとんどの問題はここ）、これを分けてフラットに置き換えるのです。誰々が、なにを言ったということの「誰々」と「なにを言った」を分けて考えることから始めるといいでしょう。", "book_title": "白本", "author": "高城剛"}, {"text": "顔のパーツが、真ん中に集中している女性は、人のエネルギーを「吸う」力が強いので、一緒にいる人は下がってしまいます。いわゆるエネルギーヴァンパイアと呼ばれる人々。", "book_title": "黒本", "author": "高城剛"}, {"text": "どうやら、ゲイにはその時代によって異なる「目に見えないなにか」を察知する能力がある、というのが、その調査結果でした。身体的には脳幹の太さが異なるなどとも言われていますが、これはまだ確かではありません。ですが、「別の能力」を持っていることは確かだと僕は思っています。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 223, "label": "価値転換", "freq": 6, "highlights": [{"text": "いまや本屋は、本なんて売っていても儲からない時代なのです。書店は、本ではなく、「本を選んであげること」を商品にしたほうがいい。そう気がつくマーケット感覚があれば、地方の小さな書店も生き残ることができるという好例です（ 図 16）。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "しかしロシア・ウクライナ戦争が勃発すると、ＮＡＴＯの価値は急騰します。冷戦期もＮＡＴＯには加盟していなかったスウェーデンとフィンランドも加盟を乞うようになりました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "しかしロシア・ウクライナ戦争が勃発すると、ＮＡＴＯの価値は急騰します。冷戦期もＮＡＴＯには加盟していなかったスウェーデンと...", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "「わずらわしさ」を逆転、「サービス」に変えたコトバがあります。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "もう一つ、この「反転」と「リバウンド」の例を挙げておきましょう。 　「知識社会」の逆説です。 　「これからどのような社会がやってくるか」 　いま、この質問を問えば、多くの人々が「知識社会」と答えます。 　「では、知識社会とは、どのような社会か」 　この質問を問えば、やはり多くの人々は、「知識が価値を持つ社会」と答えます。 　 しかし、実は、「知識社会」とは、「知識が価値を失っていく社会」です。 　なぜなら、この「知識社会」も、深く見つめれば、螺旋的に発展していくからです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "これからの時代は、「 言葉で表せる知識」そのものは、誰でも手間と時間と費用をかけず、容易に入手することができるようになっていきます。そして、そのため、専門知識や最新知識などの「言葉で表せる知識」は、相対的な価値を失っていくことになります。 　それが、「知識が価値を失っていく社会」という意味です。 　では、「言葉で表せる知識」が価値を失っていくとすれば、何が価値を持つようになるのか。 　「言葉で表せない智恵」です。 　例えば、スキルやセンス、テクニックやノウハウといった、「言葉で表せない智恵」が、これからの知識社会においては、大きな価値を持つようになっていきます。 　これは、まさに、知識社会の螺旋的発展です。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}]}, {"id": 224, "label": "政治哲学", "freq": 6, "highlights": [{"text": "ホッブズは、人間集団の自然な状態を「闘争状態」だと考えました。自然界に存在する資源が有限である以上、自己保存のために各人が勝手に振る舞うことにより、秩序のない競争が生まれてしまう(自然権の自由な行使による万人の万人に対する闘争状態)。そうした無秩序な混乱や戦争状態を避け、平和で安定した社会を実現するためには、「強力な中央集権の仕組み」が必要になる、とホッブズは考えたのです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "つまり、ホッブズは、平和な暮らしをどのように実現するかという問題への解答として、人々がそれぞれ勝手に振る舞うことをやめ(自然権の放棄)、強力な中央集権の仕組みを自ら進んで受け入れること(「社会契約」の締結) が、「人々自身にとってもっとも合理的な選択」であると論じたわけです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "権力は「例外状態」あるいは「緊急事態」というものを巧妙に利用して、民主主義をないがしろにしたり、人々の権利を侵害していくことがある。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "そうなってしまった時、果たして政治など可能でしょうか。これまでに人間が築きあげてきた価値への敬意なくして政治など可能でしょうか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "そこに残るのは、「今」しかない、ペラッペラの単なる人間管理だけではないでしょうか。まさしく、「倫理的そして政治的な諸々の帰結について問うこと」が求められていると言わねばなりません。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "全体主義に抗うのに、非全体主義的な──徹底して民主主義的な──やり方は採用できないのか。あるいは、いまや有効性が低すぎて、全体主義を使わずには全体主義に抗えないのか。今日最先端の政治学や政治哲学においては悲観的な見方が 拡がっている。そうした見方は法学者キャス・サンスティーンや政治学者ジェームズ・フィッシュキンによって代表される。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 225, "label": "国民性", "freq": 6, "highlights": [{"text": "ＬＬ型の遺伝子を持つ人は、最も性格がおおらかで楽天的、逆にＳＳ型の人は不安を感じやすく、うつ病の発症リスクが高いことがわかっています。日本人はネガティブな性格のＳＳ型遺伝子を持つ者の割合が世界で最も高いので、不安が強すぎる傾向があります。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "フィンランドでは、文化的規範の影響で、人は結婚していなくても違和感や疎外感を持たない。イタリアではまったく逆だ。ところが、イタリア文化では、結婚は重要だと見なされているにもかかわらず、いざというときには配偶者が頼りだと考える人の割合は他国に比べて小さい（", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "友情の捉え方も国民性の影響を受ける。ドイツ人とオーストリア人は、友人に数える人の数が最も少ない。イギリス人とイタリア人がそれに続き、友人の数が最も多いのはアメリカ人だという（２）。もっとも、アメリカ人は他文化の人に比べて、友人という概念を大まかに捉えているだけかもしれない。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "日本は、「残りものには福がある」という言葉が「生きた言葉」として残っている、めずらしい国である。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "政治とは、国民の考えや行動の反映にすぎない。どんなに高い理想を掲げても、国民がそれについていけなければ、政治は国民のレベルにまで引き下げられる。逆", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "立派な国民がいれば政治も立派なものになり、国民が無知と腐敗から抜け出せなければ劣悪な政治が幅をきかせる。国家の価値や力は国の制度ではなく、国民の質によって決定されるのである。 　われわれ一人ひとりが勤勉に働き、活力と正直な心を失わない限り、社会は進歩する。反対に、怠惰とエゴイズム、悪徳が国民の間にはびこれば、社会は荒廃する。 　われわれが「社会悪」と呼びならわしているものの大部分は、実はわれわれ自身の堕落した生活から生じる。だから、いくら法律の力を借りてこの社会悪を根絶しようとしても、それはまた別な形をとって現われ、はびこっていくにちがいない。国民一人ひとりの生活の状態や質が抜本的に改善されて初めて、このような社会悪はなくなる。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 226, "label": "社会批評", "freq": 6, "highlights": [{"text": "ですが、 誰にも迷惑をかけない社会 とは、定義上、自分の存在が 誰からも必要とされない社会 です。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "優先席なんて、あの頃は必要なかった。本来、電車の席は、全部が優先席だ。前に年寄りが来たら、子どもは有無をいわずに立つ。そこに理由なんて必要ない。 　ところが、今の道徳では、年寄りに席を譲るのは、「気持ちいいから」なんだそうだ。 　席を譲るのは、気持ちがいいという対価を受け取るためなのか。 　だとしたら、席を譲って気持ち良くないなら、席なんか譲らなくていいという理屈になる。 　年寄りに席を譲るのは、人としてのマナーの問題だ。美意識の問題といってもいい。 　マナーにわざわざ小理屈をつけて、気持ちいいから譲りなさいなんていうのは、大人の 欺瞞 以外の何ものでもない。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "年寄りは昔からずっと年寄りだったわけじゃない。何十年も働いて、税金を納めてきた人たちがいるから今の日本がある。電車に乗れるのだって、スマホでゲームができるのだって、つまり年寄りたちがこれまで働いてくれたおかげなのだ。 　そういう基本的なことを話さないのは、そもそも今の大人たちがそれを忘れてるってことかもしれない。なにしろ年寄りのせいで改革が進まないなんて、馬鹿なことをいう大人が山ほどいる世の中なのだ。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "これは月収 10 万円付近のワーキングプアの人々が、子供を何人も抱えて月に 20 万円以上の生活保護を受給するシングルマザーを叩く構図と同じだし、永崎さんらも小島さんの糾弾側に回る可能性だってある。 　だが、小島さんに足りなかったのは、努力ではない。随分と前のことになるが、年越し派遣村などを率いた湯浅誠さんが「貧困と貧乏は違う」と発言していたことがある。貧乏とは、単に低所得であること。低所得であっても、家族や地域との関係性が良好で、助け合いつつワイワイとやっていれば、決して不幸せではない。一方で貧困とは、低所得は当然のこととして、家族・地域・友人などあらゆる人間関係を失い、もう一歩も踏み出せないほど精神的に困窮している状態。貧乏で幸せな人間はいても、貧困で幸せな人はいない。貧乏と貧困は別ものである。そんな言葉だったと思う。", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "哲学者というのは社会（ポリス） にとってチクリと刺してくる虻のような存在であり、チクリと刺すことによって人々を目覚めさせる役割を担っているというわけです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "ちなみに、一つ目の、終わりなき「〈自己〉の時代」については、『終わりなき日常を生きろ』の中で、「未来の輝きが失われ、薄ボケた自己を抱えて生きる」というモチーフとして詳述しました。二つ目の、終わりなき「様々なる意匠」については、その前年（ 94 年）の『制服少女たちの選択』の中で、「空気に縛られてポジショントーク（↓ 参照） をするだけのオヤジが溢れた、お座敷論壇とウソ社会」というモチーフとして詳述しました。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 227, "label": "人間心理", "freq": 6, "highlights": [{"text": "人を動かす秘訣は、この世に、ただ一つしかない。この事実に気づいている人は、はなはだ少ないように思われる。しかし、人を動かす秘訣は、間違いなく、一つしかないのである。すなわち、自ら動きたくなる気持ちを起こさせること──これが、秘訣だ。 　重ねて言うが、これ以外に秘訣はない。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "アメリカの第一流の哲学者であり教育家でもあるジョン・デューイ教授も、同様のことを、少し言葉を換えて言い表わしている。つまり、人間の持つ最も根強い衝動は、〝重要人物たらんとする欲求〟だというのである。〝重要人物たらんとする欲求〟とは、実に意味深い文句だ。本書では、それについて詳しく考えてみたいと思う。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "リンカーンの書簡に「人間は誰しもお世辞を好む」と書いたのがある。優れた心理学者ウィリアム・ジェイムズは、「人間の持つ性情のうちで最も強いものは、他人に認められることを渇望する気持ちである」と言う。ここでジェイムズが、希望とか要望とか待望とかいう、なまぬるい言葉を使わず、あえて「渇望する」と言っていることに注意されたい。 　これこそ人間の心を絶えず揺さぶっている焼けつくような渇きである。他人のこのような心の渇きを正しく満たしてやれる人はきわめてまれだが、それができる人にしてはじめて他人の心を自己の手中に収めることができるのである。葬儀屋といえども、そういう人が死ねば心から悲しむだろう。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "アメリカの心理学者オーヴァストリート教授の名著『人間の行為を支配する力』に次のような言葉がある。 「人間の行動は、心の中の欲求から生まれる……だから、人を動かす最善の法は、まず、相手の心の中に強い欲求を起こさせることである。商売においても、家庭、学校においても、あるいは政治においても、人を動かそうとする者は、このことをよく覚えておく必要がある。これをやれる人は、万人の支持を得ることに成功し、やれない人は、一人の支持者を得ることにも失敗する」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を動かす原則❸　 強い欲求を起こさせる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "誘惑する、これはいろいろ心理学者が言っておりますが、人間は小さなこと、身辺のささやかなことには非常に敏感でありますが、少し意識感覚を越えた大きな問題になると、おそろしく鈍感になる。大きな問題に敏感だとよいのですが、小さな問題に敏感で、大きな問題に鈍感であるというのは、人間心理の特徴でありまして、世界史の必然的な帰結がこうなのだ、などと言われると、そうかな、と皆動揺する。これは日本でも、朝鮮でも、シナでも、ヨーロッパの歴史を見ましてもそうでありまして、たいてい謀略の大家などという奴はこの手を使う。", "book_title": "［新装版］運命を創る―人間学講話 ［新装版］人間学講話", "author": "安岡正篤"}]}, {"id": 228, "label": "道徳", "freq": 6, "highlights": [{"text": "あなたは「誰ひとりとして悪を欲する人はいない」という言葉をご存じですか？　一般に、 ソクラテスのパラドクス として知られる命題ですが。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "優先席なんて、あの頃は必要なかった。本来、電車の席は、全部が優先席だ。前に年寄りが来たら、子どもは有無をいわずに立つ。そこに理由なんて必要ない。 　ところが、今の道徳では、年寄りに席を譲るのは、「気持ちいいから」なんだそうだ。 　席を譲るのは、気持ちがいいという対価を受け取るためなのか。 　だとしたら、席を譲って気持ち良くないなら、席なんか譲らなくていいという理屈になる。 　年寄りに席を譲るのは、人としてのマナーの問題だ。美意識の問題といってもいい。 　マナーにわざわざ小理屈をつけて、気持ちいいから譲りなさいなんていうのは、大人の 欺瞞 以外の何ものでもない。", "book_title": "新しい道徳　「いいことをすると気持ちがいい」のはなぜか (幻冬舎単行本)", "author": "北野武"}, {"text": "立派な国民がいれば政治も立派なものになり、国民が無知と腐敗から抜け出せなければ劣悪な政治が幅をきかせる。国家の価値や力は国の制度ではなく、国民の質によって決定されるのである。 　われわれ一人ひとりが勤勉に働き、活力と正直な心を失わない限り、社会は進歩する。反対に、怠惰とエゴイズム、悪徳が国民の間にはびこれば、社会は荒廃する。 　われわれが「社会悪」と呼びならわしているものの大部分は、実はわれわれ自身の堕落した生活から生じる。だから、いくら法律の力を借りてこの社会悪を根絶しようとしても、それはまた別な形をとって現われ、はびこっていくにちがいない。国民一人ひとりの生活の状態や質が抜本的に改善されて初めて、このような社会悪はなくなる。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "高潔な人格の妻は気づかぬうちに夫の品性を高めるが、心の貧しい妻は必ず夫を堕落させる――そうトックビルは信じていた。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "ナポレオンの生涯は、われわれに次のことを示唆している。すなわち、善と結びつかない権力は、それがどれほど強力なものでも国家の致命傷となる。また、善と結びつかない知識は、単なる悪魔の化身となり果ててしまうのだということを。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "両親の人格は、行動を通じて子供の人格に反映する。日々示される両親の愛情やルール、勤勉や自制心などは、耳から学んだ知識を忘れ去った後も子供の心に生き、その行動を決定する。 　親の無言のふるまいや無意識のまなざしでさえ、時には子供の性格に一生ぬぐいがたい印象を植えつける。すばらしい両親の生き方を思い出して悪の誘惑を断ち切った人間は多いはずだ。彼らはおそらく、恥知らずな行動に走ったり、いやらしい考えにふけったりすれば、両親の美しい思い出を汚すことになると悟ったにちがいない。 　慈善事業家ファウエル・バクストンは、立身出世を果たしてからも母親宛てに次のような手紙を書き送っている。 「子供のころ、母さんから教えこまれた誠実さや道徳心という美徳を、いまでも決して忘れません。とくに他人のために何かしてあげようとする時、母さん譲りの美徳を強く感じずにはいられないのです」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 229, "label": "孤独感", "freq": 6, "highlights": [{"text": "なにしろ、人間は生まれつき社会的な生き物だ。何から得られる喜びが幸せに最もつながりやすいかと訊かれると、大多数の人が富や名声、さらには身体的な健康よりもなお、愛と親密さと社会的帰属を高く評価する（１）。人間という 種 にとって社会的なつながりがどれほど重要かを考えるとなおさら悩ましいのだが、常時、人口のおよそ二〇パーセント（つまり、アメリカだけでも六〇〇〇万人） が強い孤立感を覚え、それが人生での不幸せの大きな原因となっている（２）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "研究者たちは孤独感のレベルを測定するために、「ＵＣＬＡ孤独感尺度」という心理評価法を使う。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "とはいえ、私たちの誰もが孤独な思いをしたり、そこから脱したりすることを覚えておいてほしい。ときおり孤独に感じるのは、人間である証拠だ。実際、意義ある社会的なつながりへの欲求と、そうしたつながりが欠けているときに私たちが感じる痛みこそが人間ならではの特徴であることを示すために、本書のかなりの部分が費やされている。孤独感が深刻な問題となるのは、それが慢性化し、ネガティブな思考や感覚や行動の執拗な悪循環を生み出した場合に限られる。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "人間に関しては、孤独感そのものの有無でアルツハイマー病の進行が占えることが明らかになっている（ 14）。さらに、私たちの最近の研究によると、孤独感は免疫系細胞のＤＮＡ転写に影響を及ぼす力さえ持つようだ（ 15）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "若年層ではアルコールの摂取は、少なくともつき合い酒を見るかぎり、孤独に感じている人のほうが社会的な満足感を覚えている人ほど問題にならない。ところが中年になると、孤独な人はそうでない人よりもアルコールの摂取量が多く、活発に運動をしない（３）。そして食事には脂肪分が多い。睡眠は孤独でない人と時間は同じでも効率が悪い。つまり、回復力に乏しいわけで、日中の疲れを余計に感じる、と報告している（４）。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "私たちの研究から浮かび上がってきた状況は次のとおりだ。他者から実際的な援助が得られることと幸せとの間に関連はなかったが、孤独感と自己評価のレベルと幸せには関連があった。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}]}, {"id": 230, "label": "価値観変化", "freq": 6, "highlights": [{"text": "あるグループインタビューで、とても示唆深いコメントがあった。アラサー女性の言葉。 「最近は、同性で付き合う人には刺激を、異性には自然体や、やすらぎを求めるようになった。 20 代前半の頃は逆だった」 　これは、言い得ていると思う。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "ところが25年以上も前に、「技術の変化による価値観の変化」を語る２冊の本が出版されていました。 　１冊目の本は、アルビン・トフラーの『第三の波』（1980年）。 　高名な未来学者アルビン・トフラーは、この著作の中で次のように言っています。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "ある時代のパラダイム（社会通念）は、「その時代は何が豊富で、何が貴重な資源であるのか」を見れば明らかになる。 　ということは、それまで豊富だったものが急に不足したり、貴重だったものが急激に豊富になったり、といった変化が起きる時、それに対応して価値観が変化する。その価値観の変化によって社会は変化する。 　これが堺屋の結論でした。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "産業革命と同時に宗教は死にました。 　もちろん、死んだといってもその影響力が完全になくなったわけではありません。それどころか世界の大半では、いまだに最大の価値観の一つなのです。 　しかしあの、人々が無批判に宗教を信じていた時代はもう、永遠に返ってきません。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "（１）社会全体が巨大な変化の時期を迎えている。 （２）そのため、従来の価値観が全体として明らかに破綻しつつある。 （３）変化している価値観を特定するために若者の嗜好を観察すると、価値の中心に「自分の気持ち」を置いていることが分かる。 （４）「自分の気持ち」が第一なのは、既存の価値観では、幸福が追求できないことが明らかだからだ。 （５）彼らや私たちの価値観変化の中心には、私たちを幸せにできない「科学」と「経済」への信頼の喪失があることが分かる。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "産業時代の人々は、もう農業時代には戻れません。それどころか身分制度やキリスト教時代の人たちのことを、理解できなくなってしまっているのです。 「身分制度と無知が支配していた、暗黒の中世」 「『本当の自由』を知らない、かわいそうな貧乏人たち」 　とこのように、前時代を理解できなくなって、過去を差別しちゃうのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 231, "label": "価値論", "freq": 6, "highlights": [{"text": "生存だけが価値として認められるようになってしまうことの問題です。それを説明するためにアガンベンは、「 剝 き出しの生 nuda vita / bare life」という概念を持ち出しています。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "アガンベンは人間が生きるということと、人間がただ生存しているということを区別しているのです。その上で、ただ生存するということを何よりも最優先するのならば、人間が生きていると言えるために必要な何かが蔑ろにされはしないかと指摘しているのです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "教会こそは、単なる生存には還元できない、人間が人間として歴史の中で培ってきた文化の価値の守り手ではなかったのか、というわけです。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "死んだ者たちへの敬意の喪失は、歴史への畏怖の喪失へとつながり、これまでに先人たちが積み上げてきた価値への無関心へとつながるのではないでしょうか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "そうなってしまった時、果たして政治など可能でしょうか。これまでに人間が築きあげてきた価値への敬意なくして政治など可能でしょうか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "二〇世紀を経験した我々は、人間が大義とみなされたもののために死ぬことを強制された事実を知っています。それには何としてでも対抗しなければならない。そんなことがあってはなりません。けれども、だからといって、生存のみを価値として認める社会が当然のこととして受け入れられてしまってよいのか。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}]}, {"id": 232, "label": "ブランド構築", "freq": 6, "highlights": [{"text": "本当に最高のカスタマー・サービスを提供するザッポスのブランドを築くためには、一部門ではなく、全社を挙げてカスタマー・サービスに取り組む必要がありました。自分たちがコール・センターを設けたいと思う場所に、サンフランシスコから本社をまるごと移転する必要があったのです。ちなみに、コール・センター部隊を、その頃、カスタマー・ロイヤルティ・チーム（ＣＬＴ） と呼ぶことにしました。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "社員〝全員〟に、ザッポス・カルチャーが自分にとってどんな意味を持つのか手短に書いてもらおう。そしてそれを本にするんだ」 こんな風にしてザッポス・カルチャー・ブックのアイデアは生まれ、それ以来それはザッポスにとって不可欠なものとなっています。毎年、ザッポス・カルチャー・ブックの改訂版が作られ、私たちはこの本を採用内定者、メーカーなど取引先、そして顧客にも配っています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "ほかの会社のカルチャー・ブックを読みたいと「求めてくる」人がいることに、私はいつも驚きます。（投資家や人事関係者以外で） 会社の年次報告書か従業員の手引きを読みたがっている人がいるという話を聞いたことはありますか。 ザッポスが何を売っているのかさえ知らないのに、カルチャー・ブックの背後にあるアイデアを知りたがる人がいることを考えると信じられません。そのような方が、いつかそのうち、次に新しいジーンズか靴が必要になったらザッポスを思い出してくださるかもしれません（ちなみに、カルチャー・ブックの制作費は一般的に思われているよりもずっと値頃だということは触れておく意味がありますね）。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "一般に、マーケティング部門がマーケティングＲＯＩを計算する際、顧客の生涯価値を一定にして考えます。私たちは、顧客の生涯価値を流動的なものと見なしており、あらゆるやり取りを通して顧客の心の中に私たちのブランドとのよりポジティブな絆を作り出せれば、顧客の生涯価値は向上できると考えています。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "電話経由での売上げは総売上げの五％程度にすぎないのに、ネット企業がそれほど電話を重視することを不思議がる人も多いことでしょう。実際、私たちが受ける電話のほとんどが売上げを生んでいません。しかし、平均的に見て、私たちの顧客は一生にどこかの時点で少なくとも一度は私たちに電話をかけてくることを知っているので、私たちはその機会を使っていつまでも記憶に残る思い出を生み出すように心がける必要があるのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}, {"text": "費用をかけるだけでは自分が望むようなブランドを構築できないとしたら、それでは企業はどうすればいいのでしょうか。 長期的にブランドを構築するための最善の方法とは何でしょうか。 一言で言えば、企業文化です。 ザッポスでは、企業文化がきちんと設定できていれば、素晴らしいカスタマー・サービスも、長期にわたる素晴らしいブランド構築も、情熱的な社員や顧客といったそのほか大部分のことも、自然に始まると考えています。 私たちは、会社の文化と会社のブランドは本質的に一枚のコインの表と裏だと信じているのです。ブランドは初めは文化に後れを取るかもしれませんが、いつかは追いつきます。 企業文化こそがブランドなのです。", "book_title": "顧客が熱狂するネット靴店　ザッポス伝説", "author": "トニー・シェイ、本荘 修二、豊田 早苗"}]}, {"id": 233, "label": "心理", "freq": 5, "highlights": [{"text": "色々なことを深く知るということは、どんなに掘り下げてもわからないものはわからないという、限界を知ることでもあります。限界を知るということは、一面において、とても気持ちを楽にしてくれるものです。 　以前、", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "「論理を語る」とは、 「自分にとっての真実」を中心に語ることなのです。 　これに対して 「心理に語りかける」とは、 「その人にとっての真実」を考えながら語ることなのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "彼女たちは可愛い制服や衣装を着たり、接客やライブをしたりすることで、多かれ少なかれ「人にちやほやされたい」という欲求を持っているのです（", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "このふたつの結果から示唆されるのは、「両親に愛されて育ったからこそ、人に愛される喜びを知っているのが、地下アイドルになった女の子たちの本来の姿」であることです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "「心の中にいくら美徳の絵を描いても、現実に美徳の習慣が身につくわけではない。むしろ心はコチコチに固まり、しだいに不感症となるだろう」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 234, "label": "時代変化", "freq": 5, "highlights": [{"text": "ところが 20 世紀半ばになると、超一流の人ですら、なかなか超一流の仕事ができなくなります。宇宙も極微の世界も、大きな枠組みがある程度できてしまったので、 20 世紀初頭のような、物理学の根幹に関わる新しい発見が少なくなったからです。理論に対する、実験技術の停滞というのもあります。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "商品がただ必要性に立脚しただけの〝モノ〟であることをやめ、持つ人のライフスタイルや価値観を表す〝ファッション〟へと転化していった、その大きな曲がり角が 80 年前後だったわけだ。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "そして〝産業革命〟の意味を、誰でも高品質の商品を作り出すことを可能にしたものととらえるなら、〝情報革命〟とは誰でもが高品質の企画を生産することを可能にするものになるはずだ。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}, {"text": "すなわち、我々の人生の長さに比べ、世の中の変化が速くなった。 　そのため、我々は、世の中の小さな「 局所的変化」だけでなく、世の中の大きな「 螺旋的発展」を目撃するようになったのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "30 代前半の僕は、睡眠時間がとても少ない生活をしていました。それは、寝るのがもったいない、と思っていたことが第一にあったんだと思います。そして、食事もジャンクフードやファミレス中心でした。それは、なにを食べようが関係ない、と思っていたからなんだと思います。ですので、言うまでもなく、夜が中心の生活でした。極端な僕は、２００１年の９１１以降、我に返って突然健康志向になります。夜はたっぷり寝て、食べ物も改善。そして、昼中心の生活になりました。これは、時代背景もあったんだと思います。また数年ほど前に、スペインに引っ越してから学んだことは、昼寝です。とにかく、皆昼から飲んで、昼寝します。たまに、東京に戻って日中の打ち合わせ後に、「このあと昼寝」などと言うと驚かれますが、今では、この昼寝の使い方が、僕の規則正しい生活にインストールされた良いアプリとなっています。", "book_title": "白本", "author": "高城剛"}]}, {"id": 235, "label": "情報処理", "freq": 5, "highlights": [{"text": "私たちは、過去に蓄積した内部モデルを絶えず更新しながら、毎日を過ごしています。その瞬間の事象の蓄積が、宇宙では「時空」と表現されるものです。時空のなかでは時は流れません。古典物理学的には、「過去」も「未来」も幻想にすぎません。「過去」とか「未来」とか「時間は流れる」というのは、人間の記憶のなせるわざで、意識の産物なのです。「瞬間」という事象が凍結され、蓄積されていくのです。宇宙の時空のなかで、個々の人の凍結された瞬間の事象の断面をつなげたものが人生です。 　人生とはなんぞや？　と質問されたら、私たちが脳のなかの内部モデルと呼んでいるものこそが人生の正体ですよ、と私は答えます。 　それだけに、どのような情報、すなわち外界からのインプットを取り入れ──これが事象の認識ということですが──どのような情報を無視するか、という取捨選択の判断はきわめて重要", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "それと同じように、「いい転職先」というキーワードで考えたとき、脳のサーチエンジンは数えきれないほどの検索結果を返してくる。一方、もっと詳細に設定して「自分は何が大好きか？」「自分は何に向いているか？」「どうやって世の中の役に立てるか？」の３つで検索すれば、答えはおのずと絞られてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "「二〇〇三年にヒトのゲノム（全遺伝子情報）解読が終了し、ほかのいくつかの生物でもゲノムの全解読は終わっている。生命の設計図が読まれた以上、その仕組みが一気に見通せてもよいはずなのだが、全体の光景は逆のように見える。ものすごい勢いで蓄積されるＤＮＡの配列情報の大海原を、多様なプログラムを走らせて、かすかな意味もコンピュータで読み取らせようとするのだが、成果はかんばしくない」（『毎日新聞』二〇〇六年九月十七日付）", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "たとえば、私はパソコンが切り拓いた「前期デジタル時代」、そして「ポストコンピュータ」の「後期デジタル時代」の次には、「ネオアナログ革命」がやってくると考えている。 　デジタルはすべてを「０」と「１」の二律に分解する。デジタルカメラの写真が無数のドットで構成されていることに象徴されるように、「対象物」を「対象物そのもの」としては認識せず、無数の細かいブロックに分解して、それをもう一度組み立てなおすような作業を行なっている。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "目や耳から入力された情報は、頭頂葉、側頭葉、後頭葉を介して前頭葉に集められます。前頭葉は、その情報を処理する。入力された情報を、記憶として蓄えられている情報と組み合わせ、思考や行動の組み立てをつくり、運動野を介して体に命令を出す。脳の中の司令塔のような役割を果たしています。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}]}, {"id": 236, "label": "進歩", "freq": 5, "highlights": [{"text": "では、どうやってその権威（常識）を超えればいいか。それが古典（常識）に書かれていないことを発見し、それを事実として受け止めるということです。コロンブスが新大陸を発見したとき、古典（権威）が否定されました。それこそが「進歩」なのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "１つの例ですが、同様のことは、さまざまな局面で考えられるでしょう。繰り返しになりますが、経験＝見える世界だけに縛られ、進歩をこばむ生き方から我々人類が脱却するには、好むと好まざるとにかかわらず、論理・推論・演繹（数学）的思考を身につけることが絶対条件と言ってもいいでしょう。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "ハーバード・ビジネス・レビューの有名な記事『モチベーションとは何か』のなかで、心理学者のフレデリック・ハーズバーグは人の意欲を高める２つの主要因が「達成」と「達成が認められること」であると説いた（ ４）。もっと最近の研究では、テレサ・アマビルとスティーブン・クレイマーが数百人の数千日間にわたる日記を分析したものがある。人の本音が書かれた膨大な記録をもとに、アマビルとクレイマーは「日々のささやかな進歩」こそがやる気を引き出し、高いパフォーマンスを可能にすると結論づけた。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "ハーバード・ビジネス・レビューの有名な記事『モチベーションとは何か』のなかで、心理学者のフレデリック・ハーズバーグは人の意欲を高める２つの主要因が「達成」と「達成が認められること」であると説いた（ ４）。もっと最近の研究では、テレサ・アマビルとスティーブン・クレイマーが数百人の数千日間にわたる日記を分析したものがある。人の本音が書かれた膨大な記録をもとに、アマビルとクレイマーは「日々のささやかな進歩」こそがやる気を引き出し、高いパフォーマンスを可能にすると", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "ビル・ゲイツはこう書いている。「人々の置かれた状況を改善するうえで、測定することがいかに重要かを痛切に感じた。明確な目標を設定し、その目標に向けた進歩を促すような指標を見つければ、すばらしい進歩を達成できる。（中略）当たり前のことに思えるかもしれないが、それがなされていないことが驚くほど多く、またきちんとやるのはとても難しい（ ８）」。進歩を促すのに何が必要かというゲイツの見解は正しく、予測においてもそれが驚くほど欠如している。明確な目標を設定するという簡単な第一ステップでさえ、行なわれていない。", "book_title": "超予測力　不確実な時代の先を読む10カ条 (早川書房)", "author": "フィリップ Ｅ テトロック、ダン ガードナー、土方 奈美"}]}, {"id": 237, "label": "言語", "freq": 5, "highlights": [{"text": "どんな海外の教養も、日本語に置き換えるのが日本人の特性であり、それゆえに思考対象の内容を深いところまで吟味し、考察することができたのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "文明の誕生には共同幻想が形成されることが条件で、それには言語という共通のルールが必要です。その言語が危うくなったら、日本人のアイデンティティとしての共同幻想は壊れてしまう。すなわち文明（人間圏）の構成要素としてのユニットが壊れてしまうわけです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "考えたり、その内容を伝えたりすることがなければ、言葉をしゃべる意味などありません。それはただ、動物がシグナルを交換し合うのと大差はないのです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "他方で、ルソーの言う「憐れみ」はいっさい言語的なものではありません。けれども、だからこそ力強く、正義とはなにか、人権とはなにかといった解釈論争を止め、目のまえの不正義に対応することができます。現代の哲学者では、ぼくの知るかぎり、アメリカのプラグマティスト、リチャード・ローティが──彼自身はルソーをまったく引用していないのですが──同じようなことを主張しています。彼は『偶然性・アイロニー・連帯』（ 岩波書店）という本のなかで、人間の連帯で重要なのは理念の共有ではなく、「あなたも苦しんでいるのですか」という想像力に基づいた問いかけだと述べています。これはとても重要な指摘です。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "例えば、かつて、西洋の科学哲学者ヴィトゲンシュタインが、 『論理哲学論考』という著作のなかで、次のような言葉を残しています。 　我々は、言葉にて語り得るものを語り尽くしたとき、 　言葉にて語り得ぬものを知ることがあるだろう。 　この西洋の代表的思想家もまた、 　論理を究めたとき、 　論理を超えた世界が見えてくることを知っていたのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}]}, {"id": 238, "label": "分化", "freq": 5, "highlights": [{"text": "宇宙、地球、生命の歴史を解読してわかったのは、それらの歴史に共通している点として、「分化」する方向に進んでいるということです。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "地球も、生まれたばかりの頃は熱い火の玉でドロドロに溶けていました。それが冷えて現在の状態となります。地球が冷える過程で、水蒸気大気から海が生まれ、残ったガスは大気となり、マグマの海から地殻とマントルが生まれ、鉄ニッケル合金が沈んでコアが生まれるなど、異なる物質圏に分かれました。これも分化と呼ばれます。 　生命も、もとは１個の原始的な単細胞でした。それが何十億年もかけて、多くの真核細胞からなる多様な生命に進化してきました。この過程も分化と呼ばれます。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "では、現代の文明はどうでしょう。歴史とは分化であるという考え方を当てはめるなら、文明の発展の過程も、分化の方向に向かっているはずです。事実、これまで人間圏は、国家や地域共同体などさまざまな階層の共同体を構成要素とするシステムとして分化の方向をたどってきました。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "既存の秩序が壊れ、新しい秩序が生まれるという意味では必要です。相変化の起こる前の状態と言っていいでしょう。ただ、歴史の流れからすれば、分化が自然な方向性ですから、均質化した状態のネットワーク社会をこれからどのように分化させていくかが重要な問題となっていきます。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "そもそも、人間圏の分化には、情報を生成するという面があり、各地域の風土に応じた文化も、社会構造をはじめとするさまざまな秩序なども、すべて情報です。その生成と消滅の過程が文明の歴史と考えれば、いままた新たに、混沌とした均質状態から分化への道をたどろうとしているはずなのです。", "book_title": "138億年の人生論", "author": "松井孝典"}]}, {"id": 239, "label": "個別化", "freq": 5, "highlights": [{"text": "では、将来、自分がかかる病気がわかったらどうすればいいのだろうか。東洋医学では、現時点では健康だが、潜在的に病気を抱えている状態のことを「未病」という。現在の医療は発病を防ぐ「予防」と発病した後の「治療」が中心だが、これからは未病に対しての中間的な予防・治療が重要な時代になる。 　もちろんそこで活躍するのは遺伝子だ。遺伝子によって効果的なダイエット方法が異なるように、遺伝子によって効果的な未病対策も一人一人異なる。たとえば遺伝子情報から最適な薬を配合して自分だけの薬をつくり、発病のリスクを減らすことができる。漢方では昔から行われていることだが、遺伝子情報を元に、それを科学的に行うわけだ。また、これらのデータはアーカイブ化され、共有の情報から今後の予測が下される場合も少なくないだろう。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "もう1つは「個別化」です。デジタル上で常時接続してユーザーの行動データが取れているからこそ、「ユーザーが困っている瞬間とその困りごと」が、前後関係やその人の特性を含めて理解可能になります。 正しいタイミングで、正しい形で適切なサポートを提供できる。それが、ユーザーとのさらなるエンゲージメントを生み出し、付加価値となるのです。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "このことをフィリップ・コトラー（２０１７）は、「デジタル時代には標準価格設定から、ダイナミック・プライシング（動的価格設定）に進化する。企業は、過去の購入パターン、店舗までの距離など、顧客プロフィールのさまざまな要素にもとづいて、顧客ごとに異なる価格を請求し、収益性を最適化することができる」と指摘している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "家中 が何か一つのもので結び合っていたような気がしていたのが、近頃は貴方は貴方、私は私、子供達は子供達、という風に妙に離れ〴〵になって何だか淋しくって仕方がない」と言う。そして、邦子は自殺する。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "変革型または基盤型のコミットメント期間を導入しようとしているなら、踏み込んだ対話を覚悟しよう。社員ごとにパーソナライズされた長期的なアライアンスを築くという話になるからだ。対照的に、ローテーション型なら標準化されており期間も短いため、より定型的なやりとりですむ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 240, "label": "国際競争", "freq": 5, "highlights": [{"text": "一方、世界的な水不足は、日本にとってチャンスでもある。じつは水道水をそのまま飲める国は世界で５カ国しかない。その中に日本が入っているのは、浄水技術が優れているからだ。日本の水道インフラ輸出は、産業として十分に期待できる。２０１４年現在の日本は、原発を世界に売りたいようだが、それよりずっと将来性が高いのは、こちらだと思う。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "経済学は、貿易財（トレーダブルグッズ）の世界で物事を考えようとする癖がある。その結果バイアスがかかり、サービス産業のことに真剣に向き合わない。むしろ、気がつかないと言ったほうがいいかもしれない。もちろん労働市場が国境を越えて完全に効率的であれば、サービス産業でも貿易財に近い現象が起きやすくなる。しかし、労働市場が国際的に効率的だったためしは人類史上において一度もないし、今後も起きるとは思えない。第", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "ではなぜ、日本企業は負けてしまったのか。 　 図 10 は、ＤＶＤプレイヤー、ＤＲＡＭメモリ、カーナビ、リチウムイオンの市場規模と、日系企業の市場占有率を示している。これを見ると、産業が世界的に拡大するにつれて、日本企業のシェアが落ちていることがわかる。その理由の一つは、日本企業の整理統合が進まないため、多くの企業が過当競争に陥っていて、集約が進んでいる海外の企業に個別撃破されてしまうからだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "気をつけねばならないのは、いよいよＰＵＣが実現できることになったときに、またアングロサクソンがそつなく先にやりだして、日本人の西欧コンプレックスや、外国かぶれをうまく利用し、彼らの手で標準がつくられてしまうことである。いつのまにか日本が後追いになってしまわぬように、率先して目標を掲げ、それを語り、実現し、仕組みをつくっていくべきだ。日本人にはそれができるだけの力があるだけに、私はそう強調したいのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "ハードウェアとソフトウェアの両方をみずからの手でつくりあげ、それを統合して高度な知的財産を築き上げられるインフラ基盤があるという点で、圧倒的にトップの位置に躍り出るのは、なんといっても日本である。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}]}, {"id": 241, "label": "ブランド", "freq": 5, "highlights": [{"text": "ユネスコの本部はパリで、利権はフランスが握っている。フランスから見ると、ユネスコと別の枠組みの負の世界遺産制度化は、縄張りを荒らされるようなものだ。高値で取引される「ブランドの包装紙」が、汚れてしまうというわけで、反対に回っている。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "リッツ・カールトンはモットーとして、次の言葉を掲げています。 「紳士淑女をおもてなしする私たちも紳士淑女です」", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "シュルツは、決してスターバックスを単なる喫茶店にしようとは考えませんでした。家庭でも職場でもない「第三の場所」にしようとしたのです。人々が職場や家庭のプレッシャーから解放され、憩いのひとときを過ごすことができる。その場所に必要なのは、良質なコーヒーだけではありません。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "SONYは金融資本を、さらなる儲け、すなわち金融資本の獲得に使ったのです。そして金融資本すら獲得できないでいます。 　これに対してAppleは、評価資本で稼いだ金融資本を、イメージ・評価に投資しました。つまり資金をさらなる評価資本の獲得のためにつぎ込んだということです。その結果、Appleは斬新なアイテムとイメージを売るブランドとして今も君臨し、同時にボロ儲けもしているわけです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "そしてコーラーが見たこともないような独特の「コミットメント期間」を用意して、マッキンゼーにいたコーラーを口説いたのである。それは、ホフマンの右腕として働く、という内容だった。この役割ならＣＥＯから直接学び、会社のすべての部門を非常に広く見ることができるだろう。その見返りとしてコーラーは、肩書きやキャリアパスといった昔ながらの形式とは関係なく、リンクトインの事業を軌道に乗せるためなら何でもする、という決意を表明した。この任務をきちんと完了できれば、コーラーは「リンクトイン」と「リード・ホフマン」という二つのブランドを自分個人の職務経歴書に加えることになる。こうして、ベンチャーキャピタリストになるというコーラーの最終目標は、リンクトインの中では実現しないことがわかっているにもかかわらず、彼とホフマンはお互いの展望と利害を、期間限定で一致させることができたのである。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 242, "label": "ユーザビリティ", "freq": 5, "highlights": [{"text": "あえて難しい解決法を採用するのが、製品を使いやすくするための最良の方法 だという気づきをよく与えてくれたグレッグは、けっして人を甘やかすタイプではない。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "スティーブは、 重要でない機能をカットしたほうが、ユーザーが一から学びやすく、長い目で見て使いやすくなる と考えていた。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "・疑問が発生するようなら、その答えを探すのではなく、「どうしたら疑問そのものをなくせるだろうか」 と考える。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "一般的にお客様が広告をクリックしてサイトに訪れると、 10 秒以内で離脱するお客様、つまり、 わずか 10 秒で立ち去っているお客様は約 90％ だと言われている。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ランディングページでは、テキスト文字ではなく、 必ずすべての文字を〝画像文字〟 にしよう。 ランディングページは、ネット広告から誘導する専用のページなので、ＳＥＯは関係ない。 とにかくお客様に読みやすくするのである。 今のネットのお客様は、特に広告から誘導されたページを一語一句〝読まない〟。 今のネットのお客様は、読むというより〝見る〟 のだ。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 243, "label": "顧客視点", "freq": 5, "highlights": [{"text": "スティーブはハイテク企業のＣＥＯでありながら、ソフトウェア業界の諸事情など一切関知しない顧客の立場になって考える。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "アフターデジタル移行後の中国は、日本よりも「もっと社会を便利にしよう」「価値や利便性、インセンティブを相手に与えよう」と考え抜かれている ように思います。O2Oとは「チャネルをつなげて送客する」という企業視点の考え方でしたが、OMOは「顧客から見たら融合しているほうが便利」という顧客視点の考え方です。そこが本質的に異なっています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "やりたいこと、やらなくてはいけないことが先立つと、どうしても自社優先の硬直した目線になってしまう。「これは必要なはず」「買ってくれるはず」という思いばかりだと、机上の空論で大損するリスクがある。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "それを回避するには、 自分たちがお客様とする消費者になりきって考える ことが大切だ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "「５ＧＢのＭＰ３プレイヤー」は単なるスペック情報ですが、「一〇〇〇曲をポケットに」とはプロダクトの体験について語った言葉です。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}]}, {"id": 244, "label": "社会システム", "freq": 5, "highlights": [{"text": "ストールマンは「フリーソフトウェア菓子店の店長」として、利用者がソフトウェアを無料で次の利用者に引き継ぐ必要がある、という骨組みをつくりあげた。", "book_title": "Creative Selection　Apple 創造を生む力", "author": "ケン・コシエンダ、二木 夢子"}, {"text": "そういう不安な要素というのが充満しているから、イギリスで始まった保険業界が、今世界の金融界で膨大な力を持って、世界の経済界をぐちゃぐちゃにしているんですよ。保険業種というのは、人間がいつも持っている不安を和らげるふりをして、そこで搾取をする業種なんです", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "これに対し、フル代行業者と呼ばれる者たちは、健康保険証貸し、賃貸住宅における名義貸し、携帯電話やポケットワイファイなどの通信インフラのレンタル、未成年向けには年確ツール（風俗店面接時などに年齢確認を誤魔化すためのもの）のレンタルや融資（闇金）業務まで、いわば住所不定状態にある女性が求める全てをお膳立てしてくれるというのだ。 　彼らの正体は、いったい何者なのか？　実はこれ、スカウト関係者が個人的にサイドビジネスとしてやっているケースが多いようで、違法性をはらみつつ収益性の高いビジネスでもある。", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "「今、訪れつつある新社会。それを『評価経済社会』と呼ぶ。 　貨幣経済社会とは、社会の構成員が、その最大の貨幣的利益に向かって邁進することによって安定する『動的安定社会』である。それと同じく、 　評価経済社会とは、社会の構成員が、その最大の評価的利益に向かって邁進することによって安定する『動的安定社会』である」", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "この、みんなが「そうするものだ」と考えている事柄の集大成こそがパラダイムなのです。社会システムとパラダイムが表裏一体であることが、お分かりいただけたでしょうか。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 245, "label": "競争環境", "freq": 5, "highlights": [{"text": "リスティング広告の問題点をいくつか指摘しよう。 　1つ目は、CPAを安く抑えられるキーワードはそんなに多くはないということである。つまり、「買いたい人」を特定できるキーワードはそれほど種類がない。おそらくブランドの企業名や商品名など、いわゆるブランドワードと呼ばれるものである。 　そしてブランド", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "グローバル経済圏のオリンピックの世界は、ますますレベルが上がり、ワールドスーパーメジャーリーグになっている。グローバル経済圏とローカル経済圏の距離感はますます大きくなっている。かつては国別のリーグしかなかったので、ローカル経済圏の住人でもある程度がんばればリーグに参加できる可能性もあった。ところが今は、ワールドスーパーメジャーリーグになっているので、参加する可能性すら見えない。 　突出した才能をぶつけて戦う世界に、ごく平均的な人を吸収していくことは現実的ではない。むしろ、ローカル経済圏において、県大会レベル程度の高い水準の生産活動を行うことができるようにすることだ。 　ローカル経済圏では、オリンピックチャンピオンを目指す必要はない。市大会、県大会でチャンピオンを目指すべきだ。平均的な人を世界大会に引きずり出すのではなく、県大会で優勝を狙えるレベルに引き上げることを考えたほうがはるかに現実的だ。 　そもそも、ローカル経済圏の産業は、グローバルの完全競争ではなく、地域ごとの非完全競争である。ローカルのバス会社は世界一でなければ生き残れないことはない。地域一番になりさえすれば、十分生き残っていける。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "一方、小売業は違う結果になる。小売業はウォルマート、カルフール、イオングループ、セブン＆アイなどのイメージから、グローバル経済圏の巨大企業だと考える人が多い。しかし、小売業は世界の上位一〇社を合計しても、全世界の小売業売上高の一〇パーセントにもならない。日本国内を見ても、セブン＆アイとイオングループを足しても一〇パーセントに届かない（ 図 22／ 図 23）。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "経済学の論理では、ブラック企業はやがて淘汰され、市場から退出する。しかし、そこに至るまでには百年単位の時間をかけなければならない。サービス産業には情報の非対称とか、選択肢の欠如とか、市場を非効率化し、失敗させる要素が盛りだくさんだからだ。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "このうち、情報化や物流、交通網の発達によって起こる裁定取引は、すでに大規模に進行しています。これから狙い撃ちされるのは、規制などなんらかの人為的な理由によって、非効率な市場が残っている分野でしょう。 これまでは電力会社も、地域独占の立場にある「安定的な企業」だと考えられていました。しかし、電力の大口需要者である工場や大規模なオフィスは、電力コストが安い国へ移転することが可能です。将来的には、海を越えて電力を輸入する技術が確立し、海外から安い電力が入ってくるかもしれません。そんななか、地域独占などという規制をいつまで守っていられるのか、誰にもわからないのです。 しかもそういったことが起こる可能性は、日本と海外との電力料金の差が大きければ大きいほど高くなるのです。今の常識で「この業界は守られている。安心だ」などというのは、まったくアテになりません。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}]}, {"id": 246, "label": "ユーザー体験", "freq": 5, "highlights": [{"text": "2つ目の問題は、ユーザーが行う比較と入札競争についてである。ユーザーが検索し、結果のページに広告を出せるのは1社だけではない。先の例では「不動産」などで検索するとかなりの数の広告が表示される。つまり、リスティング広告は比較されることを前提とした広告なのである。 　ユーザーは1位に掲載される広告をクリックして自分の求めているものがなければまた検索結果ページに戻り、2位の広告をクリックして自分の求めるものを探すことを繰り返すのである。つまり、他社と商品やなんらかの差別化ができないのであれば、ユーザーに自社のサイトを印象づけることはできない。このようにビッグワードで検索するユーザーを自社に取り込もうとするのであれば、ユーザーが比較する前提で自社のサイトやサービスを見直す必要がある。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "インがInstagram を利用する理由として語った、「心に訴えかけるような素敵なものを見かけた時に写真を撮っているだけ」は、ユーザーのニーズを把握するためのカギとなる。Instagram はユーザーを外的トリガーから内的トリガーに誘導したことで、人々の生活の中に習慣を作り上げた。インにとって、残しておく価値のある瞬間を残したいというニーズを、瞬時に解決するのがInstagram なのだ。インがアプリを使用するのに、外部トリガーは必要ない。というのも、彼女にとっては、内部トリガー自身が外部トリガーでもあるからだ。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "そのための第一歩はプロダクトの特徴に注目するのではなく、ユーザーの感情に寄り添い、特定の不満や苦悩を探り当てることだ。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "もし、大衆を対象としたプロダクトを作りたいのであれば、自分自身がユーザーの立場になり、ユーザーの視点から物語を書かなくてはならないだろう。だからこそ、私達はじっくりと時間をかけてユーザー・ナラティブ（語り）と呼ばれるものを書き上げている」（50） と答えている。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "3つめの機能は、「ユーザーが歩くだけでたまるポイントシステム」です。いうならば単なる歩数計機能ですが、歩いてたまったポイントを、アプリ内の健康食品、美容品、医薬品の購入時にお金として使うことができます。これだけ聞くと、なんとなくよくありそうな機能に聞こえるかもしれませんが、秀逸なのは、 ユーザーは1日が終わる前に1度アプリを開き、「歩いた分を換金する」というボタンを押さないと、歩数がリセットされてしまうという仕組み です。そのためユーザーは、必ず1日に1回はアプリを開く行動が習慣化しています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}]}, {"id": 247, "label": "顧客行動", "freq": 5, "highlights": [{"text": "2つ目の問題は、ユーザーが行う比較と入札競争についてである。ユーザーが検索し、結果のページに広告を出せるのは1社だけではない。先の例では「不動産」などで検索するとかなりの数の広告が表示される。つまり、リスティング広告は比較されることを前提とした広告なのである。 　ユーザーは1位に掲載される広告をクリックして自分の求めているものがなければまた検索結果ページに戻り、2位の広告をクリックして自分の求めるものを探すことを繰り返すのである。つまり、他社と商品やなんらかの差別化ができないのであれば、ユーザーに自社のサイトを印象づけることはできない。このようにビッグワードで検索するユーザーを自社に取り込もうとするのであれば、ユーザーが比較する前提で自社のサイトやサービスを見直す必要がある。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "要するに、イェルプの評価が星三つから四つに高まると、売り上げが五～九パーセント増えるということだ。", "book_title": "アンバサダー・マーケティング", "author": "ロブ フュジェッタ、土方 奈美、徳力 基彦（解説）、藤崎 実"}, {"text": "しかし、自然な出会いから結婚に至る場合、そこまで厳密に年収を気にする女性は、ほとんどいません。といっても、誤解のないように。年収２００万円と１千万円の男性が目の前にいたら、その理由で後者を選ぶ女性はたくさんいます。ですが、年収２９０万円の男性と、３１０万円の男性がいたとき、その差が決定的だと感じる女性はいないのです。 それにもかかわらず、検索画面の選択肢に「年収３００万円以上」とあれば、それを選んでしまうことは十分にありえます。そしてこういったシステムにおいては、２９０万円と３１０万円の差は、決定的な差（その男性に会うか会わないかという判断を変えてしまう差）になってしまいます。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "それは事前購買段階（ＺＭＯＴ：Zero Moment of Truth、真実のゼロの瞬間）、購買段階（ＦＭＯＴ：First Moment of Truth、真実の第１の瞬間）、事後購買段階（ＳＭＯＴ：Second Moment of Truth、真実の第２の瞬間）と段階ごとに顧客の意思決定プロセスを捉える考え方だ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "つまりその狙いは、「回転率の向上」にある。立ち食い・低価格を基本とするいきなり！ステーキのビジネスモデルにとっては、回転率を上げることは命綱である。だから「繰り返しの来店をコミットしてもらう」ことに、フォーカスしたプログラムになっているのだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}]}, {"id": 248, "label": "責任論", "freq": 5, "highlights": [{"text": "ない。たとえば本書にあるように、誰かを降格させなくてはいけないときに本人の能力不足やミスだと伝えるのではなく、リーダー側の管理ミスという説明も加える、フィードバックで小言を言うときには褒めるのもセットにする、そしてそこから自分のスタイルをつくるといった考え方は、どんな組織でも実践的に役立つだろう。", "book_title": "HARD THINGS　答えがない難問と困難にきみはどう立ち向かうか", "author": "ベン ホロウィッツ、滑川 海彦、高橋 信夫、小澤 隆生（序文）"}, {"text": "右の引用にもあるように、倫理、義務感、誇り、プロ意識、勇気といった定量的に測ることのできない内的動機に基づいて、消防や教育という公共的な仕事はかろうじて成立しています。 　これらの内的動機は、一言でまとめれば「責任」です。それも外から押しつけられた責任ではなく、自らが気づいた内なる責任の自覚です。もう少し強い言葉を使えば、「使命」です。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "この悪循環をオバマの政策的失敗だと考えて済ませるわけにはいかない。誰が大統領であれ、復讐テロのリスクがあれば、そのリスクを 措いて近代的人権の価値観点から収容所を閉鎖することは、ウェーバーの政治責任論的にも困難だ。責任倫理（結果責任主義）を規範とすべき政治家が、心情倫理を優先させたと批判されるからだ。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "我々はオバマを単に批判できない。ウェーバーによれば、市民の責任は法令遵守だが、政治家の責任はそれに止まらない。法令遵守に意味を与える社会の存続が危うい場合、法令を踏み越えても社会の存続に邁進するのが、政治家の責任である。これを彼は、心情倫理と対比させて責任倫理と呼んだ。政治家には、失敗したら血祭りにあげられる覚悟で法令を踏み越えるべきときがある。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "いまはインピュタビリティが過剰になって、それを避けることにみんな一生懸命だから、レスポンシビリティが内から湧き起こってくる余裕がないという状態ではないか。レスポンシビリティはまさに中動態的なもので、「俺が悪かった」とか、「俺がこれをなんとかしなきゃ」とか、ある状況にレスポンドしようという気持ちですね。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 249, "label": "矛盾", "freq": 5, "highlights": [{"text": "Just Enough Research（ちょうどよい研究）』の著者であるエリカ・ホールは、「人というのは往々にして、自分がやりたいと思っていること（例：映画並みの品質でホームムービーを制作）ではないことを、実際はやってしまう（例：猫動画の視聴）ものです。この矛盾した行動に調査の焦点を合わせれば、答えを見つけられる可能性が広がるのです」（49） と語る。矛盾点を探せば、そこに好機が見えてくる。なぜ人はSMSでメッセージを送るのか？ なぜ写真を撮るのか？ テレビを見たり、スポーツ観戦をしたりすることが、人生においてどのような役割を担っているのか？ このような習慣がどのような苦悩を解決してくれるのだろうか？ また、ユーザーはこれらの行動の直前にどのような感情を抱いているのだろうか？ というように、人間の行動における矛盾点に焦点を当てながら、自問してみるとよい。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "ここで以上の三例を紹介したのは、「私たちの環境を創っているのは、私たち自身である」ということに加えて、「私たちは、良い結果に 狙いを定めながらも、その結果と調和しない思いをめぐらすことによって、その達成をみずから妨害しつづける傾向にある」という真実を指摘したかったからです。この傾向は、放置されるとますます強まり、多様化する危険をはらんでいます。", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "すべての物事には、その内部に「矛盾」が含まれているが、 　 その「矛盾」こそが物事の発展の「原動力」となっていく。 　 そして、この「矛盾」を機械的に「解消」するのではなく、 　 それを弁証法的に「止揚」したとき、物事は発展を遂げる。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "が、どんなことであろうと、マスメディアを通じて情報を集め出すと、必ず矛盾する結論やデータが、いくつも手に入ってしまう。この時点で普通の人は「科学的な正しさ」で物事を判断すること自体、あきらめざるを得なくなります。 　こうして視聴者は、おもしろい情報だけを見るようになり、マスメディアはますますおもしろい情報ばかりを流すようになるのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "だけど今はそういう文化そのものがなくなり、「言わないこと」と「考えないこと」が同義になってしまった。 　かくして、面倒なことはすべて思考停止の状態にしてしまう。 　核の問題も、本質はそういうことだ。 　核廃絶を訴えながら、一方ではアメリカの核の傘で守られているっていう矛盾がどうにもならなくて、思考停止にしてしまった。どういう意見を持っているかではなくて、とにかく反対という以外は何も言っちゃいけない。何も言わなければ、ないことと一緒なんだからっていう滅茶苦茶な論理だ。", "book_title": "超思考", "author": "北野武"}]}, {"id": 250, "label": "価値提案", "freq": 5, "highlights": [{"text": "製品化によって具体的にどんな問題を解決するのか？ (バリュープロポジション) だれのためにこの問題を解決しようとしているのか？ (ターゲット市場) 市場の大きさは？ (市場規模) 製品化の成功をどうやって評価するのか？ (指標、収益戦略) 現在、他に競合する製品はあるか？ (競合の見通し) なぜ当社がこの製品化をやるのに最適なプレーヤーと言えるのか？ (差別化要因) なぜ今なのか？ (市場投入の時期) どうやって製品を市場に出すのか？ (市場投入戦略) 成功のために絶対に必要な要素は何か？ (ソリューションの要件) これらを前提とした上で、最終的な提案は何か？（やるかやらないか）", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "スタートトゥデイは好調の要因を、「ブランドの世界観を尊重し、リアル店舗で購入する以上の顧客経験価値の提供にこだわったこと」と説明している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "アマゾンは Place（チャネル）によって顧客からの行動データを把握し、これを使ってPromotion（販促）・Price（価格）・Product（商品）を変革し、顧客にさらに新しい価値を提案できる のだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "まさに「アマゾン・プライムの世界へようこそ！」であり、訪れるすべての人に、「アマゾンとのつながりを持つことが、どれほど生活を豊かに便利にするか」を、オフライン店舗全体で表現している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "本当にロイヤルティの高い顧客は「いつも、必ずしも」金銭的メリットだけを求めているわけではない。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}]}, {"id": 251, "label": "倫理", "freq": 5, "highlights": [{"text": "それに、目標の設定には、さらに暗い側面がある。目標を追いかけ、デタラメな数字に到達しようとしているうちに、 モラルや誠実さや健全性が損なわれてしまう ことが多い。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "このような生物学的基礎をもつ「ヒトの心」が、人文社会科学が対象とするような「人の社会」の成り立ちとどう関わるのかを論考します。 　人のもつ価値や倫理といった、人文社会科学が数千年にわたって積み重ねてきた人間本性に関わるさまざまな知恵(wisdom) は、自然科学の知識(knowledge)、つまり、脳科学や進化生物学、霊長類学、行動科学などが明らかにしてきた経験的な事実とどう関わるのでしょうか。具体的には、利他性、共感性、正義やモラルといったテーマを中心に、本書では、人文知と自然知が隔絶した互いに無縁のものではなく、豊かな関わり合いをもち得る可能性を、思考実験を適宜交えながら、探ろうとします。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "あの巨大事業の失敗の主たる原因が、道徳面であって財政面ではないことを疑う人があるでしょうか。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "たとえば、正義とは法外なものだというデリダの認識がありますよね。法に 適うように行為することは、あらかじめ法によって正しさを保証されているわけだから、正義でもなんでもない。正義とはそういった法の後ろ盾がないところである判断を下し、行為することだ", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}, {"text": "こうした哲学観を批判し、議論を通して何か普遍的な「世界のＯＳ」みたいなものを追究するのが哲学だ、というような、科学的と言えるだろう哲学観もあるのだとは思うが、少なくとも僕はそういうタイプではない。世界の本質をいろんな角度から捉える。そのそれぞれが面白い。それでいいじゃないかと思うし、それはすこぶる倫理的なことである。", "book_title": "言語が消滅する前に (幻冬舎新書)", "author": "國分功一郎 and 千葉雅也"}]}, {"id": 252, "label": "不確実性", "freq": 5, "highlights": [{"text": "さらにいうと、長期計画は偽の安心感を植えつける。五年後、三年後、一年後に世界がどうなっているかなんてわからない。そう認めるのが早ければ早いほど、あやふやな将来に向けて大きな決定を何年もまえに下さねばならない恐怖を感じずに前に進むことができる。予測を立てなければ、予測に押しつぶされることもない。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "情報が入手でき、計画を立案できる持続的技術では、リーダーシップをとることは、競争上、重要でないことが多い。このような場合、追随者も先駆者も実績は変わらない。先駆者が圧倒的に有利なのは、市場のことがほとんどわからない破壊的イノベーションの場合である。これがイノベーターのジレンマである。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "センスメイキングは、イノベーションを起こすうえで欠かせない条件であり、変化が激しく不確実性の高い現代のリーダーシップで特に重要です。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "なぜならば、企業や組織のマネジメントとは、ある意味で、 「意思決定の連続」であり、また、その意思決定も、 「正解のない意思決定」であることが大半だからです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "ここで、ひとつのデータ分析の特徴を紹介しておくと、「データ分析は本質的にやってみるまで何が出てくるかわからない」。何がわかるのかがわかっているならば、わざわざ分析を行うまでもないため、これはごく当たり前のことながら、企業での活用を考えた場合に非常に悩ましい事態を引き起こす。つまり、データ分析によってどれだけの（売り上げ向上やコストの削減といった）効果があるのかが不明であるため、投資の採算性が判断できず、データ分析への投資の決断が非常に難しくなるのだ。 　さらに、やってみるまでわからないという性質は、どのデータが重要で蓄積しておくべきものなのかを事前に判断することができないことも意味する。この「分析の役に立つかもしれないから残しておこう」という考え方でデータをなんでも収集したり蓄積したりすると、当然その量は膨大になり、蓄積・分析環境への投資額が増えてしまう。 　結果、意思決定者からすると、ROIが不明にもかかわらず、絶対額は大きいというリスクの高い投資になるのである。", "book_title": "顧客を知るためのデータマネジメントプラットフォーム　DMP入門 (NextPublishing)", "author": "横山 隆治、菅原 健一、草野 隆史"}]}, {"id": 253, "label": "境界設定", "freq": 5, "highlights": [{"text": "だから、僕らは大学のアイデアを借りた。つまり 開講時間（オフィス・アワー）をつくった。 ベースキャンプのそれぞれ分野の異なるエキスパートは、いまでは開講時間を掲げている。たとえば、ある人は毎週木曜の午後が開講時間だし、一日一時間開講している人もいる。各エキスパートが自分の都合に合わせて決めているのだ。 　でも、月曜日に疑問が生じて、訊きたい相手の開講時間が木曜だったら？　そのときは待つのだ。木曜までほかの仕事をするか木曜までに自分で答えを見つけるかだ。大学で教授と話をしたいなら講義の日まで待たねばならないのと同じだ。 　これは一見効率が悪そうにみえるかもしれない。お役所仕事みたいだとさえ思われるかもしれない。けれども、僕らはこれ以外の方法も試したことがある。開講時間はベースキャンプでは大人気のシステムだ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "豪華な福利厚生は、仕事と遊びの境界をあいまいにする。だから、気づくとほぼ仕事ばかりという状態になる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "境界線を引くのが簡単だと言うつもりはない。ジン・ユンやクリステンセンのようにうまくいくケースばかりではないだろう。出世の妨げになるかもしれないし、最悪仕事を失うことも考えられる。自分の領域を守るには、ときに大きな代価が必要だ。 　だからといって、境界線を放棄してしまったら、もっと大きな代償を払うことになる。人生でもっとも大事なものを選べなくなるからだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "行動計画を練る際には、他人のために何かするのは、他人に搾取されるのを許すという意味ではないことにも留意する必要がある。ここで、微妙な区別を認識するという、脳の実行機能が提供する能力が重要となる（７）。行動計画には、あなたの恐れや感情をいいように操ろうとする相手に注意して、その相手を避けることも盛り込んでおかなくてはいけない。健全で長続きする関係は自発的な互恵主義の上に成り立つものであり、搾取に基づくものではない。だから、もし大喜びで友達になってくれた人が急にお金を借りたがったり、あなたの車を使いたがったり、しばらくの間あなたの家に泊まりたがったりしたら、それはたぶん、慎重になるべき悪しき兆候であり、もっと言えば別の友人を探したほうがいいかもしれない。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "必要なのは、社員のコミットメント期間における目標と一致するよう整合性を構築することだ。なにも社員の「人生の目標や価値観」とまでも一致させる必要はない。前にも述べたが、会社は家族ではない。社員の価値観と将来展望は尊重すべきだが、無条件に支援する義務はないのだ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 254, "label": "公平性", "freq": 5, "highlights": [{"text": "そして一年に一回、市場相場を確認して、自動的に賃上げする。僕らの目標は、どのような職種であれ、市場のトップ一〇パーセントと同じ額の給与を支払うことだ。つまり、あなたがカスタマー・サポートの担当者であれ、オペレーターであれ、プログラマーであれ、デザイナーであれ、そのポジションのトップ一〇パーセントが得ているのと同じ額の給料を手にすることができる。 　その", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "市場相場はサンフランシスコの数値に基づいている。僕らの社員は誰もそこに住んでいないのにもかかわらず、この都市の相場にしたのは、僕らの業界では世界一給料の高い街だからだ。したがって、あなたの 住処 がどこであれ、僕らは業界トップクラスの給料を支払う。あなたがどこに住んでいるかはあなたの仕事の質とは関係がないし、僕らが支払う報酬はあなたの仕事の質に応じているからだ。あなたのベッドがボストンにあろうが、バルセロナにあろうが、バングラデシュにあろうが、なんのちがいがある？", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "昔は経営者と社員の給与格差がいま以上にありました。それをどんどん縮めています。そもそも役員が社員の数倍も働けるわけがないのです。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "類人猿の間でも、公平さと返報は好意のやりとりという形で表れる。親しい間柄では、損得勘定や謝意の表明なしにやりとりしているようだが、もっと距離のある関係では、たっぷり毛づくろいをしてもらったり、ほかに何か良いことをしてもらったりすると、いちいちきっちりお返しをする。また、類人猿でさえ、頭の中で継続的に記録をつけられる。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "付録—Ａ 「アライアンスの合意書」の見本 この「アライアンスの合意書」は、変革型コミットメント期間に用いることを念頭に書かれている。あなたの会社やチームが置かれた環境に合わせて、細かい方針や施策（たとえばネットワークづくりのための予算）は変えていい。また、アライアンス関係を結ぶ社員ごとに個別目標もカスタマイズしよう。ただし、社員間の公平性を期すために、全般的な方針と原則は変えないほうがいい。 私＝マネジャーを指す 私たち＝マネジャーとその部下の社員を指す 当社＝マネジャーとその部下の社員が所属する会社を指す 組織が大きい場合、会社のニーズに合わせて、まず、トップ経営層と人事部門の幹部がアライアンスの合意書の中身を調整して基本型をつくる。個々のマネジャーがそれぞれのチームに合わせてさらに調整できる余地を残しておこう。 宣言文の全文は次のサイトからダウンロードできる（英文）。 www.theallianceframework.com", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 255, "label": "信念", "freq": 5, "highlights": [{"text": "やましく思われるかどうかは俺らにとって重要じゃない。いい企画を作れるかどうかが軸。それを曲げてまで、世間体を気にするつもりは僕にはない。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "現在、ＫＤＤＩで新たなプロジェクトをスタートさせている私はＱｒａｎｋ（クランク）というユーザー投稿型のランキングアプリのサービスにも関わっています。そこでは、最初の段階でチームメンバーに対して「数字以外は信じない」と断言 したほどです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "二人の意見が食い違うときは、私は反論するが、スティーブは私よりずっと頭の回転が速いため、言い終える前に論破されてしまうことが多い。そこで一週間かけて考えをまとめ、再び説明する。そこでまた却下されることもあるが、めげずにこれを繰り返すと、次の三つのうちのどれかが起こった。 彼が「なるほど、わかった」と言って要望に応えてくれる。 私が彼の言い分の正しいのを認め、働きかけをやめる。 いくら話しても結論に達しないので、私が最初に提案したことを構わず進める。どのケースも同じくらいの頻度で起こったが、三つ目のケースになってもとがめられたことはない。自己主張が激しい反面、情熱を尊重する人だった。私がそこまで信念を持っていることなら、あながちまちがいではないと感じてくれていたようだ。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "従って、むしろ、これからの時代のマネジャーは、 「メンバーの意見を聞いたうえで、自分の信念に従って意思決定を行う」 　というスタイルを心掛けていく必要があります。 　そして、そのとき求められるのは、 　その意思決定をメンバーに納得させる力、すなわち「説得力」なのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "構想を言葉にするときには、正しいことを言うときとはまったく違うマインドセットが必要になります。慎重になるのではなく、大胆になること。根拠より、信念を持つこと。きれいごとよりも、まだ誰も言っていないことを話すこと。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}]}, {"id": 256, "label": "エネルギー", "freq": 5, "highlights": [{"text": "60 年もかかったが、私は最近になってやっとある啓示を得た。それは、どんなものも例外なく、そのままの形を維持するためには、付加的なエネルギーや秩序が必要だということだ。", "book_title": "〈インターネット〉の次に来るもの　未来を決める１２の法則", "author": "ケヴィン・ケリー、服部 桂"}, {"text": "「立てない」「歩けない」という壁を乗り越えようというのではなく、視線は壁のもっと先、「踊る！」というところに向いています。 いやなことではなく好きなことを目標にする、そこに気づいたからこそ、大きなエネルギーが生まれるし、壁なんて目に入らなくなる。 そして実際、壁なんてことさら意識しなくても、「踊りたい！」と思って頑張っているうちに、気づけば「立てない」「歩けない」の壁を越えていた。彼女が最初から「立つこと」「歩くこと」を目標にしていたら、短期間に劇的な回復を遂げることは困難だったかもしれません。 　じつはこうした思考はエースの特徴ともいえます。 　たとえばＡＫＢ 48 なら、センターに立つことだけを目標にしている子は、ささいな壁に突きあたっただけで意志がゆらいでしまいがちです。それに対し、ＡＫＢ 48 に入るのもセンターに立つのもすべて通過点、ゆくゆくはソロの歌手になりたい、大女優になりたいという夢を持っている子は、ちょっとやそっとじゃゆるがない。 追いかける夢の大きさが、そのまま意志の強さにつながるのです。 　そして意志の強さこそが、結果を生むのです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "この話が（少なくとも僕らにとって） 興味深いのは、カフェイン自体にエネルギーを高める働きはなく、 たんにアデノシンが誘発する眠気によるエネルギー急低下を抑制するにすぎない という点だ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "欧州はチェルノブイリ原発事故を機に、食とエネルギーをシステムに過剰に 委ねるのをやめ、スローフード化と自然エネルギー化が進みました。 　いまでは株式時価総額ランキングに１兆円を超える自然エネルギー企業が４社あります（日本企業は皆無）。独占的電力会社を頼るから 滑稽 な計画停電になりました。電力を特定電力会社から買うしかない社会は変です。そのことを指摘するマスコミがあったでしょうか。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "顔のパーツが、真ん中に集中している女性は、人のエネルギーを「吸う」力が強いので、一緒にいる人は下がってしまいます。いわゆるエネルギーヴァンパイアと呼ばれる人々。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 257, "label": "動物行動", "freq": 5, "highlights": [{"text": "でもアフリカは野生動物の宝庫ですよね。草食動物に限ってみてもゾウやカバやキリンやシマウマがいます。でもそれらは「繁殖能力」的に飼育しにくかったり、カバなんておっとりして見えますが実は毎年死者を出すくらいの猛獣です。特にシマウマは気性がとても荒くて、ウマのように人が騎乗して乗りこなすことは難しいらしいのです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "です。「恩には恩を返す」、「仇には仇で報いる」といった、いかにも人間的な「信義に厚い」行動が、チスイコウモリの社会で観察されたわけです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "オオクジャクサンという蛾の羽に大きな目玉の模様があることはよく知られていますが、この蛾を捕食するトリは、羽を広げたオオクジャクサンの目玉模様に一瞬ひるみます。こうしたひるみこそ、絶体絶命のオオクジャクサンに千載一遇の逃走チャンスを与えるのです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "鳥の渡りも、これですね。あの渡り鳥が、夏になると北上して子どもを生む。冬がくると餌を食べに南下する……。こうなりますと、一種の振子運動ですね。それも、地球的な規模の振子運動です。しかも、その振りのリズムは、地軸の振りと一致している。", "book_title": "内臓とこころ (河出文庫)", "author": "三木成夫"}, {"text": "同性愛は人間だけでなく、動物界に驚くほど広く存在している。多くのほ乳類では、オスもメスもたとえば数％くらいの割合で同性愛行動を示す場合がある。ボノボ（チンパンジーにとても近い類人猿）ともなると、オスもメスも全員がバイセクシャルと言っていいくらい、同性愛行動は日常的だ。", "book_title": "同性愛の謎　なぜクラスに一人いるのか (文春新書)", "author": "竹内 久美子"}]}, {"id": 258, "label": "統治論", "freq": 5, "highlights": [{"text": "戦争とは水が確保できる場所の争奪戦であり、政治とは、確保した水を灌漑し治水する施策なのです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "全体主義に抗うのに、非全体主義的な──徹底して民主主義的な──やり方は採用できないのか。あるいは、いまや有効性が低すぎて、全体主義を使わずには全体主義に抗えないのか。今日最先端の政治学や政治哲学においては悲観的な見方が 拡がっている。そうした見方は法学者キャス・サンスティーンや政治学者ジェームズ・フィッシュキンによって代表される。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "我々はオバマを単に批判できない。ウェーバーによれば、市民の責任は法令遵守だが、政治家の責任はそれに止まらない。法令遵守に意味を与える社会の存続が危うい場合、法令を踏み越えても社会の存続に邁進するのが、政治家の責任である。これを彼は、心情倫理と対比させて責任倫理と呼んだ。政治家には、失敗したら血祭りにあげられる覚悟で法令を踏み越えるべきときがある。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "ウェーバーは言う。平時は統治権力内の決定の大半を行政官僚がする。だが非常時には政治家が重要な決定をする。行政官僚が行うゲームの、プラットフォーム自体を、社会存続のために変える決定だ。だから政治家と官僚は潜在的に対立する……。平時と非常時を分ける思考は「ナチ御用学者」カール・シュミットの「非常大権論」「憲法制定権力論」に影響した。 　だがいまや平時と非常時を分ける思考が通じなくなった。正確には〈非常時の常態化〉が進んだ。〈非常時の常態化〉を象徴する言葉が「テロの脅威」である。この脅威の現実化を支える最大要因もやはりテクノロジーの進化である。チョムスキーが指摘する「先進国の悪辣な政策がもたらす怨念」も重要だが、テクノロジーが怨念に基づく破壊行為を可能にしたのだった。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "社会学者マックス・ウェーバーによれば、近代社会における最大のバトルは、国家と国民（統治権力と市民）の間にではなく、政治家と行政官僚の間にあります。統治権力の内部にこそ究極のバトル・フィールドがあります。理由は、両者に期待される役割ないし機能の違いにあります。 　行政官僚は既存プラットフォームの上で利得最大化を目指すべき存在です。政治家は急変する政治環境・経済環境・社会環境に対応して必要とあれば既存のプラットフォームを覆すべき存在です。平時であれば表面化しませんが、非常時には両者の利害対立が表面化します。 　行政官僚は疑獄事件で国民を味方につけ、行政官僚の権益を 蔑ろにする政治家を排除しようとします。行政官僚の業績は既存プラットフォームがあって初めて評価されるからです。政治家はポピュリズムで国民を味方につけ、行政官僚の権益を排除して操縦しようとします。 　たかが行政官僚に過ぎない特捜の 論 う疑獄を真に受けてはいけない。ウェーバーの『職業としての政治』（↓ 参照） に倣えば、政治家には、国民を守るべく事と次第によっては市民倫理に違背する覚悟が必要です。市民倫理的には汚れていても、政治倫理を全うするのです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 259, "label": "宗教観", "freq": 5, "highlights": [{"text": "計画的で太陽を信仰する文明、それがエジプト文明なのです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "部族間の争いが絶えず、そのために契約を重んじ、月の暦を基準とする文明、それがメソポタミア文明なのです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "日本人の宗教観の根底にあるのは、「 重層 信仰」と訳される「シンクレティズム」であり、複数の異なる宗教への崇敬心を共存させて、何の抵抗感も抱かないのだ。", "book_title": "常識として知っておきたい　日本の三大宗教　神道・儒教・日本仏教 (KAWADE夢文庫)", "author": "歴史の謎を探る会"}, {"text": "視野が狭いことと、もうひとつはちょっと話が飛ぶようですが、神様とか超越性に対する感覚が弱いからだと思うんです。人知を尽くせばオペレーションは完遂できる。そう思うから間違える。インテリジェンスがとくに一神教の国で発達しているのは、人知の限界に対する諦念があるからで、自分たちが完璧だと思うオペレーションでも必ず崩れる、どんなに信頼しているやつだって絶対に裏切るという感覚があるからなんですね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "キリスト教の特徴は、理性や学問に究極的価値を認めない反知性主義の宗教だ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 260, "label": "知恵", "freq": 5, "highlights": [{"text": "人間は自分の人格の制作者であり、自分の環境と運命の設計者である」という真実に必ず行き着くことになるでしょう。 　人間にとって、自分自身に関するこの真実を身をもって知ることは、悟りであり、知恵とパワーの獲得にほかなりません。", "book_title": "「原因」と「結果」の法則", "author": "ジェームズ・アレン、坂本 貢一"}, {"text": "エネルギーを増やす方法について知るべきことの99％は、人類史にある。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "結局のところ、人間の性質は目に見えない無数の もの によって形づくられていく。 先達 や古今の格言、人生における実体験や書物、友人や隣人、現在の社会や祖先の英知――これらすべてをわれわれは受け継ぎ、疑いもなくそこから大きな影響を受けている。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "単なる知識の所有は、知恵や理解力を身につけることとはまったくの別物だ。知恵や理解力は、読書よりもはるかに高度な訓練を通じてのみ得られる。一方、読書から知識を吸収するのは、他人の思想を うのみ にするようなもので、自分の考えを積極的に発展させようとする姿勢とは大違いだ。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "もう一つ忘れてならないのは、本からいくら貴重な経験を学んだとしても、しょせんは耳学問の域を出ないという点だ。それに反して、現実生活から得た経験は真の知恵となる。", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 261, "label": "自然体", "freq": 5, "highlights": [{"text": "すべて自然体。自分の言いたいことを言う。それに対して気にくわないという人には、「あなたはうちの株を買わないほうがいいんじゃないか」と申し上げる。「われわれはパブリックカンパニーだから、株主を選べない。でも、あなた方投資家は会社を選べるでしょう。さっきから私のことをさんざんに言うけれど、そんなに嫌いな社長の会社の株をなぜ買うんです？　会場を出たらすぐ売ってくださいよ」と、平気で言いますからね。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "一番憧れるのは自然な人、素直な人ですね。どんな事象に対しても、まったく同じ態度で、素直に受け入れることができる。人間の能力のなかでは素直であることが一番高い能力であると思いますね。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "「私、わかったんです。じいちゃん、ばあちゃんが、ずっと私に言ってくれたことを」 　都会生活をしながら思い出したことばが、 「ちいちゃいころから、「そのまんまでいいんだよ」「かっこつけなくていいんだよ」って、言ってたのを聞いていた」 　それを思い出して、この地域に戻ってきた。そして今、とても生きやすいという。都会へのあこがれはかっこつけだったと結論付けた。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "当社のアンバサダーは自然体で素朴な人が多い。そういう人が画面に出てくるとホッとするし、自分にもアウトドアができるかもしれないと感じさせるので、アウトドアの裾野が広がる。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "取材時の写真チェックなど厳しい人も多いのですが、僕はこの 20 年自分の写真チェックをしたことがありません。それどころか、着ている服もほとんど同じです（汗）。スタイリストもマネージャーもいません。ですので、虚像を売っている人は、なにかあったら、すぐに消えていく人が多いですし、本来の生きる力が乏しいと感じます。しかし、僕の場合はなにもしてませんので、なにかあっても、ほとんど気にせず、日々を送ることができます。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 262, "label": "人間理解", "freq": 5, "highlights": [{"text": "経営者にとって一番重要なものを１つだけ挙げろ」と言われたら、「人間に対する洞察」", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "みんな互いのことをよく知っている。良いところも悪いところもよく知っている。どうしてそういう行動をとるのか、大声をあげるのか、悲しむのかを知っている。みんなそういうのを認知症のせいにしないで、長年培った絶妙な人間関係の中で対処する。そうなるとものすごくひどいことにはならない。そうなると抗精神病薬の出番はほとんどなくなる。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "私たちはニーズを見出し、それにデザインで応えるのが難しい理由を自問する時期に来ているといえるだろう。人間の抱える基本的な問題とは、人間は不便な状況に適応するのに長けているということ", "book_title": "デザイン思考が世界を変える〔アップデート版〕　イノベーションを導く新しい考え方", "author": "ティム ブラウン、千葉 敏生"}, {"text": "マーケットとは、生身の人間同士が取引をする場所です。人間の行動が何に動機付けられているのか、そのことに対する深い洞察なしに、マーケット感覚を身につけることはできません。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "① クラフトマン（職工型＝専門分野にのみ心を奪われるタイプ） ② ジャングル・ファイター（一匹狼型＝モーレツ主義） ③ カンパニーマン（会社人間型＝組織重視） ④ ゲームズマン（ギャンブラー型＝勝利にのみ満足を求める）", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}]}, {"id": 263, "label": "システム設計", "freq": 5, "highlights": [{"text": "世間に出回るお金の量を意図的に増やして景気を刺激したり、意図的に絞って過熱気味の景気を抑えたりする金融政策は、各国で日常的に行われていますが、ビットコインには中央銀行がないので、流通量をコントロールするという発想がありません。そのため、どこか特定の国の思惑に左右されることなく、安定的に流通量が増えていきます。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "２１００万枚発行された時点で打ち止めになります。計算上は、２１４１年にすべてのビットコインが掘り尽くされる予定です。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "これは、翼を腕にくくりつけ、高い場所から力一杯羽ばたいて飛びおりた古代の人びとが、例外なく失敗したのに似ている。夢を抱き、必死に努力したが、強力な自然の力に逆らっていたのだ。この戦いに勝てるほど強い人間はいなかった。飛行が可能になったのは、人間が、世界の動きをつかさどる自然の法則や原理、すなわち重力の法則、ベルヌーイの原理、揚力、抗力、抵抗の概念を理解するようになってからのことだ。その後、これらの法則や原理と戦うのではなく、それを認め、その力と調和する飛行システムを設計することによって、人間はついに、かつては想像もできなかった高度と距離を飛行できるようになった。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "しかし、自然な出会いから結婚に至る場合、そこまで厳密に年収を気にする女性は、ほとんどいません。といっても、誤解のないように。年収２００万円と１千万円の男性が目の前にいたら、その理由で後者を選ぶ女性はたくさんいます。ですが、年収２９０万円の男性と、３１０万円の男性がいたとき、その差が決定的だと感じる女性はいないのです。 それにもかかわらず、検索画面の選択肢に「年収３００万円以上」とあれば、それを選んでしまうことは十分にありえます。そしてこういったシステムにおいては、２９０万円と３１０万円の差は、決定的な差（その男性に会うか会わないかという判断を変えてしまう差）になってしまいます。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "こうした無限にさかのぼる「高次のジレンマ問題」を世界で最初に実験で取り上げたのは、北海道大学の山岸俊男教授でした。この根本的な問題は、モノやサービスに対してコストを支払わずその利益だけを享受する、ただ乗り問題(free-rider problem) と呼ばれ、社会的なシステムをどのように設計するかを考えるうえで重要なを握ります。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}]}, {"id": 264, "label": "タイミング", "freq": 5, "highlights": [{"text": "私は社員に「これから来そうだという技術は習得しておき、使うべきときが来るまでは無理して使わないように」 という指示を徹底している。こう言い続けないと、技術濫用の罠に陥ってしまうから", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "大企業は、新しい市場が「うまみのある規模に成長する」まで待つことが多い。しかし、第六章で述べる事実は、この戦略が成功しないことが多い理由を示している。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "ピクサーは、最先端の技術とオリジナルのストーリーテリングを柱に持つ前代未聞の映画スタジオだ、とスティーブは言った。そして『トイ・ストーリー』公開の一週間後に株式を公開した。このタイミングでピクサーの本気を疑う人は誰もいなかった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "なぜ、こんなにも〝確認画面でアップセル〟 は効果があるのか？ それは申込の判断をして、面倒なフォームを記入して、完了まであと一歩のところでアップセル商品を提案するからだ。 まさに、お客様の心理状態をうまく利用していると言える。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "たとえば、 10 時くらいに初回申込をしたお客様には、それ以降のフォローメールを〝 10 時台〟に送るのである。 その時間が、その特定のお客様がネットにアクセスしている時間帯である可能性が高いし、消費意欲がある時間帯である可能性が高い。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}]}, {"id": 265, "label": "文化体験", "freq": 5, "highlights": [{"text": "東南アジアやアフリカを旅していると、ひととの距離がとても近いと感じる。もちろんバンコクのような都会では少し距離を感じるが、ほんの少し地方に行くと、ひととの距離はずっと近い。外国人がいないような地域に行くと珍しがられて周りにひとが集まる。ひととひとは簡単につながるのだとわかる。ひとはコミュニケーションをとる生き物だということを思い出す。 　旧海部町を歩き、私はふと、そういう雰囲気を思い出していた。あいさつをすると、あいさつが返ってくる。それだけで話が弾むことはないが、少しこちらから会話を続けようとすると、少し続く。それはとても自然で、コミュニケーションに慣れていることを感じる。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "このような結果をふまえると、日本が「観光立国」になるために強化すべき点、つまり現状ではあまりきていないヨーロッパ、オーストラリアからの観光客を増やすために何をすべきかということが、おのずと見えてきます。 　それは彼らの関心が高い「日本文化の体験」や「神社仏閣という歴史的資産」をしっかりと整備すること。つまり、文化財を整備するということになります。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "お金を落としてくれる先進国の観光客の目的の 1 つは、勉強です。彼らは、旅行先の国について知りたい、教えてもらいたい、体験したいと思っています。刺激がほしいのです。また、人間による再現、イベント解説などは、海外の観光地では一般的ですから、当然、日本にもそれを期待しています。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "外国人が日本に訪れる目的の 1 つは、日本に関して「知識」を得ることです。そういう意味では、文化財は日本文化、芸能の知識を得る場所であることはもちろん、体験する、体感するための場でもあります。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "僕が行っているのは、スリランカの首都コロンボから南に４、５時間ほど行った『バーベリンビーチ』です。アーユルヴェーダを効果的に体験するには、最低２週間必要だと思います。", "book_title": "白本", "author": "高城剛"}]}, {"id": 266, "label": "世代継承", "freq": 5, "highlights": [{"text": "「私、わかったんです。じいちゃん、ばあちゃんが、ずっと私に言ってくれたことを」 　都会生活をしながら思い出したことばが、 「ちいちゃいころから、「そのまんまでいいんだよ」「かっこつけなくていいんだよ」って、言ってたのを聞いていた」 　それを思い出して、この地域に戻ってきた。そして今、とても生きやすいという。都会へのあこがれはかっこつけだったと結論付けた。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "このような地域を旅して思うのは、老人訓のすばらしさと、その出会う機会の多さだ。老人たちはいろいろなことを知っている。その老人が排除されていない地域であるから、老人のことばが地域に残っている。老人たちは尊敬されている。 　風間浦村で聞いた、 「かっこつけなくていい」 と若いひとに伝える老人。生きる上で大切なことばは、このように伝承される。そのことばの意味を若者は少し人生の苦労をした後で実感して、そして若者は少し生きやすくなる。何かに迷ったときに老人のことばが生きてくる。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "「この島では、ひとは家で死ぬのです。特養にいても、死ぬときは家に戻ります。みんなに見守られて死ぬ。子どももその死を目にします」 　ひとは生まれて、生きて、そしていつかその一生を終える。その流れの中で決して孤立しない。その孤立しない姿を、生き様と死に様を地元のひとたちは見ていく。ひとの生死を知っている。だからもしかしたら、多くの 問題 は許されるのかもしれない。 「特養でひとが死ぬことになったとしても、それをほかのおとしよりに隠すことはしません。みんなで見送ります」 　認知症の要介護のひとがいる特養だから、どうせ忘れちゃうから、恐怖心を与えたくないから、などいろいろな理由で他の入居者の死は隠されるのが一般的かもしれない。しかしここでは、死への旅路をみんなで見送る。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "加盟店とは長期的なおつき合いになる。みなさん 72 歳の定年まで続け、子どもたちに引き継ぐ。いまや親子２代はあたりまえだ。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "個の命が失われても、これまで何十万年も存在する生命の潮流のようなものが、たとえば人類と呼ばれる命の潮流が存在し、そこを人が生まれては死に、生まれては死にという形で命が綿々と続いてきているのだと思います。その命の潮流は物理的に存在しているわけではありませんが、われわれの経験は人類の知恵という形で、次の世代その次の世代へと受け継がれて、その潮流の中にしっかりと残っていくというのが、ぼくの命の考え方です。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}]}, {"id": 267, "label": "需給バランス", "freq": 5, "highlights": [{"text": "人口が減るということは、労働力が供給されないことを意味する。ローカル経済圏においては、他の場所から労働力が補われることはほとんどないので、その場所にいる労働力が供給源になる。つまり、ローカル経済圏のサービス産業では、労働力の供給は硬直的である。需要が小さくなれば供給過剰になり、マーケットが飽和すると考えるのはトレーダブルグッズの発想だ。このゾーンでトレーダブルグッズの発想は意味を持たない。 　前にも述べた通り、経済学の根底にはトレーダブルグッズで発想する習慣がある。サービス業などの非貿易財の経済学は、世の中に存在しないに等しい。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "マーケット感覚のある人は、「どんなによい商品を作っても、供給者が多すぎると儲からない」と理解しています。そしてダイソンやアイロボット（ロボット掃除機・ルンバの開発メーカー）のように、他社とはまったくコンセプトの違う商品、すなわち、他の供給者が提供できない商品を作ろうとするのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "市場化が進む社会で高く売れるのは、「よい商品」ではなく、「需要に比べて供給が少ない商品」なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "弁護士の需給バランスが大きく崩れたことに気がつかないまま、「資格をとれば一生安心」と考えていた人は、現実の厳しさにびっくりしていることでしょう。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "ところがこの間、医師への需要は大きく増えました。高齢化の進展で病気になる人が増え、栄養過多と運動不足で生活習慣病も増えています。晩婚化による高齢出産の増加に伴い、自然分娩が多かった出産にも高度な医療が必要となりました。夜間に活動する人が増え、夜の急患も増加。最近はストレスで精神科を受診する人も多いし、昔なら「寝ていれば治る」と言われた風邪でも、病院を訪れる人が増えています。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}]}, {"id": 268, "label": "経営手法", "freq": 5, "highlights": [{"text": "ローカル経済圏の中核にあるサービス産業において、労働生産性を上げるためのアプローチは「ベストプラクティス・アプローチ」が望ましい。ベストプラクティス・アプローチとは、別の企業や事業体が行う似たようなパフォーマンスを自社に取り入れ、労働生産性を上げることを意味する。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "持続的技術に対応するために開発された計画とマーケティングの手法を、まったく異なる破壊的技術に適用することは、翼をつけた腕で羽ばたくようなものだ。", "book_title": "イノベーションのジレンマ 増補改訂版 Harvard business school press", "author": "Clayton M. Christensen、伊豆原 弓、玉田 俊平太"}, {"text": "すばらしいアイデアがひらめくという大きな幸運がめぐってくるまで、じっと待たなくてもよい。カリスマ的指導者が登場しなければ、ビジョナリー・カンパニーにはなれないという、誤った考えに苦しむこともない。神秘性も、つかみどころのない魔法も、必要ない。基本的な点を学べば、自分たちの会社をビジョナリー・カンパニーにする困難な作業に、だれでも、いますぐ、とりかかることができる。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "このとき重要なのは「しない経営」で企画をつくる ことだ。 「目標は少なく」「人をかけない」「お金をかけない」「期限を定めない」の４つの「しない」でスタート し、目標を達成するまでやりきる。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "それを象徴するのが、 「ＭＢＷＡ」（Management By Wandering Around）と呼ばれる 　マネジメント手法です。 　これは、かつて、ピーターズとウォータマンの 『エクセレント・カンパニー』という本のなかでも紹介された 　欧米企業におけるマネジメント手法ですが、 　職場を徘徊（wandering around）するだけで、 　職場に潜在する問題を直観的に把握するマネジメント手法のことです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}]}, {"id": 269, "label": "制度改革", "freq": 5, "highlights": [{"text": "労働の流動化について議論するとき、必ず出てくる疑問がある。 「本当に雇用は流動化するのか」", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "民主党は戦後日本を作りあげてきたそれまでの「官僚内閣制」に対し、「政治主導」を掲げて政権交代を実現した。もっとも、その「政治主導」が一体何を意味しているのか、具体的な形はさほど明確なものにはならなかった。しかし、実はこの政治主導がポピュリズムの源泉ともいえるのである。ここに、小泉純一郎的なポピュリズム政治を否定するところからはじまった民主党政権が抱えた困難があった。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "したがって、民主党内閣が掲げた「政治主導」は、時代の文脈のなかで、それまで「合理性」を担保するものとしての官僚制が逆説的に「非合理的」になってしまった状況をまずは 糾すことで、政治に対する信頼を取り戻すことを目的にしたものだったといえよう。 　この政治主導の", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "さらに、株主権を行使できるのは、五年以上株式を保有している者だけとして、それ以外の短期のデイトレーダーなどは経済的便益の配当金およびキャピタルゲインを得るだけの機会しか与えないという明確な規定をつくってはどうか。中長期的な視野に立った経営こそが王道であるから、中長期の企業の方向性を支える株主だけを株主と定義するのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "本書をお読みのメディア関係者の方々、国会議員や警察関係者の皆様、どうか消費者利益のために路上と同じようにネットダフ屋を取り締まる体制整備へ向けて声を上げて下さい！", "book_title": "ＵＳＪを劇的に変えた、たった１つの考え方　成功を引き寄せるマーケティング入門 (角川書店単行本)", "author": "森岡 毅"}]}, {"id": 270, "label": "交差点", "freq": 5, "highlights": [{"text": "● 職の多様化 ● 多様な構成のグループ ● 交差点ハンティング", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "二つの異なる分野が結びつくことによって、ユニークな概念の組み合わせが飛躍的に増加し、さながらアイデアの爆発といった状況が生まれるのだ。いいかえれば、もし生産的であることがイノベーションを起こす最良の戦略であるなら、交差点こそ、それにもっとも適した場所だということにある。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "これこそが「メディチ・エフェクト」の核心をなす。連想のバリアを壊し、異なる分野間の交差点に身を置くことで、アイデアの組み合わせの可能性は、ひとつの分野にとどまったときとは比べものにならないほど増加するのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "世の中をアッと言わせるような革新的、イノベーティブなアイデアは、異なる分野や文化が出会う場所──「交差点」──で生まれるというのである。一", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "そのことにあやかって、著者は異なる分野や文化が出会う「交差点」で画期的なアイデアが生まれることを「メディチ・エフェクト」と呼んでいるのだ。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}]}, {"id": 271, "label": "購買行動", "freq": 5, "highlights": [{"text": "とてつもなく浸透していること」よりも、これによって「あらゆる消費者の購買行動のデータが取れるようになった」ことが重要 です。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "例えば「家の冷蔵庫にある牛乳が切れてしまって補充しなければいけない」という状況が発生したら、「どこで買おうかと考え、近くのコンビニでいいやと思い、その購買が終わるまで」を1つのモーメントとしています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "価値観が近い人が愛用しているモノは自分も愛用する可能性が高い", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "つまりオフラインで選択し、オンラインで購入する形だ。また、スクールバスを改造した「移動店舗」を走らせ、全米各地を回るというユニークなチャネルも展開している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "１つは消費者はどのようにして購買意思決定に必要な情報を集めているのか、もう１つは商品はどのようにFulfill（運ばれる／満たされる）されるのか、である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}]}, {"id": 272, "label": "顧客獲得", "freq": 5, "highlights": [{"text": "その背景には、オンライン上での顧客獲得単価が上がり過ぎてしまい、リアルの顧客データのほうが高効率になった、という事情があります。実店舗や路上を活用したサービスを提供したほうがデータを集めやすい、というわけです。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "グロースを考えるうえでの基本となるフレームワークとしては「①新規獲得、②ユーザーをアクティブにすること、③脱退者を減らすこと」の三点が挙げられます。 　ネットサービスに限らず、一般のビジネスでも同じです。 「①新たな顧客の獲得、②リピーターになってもらうこと、③飽きさせずに顧客として 摑 んでおくこと」 です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "価格提案は、諸刃の剣だ。アマゾンのように、幅広い商材をすべてアマゾンで買ってもらうことが狙いなら、一定の会費を課金して全員に対する価格提案を行うことも可能だろう。しかしそうではない場合、購入金額に応じたインセンティブ付与は、単なる値下げになってしまう。 　 重要なことは、自社が獲得したい顧客はどんな人々で、どんな行動を獲得したいのかを明確にし、そのためにどんな行動データを獲得するのか、である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "メガマックやクォーターパウンダー、最近では「Big America」シリーズがその好例ですが、そういった消費者を「驚かせる」ような新商品を出し、消費者の関心をぐいっと引き寄せて爆発的にヒットさせる。でも、それだけでは「儲からない」んです。 　なぜか。消費者の認知を集めるために、大きなプロモーションコストがかかるからです。じゃあなぜ奇抜な新商品を出し続けるのか。それは、その集客力でキャッシュカウを育み続けるためです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}, {"text": "普段あまりマクドナルドに足を運んでおられない方が、「クォーターパウンダー」という新商品の魅力で足を運ぶ。１時間目にお話ししたように、ＱＳＣ（＊９） の水準を高めていれば、その「新規顧客」は「マクドナルド、いいじゃないか」と認知してくれて、また来訪してくれる。その顧客は、いつかキャッシュカウであるビッグマックを注文してくれます。そこできちんと利益が取れるわけです。 　つまり、極論すれば「ビッグマックをどれだけ買ってもらえるか」を指標として経営の舵取りをしていく、ということです。サイドメニューの開発、新デザインの店舗の出店、ドライブスルーの拡充、コーヒーの無料配布。様々な手を打ち続けていますが、いずれも「ビッグマックを買ってもらうため」と言うこともできるんです。", "book_title": "成功を決める「順序」の経営", "author": "原田泳幸"}]}, {"id": 273, "label": "信頼構築", "freq": 5, "highlights": [{"text": "これによって空いた時間は、より信頼を創るコミュニケーションに当てることで、ユーザー側にも企業側にもメリットがある仕組み", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "ファンの支持を強くするための 3 カ条 ・その価値自体を、アップさせること ・その価値を、他に代えがたいものにすること ・その価値の提供元の評価・評判を、アップさせること", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "唯一の対抗策はすべての施策・接点・活動において、誠実であること だ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "インテリジェンスの世界で信頼関係をつくる方法は三つあると思うんです。ひとつは一緒に女遊びをすること。もうひとつは一緒に糞をするとか、排泄行為をする。ロシアではサウナからよく見える野外で一緒に野糞をしたりします。それから一緒に食事をすることですね。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "性悪説にもとづいて、相手を利用することだけを徹底的に考えている。だからこそぎりぎりの信頼関係が生まれるわけです。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 274, "label": "付加価値", "freq": 5, "highlights": [{"text": "もう1つは「個別化」です。デジタル上で常時接続してユーザーの行動データが取れているからこそ、「ユーザーが困っている瞬間とその困りごと」が、前後関係やその人の特性を含めて理解可能になります。 正しいタイミングで、正しい形で適切なサポートを提供できる。それが、ユーザーとのさらなるエンゲージメントを生み出し、付加価値となるのです。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "ボノボスの例でもそうだったが、チャネルの進化とは、必ずしも店舗の無人化を意味しない。オンラインを柔軟に組み合わせたチャネル設計によって、オフライン店舗のタスクをシンプルにできれば、顧客にとって価値のある接客に集中できるようになる。すなわち、そこで求められるのは接客の高度化であるということだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "弁証法の「螺旋的発展」とは、何か。 　 それは、単なる「復活」や「復古」ではありません。 　 それは、単なる「古い機能」への揺り戻しではありません。 　 そこには、かならず、「新たな価値」が付け加わっているのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "これではっきりおわかりいただけると思うが、技術の議論なくして付加価値の高いサービス業は成り立たないのだ。脱工業化社会とか、サービス産業化社会とか、金融立国などという、聞こえのよいもっともらしい言葉はまやかしにすぎない。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "これに対して、真っ向から批判を挑んだのが、堺屋太一です。 　堺屋は、その最も有名な著書『知価革命――工業社会が終わる　知価社会が始まる』（1985年）の中で「これからの商売で大切なのはモノそのものではなく、それに付加される知的価値である」と主張しました。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 275, "label": "現実逃避", "freq": 5, "highlights": [{"text": "【今回は〝推し活〟と経済効果が番組の主題だと伺いましたが、正直、経済効果というのはあくまで結果論というか】 「黙れ！ 気狂い重課金勢に頼りまくってるくせに！ そのへんお前が一番わかってるだろ！」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "それは多分、と、国見が続ける。 「我を忘れて何かに夢中になっているほうが、楽だからです」 　楽。 「ずっと我に返ったまま生きるにはこの世界は殺伐としすぎていますし、人間の寿命は長すぎますから」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「物語への没入というのは、手っ取り早く我を忘れるために有効な手段の一つなんですよね」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「だからオーディション期間中は誰とも連絡を取らないようにしてました。わざと外からの情報を遮断して、自分がデビューするまでの物語を信じ込むようにしてました。無理やりその世界に没入するっていうか、視野をわざと狭めて、とにかく我に返らないようにしてました」 　物語を信じ込む。 　その世界に没入する。 　視野をわざと狭める。 　我に返らないように。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "まあ核の話を「ちょっとした失言」なんて言うと、また青筋立てて怒り出す人がいるかもしれない。「被害者感情を踏みにじる発言」だ、と。現実の問題より、人の気持ちを踏みにじるとか、何を言った言わないということの方が、よっぽど問題になるというのが日本という国の特徴なのかもしれない。", "book_title": "超思考", "author": "北野武"}]}, {"id": 276, "label": "集団心理", "freq": 5, "highlights": [{"text": "「同じ対象を強く推す仲間との結束は、視野をさらに狭めてくれますからね」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「ファンダムとは、程度の差はあれどすでに多少は視野が狭まっている人間の集まりです。その人間たちが、拡散や連帯との相性が良すぎるＳＮＳという場所に集っているんです。私たちは今後そこに意図的に物語を提供していくわけですから、集団心理の暴走が起きないよう細心の注意を払う必要があります。そのためにも、点描でいいので、ファンダムの全体図を把握する作業は大切なんです」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「歴史上の殆どの戦争は、自衛意識から始まっている」 　と言った。そして、 「戦争を起こすことはそれほど難しくない。国民に対し、我々は攻撃されかけているのだと危機感を 煽り、平和主義者には愛国心が欠けていると非難すればいい」 　と続けた。 「これはナチスの最高幹部、ヘルマン・ゲーリングの言葉です。この国の存続が危ない、近々攻撃される可能性が高い。そんな危機感は強烈な自衛意識を生み、人々にこれまでの判断基準を更新させる。そういう話です」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "自分一人がみんなと違う考えをもっているのではないかと誰もが同時に思い込み、周囲に同調してしまう社会的現象を、社会心理学では、多元的無知(pluralistic ignorance) と呼びます。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "そもそもなぜみんな気を散らすものにとりつかれているのか？ それは、みんながやっているから だ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}]}, {"id": 277, "label": "信仰", "freq": 5, "highlights": [{"text": "国見が一口、水を飲む。 「結局皆、信じるものが欲しいんだと思います。特に、この社会は生きづらい、自分はこの世界に不当に扱われていると感じている人ほど」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "「やっぱさ、人間って完全な無宗教状態で生きていくのって難しいんだよ。何かを信じてたほうが楽っていうか。MBTIの爆 流行りとかもそうじゃん？ 皆こぞってアテにしてさ、ＩだからこうとかＰだからどうとか目の前の現実より診断を信頼したりして。道標が欲しいんだよね、何でもいいから」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "そのため、近代のキリスト教が公言してはばからないもう一つの律法「金銭は力なり」に対して、サムライの子であるからには毅然として異議を唱えるのは、私の当然の務めであります。まことに、たとえこの世の全キリスト教信徒が反対側に立ち「バール・マモンこれぞわが神」と唱えようと、神の恩恵により真のサムライの子である私は、こちら側に立ち言い張るでありましょう。「いな、主なる神のみわが神なり」と。", "book_title": "代表的日本人 (岩波文庫)", "author": "内村 鑑三、鈴木 範久"}, {"text": "産業革命と同時に宗教は死にました。 　もちろん、死んだといってもその影響力が完全になくなったわけではありません。それどころか世界の大半では、いまだに最大の価値観の一つなのです。 　しかしあの、人々が無批判に宗教を信じていた時代はもう、永遠に返ってきません。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "これら研究の成果がメンデルの遺伝の法則だったり、万有引力だったり、ケプラーの法則だったりするのです。これらの発見はたいてい、神様を信じ、神の御わざを見ようという 敬虔 な信者たちによってなされたのです。 　ところが、このような", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 278, "label": "パフォーマンス", "freq": 5, "highlights": [{"text": "「やらなくては」ではなく「やると決める」。 「どれも大事」ではなく「大事なものはめっ
