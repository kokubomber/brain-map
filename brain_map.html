と、１店舗では得られない「ネットワーク価値」である。ＴＳＵＴＡＹＡの成長はまさしく、この２点にある。", "book_title": "TSUTAYA　破壊と創造―週刊東洋経済eビジネス新書No.145", "author": "週刊東洋経済編集部、杉本 りうこ、池田 梢、三隅 多香子、中野 法子、筒井 幹雄、小林 由依"}, {"text": "デジタル世界のルーツは、ビットと情報、ネットワークの持つ物理的欲求と自然の性質に根差している。どの場所にあろうとも、どの集団や政治形態でも、ビットとネットワークのこうした基本的構成要素が繰り返し同じような結果を生み出すだろう。そうした不可避さは、内在する基礎的な物理法則から来る。", "book_title": "〈インターネット〉の次に来るもの　未来を決める１２の法則", "author": "ケヴィン・ケリー、服部 桂"}, {"text": "「企業はある一定のネットワークのなかで経験を積むと、そのネットワークに特有の要求に即した能力や組織構造、企業文化を形成する傾向がある」と", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "方向的イノベーションにはバリューネットワークが不可欠である。しかし交差的イノベーションを追求する場合、それは往々にして足かせになる。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "企業も同じことだ。すでにできあがった企業は、独立性の高い新しい部門を生み出したり、子会社や事業部を分離独立させたりすることで、既存のネットワークから脱却する必要があるかもしれない。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "「市民の美徳は、互恵的な社会関係の濃密なネットワークの中にはめ込まれたときに最も強力になる。高潔だが孤立した個人の多くいる社会は必ずしも社会資本が豊かではない」とパットナムは書いている。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "当時ペイパルの上級幹部だったリード・ホフマンだった。彼は幹部クラスから個々のエンジニアに至るまでスタッフ全員に、各自のネットワークを活用して、ビルポイントの戦略を探るよう命じた。一方、ビルポイント側の担当チームは、ペイパルの戦略を読み取るのにネットワーク情報収集力の活用を一切考えなかった。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "面接では、仕事において最も助けてくれる人について聞くといい。採用候補者の問題解決のやり方を探り出すのだ。自分の人脈にいる専門家に電話をかけるタイプだろうか——。また、組織の外部からネットワーク情報収集力の使い方をよく心得た人材を採用するだけでなく、経営陣がネットワーク力を重視する姿勢を示すことで、組織の内部に対しても「ネットワーク力が重視される」という強烈なメッセージを送ることになる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "幹部クラスの採用では、相手のネットワーク力を正しく評価する必要性がさらに高まる。幹部候補者の面接時、リード・ホフマンは必ず次の質問をする。「あなたが入社したら、あなたが次に採用したい人は誰ですか？」。優れた人材であれば、自分と一緒に働きたいという人をネットワーク上に何人も抱えているはずだ。面接後、名前の挙がった人物にホフマンが連絡を取り、当の幹部候補者の人物評を聞くことも多い。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "リンクトインにも似たようなプログラムがある。業界内のデキる人物との昼食は経費で落としていい。ただし、そこで得た情報の簡単なレポートを領収書と一緒に提出することが条件だ。これは昔ながらの人事部慣行とアライアンスとの見事な融合である。どちらのプログラムも大して時間や手間はかからない。簡単な施策一つですむ話だし、かかる費用も最低限だ。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第３条 ネットワーク情報収集力 ［原則］ あなたが仕事で培う人脈は、あなたとあなたのキャリアにとっても、私と当社にとっても、価値ある資産です。 仕事上の課題を解決するためには、知識や知見が欠かせません。人は、社内・社外を問わず、貴重な資源です。 当社と私は、あなたが自分の人脈を築き、維持するための時間を差し上げます。そのかわり、自分のコミットメント目標を達成し、当社に成功をもたらすためにその人脈を役立ててください。 〈期待水準〉 私は、何が「非公開かつ社外秘でない情報」にあたるのかを明確に示します。あなたは、それをご自身の人脈ネットワーク上で伝えてもかまいません。 リンクトインやツイッターなどのソーシャルメディア上であなたが活発に活動し、人々の目につきやすい存在となるために、遠慮なく会社の備品（コンピュータやスマートフォンなど）を使って勤務時間内に仕事上のソーシャル・ネットワークを広げてください。なお、このことをわざわざはっきりと公表する必要もありません。 仕事上のネットワーク構築に役立つとあなたが判断するのであれば、どのようなイベントや会議、会員組織であっても出席費や会費として総額《具体的金額》までは経費として自由に使ってください。…", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "第３条 ネットワーク情報収集力 ［原則］ あなたが仕事で培う人脈は、あなたとあなたのキャリアにとっても、私と当社にとっても、価値ある資産です。 仕事上の課題を解決するためには、知識や知見が欠かせません。人は、社内・社外を問わず、貴重な資源です。 当社と私は、あなたが自分の人脈を築き、維持するための時間を差し上げます。そのかわり、自分のコミットメント目標を達成し、当社に成功をもたらすためにその人脈を役立ててください。 〈期待水準〉 私は、何が「非公開かつ社外秘でない情報」にあたるのかを明確に示します。あなたは、それをご自身の人脈ネットワーク上で伝えてもかまいません。 リンクトインやツイッターなどのソーシャルメディア上であなたが活発に活動し、人々の目につきやすい存在となるために、遠慮なく会社の備品（コンピュータやスマートフォンなど）を使って勤務時間内に仕事上のソーシャル・ネットワークを広げてください。なお、このことをわざわざはっきりと公表する必要もありません。 仕事上のネットワーク構築に役立つとあなたが判断するのであれば、どのようなイベントや会議、会員組織であっても出席費や会費として総額《具体的金額》までは経費として自由に使ってください。...", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 50, "label": "幸福論", "freq": 12, "highlights": [{"text": "みんながお悩みを送ってくれて、それにポインティが答えるのも人間関係だし、仲のいい友達と遊ぶことも、ポインティと仕事を一緒にしてくれる人もそう。「巡り合ってよかったな～！」とかさ、 そういう奥行きが楽しいんだよね。 でね、老後はもう思い出し笑いしかしたくない（笑）。", "book_title": "おいでよ ポインティの相談天国", "author": "佐伯ポインティ"}, {"text": "最期の最期まで独りで生きることを貫いた人が〝幸せだった〟と証言する姿を目撃できる機会はない。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "人は困難を克服することで幸福になれる のです。", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "人は困難な時期があるからこそ、より大きな喜びを感じられるようになるということを忘れてはなりません。 　困難こそが、人生におけるすべての喜びへの感謝の気持ちをつくり、この感謝の気持ちこそが、真の生きがいや喜びの源になるのです。", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "心の寛容さをもつこと、つまり他人と与え分かちあう生き方をすることは、無限に蓄えられた「精神と感情の富」を引き出す最良の方法なのです。 　寛容さから得られる感情的、精神的な報酬は、「与える」ことそのものからもたらされます。 　 まわりの人と多くのものを分かちあい、他の人の人生に貢献すること以上に満足感を得られる行為はありません。", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "幸福というものは人生における客観的な出来事で決まるのではなく、出来事をどのように解釈するかという主観的な心の働きによって決まるもの だ", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "アリストテレスの幸福論では、人生の最終的な「目的」は幸福になることだとされています。お金を稼ぐこと、有名になること、モテることなどはそのための「手段」であり、ゴールそのものではない、という考え方です。何が自分にとって幸福なのか、その答えは一人一人違いますが、アリストテレスの言うように、社会生活の中で自己実現をすることが幸福なのだとすると、ヘッジファンドのオーナーたちは、前段部の「社会生活」では輝かしい成果を叩き出していますが、後段部の自己実現はどうなのでしょうか。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "じゃあ生きるにおいて本当に大事なことは何かというと、「一人で孤立せずに社会や他人との 繫 がりを持ち続けること」と「自分が何を好きか、何をしているときに一番充実や幸せを感じられるかをちゃんと把握すること」の二つだと僕は思う。孤立しないことと充実感を持つこと、それが仕事や会社や家族とうまく一致していれば問題はないんだけど、それはしばしば一致せずにズレてしまって、人を幸せにするためにあったはずの仕事や会社や家族が人を縛って苦しめたりするから厄介なのだ。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "そんな中で自分が確実に残せるのは何か。星野社長は答えを探した。そして気づいた。 　社員やその家族に対して、堂々とした姿勢を残せばいい──。 「星野リゾートの社員は、人生の大切な時間をこの会社で過ごし、そしていつか会社を去っていく。そのときに『星野リゾートで過ごせてよかった、あの職場はとても幸せだった』と思ってもらえるようにしたい」。これが星野社長の思いである。", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}, {"text": "考え方の角度をちょっと変えてみてはどうだろうか。男も女も、相手を、家族を、幸せにして「あげる」こと、そこに「幸福」を見出せはしないだろうか？　自分の存在意義をそこに見つけたとき、世界の見え方や相手の見え方が変わりはしないか？ 　ある既婚者の女性が「相手だけではなく、相手のご両親や家族みんなに歓迎してもらった。私を必要としてくれる人が一気に何倍にも増えた。予想外のシアワセ」と言っていたのは印象的だった。 　何よりもいいのは、これらは自分の考え方や受け止め方一つで制御可能だということ。自分の考え方で、自分の手で、自分の気の持ちようで「幸せ」になれるからである。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "（１）社会全体が巨大な変化の時期を迎えている。 （２）そのため、従来の価値観が全体として明らかに破綻しつつある。 （３）変化している価値観を特定するために若者の嗜好を観察すると、価値の中心に「自分の気持ち」を置いていることが分かる。 （４）「自分の気持ち」が第一なのは、既存の価値観では、幸福が追求できないことが明らかだからだ。 （５）彼らや私たちの価値観変化の中心には、私たちを幸せにできない「科学」と「経済」への信頼の喪失があることが分かる。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "「働く理由」「働く意味」が失われてしまうと、もう「とにかく最小労力で最大利益を上げること」が唯一の回答になってしまいます。 「科学」に対しての「科学や合理主義は、私たちを幸せにする」という価値観が崩れたから、科学は信頼を失った。 　同じように「経済」も、その内部に「一生懸命働くことが、みんなの幸せにつながる」という価値観を含んでいないと、信頼を失ってしまうのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 51, "label": "共同体", "freq": 12, "highlights": [{"text": "緩やかな共同体型で、人格円満で模範的なムラ人からみんなで社長を選び、選ばれた人はみんなが何となく幸せになれるように経営を進めるという日本型「カイシャ」モデルは、完全に農耕社会の仕組みである。現代の日本企業のような組織は、戦国時代ではあり得ない。当時は力のある人物が権力を握っていたから、何となく決まるということは起こらない。権力者とそうでない者の間には絶対的な主従関係がある。権力者に腹を切れと言われたら、何があっても切らなければならない。そうなっていないということは、日本人に流れる 通奏低音 的な文化は、どう考えても農耕文化なのである。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "「楽曲やパフォーマンスのクオリティも大切だけど、そういうものを全部まとめて乗せられる船代わりの物語があると、ファンダムの結束度が全然違うんだ」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "だから「社会が国家を道具とする」近代では国民国家（nation-state）の形が必然だ。国民共同体（nation）への価値コミットメントは、自生的だろうが注入的だろうが事実的な歴史であるほかなく、論理的な正当化だけでは済まない。例えば日本における維新後の近代化では、天皇という表象が国民共同体（nation）の事実的な形成に使われた。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "前者について言えば、階層原理が崩れて財配分や婚姻マッチングが市場化されれば、必然的に流動性が高まり、財や婚姻の非流動性を前提にしたコミュニケーションが不可能になる。自立的共同体がスポイルされて自立的個人がダメになる現象の一端がここにある。ちなみに日本は「テレクラ」という形で世界に先駆けて大規模な出会い系マッチングを生んだ（本文で詳述）。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "この 15 年で私の認識は変化した。思えば、日本が見本としてきた先進社会がいま直面しつつある、社会の過剰流動性（共同体空洞化）に起因する問題の多くが、 30 年程前から日本で顕在化してきた。その歴史的事実の前提と帰結を注視し、 処方箋 を思考することは、日本という枠を超える意味を持つ。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "共同体が空洞化すれば個人化が進むので空気から自由になるようにも思えますが、実際には違います。共同体的作法が変わらない中で共同体が空洞化する", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "どんなに技術的に非合理でも「原発をやめられない社会」、つまり〈空気に縛られる作法〉が蔓延する〈悪い共同体〉に、どう対処するかを考えねばなりません。 　空気からの自立を処方箋とするか、空気への依存の利用を処方箋とするか、それを組み合わせるか。慎重な検討が必要です。僕は空気からの自立はあり得ないと思っています。いずれにせよ、何もかもが空気ベースの「様々なる意匠」でしかあり得ない〈悪い共同体〉が今後もかなりの期間続くだろうこと。これが〈終わりなき日常〉のもう一つのレイヤーです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "共同体自治や市民自治の不在ゆえに困難な支援物資配分を、ツイッターが助けました。それもあって「空洞化した地域や家族の共同性をネットの共同性が埋める」という幻想が拡がっています。こうした議論は、それ自体が〈システム〉への過剰依存ぶりを表します。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "レベッカ・ソルニットの著作『災害ユートピア──なぜそのとき特別な共同体が立ち上がるのか』で、国や時代を問わず、被災地で「相互扶助と平等分配の共同体」が立ち上がることが知られています。我々も前回の震災でそれを知っています。だが飽くまで一過性の共同体です。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "ダライ・ラマは「人間は社会的動物であり、社会の一員としてしか生きられない」と語った。その声は今でも僕の耳の奥で響いている。 　そう。僕らは社会なしに生きていけない。", "book_title": "経営リーダーのための社会システム論～構造的問題と僕らの未来～", "author": "宮台 真司、野田 智義"}, {"text": "地下アイドルとファンは、ライブハウスの中で一緒に出し物を盛り上げているようなもので、大人になってからも文化祭のような高揚感を共有できる関係なのです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}, {"text": "地下アイドルは自分の誕生日にライブハウスなどで生誕祭イベントをひらく風習があるのですが、その際に有志のファンによってお祝いするための「生誕実行委員会」が結成されるのです。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}]}, {"id": 52, "label": "生存戦略", "freq": 12, "highlights": [{"text": "それは多分、と、国見が続ける。 「我を忘れて何かに夢中になっているほうが、楽だからです」 　楽。 「ずっと我に返ったまま生きるにはこの世界は殺伐としすぎていますし、人間の寿命は長すぎますから」", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "遊びは、生きるために不可欠なものだ。 　最近の研究によると、動物は遊びを通じて主要な認知スキルを発達させているらしい。実際、遊びが種の生存を左右することもあるほどだ。 　 15 年間にわたってハイイログマの生態を研究しているボブ・フェイガンは、よく遊ぶ熊ほど長生きすることを発見した。彼はこう説明する。 　「世界はたえず変化し、未知の課題や不確実な状況を突きつけます。遊びはそうした変化への対応力を育むのです（ ４）」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "いまや本屋は、本なんて売っていても儲からない時代なのです。書店は、本ではなく、「本を選んであげること」を商品にしたほうがいい。そう気がつくマーケット感覚があれば、地方の小さな書店も生き残ることができるという好例です（ 図 16）。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "しかし、全体としての行動は「生き残りのためのシステム」として理解できる、という視点が、本書を通底する基本的立場です。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "生物種としてのヒトにとっての最大の適応環境とは、おそらく群れ生活そのものにあると考えられます。自然環境に適応するための手段として群れを選んだ結果、今度は群れの中でどう生き残るかについての新たな適応問題が生じてきたわけです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "オオクジャクサンという蛾の羽に大きな目玉の模様があることはよく知られていますが、この蛾を捕食するトリは、羽を広げたオオクジャクサンの目玉模様に一瞬ひるみます。こうしたひるみこそ、絶体絶命のオオクジャクサンに千載一遇の逃走チャンスを与えるのです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "文化に対して、ある意味で自分の身を守る防衛手段の一つとしてできてきたのが、自我だと理解するのがいちばんいいと思うんですね。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "逆に言えば、私たちの脳はコミュニケーションの力を発達させるように進化してきたのです。 　いま、確実に言えることは、 コミュニケーションがうまくできない人はこれからの人工知能時代では生きにくい という点です。", "book_title": "人工知能に負けない脳", "author": "茂木健一郎"}, {"text": "それは、水の生活では見られなかった、気象の変化──寒暑そして乾湿──のもたらしたもので、一年の一定の期間を「休眠」という形で過ごすものである。まだ半分しか上陸していない両生類では、陸地の乾燥と低温から身を守るために、そして、上陸は済ませたが、まだ変温動物のままの爬虫類では、陸地での厳しい寒気をやり過ごすために、それぞれ、そうした活動を一時的に休止する。いわゆる冬眠がこれである。", "book_title": "内臓とこころ (河出文庫)", "author": "三木成夫"}, {"text": "そして、現在目にすることのできる農耕開始前の社会は例外なく、これとよく似た基本構造を持っている。死と隣り合わせの過酷な環境で、とにもかくにも彼らが生き延びてこられたのは、社会的接触の緊密なネットワークと、彼らが維持する膨大な数の互恵的な責任のおかげなのだ。この自然の状態では、社会的なつながりと協力は、原始的形態の国家や一人のイギリス人哲学者によって押しつけられるまでもなかった。 自然こそがつながりなのだ。だから断絶は、社会のレベルだけでなく、細胞のレベルでも、深刻な調節障害やダメージを招くのだ。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "ユダヤ人ってのは、何千年も前から自分の国を追い払われて、どこに行っても迫害されてきた人たちですよね。そういう歴史の中でユダヤの人が見つけたのは、金や土地なんてものは、侵略されたら奪われておしまいってことなんですよ。だから彼らは、他人が奪うことができない知識とか教育とかを、宗教の中にシステムとして組み込んで、一生お勉強って習慣を当たり前にしました。ノーベル賞多いの当たり前ですよね。でもこれ、女と同じなんですよ。女にとって、最後まで奪われない財産ってなんですか？　女であることですよね。風俗でトップの子らがどのぐらいの努力してるか知ってますか？　ファッション誌全部目ぇ通して、メイク勉強してエステしてジム通いして、そうやって女の子は『誰からも奪われない女力』を磨くんですよ。女が女を磨く理由は、それが保険だからなんです。そうやって頑張ってる子がいるから、店の側も必死にサポートできるんじゃないですか」", "book_title": "最貧困女子", "author": "鈴木大介"}, {"text": "今後どれほど国際化や少子化が進んでも、日本語人口は七〇〇〇万人をくだらない。医師、不動産販売、建築士など、相談を必要とする属人的仕事はなくならない。中途半端な英語よりも、正確な日本語を正しい距離感で話せることこそ、グローバリゼーションを生き残るコツだ。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}]}, {"id": 53, "label": "合理性", "freq": 12, "highlights": [{"text": "合理的でないカネの使い方、とりわけ見栄に「ブランド価値向上」とか「人の雇いやすさ」とか「夢のある会社に」とかいう言い訳でつぎ込み始めるとあっと言う間に駄目になっていくのが事業です。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "社会科学の巨人マックス・ウェーバーがかつて悲観的に論じたように、官僚制は近代国家が発展していくなかで、必要不可欠な組織として発展してきた。それは、社会が高度に分化し、様々な社会的対立を制度化し、世俗化が進み伝統的な 絆 が崩壊していった近代で、「支配の行使の形式的には最も合理的な形態」だったからである。二〇世紀はこれに加えて様々な社会給付を付与する福祉国家の発展を見たから、官僚制はますます強大かつ強固な組織として発展することになった。しかしウェーバーが官僚制の特徴としてあげた「前例主義」や「形式主義」は、日本だけでなく他先進国においても、省庁間の縄張り争い、非効率的な意思決定システム、事なかれ主義といった形で弊害をおよぼすようになったということが明らかになってきた。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "途上国の土産物売りは、同じ商品でも日本人観光客には 50 ドルだといい、アメリカ人には 10 ドル、中国人観光客には５ドルだと言います。これを不公平だと感じる人もいますが、彼らのプライシングは極めて合理的です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "こう考えると、私たちの行動には、「三つの時間軸における合理性」が互いに絡みあうかたちで影響を与えていることが分かります。その結果、私たちの心には三つの時間に由来する異なるベクトルが競合することになります。同じ対象(糖など) に接近したい一方で回避したいとも思う「揺れ動く心」をもつことも、これによって説明できるかもしれません。「接近か回避かのジレンマ」は、それぞれの時間スケールにおける生き残り上の有利さを実現しようとするうえで生じている可能性があるということです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "つまり、ホッブズは、平和な暮らしをどのように実現するかという問題への解答として、人々がそれぞれ勝手に振る舞うことをやめ(自然権の放棄)、強力な中央集権の仕組みを自ら進んで受け入れること(「社会契約」の締結) が、「人々自身にとってもっとも合理的な選択」であると論じたわけです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "僕らは愛と知性を携えているからこそ、呪いにかかるのだ、と。 　なぜなら、愛を求めない人間は呪いにはかからないからです。 　合理的な思考能力を持たない人間も呪いにはかかりません。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "存在するものは、合理的である」", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "ぼくは二〇一一年に『一般意志２・０』（ 講談社）という本を出版しています。そこではルソーをとても高く評価していますが、その理由は彼がそのような実践的な観点をもっていたからです。 　ルソーはフランス革命の理論的支柱になったひとです。近代民主社会の礎を築いたと言われます。しかし、ルソーの人間観や社会観は、ホッブズやロックといった社会契約説の先行者とはまったく異なっています。ホッブズやロックは、人間は自然状態では争いを止められないのであり、だからそれぞれの権利を制限し、社会契約を結ぶのが「合理的」なのだと主張しました。ひらたく言えば、人間は理性的で論理的で、頭がいいので、自分の本性を抑圧し社会を作るということです。 　それに対して、ルソーは、人間は本来は孤立して生きるべきなのに、他人の苦しみをまえにすると「 憐れみ」を抱いてしまうので、群れを作り、社会を作ってしまうと説くのです。つまり彼は、社会契約の根拠は合理的な判断にではなく、むしろ動物的な感情にあると述べているのですね。これはとても独創的で、そして射程の長い思想だと思います。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "には「人間らしさの上に立った、合理的思想」を", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "どんなに技術的に非合理でも「原発をやめられない社会」、つまり〈空気に縛られる作法〉が蔓延する〈悪い共同体〉に、どう対処するかを考えねばなりません。 　空気からの自立を処方箋とするか、空気への依存の利用を処方箋とするか、それを組み合わせるか。慎重な検討が必要です。僕は空気からの自立はあり得ないと思っています。いずれにせよ、何もかもが空気ベースの「様々なる意匠」でしかあり得ない〈悪い共同体〉が今後もかなりの期間続くだろうこと。これが〈終わりなき日常〉のもう一つのレイヤーです。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "非人道的だ、なんてことは言わせない。医者は科学者なのだ。合理的に考えれば、医者みたいな職業がほとんど世襲になっている日本の状況はどう考えてもおかしい。馬鹿でもできる政治家とは話が違う。", "book_title": "超思考", "author": "北野武"}, {"text": "今は、企業の目標が社員にとって唯一絶対の目標になるなど、期待できない時代だ。基盤型コミットメント期間にいる社員（非常に少数）でもない限り、社外での可能性を求め広げたいと思うだろう。起業家精神旺盛な社員なら、会社と切り離した「個人ブランド」を築き上げたいと考える。終身雇用の終わった現在、こうした反応は、合理的だし必要なことでもある。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 54, "label": "新自由主義", "freq": 12, "highlights": [{"text": "保守政治といってもそれまで戦後の自民党政治は、有権者の利益が何であるかをあらかじめ政治や官僚エリートが規定する家父長主義的な態度を貫く、いわば恩顧主義的な路線を基調としていた。こうした利益配分を軸にした政治は一九七〇年代から一九八〇年代にかけて揺らぎはじめ、これに代わって新自由主義的で右派的な政治が頭をのぞかせることになったのである。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "実際、中曽根内閣時代は、日本における政治主導とネオ・リベラリズムのはじまりとして位置づけられる。新自由主義を「小さな政府」「規制緩和・民営化」「保守イデオロギー」のことだと仮に定義すれば、「官から民へ」といったスローガンのみならず、これらすべての要素は中曽根内閣時代にすでに出そろっていたのである。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "ネオ・リベラリズム的な政治主導こそが、凋落著しい自民党の起死回生策となること ── 後の 橋本龍太郎 行革、小泉構造改革、そして民主党政権による政治主導を準備するのは、この一九八〇年代の政治経験によるところが大きい。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "しかし、ネオ・リベラリズムの源流を辿れば、そこには、戦後の安定的な政治が行き詰まり、そして高度成長のなかで豊かになった階層や社会の領域が既得権益化していく状況に対して、これを打破しなければならないと考える新たな政治的リーダーシップが誕生したという日英共通の時代経験を見ることができる。一", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "私はこれらの現象には共通の背景があると考えています。それは「新自由主義への反乱」です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "また、新自由主義は、性別、人種、国籍など属性の異なる各個人が、市場を通じて、世界中から自由に参加するシステムを目指すので、より平等で民主的な世界を目指す価値観でもあります。マイノリティの尊厳、権利、機会の尊重も１９９０年代以降、急速に浸透しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "新自由主義の下で、日本はまさに最大の敗者となりました。政財官の「鉄の三角形」に支えられた日本株式会社方式の経済はボロボロになり、「失われた 30 年」で日本の地位は低下し続け", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "私はトランプ現象が新自由主義の終わりの始まりだと直感しました。新自由主義の最大の恩恵を受けた二つのグループがグローバリストとデジタリストです。そしてグローバリズムの持つ悪の象徴が中国なのです。グローバリストに任せていたら、アメリカを脅かす怪物を作ってしまったというわけです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "新自由主義への移行の下準備は１９８０年代頃から始まり、１９９０年代には世界中に浸透して花を咲かせましたが、その最盛期は短いものでした。まず、リーマンショックが発生し、市場メカニズムと金融政策だけでは課題に対処できないことが明らかになりました。財政出動、公的資金導入、銀行規制の強化と政府介入が息を吹き返します。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "２０１０年代半ばになると、ロシアはクリミアを併合し、中国は好き勝手に南シナ海を要塞化するようになります。東海岸と西海岸のエリートたちは「慣性の法則」から抜けきらず、そうした動きを見て見ぬふりをしました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "２０１６年の選挙でトランプが大統領となり、居眠りを続けたがっている新自由主義者を叩き起こします。２０２０年にはブレグジットが現実のものとなりました。そしてロシア・ウクライナ戦争（２０２２年～） は、満身創痍となっていた新自由主義の息の根を止めたのです。経済相互依存が進むことで武力紛争や戦争は起きなくなる、その考え方は瓦解します。 　新自由主義の時代、日本と並んで負け組となったのが、冷戦期のヒーローであったＮＡＴＯ（北大西洋条約機構） です。経済優先の時代になり、冷戦構造が終結すると、過去の遺物と化しました。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "その意味において、これからの中国は物凄く大変だと思います。日本経済の低迷と似たような構造問題を抱える中、中長期的に人口動態と技術革新性で優れたアメリカとの競争を強いられる一方、世界経済に頼ることも難しくなるでしょうから。中国には「失われた 30 年」という「贅沢」を実践する余裕はないと思われます。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}]}, {"id": 55, "label": "民主主義", "freq": 11, "highlights": [{"text": "ＬＡでは、すでに生まれてくる子どもの過半数がスパニッシュだ。２０３５年には、イーストＬＡは完全にスパニッシュの街になっているだろうし、アメリカ全体でも人口の３分の１をスパニッシュが占めるようになっているだろう。民主主義が正しければ、２０３５年までには、スパニッシュ系の初の米国大統領も誕生しているだろう。すでに、スペインが発行するスペイン語新聞「ＥＬ ＰＡＳ」の発行部数は、本国より米国のほうが多い。 　アングロサクソン系のアメリカ人にしたら、自分の国が乗っ取られるような感覚がするだろうし、一部では右傾化が進むだろう。ただ、アメリカはスパニッシュ系住民増加の恩恵も受けている。日本はすでに人口減少時代に入ったし、中国もまもなく生産人口がピークアウトする。しかし、アメリカはスパニッシュ系住民を中心とした移民の増加で人口が増え続け、２０３５年には４億人に達する見込みだ。成長しきったはずのアメリカ経済にのびしろを与えているのは、スパニッシュなのだ。", "book_title": "2035年の世界", "author": "高城 剛"}, {"text": "私たちは通常、「ポピュリズム」を「人気取り」や「大衆迎合主義」の政治だとして嫌い、また「ポピュリスト」のことを、 融通無碍 に立場を変える政治家だと 唾棄 する。それは国民を 愚弄 し、扇動するような言動や思想である、と。 　ここで、再び根本から考えてみよう。民主主義という政治制度の", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "一九六〇年代の新左翼や、途上国で民主化を求める人々は「権力を人民に！（Power to the People!）」と叫んだのではなかったのか。こう考えると、ポピュリズムこそが、実は民主主義の究極の形態ではないのかとさえ言いたくなってくる。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "一つは、無意味で安直なポピュリズム批判に再考を促すこと。もう一つは、現代におけるポピュリズム現象が不可避的なものであることを論証すること。そしてもう一つ、もし現代の「民主主義」が不可避的に「ポピュリズム」を内在させているのだとしたら、私たちはどう行動すればよいのか ── この本では、「ポピュリズム」や「ポピュリスト」が何であり、どうして生じるのかを解明するとともに、ポピュリズムが私たちの時代に投げかけている問題についても考えてみたいと思っている。それが、民主主義の現在について考えることにつながるからである。", "book_title": "ポピュリズムを考える　民主主義への再入門 ＮＨＫブックス", "author": "吉田 徹"}, {"text": "実際、トランプが起訴される度に、彼の支持率はむしろ上昇するという構造になっていました。これは司法システムがトランプ支持者の信認を失ったことを意味します。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "権力は「例外状態」あるいは「緊急事態」というものを巧妙に利用して、民主主義をないがしろにしたり、人々の権利を侵害していくことがある。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "この悪循環をオバマの政策的失敗だと考えて済ませるわけにはいかない。誰が大統領であれ、復讐テロのリスクがあれば、そのリスクを 措いて近代的人権の価値観点から収容所を閉鎖することは、ウェーバーの政治責任論的にも困難だ。責任倫理（結果責任主義）を規範とすべき政治家が、心情倫理を優先させたと批判されるからだ。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "全体主義に抗うのに、非全体主義的な──徹底して民主主義的な──やり方は採用できないのか。あるいは、いまや有効性が低すぎて、全体主義を使わずには全体主義に抗えないのか。今日最先端の政治学や政治哲学においては悲観的な見方が 拡がっている。そうした見方は法学者キャス・サンスティーンや政治学者ジェームズ・フィッシュキンによって代表される。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "「誰が誰のために何をするのか」。いまやこの問いは、近代民主主義の先進ぶりを誇ってきた国を含めて、全ての国、全ての人のものになった。エリートにどんな価値コミットメントがあるのか。彼らが言う公や公共が果たして何を指すのか。グローバル化による社会的流動性の上昇と、共同体の空洞化を背景に、これらが誰から見ても自明ではなくなったのだ。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}, {"text": "政治とは、国民の考えや行動の反映にすぎない。どんなに高い理想を掲げても、国民がそれについていけなければ、政治は国民のレベルにまで引き下げられる。逆", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "民主主義も貨幣経済も、人間とか利益、富といったものを一律に定量的にとらえて考えようという、とてつもなく大胆な発想から生まれました。キリスト教時代では、とても受け入れられそうにない「罪深い」アイデアです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 56, "label": "共感", "freq": 11, "highlights": [{"text": "もし、大衆を対象としたプロダクトを作りたいのであれば、自分自身がユーザーの立場になり、ユーザーの視点から物語を書かなくてはならないだろう。だからこそ、私達はじっくりと時間をかけてユーザー・ナラティブ（語り）と呼ばれるものを書き上げている」（50） と答えている。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "つまるところ、「よいアイデア」とは、「誰がどんなふうにこれで喜んでくれるか」が考え抜かれたもの なのだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "ファンの支持を強くするための 3 カ条 ・その価値自体を、アップさせること「共感」を強くする ・その価値を、他に代えがたいものにすること「愛着」を強くする ・その価値の提供元の評価・評判を、アップさせること「信頼」を強くする", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "自分の話を納得いくまで聞いてもらい、理解、同情してもらえたと実感できた時、女性は自分が相手に愛されていることを確信でき、それだけで心が満たされ始める。不信感や猜疑心はたちまち消し飛んでいく。", "book_title": "ベスト・パートナーになるために―――男と女が知っておくべき「分かち愛」のルール 男は火星から、女は金星からやってきた", "author": "ジョン・グレイ、大島 渚"}, {"text": "教育学の研究からも、子供が悩んでいるときに苦悩をそのまま引き受けてしまう親ほど、適切な援助やアドバイスができない可能性が指摘されています。相手と一緒に共振する情動型の共感はとてもやさしい反面、情動に圧倒される危険も含んでいます。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "偉大な心理学者ジグムント・フロイトは、偉大な聞き手であった。かつてフロイトと話す機会のあった人が、次のように説明している。 「フロイトのことは生涯忘れられない。彼には、私がこれまでに会った誰にもない資質が見受けられた。彼の目は穏やかで優しかった。精神分析の時の〝魂を見通す目〟などまったく感じさせない。声は低く、温かで、身ぶりはほとんどない。私の言葉に注意を集中し、下手な言いまわしにも耳を傾け、それなりの評価を与えてくれた。このような聞き方をしてもらえたことが、私にとってどんなに素晴らしい経験だったかご想像にまかせる」", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❽　 人の身になる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を説得する原則❾　 相手の考えや希望に対して同情を寄せる。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "人を変える原則❸　 まず自分の誤りを話したあと相手に注意する。", "book_title": "人を動かす　新装版", "author": "D・カーネギー、山口 博"}, {"text": "「いっしょに勉強しよう」 と言い、居間で子どもが勉強している間、じぶんは好きな本を読むようにしたら、子どもが隣で黙々と勉強をするようになりました。人は本能的に、誰かといっしょに何かをやりたいのです。それは太古の時代から人間が生き延びてきた知恵です。誰かが狩りをするときは、協力していっしょに行い、木の実を集めるときも、外敵に襲われないよういっしょに行った。その記憶が私たちの奥底にあるのです。 ただ、これは 自分も動くことが前提 です。動くといっても、子どもといっしょに同じ机で真剣に何か好きなことをすればいいのです。", "book_title": "伝え方が９割", "author": "佐々木 圭一"}, {"text": "しかし、多くの人が共感し興味を持つ物語の本質は、「純愛」「成長」「青春」「友情」など、いくつかに限られています。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}]}, {"id": 57, "label": "テクノロジー", "freq": 11, "highlights": [{"text": "Blogger の共同創設者でのちにTwitter を共同創設するエヴァン・ウィリアムズは、2社を成功に導いたことに関して、ハウプトリーの革新法則に共感している（59）。つまり、「長い間存在している人間の欲望や好みを特定した上で、現代のテクノロジーを使ってそこに到達するのに不要なステップを取り除く」のである。Blogger はブログをネットに公開するプロセスを劇的に簡素化した。その結果、ネット上でコンテンツを作成する人の割合が急上昇したのである。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "ホスピタリティを徹底することで経済合理性が成り立つという従来奇跡のように見られていた事例が、中国平安保険のように、テクノロジーによって実現しやすくなっている と捉えることが重要です。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "要するに、川上さんがやろうとしていることは、「テクノロジーを駆使して人間性を追求する」ということです。テクノロジーとグローバリゼーションによって社会が便利になった反面、人間性は疎外されていくばかりです。そんな未来に対して、レジスタンスをするということが、川上さんが目指していることではないかと思います。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "いまのネットが目指している多くの集合知とは、個々の人間の労力や行動を部品として機械的に収集して構成されます。それはいわば現実世界の歴史における大運河やピラミッドのような仮想世界においての人間の叡智と労力がうんだ歴史的偉業にたとえられるかもしれません。です", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "アマゾンから学んだことは大きい。その最大のエッセンスは、「コンピュータには、結果は分析できても、その結果を招いた原因を作り出すことはできない」ということ。人をベースにして言い換えれば、 「原因を作り出す作業こそが、人間の価値である」", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "そのとき悟った。コンピュータは結局、私自身が仕掛けた「原因」ではなく、 10 倍売れたという「結果」にしか反応できない。", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "テクノロジーの発達から出てきたバーチャルリアリティというものがありますが、それは心には強く働きかけてこないとぼくは見ているんです。心が打ち震えるようなことはそこにはありません。肉感がないし、触れることができない。感情、存在、身体の刺激にはならないんです。そういったことが、母性が育たなくなっていることにすごく影響しているとぼくは思っています。", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "もう一つの怪物はＧＡＦＡＭに代表されるＩＴ企業です。一昔前、「ＧＭは国家なり」という言葉がありましたが、日本のトヨタ自動車同様、ＧＭは雇用を生み出しましたし、法人税も多く払いました。しかしＧＡＦＡＭになると、雇用はしないわ、税金は払わないわ、プラットフォーマーとその周辺だけが大儲けをするビジネスモデルです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "現代の中年の親は、自分の子どもをよき 家畜 にしようとしていないかを反省してみる必要がある。近代になってテクノロジーがあまりにも発展し、人間は「こうすればこうなる」という考え方になり、それを駆使することによって、ものごとをコントロールし、自分の意のままに動かせることを知った。これがあまりにも効果的で便利なので、人間の人生観の全体をテクノロジー的発想が支配するようなことが生じてきたと思われる。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "どのスクリーンにも「未来的なスーパーパワー」と、依存性のある「気を散らすもの」が併存している。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "ウェーバーは言う。平時は統治権力内の決定の大半を行政官僚がする。だが非常時には政治家が重要な決定をする。行政官僚が行うゲームの、プラットフォーム自体を、社会存続のために変える決定だ。だから政治家と官僚は潜在的に対立する……。平時と非常時を分ける思考は「ナチ御用学者」カール・シュミットの「非常大権論」「憲法制定権力論」に影響した。 　だがいまや平時と非常時を分ける思考が通じなくなった。正確には〈非常時の常態化〉が進んだ。〈非常時の常態化〉を象徴する言葉が「テロの脅威」である。この脅威の現実化を支える最大要因もやはりテクノロジーの進化である。チョムスキーが指摘する「先進国の悪辣な政策がもたらす怨念」も重要だが、テクノロジーが怨念に基づく破壊行為を可能にしたのだった。", "book_title": "私たちはどこから来て、どこへ行くのか", "author": "宮台真司"}]}, {"id": 58, "label": "チームワーク", "freq": 11, "highlights": [{"text": "覚えておいてほしい。価値のある、使いやすい、実現可能な製品として作られるべき何かをプロダクトマネージャーから与えられなければ、どんなにエンジニアリング部門が優秀でも意味はない、ということを。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "いったんエンジニアリングチームが開発を始めてしまったら、極力、それをかき回さないようにすること。かき回す", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "というのは、こういうことが起きてしまう原因でよく目につくのは、プロダクトマネージャーが、作れそうな機能なら何でもめいっぱいくっつける、というようなことを何年にもわたってエンジニアリングチームにやらせてきたために、彼らをボロボロにしてしまうことだ。", "book_title": "Inspired: 顧客の心を捉える製品の創り方", "author": "マーティ ケイガン、佐藤真治、松田和之"}, {"text": "僕らは最近、収益の増加を分配する新しい方式を採用したところだ。前年に比べて総利益が増加したら、その年の増加分の二五パーセントを社員に分配することにした。これは、職種や個人の能力に応じたものではない。僕らの会社には販売員がいないので、歩合でもない。みんなで分けるか、誰も受けとれないかだ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "幸せと生産性の源泉は、安定した仲間と働くことだ。僕らの会社が少ない人数で多くのことを成しとげられる鍵は、まさにここにある。この重要な強みが、ほかの会社ではあまり追求されていないことが、僕らには不思議でならない。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "だがいまは、 突出した特性や技能を持つ人同士が互いに補い合いながら強いチームを作っていく時代 だ。均質的な組織は相対的に弱体化する。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "チームの調和を最優先にすることは、チームにとっても本人にとっても決してよい結果を生みません。 そもそもチーム内で目的を共有できてさえいれば、必要に応じて自然と歩み寄るようになるのだから、最初から協調性やチームワークを第一に考える必要はないのです。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "弱き者を思いやり、強き者にライバル心を燃やす──。 　それをもしもチームワークと呼ぶのであれば、私は大いにチームワークを推奨したい、そう思います。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "目標を共有するためには、お互いに隠すところなくすべてをさらけ出し、深いところでわかり合うことが必要 です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "そのなかでもやはり岩下さんや小澤さんから学んだことは大きく、ひと言でいえば、「仕切り力」ということになるのだと思います。 　日本では飲み会でもなんでも、誰かが仕切りますが、アメリカの企業ではそうした概念がありません。しかし、実際のビジネスの中では、忘年会や結婚式の二次会を仕切れるような力が生きてくるのは確かです。 　その力はそのままプロデュース能力につながります。想像力を生かして段取りをして、抜けなどもないように作業を進行させていくうえでは、共通する部分も大きいからです。 　ビジネスで成果をあげるには、チームをつくりあげること、そこで人を動かしていくことも大切になります。そうであるからこそ「志」や「仕切り力」といった要素が重要になってきます。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "参加者の頭脳をつないで皆の知見を引き出し、異なる意見をひとつに集約することが、知的リーダーシップの基本 なのである。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}]}, {"id": 59, "label": "ビジョン", "freq": 11, "highlights": [{"text": "「ベースキャンプ」は世界を変えたりしない。ただ、企業やチームでのコミュニケーションや共同作業が簡単にできるようにするだけだ。これはとても価値があることだし、すばらしいビジネスが生まれる。とはいえ、世界の歴史を書きかえられるわけじゃない。けど、それでいい。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "目の前にある光景をどう変えたいのか。そのイメージを思い描くことが、グロースハックの出発点になります。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "グロースの本質は〝シーンの創出〟にある と、私は思います。 　やみくもに数字を追うのではなく、どのような状況を現出させたいかをまず考える。 　そして、ゴールといえるその地点に向かっていくための道筋を描き出します。 　いくつか道筋がある場合には、そのなかでの最短ルートを選び出します。 　難関にぶつかったときには、なんとかそれを乗り越えるか、新たなルートを考えます。そうしてイメージしていたシーンを現実にしていく作業こそがグロースハックです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "家族や仲間でゲームを楽しむというしあわせな時間のイメージは、私にとっては「鍋」という言葉に凝縮されていました。 それは、今でも思い出すたびに心がほっこりするほど大切な、私のプライベートなビジョンでした。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "ビジョンはそもそも、いっさい責任を取るつもりもなく、実現可能性にも触れられていない〝純然たる欲求〟でなければいけません。なぜなら、それは遊び人から聞こえてくる素直な声でなければいけないからです。", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "何をしたいか？　　（ビジョンの集合体） 　何を用いるのか？　（アイテムの集合体）", "book_title": "コンセプトのつくりかた", "author": "玉樹 真一郎"}, {"text": "川上 　会社としてのビジョンはあっていいんじゃないでしょうか。ただそのビジョンが、会社の目的と合致できるかどうかですよね。「世の中のために」というところが強いと、会社の利益がどこかにいっちゃう。でも、たとえば「誰も見たことがない動画の新しいシステムをつくろう」というビジョンは、会社の利益に合致する。だから、それは言っても大丈夫。", "book_title": "ニコニコ哲学-川上量生の胸のうち", "author": "川上 量生"}, {"text": "ですから、「アジアナンバーワン」「未来を切り拓く」「お客様に最高の価値を約束する」といった言葉はビジョナリーワードとはなりえません。ビジョンと呼ばれていたとしても、何ら新しい景色を見せてはくれない。その意味では、「号令」や「かけ声」と名づけた方が正確だと思われます。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "ビジョナリーワードの三つの条件として「 解像度」「 目的地までの距離」「 風景の魅力」が必要だと言うことをすでに述べました。 言葉にすることは、未来から届く絵ハガキをつくること。そう意識しながら、頭の中の曖昧な風景を、解像度を上げた言葉で具体化したり、もっと魅力的な景色が浮かぶ単語を探したりと試行錯誤しながら、紙にたくさんの言葉を産み落とす。地味ですが、それが最も本質的で、建設的なやり方です。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "既得権益（不平等な縦型社会）が新自由主義（フラット化した世界）に移行するには出遅れてしまっているので、一気にその先の地域コミュニティに完全分権した社会（リキッド化した世界）の構築準備を早々に始めるべきだ、もしＴＰＰを締結するにしても、交渉しながら締結して実行までの限られた時間に、地域による新産業の育成と地域コミュニティ型セイフティネットの充実などの整備を一刻も早くすべきだ、と思っています。そのためには、産業構造を大きく変え、新産業の育成、例えば短期的には観光業（移動手段、ガストロノミーが既に資産であるので）、中長期的には代替エネルギー技術（世界的な需要があるので）とバイオメカニクス製品（あたらしいものづくり）などの育成をすべきです。クールジャパンは関係ありません。クールジャパンを発言したのは、もともと米国のＣＦＲ（外交問題評議会）ですから。なにより、今、一番問題なのは、『日本をこんな国にしたい！』というアイデアがないことですよね。これが、政治家でも学者でも論客といわれる人でも、ほとんどないことが問題だと思います。皆、目先の問題と対症療法ばかり。ノービジョン・ノーライフなのです。 　ですので、次の社会の準備、もしくはポスト新自由主義の戦略の準備が整うまで、本来は安易にＴＰＰを推し進めるべきではありませんが、いつも日本は遅すぎるので、きっとダラダラと進んでいくでしょう。そして、いずれ来る改革にはそれなりの痛みを伴うのです。また、ＴＰＰを推し進めた場合、相対的に経団連は強くなるでしょう。それも忘れてはいけませんし、対応も必要です。 　もうひとつの問題はＴＰＰの外交的側面です。お話ししたように、現在、世界は予想通りブロック経済に向かっているように見えます。形はかつてとは異なりますが、ＥＵはドイツを中心に東へ南へと実質的に拡大傾向…", "book_title": "白本", "author": "高城剛"}, {"text": "既得権益（不平等な縦型社会）が新自由主義（フラット化した世界）に移行するには出遅れてしまっているので、一気にその先の地域コミュニティに完全分権した社会（リキッド化した世界）の構築準備を早々に始めるべきだ、もしＴＰＰを締結するにしても、交渉しながら締結して実行までの限られた時間に、地域による新産業の育成と地域コミュニティ型セイフティネットの充実などの整備を一刻も早くすべきだ、と思っています。そのためには、産業構造を大きく変え、新産業の育成、例えば短期的には観光業（移動手段、ガストロノミーが既に資産であるので）、中長期的には代替エネルギー技術（世界的な需要があるので）とバイオメカニクス製品（あたらしいものづくり）などの育成を とじゃないでしょうか。やはり、働くからには価値を高めなければならない、限られた時間で出せる成果を最大限にしよう、というのは、私は健全な方向だと思っています。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "一等地のオフィスに豪華な内装を施し、一見社員の働きやすさのためにとも思えるフレキシブルな勤務体系を実現するというのは、まだ事業が成長し、気持ちよく社員が働いてくれることで上がる生産性がそのまま収益に直結していた時代のことです。インプットを増やせばアウトプットが増えるという成長のシナリオが一度崩れると、そういう社員に対する厚遇が一転するのもまた、成長企業が業績停滞を起こしたときに見せる典型的な症状と言えます。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "私が言っているのは、社員の健康のことだけでなく、長い目で見た彼らの生産性や幸福のことだ。こうした投資は、後々きちんと利益になって返ってくる。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "答えはアダム・グラントが知っている。『ＧＩＶＥ &amp; ＴＡＫＥ　 「与える人」こそ成功する時代』でグラントは、目的には幸福だけでなく生産性も増進する力があると書いている ★ 50。多くの卓見がそうであるように、彼の答えは、指摘されてみれば当たり前のように思える。大いに驚かされるのは、その影響の大きさだ。", "book_title": "ワーク・ルールズ！―君の生き方とリーダーシップを変える", "author": "ラズロ・ボック、鬼澤 忍、矢羽野 薫"}, {"text": "しかも、スピルリナは、きわめて生産性が高い。牛肉の場合、一キログラムのたんぱく質を得るのに、一〇五トンの水と一九〇平方メートルの土地が必要で、大豆の場合は同じく九トンの水と、一六平方メートルの土地が必要だが、スピルリナから一キログラムのたんぱく質を得るには、二・一トンの水と、〇・六平方メートルの土地があればいいのである。しかも、悪条件でも生育が可能である。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}]}, {"id": 61, "label": "人生観", "freq": 11, "highlights": [{"text": "経営なんて、本に書いているようなきれい事ではできない。たぶん若い頃は、かなり厳しいことをやっておられるわけですよ。それでも最後は天国へ行きたいから、仕上げは神様みたいにいい人になる（笑）。年配の経営者が心の話をするようになるのは、仕上げの段階に入った人間の性質じゃないかな。", "book_title": "「好き嫌い」と経営", "author": "楠木 建"}, {"text": "みんながお悩みを送ってくれて、それにポインティが答えるのも人間関係だし、仲のいい友達と遊ぶことも、ポインティと仕事を一緒にしてくれる人もそう。「巡り合ってよかったな～！」とかさ、 そういう奥行きが楽しいんだよね。 でね、老後はもう思い出し笑いしかしたくない（笑）。", "book_title": "おいでよ ポインティの相談天国", "author": "佐伯ポインティ"}, {"text": "最期の最期まで独りで生きることを貫いた人が〝幸せだった〟と証言する姿を目撃できる機会はない。", "book_title": "イン・ザ・メガチャーチ (日本経済新聞出版)", "author": "朝井リョウ"}, {"text": "一緒に仕事をしているスタッフに対しては「人生って思い出づくりだよね」という話をよくしています。思い出をつくるには本気を出さなければ意味がないので、そういう経験を積んでほしいと願っているからです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "それこそ、宮台真司さんが著書『終わりなき日常を生きろ』で喝破したように、理想も幻想も失われてそれぞれの人生を物語として紡いでいく時代となった割に、人間として生きるための確たる規範を求めがちで、しかしそれが示されずに漂流する現代日本人、みたいなものが常態化しているのかもしれません。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "世の中には、何かを達成するモチベーションとして「何かが足りておらず、絶望する」というコンプレックスから入る人が少なくありません。これを見ていると結局は「なりたい自分」はあるけど「そうでない自分」を受け入れていく、その過程そのものが人生、ということなのかなあと感じるのです。そして、歳を取っていくごとに、年相応に老けていき、開き直りとか諦めとか受け入れることへのハードルが下がり、やがて何かを成し遂げるパワーすら生まれなくなって、昨日何を食べたのかすら思い出すことのできない平凡な日常の中に人生が埋没していく。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "そのやり方には、彼がヨーダというキャラクターに込めた哲学がいくらか反映されているように感じられた。「やるかやらないかだ。やってみる、というのはなしじゃ」というヨーダのセリフのように、ジョージは、人生の矛盾を噛み砕いて何かに端的にたとえるのが好きだった。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "アリストテレスの幸福論では、人生の最終的な「目的」は幸福になることだとされています。お金を稼ぐこと、有名になること、モテることなどはそのための「手段」であり、ゴールそのものではない、という考え方です。何が自分にとって幸福なのか、その答えは一人一人違いますが、アリストテレスの言うように、社会生活の中で自己実現をすることが幸福なのだとすると、ヘッジファンドのオーナーたちは、前段部の「社会生活」では輝かしい成果を叩き出していますが、後段部の自己実現はどうなのでしょうか。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "つまり、かけがえのないひとつの人生を、われわれは「つくり出す」のであり、そのような意味で、どのような人間であれ、「創造活動」にかかわっていると考えられる。そのように考えると、どのような人にとっても、「創造の病」にかかる可能性は高いわけである。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "すなわち、我々の人生の長さに比べ、世の中の変化が速くなった。 　そのため、我々は、世の中の小さな「 局所的変化」だけでなく、世の中の大きな「 螺旋的発展」を目撃するようになったのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "一、人もし全世界を得るとも其霊魂を失はば何の益あらんや。 　　人生の目的は金銭を得るに非ず。品性を完成するにあり。 　　以上", "book_title": "星野リゾートの教科書", "author": "中沢靖彦"}]}, {"id": 62, "label": "顧客理解", "freq": 11, "highlights": [{"text": "そこで印象的だったのは、現地のメンバーが、「顧客のユーザーストーリー」を徹底的に考えていたことだ。 顧客がどんな気持ちで製品に触れ、それが顧客にとってどうプラスになるのか。この議論を何度も何度も行っていた のだ。 数多 の成功事例で自信をつけ、「遊び心のあるダイナミックな発想」と「洗練された品質」との両立を力強く推進しているように思えた。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "寄り添い続け、顧客を知り続けるからこそ、その顧客に良い体験が提供できるという意味で同じ考えを共有する同志と捉えています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "では、どうやって知っていくかというと、「ファン同士で会ってもらい、盛り上がってもらい、そのポイントを改めて発見してもらう」のである。つまり、ファンを一定数集めて話し合うファン・ミーティングが最適だ。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "ジャパネットたかたが売っているのは「孫のアドバイスという価値」だと思っています。実際の孫は、祖父母の買い物に、毎回つきあってくれたりはしません。自分たちの生活やニーズも、そこまで把握してくれていません。でも「孫のように、全幅の信頼を寄せられる売り手」を求めている消費者は、たくさんいるのです。 同じような価値を売っている売り手は、他にもたくさんいます。糸井重里さんの運営する「ほぼ日」や、カリスマ主婦の栗原はるみさんが勧める料理グッズも同じでしょう。彼らも、ごく限られた数の商品を取り上げ、その特徴や使い方、さらには、顧客がなぜその商品を選ぶべきなのか、詳細に説明します。 ここで重要なのは、その説明の合理性ではありません。説明を聞く前から、顧客側が「この人は、私が信じられる人だ」「この人は、自分に合う商品を理解してくれている」と感じていることが重要なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "必要なのは、知名度でも高度な読解力でも専門知識でもなく、「不妊治療のステージ別必読本リスト」を作れば、きっと多くの人にとって価値があるだろうと気がつくマーケット感覚であり、それぞれの段階にいる人が何に悩み、どんな価値を求めているのか、正しく理解する力（マーケット感覚）なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "「勝者は、ちがいをつくりだす」 　ということだ。前述の通り、代官山蔦屋書店は「お金と時間に余裕のある大人向け」のおしゃれな店づくりをしている。お金のある大人たちが車で来店し、たくさんの商品を買って、車に積んで帰っていくことを狙っている。ということは、そんな大人たちがどうすれば「来店したくなるか」を考え抜いたはずだ。 　私は、そのひとつの答えが「駐車場」にあると確信している。", "book_title": "一流の人は、本のどこに線を引いているのか", "author": "土井 英司"}, {"text": "顧客によるブログという「使用段階の顧客の行動データ」を見つけてきた、担当者の目利きと言えよう。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "井深大氏は「マーケット・サーベイによって新製品を企画することは、アメリカの常識になっているが、真に新しいものは、ものを出すことによって、初めてマーケット・サーベイができるのだ」とし、「マーケット・クリエイション」の必要性を訴えました。 またスティーブ・ジョブズは「人は形にして見せてもらうまで、自分は何が欲しいのかわからないものだ」と仲間に語りました。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "企業にとって自社で構築するプライベートDMPがなぜ重要かというと、マーケティング最適化のためにユーザーをセグメントできるのは、企業自身であるからだ。自分たちにとって対象となるユーザーをどうセグメントするかは、これから重要なマーケティングスキルとなる。", "book_title": "顧客を知るためのデータマネジメントプラットフォーム　DMP入門 (NextPublishing)", "author": "横山 隆治、菅原 健一、草野 隆史"}, {"text": "「特定のターゲットを狙ったコピー」にすると、 クリック率は上がる！", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "ビルポイントの思い込みとは異なり、イーベイのプラットフォームを利用する企業（とその顧客）は、銀行との強い結びつきをそれほど重視していなかった。彼らは使いやすさ、とりわけ、Ｅメールでのやりとりのしやすさをはるかに重視していたのである。不正行為の防止は衛生要因（訳注：ないと不満だが、あっても動機づけにはならない要因） であり、決済システム採用の推進力とはならなかったのだ。こうした情報すべては一般に公表されていなかったが、かといって機密事項でもなかった。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 63, "label": "自己理解", "freq": 11, "highlights": [{"text": "数学者のハナー・フライは、オーケーキューピッドには根本的な限界があると指摘している。「アルゴリズムは、設計された通りに実行されている。それは、条件を満たす独身者同士をマッチングさせることだ。問題は、アルゴリズムではない。問題は、私たちが自分がなにを望んでいるかを正確に理解していないことなのだ」", "book_title": "ひらめきを生み出すカオスの法則 (T&#x27;s BUSINESS DESIGN)", "author": "ティム・ハーフォード、児島 修"}, {"text": "自分は何が大好きか？」 　「自分は何がいちばん得意か？」 　「世の中の大きなニーズに貢献できるのは何か？」", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "それと同じように、「いい転職先」というキーワードで考えたとき、脳のサーチエンジンは数えきれないほどの検索結果を返してくる。一方、もっと詳細に設定して「自分は何が大好きか？」「自分は何に向いているか？」「どうやって世の中の役に立てるか？」の３つで検索すれば、答えはおのずと絞られてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "大好きで、才能を生かせて、世界の役に立てる仕事。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "やはり、仕事をしなければ生きていけないのが人生だとするならば、何を武器にして、誰と肩を並べて仕事をするのかという自分の中の整理ができていないと、なかなか展望が拓けないんじゃないでしょうか。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "「自分という人間について考える最良の方法は、どんな精神的、道義的考え方をしたときに、いちばんいきいきと生きていることを実感できるかを探ることだと思う。人はそうした瞬間、心の中の声が聞こえる──これこそが本当の自分だ、と」", "book_title": "ハーバードの人生を変える授業", "author": "タル・ベン・シャハー、成瀬まゆみ"}, {"text": "私に言わせれば、彼に足りないのは学歴でも年収でもありません。足りないのは、マーケット感覚です。若さやルックスや性格など、自分の強みが活きる市場を選んで婚活を行なっていれば、こんな男性が２００連敗するなんてありえません。彼のような男性を好ましいと考える女性は、別の市場にはたくさん存在するし、合コンの場合なら「相手は 20 代の女性がいい」と考えても、高望みでもなんでもありません。 反対にいえば、こういったサービスを使うべき男性は、「口下手でまじめ。ルックスにも自信はないけれど、年収も学歴も高い」という人たちです（ 図 13）。そういう人たちは、街中でナンパをするより、結婚情報サービスを使うほうが圧倒的に有利です。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "オーセンティック・リーダーシップは、倫理観を重視し、自分はどういう人間か、自分が大事にする価値観は何かなど、自分の考えに根ざしたリーダーシップを指します。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "じゃあ生きるにおいて本当に大事なことは何かというと、「一人で孤立せずに社会や他人との 繫 がりを持ち続けること」と「自分が何を好きか、何をしているときに一番充実や幸せを感じられるかをちゃんと把握すること」の二つだと僕は思う。孤立しないことと充実感を持つこと、それが仕事や会社や家族とうまく一致していれば問題はないんだけど、それはしばしば一致せずにズレてしまって、人を幸せにするためにあったはずの仕事や会社や家族が人を縛って苦しめたりするから厄介なのだ。", "book_title": "持たない幸福論　働きたくない、家族を作らない、お金に縛られない (幻冬舎単行本)", "author": "ｐｈａ"}, {"text": "自分の価値観をはっきり言葉にするのに苦労するような社員が相手の場合、間違いのない方法が一つある。これはキャリア・エンゲージメント・グループのアン・フルトンに教えてもらった方法で、そのような相手との対話が一気に進む。まず最初に、その人が尊敬する人物の名前を三人書き出してもらう。次に、それぞれの名前の横にその人物について尊敬できる点を三つ書き出してもらう（合計で九つ）。最後に、その九つを、大切に思う順に一番から九番までランクづけしてもらう。これで、その人の個人的な価値観のリストができあがる。あとはそれを会社の価値観と比較検討すればいい（著者三人がこの方法を試した結果は付録Ｂを参照）。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "付録—Ｂ 「尊敬する人のリスト」の実例 アライアンスについて述べた第３章で、社員の価値観を理解することが大事だと述べた。そして、尊敬する人物とその理由を聞いてみるというテクニックを紹介した。著者三人がその作業を行った結果を以下に示す。 まず、我々の尊敬する三人の人物を挙げ、それぞれの人物について最も尊敬できる資質を三つ挙げ、それら九つの資質を自分が大事だと思う順番にざっと並べたリストである。 リード・ホフマン １．マーティン・ルーサー・キング・ジュニア 偉大な英雄であり、彼のビジョンと勇気はすべてのアメリカ人、そして世界中の人々を今でも鼓舞している。 ビジョン 勇気 共感 ２．マリー・キュリー 科学の世界の英雄である彼女は、大きな組織のリーダーでなくても、本質を問いなおすような知的リスクをとり、人々の先頭に立って道を切り開くことができることを身をもって示した。 知性 思考の独立性 集中 ３．アンドリュー・カーネギー 実業家から慈善家（フィランソロピスト）へと進化した彼の生き方は、その後何十年にもわたり灯台のような役目を果たしている。 物心ともに与えようという優しさ リーダーシップ 起業家精神 資質のランキング １．共感 ２．勇気 ３．集中 ４．知性 ５．物心ともに与えようという優しさ ６．ビジョン ７．リーダーシップ ８．起業家精神 ９．思考の独立性", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 64, "label": "螺旋的発展", "freq": 11, "highlights": [{"text": "従って、「電子ブック」がどれほど普及しても、「紙の書籍」は、決して無くならない。 　 両者は、かならず、共存し、共生し、それぞれに棲み分けていくでしょう。 　それは、 生物の世界の「進化」 の姿を見れば、明らかです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "すなわち、我々の人生の長さに比べ、世の中の変化が速くなった。 　そのため、我々は、世の中の小さな「 局所的変化」だけでなく、世の中の大きな「 螺旋的発展」を目撃するようになったのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "その結果、企業にとって悩ましいのが、「中期経営計画」 　これは、ほとんどの場合、「三ヵ年計画」として策定されてきました。 　しかし、この「三ヵ年」という時間の長さが、悩ましい。 　なぜなら、わずか「三年後」が予測できないからです。 　昔ならば、世の中の変化が緩やかであり、現在の変化の方向が、三年後にも、概ね正しかった。しかし、変化が激しいこの時代には、わずか三年で、世の中が大きく変わってしまう。しかも、「螺旋的発展」が起こるときは、まったく逆の方向に向いてしまう。 　だから、いま、多くの企業では、この変化の速さに頭を悩まし、その結果、言葉の矛盾とも思える「三ヵ年計画を、毎年、見直す」ということを余儀なくされているのです。 　そして、「螺旋的発展」が加速される時代においては、ビジョンや戦略を立案するとき、その業界や市場において、次にどのような「原点回帰」が起こるのかを予見して立案しなければならなくなる。 　いま、多くの企業が、その悩ましさに直面しているのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "だから、もし、皆さんが、「螺旋的発展」を目撃したいのならば、 　申し上げることは、ただ一つ。 　「書を捨てよ、街に出よ」 　そして、「タウン・ウォッチング」をされることを勧めます。 　皆さんは、その街角に、様々な形で「便利になった懐かしいもの」を発見するでしょう。 　そのとき、深く考えていただきたい。 　 何が「懐かしい」のか。 　 何が「便利になった」のか。 　そのことを考えるとき、 　きっと、世の中の変化の「本質」が分かるでしょう。 　そして、世の中の変化の「未来」が見えるでしょう。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "螺旋的発展」において、何が「復活」してくるかを、読む。 　「合理化」と「効率化」の中で「何が消えていったのか」を、見る。 　「その段階」で、それが「なぜ消えていったのか」を、考える。 　「新しい技術や方法」で、どうすれば「復活」できるかを、考える。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "しかし、そのことは、間違っても、「個店主義」や「地域主義」という店舗運営のスタイルの「存在理由」が無くなったことを意味しているのではありません。ただ、その時代の流通革命の主眼である「合理化」と「効率化」を進めていくためには、ひとたび、「個店主義」や「地域主義」を後に回して、まずは、「合理化」と「効率化」に取り組み、全国一律の品質の商品やサービスを提供していく。そのことが最優先の課題として求められたのです。 　しかし、流通革命が大きく進展し、全国にコンビニエンス・ストアが普及し、店舗における「合理化」と「効率化」がかなりのレベルまで進んだ現在の段階において、この「個店主義」や「地域主義」が復活しつつあります。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "すなわち、それは、次の「螺旋的発展」のプロセスです。 　「合理化」を実現するための「均質化」 　「合理化」の極点での反転 　「均質化」から「個性化」への回帰 　そして、こうした「均質化」と「個性化」の「螺旋的発展」という現象は、コンビニエンス・ストアだけでなく、社会や市場の、あらゆるところで見受けられるのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "弁証法の「螺旋的発展」とは、何か。 　 それは、単なる「復活」や「復古」ではありません。 　 それは、単なる「古い機能」への揺り戻しではありません。 　 そこには、かならず、「新たな価値」が付け加わっているのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "もう一つ、この「反転」と「リバウンド」の例を挙げておきましょう。 　「知識社会」の逆説です。 　「これからどのような社会がやってくるか」 　いま、この質問を問えば、多くの人々が「知識社会」と答えます。 　「では、知識社会とは、どのような社会か」 　この質問を問えば、やはり多くの人々は、「知識が価値を持つ社会」と答えます。 　 しかし、実は、「知識社会」とは、「知識が価値を失っていく社会」です。 　なぜなら、この「知識社会」も、深く見つめれば、螺旋的に発展していくからです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "なぜなら、かつて、昔の社会においては、この「言葉で表せない智恵」が大きな価値を持っていたからです。 　例えば、徒弟制度の現場などでは、「体で覚えろ」「呼吸で摑め」という言葉に象徴されるように、スキルやセンス、テクニックやノウハウなどの「智恵」が、大きな価値を持っていました。それらの「智恵」は、言葉に表すことができず、容易に伝達したり、修得したりすることのできないものだったからです。 　しかし、そこに、印刷技術の発明によってマスメディアが生まれてきた。このマスメディアは、「言葉で表せる知識」を多くの人々に伝えることができるものであり、専門知識や最新知識を多くの人々が共有し、活用することを可能とすることによって、社会全体の生産力を向上させ、豊かな文化を生み出し、この社会の発展を促していった。 　しかし、まだ、この段階においては、人々が「知識」を学ぶためには、場所と時間に拘束される「学校」や、流通にコストと時間がかかる「書物」が必要でした。そのため、「言葉で表せる知識」というものが、この段階の社会においては、まだ、大きな価値を持っていたのです。 　しかし、そこに、ネット革命が到来した。この革命は、マスメディアを超えたパーソナルメディアを実現したため、誰でも情報端末さえ持てば、容易に専門知識や最新知識を入手することができるようになった。そのため、「言葉で表せる知識」が相対的な価値を失い、新たな次元で、ふたたび「言葉で表せない智恵」が大きな価値を持つようになってきたわけです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}, {"text": "こうした社会の動きの背景には、弁証法の「螺旋的発展の法則」があり、「否定の否定による発展の法則」がある。 　そのことを理解していただきたいのです。", "book_title": "使える　弁証法―ヘーゲルが分かればＩＴ社会の未来が見える", "author": "田坂 広志"}]}, {"id": 65, "label": "直観力", "freq": 11, "highlights": [{"text": "この鈴木マネジャーは、「直観力」はあるのですが、 「説得力」がないために、意思決定が壁に突き当たるタイプのマネジャーです。 　そして、残念ながら、企業や組織においては、どれほど優れた企画案も、 　それが組織の上層部を説得して了解を取り、実行に移されなければ、 　それは単なる「紙くず」なのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "第一は、理屈だけでは答えの出ない問題に、 　正しい答えを見出すための「直観力」です。 　言い換えれば、「勘が鋭い」ということです。 　第二は、組織内での合意を得て、 　組織を動かしていくための「説得力」です。 　言わば、「言葉に力がある」ということです。 　第三は、意思決定に伴うリスクを取り、 　その結果に責任を取る「責任力」です。 　すなわち、「腹が据わっている」ということです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "そして、この例に象徴されるように、これからの時代には、 　革新的な商品の開発や、創造的な戦略の創出は、 　優れた一人のプロデューサやマネジャーの 　直観力によって生み出される場合が増えていくのです。 　そして、そのことは、裏返して言えば、 　多数の意見が正しさを保証しない場合が増えていくことを 　意味しているのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "また、例えば、経営の世界においても、 　京セラ名誉会長の稲盛和夫氏が、 「狂の世界」の大切さを述べています。 　すなわち、技術開発においても、 　狂人のごとく、考えて、考えて、考え抜き、 「人事を尽くした」とでも言うべき精神状態のなかで 　革新的なブレークスルーが生じるのです。 　このように、もし、我々が、 　論理的に考えて、考えて、考え抜くことによって 「論理を究める」ことができるならば、 　その極限において、必ず、直観力や洞察力、大局観の世界が開けます。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "すなわち、直観力や洞察力、大局観とは、 「感覚を磨く」ことによってではなく、むしろ、 「論理を究める」ことによって身につけることができるのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "なぜならば、そもそも「禅の修行」などの宗教的な方法は、 　直観力や洞察力を磨くために行われるものではないからです。 　さらに言えば、そうした「 現世利益」を目的にして 「修行」を行うことそのものは、邪道なのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "「徹底して考え抜く」ことによって「論理を究める」ことができ、 　そして、不思議なことに、「論理を究める」ことによって 「論理を超えた世界」へと突き抜けていくことができるのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "それを象徴するのが、 「ＭＢＷＡ」（Management By Wandering Around）と呼ばれる 　マネジメント手法です。 　これは、かつて、ピーターズとウォータマンの 『エクセレント・カンパニー』という本のなかでも紹介された 　欧米企業におけるマネジメント手法ですが、 　職場を徘徊（wandering around）するだけで、 　職場に潜在する問題を直観的に把握するマネジメント手法のことです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "「反省」という方法を通じて、 　言語化できることをすべて言語化する努力を尽くすのです。 　そのとき、言語化できないことが、 　徐々に深層意識の領域で明確化されていくのです。 　そして、それらが、あるとき、 　直観の閃きや深い洞察として、意識の表層に浮かび上がってくるのです。 　ヴィトゲンシュタインの語る 「我々は、言葉にて語り得るものを語り尽くしたとき、 　言葉にて語り得ぬものを知ることがあるだろう」 　というメッセージの意味は、まさにここにあります。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "例えば、意思決定において、社内での自分の立場、 　これまでの発言との整合性、部下に対する面子、リスクの重さ、 　そうしたことに対するエゴのこだわりが湧き上がってきたときには、 　それをありのままに「見つめる」ことです。 　いかなる是非善悪の判断も交えず、ただ、ありのままに「見つめる」ことです。 　そのことによって、静かな心境がやってきます。 　そして、我々のなかに静かな心境がやってきたとき、 　直観力の閃きもまた、静かに訪れるのです。", "book_title": "意思決定12の心得", "author": "田坂 広志"}, {"text": "第一級のビジネスマンをめざすには、さらに、すばやい直観力と計画を断固やり抜く強い意志が必要だ。 　それとあわせて、世渡りをする上での如才なさも重要な資質である。この資質は、一つには生まれつきの才能にもよるが、観察や経験によってこれをみがき、伸ばしていくこともできる。如才ない人間は、正しい行動パターンを実にすばやく見つけ出せる。だから目標さえはっきり定まっていれば、引き受けた仕事をたちどころに成功へと導いていけるのだ。 　鋭い直観力、断固たる意志、如才なさ――", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 66, "label": "知の探究", "freq": 10, "highlights": [{"text": "ダーウィンが『地質学原理』を読んで進化論、すなわち自然選択説という考え方を生み出したのは有名な話です。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "人生とは道をきわめることにあり。 　そう決めたら、なすべきことに迷いはありません。科学者としての私は、自然をきわめたいと思ったので、「わかること」と「わからないこと」の境界を探索し、頭のなかに膨大な知識のストックをつくり、その蓄積を元手にして、宇宙、地球、生命、文明について何十年にもわたって考え続けてきました。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "生活にゆとりが出ると、人は人生について考え出し、やがて万物の根源を考える余裕が生まれます。そこで哲学が誕生しました。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "ひと言でいえば、科学はきわめて良好に機能しているのだ。だが大陸や人体の構造のある部分を発見できる回数が限られているのと同様、進化の法則や超新星や熱力学を発見できるのも、たった一回きりなのである（＊", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "こうしてベーコンが唱えた、データ（観察と実験） を重視するあたらしい「知」の方法、事実を踏まえて、理論や結論を導き出すこの考え方は「 帰納法」と呼ばれ、これこそがニュートンに 受け継がれ、近代科学の基礎となっていったのでした。", "book_title": "ミライの授業", "author": "瀧本哲史"}, {"text": "哲学者の戸田山和久は、「哲学は結局のところ何をしているのか」という問いに、「哲学の 生業 は概念づくりだ」と答えています。では哲学は何のために概念をつくるのか。答えは「人類の幸福な生存のため」です。", "book_title": "世界は贈与でできている　資本主義の「すきま」を埋める倫理学 (NewsPicksパブリッシング)", "author": "近内悠太"}, {"text": "なぜそう答えを急ぐのです？　 答えとは、誰かに教えてもらうものではなく、自らの手で導き出していくべきもの です。他者から与えられた答えはしょせん対症療法にすぎず、なんの価値もありません。 たとえばソクラテスは、自身の手による著作は１冊も残しませんでした。彼はひたすらアテナイの人々、特に若者たちと路上での議論を重ね、その哲学を著作という形で後世に残したのは弟子のプラトンです。そしてアドラーもまた、著述活動にほとんど関心を示さず、ウィーンのカフェで人々と対話したり、小さなディスカッショングループで議論することを好んだ人物でした。決して 肘掛け椅子に座る知識人ではなかったのです。", "book_title": "嫌われる勇気", "author": "岸見 一郎、古賀 史健"}, {"text": "概念の世界においては、私たちは誰も晴眼者ではない。概念の世界を直接見ることができない人間にとって、思考するとは、すなわち、慣れ親しんだ概念のすぐ横に全く未知の概念が潜んでいるかもしれない、そんな空間の中を手探りで歩くこと。ひょっとしたら、何度も通り過ぎている思考の道筋のすぐ横に、問題を解くための重大なヒントが隠されているかもしれない。それでも、概念の空間を一覧することができない私たちは、気付かぬままにいるのかもしれない。", "book_title": "挑戦する脳 (集英社新書)", "author": "茂木健一郎"}, {"text": "心理学者のヴィゴツキーは、人は語彙を増やすことで対人的コミュニケーション能力だけでなく、内面における思考能力を高めていると考えました。そして外側に向かう言葉を「外言」、内側で思考の道具となる言葉を「内言」と呼んで区別したのです。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "だとしたら、「哲学者」というのは、考えることの危険と向き合ってきた人々の別名かもしれませ", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}]}, {"id": 67, "label": "集中力", "freq": 10, "highlights": [{"text": "アイデアが勝負の仕事なら、なおさら考える必要があります。 　仕事でよいアイデアを思いつくにはどうしたらよいか。学生時代からずっと考え続けてきた私の結論は、とにかく考え続けること。単純なようですが、これに尽きます。 　考えていなければ、ひらめくことはありません。それも四六時中、考えに考えていなければ、問題を突破できないのです。寝ているときも、考えています。最初からよいアイデアなんか出てきません。執着心と集中力。これが学者にとっては必須の条件です。", "book_title": "138億年の人生論", "author": "松井孝典"}, {"text": "会社は多くのものを守っているけれど、たいていは、いちばん価値があっていちばん大切なものを守れていない。それは 従業員の時間と集中力だ。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "現代の職場は、注意をそらすものに満ちあふれている。 オフィスに一歩足を踏みいれるだけで、話し相手にされたり、質問ぜめにあわされたり、苛立ちをぶつけるサンドバッグにされてしまう。席にすわっても、アンケートを頼まれたり、質問されたり、会議に呼び出されたりする。会議のための会議がある。こんな環境でまともに仕事ができる人などいるだろうか？", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "いったん興味を持ったことはトコトン追求したくなるのも、エースに共通する思考です。", "book_title": "エースと呼ばれる人は何をしているのか", "author": "夏 まゆみ"}, {"text": "ビジネス書を１冊読むたびに新しい事業アイデアや改革案が浮かぶ。それを封印するのは結構つらい。でも、未熟な私が並みの経営者になるには、そのつらさを乗り越えなければいけない。鈍感に見えるくらい愚直に一つの目標しか持たず、それに没頭するのが本当にいい経営者だ。 この８年間、ずっとそう自分を戒めてきた。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "どの戦術も、根底にある考え方は同じだ。 気を散らさないようにするには、すぐに反応できないようにするのがいちばん ということ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "デバイスを置いていく戦術は、子どもの読み聞かせや、進めているプロジェクトで手作業をしたいときなど、「オフライン」のハイライトの時間をつくるのにも役立つ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "僕の朝の日課（戦術14） の重要な柱だ。僕にとって朝はハイライトにうってつけの時間で、しかもパソコンで作業をすることが多い。だから毎晩、ツイッターとフェイスブックからはログアウトする（戦術18）。おかげで、起きてコーヒーを淹れたら、朝の巡回で気を散らされずに、すぐにハイライトを始められるというわけ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "紙に向かうと集中力が高まる。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "ニュートンは、疑いもなく最高の英知を備えた人間であった。彼は多くの輝かしい発見を成し遂げてきたが、その秘訣をたずねられたとき、「いつもその問題を考えつづけていたからだ」と、こともなげに答えたという。また、別の機会に自分の研究方法について次のように語っている。 「私は、研究中のテーマを常に自分の眼の前に広げてじっと見守る。そうすると、闇に一筋の光が差して、しだいに夜が明けていくように、問題の本質がくっきりと浮かび上がってくるのだ」", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}]}, {"id": 68, "label": "データ活用", "freq": 10, "highlights": [{"text": "筆者はデジタルマーケティングの施策をポジショニングする際に、図2-1-2のようにパーチェスファネルを3STEPとして構築し、その中に内部オーディエンスデータと外部オーディエンスデータを別に当てはめてプランニングしている。 パーチェスファネル：購買ファネル。消費者の購買までのプロセスをファネル（じょうろ）に例えて表したもの。ファネル内の階層はさまざまあるが、筆者は3STEP（知る（認知）、欲しい（欲求）、買う（購買））を推奨している。 図2-1-2　3STEPパーチェスファネル上でのオーディエンスデータのボジション 　デジタルマーケティングを行ううえでゴールがデジタルに存在する場合、ゴールまでには必ず3STEPは必要となる。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "「知らない人」には「知ってもらう」 【認知施策】 「知っている人」には「欲しいと思ってもらう」 【欲求施策】 「欲しいと思った人」には「買って（申し込んで）もらう」【獲得施策】 　必ず上の対象者が存在し、下の施策が必要となる。 　外部オーディエンスデータは自社ブランドを知っている可能性が低いため、知ってもらう【認知施策】から行う必要がある。 　一方、内部オーディエンスデータはサイト訪問経験があることがわかっているため、そのブランドをより理解してほしいと思ってもらう【欲求施策】からの開始となる。 　内部と外部のデータ性質を理解し、自社のデジタルマーケティング戦略の中での位置を明確にしたうえで実践することで、より正しいオーディエンスへ正しいコミュニケーションを取ることが可能となる。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "Look-alikeはリターゲティング拡張と似ているが、リターゲティング拡張があくまでもCV（やその他指定のアクション）をしたユーザーに似ている人を探すのに対し、Look-alikeはCV（やその他指定のアクション）した人が外部オーディエンスのどこに所属していたかを知る手法である。どちらも利用するオーディエンスデータは外部オーディエンスなので【認知施策】から行う必要があるが、違いは外部オーディエンスとしての名前がわかるかどうかである。リターゲティング拡張はCVした人に似ている人と機械的にユーザーを抽出しているので名前はない。仮に付けるとしたら「CVした人に似ている人」である。一方Look-alikeは名前が付いている既存の外部オーディエンスデータとCVの関連性を調べるため、関連がある外部オーディエンスの名称がわかる。このことによって先の例のように今まで知り得なかった顧客像がわかるだけでなく、そのオーディエンスデータへ広告配信時に対象者に合わせて適切なメッセージやクリエイティブを作ることが可能である。", "book_title": "DSP/RTBオーディエンスターゲティング入門 (Next Publishing)", "author": "横山 隆治、菅原 健一、楳田 良輝"}, {"text": "市場の相場情報は、さまざまな給与調査会社を通じて得ている。調査会社は僕らの分野のさまざまな会社（大企業からベースキャンプと同じくらいの小さな工房まで）で世論調査を広く行なっている。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "とてつもなく浸透していること」よりも、これによって「あらゆる消費者の購買行動のデータが取れるようになった」ことが重要 です。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "リアル店舗での購買行動を録画し、データとして蓄積して分析することで、行動導線、悩む時のタイミングなど、リアル購買行動データのコンサルティングのような存在を目指しているビジネス", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "アマゾンは Place（チャネル）によって顧客からの行動データを把握し、これを使ってPromotion（販促）・Price（価格）・Product（商品）を変革し、顧客にさらに新しい価値を提案できる のだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "このことをフィリップ・コトラー（２０１７）は、「デジタル時代には標準価格設定から、ダイナミック・プライシング（動的価格設定）に進化する。企業は、過去の購入パターン、店舗までの距離など、顧客プロフィールのさまざまな要素にもとづいて、顧客ごとに異なる価格を請求し、収益性を最適化することができる」と指摘している。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "価格提案は、諸刃の剣だ。アマゾンのように、幅広い商材をすべてアマゾンで買ってもらうことが狙いなら、一定の会費を課金して全員に対する価格提案を行うことも可能だろう。しかしそうではない場合、購入金額に応じたインセンティブ付与は、単なる値下げになってしまう。 　 重要なことは、自社が獲得したい顧客はどんな人々で、どんな行動を獲得したいのかを明確にし、そのためにどんな行動データを獲得するのか、である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "顧客によるブログという「使用段階の顧客の行動データ」を見つけてきた、担当者の目利きと言えよう。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}]}, {"id": 69, "label": "習慣形成", "freq": 10, "highlights": [{"text": "とりわけてネガティブな感情は、力強い内的トリガーとなり、私達の日々の日課に大きな影響を与える。退屈、孤独、失望、混乱や優柔不断などの感情は、時に軽い苦悩やもどかしさを駆り立てる。こういったネガティブな感情を鎮めるためには、人は突発的な行動や、やみくもな行動をとることがある。インの例に戻ると、彼女は、特別な一瞬が消え失せてしまうという不安を抱く際はいつもInstagram を使う。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "インがInstagram を利用する理由として語った、「心に訴えかけるような素敵なものを見かけた時に写真を撮っているだけ」は、ユーザーのニーズを把握するためのカギとなる。Instagram はユーザーを外的トリガーから内的トリガーに誘導したことで、人々の生活の中に習慣を作り上げた。インにとって、残しておく価値のある瞬間を残したいというニーズを、瞬時に解決するのがInstagram なのだ。インがアプリを使用するのに、外部トリガーは必要ない。というのも、彼女にとっては、内部トリガー自身が外部トリガーでもあるからだ。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "多くのソーシャル・ネットワークと同様に、Instagram は「取り残される不安（fear of missing out）」という苦悩を軽減する効果がある。この取り残される不安は、昨今「FOMO」という単語としても知られつつある。Instagram に関して言えば、内的トリガーが新しい習慣の基礎を生み出すのだ。", "book_title": "Hooked ハマるしかけ 使われつづけるサービスを生み出す［心理学］×［デザイン］の新ルール", "author": "Nir Eyal、Ryan Hoover、金山 裕樹、高橋 雄介、山田 案稜、TNB編集部"}, {"text": "3つめの機能は、「ユーザーが歩くだけでたまるポイントシステム」です。いうならば単なる歩数計機能ですが、歩いてたまったポイントを、アプリ内の健康食品、美容品、医薬品の購入時にお金として使うことができます。これだけ聞くと、なんとなくよくありそうな機能に聞こえるかもしれませんが、秀逸なのは、 ユーザーは1日が終わる前に1度アプリを開き、「歩いた分を換金する」というボタンを押さないと、歩数がリセットされてしまうという仕組み です。そのためユーザーは、必ず1日に1回はアプリを開く行動が習慣化しています。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "リーダーシップ論の世界的権威であるロビン・シャーマは、「人間は３週間、何かを続ける事ができれば、その行為は習慣となり、３週間後には無意識にその行為を続ける事ができる」と語っています。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "一度何かを３週間でやり抜くと、その間に経験値が爆発的に高まっていき、どんどん効率化が進みます。３週間を過ぎる頃には、何も知らなかった時の何倍、何十倍もの効率で、飛躍的に高い結果が得られるようになっていくのです。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "既にご紹介した通り、リーダーシップ論の世界的権威であるロビン・シャーマによれば、人間は何らかの行為を３週間続ける事ができれば、３週間後には無意識にその行為を「習慣」として続ける事ができるそうです。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "意思のない人に何を言っても時間の無駄だからです。 意思があった上で習慣をつくり、習慣が個性をつくることを目指します。 一流になりたい人だけが一流になります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "とにかく、聴くといい気分になる曲を選ぶことが大事だ。そうすれば、 それを聴くことはキューにもなり、報酬にもなる。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "小さく、毎日——できるだけ毎日——続けよう。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}]}, {"id": 70, "label": "現実認識", "freq": 10, "highlights": [{"text": "さらにいうと、長期計画は偽の安心感を植えつける。五年後、三年後、一年後に世界がどうなっているかなんてわからない。そう認めるのが早ければ早いほど、あやふやな将来に向けて大きな決定を何年もまえに下さねばならない恐怖を感じずに前に進むことができる。予測を立てなければ、予測に押しつぶされることもない。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "そういう虚構の世界の住人が虚しいと思うか、それとも新しい文化的アプローチのあけぼのだと思うかどうかはその人の価値観です。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "科学の対象としている現実はひとつであっても、現実そのものはもっと多層的であり、そこに唯一の正しい現実があるのではない。その多層的な現実をどのように知り、どう折り合いをつけるかという困難な仕事をするのが、中年なのである。ここのところがうまくいかないと、青年のままで年をとるので、老いや死を迎えるのが、大変なことになってくる。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "忍耐は、人間関係で大きな喜びが感じられるようになってからも、不要にはならない。たとえ私たちがみな完璧だったとしても、やがて知り合うことになる相手には、必ずその人なりの物の見方がある。「良いときも悪いときも」という典型的な結婚の誓いは、対人関係で永久に摩擦はなくならないと、おおっぴらに宣言しているようなものだ。親友やおしどり夫婦にも意見の食い違いはあるし、ときには互いを傷つけることもある。こうした現実にもかかわらず成功する秘訣は、摩擦の瞬間を拡大解釈して大げさに受け取らないことだ。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "人が1日をどう感じるかは、自分の身に起こる「できごと」によって決まるのではない。 人は「何に注意を向けるか」によって、みずからの現実をつくりあげている のだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "つまり、ものすごく近くにある課題とものすごく遠くにある関心事の両方を大事にする。なぜこんな話をするのかというと、その間にある中間的な領域のことはなかなか思い通りにならないんですね。どんな大学に行きたいとか、どんな会社に行きたいとか、そういったことはなかなか思い通りにはなりません。", "book_title": "目的への抵抗―シリーズ哲学講話―（新潮新書）", "author": "國分功一郎"}, {"text": "コミットメント期間という枠組みが社員の離職を「あらかじめ許す」ことにならないかと心配する向きもいた。だが、離職は会社側が許す・許さないと決められるものではない。そのような権限が会社にあると思うのはただの自己欺瞞であり、社員との間に不誠実な関係を生み出すことにつながる。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "今は、企業の目標が社員にとって唯一絶対の目標になるなど、期待できない時代だ。基盤型コミットメント期間にいる社員（非常に少数）でもない限り、社外での可能性を求め広げたいと思うだろう。起業家精神旺盛な社員なら、会社と切り離した「個人ブランド」を築き上げたいと考える。終身雇用の終わった現在、こうした反応は、合理的だし必要なことでもある。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "整合性を高めるには、時に微調整や妥協も必要になる。繰り返しになるが、自分の中核にあるありたい姿や価値観が丸ごと会社の目的として掲げられている、などという社員はまずいない。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "こうした率直な対話から浮かび上がってくる会社の真の姿は、経営幹部が予想もしなかったものになるかもしれない。しかし、「自分たちには社会的使命を重視するカルチャーがある」と経営陣が思い込んでいる企業で、実はカネだけで動く傭兵のような姿勢に満ちていた、というケースは非常に多い。マネジャーは自社の真の企業文化を理解しておく必要がある。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 71, "label": "情報収集", "freq": 10, "highlights": [{"text": "市場の相場情報は、さまざまな給与調査会社を通じて得ている。調査会社は僕らの分野のさまざまな会社（大企業からベースキャンプと同じくらいの小さな工房まで）で世論調査を広く行なっている。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "じっくりと考える余裕、情報を集める時間、遊び心、十分な睡眠、そして何を選ぶかという厳密な基準だ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "社内には法人営業部員が３人だけいるが、これは大手法人客の情報収集がおもな仕事だ。そこで勝負する気はそもそもない。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "人は価値のある情報を半分くらいしか漏らさないが、最優秀な人の半分の情報は私のような凡人にとって超貴重なものだ。 私は価値の高い情報を持っている社外有識者に１時間の話を聞くために、１か月くらいの準備をいとわない。２〜３人くらいを経由して、その人物を紹介してもらえることが多いが、不成立のケースもある。年数回だけでも、本当に価値のある人に会って話を聞ければ十分ではないかと思う。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "そうした情報（Information）を構造化によって洞察（Insight）に変えるためには、「そんなの知ってる、知ってる」という態度ではなく、 謙虚に自分が知らないことを認識して貪欲に情報を収集していく必要があります。 情報（Information）だけならネット上にいくらでもあります。", "book_title": "世界で活躍する人は、どんな戦略思考をしているのか？ (中経出版)", "author": "塩野 誠"}, {"text": "１つは消費者はどのようにして購買意思決定に必要な情報を集めているのか、もう１つは商品はどのようにFulfill（運ばれる／満たされる）されるのか、である。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "また、活動をマルチにしていると、同じ業界の中で一つの活動をしているだけではなかなか出会えない、意外性のある「 Z 軸にある情報」も自然に得やすくなるでしょう。本業とは一見関係のない情報でも「これは使える」「そういうことがあるんだな」と直感的に思ったものを拾っておいて、本業でアイデアを求められたときにパッと組み合わせてみせる。発想の豊かな人は、そういうセンスに長けているものだと思います（また、そういう人は、話を聞くときにも本を読むときにも、よくメモを取っているものでしょう）。 　その才能は、仕事だけを一生懸命やっていても磨かれていかないものです。仕事熱心であるのは良いことですが、同時に、日頃から活動を多面的にしている必要もあります。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}, {"text": "何度も繰り返すが、お客様はネットを使って 情報 を求めている。 いかにも広告っぽい、宣伝くさいディスプレイ広告が無視されるのは当たり前である。", "book_title": "１００％確実に売上がアップする最強の仕組み", "author": "加藤公一レオ"}, {"text": "当時ペイパルの上級幹部だったリード・ホフマンだった。彼は幹部クラスから個々のエンジニアに至るまでスタッフ全員に、各自のネットワークを活用して、ビルポイントの戦略を探るよう命じた。一方、ビルポイント側の担当チームは、ペイパルの戦略を読み取るのにネットワーク情報収集力の活用を一切考えなかった。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}, {"text": "社内の人々のネットワーク情報収集力を活用する変わった仕組みを導入している。毎回パートナー会議の冒頭に「うわさ」を持ち寄り、一番いいものに一〇〇ドルの賞金を出しているのだ（うわさ話の真偽は問われない）。", "book_title": "ＡＬＬＩＡＮＣＥ　アライアンス", "author": "リード・ホフマン, ベン・カスノーカ, クリス・イェ, 篠田 真貴子, and 倉田 幸信"}]}, {"id": 72, "label": "継続性", "freq": 10, "highlights": [{"text": "それは、 新しいものは新しい顧客に売り、これまでの顧客にはすでに使っているものを使いつづけられるようにする ことだ。こうすることで、平和を保ち、 穏やかさを維持することができる。", "book_title": "NO HARD WORK!　無駄ゼロで結果を出すぼくらの働き方 (早川書房)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、久保 美代子"}, {"text": "ファンという支持母体と一緒に継続して価値を上げていく中長期的な過程であることを忘れてはならない。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "ＳＮＳ担当者が重要なのは「日々の愛着を強められるから」である。", "book_title": "ファンベース　──支持され、愛され、長く売れ続けるために (ちくま新書)", "author": "佐藤尚之"}, {"text": "リーダーシップ論の世界的権威であるロビン・シャーマは、「人間は３週間、何かを続ける事ができれば、その行為は習慣となり、３週間後には無意識にその行為を続ける事ができる」と語っています。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "一度何かを３週間でやり抜くと、その間に経験値が爆発的に高まっていき、どんどん効率化が進みます。３週間を過ぎる頃には、何も知らなかった時の何倍、何十倍もの効率で、飛躍的に高い結果が得られるようになっていくのです。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "既にご紹介した通り、リーダーシップ論の世界的権威であるロビン・シャーマによれば、人間は何らかの行為を３週間続ける事ができれば、３週間後には無意識にその行為を「習慣」として続ける事ができるそうです。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "社長が目標を一つに定め、それを「愚直」に継続すれば確実に会社は変わる。 重要でない目標をつくり、期限を定め、ノルマにしてプレッシャーをかけ続ける方法は断じて間違っている。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "に、「人間の運命はなかなか片付かないもんだな」と言って、お住を驚かせる。", "book_title": "中年危機 (朝日文庫)", "author": "河合　隼雄"}, {"text": "小さく、毎日——できるだけ毎日——続けよう。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "自分に合ったいいものを長い間愛用するというのは、長期的な人間関係を大切にする一流の人に共通する行動パターン である。", "book_title": "最強の働き方―世界中の上司に怒られ、凄すぎる部下・同僚に学んだ７７の教訓", "author": "ムーギー・キム"}]}, {"id": 73, "label": "社会構造", "freq": 10, "highlights": [{"text": "仏教は、統一国家を作りたいと考えていた王族に多く支持されます。ジャイナ教はその徹底した不殺生主義のため、商人階級（庶民階級） から支持されました。カーストを否定しつつも、カーストごとに〝断絶〟した宗教だったわけです。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "「人間関係は、疎で多。緊密だと人間関係は少なくなる」 「人間関係は、ゆるやかな 紐帯」", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "多くの人が、江戸時代の人口統計で「 名字帯刀」の武士とそれ以外の人の比率を意外と知らない。統計によって多少ばらつきがあるが、武士階級はおおむね全体の五パーセントから一〇パーセントだったと言われている。テレビや映画で描かれる時代劇に武士が登場することが多いので、武士階級が多かったと勘違いしている人も少なくない。 　江戸時代までは、日本の人口の九〇パーセント以上は侍ではなかった。ほとんどが農民や町人だった。武士階級はたった千年ほど前に出てきた新興成り上がり勢力にすぎず、日本人のほとんどは農民の遺伝子を継いでいると言っていい。日本は農耕文化の国で、その頂点に天皇家が君臨する社会システムで何千年という歴史を重ねてきた。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "ダンバーが人間にとっての自然な社会集団の大きさをだいたい一五〇人前後と推定した背景には、バンドのイメージが具体的にあったわけです。", "book_title": "モラルの起源－実験社会科学からの問い (岩波新書)", "author": "亀田 達也"}, {"text": "歴史的に見ていくとわれわれは群れとして機能していて、役割は要請されるけれども個人的な自我は要請されていなかったということはおわかりになりますか？", "book_title": "世界の中にありながら世界に属さない", "author": "吉福伸逸"}, {"text": "政治とは、国民の考えや行動の反映にすぎない。どんなに高い理想を掲げても、国民がそれについていけなければ、政治は国民のレベルにまで引き下げられる。逆", "book_title": "自助論―――「こんな素晴らしい生き方ができたら!」を実現する本 (知的生きかた文庫)", "author": "Ｓ スマイルズ、竹内 均"}, {"text": "尊敬や忠誠＝不安定で資産化しにくい 　威信や畏怖＝安定していて資産化可能 　こういう構図があるからこそ、支配者は大きな城を作るんですね。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}, {"text": "それで何をやっているかと言えば、国の医療保険制度にたかっている。その証拠が最近の医療問題のレベルの低さだ。小児科医や産婦人科医が減ったとか、無医村が急増しているとか、救急医療が崩壊するとか。どれも要するに保険にたかりにくい分野から、医者が逃げ出しているというだけの話だ。 　そういう意味で、いちばん喰いっぱぐれる心配がないのが老人医療だ。老人専門の病院がいちばん楽に儲かる。", "book_title": "超思考", "author": "北野武"}, {"text": "他国になくて日本にしかないものに規制をかけ、取り締まる事です。産業で言えばＧＤＰ５００兆のうちの６％占めるパチンコ産業（約 30 兆円）、 10 兆円産業の風俗産業、１兆円産業の覚せい剤などアンダーグラウンドにはじまり、フッ素やブロイラーの鶏など、禁止されている国もあるのに、内緒にされ、日々我々が口にしているものまで様々です。そして、これらの真実を報道しないマスメディアのクロスオーナーシップを先進国に倣い違法にし、それによって皆同じ方向を向き、社会に声を出さないように飼い慣らされている仕組みを変えることです。これが変わらない限り、日々日本は疲弊するでしょうね。国際化とは、英語を話す人が増えることではありません。", "book_title": "黒本", "author": "高城剛"}, {"text": "人間関係を換金したり、別の力学に応用するビジネスは、古今東西多くあります。ネットワークビジネスもそうでしょうし、もしかしたらＳＮＳの中には、そのような要素があるのかもしれません。そして、このような「現代社会の罠」のようなものに溺れてしまう原因の多くは「愛」や「情」が日常や人格形成の中で不足していることから起きると言われています。日々の「寂しさ」や「虚しさ」を忘れるために、なにかに「依存」する「現代社会の罠」は、あらゆるところに潜んでいると思います。 　そして宗教の中にも、そのような要素があることも否めません。この「なにかに依存する心」を求める人は、今後ますます増えることになると僕は思います。それは、「自分を見失ってしまうから」起きることだと思います。その原因は、日々社会が「愛」も「お金」も「友情」も「モノ」も「情報」も「つながり」も、「あなたは不足してますよ！」と訴える仕組みでできているからです。ですので、真面目な人たちほど、「不足しているので補わなければ」と思います。そして現在、多くの人は「自分は不足している」と感じている上に「もう補えない」と思っているので疲弊しているのです。", "book_title": "黒本", "author": "高城剛"}]}, {"id": 74, "label": "歴史認識", "freq": 10, "highlights": [{"text": "我々からすると現代のイスラム教内での宗派争いに見える中東の構造も、「プライド高き伝統あるペルシア人 vs イスラム教の元祖・アラブ人」という構図 を知ることで、知られざる一面が見えてくることがあります。", "book_title": "「24のキーワード」でまるわかり! 最速で身につく世界史", "author": "角田 陽一郎"}, {"text": "多くの人が、江戸時代の人口統計で「 名字帯刀」の武士とそれ以外の人の比率を意外と知らない。統計によって多少ばらつきがあるが、武士階級はおおむね全体の五パーセントから一〇パーセントだったと言われている。テレビや映画で描かれる時代劇に武士が登場することが多いので、武士階級が多かったと勘違いしている人も少なくない。 　江戸時代までは、日本の人口の九〇パーセント以上は侍ではなかった。ほとんどが農民や町人だった。武士階級はたった千年ほど前に出てきた新興成り上がり勢力にすぎず、日本人のほとんどは農民の遺伝子を継いでいると言っていい。日本は農耕文化の国で、その頂点に天皇家が君臨する社会システムで何千年という歴史を重ねてきた。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "日本の歴史には明らかに 歪曲 がある。日本人のファンダメンタルズは、昔から変わっていないのだ。日本人は先祖伝来、ほとんどの人が夫婦で一緒に働いて、一緒に子どもを育ててきた。現代人には、むしろ平均的な日本人本来の姿に戻れと言いたい。はばかりながら、冨山家は正真正銘のドン百姓、明治の御一新でやっとお上から「冨山」という名字を頂戴した、由緒もへったくれもない血筋である。だから、お武家さまやお公家さまたちの「日本の伝統論」には、くそくらえとしか言いようがない。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "だからぼくは日韓関係については、もはや正しい歴史認識を共有すべきではなく、むしろ「歴史認識を共有できないという認識を共有すべき」だと考えています。従軍慰安婦問題に限らず、さまざまな事件について、韓国には韓国の、日本には日本の言い分があって、それぞれの国で過激な主張がある。そこであるひとつの「正しい」歴史認識を強引に共有しようとしたら、下手をすると戦争になる。むろん、真実はひとつです。けれども言葉ではそこには到達できない。だとすれば、「真実を探さない」ことが合理的であることもありえます。", "book_title": "弱いつながり 検索ワードを探す旅", "author": "東浩紀"}, {"text": "金融は産業の主役ではなく、産業に力を与える脇役であり縁の下の力持ちなのだという、本来の己の分限をわきまえていなければ、同じ論理で自己肥大と自己崩壊をくりかえすしかない。金融工学という道具でみずからをつぶすという歴史はくりかえされるのである。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "そもそもヘッジファンドとは、季節変動や需給バランスによる価格の乱高下を避けるために、先物買いをすることによって価格を均一化しようという目的でできたものであった。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "話はそれるが、世界に出てみると、日本の長い歴史と、日本的な資本主義の歩みは、日本人にとっての大きな財産だと、身に染みて痛感することが多い。「おかしな常識」に惑わされないためには、いまこのときだけを見るのではなく、歴史を踏まえ、人間の何たるかを考える大きな視野が必要であろうが、その点、日本人はたいへん恵まれている。先人たちの歩みが、われわれに大きな叡智を与えてくれているからである。経営の透明性など変えていかなければいけない点も多いが、日本人として、このことは十分に自覚すべきだと思う。", "book_title": "新しい資本主義 希望の大国・日本の可能性 PHP新書", "author": "原 丈人"}, {"text": "ロシアでさえアフガン出兵が国家財政に過度の負担を強いてソ連解体を促した記憶を失っていません。", "book_title": "新・地政学　「第三次世界大戦」を読み解く (中公新書ラクレ)", "author": "山内昌之、佐藤優"}, {"text": "脱成長コミュニズムを実現しない限り、どんな行動も人類絶滅を防ぐには役に立たないからである。このような考え方には「根本病」という言葉がぴったりである。 　戦前を代表するジャーナリスト石橋湛山は、あらゆる弊害は資本主義に由来すると信じる根本病を痛烈に批判している。", "book_title": "自由と成長の経済学 「人新世」と「脱成長コミュニズム」の罠 (PHP新書)", "author": "柿埜 真吾"}, {"text": "産業時代の人々は、もう農業時代には戻れません。それどころか身分制度やキリスト教時代の人たちのことを、理解できなくなってしまっているのです。 「身分制度と無知が支配していた、暗黒の中世」 「『本当の自由』を知らない、かわいそうな貧乏人たち」 　とこのように、前時代を理解できなくなって、過去を差別しちゃうのです。", "book_title": "評価経済社会・電子版プラス", "author": "岡田斗司夫 FREEex"}]}, {"id": 75, "label": "効率化", "freq": 10, "highlights": [{"text": "金融は本来、お金が余っているところと足りないところをつなぐ独占的なポジションをとることで、利ざやを稼ぐビジネスです。他に代替が効かないポジションに位置しているからこそ、大量の人間が一つひとつの取引を手作業で確認するという、ある意味、贅沢な仕事のやり方が許されてきたともいえます。しかし、フィンテックによって、そうした機能が低コストで実現できるようになると、既存の金融機関も現在の高い人件費を維持できなくなるかもしれません。", "book_title": "いまさら聞けない ビットコインとブロックチェーン", "author": "大塚雄介"}, {"text": "ローカル経済圏の中核にあるサービス産業において、労働生産性を上げるためのアプローチは「ベストプラクティス・アプローチ」が望ましい。ベストプラクティス・アプローチとは、別の企業や事業体が行う似たようなパフォーマンスを自社に取り入れ、労働生産性を上げることを意味する。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "これによって空いた時間は、より信頼を創るコミュニケーションに当てることで、ユーザー側にも企業側にもメリットがある仕組み", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "一度何かを３週間でやり抜くと、その間に経験値が爆発的に高まっていき、どんどん効率化が進みます。３週間を過ぎる頃には、何も知らなかった時の何倍、何十倍もの効率で、飛躍的に高い結果が得られるようになっていくのです。", "book_title": "ブチ抜く力 (扶桑社ＢＯＯＫＳ)", "author": "与沢 翼"}, {"text": "一般に、会社の中に価値を生まない仕事は８割あるといわれている。", "book_title": "ワークマン式「しない経営」――4000億円の空白市場を切り拓いた秘密", "author": "土屋 哲雄"}, {"text": "結果的に好立地の店舗でも、在庫のための保管スペースにかかるコストをおさえることができる。さらに決済は店員の端末から行われるため、現金のやりとりがない。レジスペースも、レジ締め業務もない、スタッフにとっても効率的な店舗、というわけだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "注文内容は、各店舗に常駐しているインスタカートのスタッフ（shopperと呼ばれている）の端末に表示される。スタッフはこれに沿って店内を回遊して商品をピックアップし、袋詰めしておくという段取りだ。 　 商品の受け取り方法は、２種類ある。外出時や帰宅途中に店舗に寄れるのであれば、ピックアップを選択すればよい。店の", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "つまりその狙いは、「回転率の向上」にある。立ち食い・低価格を基本とするいきなり！ステーキのビジネスモデルにとっては、回転率を上げることは命綱である。だから「繰り返しの来店をコミットしてもらう」ことに、フォーカスしたプログラムになっているのだ。", "book_title": "世界最先端のマーケティング", "author": "奥谷孝司、岩井琢磨"}, {"text": "イギリスの著名な哲学者アルフレッド・ノース・ホワイトヘッドは、こうした現代生活の避けて通れない問題を認めて、断言しています、「文明を発展させるには、人間が考えずにできる行動を増やすことである」と。", "book_title": "影響力の正体　説得のカラクリを心理学があばく", "author": "ロバート・Ｂ・チャルディーニ、岩田 佳代子"}, {"text": "基本回転数の話からは少し離れますが、時間の制約を設けることが有効なのは、重要度が判断しやすくなるからでもあります。 　どんな職業でもそうだと思いますが、仕事というのは、突き詰めて考えすぎると、無限個の問題が発見できてしまうものです。", "book_title": "脳が冴える１５の習慣　―記憶・集中・思考力を高める　生活人新書", "author": "築山 節"}]}, {"id": 76, "label": "働き方", "freq": 10, "highlights": [{"text": "マネジャーやリーダーがすべき成果の評価というのは、当たり前のことを当たり前にできたということに対する評価もきちんとすることです。 　リモートワークを中心として、多様な働き方をする人が増えたからこそ、その人がやるべきことをできる人かどうか、普通のことを普通にできる人かどうかが評価されるのです。", "book_title": "これからのマネジャーは邪魔をしない。", "author": "石倉秀明"}, {"text": "日本の歴史には明らかに 歪曲 がある。日本人のファンダメンタルズは、昔から変わっていないのだ。日本人は先祖伝来、ほとんどの人が夫婦で一緒に働いて、一緒に子どもを育ててきた。現代人には、むしろ平均的な日本人本来の姿に戻れと言いたい。はばかりながら、冨山家は正真正銘のドン百姓、明治の御一新でやっとお上から「冨山」という名字を頂戴した、由緒もへったくれもない血筋である。だから、お武家さまやお公家さまたちの「日本の伝統論」には、くそくらえとしか言いようがない。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "これに対し、ローカル経済圏での雇用は、基本的に「ジョブ型」だ。ジョブ型はメンバーシップ型とは正反対で、仕事内容、労働時間、勤務地がおおむね限定される。ローカル経済圏の中心となるサービス産業は、完全にジョブ型である。", "book_title": "なぜローカル経済から日本は甦るのか GとLの経済成長戦略 (PHP新書)", "author": "冨山 和彦"}, {"text": "一等地のオフィスに豪華な内装を施し、一見社員の働きやすさのためにとも思えるフレキシブルな勤務体系を実現するというのは、まだ事業が成長し、気持ちよく社員が働いてくれることで上がる生産性がそのまま収益に直結していた時代のことです。インプットを増やせばアウトプットが増えるという成長のシナリオが一度崩れると、そういう社員に対する厚遇が一転するのもまた、成長企業が業績停滞を起こしたときに見せる典型的な症状と言えます。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "追跡調査をしてみると、どの女性も「時短で無理に働いて得られる収入はそれほど多くなく、結局学童保育代や習い事、ベビーシッターなどの支払いに消えるだけで何のために無理をして働いているのか分からなくなった」という回答をしてきます。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "２人めが欲しくてもコスト的に合わない」と考えてもおかしくないのは首肯できます。これらの「無理に働いても、子育ての費用と行って来いならばパートでもやりながら家庭にいたほうが精神的に安定する」という類の回答は深く考える必要のあるテーマになりつつあります。", "book_title": "ズレずに生き抜く　仕事も結婚も人生も、パフォーマンスを上げる自己改革 (文春e-book)", "author": "山本 一郎"}, {"text": "働きすぎをふせぐためには、チーム全員でお互いに目を光らせておくことだ。そして何より、チームをまとめるリーダーや経営者が「働きすぎはよくない」というムードをつくっていく必要がある。リーダーが残業好きだと、部下もそれに引きずられてしまう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "僕らの会社では、働きすぎをふせぐためにユニークなしくみを用意している。 　たとえば５月から 10 月にかけては、週の休みを１日多くする。気候のいい時期に、なるべく外にでて息抜きをしてほしいからだ。また社員の趣味活動を支援しているし、クリスマス休暇にはさまざまな企画旅行をプレゼントしている。 　働かないチームはいらないが、仕事ひとすじのチームも困りものだ。うまく息抜きできる人のほうが、長く安定して成果をだしやすい。 　働きすぎず、休みすぎず。週 40 時間くらいが、ちょうどいい目安になるだろう。", "book_title": "リモートワークの達人 (ハヤカワ文庫NF)", "author": "ジェイソン フリード、デイヴィッド ハイネマイヤー ハンソン、高橋 璃子"}, {"text": "その意味では、中国の若者に見られる「寝そべり族」の方がより深刻な問題です。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "それは私たちの生活から〝オン〟と〝オフ〟の区別が消えた、ということになると思う。", "book_title": "代官山オトナTSUTAYA計画", "author": "増田 宗昭"}]}, {"id": 77, "label": "専門性", "freq": 10, "highlights": [{"text": "とり組む対象が「遊び」要素の強いものであればあるほど、夢中度が高ければ高いほど、その行きついた先にある「点」はユニークで交換不可能なものになりやすい。 「遊び人」は常に「賢者」になれる可能性を秘めているのだ。", "book_title": "その仕事、全部やめてみよう――１％の本質をつかむ「シンプルな考え方」", "author": "小野 和俊"}, {"text": "た。「私は政治のよくわかる人物にこう訊いたんです。『いったいこの両者をうまく嚙みあわせるにはどうしたらいいんだろう？』とね。すると彼は、『相手の真意を知ろうとすることだよ』と言う。『どうすればそれができるんです？』と訊くと、彼はこう答えました。『科学者に自分の専門以外のことを考えさせるようにすること", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "ガディシュは自分自身を「ジェネラリストのエキスパート」と呼ぶ（あるいは「エキスパート・ジェネラリスト」とも──これは彼女が社内で流通させている言葉で、どんな業界についても革新的な戦略を考案することに長けた人間を指す）。", "book_title": "アイデアは交差点から生まれる　イノベーションを量産する「メディチ・エフェクト」の起こし方", "author": "フランス・ヨハンソン、幾島 幸子"}, {"text": "そうならないためにも、〝想い〟を断ち切り、数字だけを見てドラスティックにやっていく必要があります。そういう意味でプロダクトチームとグロースチームは分けるべきだということになるわけです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "では、ブレイントラストはほかのフィードバック体制と何が違うのだろうか。 私は、二つの重要な違いがあると考えている。第一に、ブレイントラストのメンバーは、ストーリーテリングに深い造詣を持つ人ばかりで、たいていそのプロセスを自ら経験している。", "book_title": "ピクサー流　創造するちから", "author": "Ed Catmull、Amy Wallace、石原 薫"}, {"text": "必要なのは、知名度でも高度な読解力でも専門知識でもなく、「不妊治療のステージ別必読本リスト」を作れば、きっと多くの人にとって価値があるだろうと気がつくマーケット感覚であり、それぞれの段階にいる人が何に悩み、どんな価値を求めているのか、正しく理解する力（マーケット感覚）なのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "高度化する社会において、専門性は確かに重要です。しかし変化の早い時代には、 20 代に身につけた専門性が、 60 代まで 40 年間も通用し続ける保証はどこにもありません。 これからは一生にひとつの専門性ではなく、 10 年、 20 年ごと、時には数年ごとに学び直し、一生の間に複数の専門性を身につける必要があります。つまり、専門性を身につけたうえで、変わり続ける必要性があるのです。", "book_title": "マーケット感覚を身につけよう---「これから何が売れるのか?」わかる人になる5つの方法", "author": "ちきりん"}, {"text": "それが今では日銀が金利の正常化を始めたことで、日本国債のトレーダーが引く手あまたになっていると聞くことがあります。日本国債をトレードするノウハウがないので、生き残った経験者には希少価値が出ているようです。", "book_title": "世界秩序が変わるとき　新自由主義からのゲームチェンジ (文春新書)", "author": "齋藤 ジン"}, {"text": "いろいろな団体に顔を出す人間ではない、と自分のことを説明していた元大学教授は、退職するまで、自分にも集団的つながりへの欲求があるとは夢にも思わなかった、と語ってくれた。中西部にある実家の農場で暮らすために帰郷してみてようやく、高名な大学の専門的な学部の一員たることが自分にとってどれほど意味があったか気づいたのだという。", "book_title": "孤独の科学　人はなぜ寂しくなるのか (河出文庫)", "author": "ジョン・Ｔ・カシオポ, ウィリアム・パトリック, and 柴田裕之"}, {"text": "なぜ、そのニュースが僕の目に留まったのか、をいつも考えています。それは、目の前の情報に僕自身がとらわれていないからなんだと思います。日々、情報が簡単に入手できるようなスタイルを持っていると、実は情報に振り回されてしまって、さらに多くの情報を得ようとし、結果混乱に向かいます。大切なことは、情報を得る前に、自分でしっかりイメージすることにあります。なぜ、この問題が起きて、さらにはなぜ僕自身にひっかかるのだろう？　それを別の情報を探して解決しようとするのではなく、まずイメージするのです。僕は今も昔も政治経済に関してプロフェッショナルではありませんが、プロフェッショナルではないからこそ、自由闊達にイメージし、考え、発言できるのだと思います。すなわち、「今」の情報に裏付けられたプロフェッショナルの発言ほど、「今後」のアテにならないものはありません。プロは、間違ってはいけない訳ですから、常にちょっと前の過去の数字の話だけをします。ですので、大情報時代になればなるほど、プロとは違った自由なイメージを持つことが個々に大切になるのです。", "book_title": "白本", "author": "高城剛"}]}, {"id": 78, "label": "国際比較", "freq": 10, "highlights": [{"text": "確かに薬を内服するひとが増えたことによって解決したと考えられている国もある。フィンランドである。かつてフィンランドは自殺で亡くなるひとがとても多かった。そこで一九八六年から本格的に自殺対策が開始された。徹底した受診と内服支援も行われた。この結果、二〇〇七年の段階で一九八六年当時より自殺死亡率は三〇パーセント減少した（内閣府『平成二二年度版　自殺対策白書』）。フィンランドのひとに直接聞いてみると、医療がうまく機能したと考えるひとが確かに多かった。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "寒い地域は自殺で亡くなるひとの数が相対的に多い。実際に日照時間が少ないことはとてもしんどいことのようで、フィンランドに行ったときは至るところに人工のライトがおいてあるのを目にした。", "book_title": "その島のひとたちは、ひとの話をきかない――精神科医、「自殺希少地域」を行く", "author": "森川すいめい"}, {"text": "移民によって GDP が上向くのは、経済の常識です。たとえばカナダにおいては、 1990 年代の経済成長のおよそ 9 割が「移民」によるものだったという分析もあるほどです。私の母国のイギリスもこの 20 年間、移民を主に東ヨーロッパから大量に受け入れてきたことによって、この数年 G 7 の国々のなかで一番成長しています。 2014 年にはフランスを抜いて、第 5 位になりました。 20 年後、ドイツを抜いて第 4 位になるという予想まであるほどです。この違いは、人口の違いです（ 2014 年には、イギリスの新聞「Telegraph」でも報道されました）。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "日本庭園も素晴らしいです。特にガーデニング文化のあるイギリス人は日本庭園を見ると、大きな衝撃を受けます。イギリスの庭園で、もっとも重要なのは芝生です。芝生の敵は苔ですので、日本庭園のメインが苔で、何よりも大事にされているというのは、信じられないことなのです。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "このように文化に幅があるという話をすると、必ず「日本の特徴の 1 つは、さまざまな文化をうまく取り入れて、自国の文化としてアレンジすることだ」というようなことをおっしゃる方がいますが、それは違います。 　異文化をうまく取り入れるのは、何も日本だけの特徴ではありません。例を出せばきりがありませんが、たとえばヨーロッパにおけるキリスト教はその典型でしょう。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "日本のみなさんからすると当たり前かもしれませんが、世界的に見れば、権力者が変わると前の政権の文化的な建造物などは破壊されてしまって、文化財がしっかりと残らないケースも多いのです。そのため、「文化財」をもっている国の多くは、それだけで観光立国に有利なのです。もちろん、「多様性」と「お金を落とす」という点からも、これからの日本では文化財がカギの 1 つになってきます。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "ここにポイントがあります。日本では、文化財を「守る」ことを基準にしていますので、修復は必要最低限で、見栄えは重視されてきませんでした。そのうえ、修復計画を練るのは建築家が中心なので、屋根や工体の修復が中心になります。つまり、日本の文化財行政は保存を主な目的としているために、予算が少ないのです。 　一方、海外では、観光にも対応するために頻繁に小修理を繰り返しているため、予算が増える傾向にあります。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "海外では、いまどきこれはありえません。説明がさしていらないインパクトのある文化財でも、その価値を最大限にアピールするために、説明の努力は惜しまないのです。 　たとえば、ヴェルサイユ宮殿の公式ホームページを見てみましょう。 11 カ国語のオーディオガイドがありますし、インタラクティブマップ、イベントカレンダーなど細かい情報が満載で、「見学の参考に」という Q＆ A も充実しています。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "神様でなくても、旧ソ連や文化大革命時代の中国のように共産主義などの超越的な理念を信じているのも強みになりえます。私はアメリカでは、大した情報屋と知り合う機会がなく、ドイツでも生真面目なボーイスカウト・タイプにしか出会いませんでした。やっぱり悪いのはイスラエル、ロシア、イギリスでしょう。", "book_title": "知の教室　教養は最強の武器である (文春文庫)", "author": "佐藤　優"}, {"text": "たとえばアメリカではディーヴァ（歌姫）と呼ばれる圧倒的に歌唱力のある歌手が人気ですし、韓国ではお金も時間もかけて、技術的に完成されたアイドルグループをデビューさせるのが一般的です。", "book_title": "職業としての地下アイドル (朝日新書)", "author": "姫乃　たま"}]}, {"id": 79, "label": "体験価値", "freq": 10, "highlights": [{"text": "消費はモノからコトへ」と長く言われ続けていますが、アフターデジタルにおいては、「顧客体験」や「ジャーニー」という言葉を使ったほうが適切 です。「", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "アフターデジタルにおけるリアル接点の役割」である、体験価値や感情価値をそのまま体現している店舗設計と言えるでしょう。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "オンライン売上8~9割、店舗売上1~2割だそうですが、だんだんと顧客が体験価値に気づいて遊びに来るようになるので、最終的には店舗売上が4割程度まで上がる", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "アフターデジタルにおいてリアルチャネルは、『密にコミュニケーションを取れる貴重な接点』であり、高い体験価値や感情価値が求められるようになる」", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "特別な経験の提供が人を外に連れ出す」という意味では、ウェアラブルカメラメーカーのGoProがサーフィン人口を増やした例を挙げることもできるでしょ", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "最終的に顧客にどのような体験を提供し、どのような状態になっているのか」というゴール状態を共有して仕事をする必要があります。つまり、「ビジョンの主語は社会や顧客」になります。主語と言っていますが、 要は顧客がどのような状態になっているかを会社全体でイメージを共有できる言葉 になっていればよく、「我々は顧客にこうなってもらう、社会をこのようにする」という言葉でも構いません。提供している体験価値を、端的に表現する必要があります。", "book_title": "アフターデジタル　オフラインのない時代に生き残る", "author": "藤井 保文、尾原 和啓"}, {"text": "一緒に仕事をしているスタッフに対しては「人生って思い出づくりだよね」という話をよくしています。思い出をつくるには本気を出さなければ意味がないので、そういう経験を積んでほしいと願っているからです。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "そもそも、文化財もテーマパークと同じで、対価に値するサービスを提供しなくてはいけません。なぜそこに建てたのか、なぜそのような形になったのかということを、わかりやすく、かつ面白く来観者に説明する必要があります。北海道の旭山動物園が「行動展示」で成功をおさめましたが、文化財こそ、人間ドラマの「行動展示」をしなくてはいけないのです。", "book_title": "デービッド・アトキンソン　新・観光立国論―イギリス人アナリストが提言する２１世紀の「所得倍増計画」 デービッド・アトキンソン 「新日本論」シリーズ", "author": "デービッド アトキンソン"}, {"text": "「５ＧＢのＭＰ３プレイヤー」は単なるスペック情報ですが、「一〇〇〇曲をポケットに」とはプロダクトの体験について語った言葉です。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}, {"text": "シュルツは、決してスターバックスを単なる喫茶店にしようとは考えませんでした。家庭でも職場でもない「第三の場所」にしようとしたのです。人々が職場や家庭のプレッシャーから解放され、憩いのひとときを過ごすことができる。その場所に必要なのは、良質なコーヒーだけではありません。", "book_title": "未来は言葉でつくられる", "author": "細田 高広"}]}, {"id": 80, "label": "優先順位", "freq": 10, "highlights": [{"text": "「やらなくては」ではなく「やると決める」。 「どれも大事」ではなく「大事なものはめったにない」。 「全部できる」ではなく「何でもできるが、全部はやらない」。 　この３つの真実が、私たちを混乱から救い出してくれる。本当に大事なことを見極め、最高のパフォーマンスを発揮することが可能になる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "オーストラリアのホスピスで看護師をしていたブロニー・ウェアは、死を迎える患者たちが最後に後悔していることを聞き、記録しつづけた。その結果、もっとも多かった答えは「他人の期待に合わせるのではなく、自分に正直に生きる勇気がほしかった（ ６）」。 　自分に正直に生きるというのは、単にわがままになることではない。不要なことを的確に見定め、排除していくことだ。そのためには、無意味な雑用を断るだけでなく、魅力的なチャンスを切り捨てることも必要になる（ ７）。やることを減らし、人生をシンプルにして、本当に重要なことだけに集中するのだ。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "リーダーシップ論の権威ジョン・Ｃ・マクスウェルもこう述べている。 　「ほとんどあらゆるものは、徹底的に無価値である（ ９）」 　努力の量と成果が比例するという考え方を捨てたとき、エッセンシャル思考の大切さが見えてくる。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "非エッセンシャル思考の人は、周囲の期待やプレッシャーに負けて、不本意なイエスを言ってしまう。よく考えもせず、相手を喜ばせるためだけに仕事を引き受ける。単純に、そのほうが気分がいいからだ。 　一方、エッセンシャル思考の人は、そうした気分のよさが長続きしないことを知っている。一瞬の満足のあとでやってくるのは、深い後悔だ。なぜこんなことをやらねばならないのかと、相手を恨み、自分を責める。もっと重要な仕事が犠牲になったことに気づき、ショックを受ける。", "book_title": "エッセンシャル思考 最少の時間で成果を最大にする", "author": "グレッグ・マキューン and 高橋璃子"}, {"text": "グロースを考えるうえで最も重要なポイントがあります。データの分析と表裏一体の関係にあるともいえます。それは、 いま何をやるのが一番効果的なのかを見つけ出し、その一点にフォーカスすること です。", "book_title": "グロースの時代　ヤフー、フェイスブック・・・で実践したビジネスを成長させるマインドとは (角川書店単行本)", "author": "森岡 康一"}, {"text": "一九三五年、ロバート・Ｗ・ジョンソン・ジュニアは、「洗練された自己利益」と呼ぶ理念で、これと同じ考え方を示した。「 顧客 への奉仕が第一であり…… 従業員 と 経営陣 への奉仕がその次で……株主への奉仕は最後である」（傍点は原文による）。そののち、一九四三年に地域社会への奉仕をリストに加え（それも株主への奉仕より上だった）、Ｊ＆Ｊの理念を文書にした。それが「我が信条」である。", "book_title": "ビジョナリー・カンパニー　時代を超える生存の原則", "author": "ジム コリンズ；ジェリー ポラス and 山岡 洋一"}, {"text": "今日は「緊急性」「満足感」「喜び」のどれをメインに置いた1日にするのかを、直感で決めることだ。", "book_title": "時間術大全――人生が本当に変わる「８７の時間ワザ」", "author": "ジェイク・ナップ、ジョン・ゼラツキー、櫻井 祐子"}, {"text": "まず、「少子化」対策の一丁目一番地は、子ども手当でもなければ保育所の充実でもなく、結婚対策なのだ。もちろん、子育て対策が重要ではないと言っているわけではない。優先順位の話である。", "book_title": "普通のダンナがなぜ見つからない？", "author": "西口 敦"}, {"text": "また、常に僕は「お金のために働くこと」は、考えていません。そして、株なども買ったことは一度もなく、こうやって客観的に考えると、目的は時代によって違えど、自分が面白いと思ったことをずっとやり続けているだけなんだと思います。たとえ、今それが収入の低下につながっても、常に面白い仕事を選択します。そうすると、その過程にある「面倒なこと」も、それほど面倒ではなくなります。もし、お金のために働いていたら、面倒なことは、本当に面倒でしょう。また、人から賞賛されたいとは、全くとは言いませんが、ほとんど考えていません。時代も僕も変わって行きますが、その時の自分が面白いと思ったことを、今も昔もこれからもやり続けているだけなのです。ですので、あらためて考えると「自分にとって面白いこと」→「自由な時間」→「収入」や「他者からの評価」が優先順位になります。それは紆余曲折あって、この年齢になってわかったことも多くあるんだと思います。だから今、迷ったりすることは、悪いことではありませんよ。", "book_title": "白本", "author": "高城剛"}, {"text": "基本回転数の話からは少し離れますが、時間の制約を設けることが有効なのは、重要度が判断しやすくなるからでもあります。 　どんな職業でもそうだと思いますが、仕事というのは、突き詰めて考えすぎると、無限個の問題が発見できてしまうものです。", "book_tit
